body:
  text: 明史紀事本末卷三浙江提學僉事谷應泰編太祖平漢元順帝至正十七年冬十月常遇春廖永安吳禎等自銅陵進取池州太祖命李文忠領兵䇿應永安去城十里而遇春禎等帥舟師抵城下合攻之破其北門入城執天完將洪元帥斬之天完徐夀輝偽號也并擒其副將魏夀徐天雄等天完平章陳友諒冦池州以戰艦百餘艘來逆戰遇春等復奮擊大敗之友諒沔陽漁家子本姓謝先世贅干陳冒陳姓常為書獄吏意忽忽不樂會徐夀輝倪文俊等起兵慨然往從之初為文俊簿書掾未幾亦領兵為元帥文俊漸専恣友諒積不能平至是文俊謀殺夀輝不果奔黄州友諒遂襲殺文俊併其軍自稱平章夀輝不能制時友諒方强茲為戰争之始十八年夏四月陳友諒䧟江南隆興瑞州己巳遣其黨趙普勝自樅陽寇池州太平守將劉友仁聞之率兵赴援遇賊敗没池州守將趙忠亦戰死俞通海尋復池州普勝驍將號雙刀趙初結砦巢湖已歸友諒趙徳勝畧石埭擒友諒將錢清十九年春三月陳友諒遣趙普勝寇寧國太平縣總制胡惟賢命程允汪炳等撃敗之獲其糧萬餘石普勝復寇青陽石埭等縣僉院張徳勝與戰於柵江口破走之夏四月徐達俞通海趙徳勝等擊趙普勝柵江營大破之賊棄舟走獲巨艦艨艟癸酉復池州擒偽帥洪鈞等時太祖經營浙東方憂普勝剽掠聞㨗大喜擢徐達同知樞宻事諸將陞賞有差秋八月遣徐達攻安慶達率張徳勝等自無為登陸夜至浮山砦擊敗普勝部將胡總管兵追至潜山界友諒恭政郭泰領兵至沙河迎戰達復大破之斬泰獲輜重無筭遂克潜山九月僉院俞廷玉帥兵攻安慶不克没於陣諸將患之太祖曰普勝雖勇而寡謀友諒挾主以令衆用間以離之一夫之力耳時普勝有門客通術數嘗為普勝畫䇿乃使人陽與客交而隂間之置書與客故逹普勝客懼來歸盡得普勝平日所為乃重以金幣資客潜往友諒所親間普勝普勝不之覺見友諒使者輙自言其功有徳色友諒深忌之至是憤潜山之敗乃詐以㑹軍為期自至安慶普勝出迎至鴈汊登舟友諒殺之併其軍冬十二月徐壽輝以友諒破隆興欲徙都之友諒忌其來不利於己沮之壽輝不聼引兵發漢陽南下江州友諒佯出迎伏兵城内候壽輝入即閉城伏發盡殺其左右將士幽壽輝江州友諒自稱漢王置官屬二十年夏四月徐逹常遇春㧞趙普勝之水寨友諒盛兵來援聲言出安慶遇春䇿其必攻池州伏鋭兵九華山待之而以羸弱守城友諒明日果至直造城下鋒鋭甚城上揚旗鳴鼓伏兵悉起縁山而出循江而下絶其歸路城中出兵夾擊大破之斬首萬餘級生擒三千人常遇春欲盡殺之謂徐逹曰此皆勍敵也不殺將為後患若以上聞必不殺逹不從遂以聞太祖諭使者曰亟還諭諸將今戰争方始不可縱殺以絶人望三千精銳宜釋之為後用及使者返遇春已殺之止存三百人太祖聞之不懌命悉放還閏五月友諒率舟師犯太平圍其城守將花雲率麾下三千人結陣迎戰三日友諒不得入乃以巨舟乘漲泊城西南隅舟尾髙與城平士卒縁之上時城中乏食士憊甚不能戰丙辰城遂䧟賊縛雲急雲怒罵曰賊奴爾縛吾吾主必滅爾斬為膾也遂奮躍大呼起縛盡絶奪守者刀連殺五六人復罵曰賊非吾主敵也曷不速降賊怒縛雲舟檣叢射之比死罵賊不絶口院判王鼎知府許瑗皆抗節不屈死之方雲之與賊戰也勢甚急妻郜氏生子煒方三嵗抱之泣語家人曰城且破吾夫必死吾夫死吾不獨生然不可使花氏無後兒在若等善撫育之已聞雲就縛郜氏即赴水死侍児孫氏收郜瘞之抱兒逃漢軍掠之軍中惡小児啼孫氏恐被害以簪珥屬漁家鞠之偽漢敗孫氏脱身至漁家竊兒去夜宿陶穴中天曙登舟渡江遇漢潰軍奪舟捽孫氏及兒投之江江中得斷木附之入蘆渚中渚有蓮實孫氏取㗖兒凡七日不死忽夜半聞人語聲呼之逢老父號雷老告之故與偕行達太祖所孫氏抱兒拜泣太祖亦泣置兒於膝曰此將種也命賜雷老衣忽不見陳友諒冦太平時挾夀輝行既得太平亟謀僣偽號乃於采石舟中佯使人白事夀輝前令壯士持鐵撾從後擊之碎其首以暴疾死令軍中遂以采石五通廟為行殿稱皇帝國號漢改元大義羣下立江岸草次行禮值大雨殊無儀節以鄒普勝為太師張必先為丞相張定邊為太尉乃率衆還江州友諒既僣大號遣使約張士誠同入冦士誠齷齪自固不敢應友諒自江州引兵東下建康大震獻計者或謀以城降或以鍾山有王氣欲奔據之或以决死一戰戰不勝即走未晚太祖心非諸將議獨劉基張目不言太祖召基入内問計基曰先斬主降及奔鍾山者乃可破賊太祖曰先生計將安出基曰天道後舉者勝吾以逸待勞何患不克莫若傾府庫開至城以固士心伏兵伺隙擊之取威制勝以成王業在此舉也太祖意益决或謀先復太平以牽制之太祖曰不可太平吾新築壘濠塹深固向使彼陸地來攻必不能破彼乃以巨艦乗城為所䧟今往攻之猝難拔賊舟師十倍我我頓兵堅城之下進不能取退不及援失所據矣或又勸太祖自將禦之太祖曰亦不可彼知我出以偏師綴我我欲與戰彼不交鋒而以舟師順流下建康半日可達吾歩騎急囘百里趨戰兵法所忌皆非良䇿也於是遣胡大海以兵直搗廣信制其後而召指揮康茂才謂之曰吾有事命汝能之乎茂才曰惟命太祖曰汝與友諒雅游今友諒入冦吾欲速其來非汝不可汝今作書遣使貽友諒偽約降為内應招之速來紿告以虚實使分兵三道以弱其勢茂才曰諾家有老閽舊嘗事友諒遣使賫書必信無疑太祖以其謀語李善長善長曰方憂冦來何為誘致之太祖曰遲則二冦謀合為害益大何以支今先破此賊則東冦膽落矣善長曰善茂才遂令閽者乘小舸徑至友諒軍友諒得書甚喜問曰康公今何在閽者曰見守江東橋問橋何如曰木橋乃與酒食遣還謂曰歸語康公吾至則呼老康為驗閽者諾歸告太祖太祖喜曰賊入吾彀中矣乃命善長亟撤江東橋易以鐵石比旦橋成有自友諒軍中逸歸者言友諒問新河口路亟命趙徳勝跨新河築虎口城守命常遇春馮勝華髙等率帳前五翼軍三萬人伏石灰山側徐逹等陳兵南門外楊璟駐兵大勝港張徳勝朱虎率舟師出龍江闗外太祖親總大軍於盧龍山令持幟者偃黄幟於山之左偃赤幟於山之右戒曰寇至則舉赤幟舉黄幟則伏兵皆起各嚴師以待乙丑友諒果引舟師東下至大勝港楊璟整兵禦之港狹僅容三舟入友諒以舟不得並進遽引退出大江徑衝江東橋見橋皆大石非木橋乃驚疑連呼老康老康無應之者悟茂才使謬即與其弟號五王者率舟師趨龍江先遣萬人登岸立柵勢甚鋭時酷暑太祖衣紫茸甲張葢督兵見士卒揮汗命去葢衆欲戰太祖曰天將雨諸軍且就食當乗雨撃之時天無雲衆未信忽風起西北須臾大雨如注赤幟舉太祖下令抜柵諸軍競前抜柵友諒麾其衆來争戰方合雨止太祖命發鼓鼓大震黄幟舉常遇春等伏兵起徐達兵亦至張徳勝朱虎舟師並集内外合撃友諒兵大潰走趨舟值潮退舟膠淺殺溺死者無筭生擒七千餘人收得巨艦百餘艘戰舸數百友諒乗别舸脱走於所乘舟中得茂才書太祖笑曰彼愚至此可嗤也命諸將追撃友諒至慈湖縱火焚其舟賊衆潰追至采石復大戰廖永忠率所部大呼䧟陣入華雲龍躍馬𢷬其中堅有王銘者獨馳入其陣賊攅槊刺之傷額戰益力流血淋漓旋迴三匝獨所殺傷過當賊大敗張徳勝戰死周顯與賊戰於觀渡橋亦敗之諸軍乘勝追擊賊守太平者無固志辛酉遂復太平初太平城西南俯瞰姑溪故為友諒舟師所䧟至是常遇春命移築去姑溪二十餘歩增築樓堞守禦遂固六月戊寅胡大海取信州大海率兵至靈溪城中步騎數千出迎戰擊敗之督兵攻城守者不能支衆潰遂克之改信州為廣信府以大海子徳濟為同僉守之七月徐夀輝舊將浮梁院判于光左丞余椿擊走偽漢將辛同知取饒州以城來降太祖命鄧愈往鎮之饒濱鄱陽湖友諒數遣舟師來攻愈與光等連營拒之屡殱其衆已而漢將侯邦佐䧟浮梁于光單騎來歸時安慶為長江上流要地先是趙普勝守之頗難攻取友諒既殺普勝用别將守安慶而以普勝部將張志雄帥兵從侵建康志雄怨友諒故龍江之戰無闘志來降因獻取安慶之䇿我師遂進克安慶太祖命巢湖將僉院趙伯仲守之尋為張定邉所破伯仲遁還太祖怒曰主將不能堅守城池城䧟逺遁當誅之常遇春諍曰伯仲係渡江勲舊宜曲赦之太祖曰不依軍法無以警後賜弓弦令自盡而官其弟庸行樞宻院事九月徐夀輝舊將歐普祥以袁州來降陳友諒遣其弟友仁攻普祥普祥擊敗之擒友仁友仁懼乃與普祥約和釋友仁歸二十一年春三月陳友諒遣其將李明道冦廣信據草平鎮遏浙東援兵胡徳濟遣夏徳潤出兵奪其墩戰死賊又保玉山胡大海部將繆美聞之來援與賊戰於東津橋遂復玉山抵廣信絶明道歸路六月明道圍廣信急而徳濟兵少僅嬰城守遣使求援於父大海大海率師由靈溪進李文忠亦遣兵援之徳濟聞援兵至引兵出城與大海夾擊明道大破之擒明道及其宣慰王漢二并士卒千餘人戰馬器械無筭大海送明道漢二於文忠文忠令漢二招友諒建昌守將王溥溥漢二兄也遂歸附乃俱送建康太祖釋而用之征江州南昌用為鄉道秋八月太祖决計伐陳友諒㑹李明道具言友諒弑徐夀輝後將士離心政令不一驍勇如趙普勝又忌而殺之雖有衆不足恃也太祖召諸將諭之曰友諒殺主僣號犯我近疆殞我名將觀其所為不滅不已爾等各厲士卒以從庚寅太祖御龍驤巨艦帥舟師乘風溯流而上鳥數萬夾上艦而飛戊戌抵安慶敵固守不戰乃以陸兵疑之敵兵動遂命廖永忠張志雄以舟師擊其水寨大破之攻城自旦至暮不拔劉基請棄安慶去徑拔江州傾其巢穴太祖從之遂率兵西上長驅過小孤友諒將丁普郎傅友徳率所部歸附友徳宿州人後徙碭山勇畧冠一時初從山東李喜喜剽掠入蜀常為軍鋒冠歸明玉珍玉珍不能用率所部走武昌從陳友諒忽忽無所展聞明師攻江州而嘆曰此吾主也以所部謁見於小孤山上奇之擢為將遣使招諭江西諸郡壬寅次湖口友諒舟出江偵邏擊敗之乘勝至江州友諒始知之以為神兵自天而下倉卒不能軍絜妻子夜奔武昌癸卯師入江州乘勝追拔蘄州黄州興國黄梅廣濟等處偽漢江西行省丞相胡廷瑞守南昌遣其部將鄭仁傑詣軍門納欵且請禁止數事勿散離其所部兵太祖有難色劉基自後踢所坐胡牀太祖悟許之賜書慰諭畧曰鄭仁傑至言足下有效順之機此足下之明達也又恐分散所部屬之他將此足下之過慮也吾起兵十年奇才英士得之四方其有能審天時料事機挺然委身而來者葢其意立欲立功當世垂名後裔大丈夫相遇磊磊落落一笑契合洞見肺腑故嘗推赤心以待之隨其才而任使兵少則益之以兵位卑則隆之以爵財乏則厚之以賞此吾待將士之心也安肯散其部屬負人求歸之心哉陳氏諸將如趙普勝驍勇善戰以疑見僇猜忌若此事竟何成近有龍江之役長張梁鉉彭指揮諸人來降視吾諸將恩均義一無有所間及長張破安慶梁鉉等攻江北功績並著此數人者其自視無復生理尚待之如此况足下不勞一卒以完城來歸者耶得失之機間不容髪其早為之計廷瑞得書遣康泰詣九江降廷瑞後改名廷美漢將餘干吳宏龍泉彭時中吉安曽萬中孫本立等皆遣使納欵命趙徳勝廖永忠等分兵攻瑞州臨江諸郡鄧愈帥兵襲浮梁友諒恭政侯邦佐棄城遁于光進拔樂平敗偽蕭總管擒萬户彭壽等六十八人饒州悉定十月愈駐兵臨川之平塘時友諒將鄧克明據撫州佯遣使通欵無降意愈知其情捲甲夜趨比旦入城克明單騎遁尋被獲諸將旋師攻安慶下之二十二年春正月太祖幸南昌胡廷瑞率祝宗康泰等迎謁以鄧愈為江西行中書省叅知政事鎮南昌時宗泰降非本意即欲謀叛廷瑞密以言上乃令宗泰帥所部從徐達攻武昌二月太祖率胡廷瑞等還建康宗泰行至女兒港遂叛道掠布商船為旗反兵劫南昌知府葉琛迎戰死之鄧愈倉卒以數十騎出走數與賊遇從者多遇害愈窘甚連跳跨三馬馬輙踣幾不免最後得養子所乘馬走還建康徐達兵至湖廣沌口聞變旋師赴之宗至新淦為鄧志明所殺泰走廣信以廷瑞甥特宥之南昌復定太祖聞之喜曰南昌控引荆越西南之藩屏得南昌去陳氏一臂矣非骨肉重臣不可守五月丙午命大都督朱文正統元帥趙徳勝薛顯同恭政鄧愈鎮之八月陳指揮聚衆結寨南昌之西山趙徳勝孫興祖攻破之俘斬三千餘人冬十二月漢將熊天瑞冦吉安陷之殺守將孫本立友諒使其知院饒鼎臣守吉安鼎臣剽悍有膽畧所至毒害人呼為饒大膽丁亥朱文正遣兵復吉安鼎臣出走二十三年春二月漢太尉張定邊陷饒州于光走還夏四月陳友諒忿其疆場日蹙大作舟艦髙數丈餙以丹漆上下三級級置走馬棚下設板房為蔽置艣數十其中上下人語不相聞艣箱皆裹以鐵自謂必勝載其家屬百官空國而來兵號六十萬攻南昌壬戌薄城下諸將分門拒守鄧愈守撫州門趙徳勝守宫步士歩橋步三門薛顯守章江新城二門牛海龍等守琉璃澹䑓二門文正居中節制自將精銳二千往來策應丙寅友諒親督兵攻撫州門兵各載竹盾如箕狀以禦矢石極力來攻城壊二十餘丈鄧愈以火銃擊退其兵隨竪木栅賊爭柵文正督諸將死戰且戰且築通夕復完於是李繼先牛海龍趙國旺許珪朱潜程國勝等皆戰死五月丙子友諒復攻新城門薛顯將銳卒開門突戰斬其平章劉震昭敵兵退百户徐明被執死之六月辛亥友諒増修攻具欲破栅自水闗入文正使壯士以長槊從柵内刺之敵奪槊更進文正乃命煆鐵㦸鐵鈎穿栅復刺敵復來奪手皆灼爛不得進友諒盡攻擊之術而城中備禦萬方殺傷甚衆友諒分遣饒鼎臣等陷吉安李明道叛守將曾萬中死之劉齊朱叔華被執陷臨江復執趙天麟以三人狥於城下文正等不為動賊復攻宫步士步二門趙徳勝巡城至宫步門賊伏蹶張弩射之中腰膂箭深入六寸拔出拊髀嘆曰吾自壯嵗從軍傷矢石者屢矣未有若此之創者命也獨恨不能從主上埽清中原耳遂卒南昌被圍既久内外阻絶文正遣千户張子明赴建康告急又詐遣卒號捨命王者詣友諒約日出降有諒信之緩其攻至日城上旗幟一新友諒候至暮見無降意縛降卒至城下殺之張子明取漁舟從水闗出越石頭城晝行夜止半月逹建康時太祖方親破張士誠將吕珍於安豐觧安豐圍命徐逹等移師圍廬州而自還建康子明至太祖問友諒兵勢何如子明對曰友諒兵雖盛戰死亦不少今江水日涸巨艦將不利又師久糧乏援兵至可必破也太祖曰歸語文正但堅守一月吾當自取之乃遣子明先還至湖口為友諒兵所執友諒曰若能誘降非但不死且富貴子明陽許之至城下呼曰主上令諸公堅守大軍且至矣友諒怒殺之文正等聞之守益堅時徐達常遇春圍左君弼於廬州太祖遣使命觧圍曰為一廬州而失南昌非計也七月癸酉太祖自將救洪都達遇春亦自廬州還太祖親督諸將㑹師禡纛於龍江舟師凡二十萬癸未進次湖口先遣指揮戴徳以一軍屯於涇江口復以一軍屯南湖嘴以遏友諒歸師又遣人調信州兵守武陽渡防其奔逸丙戌友諒圍南昌凡八十有五日聞太祖至觧圍東出鄱陽逆戰太祖率諸將由松門入鄱陽湖丁亥遇於康郎山友諒列巨舟當我師太祖見之謂諸將曰彼巨舟首尾連接不利進退可破也乃命舟師為二十隊火器弓弩以次而列戒諸將近冦舟先發火器次弓弩及其舟則短兵擊之戊子徐達常遇春廖永忠等進兵薄戰達身先諸將撃敗其前鋒殺千五百人獲一巨舟而還軍聲大振俞通海復乘風發火砲焚冦舟二十餘艘殺溺死者甚衆元帥宋貴陳兆先亦死戰徐達等搏戰不已火延及達舟敵乘之達撲火更戰太祖急遣舟援達達力戰敵乃退友諒驍將張定邊奮前犯太祖舟舟膠於沙漢兵匝焉程國勝劍叱之與陳兆先大奮擊牙將韓成進曰古人殺身以成仁臣不敢愛其死乃服上冠袍對敵自投水中敵信之攻少緩宋貴陳兆先俱戰死常遇春從傍射中定邊定邊舟始却愈通海來援舟驟進水湧太祖舟遂脫通海與廖永忠以飛舸追定邊定邊走身被百餘矢退去㑹日暮太祖鳴鉦集諸將申約束恐張士誠乘虚入寇命徐達囘守建康己丑太祖復親布陣與友諒戰友諒悉巨舟連鎻為陣旌旗樓櫓望之如山我舟小仰攻多却太祖親麾之不前右師少却立命斬隊長十餘人猶不止郭興進曰非人不用命舟大小不敵也臣以為非火攻不可太祖然之命常遇春等分調漁舟載荻葦置火藥其中至晡時東北風起太祖命以七舟束草為人餙以甲胄持兵㦸若鬬敵狀令敢死士操之偹走舸於後將迫敵舟乘風縱火風急火烈須臾抵敵舟焚水寨數百艘燔焰漲天湖水盡赤死者大半友諒弟友仁友貴及其平章陳普畧等皆焚死我師乘之又斬二千餘級友仁者即所謂五王也眇一日有智數梟勇善戰至是友諒為之喪氣普畧即新開陳也是日張志雄舟檣折為敵所覺以數舟攅兵鈎刺之志雄窘迫自剄丁普郎余昶陳弼徐公輔皆戰死普郎身被十餘創首脫猶植立舟中不仆持兵若戰狀是時太祖所乘舟檣白友諒覺欲併力來攻太祖知之庚寅夜令諸船盡白其檣旦莫能辨敵益駭辛夘復率衆大戰自辰至巳不觧時劉基侍忽躍起大呼太祖亦驚起囘顧但見基雙手揮之曰難星過急更舟太祖如言入他舟坐未定舊所御舟以礟碎矣友諒乘髙見舟碎喜甚俄太祖麾舟更進皆失色廖永忠俞通海汪興祖趙庸以六舟深入敵聫大艦拒戰蔽之舟若没有頃六舟旋繞漢軍而出勢如游龍諸將見之勇氣百倍呼聲動天地波濤立起日為之晦時漢舟大我師環攻之殺其卒殆盡而操舟猶不知呼號揺櫓如故已而焚其舟皆死至午敵兵大敗棄旗鼓器仗浮蔽湖面通海等還太祖勞之曰今日之捷諸君之力也友諒戰不利欲退保鞋山我師先至􅎆子口横截湖面邀友諒不得出乃歛舟自守不敢更戰是日移舟泊柴棚去敵五里許諸將欲退師少休士卒太祖曰兩軍相持先退非計也俞通海以湖水淺請移舟扼江上流劉基亦密言當移軍湖口期金木相犯日决勝太祖從之時水路狹隘舟不得並進恐為敵所乘至夜令船置一燈相隨渡淺比明已盡渡矣乃泊於左蠡友諒遂亦移舟出泊瀦磯相持者三日友諒左右二金吾將軍率所部來降初友諒戰不利右金吾曰今戰不利出湖實難莫若焚舟登陸直趨湖南謀為冄舉其左金吾曰今雖不利而我師猶多戮力一戰勝負未可知何至自焚以示弱萬一捨舟登陸彼以步騎躡我後進不及前退無所據矣友諒猶豫不能决至是失亡多乃曰右金吾是也左金吾聞之懼來降右金吾見其降亦率所部來歸友諒兵益衰太祖既駐師彭蠡移書友諒曰公乘尾大不掉之舟殞兵敝甲與吾相持以公平日之強暴正當親决一死戰何徐徐隨後若聼吾指揮者無乃非丈夫乎友諒得書怒留使者不遣盡殺所獲我戰士太祖聞之命悉出所俘友諒軍視其傷者賜藥療之皆遣還下令曰但獲彼軍皆勿殺又令祭其弟姪及將士之戰死者師出湖口命遇春永忠諸將統舟師横截之又令一軍立柵於岸控湖口旬有五日友諒不敢出復移書與之曰昨吾船對泊瀦磯嘗遣使賫記事往不見使囘公度量何淺淺哉丈夫謀天下何有深仇夫自辛夘以來天下豪傑紛然並起邇來中原興問罪之師挾天子令諸侯於是淫虐之徒一掃而亡公之湘隂劉亦懼而往此公腹心人也部下將自此往矣江淮英雄惟吾與公耳何乃自相吞併公今戰亡弟姪首將又何怒焉公之土地吾已得之縱力驅殘兵來死城下不可再得也設使公僥倖逃還亦宜修徳勿作欺人之容却帝名而待真主不然䘮家滅姓悔之晩矣友諒忿恚不答太祖與博士夏煜等日草檄賦詩意氣彌壯分兵克蘄州興國友諒食盡掠糧於南昌朱文正遣人燔其舟勢益困時我師水陸結營列柵江南北岸置火舟火筏中流戒嚴以俟八月壬戌友諒計窮冒死突出繞江下流欲由禁江遁囘太祖麾諸軍追撃以火舟火筏衝之敵舟㪚走追奔數十里自辰至酉戰不觧至涇江口涇江之兵復擊之張鐵冠大笑賀曰友諒死矣大祖曰無妄言又曰縛汝水濱以俟乃遣人具牲酒往祭友諒以覘生死且曰如其生往者必還若不還死决矣乃往者俱被殺未幾有降卒來奔言友諒在别舸中流矢貫睛及顱而死諸軍聞之大呼喜躍益爭奮擒其太子善兒明日平章陳榮等悉舟師來降得士卒五萬餘人張定邊乘夜以小舟載友諒屍及其子理奔還武昌復立理為帝改元徳壽諸將多勸太祖乘勝徑擣武昌滅漢者不從初劉基自青田還建康上謀用兵吳漢孰先或以張士誠近富而弱宜先基曰不然士誠自守寇耳陳友諒居上流且名號不正宜先伐之陳氏滅張氏囊中物矣太祖曰然友諒剽而輕士誠狡而懦若先攻士誠友諒必空國來救是吾疲於二冦也遂决計伐陳氏㑹士誠遣吕珍攻韓林兒於安豐太祖親率諸將援之基乃諫不聼既觧安豐圍復命諸將移師圍廬州及友諒急攻南昌張子明請濟師始觧廬州圍親帥而上至是太祖謂基曰我不當有安豐之行使友諒乘我出建康空虚順流而下我進無所成退無所歸大事去矣今友諒不攻建康而圍南昌計之下者不亡何待乃知天命有所歸也時四方割據惟友諒鷙悍為羣雄冠其初起也父普才戒之曰若捕漁兒耳而乃圖大事友諒曰相塜者言我家當富貴今其時矣及貴迎父父曰兒不守故業吾懼及也至是敗年四十四稱帝僅四年友諒既敗太祖喜謂諸將曰此賊亡天下不足定矣九月壬申班師還告廟飲至論功行賞賜常遇春廖永忠俞通海等田餘賜金帛有差太祖經理建康守禦畢留徐達等備吳壬午復率諸將親征陳理十月至武昌分兵立栅圍其四門又於江中聫舟為長寨以絶其出入之路分兵狥漢陽徳安州郡湖北諸郡皆來降十二月甲寅太祖還建康命常遇春率諸將圍之二十四年春二月乙未太祖以武昌圍久不下乃親往視師辛亥至武昌督兵攻城城東有髙冠山俯城中可瞰也漢兵屯焉太祖問諸將誰能奪此者傅友徳請先登一鼓奪之面中一矢鏃出腦後脇下復中一矢友徳不為沮人服其勇敵將陳同僉者驍捷善槊馳入中軍帳下太祖方坐胡牀疾呼曰郭四為我殺賊英持鎗奮臂一呼賊應手殞墜太祖曰尉遲敬徳不汝過也觧所服紅錦袍賜之漢岳州守將張必先率潭岳兵來援至夜婆山太祖命常遇春乘其衆未集擊敗之擒必先必先驍勇善戰人號為潑張城中倚以為重至是縛至城下示之曰汝所恃者潑張今已為我擒尚何恃而不降必先亦呼定邊曰吾已至此事不濟矣兄宜速降為善定邊氣索不能言後數日太祖復遣友諒舊臣羅復仁入城諭陳理曰理若來降當不失富貴復仁固請曰主上推好生之徳恵此一方使陳氏之孤得保首領而臣不食言臣雖死不恨矣太祖曰吾兵力非不足所以久駐此者欲待其自歸免傷生靈耳汝行必不誤汝復仁至城下號哭理驚召之入相持哭哭止復仁諭以太祖意詞㫖懇切時陳氏將畧無右定邊者定邊亦知不可支癸丑陳理衘璧肉袒率定邉等詣軍門降理至軍門俯伏戰慄不敢仰視太祖見其㓜弱起挈其手曰吾不爾罪勿懼也令宦者入其宫𫝊命諭友諒父母凡府庫儲蓄令理悉自取之遣其文武官僚以次出門妻子資装皆俾自隨明師圍武昌凡六閱月而降士卒無敢入城市晏然不知有兵城中民饑困命給米賑之召其父老撫慰民大悦於是漢沔利岳郡縣相繼降立湖廣行中書省以樞密院判楊璟為叅政守之封陳理為歸徳侯江西行省以友諒鏤金牀進太祖觀之謂侍臣曰此與孟㫤七寶溺器何異耶一牀工巧若此其餘可知窮奢極侈安得不亡命毁之夏四月丙申命建忠臣祠於鄱陽湖康郎山祀丁普郎張志雄韓成宋貴陳兆先余旭昌文貴王勝李信陳弼劉義徐公輔李志髙王咬住姜潤石明王徳朱鼎王清常徳勝王鳯顯丁宇王仁汪澤王理陳冲裴幹王喜仙袁華史徳勝常推徳曹信逯徳山鄭興羅世榮等三十五人乙巳命建忠臣祠於南昌府祀趙徳勝李繼先劉齊朱叔華許圭朱潜牛海龍張子明張徳山徐明夏茂成萬思誠葉琛趙天麟等十有四人時漢既平熊天瑞尚竊據贑州未下八月壬辰命常遇春鄧愈率兵討之愈與遇春合兵平臨江之沙坑麻嶺牛陂諸寨執偽知州鄧志明送建康及其兄克明俱伏誅時李明道匿武寧山被獲太祖以其反覆亦戮之遇春兵次吉安遣人語饒鼎臣曰吾今往取贑可出城一言而去鼎臣怖不敢出遣其㓜子出見遇春坐而飲之曰歸語爾父可善自為計鼎臣即夜棄城走安福遇春復吉安乃引兵趨贑州已而鼎臣復肆剽掠王國寶擊斬之九月乙未命徐達楊璟等帥師進取江陵故偽漢知院姜珏等以城降改江陵為荆州府達遣唐勝宗分兵取長沙下沅陵醴陵傅友徳取夷陵常遇春等圍贑州未下太祖諭遇春等曰熊天瑞困處孤城猶籠禽阱獸豈能逃逸但恐城破之日殺傷過多要當以保全生民為心一則可為國家二則可為附者勸且如漢鄧禹不妄誅殺子孫昌盛此可為法向者鄱陽湖之戰友諒既敗生降其兵至今為我用縱有逃歸者亦我百姓苟得地無民將安用之時天瑞拒守益堅遇春乃浚濠立栅以圍之王瑞子元震竊出覘軍遇春從數騎猝與遇元震來襲遇春遣壯士揮刀擊之元震奮鐵撾以拒且戰且却遇春曰壯士也止勿追十二月徐達克辰州衡州句容儒士戎簡入見語及伐陳之事簡曰向敗陳氏於九江何不乘勝直抵武昌而乃引還今雖克之用力多矣太祖曰汝儒者豈不聞覆巢之下無完卵乎當陳氏兵敗我豈不知乘勝蹴之兵法曰窮冦勿追若乗勝急追彼必死闘殺傷實多吾故縱之遣偏師綴其後恐其奔逸料彼殘破之餘人各偷生喘息不暇豈敢復戰我以大軍臨之故全城降服一者士不傷二者生靈獲全所得不已多乎簡太悦服二十五年春正月己巳熊天瑞被圍日久力不能支乃降其所綂南安雄州韶州諸郡皆下太祖聞遇春克贑不殺喜甚遣使褒諭之曰予聞仁者之師無敵非仁者之將不能也今將軍破敵不殺捷書至予甚為將軍喜雖曹彬之下江南何以加之先是天瑞横歛取民財太祖悉命罷之甲戌常遇春進師南安遣麾下招諭韶州未下諸郡於是友諒韶州守將張秉彛南雄守將孫榮祖等各籍兵粮來降遇春振旅還谷應泰曰慨自元人失馭羣雄蠭發逐鹿之夫所在都有太祖崛起濠梁而同時並興者則有張士誠據吳徐貞一據蘄明玉珍據蜀方國珍據江東然皆闔門坐大非有圖天下之志也獨陳友諒以驍鷙之姿奄有江楚控扼上流地險而兵強才剽而勢盛實逼處此以與我争尺土者非特漢之文伯子陽唐之世充建徳而已乃太祖之用兵也先規偽漢後取偽吳成筭在胸次第不爽於是龍江拔栅大奪戰舸柴桑陳兵自天而下不待康郎報捷湖口移軍而敵在目中氣吞小醜矣雖其間茂才作諜韓成赴江履尾乘危亦煩經畫而太祖屢挫而氣不折友諒小勝而志益驕此明之所以興漢之所以亡也至若友諒者本沔陽漁家刀筆小吏徒有㐫殘實無功徳干城仗普勝而旋即殺之北面事壽輝而旋即斃之名實交䘮忠勇並失誠所謂蠅聲紫色聖王之驅除耳而論者以周顛仰天鐵冠大笑劉基之手揮難星雷老之忽然不見王者所至諸神效靈而不知友諒者犯順多黒闥之風歸命少竇融之智盗竊空名進退無據抑亦人謀不臧匪特天亡之也然而江夏既平漸可北窺襄鄧荆楊混一便當分下中原從此摧枯拉朽帝業已成宜乎太祖有云此賊平天下不足定也雖然尤有異者友諒初破太平僣稱大號兵來甚鋭議者欲降獨劉基以為取威定覇在此一舉豈直周瑜决䇿孫不降曹實乃隨何絶使漢終覆楚安危之機豈不以謀哉明史紀事本末卷三
