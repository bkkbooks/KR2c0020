body:
  text: 眀史紀事本末卷四十三浙江提學僉事谷應泰編劉瑾用事武宗正德元年春正月以神機營中軍二司內官太監劉瑾管五千營瑾陜西興平人故姓淡景泰中自宫為劉太監名下因其姓成化時領教坊見幸𢎞治初擯茂陵司香其後得侍東宫以俳弄為太子所悅太子即位時瑾掌鐘鼓司鐘鼓司內侍之微者也瑾朝夕與其黨八人者為狗馬鷹犬歌舞角觗以娛帝帝狎焉八人者馬永成髙鳯羅祥魏彬丘聚谷大用張永其一瑾瑾尤獪給頗通古今常慕王振之為人至是漸用事六月辛酉雷震郊壇禁門太廟脊獸奉天殿鴟吻大學士劉健謝遷李東陽聞帝與八人戲亡度連疏請誅略曰政在於民生國計則若罔聞知事涉於近幸貴戚則牢不可破臣等叨居重地徒擁虛銜或旨從中出略不與聞或衆所擬議竟行改易若以臣言為是則宜傳賜施行臣等言非亦宜明加斥責而往往留中不發視之若無臣等因循玩愒竊祿茍容既負先帝又負陛下語甚切直不報冬十月户部尚書韓文每退朝對屬言輒泣下郎中李夢陽曰公為國大臣義同休戚徒泣何益文曰計安出夢陽曰比言官章入交劾諸內侍章下閣閣下持劾章甚力公誠及此時率諸大臣死爭閣老得諸大臣持劾章必益堅去瑾輩易耳文捋鬚昻肩毅然曰是也即事勿濟吾年足死矣不死不足以報國明日早朝文密叩閣老閣老許之倡諸大臣諸大臣皆應諾文退乃囑夢陽具疏草文讀而芟之曰是不可文文恐上不省不可多多覽勿竟也疏具遂合九卿諸大臣上言曰臣等待罪股肱之列值主少國疑之秋仰觀乾象俯察物議至於中夜起嘆臨食而泣者屢矣臣等伏思與其退而泣嘆不若昧死進言此臣之志亦臣之職也伏覩近歲以來太監馬永成谷大用張永羅祥魏彬劉瑾丘聚髙鳯等置造巧偽淫蕩上心或擊毬走馬或放鷹逐兔或俳優雜劇錯陳於前或導萬乘之尊與人交易狎昵媟褻無復禮體日遊不足夜以繼之勞耗精神虧損聖德遂使天道失序地氣靡寧雷異星變桃李秋花考厥占候咸非吉祥緣此輩細人唯知蠱惑君上以行私而不知皇天眷命祖宗大業皆在陛下一身髙皇帝艱難百戰取有四海列聖繼承傳之陛下先帝臨崩顧命之語陛下所聞也奈何姑息羣小置之左右為長夜之遊恣無厭之欲以纍聖德乎前古閹宦誤國漢十常侍唐甘露之變是其明驗今永成等罪惡既著若縱而不治為患非細伏望陛下將永成等縳送法司以消禍萌疏入上驚泣不食諸閹大懼先是科道交章請除羣姦閣議持章不肻下諸閹已窘相對涕泣會諸大臣疏又入於是上遣司禮監八人齊詣閣議一日三至健等卒持不下內司禮監太監王嶽者亦東宫舊臣也素剛直頗惡其儕所為獨曰閣議是明日忽有旨召諸大臣入大臣有歸咎韓文者文不應至左順門太監李榮手諸大臣疏曰有旨諸大臣愛君憂國言良是弟奴儕侍上久不忍即置之法幸少寬之上自處耳衆相顧莫敢出一語韓文曰今海內民窮盜起天變日增羣小輒導上遊宴無度荒棄萬幾文等􅍯員卿佐何忍無言榮曰疏􅍯矣上非不知苐欲稍寬之耳上固有處吏部侍郎王鏊曰脫不處奈何曰是在榮榮頸裹鐵邪敢誤國是日諸閹益窘自求安置南京而閣議又持不從時王嶽與司禮太監范亨徐智等亦助文等密奏上上不得已允之待明旦發旨捕瑾等下獄而吏部尚書焦芳者故與瑾善遂以所謀泄之瑾瑾等亦亷知王嶽密奏事八人者遂夜趨上前環跪哭以頭搶地曰微上恩瑾等磔餒狗矣上色動瑾輒進曰害瑾等者嶽也帝曰何也曰嶽東厰也外謂諌官諸先生有言苐言而閣議時嶽又獨稱是此何情也夫狗馬鷹犬嶽買獻否而獨咎瑾等帝怒曰吾收嶽矣瑾曰狗馬鷹兔何損萬幾今左班官敢譁無忌者司禮監無人也有則惟上所欲為誰敢言者上怒是夜立命劉瑾入掌司禮監兼提督團營丘聚提督東厰谷大用提督西厰張永等並司營務分據要地瑾夜傳命榜嶽亨智逐之南京而外廷未知也晨伏闕則旨下健等知事不可為各上疏求去瑾矯詔勒健遷致仕惟東陽獨留蓋前閣議時健嘗推案哭遷亦訾瑾等不休惟東陽稍緘默故得獨留東陽上言臣等三人責任一同而獨留臣將何辭以謝天下不允健遷瀕行東陽祖道欷歔泣健正色曰何用今日哭為使當日出一語則與我輩同去耳東陽無以應瑾尋矯詔追殺嶽亨於途擊折徐智臂得免初舉朝必欲誅瑾兵部尚書許進曰此屬得踈斥足矣若峻其事恐有甘露之變既而果如進言刑科給事中吳翀山西道御史劉玉俱上疏論劉瑾佞幸棄逐顧命大臣乞留劉健謝遷而以瑾正典刑上怒下獄斥為民瑾既得志於是內揣合帝意外日以深文誅求諸臣使自救不暇而莫敢進言帝喜益謂瑾可委任矣瑾又素善矯飾谷大用用鎮守太監言請臨清開皇店瑾捕獻計者罪之馬永成以私故欲升錦衣百戶邵琪瑾持不可丘聚主東厰頗恣肆偶忤瑾瑾發其事調留都王琇建新第於大內誘上居之因奏令賈人居積代諸計吏輸物內帑多獲羡餘利瑾聞怒曰安有天子而攬納稅糧者乎罪其人事得寢其善矯誣如此以吏部尚書焦芳兼文淵閣大學士入閣辦事芳潛通瑾黨瑾遂引芳入閣表裏為姦凡變紊成憲桎桔臣工杜塞言路酷虐軍民皆芳導之欽天監五官監候楊源上言八月初火角及心宿中星搖動天璇天璣天權星不明乞親元老大臣罷去內侍寵幸安居深宫絶嬉戲禁遊獵罷弓馬嚴號令母輕出入章下禮部左都御史張敷華上言政令紛拏百臣爭之不足數幸豎壞之有餘工部尚書楊守隨言劉瑾等八人罔上誣下恣意肆情而瑾尤甚並不報初劉健等致仕給事中吕翀劉􅉅上疏留之南京兵部尚書林瀚聞而嘆息於是南京六科給事中戴銑等十三道御史薄彥徽等上疏請斥權閹正國法留保輔托大臣以安社稷劉瑾矯旨遣緹騎逮繫錦衣衛獄罷户部尚書韓文劉瑾恨文令人日伺其過會有進納內府折銀者內有假偽矯旨文不能防姦落職間住瀕歸隂遣邏卒伺於途文乘一騾宿野店而去户科給事中徐昻上言文率九卿上疏忠憤所激不應停勒昻坐除名為民於是文子髙唐州知州士聰刑部主事士竒皆削籍降户部郎中李夢陽為山西布政司經歷尋罷之劉瑾矯詔勒張敷華楊守隨俱致仕以宣府總督劉宇代敷華宇附焦芳結瑾故有是用尋以宇為兵部尚書十二月吏部尚書許進奏南京科道皆要職欲行南京部屬暫署而待各官問畢還職瑾怒矯旨罰進俸先是進在兵部與瑾同督京營故改吏部至是與瑾多不合瑾銜之尋劉􅉅吕翀及戴銑薄彥徽等二十人各廷杖除名為民瑾復矯詔降南京兵部尚書林瀚為浙江左恭政致仕瑾素嫉瀚正直南京科道官言事被逮瀚獨往送贐且議上章直之瑾聞益怒勒科道詞連瀚矯旨降之南京副都御史陳夀獨疏申救瑾亦矯詔除名兵部主事王守仁上疏言戴銑等職居司諌以言為職其言而善自宜嘉納如其未善亦宜包容以開忠讜之路乃今赫然下命遽事拘囚在陛下之心不過少示懲創使其後日不敢輕率妄有論列非果有意怒絶之也下民無知妄生疑懼在廷之臣莫不以此舉為非然莫敢為陛下訟言者豈其無憂國愛君之心哉懼復以罪銑等者罪之則無補國事而徒增陛下之過舉耳臣恐自兹以往雖有上關宗社危疑之事陛下孰從而聞之苟念及此寧不寒心況今天時涷沍萬一遣去官校督束過嚴銑等在道或遂失所填溝壑使陛下有殺諫臣之心然後追咎左右莫有言者則既晚矣伏願追收前旨使銑等仍舊供職擴大公無我之仁明改過不吝之勇豈不休哉疏入瑾怒矯詔杖五十斃而復蘇謫貴州龍場驛丞既謫後瑾使人伺之途將置之死守仁至錢塘慮不免乃乘夜佯為投江而浮冠履水上遺詩有百年臣子悲何極夜夜江濤泣子胥之句浙江藩臬及郡守楊孟瑛皆信之祭之江上家人亦成服守仁遂隱姓名入武彛山中已而慮及其父華卒赴驛華時為南京吏部尚書劉瑾勒令致仕帝悉以天下章奏付劉瑾瑾時雜搆戲玩娛帝候帝娛則多上章奏請省決帝曰吾安用爾為而一煩朕瑾由是自決政瑾初亦送內閣擬旨但秉筆者逆探瑾意為之其事大者令堂候宫至瑾處請明然後下筆後瑾竟自於私宅擬行多出松江人張文冕手張文冕者故市儈嘗犯法南京兵部尚書何鑑捕置之理亡匿附瑾瑾倚之府部等衙門官稟公事日候瑾門自科道部屬以下皆長跪大小官奉命出外及還京者朝見畢必赴瑾見辭以為常惟瑾自建白本則送內閣擬旨東陽等必極為稱美有曰爾剛明正直為國除弊等語識者鄙之劉瑾使禁直指揮點視六科官辰入酉出毋離其次二年春正月劉瑾矯旨枷尚寶卿顧璿副使姚祥於長安左右門外郎中張瑋於張家灣俱以違例乘轎為東厰所發也時瑾遣邏卒伺韓文于途無所得遇璿等遂以其事上已而以大學士李東陽疏營救甚力瑾不得已乃濱死而後釋之各坐謫戍閏正月劉瑾矯詔令吏兵二部凡進退文武官先於瑾處詳議兩京都察院各道有奏章必先呈堂稟詳然後上聞二月以都御史曹元巡撫陜西元故與劉瑾親遂用之劉瑾矯詔遣科道查盤天下軍民府庫其存留者皆令解京郡縣積儲為之空匱三月劉瑾矯詔榜姦黨於朝堂頒示天下略曰朕以幼沖嗣位惟賴廷臣輔弼其不逮豈意去歲姦臣王嶽范亨徐智竊弄威福顛倒是非私與大學士劉健謝遷尚書韓文楊守隨林瀚都御史張敷華戴珊郎中李夢陽主事王守仁王綸孫􅦼黃昭簡討劉瑞給事中湯禮敬陳霆徐昻陶諧劉􅉅艾洪吕翀任惠李光翰戴銑徐蕃牧相徐暹張良弼葛嵩趙仕賢御史陳琳貢安甫史良佐曹蘭王𢎞任諾李熙王蕃葛浩陸崑張鳴鳯蕭乾元姚學禮黃昭道蔣欽薄彥徽潘鏜王良臣趙祐何天衢徐珏楊璋熊倬朱廷聲劉玉遞相交通彼此穿鑿各反側不安因自陳休致其敕內有名者吏部查令致仕毋俟惡稔追悔難及是日朝罷令廷臣跪金水橋南聽詔劉瑾矯詔京官養病三年不赴部者革為民未久者嚴限赴京聽選瑾知科道等官忤已養病避禍故嚴禁錮之夏四月劉瑾矯詔令內閣撰勑天下鎮守太監得預刑名政事其最為害者河南鎮守廖堂剝取民財輦送數十萬於京師畢貞者初差天津取海鮮後請敕自山東沿海逹於蘇松浙江福建所至括民財凌辱官司莫敢言者故事六部奏準僃事由送內閣請敕書未有不由六部內閣自出敕者瑾付內閣創為之東陽等不能執奏唯唯而已逮南京巡撫右副都御史艾璞下獄先是魏國公徐俌與無錫民家爭田璞歸田於民俌賂劉瑾差官覆勘使者乘瑾風旨悉以其田豫勳戚且劾璞前勘非是瑾矯旨逮赴詔獄訊之璞不屈曰此實民田也瑾怒箠之幾死數日方蘇謫海南罷禮部尚書李傑時晉府鎮國將軍袁槏賂劉瑾求封郡王傑持不與曰皇帝祖訓無載也瑾矯旨許之而勒令傑罷去復起前禮部尚書張升代之升初以忤瑾致仕已而復不合罷寧王宸濠厚賂劉瑾請復其先世已革護衛瑾矯旨與之劉瑾等誣逮工科給事陶諧廷杖落職為民諧前後上疏戒逸遊遠讒佞停止不急工作差官賣鹹織造皆直指羣姦欺蔽之罪瑾等以是大恨之已而復以他事逮之理捃托百端終不屈杖戍肅州衛五月以講官詹事楊廷和為南京户部右侍郎學士劉忠為南京禮部右侍郎舊事御經筵畢必獻規諫語是日廷和忠直講既罷上謂劉瑾曰經筵講官耳何多詞劉忠與廷和皆舊東宫官奏曰二人當令南京去遂有是遷時南部無缺皆添注雖升之實逺之也忠謂廷和曰此行須别瑾否廷和曰瑾所為如此不可再見之人知必以我輩交瑾矣忠深然之廷和乃以蜀錦辭瑾瑾曰劉先生不足我耶遂厚廷和而踈忠時劉宇為中樞托保國公家人朱瀛者交通劉瑾日數往來兵部郎中楊廷儀廷和弟也每俟瀛出必招入私署留坐欵語四司官有不附宇者瀛必言於瑾令外補廷儀獨諂諛宇廷儀能文宇章奏皆廷儀為之吏部推總督兩廣右都御史熊繡掌南京都察院事劉瑾矯詔令致仕繡在兵部結怨中貴至兩廣供應裁革日唯廪給數升而已瑾使人蹤迹其人嘆息而去瑾竟不能害致仕歸之日雖紙筆藥餌一無所取六月給事中許天錫手具登聞鼓狀力陳時弊懷中不敢奏自經屋梁死天錫在𢎞治中素言事有氣節時給事中郤夔覆視榆林功次瑾私人冒功多夔難所紀敘亦自經死給事中周鑰使還當賂瑾無所借資自刎桃源舟次劉瑾議革天下提學官吏部尚書許進謂提學作育人材之本執奏不可止之太監李榮傳旨御馬太監谷大用父奉御用太監張永父友俱升錦衣衛指揮使尋俱進都督同知此內臣父兄授官之始秋八月欽天監五官監候楊源奏自正德二年以來火星入太微垣帝座之前或東或西往來不一勸上思患預防意蓋指劉瑾也瑾大怒曰源何官亦學為忠臣耶矯旨逮送錦衣衛杖三十謫戍肅州至懷慶卒妻度氏斬蘆荻覆尸葬於驛後源父御史瑄以劾曹石謫戍嶺外猶幸生還源忠直不愧其父而身遂不免朝野悲之劉瑾改其姪壻納粟監生曹謐為千戶起其妹夫致仕禮部司務孫聰贊畫大同軍務冬十月南京戶部尚書楊廷和入朝命改廷和為戶部尚書兼文淵閣大學士南京尚書入閣自廷和始起張綵復為文選司郎中綵美丰儀先為文選郎與焦芳相得給事中劉􅉅劾歸至是芳薦綵於劉瑾綵故瑾鄉人謁朝數日後始往見瑾瑾喜迎笑曰好鄉里外官多不知事朝後即來鄉里遲來最得也時許進議調驗封郎中石確於文選疏已入而瑾欲復用綵迫進追回用石確疏以綵易之尋復以綵為右僉都御史而合水韓鼎者亦由瑾升戶部侍郎與綵同廷謝鼎先謝老不任拜起又吃吃不能致詞谷張輩屏後羣笑之瑾甚愧曰且看此人既謝皆嘆曰好男子此不負所舉矣綵歸過瑾瑾設酒肴預待曰非都憲我為老韓愧死矣相得益歡十一月劉瑾矯詔革天下巡撫始遣科道查盤各邉芻糧劉瑾素知邊方召商中納積弊遣科道官三年一次查盤回奏內有糧粗粃草浥爛者瑾矯旨逮繫各巡撫及管糧郎中下獄既至鎖扭押至所任地方勒令加倍賠償凡各商人納過糧草未給價銀皆沒官不給由是商賈困弊邊儲日乏劉瑾矯詔裁革天下按察司兵􅍯官十二月逮順天府丞趙璜下詔獄斥為民璜任濟南知府裁抑鎮撫中貴故瑾恨之巡撫四川都御史劉纓謂蜀水惡請開通巫山道可自彛陵逹夔州旨未下遂開道瑾矯旨械纓下詔獄廷臣論救釋之三年春正月劉瑾令朝覲官每布政司納銀二萬兩考察朝覲官既上奏翰林學士吳儼家故富劉瑾嘗有所求儼不與御史楊南金者都御史劉宇廷撻之不堪辱養病去瑾矯旨綴奏尾曰學士儼幃幕不修其致仕御史南金欺詐無病其為民逮李夢陽下錦衣衛獄尋釋之夢陽代韓文草疏瑾已謫出之猶未釋也復羅以他事械至京下獄將置之死時翰林修撰康海與夢陽同有才名各自負不相下瑾慕海常欲招致門下而海不往瑾恆先施海輒瞷亡答之竟不一見至是夢陽客左氏者詣獄語夢陽曰子殆無生路矣惟康子可以解之夢陽曰吾與康子素不相下今死生之際始托之寧不愧於心乎左曰不謂李子而為匹夫之諒也強之再夢陽乃以片紙書數字曰對山救我唯對山為能救我對山者海别號也左持書詣海海曰是誠在我我豈吝惡人之見而不為良友一避咎也遂詣瑾瑾大喜延置上座海曰昔唐玄宗任高力士寵冠羣臣目為李白脫靴公能之乎瑾曰即當為先生役海曰不然李夢夢陽高於李白而公曽不為之援奈何欲為白脫靴哉瑾曰此朝廷事今聞命當為先生圖之海遂解帶與之飲達曙别去夢陽由是得釋而海與瑾往復竟罹清議矣左都御史屠滽掌院事一日上審録重囚本內寫劉瑾傳奉字重復數多瑾怒罵之滽率十三道御史謝罪御史跪於階下瑾數其罪斥責皆叩頭不敢仰視久乃起二月起前都御史雍泰提督操江先是馬文升劉大夏交薦之及給事中潘鐸等復疏泰有敢死之節克亂之才許進薦於瑾瑾以同鄉故起之鄉人諭泰謝瑾泰曰進退在天若奈我何三月改翰林院編修顧清等為部屬時焦芳子焦黃中會試中式芳意欲得大魁既而取吕柟第一黃中居二甲首芳謂諸執事抑之遂入言於劉瑾改清等官而授黃中簡討及劉宇子劉仁等六七人俱為庶吉士數月黃中仁等俱擢編修劉瑾修理莊田擅掘天地壇後土侵厰官地五十餘頃毁官民房屋三千九百餘間發民間墳二千七百餘塜降湖廣按察司僉事湯沐為武義知縣罷江西按察司副使陳恪恪沐為御史時忤瑾故降之逮御史凃禎下獄死禎江西新淦人初為江隂令治行奏天下第一徴為御史差巡長蘆鹽課劉瑾欲令割送該年餘鹽銀兩禎不從瑾銜之後禎復命俟於朝門遇瑾不為禮即矯旨下錦衣衛獄杖戍肅州衛禎重傷死於獄仍行原籍查禎男凃朴起解補伍瑾敗始得釋逮前總制三邉都御史楊一清下獄尋釋之先是一清巡邉上疏陳戰守之䇿請復守東勝開屯田數百里省內運奏上報可一清遂興築邉墻尅期完工而劉瑾憾一清罷之工亦止至是又惡其築邉糜費下詔獄大學士王鏊言於瑾曰一清有高才重望為國修邉可以為罪乎李東陽亦力救乃得釋夏四月劉瑾假湖廣災傷為名奏遣同鄉侍郎韓福出理糧餉福科斂剝削饋銀數萬已復命福兼副都御史督理湖廣逋賦民甚苦之逮御史王時中下獄正德初時中抗疏論瑾瑾銜之識名於屏已而時中巡按宣大見綱紀隳弛極意振厲總督劉宇瑾私人也常以贓吏囑時中不從瑾既憾時中宇復譛之瑾矯詔逮繫令荷重枷露立三法司之前三日數踣且殆李東陽援之得釋以王佐為南京戶部尚書時遣科道稽核各邉糧芻先後巡撫憲臣多坐纍繫獄佐一日同尚書顧佐等見瑾瑾言及兹事曰朝廷必大誅戮乃大懼耳佐曰本朝未嘗戮大臣有毁尚書許進者瑾語諸大臣曰許進姦邪若尚書劉宇可為吏部佐曰佐與劉尚書素厚與許尚書交淺然許素有望恐劉尚書不如也毁之者因曰王佐黨進瑾怒遂有是遷欲姑遣之去而徐圖之劉瑾矯詔令進士陳璋致仕璋登𢎞治乙丑進士既歸欲終身養母母讓之曰不聞舍孝子而為忠臣者乎吾得汝祿養足矣促北上至是扺京值瑾竊政獲罪遂矯命令致仕許進宣言於朝曰古今曽有進士致仕者乎欲援之而力不能同事強璋賄瑾璋曰官以賄成吾不為也怡然就道及家甫二旬而母終議者謂天所以成孝子也後瑾誅應詔起用五月南京大飢劉瑾矯詔勑運米三十三萬石轉恤鳳陽南京兵部尚書何鑑執奏言留都地方重於鳳陽災傷甚於淮西止之始得遣官賑濟劉瑾矯詔籍沒已故戶部尚書秦紘通政強珍財産家屬遣戍西厰太監谷大用遣邏卒四出刺南康民吳登顯等三家以端午競渡擅造龍舟捕之籍其家自是偏州下邑見華衣怒馬京師語音輒相驚告官司密賂之人不貼席矣六月鎮守太監廖堂薦舉內外官預擬升調吏部多徇之吏科給事中何紹正劾堂雖奉旨察賢否注遷當付吏部上責堂下所薦于御史執朝官三百餘人下詔獄時早朝有遺書丹墀者上命拾以進則告瑾不法狀也瑾大怒矯旨跪百官奉天門下諸監立門東監之有頃命大臣出翰林院官東向跪曰內監雅待衆翰林敢爾亦使出御史等官東向跪曰御史習知法度亦寧敢爾瑾不聽時暑甚僵偃十數人命曳出內監黃偉忿曰書中所言皆為國為民好男子死即死耳何不自言嫁禍他人為瑾努目曰是何好男子不露章乃匿名匿名固死也矧御前拉諸監入李榮曰入矣公等俯而舒令內豎擲氷瓜焉有頃瑾還來榮曰來矣皆還跪瑾目之怒復入至暮盡送下詔獄長安鬻飯者爭飯百官市中明日李東陽疏救瑾微聞出內寺乃得釋上手匿名書曰汝謂賢吾故不用汝謂不賢今用之遂退李榮黃偉任瑾益専逮前户部尚書韓文下獄瑾已勒文落職怒不已乃以户部廣東司遺失簿籍遣官校械繫至京下錦衣衛考訊欲置之死監禁數月罰米二千石赴大同親納時諸大臣忤瑾去者瑾俱誣以舊事令輸粟塞下尚書王佐張縉楊守隨何鑑都御史熊繡孫需戈瑄等皆不免鬻産不能給稱貸以償縉紳為之騷然給事中安奎潘希曽御史張彧劉子勵俱以查盤後先忤瑾意下獄奎彧荷校且死李東陽疏救之始釋希曽子勵杖三十為民秋七月以雍泰為南京户部尚書瑾以泰不附已恨之併欲逐許進尋遂矯詔令泰致仕時保國公家人朱瀛者謀傾許進以劉宇代之因進嘗薦雍泰乘間言於瑾曰許尚書佯為恭謹而外示抗直如雍泰為山西按察使及宣府巡撫皆以剛暴辱屬吏朝廷屢貶不用今進欺公舉用又揚言公因泰同鄉用之非吏部本意瑾大怒立召原任文選郎中張綵入內詰問雍泰貶謫事如何不備入奏內綵曰奏稿備載許尚書塗之瑾索原稿視之果然於是擬旨以進欺罔斥致仕尋除名為民馬文升劉大夏俱以薦雍泰削籍編修劉瑞亦以薦泰罰粟二百石輸大同八月逮前兵部尚書劉大夏南京刑部尚書潘蕃下獄謫戍大夏在中樞議革勇士節光祿無名供饋歲省官府浮費數百萬近幸滋不悅大夏既歸有激怒於上者太監寧瑾素重大夏叩頭諌曰此先帝意非大夏建白乃免又孝宗召見嘗言劉宇在大同私養官馬饋送權貴孝宗密遣錦衣衛百戶邵琪往察之以養馬未送回奏太監李榮為解得免至是宇銜舊怨言於劉瑾謂籍大夏家可得數萬金焦芳亦共譛之會土目岑猛怨潘蕃圖還田州納賂瑾瑾簡蕃原奏岑猛獄詞大夏在兵部議覆遂矯詔以猛為田州同知逮大夏蕃至京下錦衣衛獄將坐以激變土官罪死大學士王鏊曰岑氏未叛何名為激變都御史屠滽亦言大夏不宜深罪瑾怒嫚罵曰即不死可無戍耶李東陽婉解之瑾使使詗大夏家實貧乃與宇謀與蕃俱擬戍廣西焦芳曰是送二人歸也遂發甘肅衛大夏雇騾車出都門觀者如堵所在罷市父老涕泣士女携筐進果食有焚香密禱願大夏生還者以南京右都御史張泰為南京户部尚書致仕泰素清貧為都御史奉表賀聖夀以土葛遺瑾瑾銜之會吏部推補是職瑾矯旨致仕劉瑾矯詔以劉宇為吏部尚書曹元為兵部尚書南京提學御史陳琳上言惜老成宥狂直謫廣東揭陽縣丞琳因瑾排大臣出臺諌故言及之九月江西按察司副使王啓忤劉瑾降廣西容縣知縣啓為御史時敢言忤中貴瑾銜之故有是降尋又令廣西巡按提問罰米三百石輸官瑾又矯旨留巡按御史胡瓉二年瑾以已陜西人瓉不附已故留之未幾論遼東事罰米三百石劉瑾禁各處有司不許奏災異冬十月劉瑾矯詔以翰林學士張昺為鎮江府同知修撰何瑭為開封府同知昺瑭皆抗直見瑾不為禮坐事謫之下陜西舉人郝序於獄序户部侍郎郝志義子志義卒序援例乞祭葬瑾謂洪武禮制無此例下錦衣衛獄謫戍瑾自擅政馬永成等八黨父俱封都督造墳葬祭所命祭文皆李東陽撰臺諌不敢言劉瑾矯旨改惜薪司外厰為辦事厰榮府舊倉地為內辦事厰時既立西厰以谷大用領之瑾又自領內厰比東西厰尤酷烈中人以微法往往無得全者市井遊食無業之人如磨工鬻水者皆逐之四出千餘人集城外東郊持白挺劫人聲言欲甘心瑾瑾懼乃復之瑾又令寡婦盡嫁及停喪未葬者盡焚棄之京師閧然瑾恐有變乃罪其首倡言者一人以安衆心皆立內厰以後事也劉瑾矯詔天下發遣盜賊連親屬十一月劉瑾創玄真觀於朝陽門外大學士李東陽為製碑文極稱頌四年春正月總督漕運副都御史邵寶致仕時公卿多出入瑾門寶一無所通瑾數以危言撼之不為動瑾惡平江伯平江伯漕帥也事與寶相關瑾怒禍且不測李東陽力解之乃得致仕去以山西提學副使王鴻儒為國子祭酒鴻儒在山西有聲劉大夏嘗對孝宗稱其大可用吏部從人望舉之尋以守正忤劉瑾回籍罷興化知府張嵿為民嵿先任刑部郎中時隆平侯張佑卒無嗣弟姪爭襲賂瑾瑾囑之不為徇正德三年出守興化瑾有所餽不報郡人戴大賓弱冠登第瑾欲奪其舊聘以弟女妻之以囑嵿亦拒不許瑾怒遂托隆平侯奪爵事誣罷歸家二月劉瑾矯詔行吏部不時考察兩京及在外方靣官勒原任大學士劉健謝遷為民先是詔舉懷才抱德之士以餘姚周禮徐子元許龍上虞徐文彪應詔劉瑾以四人皆遷鄉人而草詔由健欲因而害之矯旨下禮等鎮撫司鞫之劉宇阿瑾意劾有司坊舉失實鎮撫詞連健遷瑾持至內閣欲籍其家李東陽徐為勸解得少釋焦芳抗聲曰從輕處亦當除名既而旨下健遷除名禮等戍邉令餘姚人從此毋選京朝官三月以錢璣為户部尚書璣附瑾故不次用夏四月大學士王鏊致仕時瑾權傾中外雖意不在鏊然見鏊開誠與言初亦間聽及焦芳用事専事媕阿而瑾矯悖日甚毒流縉紳鏊欲遏之力不能居嘗戚然瑾曰王先生居高位何自苦乃爾耶鏊因求去瑾意愈拂衆虞禍且不測鏊曰吾義當去不去乃禍耳瑾使伺鏊無所得鏊疏三上許之賜璽書乘傳歸時方危鏊之求去咸以為異數云以王雲鳯為國子祭酒尚書張綵以人望起之始被命欲堅辭及有遺書言執政者誦太祖寰中士夫不為吾用者當殺身滅家語雲鳯父大司徒佐曰吾老矣汝置我何處死耶雲鳯泣就道至無所餽瑾怒欲重以禍不能得而罷時國學教廢雲鳯立條約示諸生約束甚嚴士子卒感服尋乞養病歸劉瑾矯詔以𢎞治中纂修大明會典壞祖宗舊制雜以新例悉毁之降吏部尚書梁儲為右侍郎庶子毛澄諭德傳圭等皆降職大學士王鏊致仕免究唯李東陽如故五月逮廣東兵備僉事吳廷舉下獄時鎮守恣橫廷舉劾太監潘忠二十罪併及劉瑾忠亦誣列廷舉逮獄鞫之無狀止以枉道歸家荷校吏部門前主事宿建輩謀救之尚書張綵閲奏稿心賞其能言於瑾凡十二日得釋謫戍邉衛踰月赦為民改翰林侍讀徐穆編修汪俊等為南京部屬瑾素惡諸翰林不行跪禮至是修孝宗實録成例進秩瑾謂文士不習世故摘所忌十餘人為南京員外郎主事等俾擴充政務始瑾以翰林慢已與張綵謀欲調之外綵不可至是瑾復持之綵為講解意已下而焦芳父子及段炅輩謂可乘此擠其素有讐隙者乃以名投瑾從臾成之大學士焦芳以老病致仕遣御史等官清理各邉屯田初劉瑾既止各邉年例銀又禁商人報納邉儲遂大匱乏因詢國初如何充足議者以為國初屯政修舉故軍食自足後為世家所占以此不給瑾遂慨然修舉屯田分遣胡汝礪周東楊武顔頥夀等往各邉丈量屯田以增出地畝數多及追完積逋者為能否則罪之各邉偽增屯田數百頃悉令出租人不聊生周東在寧夏尤苛刻加刑於軍官妻人心憤怨指揮何錦等遂與安化王置鐇謀起兵傳檄以誅瑾為名瑾禍自此始矣六月進吏部尚書劉宇少傅兼太子太傅文淵閣大學士入閣辦事以吏部左侍郎張綵為吏部尚書時吏戶兵尚書皆瑾黨八月榮王祐樞之國常德劉瑾惡王居京邸與張綵謀遣之劉瑾受都督神英賂加涇陽伯爵給誥劵劉瑾招引四方術士余明余倫余子仁等占候天文推測命數私置軍器明等妄稱瑾姪劉二漢當大貴瑾隂令內使藏小刀二於扇內出入禁闥閏九月奪平江伯陳熊爵正德三年熊總督漕運劉瑾橫索金錢不應瑾因中以法欲置之死李東陽力爭之瑾曰熊所犯罪重不宜姑息東陽曰豫誠姑息然非姑息陳熊乃姑息陳瑄耳瑄在太宗朝開濟寧河道通漕大有功勒銘鐵劵子孫免死豈可盡革傷天下武臣心瑾不悅竟坐多買田宅侵民利謫海南衛奪其誥劵劉瑾矯詔下刑部侍郎陶琰獄陜西遊擊徐謙訐奏御史李高而謙故劉瑾黨也又厚賂瑾欲中高以危法會上命琰往核其事琰據法直高謙以告瑾瑾矯詔下之獄禁錮兩月削籍冬十一月命給事中張繪御史房瀛等查盤兩直𨽻各省錢糧先是諸司官朝覲至京畏瑾虐熖恐罹禍各斂銀賂之每省至二萬兩往往貸於京師富豪復任之日取官庫貯倍償之名曰京債上下交征恬不為異時張綵聞而言之瑾不自安謀差官查盤蓋欲掩其迹也劉瑾奏訪金華知府萬福老疾蘇州知府鮑􅀈同知王巹贓貪江西左布政馬龍貪濫僉事阮賓輕浮謫降提問有差巡按山東胡節斂銀饋瑾瑾知之捕下獄死侍郎張鸞自福建還斂銀二萬送瑾瑾收之承運庫降黜鸞給事中歐陽雲御史貝儀少監李宣指揮趙良皆以賄瑾削籍時瑾酷法繩人內外貨賂不資吏部尚書張綵過瑾從容為瑾言瑾殊納之然終不能改也劉瑾擢都督僉事曹雄為左都督陜西自楊一清罷邉冦猖獗不可制總督尚書才寬好野戰自將由興武擊套部斬首數十級狃勝深入遇伏中流矢卒巡按御史劾曹雄臨陳退縮不救瑾挾私切責御史而更超擢雄十二月追奪大學士劉健謝遷尚書馬文升劉大夏韓文許進等六百七十五人誥勑為民充軍從都給事中李憲言也改吏部尚書梁儲於南京儲不附瑾故有是調五年春二月以兵部尚書曹元為吏部尚書兼文淵閣大學士入閣辦事正德中不由翰林入閣者三人楊一清以才望劉宇曹元皆附劉瑾得之劉瑾出太監張永於南京不果行瑾欲盡除軋已者一日伺間言於上調張永於南京旨未下即日逐永出就道榜諸禁門不許永入永覺之直趨至御前訴已無罪為瑾所害召瑾至語不合永奮拳欲毆之谷大用等勸解上令諸近臣置酒和釋夏四月劉瑾矯詔令南京刑部尚書吳洪致仕寧河王鄧愈後有兄弟爭田宅者其兄倚瑾為援洪直之故及安化王置鐇反起都御史楊一清命太監張永提督討之一清與永西行一日嘆息泣謂永曰藩宗亂易除國家內亂不可測奈何永曰何謂一清曰公豈一日忘情故無能為公畫䇿者遂促席手書瑾字永曰瑾日夜在上傍上一日不見瑾則不樂今其羽翼已成耳目廣矣且奈何一清曰公亦天子信幸臣今討賊不付他人付公上意可知公試班師入京詭言請上間語寧夏事上必就公問公於此時上置鐇偽檄并述渠亂政凶狡謀不軌海內愁怨天下亂將起上英武必悟且大怒誅瑾瑾誅柄用公公益矯瑾行事吕強張承業暨公千載三人耳永曰即不濟奈何一清曰他人言濟不濟未可知言出公必濟顧公言時須有端緒且委曲脫上不信公頓首請死願死上前即退瑾必見殺又涕哭頓首得請即行事無緩頃刻漏事機禍不旋踵永攘臂起曰我亦何惜餘生報主乎六月大學士劉宇致仕宇附瑾排斥正人知瑾將敗先乞身免秋八月劉瑾伏誅初置鐇尺移檄數瑾罪莫敢上聞有指揮徐鯤者傳檄示人瑾捕下獄論死因下赦寬恤以收人心未幾而置鐇就擒悔欲反之方侈然自為功矯旨加已祿米擢兄劉景祥為都督張永等與瑾爭權勢不相下至是望日甲午永至自寧夏獻俘上迎之東華門賜宴此夜瑾先退夜半永出疏懷中謂瑾激變寧夏心不自安隂謀不軌狀永黨張雄張鋭亦助之上曰罷矣且飲酒永曰離此一步臣不復見陛下也上曰瑾且何為永曰取天下上曰天下任彼取之永曰置陛下何地上悟允其奏當夜即命禁兵逮瑾永等勸上親至瑾第觀變時漏下三鼓瑾方熟寢禁兵排闥入瑾驚問曰上安在對曰在豹房瑾披衣起謂家人曰事可疑矣趨出戶被執就內獄明日降為奉御間住之鳯陽命廷臣議其罪瑾嘗招置術士余明等太監孫和造衣甲弓弩遺瑾瑾皆受藏之竊有不軌圖是時瑾兄都督景祥死將以八月甲午葬百官多會送瑾初嚴夜禁星出後衢道四寂有竊聽者中夜聞兵甲聲錚然里巷私語籍籍謂傾朝送葬瑾且因為亂永之獻俘也瑾使以乙未入永知即以甲午入以故得先發明日晏朝後外人微聞瑾得罪猶莫敢顯言者及旨猝中發邏卒飛騎交馳於道浹日乃定初上尚未有意誅瑾瑾聞鳯陽之命曰猶不失富太監也及籍其家得金二十四萬錠又五萬七千八百兩元寶五百萬錠又一百五十八萬三千六百兩寶石二斗金甲二金鈎三千玉帶四千一百六十二束獅蠻帶二束金湯盒五百蟒衣四百七十襲牙牌二匱穿宫牌五百金牌三衮袍八瓜金龍四玉琴一玉瑤印一盔甲三千冬月團扇飾貂皮扇中置刀二衣甲千餘弓弩五百上大怒曰瑾果反乃付獄吏部尚書張綵錦衣衛指揮楊玉石文義等六人皆送都察院獄於是六科十三道共劾瑾罪三十餘條上是之命法司錦衣衛執瑾午門廷訊之都給事中李憲亦劾瑾憲故出瑾門下瑾聞之笑曰李憲亦劾我耶鞫之日刑部尚書劉璟猶噤不敢聲瑾大言曰滿朝公卿皆出我門誰敢問我者皆稍稍却駙馬都尉蔡震曰我國戚也不出汝門得問汝使人批瑾頰曰公卿朝廷所用何由汝抑汝何藏甲也曰以衛上震曰何藏之私室瑾語塞既上獄上命毋覆奏凌遲之三日梟其首榜獄詞處決圖於天下諸被害人爭買其肉啖之有以一錢易一臠者瑾親屬十五人并二漢張文冕楊玉石文義等皆論斬張綵死獄中大學士劉宇曹元前大學士焦芳宇子編修劉仁芳子侍讀焦黃中戶部尚書劉璣兵部侍郎陳震並削籍為民黃中為檢討踰年即升侍郎性尤狂恣無耻時土官岑濬殁入家口內有殊色芳求瑾得之後臥病中蒸焉瑾誅言官交章暴其罪並禠職瑾流毒五年變易吏兵二部選法將官失律有加封伯都督者或徑自傳奉時綴批别本惟意而已又以事籍沒故大臣家收其妻孥日夜簡括天下庫藏添設巡捕巡鹽等官四出誅求諸邉屯田賦稅以肥私家海內騷然以有置鐇之變而卒及於禍五年中惟大理評事羅僑抗疏得脫中外聞而異之士大夫悉為曲學阿世瑾嘗有所借以驗士大夫應違一朝士某從其門下某請見某曰我公好近眉而冠君之冠高奈何曰業定矣聊姑入及見瑾瞪目視朝士驚更低冠入謝瑾乃悅祭酒王雲鳯先提學陜西榜笞生徒有同囚訊瑾聞而遷之雲鳯於是往見瑾瑾叱曰何物祭酒一嘴豬毛耶雲鳯惶恐謝既退請瑾臨視太學如唐魚朝恩故事復請較刻瑾近行法例永著為令給事中屈銓亦如雲鳯請刑部尚書劉璟數被詬懼因劾奏其屬三人瑾謂能督責意乃悅於是瑾以為無所不可為矣一日瑾涕泣語張綵曰始谷張諸人患外臣籍我輩推余當之余以身徇天下所摧折衣冠多矣今天下之怨皆集於余諸人晏然享之豫未知所稅駕也綵因辟左右曰今上未子勢必立宗室子若長且賢公受禍矣不如援幼弱者公長保富貴無憂也瑾曰善居數日忽變曰無以宗室為吾自立耳綵告不可瑾怒以茗盤擲綵綵不敢言瑾敗坐綵同叛綵呼曰皇天后土太祖太宗可鑒其心初瑾被縳有旨降鳯陽李東陽語諸大璫曰脫復用當奈何張永曰有我在無慮已而瑾上白帖言就縳時赤身無一衣乞與一二敝衣蓋體上見帖憐之命與故衣百件永始懼謀之東陽令科道劾瑾劾中多及文武大臣永持疏至左順門付諸言官曰瑾用事時我輩莫敢言况兩班官耶今罪止瑾一人可易疏入獄詞具乃止連文臣張綵武臣楊玉等六人綵疏稱寃盡發東陽阿瑾事卒斃獄銼尸市中詔焚諸與劉瑾往返書札時籍瑾書得秦府永夀王為瑾慶夀詩序過於卑諂上怒甚欲降旨切責李東陽上疏曰自古治亂賊者正名定罪誅止其身昔光武平王郎得吏民交通文書數千章皆燒之曰令反側子自安當劉瑾専權亂政之時假托朝廷威福以劫天下生殺豫奪惟其所欲中外臣工誰不屈意待之况王府懿親自非同惡助叛法不可赦其細故小過亦須曲賜包容若降旨切責則凡有書信餽送者傳聞驚駭各不自安臣願聖明廣大涵容將一應文書涉叛逆事情者悉焚之以滅其迹上從之封張永兄張富為泰安伯弟張容為安定伯魏彬弟魏英為鎮安伯馬永成弟馬山為平涼伯谷大用弟谷大玘為永清伯封義子朱德為永夀伯給誥劵世襲李東陽奏旬月之間二難交作悉底平定皆永等之功故加恩典命太監魏彬掌司禮監事四川巡撫都御史林俊上疏請上還內宫擇宗室之賢者養於别宫收召老臣劉健謝遷林瀚王鏊韓文等以修舊政又言瑾雖死而權柄猶在宦豎安知後無復有如瑾者詞旨剴切大忤左右不報御史張芹劾大學士李東陽劉瑾専權亂政之時阿諛承順不能力爭及陛下任用得人潛消內變又攘以為功冒膺恩蔭乞賜罷斥不聽時瑾雖誅而政權仍在內魏彬馬永成等擅執朝政兩河南北楚蜀盜遂起谷應泰曰嗟乎宦寺之禍自古烈矣周禮重奄寺之司秦風著寺人之制蓋以其人進身刑餘厠貟灑掃非有忠孝砥礪之素而其入也優遊房闥窺伺色笑其出也口銜天憲手秉王章固宜其威福剬恣發不旋踵而傾輈覆軫動成炯鑒者也劉瑾以青宫舊侍狐蠱君側當其始也豈遂有莽懿非常之志溫卓不軌之謀乎假狗馬音樂以兾君王之憐惜取富貴茍容足矣而乃毒蛇不斷壯夫螫手韓文一發不中而顧命諸臣斥逐無遺六給事十三御史之章再入而諌官臺臣誅鋤略盡於是北門之獄驟興搢紳之禍尤烈內閣樹其私人部寺張其羽翼威焰加於郡國更置及於岩疆瑾遂駸駸焉不能安於人臣之位矣夫水自湍也風又激之湯已沸也火又烮之廷臣自李東陽而下無不靦顔要地甘心頥指間或微言解鬬自托於太丘之弔張讓然而固寵依違詎殊於商君之因景監乎清流之望既歸官府之權自一小人得志有自來矣焦芳劉宇寧足責哉然而李夢陽之閣部密謀無異於楊一清之密説張永也王嶽范亨徐智之從中奏上又無異於張永之叩頭哭泣也李計中泄於政府而楊謀獲成於閫外嶽亨敗事於濡遲而張永決䇿於立談言於置鐇倡亂之後者信而有徴言於狗馬娛心之日者迷而難悟卒之國家受恭顯之禍政府有匡趙之羞張永收桑榆之功諸賢深徙薪之痛易曰開國承家小人勿用豈不信哉明史紀事本末卷四十三
