body:
  text: 明史紀事本末卷一浙江提學僉事谷應泰編太祖起兵元順帝至正十二年閏三月甲戌朔明太祖起兵濠梁太祖之先故沛人徙江東句容為朱家巷宋季大父再徙淮家泗州父又徙鍾離太平鄉母陳生四子太祖其季也太祖生於元天厯戊辰之九月丁丑其夕赤光燭天里中人競呼朱家火及至無有三日洗兒父出汲有紅羅浮至遂取衣之故所居名紅羅障少時嘗苦病父欲度為僧嵗甲申泗大疫父母兄及幼弟俱死貧不能殮藁葬之仲與太祖舁至山麓綆絶仲還取綆留太祖守之忽雷雨大作太祖避村寺中比曉往視土墳起成髙隴地故屬鄉人劉繼祖繼祖異之歸焉尋仲又死太祖年十七九月入皇覺寺為僧逾月僧乏食太祖西至合淝歴光固汝潁諸州道病輙見兩紫衣人與俱病差遂不見嘗夜䧟麻湖中遇羣潁呼迎聖駕叱之絶跡﨑嶇三載仍還皇覺寺時汝潁兵起騷動濠州定逺人郭子興據濠州元將徹里布哈憚不敢進日掠良民邀賞太祖詣伽藍卜問避亂不吉即守故又不吉因祝曰豈欲予倡義耶果大吉帝意遂決以閏三月朔日入濠州抵門門者疑為諜執見子興子興竒其狀貎與語大悦之取為親兵凡有攻伐命之往輙勝子興故撫宿州馬公女為己女遂妻焉即髙后也軍中咸呼為朱公子九月元丞相托克托既破徐州芝麻李遁去趙均用彭早住帥餘黨奔濠托克托命賈魯追圍之太祖與子興竭力捍守時子興屈己下彭趙遂為所制彭趙據濠稱王一日執子興於獄太祖曰吾受郭氏深恩可不赴乎遂入子興家明日彭趙聞釋之十三年春元將賈魯死圍解濠軍士亦多折傷太祖雖在甥館每有大志乃歸鄉里募兵得七百人濠人徐逹湯和等皆往歸焉十四年秋七月狥定逺下滁陽時彭趙御下無道太祖乃以七百人屬他將而獨與徐達湯和呉良呉禎花雲陳徳顧時費聚耿再成耿炳文唐勝宗陸仲亨華雲龍鄭遇春郭興郭英胡海張龍陳桓謝成李新材張赫周銓周徳興等二十四人南畧定逺定逺張家堡有民兵號驢牌寨者孤軍乏食欲來降未決太祖曰此機不可失也乃選騎士費聚等從行至定逺界其營中遣二將出大呼曰來者何為聚恐請益人太祖曰多人無益滋之疑耳直前下馬渡水而往其帥出見太祖曰郭元帥與足下有舊聞足下軍乏食他敵欲来攻特遣吾相服能相從即與俱往否則移兵避之帥許納請留物示信太祖解佩囊與之彼以牛脯為獻請諸軍促裝且申宻約太祖還留聚俟之越三日聚還報曰事不諧矣彼且欲他徃太祖即率兵三百人抵營誘執其帥於是營兵焚舊壘悉降得壯士三千人又招降秦把頭得八百餘人定逺繆大亨以義兵二萬屯横澗山太祖命花雲夜襲破之亨舉衆降軍聲大振定逺人馮國用與弟國勝率衆歸附太祖竒之曰爾被服若是其儒生耶顧定天下計將安出國用對曰金陵龍蟠虎踞帝王之都願先㧞金陵定鼎然後命將四出救生靈於水火倡仁義於逺邇勿貪子女玉帛天下不難定也太祖大悦俾兄弟皆居帷幄預機宻焉國勝一名勝又名宗異定逺人李善長來謁留幕下掌書記畫餽餉甚見親信秋七月太祖將兵進攻滁陽花雲為先鋒單騎前行遇賊數千人雲提劔躍馬横衝其陣而過敵大驚曰此黑將軍勇甚不可與爭鋒既戰遂克滁陽因駐師焉朱文正李文忠來歸文正太祖孟兄南昌王子先同其母避亂與太祖相失李文忠太祖姊曹國長公主子公主率其父攜文忠走亂軍中幾不能存至是聞太祖駐兵滁陽皆來歸太祖喜甚文忠年十二牽上衣而戲太祖曰外甥見舅如見母也與沭英皆賜姓朱英定逺人父母俱亡太祖見而憐之令髙后育之為子何世隆來降并取鐵佛崗攻三矢河口收全椒大栁諸塞未踰月彭早住趙均用挾子興往泗州遣人邀太祖守盱眙辭勿往未幾二人爭權部曲乗而鬬多創死彭亦中流矢死獨趙均用存并彭故部曲狼戾益甚銜子興必欲殺之太祖憂之使人説曰公昔困於彭城南趨濠使郭公閉壁不相納死矣得濠而踞其上更欲害之背徳不祥且郭公易與耳其别部在滁者兵勢重可慮也均用悟為少寛太祖又賂其左右子興乃得帥所部歸滁稱滁陽王時太祖部兵數萬人悉歸之奉其號令居再閲月子興惑讒言悉奪太祖兵又欲収李善長置麾下善長涕泣自訢不肯行自是征討之權太祖皆不得與且日疎逺而事之愈恭有譛太祖戰不肯力者子興信之即令其人與太祖俱出戰其人出未十步即被矢反走太祖直前奮擊衆皆披靡徐還了無所傷子興頗内愧又嘗與三百人出城顧聞鵓鴿聲飛矢墮空中心異之遽還俄而敵兵驟至一無所獲時諸將各有所獻太祖所至禁剽掠有得即分部下無所獻子興甚不悦馬皇后悉所有遺子興妻張氏張喜由是疑釁漸釋冬十月元丞相托克托克髙郵分兵圍六合六合遣使求救於滁子興故與其帥有隙怒不發兵太祖曰六合破滁不獨存唇齒也可以小憾而棄大事乎子興悟問諸將誰可往者時元兵號百萬諸將畏之莫敢往且以禱神勿吉為辭太祖曰事之可否當斷於心何禱也於是帥師東與耿再成守瓦梁壘元兵攻之急每日暮壘垂䧟詰旦復完壘與戰尋以計紿之乃歛兵入舎備糗糧遣婦女倚門㦸手大罵元兵錯愕不敢逼遂列陣而出徐引去還滁州既而元兵復大攻滁太祖設伏澗側令再成佯走誘之渡澗伏發城中鼓譟而出元兵敗走滁得完太祖威名日著子興二子隂置毒酒中欲害之謀泄及期太祖即與俱往中途遽躍馬起仰天若有所見因罵二子曰吾何負爾適空中神人謂爾欲以酒毒我二子駭汗浹背自此不敢萌害意虹縣胡大海來歸大海長身鐵面智力過人太祖一見語合用為前鋒十五年春正月滁師乏糧諸將謀所向太祖曰困守孤城誠非計今惟和陽可圖然其城小而堅可以計取難以力勝向攻民寨時得兵三千號廬州路義兵今精選三千勇敢士椎結左袵衣青衣佯為彼兵以四槖駝載賞物而馳聲言廬州兵送使者入和陽賞賚將士和陽必納之因以絳衣兵萬人繼其後約相距十餘里候青衣兵薄城舉火為應絳衣兵即鼓行而前破之必矣子興從其計使張天祐將青衣兵趙繼祖為使者前行耿再成將絳衣兵繼後天祐至陡陽闗和陽父老以牛酒出迎㑹日午天祐兵從他道就食誤約再成過期不見舉火意天祐必已進據率衆直抵城下元平章額森特穆爾急閉門以飛橋縋兵出戰再成不利中矢走元兵追至千秋壩日暮収兵還天祐等始至適與元兵遇急擊敗之追至小西門湯和奪其橋而登將士從之遂據和陽額森特穆爾夜遁再成兵既敗歸謂天祐等已䧟沒俄報元兵至滁州遣使招降子興益恐召太祖與謀時兵皆出城中守備單弱太祖命合滁三門兵於南門填塞街市呼使者入叱令膝行見子興子興諭之多失辭衆欲殺之太祖曰殺之彼將謂我怯故滅其口是速之來也不如恐以大言縱使去彼必憚不敢進子興從之明日元兵果解去子興急屬太祖率兵徃收敗卒仍規取和陽太祖率鎮撫徐達恭謀李善長及驍勇數十人先進始知天祐已破城據之乃入撫定城中子興屬太祖總和陽兵諸將破和陽暴横多殺掠城中夫婦不相保太祖惻然召諸將謂曰諸軍自滁來多掠人妻女軍中無紀律何以安衆凡所得婦女悉還之於是皆相攜而去人民大悦太祖既總和陽兵諸將多子興故部曲未盡心服惟湯和聽命惟謹李善長委曲調䕶之太祖與諸將分闢和陽城諸將甃工未就太祖作色置坐南向出子興檄呼諸將曰總兵主帥命也非我専擅今甃城皆不如約事何由濟自今違者軍法從事諸將恐唯唯由是皆奉命時元太子託卜堅樞密副使班珠爾民兵元帥陳額森分屯髙望新塘青山鷄籠山等處道梗不通太祖率諸將擊走之元兵乘太祖出復攻和陽李善長督兵擊却之殺獲甚衆元兵皆走渡江濠州舊帥孫徳崖乏糧率所部就食和州子興故與徳崖隙聞之怒自滁來和徳崖聞子興至即欲他往其軍先發徳崖後太祖送其軍出城行三十里忽城中走報滁軍與徳崖軍鬬徳崖為子興所執太祖大驚亟呼耿炳文吳楨䇿騎欲還徳崖軍先發在道者忿恨擁太祖行數里遇徳崖弟欲加害有張姓者力止之子興聞太祖被留如失左右手急遣徐達徃代張姓者復諭其衆歸太祖於是子興亦釋徳崖去既而達亦脱歸三月子興率太祖併統其軍時劉福通等立韓林兒為皇帝號小明王改元龍鳯遣人至和陽招諸將檄興子為元帥張天祐右副元帥太祖左副元帥太祖曰大丈夫寧能受制於人耶不受虹縣人鄧愈來歸愈年十六從父兄起兵父兄戰沒愈代領其衆每戰必挺身破敵軍中服其勇太祖命充管軍總管官懐逺人常遇春剛毅多智勇膂力絶人年二十三為羣雄劉聚所得遇春察其多抄掠無逺圖棄之來歸未至假寐田間夢神人被金甲擁盾呼之曰起起主君來適太祖騎從至即乞歸附請為先鋒太祖曰爾饑故來歸耳且有故主在吾安得奪之遇春頓首泣曰劉聚盗耳無能為也儻得效力於智者雖死猶生太祖曰能相從渡江乎取太平後臣我未晩也太祖駐和陽乆謀渡江無舟楫時廖永安永忠俞廷玉與其子通海通源通淵趙伯仲桑世傑張徳勝華髙等各率衆泊巢湖連結水砦以捍冦㑹妖黨左君弼據廬州永安等為所扼乃遣使間道納欵太祖大喜曰此天意也機不可失即以夏五月親率兵至巢湖永安等迎太祖登舟出湖口至洞城閘已脱險然未入江曼濟哈雅集樓船塞馬腸河口以阻諸兵屯黄墩㑹巢湖將趙普勝蓄異志永安等宻露其機太祖遂聲言歸和陽取舟同攻曼濟哈雅實欲以兵勢挾之既歸集商人舟載精鋭猛士復至黄墩督兵攻曼濟哈雅敵舟髙大進退不利永安等小舟往來如飛奮擊大敗之時湖口淺涸㑹大雨連旬水漲遂縱舟至潯陽橋衆恐舟大不能渡比至纔餘分寸永安等遂得入大江從歸和陽遂定渡江之計六月朔太祖帥諸將渡江永安請所向太祖曰采石大鎮備必固牛渚磯前臨大江難為備禦攻之必克廼乘風舉帆舳艫齊發頃刻達牛渚太祖先抵采石磯時元兵陣於磯上舟距岸三丈許未能卒登常遇春飛舸至太祖麾之應聲挺戈躍而上守者披靡諸軍從之遂㧞采石乘勝徑攻太平元平章旺扎勒布哈萬户萬鈞達嚕噶齊普里罕忽里等棄城遁丙辰克太平路初太祖之發采石也先令李善長為戒飭軍士榜及入城揭之通衢一卒違令立斬之城中肅然太平路總管靳義赴水死太祖曰義士也具棺葬之耆儒李習陶安等率父老出迎安見太祖謂李習曰龍姿鳯質非常人也我軰今有主矣太祖召安語時事安因獻言曰方今四方鼎沸豪傑並爭攻城屠邑互相雄長然其志在子女玉帛非有撥亂安民救天下之心明公率衆渡江神武不殺以此順天應人而行弔伐天下不足平也太祖曰吾欲取金陵如何安對曰金陵帝王之都龍蟠虎踞限以長江之險若據其形勝出兵以臨四方則何向不克此天所以資明公也太祖大悦禮安甚厚由是凡機宻輒與議焉改太平路為太平府以李習知府事李善長為帥府都事汪廣洋為帥府令史陶安恭幕府事文移用宋龍鳯年號旗幟戰衣皆紅色葢以火徳王故也時太平四面皆元兵曼濟哈雅阿勒呼木等以巨舟截采石閉姑孰口而義兵元帥陳額森與其將康茂才水陸分道冦城下太祖親督兵禦之命徐逹鄧愈以竒兵出其後設伏於襄城橋額森率衆來攻時有黄雲罩於城臯額森驚敗為伏兵所擒太祖釋而用之八月分命徐逹等取溧水溧陽句容蕪湖皆下之初陳額森被執太祖釋不殺額森詐曰生我何為太祖曰天下大亂豪傑並起勝則人附敗則附人爾既以豪傑自負豈不知生爾之故額森曰然則欲吾軍降乎此易爾乃為書招其軍明日皆降曼濟哈雅阿勒呼木等見額森敗還駐峪溪口諸軍進克溧水將攻集慶路額森之為書也意其衆未必從陽為招詞隂實激之不意其衆遽降自悔失計及聞欲攻集慶私謂部曲曰汝等攻集慶毋力戰俟我得脱還當與元兵合太祖聞其謀召語之曰人各有心從元從吾不相强也縱之還諸軍克溧陽額森歸收餘衆屯於板橋隂與元福夀合因為書報曰集慶城右環大江左枕崇崗三面據水以山為郭以江為池地勢險阻不利步戰昔王渾王濬造戰船謀之累年而蘓峻王敦皆非陸戰以取勝隋取江東賀若弼自揚州韓擒虎自廬州楊素自安陸三道戰艦同時並進今環城三面阻水元帥與萬軍聨絡其中建寨三十餘里攻城則慮其斷後莫若南據溧陽東𢷬鎮江據險阻絶糧道示以持乆可不攻而下也太祖知其詐以書報之曰歴代之克江南者皆以長江天塹限隔南北故須㑹集舟師方克成功今吾渡江據其上游彼之咽喉我已扼之捨舟而進足以克㨗自與晉隋形同勢異足下奈何舎全勝之䇿而為此迂迴之計邪額森得書詐不行諸軍進攻集慶額森遂與福壽合拒戰於秦淮水上諸軍失利張天祐與郭元帥皆戰死元帥子興之子也額森來追襲經葛仙郷鄉民兵百戸盧徳茂謀殺之遣壯士五十人衣青出迎額森不虞其圖已與十餘騎先行青衣兵自後攢槊刺殺之額森既死其子兆先復集兵屯方山曼濟哈雅擁舟師結寨采石圖犄角窺太平十一月壬子釋元萬戸納噶楚北歸納噶楚穆呼哩裔孫也㧞太平獲之待之至厚納噶楚居鬱鬱不樂至是太祖召語之曰為人臣者各為其主况爾有父母妻子乎遂縱之歸十六年春元兵屯采石將士家屬留和州道梗常遇春攻之遇春以竒兵分其勢而以正兵與之合戰戰則出竒兵𢷬之縱火焚其連艦大破之曼濟哈雅僅以身免自是扼江之勢遂衰三月朔太祖率諸將取集慶路水陸並進攻破陳兆先營釋兆先而用之擇其降兵驍勇五百人置麾下五百人者多疑懼不自安太祖覺其意是夕令入宿衛環上而寢悉屏舊人於外獨留馮國用一人侍臥榻傍太祖解甲安寢達旦疑懼者始安是月十日進攻集慶路國用率五百人先登䧟陣敗元兵於蔣山直抵城下諸軍㧞柵競進元南臺御史大夫福夀督兵力戰死之庚寅克集慶路曼濟哈雅遁歸張士誠康茂才等帥衆來降太祖入城召官吏父老諭之曰元失其政所在紛擾生民塗炭吾率衆至此為民除害耳汝等各守舊業無懐疑懼賢人君子有能相從立功者吾禮用之舊政有不便者吾除之於是城中軍民皆喜悦更相慶慰獲民兵五十餘萬改集慶路為應天府得儒士夏煜孫炎楊憲等十餘人皆錄用之置天興建康翼元帥府以廖永安為統軍元帥太祖嘉福夀之忠為棺衾以禮葬之谷應㤗曰明太祖之起兵濠梁也鼓其朝鋭所向披靡六年之間北取滁和南收姑孰金陵一下天物克基雖曰神運葢亦有人事焉方其火光燭空紅羅浮水雷雨成塋紫衣視疾以至伽藍立珧之竒黄雲覆城之瑞論者嘖嘖莫不謂生而神靈天之所授也然予以厚徳隆峻實則命世之器非夫羣雄草竊所能闇奸而覬覦者觀其救民塗炭除暴去苛縱還婦女不貪玉帛納陶安之説進馮國用之謀是其仁也褒嘉靳義禮葬福夀赴子興之難縱額森之去是其義也克太平而延見名士入金陵而拊慰父老是其禮也還軍降定逺移師救六合借天語以拒酖毒環宿衛以定反側是其智也擊哈雅於黄墩麾遇春於采石坐叱元使者不奉韓魯爾是其勇也嗟乎濠城之起始於揭竿乃能規模𢎞敞有兹不世出之畧是則五徳既備百神自呵而術數之家沾沾以休徵福應為王者受命之符則但知其得天而不考其順人良足哂也雖然尤有異者風雲之聚杖䇿來歸心膂爪牙篤生江介徐達湯和起於同里朱文正李文忠興自戚屬李善長馮國用近出定逺鄧愈胡大海即在虹縣常遇春懐逺之雄廖永安巢湖之傑一時功臣人如碁布地皆錯壤豈髙祖從龍多由豐沛蕭王佐命半屬南陽天生真人固若類聚而扶掖之者耶然而帷幄善謀汗馬著烈君臣之間相需魚水豈盡地脉使然哉人材良足多也明史紀事夲末卷一
