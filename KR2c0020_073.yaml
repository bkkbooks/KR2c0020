body:
  text: 明史紀事本末卷七十三浙江提學僉事谷應泰編修明厯法太祖吳元年冬十一月太史院使劉基率其屬高翼上戊申大統厯洪武元年冬十月徴元太史院使張佑張沂司農卿兼太史院使成𨽻太史同知郭讓朱茂司天少監王可大石澤李義太監趙恂太史院監候劉孝忠靈臺郎張容回回司天監黑的兒阿都刺司天監丞迭里月實一十四人修定厯數二年夏四月徴元回回司天臺官鄭阿里等十一人至京議厯法占天象三年六月改司天監為欽天監設欽天監官其習業者分四科曰天文曰漏刻曰大統厯曰回回厯自五官正而下至天文生各專科肄焉五官正理厯法造厯歲造大統厯御覽月令厯六壬遁甲厯御覽天象七政躔度厯凡厯注上御厯三十事民厯三十二事壬遁厯六十七事靈臺郎辨日月星辰之躔次分野以占候保章正專志天文之變辨吉凶之占挈壺正知漏孔壺為漏浮箭為刻以考中星昏明之度而統於監正丞十五年命大學士吳伯宗等譯回回厯經緯度天文諸書十七年冬閏十月欽天監博士元統上言臣聞一代之興必有一代之厯隨時修改以合天道今厯雖以大統為名而積分猶踵授時之數非所以重始敬正也授時法以至元辛巳為厯元至洪武甲子積一百四年以厯法推之得三億七千六百一十九萬九千七百七十五分經云大約七十年而差一度每嵗差一分五十秒辛巳至今年逺數盈漸差天度擬合修改請以洪武甲子歲冬至為厯元而七政之行有遲疾順逆伏見不齊其理深奧實難推演聞磨勘司令王道亨有司郭伯玉者精明九數之學願徴令推算以宣昭一代之制書奏報可擢統為監正二十年冬十一月選疇人年壯解書者赴京習天文推步之術二十六年秋七月欽天監副李德芳言故元至元辛巳為厯元上推往古每百年長一日下驗將來每百年消一日永久不可易也今監正元統改作洪武甲子厯元不用消長之法考得春秋晉獻公十五年戊寅歲距至元辛巳二千一百六十三年以辛巳為厯元推得天正冬至在甲寅日夜子初三刻與當時實測數相合洪武甲子元正上距獻公戊寅歲二千二百六十一年推得天正冬至在己未日午正三刻比辛巳為元差四日六時五刻當用至元辛巳為元及消長之法方合天道疏奏元統復言臣所推甲子厯元實於舊法無爽上曰二說皆難憑獨驗七政交㑹行度無差者為是於是欽天監以洪武甲子為厯元而造厯依授時法推算如初英宗正統十四年造己巳大統厯冬夏二至晝夜六十一刻行之而踈尋廢不行學士楊廉言漢興四百年更三造厯唐三百年更七造厯宋三百餘年至十八造厯本朝自洪武至今百四十年未更造而交食一一驗不爽則知許平仲郭守敬所造厯理數極精古今厯無過之者乃天生桀出之智豫國家厯數無疆之用也憲宗成化十七年秋八月真定教諭俞正已言厯象授時乃敬天勤民之急務後世厯法失差由不得古人隨時損益之法也我朝盡革前代弊政獨於厯法可議臣竊以經傳所載日月行天下之常度本厯元以步算又以陰陽虧盈之理求之以驗今厯詳定成化十四年戊戌十一月初一日己丒子正初刻合朔冬至日月與天同㑹於斗宿七度至三十三年丁巳十月初一日戊辰酉正初刻合朔冬至日月與天復同㑹於斗宿七度所謂氣朔分齊是為一章者也今將一章十有九年七閏之數冬至月朔閏月節氣年日月時逐月開坐編成一冊上進請勑該部精加考訂仍行欽天監從宜造厯頒布天下疏下部尚書周洪謨掌欽天監事童軒與正已參考講論竟日不能决洪謨等因奏正已止據邵子皇極經世書及歷代天文志推算氣朔又祖述前代術家評論歲差之意言古今厯法俱各有差曽不知與天合雖差而可今正已膠泥所聞輕率妄議請下法司治罪詔錦衣衛執治之孝宗𢎞治十一年訪世業疇人并諸能通厯象遁甲卜筮者武宗正德十三年夏五月己亥朔日食起復弗合日官周濂請驗交食以更厯元十五年冬十月禮部主事鄭善夫奏曰今歲及去年三次月食臣皆同欽天監官登臺觀驗初虧復圓時刻分秒多不合占步蓋天道幽𤣥其數精微以人合天誠亦未易嵗差之法晉虞喜定以五十年差一度久而驗之弗合也何承天以百年劉焯以七十五年僧一行以八十三年久而驗之又弗合也許衡郭守敬定以六十六年有餘似已密矣今據法推演仍又不合天道豈易言哉且如定歲差之法積四期餘一日以一日分加於四期故二至之時只爭絲忽此所宜定也又如定日之法一日百刻而變為九百四十分者以氣朔有不盡之數難分也凡月三十日二氣盈四百一十一分二十五秒一朔虛四百四十一分積虛盈之數以制閏故定朔必視四百四十一分前後為朓朒只在一分之間此又所宜定也如日月交食惟日食為最難測月食分數惟以距交逺近别無四時加減蓋月小暗虛大月入暗虛而食故八方所見皆同若日為月體所掩而食則日大而月小日上而月下日逺而月近日行有四時之異月行有九道之異故旁觀者逺近自不同矣如北方食既南方才半虧南方食既北方才半虧故食之時刻分秒必須據地定表因時求合而後准也如正德九年八月朔日食厯官報食八分六十七秒而閩廣之地遂至食既其時刻分秒安得而同今按交食以更厯元時分刻刻分分分分秒極精極細及至於半秒難分之處亦須酌量以足者也若皆半秒積以歲月則躔離朓朒皆不合矣漢宋以來皆設算學與儒藝同科稱四門博士九章之法大明故定差法更厯元每得其人我朝算法既廢而占天之書國法所禁官生之徒明理實少必須明理然後數精方今海內儒術之中固有天資超邁究心天人之學者使得盡觀祕書加以歲月必能上按往古下推未來庶幾厯元可更也不報世宗嘉靖三年光祿少卿管監事華湘言天子奉順陰陽治厯明時蓋時以作事事以厚生而世從治也時苟不明將每朔弦晦望失其節分至啓閉乖其期無以該洽生靈而世亂矣夫厯數之典代有作者曷嘗不廣集衆思人無遺智法無遺巧期於永久不變也哉然不數歲而輒差厯所以差由天周有餘而日周不足也日之差驗於中星堯冬至昏昻中而日在虛七度躔𤣥枵之子今冬至昏室中日在箕三度躔析木之寅計去堯三千餘年而差者五十度矣再以赤黃道考之至元辛巳改厯冬至赤道嵗差一度五十秒今退天三度五十二分五十秒矣黃道嵗差九十二分九十八秒今退天三度二十五分七十四秒矣是以正德戊寅日食庚辰月食時刻分秒起復方位類與推算忤恭惟皇上入繼大統之年適與元革命改憲之年合則調元正厯固有待於今日也臣伏揆古今善治厯者三家漢太初以鍾律唐太衍以蓍策元授時以晷景而晷景為近其所因者本也欲正厯而不登臺測景竊以為皆空言臆見非事實已伏望許臣暫住朝參督同中官正周濂及掄選疇人子弟諳曉本業者及冬至前詣觀象臺晝夜推測日記月書至來年冬至以驗二十四氣分至合朔日躔月離黃赤二道昏旦中星七政紫氣月孛羅㬋計都之度視元辛巳所測差次録聞昔班固作漢志言治厯有不可不擇者三家專門之裔明經之儒精算之士臣三者無一蚤夜皇皇罔知所措乞勑禮部延訪有能知厯理如揚雄精厯理如邵雍智巧天授如僧一行郭守敬者徴赴京師令詳定歲差成一代之制不報神宗萬厯二十三年秋七月鄭世子載堉疏請改厯略曰高皇帝格命之時元厯未久氣朔未差故仍舊貫不必改作但討論潤色而已今則積年既久氣朔漸差似應修治後漢志所謂三百年斗厯改憲者宜在此時仰惟列聖御極以來未嘗以厯為年號至我皇上始以萬厯為元而九年辛巳嵗距至元辛巳正三百年適當斗厯改憲之期又協乾元用九之義而厯元應在是矣繼述之盛舉寧不可待於今日乎前代人君或有新厯考成則改年號以厯為名以紀之以為福壽之徴然此不過後天而奉天時者也聖上預以萬厯為元此乃先天而天弗違固宜有厯以應之為聖壽萬萬歲之嘉徴乃俟之久而未見焉此愚臣日夜之所惓惓也於是採衆說之所長輯為一書名曰律厯融通其學大㫖出於許衡而與衡厯不同後漢志曰陰陽和則景至律氣應則灰除是故天子常以日冬夏至御前殿合八能之士陳八音聽樂均度晷景候鍾律權土灰放陰陽效則和否則占晉志曰日冬至音比林鍾浸以濁日夏至音比黃鍾侵以清十二律應二十四氣之變其為音也一律而生五音十二律而為六十音因而六之六六三十六故三百六十音以當一歲之日故律厯之數天地之道也夫黃鍾乃律厯本原而舊厯罕言之新法則以步律吕爻象為首此與舊厯不同一也堯時冬至日躔所在宿次劉宋何承天以歲差及中星考之應在須女十度左右唐一行大衍厯議曰劉炫推堯時日在虛危間則夏至火已過中虞􅒠推堯時日在斗牛間則冬至昴尚未中蓋堯時日在女虛間則春分昏張一度中秋分虛九度中冬至胃二度中昴距星直午正之東十二度夏至尾十一度中心後星直午正之西十二度四序進退不逾午正間軌漏使然也元人厯議亦云堯時冬至日在女虛之交而授時厯考之乃在牛宿二度是與虞􅒠同大統厯考之乃在危宿一度是與劉炫同相差二十六度皆不與堯典合新法上考堯元年甲辰歲夏至午中日在柳宿十二度左右冬至午中日在女宿十度左右心昴昏中各去午正不逾半次與承天一行二家之說合而與舊厯不同二也春秋左傳昭公二十年己丒日南至授時厯推之得戊子先左傳一日大統厯推之得壬辰後左傳三日新法推之與左傳合此與舊厯不同三也授時厯以至元十八年為元大統厯以洪武十七年為元新法則以萬厯九年為元其餘各條不同者多詳見厯議新法比諸授時庶幾青生於藍而青於藍者章下禮部覆言厯名沿襲已久未敢輕議至於歲差之法當為考正所以求之者大約有三曰考月令之中星移次應節曰測二至之日景長短應候曰驗交食之分秒起復應時考以衡管測以臬表驗以刻漏斯亦佹得之矣夫天體至廣厯家以周天三百六十五度四分度之一而紀日月星辰之行次又析一度為百分一分為百秒可謂密矣然在天一度應地二千九百三十二里其在分秒又可推也譬之輪轂外廣而中漸以狹至於輻輳之處間不容髮矣夫渾儀之體徑僅數尺外布三百六十五度四分度之一每度不及指許安所置分秒哉至於臬表之樹不過數尺刻漏之籌不越數寸以天之高且廣也而以徑尺寸之物求之欲其纎微不爽不亦難乎故方其差在分秒之間無可驗者至踰一度乃可以管窺耳此所以窮古今之智巧不能盡其變與今之談厯者或得其算而無測驗之具即有具而置非其地高下逈絶則亦無准宜非墨守者之所能自信也即如世子言以大統授時二厯相較考古則氣差三日推今則時差九刻夫時差九刻在亥子之間則移一日在晦朔之交則移一月此可驗之於近也設移而前則生明在二日之昏設移而後則生明在四日之夕矣弦望亦宜各差一日今似未至此也此以厯家雖有成法猶以測驗為准為今之計直令星厯之官再加詳推以求歲差之故亟為更正嘗聞前禮官鄭繼之有言欲定歲差宜定歲法於二至餘分絲忽之間定日法於氣朔盈虛一畫之際定日月交食於半秒難分之所斯其言似中厯家肯綮要在得精思善算而又知厯理者以職其事誠博求之不可謂世無其人而其本又在我皇上秉欽若之誠以建中和之極光調玉燭默運璇璣正厯數以永大統之傳是在今日誠千載一時也載堉議遂格不行二十四年河南按察司僉事邢雲路奏窺天之器無踰觀象測景候時籌策四事乃今之日至大統推在申正二刻臣測在未正一刻是大統實後天九刻餘矣不寧惟是今年立春夏至立冬皆適值子午之交臣測立春乙亥而大統推丙子臣測夏至壬辰而大統推癸巳臣測立冬己酉而大統推庚戌夫立春與冬乃王者行陽德陰德之令而夏至則其祀方澤之期也今皆相隔一日則理人事神之謂何是豈為細故且厯法疏密驗在交食自昔推之矣乃今年閏八月朔日有食之大統推初虧己正二刻食幾既而臣候初虧已正一刻食止七分餘大統實後天幾二刻而計閏應及轉應若交應則各宜如法增損之矣蓋日食八分以下陰厯交前初虧西北固厯家所共知也今閏八月朔日食實在陰厯交前初虧西北其食七分餘明甚則安得謂之初虧正西食甚九分八十六秒耶而大統之不效亦明甚然此八月也若或值元日於子半則當退履端於月窮而朝賀大禮當在月正二日矣又可謂細故耶此而不改臣竊恐愈久愈差將不流而至春秋之食晦不止臣故曰閏應轉應交應之宜俱改也久之刑科給事中李應策亦言國朝厯元聖祖崇諭二說難憑但驗七政交㑹行度無差者為是惟時以至元辛巳揆之洪武甲子僅百四年所律以差法似不甚逺至正德嘉靖已當退三度餘奚俟今日哉春秋不食朔猶值書官失之今日食後天幾二刻冬至後天逾九刻計氣應應損九百餘分乃云弗失乎厯理微秒日月五星運轉交㑹咸取應於窺管測表歐陽修所謂事之最易差者雖古太初大衍諸書詎不深思𤣥解得羲和氏之厯象授時遺意然果以鍾律為數無差則太初厯宜即定於漢而後之為三統四分者若何又果以蓍策為術無差則大衍厯亦當即定於唐而後之為五紀貞元觀象者又若何蓋陰陽迭行隨動而移移而錯錯而乖違日陷不止則躔離之謬分至之忒積此焉窮雲路持觀象測景候時籌策四事議者應宜俱改使得中祕星厯書一編閲而校焉必自有得於是欽天監正張應侯等疏詆其誣禮部言使舊法無差誠宜世守而今既覺少差矣失今不修將歲愈久而差愈逺其何以齊七政而釐百工哉理應俯從雲路所請即行考求磨算漸次修改但厯數本極𤣥微修改非可易議蓋更厯之初上考往古數千年布算雖有一定之法而成厯之後下行將來數百年不無分秒之差前此不覺非其術之疏也以分秒布之百餘年間其微不可紀蓋亦無從測識之耳必積至數百年差至數分而始微見其端今欲驗之亦必測候數年而始微得其概即今該監人員不過因襲故常推衍成法而已若欲斟酌損益緣舊為新必得精諳厯理者為之總統其事選習星家多方測候積算纍嵗較析毫芒然後可為凖信裁定規制伏乞即以邢雲路提督欽天監事該監人員皆聽約束本部仍博訪通曉厯法之士悉送本官委用務親自督率官屬測候二至太陽晷刻逐月中星躔度及驗日月交食起復時刻分秒方位諸數隨得隨録一切開呈御覽積之數年酌定歲差修正舊法則萬世之章程不易而一代之厯寶惟新其於國家敬天勤民之政誠大有禆益矣疏奏留中未行四十一年南京太僕寺少卿李之藻上西洋厯法略言邇年臺諌失職推算日月交食時刻虧分往往差謬交食既差定朔定氣由是皆舛伏見大西洋國歸化陪臣龎迪我龍化民熊三拔陽瑪諾等諸人慕義逺來讀書談道俱以頴異之資洞知厯算之學攜有彼國書籍極多久漸聲教曉習華音其言天文厯數有我中國昔賢所未及道者一曰天包地外地在天中其體皆圓皆以三百六十度算之地經各有測法從地窺天其自地心測算與自地靣測算者都有不同二曰地靣西北其北極出地高低度分不等其赤道所離天頂亦因而異以辨地方風氣寒暑之節三曰各處地方所見黃道各有髙低斜直之異故其晝夜長短亦各不同所得日景有表北景有南景亦有周圍圓景四曰七政行度不同各為一重天層層包裹推算周經各有其法五曰列宿在天另行度以二萬七千餘歲一周此古今中星所以不同之故不當指列宿之天為晝夜一周之天六曰五星之天各有小輪原俱平行特為小輪旋轉於大輪之上下故人從地靣測之覺有順逆遲疾之異七曰嵗差分秒多寡古今不同蓋列宿天外别有兩重之天動運不同其一東西差出入二度二十四分其一南北差出入一十四分各有定算其差極微從古不覺八曰七政諸天之中心各與地心不同處所春分至秋分多九日秋分至春分少九日此由太陽天心與地心不同處所人從地靣望之覺有盈縮之差其本行初無盈縮九曰太陰小輪不但算得遲疾又且測得高下逺近大小之異交食多寡非此不確十曰日月交食隨其出地高低之度看法不同而人從所居地靣南北望之又皆不同兼此二者食分乃審十一曰日月交食人從地靣望之東方先見西方後見凡地靣差三十度則時差八刻二十分而以南北相距三百五十里作一度東西則視所離赤道以為减差十二曰日食與合朔不同日食在午前則先食後合在午後則先合後食凡出地入地之時近於地平其差多至八刻漸近於午則其差時漸少十三曰日月食所在之宫每次不同皆有捷法定理可以用器轉測十四曰節氣當求太陽真度如春秋分日乃太陽正當黃赤二道相交之處不當計日勻分凡此十四事者臣觀前此天文厯志諸書皆未能及或有依稀揣度頗與相近然亦初無一定之見惟是諸臣能備論之不徒論其度數而已又能論其所以然之理蓋緣彼國不以天文厯學為禁五千年來通國之俊曹聚而講究之窺測既核研究亦審與中國數百年來始得一人無師無友自悟自是此豈可以疏密較者哉觀其所製窺天窺日之器種種精絶即使郭守敬諸人而在未或測其皮膚又况現在臺諌諸臣刻漏塵封星臺迹斷者寧可與之同日而論也昔年利瑪竇最稱博覽超悟其學未傳溘先朝露士論至今惜之今龎迪我等鬚髮已白年齡向衰失今不圖政恐後無人解伏乞勑下禮部亟開館局首將陪臣龎迪我等所有厯法照依原文譯出成書其於鼓吹休明觀文成化不無禆補也懷宗崇禎二年九月癸卯開設厯局命吏部左侍郎徐光啓督修厯法先是五月乙酉朔日食時刻不驗上切責欽天監官五官夏官正戈豐年等奏言大統厯乃國初監正元統所定其實即元太史郭守敬所造授時厯也二百六十年來厯官按法推步一毫未嘗增損非惟不敢亦不能若妄有竄易則失之益逺矣切詳厯始于唐堯至今四千年其法從粗入精從疏入密漢唐以來有差至二日一日者後有差一二時者至于守敬授時之法古今稱為極密然中間刻數依其本法尚不能無差此其立法固然非職所能更改豈惟職等即守敬以至元十八年成厯越十八年為大德三年八月已推當食而不食大德六年六月又食而失推載在律厯志可考也是時守敬方以昭文殿大學士知太史院事亦未能有所增改良以心思技術已盡於此不能復有進步於是禮部覆言厯法大典唐虞以來咸所隆重故無百年不改之厯我髙皇帝神聖自天深明象緯而一時厯官如元統李德芳輩才力有限不能出守敬之上因循至今後來専官修正則有童軒樂頀華湘等著書考定則有鄭世子載堉副使刑雲路等建議改正則有俞正已周濓周相等是皆明知守敬舊法本未盡善抑亦年逺數贏即守敬而在亦須重改故也况厯法一志厯代以來載之國史若史記漢書晉唐書宋元史尤為精備後之作者禀為成式因以增修我國家事度越前代而獨此一事略無更定如萬厯間纂修國史擬將元史舊志謄録成書豈所以昭聖朝之令典哉已而光啓上厯法修正十事其一議嵗差每嵗東行漸長漸短之數以正古來百五十年六十六年多寡互異之說其二議嵗實小餘昔多今少漸次改易及日景長短嵗嵗不同之因以定冬至以正氣朔其三每日測驗日行經度以定盈縮加減真率東西南北髙下之差以步日躔其四夜測月行經緯度數以定交轉遲疾真率東西南北髙下之差以步月離其五密測列宿經緯行度以定七政盈縮遲疾順逆違離逺近之數其六密測五星經緯行度以定小輸行度遲疾留逆伏見之數東西南北髙下之差以推步凌犯其七推變黃赤道廣狹度數密測三道距度及月五星各道與黃道相距之度以定交轉其八議日月去交逺近及真會似會之因以定距午時差之真率以正交食其九測日行考知二極出入地度數以定周天緯度以齊七政因月食考知東西相距地輸經度以定交食時刻其十依唐元法隨地測驗二極出入地度數地輪經緯以求晝夜晨昏永短以正交食有無先後多寡之數因舉南京太僕寺少卿李之藻西洋人龍華民鄧玉函同襄厯事疏奏報可故有是命三年夏五月徵西洋陪臣湯若望秋七月徴西洋陪臣羅雅谷供事厯局四年春正月禮部尚書徐光啓進日躔厯指一卷測天約說二卷大測二卷日躔表二卷割圓八線表六卷黃道升度七卷黃赤距度表一卷通率表一卷夏四月戊午夜望月食徐光啓豫定月食分秒時刻方位奏言日食隨地不同則同地緯度算其日分多少用地經度算其加時早晏月食分數寰宇皆同止用地經度推求先後時刻漢安帝元初三年三月二日日食史官不見遼東以聞五年八月朔日食史官不見張掖以聞蓋食在早獨見于遼東食在晚獨見於張掖當時京師不見食非史官之罪而不能言遼東張掖之見食則其法為未密也唐書載北極出地自林邑十七度至蔚州四十度元人設四海測驗二十七所庶幾知詳求經緯之法矣臣特從輿地圖約略推步開載各省今食初虧度分蓋食分多少既天下皆同則餘率可以類推不若日食之經緯名殊必須詳備也又月體一十五分則盡入暗虛亦十五分止耳而臣今推二十六分六十抄者蓋暗虛體大于月若食時去交稍逺即月體不能全入暗虛止從月體論其分數是夕之食極近于二道之交故月入暗虛一十五分方為食既更進一十一分有竒乃得生光故為二十六分有竒如回回厯推十八分四十七秒略同此法也冬十月辛丑朔日食光啓復上測候四說其略曰日食有時差舊法用距午為限中前宜加中後宜減以定加時早晚若食在正中則無時差不用加減故臺官相𫝊謂日食加時有差多在早晚日中必合獨今此食既在日中而加時則舊術在後新術在前當差三刻以上所以然者七政運行皆依黃道不由赤道舊法所謂中乃赤道之午中而不知所謂中者黃道之正中也黃赤二道之中獨冬夏二至乃得同度餘日漸次相離今十月朔去冬至度數尚逺兩中之差二十三度有竒豈可仍因食限近午不加不減乎若食在二至又正午相值果可無差即食于他時而不在日中即差之原尚多亦復難辨適際此日又值此時足為顯證是可驗時差之正術一也交食之法既無差誤及至臨期實侯其加時亦或少有後先此則不因天度而因地度地度者地之經度也本方之地經度未得真率則加時難定其法必從交食時測驗數次乃可較勘畫一今此食依新術測候其加時刻分或前後未合當取從前所記地經度分勘酌改定此可以求里差之真率二也時差一法溺於所聞但知中無加減而不知中分黃赤今一經目見一經口授人人知加時之因黃道人人知黃道極之嵗一周天奈何以赤道之午正為黃道之中限乎臣今取黃道中限隨時隨地算就立成監官已經謄録臨時用之無不簡便其他諸術亦多類此足以明學習之甚易三也該監諸臣所最苦者從來議厯之人詆為擅改不知其斤斤墨守者郭守敬之法即欲改不能也守敬之法加勝於前矣而謂其至今無差亦不能也如時差等術蓋非一人一世之聰明所能揣測必因千百年之積候而後智者會通立法若前無緒業即守敬不能驟得之况諸臣乎此足以明疏失之非辜四也有此四者即分數甚少亦宜詳加測候以求顯驗故敢冒昧上聞六年冬十月以山東布政司右恭政李天經督修厯法時徐光啓以病辭厯務逾月卒所著崇禎厯書幾百卷七年春正月乙巳督修厯法山東右參政李天經疏言七政之餘依新法則火土金三星本年九月初旬會於尾宿之天江左右木星於是月前犯鬼宿之積尸氣一時五緯已有其四非必以數合天即天驗法之一據也從來厯家於列宿借星有經度無緯度雖回回厯近之猶然古法故臣等所推經緯度數時刻與監推各各不同如本年八月秋分大統厯算在八月三十日未正一刻新法算在閏八月二日未初一刻一十分相距兩日臣於閏八月二日同監局官生測太陽午正髙五十度零六分尚差一分入交推變時刻應在未初一刻一十分吻合新厯隨取轉臣徐光啓從前測景簿數年俱合春秋𫝊曰分同道也至相過也二語可為今日節變差訛之一證蓋太陽行黃道中線逮二分而黃道與赤道相交此晝夜之所以平而分應所由起也逮二至則過赤道內外各二十三度有竒夫過赤道三十三度為真至則兩道相交于一線詎不為真分乎太陽有平行有實行平則每日約行若干而實則有多有寡不獨秋分為然謹將諸曜會合凌犯行度開具禮部委司官同監局官生詳議以聞蒲城布衣魏文魁上言今年甲戌二月十六日癸酉曉刻月食今厯官所訂乃二月十五日壬申夜也八月應乙卯月食今乃以甲寅遂令八月之望為晦并白露秋分皆非其期訛謬尚可言哉奏上命文魁入京測驗秋七月甲辰李天經上厯元二十七卷星屏一冬十一月日晷星晷儀器告成上命太監盧維寧魏征至局驗之先是西儒羅雅谷湯若望在厯局造測儀六式一曰象限懸儀二曰平面懸儀三曰象限立運儀四曰象限座正儀五曰象限大儀六曰三直游儀復有弩儀弧矢儀紀限儀諸器不槩録谷應泰曰古今改厯者無慮數十家由黃帝訖秦凡六改由漢初漢末凡五改由曺魏訖隋凡十三改由唐訖周凡十六改由宋初訖宋末凡十八改由金熙宗訖元凡三改其間傑然名家者漢太初以鍾律唐大衍以蓍䇿元授時以晷景而晷景為最密明太祖吳元年太史令劉基率其屬進戊申大統厯已而欽天監博士元統請以洪武甲子嵗冬至為厯元大錫錫名雖殊立成罔異與授時都無增損良以才非守敬革故滋難也自時厥後建議改正則有俞正已鄭善夫周濓周相諸人專官修治則有童軒樂頀華湘諸人著書考定則有鄭世子載堉副使邢雲路諸人志切持籌事同築室言人人殊旋復報罷迄于萬厯西儒來賔繼軌迭至一時象緯厯算之說逈出尋常默與天㑹李之藻既推轂于定陵徐光啓復連茹于懷廟開局京圻允稱甚盛其法以二十四刻二十一分八十八秒六十四微為平行嵗實小餘而以均數加減之則為定冬至由是太陽有平行實行而三百六十五度之盈縮因之太陽有自行次輪又次輪而朔望之遲疾因之交食有時差里差視差而食時之刻數分秒方位因之有所為根數者猶授時氣應也引數者猶授時盈縮厯遲疾限也均數者猶授時加減差也黃道東行一分四十三秒餘者猶授時嵗差一分五十秒也至如午中分黃赤之辨分至有贏縮之殊而隨動自動疾動遲動不同則交道之廣狹生焉闡微析幽思出象表雖使楊子談𤣥洛下握算無以及此衆言淆亂迄未通頒適我皇南嚮之辰詔司天西厯之布法象維新璣衡愈密豈非宏制尚闕于垂成而大典終歸于有待哉唐乎盛矣明史紀事本末卷七十三
