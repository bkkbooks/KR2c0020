body:
  text: 明史紀事本末紀事本末類提要臣等謹案明史紀事本末八十卷國朝谷應泰撰應泰字賡虞豐潤人順治丁亥進士官至浙江提學僉事其書仿袁樞通鑑紀事本末之例纂次明代典章事蹟分目八十各詳著其端委於時明史尚未刋定無所折衷故紀靖難時事深信從亡致身諸録以恵帝遜國為實于滇黔㳺跡載之極詳又不知懿安皇后死節而稱其青衣䝉頭步入成國公第俱不免沿野史𫝊聞之誤然其排比纂次詳畧得中首尾秩然於一代事實極為淹貫毎篇後各附論斷皆仿晉書之體以駢偶行文而遣詞抑揚𨽻事親切尤為曲折詳盡考邵廷采思復堂集明遺民𫝊稱山隂張岱甞輯明一代遺事為石匱蔵書應泰作紀事本末以五百金購請岱慨然予之又稱明季稗史雖多體裁未備罕見全書惟談遷編年張岱列𫝊兩家具有本末應泰並採之以成紀事據此則應泰是編取材頗備集衆長以成完本其用力亦可謂勤矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀明史紀事本末原序通鑑紀事本末者創自建安袁樞而北海馮琦繼之其法以事類相比附使讀者審理亂之大趨迹政治之得失首尾畢具分部就班較之盲左之編年則包舉而該浹比之班馬之傳志則簡練而櫽括葢史外之别例而温公之素臣也沿及明代迄無成書蒐釐條貫葢其難哉余謬承學政之役兼值右文之朝夙夜兢兢廣稽博采勒成一編以補前史緬惟髙皇智勇天錫成祖雄姿英毅撥亂反正風驅電掃可不謂隆焉仁宣之間綱舉目張吏治蒸蒸明良液洽歌詠太平繼體之休風也英宗御極耆舊罷政閹䜿擅權遂至翠華輕出乘輿北狩自非樞臣畫謀景帝踐阼則虞淵之日墜地而已及乎南内奪門忠直被誅宗社卒賴焉憲宗嗣服不修儲怨更加謚號寛身之仁也乃憸相柄權大璫羅織祈於登明亦云恧矣孝皇恭仁莊敬虚懐納諌朝多藎臣野無兵革至其晩年尤勤宣問歴選列辟稱郅理焉武宗巡遊無度寵任逆瑾晩乃芟除寘鐇宸濠禍變接踵顛而不亡亦其幸爾世廟藩服入纂綜核察察奸輔蔽之僅乃獲鋤國體傷矣穆宗守文俺答封貢乃輟朝日乆中旨竊叢無足數也神皇乘運豫大豐亨征徭既繁百工叢脞揆厥亂源所自來爾光宗危懼之餘克膺大寳善政初舉天命不祐良足悲也熹廟拱手權歸宦寺𤣥黄之戰毒流縉紳胚胎禍亡於斯酷矣愍帝冲齡手剪凶貂父老喁喁聿觀厥化乃以數乘陽九寇弄潢池僚寀營私將士選懦及乎刄及宫闈身殉社稷則庶幾亡國之正也嗟乎周治盛於文武漢道大於髙光此前世之所以興隆也孔子傷心幽厲武侯痛恨桓靈此後世之所以衰微也綜觀明政何莫不然昔湯臣進規鑒於有夏姬朝作諷戒在殷商惟我皇清開天初造攬勝國之惠逆察已事之明驗保世滋大毋亦於斯鏡見焉余不敏泛瀾衆家編綴是書比于九齡之千秋金鑑徳秀之大學衍義雖材智不逮亦復竭其愚忠云爾順治戊戌冬十月提督兩浙學政僉事豐潤谷應泰譔
