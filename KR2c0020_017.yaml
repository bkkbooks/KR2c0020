body:
  text: 明史紀事本末卷十七浙江提學僉事谷應泰編建文遜國建文四年夏六月乙丑帝知金川門失守長吁東西走欲自殺翰林院編修程濟曰不如出亡少監王鉞跪進曰昔髙帝升遐時有遺篋曰臨大難當發謹收藏奉先殿之左羣臣齊言急出之俄而舁一紅篋至四圍俱固以鐵二鎖亦灌鐵帝見而大慟急命舉火焚大內皇后馬氏赴火死程濟碎篋得度牒三張一名應文一名應能一名應賢袈裟帽鞋剃刀俱備白金十錠朱書篋內應文從鬼門出餘從水關御溝而行薄暮會于神樂觀之西房帝曰數也程濟即為帝祝髮吳王教授楊應能願祝髮隨亡監察御史葉希賢毅然曰臣名賢應賢無疑亦祝髮各易衣披牒在殿凡五六十人痛哭仆地俱矢隨亡帝曰多人不能無生得失有等任事著名勢必究詰有等妻子在任心必縈繫宜各從便御史曽鳳韶曰願即以死報陛下帝麾諸臣大慟引去若干人九人從帝至鬼門而一舟艤岸為神樂觀道士王升見帝叩頭稱萬嵗曰臣固知陛下之來也疇昔髙皇帝見夢令臣至此耳乃乘舟至太平門升導至觀已薄暮矣俄而楊應能葉希賢等十三人同至共二十二人兵部侍郎廖平襄陽人刑部侍郎金焦貴池人編修趙天泰三原人檢討程亨澤州人按察使王良祥符人參政蔡運南康人刑部郎中梁田玉定海人監察御史葉希賢松陽人程濟績溪人中書舍人梁良玉梁中節俱定海人宋和臨川人郭節連州人刑部司務馮㴶黃巖人所鎮撫牛景先沅人王資楊應能劉仲俱把縣人翰林待詔鄭洽浦江人欽天監正王之臣襄陽人太監周恕和州人徐王府賔輔史彬吳江人帝曰今後但以師弟稱不必拘主臣禮也諸臣泣諾廖平曰諸人願隨固也但隨行不必多更不可多就中無家室纍并有膂力足捍衛者多不過五人餘俱遙為應援可耳帝曰良是於是環坐於地道士進夜膳約定左右不離者三人楊應能葉希賢俱稱比丘程濟稱道人往來道路給運衣食者六人馮㴶時稱塞馬先生時稱馮翁時稱馬公時稱馬二子郭節時稱雪菴後稱雪和尚宋和時稱雲門僧時稱稽山主人時稱槎主趙天泰適衣葛即稱衣葛翁時稱天肖子王之臣家世補鍋欲以作生計號老補鍋牛景先號東湖樵夫亦稱東湖主人帝曰吾今往滇南依西平侯史彬曰大家勢盛耳目衆多況新主意尚未釋能無見告不若往來名勝東西南北皆吾家也臣等中有家給足備旦夕者即駐錫於兹有何不可帝曰良是於是更主七家廖平王良鄭洽郭節王資史彬梁良玉帝曰此可暫不可久況郊壇所在明旦必行何所之衆擬浦江而鄭亦巨族且忠孝可居也夜分帝足脛痛度不能行微明景先與彬步至中河橋謀所以載者有一艇為吳人急叩之則彬家所遣以偵彬吉凶者也彬與景先亟迎帝且至彬家諸人聞之且悲且喜同載八人為程葉楊牛馮宋史餘俱散走期以月終更晤取道溧陽八月始至吳江之黃溪史彬家彬奉帝居所居之西偏曰清逺軒衆出拜帝改題水月觀親筆篆文閲三日諸臣至彬家相聚五日帝命歸省成祖即位編籍在任諸臣遁去者四百六十三人俱命削籍八月命禮部行文州縣追繳革除誥敕至是蘇州府遣吳江邑丞鞏德至史彬家追奪且曰建文皇帝聞在君家彬曰無之微哂而去次日帝同兩比丘一道人行餘俱星散時八月十六日也帝附舟至京口過六合陸行至襄陽十月至廖平家適有詗其迹遂決意往滇成祖永樂元年春正月十三日建文帝至雲南永嘉寺初帝期從亡臣以三月復至廖平家至是留永嘉寺頗安適將以明年遊天台而諸臣以帝舊約俱集於襄陽廖平家適馮㴶自雲南來傳帝命止之令諸臣無煩往來各散去二年春正月建文帝離雲南由重慶抵襄陽六月入吳八月八日復至史彬家時天將暝彬家已舉火矣帝突至彬及家人出拜舉酒半酣帝曰我明晨當即去彬云臣掃門而俟久矣即有不肅亦乞見原欲留師數月明晨何遽耶先是帝命從亡者俱師弟稱故彬等呼為師帝泣曰彼方急圖我昨於西安道中見冠蓋來者瞪目視我此臣我自善之彼必有以奏也東南逋臣屈指先汝我去政為汝計對哭久之且曰此近宫闕不便彬曰亦無害視帝衣履敝甚固留三日命家人製布衣而去帝為兩浙之遊杭州計遊二十三日天台雁蕩計遊三十九日會馬二子稽山主人金焦亦來石梁間且云諸臣俱約至此然終不見時天氣寒帝返雲南固却諸臣而去三年春二月建文帝至重慶之大竹善慶里有杜景賢築室與居尋舍之而去嘗聞金陵諸臣慘死事泫然曰我獲罪於神明矣諸人皆為我也四年夏四月建文帝至西平侯沐晟家留旬日五月結苑白龍山五年冬十二月建文帝祭死難諸人自為文哭之時朝廷偵帝甚密户科都給事胡濙訪求張三丰蓋為帝也帝知之遂遁迹不出六年夏六月白龍菴災程濟出山募葺七年春正月命太監鄭和航海通西南諸國時胡濙鄭和數往來雲貴間蹤迹建文帝帝東行三月至善慶里五月復至襄陽廖平家已徙蜀帝還滇八年春三月建文帝復至菴工部尚書嚴震使安南密訪帝震忽與帝遇於雲南道中相對而泣帝曰何以處我對曰上從便臣自有處夜縊於驛亭中帝復結菴於白龍山顔色憔悴形容枯稿夏月患痢因有戒心不能出山覓膳狼狽殊甚適史彬程亨郭節訪至帝相對大慟隨問曰汝等携有方物否各為獻史彬獨有僮而所獻豐且當年職居禁近知帝所好帝遍嘗之曰不食此已三年矣三人相留許久帝遣之歸别時痛哭失聲帝屬曰今後勿再來道路阻修一難關津盤詰二難況我安居不必慮也彬等叩首頷命而去後帝復舍白龍菴他去九年春有司毁菴夏四月建文帝至浪穹鶴慶山其地頗佳因募建一菴名大喜十年春三月應能卒四月希賢卒建文帝因納一弟子名應慧十一年夏五月建文帝南行至甸六月還冬十二月渡馬嶺遇寇適官軍至僅免十二年夏四月遣程濟募糧秋九月建文帝學易數十三年秋八月建文帝遊衡山冬十月還菴十四年夏六月建文帝足疾發程濟乞藥於城西三日乃反帝飲獲愈冬十一月帝命濟録述從亡傳藏之山巖中帝自為敘十五年春二月史彬復至白龍故道了不見菴山旁詢一老婦則曰官司毁之矣問僧徒曰不知所之至是彬忽與帝遇於鶴慶之大喜菴深林密樹不下數里先是楊應能葉希賢所建者甫落成而兩人死即於菴東葬之十一月帝避囂東行至衡山十六年春三月建文帝還至黔十七年夏六月建文帝始觀佛書十八年夏六月建文帝命程濟移居菴西偏冬十月帝入蜀程濟從遍遊諸勝登峨眉有詩云登髙不待東翹首但見雲從故國飛十九年秋七月建文帝入粵遊海南諾勝十一月帝還菴二十年夏四月建文帝避囂於菴南四十里名渌泉二十一年春二月建文帝入楚程濟從登章臺山賦弔古詩楚歌趙舞今何在惟見寒鴉繞樹啼六月帝遊漢陽登晴川樓吟云江波猶湧憾林靄欲翻愁七月帝留大别山二十二年春二月建文帝東行冬十月與史彬相遇於旅店言及榆木川稍色喜史彬問道路起居狀答曰近來強飯精爽倍常即同彬下江南至彬家彬具酒肴於所居之重慶堂帝上座程濟東列彬西列彬有從叔祖名𢎞者嘉興縣史家村人也直入至堂上彬不得已亦與坐問師何來彬未答即起趨出招彬曰此建文皇帝也彬曰非也𢎞曰吾曽於東宫見之當吾家籍沒時非帝吾無死所矣帝實活我恩無以報彬不得已實告之即頓首堂下涕泣問向來狀帝曰賴諸從亡者給我衣食周旋險阻之間二十年來戰戰兢兢復大慟慟已曰今想可老終矣𢎞曰帝今欲何之曰遊天台諸勝𢎞曰吾當具一日之積隨行居數日帝行戒彬曰有叔在爾勿往也𢎞從之去十一月至寧波渡蓮花洋仁宗洪熙元年春正月建文帝謁大士於潮音洞五月自閩粵還山止程濟從聞仁宗崩帝曰吾心放下矣今後往來亦少如意也且悲且喜宣宗宣德元年秋八月建文帝祭從亡諸臣於菴前二年春正月建文帝移居鶴慶之靜室秋八月滇寇亂帝入蜀程濟從冬十月宿永慶寺題詩云杖錫來遊嵗月深山雲水月傍間吟塵心消盡無些子不受人間物色侵三年夏五月建文帝遊神女廟秋七月遊黃牛磯冬十月遊漢中四年春正月建文帝至成都再宿而去五月帝還浪穹六月至鶴慶山中五年夏四月建文帝欲稍廣其菴程濟等出募六年春二月建文帝往陜西夏四月至延安秋七月南行入蜀九月至夔阻雪七年春正月建文帝入楚至公安夏五月至武昌秋八月下九江九月遊杭州吳山冬十一月遊天台八年春正月建文帝在赤城九年夏五月建文帝復至吳江史彬家程濟從時彬已死帝悲悼久之慰勞其子倍至復為會稽之遊八月還十年春三月建文帝往粵西英宗正統元年秋八月建文帝還至滇卜築舊日之浪穹二年夏五月建文帝復遊峩眉冬十一月還至浪穹三年秋七月建文帝欲往粵西不果會有弟子亡去帝恐迹露遂有粵西之行四年夏四月程濟勸建文帝還滇不聽五年春三月十三日建文帝謂程濟曰我決意東行子盍為我蓍得兑之歸妹濟拊几大呼曰大凶今太歲干支皆金火必尅之行夏之時其危乎帝好文章能為詩歌嘗賦詩曰牢落西南四十秋蕭蕭白髮已盈頭乾坤有恨家何在江漢無情水自流長樂宫中雲氣散朝元閣上雨聲收新蒲細栁年年緑野老吞聲哭未休後至貴州金竺長官司羅永菴嘗題詩壁間其一曰風塵一夕忽南侵天命潛移四海心鳳返丹山紅日逺龍歸滄海碧雲深紫微有象星還拱玉漏無聲水自沉遙想禁城今夜月六宫猶望翠華臨其二曰閲罷楞嚴磬懶敲笑看黃屋寄團瓢南來瘴嶺千層逈北望天門萬里遙欵假久忘飛鳳輦袈裟新換衮龍袍百官此日知何處唯有羣烏早晚朝至是出亡蓋三十九年矣會有同寓僧者竊帝詩自謂建文帝詣思恩知州岑瑛大言曰吾建文皇帝也瑛大駭聞之藩司因繫僧并及帝蜚章以聞詔械入京師程濟從八月至金陵九月至京命御史廷鞫之僧稱年九十餘且死思葬祖父陵旁耳御史言建文君生洪武十年距正統五年當六十四歲何得九十嵗廉其狀僧實楊應祥鈞州白沙里人奏上僧論死下錦衣獄從者十二人戍邊而帝適有南歸之思白其實御史密以聞閹吳亮老矣逮事帝乃令探之建文帝見亮輒曰汝非吳亮耶亮曰非也建文帝曰吾昔御便殿汝尚食食子鵝棄片肉於地汝手執壺據地狗餂之乃云非是耶亮伏地哭建文帝左趾有黑子摩視之持其踵復哭不能仰視退而自經於是迎建文帝入西內程濟聞之嘆曰今日方終臣職矣往雲南焚菴散其徒帝既入宫宫中人皆呼為老佛以壽終葬西山不封不樹谷應泰曰聞之國君死社稷義之正也然而乘機察變忍耻圖存一旅而中興奏五年而天節反則惠王居櫟仍殺子頽襄王居鄭終誅太叔建文之倉皇出奔或亦有深意焉又況鐵函鎖柙度牒剃刀先皇所遺也龍嫠帝后妖讖亡周燕啄皇孫天心割漢厥有定數又非智力所移耳乃遜國之期以壬午六月十三日建文獨從地道餘臣悉出水關痛哭仆地者五十餘人自矢從亡者二十二士而廖平之議以為多人必生得失不若遙為應援于時謹侍左右者三人楊應能葉希賢稱比丘程濟稱道人是也往來道路給辦資糧者六人馮㴶郭節宋和趙天泰王之臣牛景先各諱名號潛相通問是也其經由之地則自神樂觀啓行由松陵而入滇南西遊重慶東到天台轉入祥符僑居西粵中間結菴於白龍題詩於羅永兩入荆楚之鄉三幸史彬之第蹤迹去來何厯厯也特以年逼桑榆願還骸骨岑瑛據之以聞吳亮辨其非妄夫不復國而歸國不作君而作師雖以考終亦云恧矣然以豫論之假令成皇方死沙場昭帝新居諒暗此時兵力黷於邊關內難伏於髙煦國勢危疑人情牽制必不能長駕逺馭經營萬里之外者而滇黔地險沐氏兵強因兹遁迹之時宜申控告之義非流彘而藉共和則東遷而依晉鄭一軍出荆門即襄鄧可搖一軍出漢南即長江可據狐先河水之功馮鄧雲臺之業後挽前推匪異人任也奈何枕席有涕泣之痕行旅多槖饘之奉而興復大計闕焉不講譬猶危葉畏颷驚禽易落正所謂亡國之大夫不足與言事者也洎乎正統改元帝易四朝統踰五紀內鮮惠懷之亂外無連管之謀嗣服相承天定之矣而況主君已老從者凋零方險阻偹嘗之時正精志消亡之日魯展喜之已衰晉銅鞮而既死崦嵫待盡尚安望其復振乎至若從亡諸臣國爾忘家捍王於艱四十餘年櫛風沐雨即無包胥之義復楚王於郢中亦有子家之忠哭昭公於野井推此志也雖與日月爭光可也而議者據成祖之實録謂建文之自焚疑一龍之未出擯衆蛇而不載夫隱巢之事不直序於貞觀燭斧之疑亦依違於興國時史所書非無曲筆矣而況胡濙訪仙思恩擢職以及陵在西山不封不樹有目者所共睹又豈得以傳聞異辭也明史紀事本末卷十七
