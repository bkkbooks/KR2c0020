body:
  text: 明史紀事本末卷二浙江提學僉事谷應泰編平定東南元順帝至正十六年春三月太祖既定金陵欲發兵取鎮江慮諸將不戢士卒為民患遂召諸將數以常縱軍士之過欲置之法李善長救乃免於是命徐達為大將率諸將浮江東下戒之曰吾自起兵未嘗妄殺今爾等當體吾心戒戢士卒城下之日毋焚掠殺戮有犯令者處以軍法縱者罰毋赦達等頓首受命丙申進兵攻鎮江丁酉克之苖軍元帥旺扎勒圖出走守將假武平章定定戰死逹等自仁和門入號令嚴肅城中晏然遂分兵下金壇丹陽諸縣克之改鎮江為江淮府命徐逹湯和為統軍元帥鎮守已而復以江淮府為鎮江府六月乙卯命鄧愈邵成華髙華雲龍將兵進攻廣德路克之改為廣興府以鄧愈鎮守秋七月己卯置江南等處行中書省諸將奉太祖為吳國公行丞相總省事以李善長宋思賢為參議以李夢庚陶安等為左右司郎中員外郎都事等官置江南行樞密院以徐逹湯和同僉樞密院事置帳前親軍以馮國用為總制都指揮使復置左右前後中五翼元帥府及五部都先鋒置提刑按察司以王習古王德為僉事遣使聘鎮江秦從龍從龍字元之洛陽人仕元為校官纍遷置江南行臺侍御史㑹兵亂從龍以老避居鎮江太祖兵東下謂徐逹曰鎮江有秦元之者才器老成入城當為吾訪之徐逹等至鎮江得從龍還報太祖喜即命朱文正以白金文綺往聘之既至太祖親至龍江迎之以入太祖即元故御史臺為府居從龍西華門外事無大小皆與謀從龍盡言無隱每以筆書漆簡問答甚密左右無知之者太祖呼為先生而不名九月太祖如鎮江府謁孔子廟分遣儒士告諭鄉邑勸農桑十二月長鎗賊謝元帥冦廣德鄧愈擊敗之俘其總管武世營及軍士千餘人尋遣禆將費子賢攻武康安吉皆下之十七年夏四月命徐逹常遇春帥師攻寧國久不下太祖乃親往督師長鎗軍來援我師扼險破走之乃造飛車編竹為重蔽數道並進守將楊仲英不能支開門降其百户張文貴殺妻子自刎死擒其將朱亮祖得軍士十餘萬馬二千匹亮祖六合人初為元義兵元帥太祖克太平來降尋叛去數與我師戰我軍為所獲者六十餘人諸將無能當至是徐逹等圍亮祖於寧國常遇春被鎗而還太祖督兵攻破之縛亮祖以見太祖曰今何如對曰是非得已生則盡力死則死耳太祖壯而釋之使從征宣城亦下秋七月命鄧愈胡大海將兵取徽州先下績溪休寧乘勝進攻徽州元守將元帥巴爾斯布哈及萬户吳納等拒戰我師擊敗之庚辰克徽州路納與阿勒呼木李克膺等退守遂安縣大海引兵追及於白鶴嶺擊敗之納等自殺改徽州路為興安府命鄧愈守之九月青軍元帥張明鑑逐元鎮南王博囉布哈據揚州日屠居民以為食元帥繆大亨攻之明鑑等不能支乃出降得其衆數萬馬二千匹改揚州路為淮海府以耿再成張德林守之按籍城中居民僅得十八家德林以舊城虛曠截城西南隅築而守之元苖帥楊旺扎勒自杭州率衆數萬來攻徽州時徽州新附守禦之器未備胡大海方將兵攻婺源城中守兵甚少苖軍奄至鄧愈乃激厲將士大開四門以待之苖軍疑不敢入大海聞之自婺源兼程而還大呼殺入復與鄧愈奮兵夾戰十一月朔大破苖軍於城下殺其鎮撫吕才擒其部將吳辛董旺吕升等旺扎勒遁去愈遣禆將王弼孫虎攻婺源斬元將特穆爾布哈婺源元帥汪同降十八年春二月以康茂才為營田使茂才蘄州人初結義旅為元捍冦江上有功纍遷宣慰使都元帥戌裕溪采石及太祖兵渡江茂才數戰不勝常遇春設伏殱其精鋭殆盡茂才復收潰散竪寨於天寧州太祖命諸軍以襄陽炮破其寨茂才奔金陵金陵破茂才復欲奔鎮江追及之茂才度天命有歸乃率所部餘兵三千人解甲來附頓首言前日之戰各為其主今屢敗天也生死惟命太祖笑而釋之令統所部兵從征屢有功至是太祖進諭之曰比因兵亂隄防頺圯民廢耕耨故設營田使以修築隄防専掌水利今軍務實殷用度為急理財之道莫先於農事故命爾此職分巡各處俾髙無患乾卑不病潦務在蓄泄得宜大抵設官為民非以病民若但使有司增飾館舍迎送奔走所至紛擾無益於民而反害之則非付任之意李文忠等進取青陽石埭太平旌德諸縣皆下之是月文忠復進兵擊敗元院判阿勒呼木兵於萬年街遂破苖獠於昌化獲其婦女輜重甚衆文忠恐士卒驕富莫有鬪志因激怒使盡殺所獲焚其輜重曰此何足惜能努力破敵何患不富貴乎衆咸奮勵三月文忠㑹鄧愈胡大海兵取建德路太祖大喜授文忠帳前總制親兵都指揮使大海等由徽州昱嶺關進攻建德路道出遂安長鎗元帥余子貞以兵來拒擊敗之追至淳安敵望風潰遂安守將洪元帥率衆五千援淳安復戰敗之降其衆千餘丙辰克建德路元守將布哈等棄城遁走父老何良輔等率衆降改建德路為嚴州府五月苗帥楊旺扎勒率衆屯徽之烏龍嶺文忠愈合兵擊却之癸酉下浦江縣文忠既下浦江聞鄭氏者自宋聚族同居至元旌為義門禁軍士母侵掠是月命提刑按察司僉事分巡郡縣録囚十一月辛丑立管領民兵萬戶府諭行中書省臣曰古者寓兵於農有事則戰無事則耕暇則講武今兵爭之際當因時制宜所定郡縣民間武勇之材宜精加簡拔編緝為戶立民兵萬户府領之俾農時則耕閒則練習有事則用之事平有功者一體升擢無功者還為民如此則民無坐食之弊國無不練之兵以戰則勝以守則固庶幾寓兵於農之意也初胡大海取蘭溪分兵守要害遂進攻婺州已而婺州堅守不下太祖命李善長徐逹守建康甲子自率常遇春等兵十萬往征之由寧國道徽州召儒士唐仲實姚連等咨時務訪治道問民疾苦聞前學士朱升名召問之對曰髙築墻廣積糧緩稱王太祖悅命參帷幄十二月師至蘭溪先令和州人王宗顯往婺州偵探宗顯少攻儒業博涉經史避亂寓居嚴州胡大海薦之宗顯至婺近城五里舊識吳世傑家偵知城中守將各自為心還報太祖喜曰我得婺州命汝作知府元參知政事舒穆嚕宜孫守處州聞大軍攻婺州急與恭謀胡深章溢議守備造獅子戰車數百輛以其弟舒穆嚕厚孫守婺繼令深等將車師為援自率衆萬餘出縉雲以應之深至松溪觀望不敢進太祖謂諸將曰婺倚舒穆嚕宜孫故未肯即下聞彼以車戰來援此豈知變者松溪山多路狹車不可行以精兵遏之其勢即破援兵破則城中不勞而下矣翼日命胡德濟誘其兵於梅花門外縱擊大敗之深等遁去深之來也晨起見西北有黑氣東南有白氣長亘天頃之白氣為黑氣所蕩深知其不吉恐衆心驚懼謬曰今日有殺氣戰必勝已而戰敗城中勢益孤臺憲將臣畫疆分守意復不相能於是同僉寧安慶夜遣都事李相縋城請降約開東門納兵太祖許之甲申兵既入守將惶恐失措遂擒特穆爾喇實舒穆嚕厚孫等下令禁侵暴改婺州路為寧越府分置中書省召儒士許元葉瓉玉胡翰汪仲山等十餘人皆㑹食省中日令二人進講經筵敷陳治道以王宗顯知寧越府事命宗顯開郡學延儒士葉儀宋濓為五經師戴良為學正吳沉徐原為訓導時喪亂之餘學校久廢至是始聞絃誦聲無不舉手加額是月發倉賑貧民太祖既撫定寧越欲遂取浙東未下諸郡集諸將諭之曰克城雖以武而定民必以仁吾師比入建康秋毫無犯故一舉而遂定今新克婺州政當撫恤使民樂於歸附則彼未下郡縣亦必聞風而歸吾每聞諸將下一城得一郡不妄殺人喜不自勝蓋為將者能以不殺為心非惟國家所利即已亦蒙其福爾等從吾言則事不難就大功可成矣十九年春正月樂平儒士許瑗謁見瑗聰明過人至正初兩舉於鄉皆第一㑹試不第放浪吳越間每醉輒大言自負至是謁上於寧越曰方今元祚垂盡四方鼎沸夫有雄略者乃可馭雄才有竒識者乃能知竒士閣下欲掃除僣亂平定天下非收攬英雄難與成功太祖曰今四方紛擾民困塗炭豫用英雄有如饑渴方廣攬羣議博收衆䇿共成康濟之功瑗曰如此天下不難定也太祖喜即授博士留帷幄未幾以太平為股肱郡命瑗為知府三月甲午宥獄囚五月辛酉太祖將自寧越還建康召胡大海諭之曰寧越為浙東重地吾以爾才故特命爾守宋巴延布哈在衢其人多智術舒穆嚕宜孫守處州善用士紹興為張士誠將吕珍所據數郡與寧越密邇爾宜與同僉常遇春同心協力俟間取之此三人皆勍敵不可忽也遂還太祖既至建康以無為州逼近肘腋遣兵克之秋九月常遇春進兵攻衢州建奉天旗樹柵圍其六門造吕公車仙人橋長木梯懶龍爪擁至城下髙與城齊欲階以登城又於大西門城下穴地道攻之宋巴延布哈悉力捍禦以束葦灌油燒吕公車駕千斤稱鈎懶龍爪用長斧砍木梯築夾城防穴道遇春攻之弗克乃以竒兵出不意突入南門甕城毁其所架炮攻圍甚急院判張斌度不能支遣使約降夜出小西門迎大軍入衆遂潰擒宋巴延布哈遇春還寧越尋改寧越為金華府冬十一月胡大海耿再成進攻處州初再成駐兵縉雲之黃龍山規取處州黃龍四面陡絶再成樹柵其上以遏其衝敵兵來咸搗敗之元處州守將參政舒穆嚕宜孫遣元帥葉琛屯桃花嶺恭謀林彬祖屯葛渡鎮撫陳仲真等屯樊嶺元帥胡深守龍泉以拒我師士卒皆弛怠無鬪志胡深棄軍來降且言處州兵弱易攻大海即出軍樊嶺與再成合攻之桃花嶺據山巔最險厄再成間道出其後連拔桃花葛渡二寨遂薄城下壬寅宜孫戰敗棄城走建寧七邑皆下以再成統兵鎮之未幾宜孫收散卒欲復處州攻慶元再成復擊敗之宜孫戰死十二月遣使徴青田劉基浦江宋濓龍泉章溢麗水葉琛胡大海薦四人賢故遣使以書幣徴之時李文忠亦薦諸儒王褘許元黃天錫太祖皆徴用之二十年春正月命馮國勝為帳前總制親兵都指揮使先是馮國用卒太祖命勝襲兄職三月劉基宋濓章溢葉琛至建康入見太祖喜甚曰我為天下屈四先生賜坐從容與論經史及咨以時事甚見尊禮命有司創禮賢館處之基自幼聰明絶人凡天文兵法性理諸書過目洞識其要至正初以春秋舉進士授髙安縣丞纍官江浙儒學副提舉元政亂投劾去常建議勦方國珍不用安置紹興遊西湖有異雲起西北諸同遊者皆以為慶雲將分韻賦詩基獨縱飲不顧大言曰此天子氣也十年後應在金陵我當輔之時杭州猶全盛皆大駭以為狂無知基者惟西蜀趙天澤竒之以為諸葛孔明之流客有說基者曰今天下擾擾以公才略下括蒼併金華閩越可折簡而定因畫江守之此句踐之業也舍此不為欲悠悠安之基曰吾生平忿方國珍張士誠輩所為用子計與彼何殊耶且天命將有歸子姑待之㑹太祖下金華定括蒼基乃指乾象謂所親曰此天授非人力也既而總制官孫炎以上命遣使來聘基遂决計趨金陵陳時務十八䇿太祖嘉納之太祖一日從容問陶安曰劉基四人之才何如安曰臣謀略不及劉基學問不及宋濓治民之才不及章溢葉琛太祖深然之未幾以濓為江西等處儒學提舉司提舉遣世子受經以溢琛為營田司僉事基留帷幄預機密謀議二十一年春正月朔中書省設御座奉小明王行慶賀禮劉基怒曰彼牧豎耳奉之何為不拜太祖召基入問之基遂陳天命有在太祖大感悟乃定征伐之計三月丁丑改樞密院為大都督府以朱文正為大都督節制中外諸軍事二十二年春二月金華苖帥蔣英劉震等作亂殺恭將胡大海初苖帥楊旺扎勒為張士誠所殺劉震等從貝城自桐廬來降大海喜其驍勇置麾下待之不疑至是震等謀亂以大海遇已厚未忍發李福曰胡恭政待我輩甚厚然兵之柄在主將不殺主將則事不成舉大事寧暇顧私恩乎衆從之以書通衢處苖帥李祐之等約以二月七日同舉兵是日蔣英等陽請大海至八詠樓下觀弩大海出將上馬英令其黨鍾矮子跪於馬前陽訴曰蔣英等欲殺我大海未及答反顧英英䄂出鐵鎚若擊矮子狀因中大海腦仆地英即斷其首提於馬上以示同僉寧安慶院判張斌脅其從已復殺大海子關住執郎中王愷愷罵賊不屈劉震欲全之賊黨吳得真與愷有隙曰無自遺患遂殺愷及其子寅掾史章誠亦死之典吏李斌懷省印縋城走嚴州告變李文忠急遣何世明郭彥仁等率兵討之至蘭溪英等懼乃大掠城中子女走降張士誠世明軍入城張斌吳得真復來降世明知王愷為得真所害縛至馬前欲殺之斌力請曰殺一得真則降者皆懼後人不復來矣乃釋之大海養子德濟聞難引兵奔赴文忠亦率將士至金華鎮撫之民乃定丁亥處州苖帥李祐之賀仁德聞蔣英等殺胡大海亦作亂院判耿再成方與客飲聞變即上馬收軍不及迎戰罵曰死賊何負爾反耶賊直前刺再成中頸死分省部事孫炎被執賊環率守之脅炎降炎不屈大罵賊賊拔刀叱炎解衣炎曰此紫綺裘乃主賜吾者吾當服以死遂被害知府王道同及朱文剛皆不屈死文忠復調兵屯縉雲圖之時二郡煽亂衢州或謀翻城應之守將夏毅懼甚㑹劉基丁母憂回即迎入城一夕定之基發書各處屬縣諭以固守所部候諸軍同進討時再成子天璧方奉命往處州起發苖軍中途聞變馳至李文忠所得再成舊部曲朱絢等遂集各部將士㑹同邵榮王祐等往討賊遇賀仁德戰敗之癸酉復處州李祐之自殺賀仁德走縉雲耕者縛之檻送伏誅三月升同僉李文忠為浙江行中書省左丞總制嚴衢信處諸全軍馬二十三年春二月申將士屯田之令時康茂才屯積充仞他將皆不及特申諭及時開墾二十四年春正月李善長徐逹等以太祖功德日隆屢表勸進不允乃率諸臣奉上即吳王位建百官司屬以李善長為左相國徐逹為右相國常遇春俞通海為平章政事汪廣洋為右司郎中張昶為左司都事諭善長等曰卿等為生民計推戴豫然建國之初當先正紀綱元氏昏亂威福下移法度不行人心渙散遂致天下騷動今將相大臣當鍳其失協心圖治母茍且因循充位而已秋七月丁丑克廬州路徐逹常遇春攻廬州部將吳復先登挫敵降其驍將樓兒張左君弼窮蹙棄城走安豐遂克其城執君弼母妻送建康君弼部將許榮以舒城降二十五年春正月徐逹遣指揮張彬克辰州傅友德克衡州胡海克寶慶路靖州軍民安撫司來降朱文正遣恭政何文昱指揮薛顯討新淦鄧仲謙斬之擢顯江西行省參政時陳友諒既平荆襄南北次第皆下夏五月命平章常遇春取湖廣湘漢諸郡太祖嘗與徐逹常遇春論襄漢形勢謂曰安陸襄陽跨連荆蜀乃南北之襟喉英雄必爭之地今置不取將貽後憂况沔陽新附城中人民多陳氏舊卒壤地相鄰易於煽動辟之樹木安陸襄陽為枝沔陽為幹幹若有損枝葉何有今宜增兵守沔陽而出師取安陸襄陽庶幾不失其宜至是遂命遇春將兵往復調江西行省右丞鄧愈為湖廣平章政事諭之曰今遣遇春取安陸襄陽汝當以兵繼之凡得州郡駐兵撫輯近聞王保保居汝寧彼之所為如築堤壅水唯恐滲漏汝之往也能愛軍恤民則人心之歸正如穿穴其堤使水走下力少而功多愈奉命遂行時元同僉任亮擁衆栅守安陸遇春遣吳復將先鋒自沔倍道徑搗之傅友德奮兵進擊身被九創亮兵大潰遂生擒之乙未克安陸遇春表任亮壯毅可用釋之授指揮食事遇春兵至襄陽己卯守將棄城遁秋七月丁巳湯和帥師擊江西劇盜姚本所斬之取永新州戮左丞周安等仍命和回守常州時元思州宣慰使田仁厚遣使獻鎮逺吉州二府婺川等十縣龍泉等三十四州二十六年春正月禁種秫下令曰豫自創業江右十有二年軍國之費吾民效順轉輸心甚憫焉曩因民間造酒糜費米麥故行禁酒之令然不塞其源而欲遏其流不可也其令今歲農民毋得種秫五月時淮地悉平徐逹韓政等進兵攻安豐扼其四門晝夜環攻之於城東龍埧潜穿其城二十餘丈城壞辛未克安豐元將實都左君弼皆出走追奔四十餘里獲實都并君弼禆將賁元帥而還珠徹君弼走汴梁既而元將珠展引兵來救復戰敗走之八月庚申拓建康城初建康城西北控大江東盡白下門外距鍾山既濶逺而舊內在城因元南臺為宫稍隘太祖乃命劉基卜地定作新宫於鍾山之陽在舊城東白下門之外二里增築新城東北盡鍾山之趾延亘周圍凡五十餘里盡據山川之勝焉十二月韓魯爾卒于瓜步魯爾為劉福通所立都於亳徙安豐自安豐徙汴梁兵敗復走安豐安豐沒於張士誠乃走入建康諸將欲奉之劉基不可而止至是魯爾復自建康至瓜步卒于道太祖始及羣臣定議以明年為吳元年太祖吳元年元至正二十七年也春正月遣指揮戴德率兵取沅州二月命免應天太平鎮江諸郡租賦有差太祖謂中書省臣曰豫嘗親歷田野見人民凋敝土地荒蕪失業者多蓋因久罹兵革生息未遂豫甚念之且如太平應天諸郡乃渡江開創之地供億先勞之民其有租稅宜與量免少蘇民力省臣傅瓛對曰恤民王者之善政此真發政施仁之本也太祖因嘆曰吾昔在軍中嘗乏糧空腹出戰得食粗糲頗亦甘之今尊居民上飲食豐美繫念吾民居于田野所業有限而又供需百出豈不重困於是免太平租賦二年應天鎮江租賦一年已復免徐宿濠泗襄陽安陸等郡糧稅三年夏六月久不雨太祖减膳素食謂近臣曰豫以天旱率宫中素食往時宫中所需蔬菜醯醬皆出大官供給今皆以內官為之懼其煩擾於民也既而大雨太祖曰天雖雨害稼必多今欲弭天災但當謹於修己誠於愛民乃下令免今年田租相國李善長率諸臣勸太祖即皇帝位不許善長等力請曰殿下起濠梁不階尺土遂成大業四方羣雄剗削殆盡逺近之人莫不歸心誠見天命所在願早正位號以安臣民之望太祖曰我思功未服於天下德未孚於人心一統之勢未成四方之徒尚梗若稱大號未愜輿情自古帝王之有天下知天命之有歸人心之無外猶且謙讓未遑以俟有德常笑陳友諒初得一隅妄自尊大志驕氣盈卒致滅亡吾豈得更自蹈之若天命在我固自有時母庸汲汲也谷應泰曰語云始事者盛於東南收功者多於西北然秦據咸陽混一區宇漢都關中長轡六合於是談形勝者以為三吳於越勢同蕞爾無足貴也乃髙皇帝略定金陵分兵浙右經營江介之間蓽路偏隅之地若旦夕不能緩者勢有所不得已也蓋其時士誠國珍窺吾肘腋元人失馭彼且磨牙而爭我有遺利彼將乘之我有棄貨彼將資之顧安得而不汲汲耶方是時旺扎勒圖守鎮江楊仲英守寧國張明鑑據維揚巴爾斯布哈駐徽州舒穆嚕宜孫守處州其弟厚孫守婺州巴延布哈守衢州以至鄧仲謙拒命於新淦任亮擁衆於安陸十年之內諸將效忠天心佑順櫛風沐雨以次削平何其偉與然皆折矢費糧銖積寸纍婺括之間反者再起蓋戡亂若斯之難也假令半壁垂成虛名别奉惑諸將之議正魯爾之位則彼將遙擅太阿豫奪愛憎盆子聖公必隳大業時無青田沮散厥謀即江左非吾有也若夫命康茂才為營田使而積貯豐盈設民兵萬戶府而農戰復古規取襄漢諸郡而上游建瓴屈劉宋四先生而忠益漸廣凡諸良法美意靡不始自江南而王者大一統之業即肇基於此豈若典午之短馭建炎之弩末乎明史紀事本末卷二
