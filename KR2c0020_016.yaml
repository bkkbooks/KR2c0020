body:
  text: 明史紀事本末卷十六浙江提學僉事谷應泰編燕王起兵太祖洪武三年夏四月詔封皇子棣為燕王太祖第四子也十一年冬十二月定諸王宫城制式太祖曰除燕王宫殿仍元舊諸王府營造不得引以為式二十三年春二月命潁國公傅友德為將軍聽燕王節制征沙漠初燕王既之國太祖欲諸王知軍旅乃勑秦王晉王燕王督諸將分道北征已而秦王晉王師久不出燕王率友德等北出至伊埒圖山擒其將鼐爾布哈還二十五年夏四月丙子皇太子薨皇太孫生而額顱稍偏性聰頴善讀書然仁柔少斷太祖每令賦詩多不喜一日令之屬對大不稱㫖復以命燕王語乃佳太祖常有意易儲劉三吾曰若然置秦晉二王何地太祖乃止二十八年初諸王封國時太祖多擇名僧為傅僧道衍知燕王當嗣大位自言曰大王使臣得侍奉一白帽與大王戴蓋白冠王其文皇也燕王遂乞道衍得之道衍至燕邸薦鄞人袁珙相術燕王使召之至令使者與飲于酒肆王服衛士服偕衛士九人入肆沽珙趨拜燕王前曰殿下何自輕如此燕王陽不省曰吾輩皆護衛校士珙不對乃召入詳叩之珙稽首曰殿下異日太平天子也燕王恐人疑乃佯以罪遣之行至通州既登舟密召入邸三十一年閏五月太祖崩建文皇帝即位遺詔止諸王入臨㑹葬燕王入將至淮安齊泰言於帝令人賫勑使還國燕王不悅秋七月帝命李景隆訊周王橚逮至京廢為庶人燕王見周王被執且齊泰黃子澄用事遂簡壯士為護衛以勾逃軍為名異人術士多就之冬十月熒惑守心四川嶽池教諭程濟通術數上書言北方兵起期在明年朝議以濟妄言召入將殺之濟曰陛下幸囚臣至期無兵殺臣未晚也乃囚濟於獄十一月燕齊有告變者帝問黃子澄曰孰當先子澄曰燕王久稱病日事練兵且多置異人術士左右此其機事已露不可不急圗之復召齊泰問曰今欲圖燕燕王素善用兵北卒又徑奈何泰對曰今北邊有寇警以防邊為名遣將戍開平悉調燕藩護衛兵出塞去其羽翼乃可圖也從之乃以工部侍郎張昺為北平左布政使以謝貴為都指揮使俾察燕王動靜圖之魏國公徐輝祖燕王妃同産兄也時以燕事密告之帝大見信用詔加太子太傅與李景隆同掌六軍協謀圖燕建文元年春正月燕王遣長史葛誠入奏事帝密問燕邸事誠具以實告遣誠還燕使為內應至則燕王察其色異心疑之二月燕王入覲行皇道入登陛不拜監察御史曽鳯韶劾王不敬帝曰至親勿問戶部侍即卓敬密奏曰燕王智慮絶人酷類先帝夫北平者強幹之地金元所由興也宜徙封南昌以絶禍本帝覽奏袖之翼日曰燕王骨肉至親何得及此敬曰隋文楊廣非父子耶帝默然良久曰卿休矣三月燕王還國帝以都督耿瓛掌北平都司事都御史景清署北平布政司參議皆使覘燕邸事尋皆召還又遣官為採訪使分巡天下都御史暴昭採訪北平具以燕邸事密聞於朝請為之備北平按察司僉事湯宗上變告按察使陳瑛受燕金有異謀逮瑛安置廣西遂勑都督宋忠率兵三萬及燕府護衛精鋭俱選𨽻忠麾下屯開平名備邊仍命都督耿瓛練兵于山海關徐凱練兵于臨清密勑張昺謝貴嚴為之備又召燕番騎指揮關童等入京師燕王歸國即托疾久之遂稱篤夏四月太祖小祥燕王遣世子及其弟髙煦髙燧入臨或曰不宜偕往王曰令朝廷勿疑也及至京齊泰請并留之黃子澄曰不可疑而備之殆也不若遣還世子兄弟皆魏國公徐輝祖甥輝祖察髙煦有異志密奏曰三甥中獨髙煦勇悍無賴非但不忠且叛父他日必為大患帝以問輝祖弟增壽及駙馬王寧皆庇之乃悉遣歸國髙煦陰入輝祖廄取其馬以行輝祖使人追之不及初世子入京燕王大憂悔暨歸喜曰吾父子復得相聚天贊我也已而燕兵起髙煦戮力為多帝曰吾悔不用輝祖之言六月燕山護衛百戶倪諒上變告燕官校于諒周鐸等陰事逮繫至京皆僇之有詔責燕王王乃佯狂稱疾走呼市中奪酒食語多妄亂或臥土壤彌日不蘇張昺謝貴入問疾王盛夏圍爐搖顫曰寒甚宫中亦杖而行朝廷稍信之長史葛誠密告昺貴曰燕王本無恙公等勿懈㑹燕王使其護衛百户鄧庸詣闕奏事齊泰請執訊之具言王將舉兵狀齊泰即發符遣使往逮燕府官屬密令謝貴張昺圖燕使約長史葛誠指揮盧振為內應以北平都指揮張信為燕王舊所信任密勑之使執燕王信受命憂甚不敢言母疑問之信以告母驚曰不可吾故聞燕王當有天下王者不死非汝所能擒也信益憂未決亡何勑使趣之信艴然曰何太甚也乃往燕邸請見不得入乘婦人車徑至門求見乃召入拜於牀下燕王佯為風疾不能言信曰殿下無爾也有事當以告臣燕王曰疾非妄也信曰殿下不以情語臣上擒王矣當就執如有意勿諱臣燕王見其誠下拜曰生我一家者子也乃召僧道衍至謀事適暴風雨簷瓦墮燕王心惡之色不懌道衍以為祥王謾罵和尚妄烏得祥道衍曰殿下不聞乎飛龍在天從以風雨瓦墜天易黃屋耳王喜有布政司吏奈亨按察司吏李友直密以疏草示燕王因留匿邸中燕王出其疏草示護衛指揮張玉朱能等曰此何為者遂令玉等帥壯士八百人入衛貴等以在城七衛并屯田軍士圍王城又以木柵斷端禮等門未幾削爵及逮官屬詔至秋七月謝貴張昺督諸衛士皆甲圍府第索所逮諸官屬飛矢入府內燕王與張玉朱能等謀曰彼軍士滿城市吾兵甚寡奈何朱能曰先擒殺謝貴張昺餘無能為也燕王曰是當計取之今奸臣遣使來逮官屬依所坐名收之即令來使召昺貴付所逮者貴昺必來來則擒之一壯士力耳壬申王稱疾愈御東殿官僚入賀燕王先伏壯士左右及端禮門內遣人召貴昺不來復遣官屬內官以所就逮名往乃至衛士甚衆及門門者呵止之貴昺入燕王曵杖坐賜宴行酒出瓜數器曰適有進新瓜者與卿等嘗之燕王自進片瓜忽怒且詈曰今編户齊民兄弟宗族尚相恤身為天子親屬旦夕莫必其命縣官待我如此天下何事不可為乎擲瓜於地護衛軍皆怒前擒貴昺捽盧振葛誠等下殿王投杖起曰我何病迫於若奸臣耳遂曵貴昺等皆斬之貴昺諸從人在外者尚未知見貴昺移時不出各稍稍散去圍王城將士聞貴昺已被執亦潰散北平都指揮彭二聞變急跨馬大呼市中集兵千餘人欲入端禮門燕王遣健卒龎來興丁勝格殺二兵亦散燕王乃命張玉等率兵乘夜出攻奪九門黎明已克其八唯西直門未下王命指揮唐雲單騎往諭守者曰汝毋自苦今朝廷已聽王自制一方矣汝等亟下後者誅衆聞言皆散乃下令安集軍民三日城中大定都指揮使余瑱既與謝貴合謀不遂乃走守居庸關馬宣巷戰不勝東走薊州宋忠自開平率兵三萬至居庸關不敢進退保懷來癸酉燕王誓師以誅齊泰黃子澄為名去建文年號仍稱洪武三十二年署官屬以張玉朱能丘福為都指揮僉事擢李友直為布政司參議拜卒金忠為燕紀善金忠浙江鄞縣人精于卜燕師將起召忠卜之以大吉告遂署為紀善命侍帷幄用其謀策時布政司參議郭資按察司副使墨麟都指揮同知李濬陳恭等皆降下令諭將士曰豫太祖髙皇帝之子今為奸臣謀害祖訓云朝無正臣內有奸逆必舉兵誅討以清君側之惡用率爾將士誅之罪人既得法周公以輔成王爾等其體豫心乃上書曰皇考太祖髙皇帝艱難百戰定天下成帝業傳之萬世封建諸子鞏固宗社為磐石計奸臣齊泰黃子澄包藏禍心橚槫柏桂梗五弟不數年間並見削奪柏尤可憫闔室自焚聖仁在上胡寧忍此蓋非陛下之心實奸臣所為也心尚未足又以加臣臣守藩于燕二十餘年寅畏小心奉法循分誠以君臣大分骨肉至親恆思加慎為諸王先而奸臣跋扈加禍無辜執臣奏事人箠楚刺熱備極苦毒迫言臣謀不軌遂分宋忠謝貴張昺等于北平城內外甲馬騎突於街衢鉦鼓喧鞠于逺邇圍守臣府已而護衛人執貴昺始知奸臣欺詐之謀竊念臣於孝康皇帝同父母兄弟也今事陛下如事天也譬伐大樹先剪附枝親藩既滅朝廷孤立奸臣得志社稷危矣臣伏覩祖訓有云朝無正臣內有奸惡則親王訓兵待命天子密詔諸王統領鎮兵討平之臣謹俯伏俟命書奏詔削燕王屬籍甲戌燕王以郭資守北平出師次通州指揮房勝以城降張玉曰不先定薊州將為後患時都督指揮馬宣嚴兵守薊州燕王命玉帥兵往攻玉使人諭之不下環城攻之宣率衆出戰敗被執罵不絶口遂死之指揮毛遂以薊州降玉撫定薊州乘夜趨遵化戒將士止殺曰行師以得人心為本因簡勇士以夜四鼓登城開門而入城中始覺遵化衛指揮蔣玉密雲衛指揮鄭亨皆以城降甲申燕兵攻懷來時余瑱守居庸簡練關卒得數千人將進攻北平燕王曰居庸險隘北平之咽㗋我得此可無北顧憂瑱若據此是拊我背也宜急取之緩則增兵繕守後難圖矣令指揮徐安鍾祥等擊瑱瑱且守且戰援兵不至乃棄關走懷來依宋忠燕王曰宋忠握兵懷來必爭居庸宜乘其未至擊之諸將皆曰彼衆我寡難以爭鋒擊之未便宜固守以待其至王曰當以智勝難以力取彼衆新集其心不一宋忠輕躁寡謀狠愎自用乘其未定擊之必破矣遂帥馬步精鋭八千捲甲倍道而進王據鞍指揮有喜色先是宋忠紿將士云爾等家在北平城中皆為燕兵所殺尸積道路欲以激怒將士燕王令其家人張樹旗幟為先鋒衆遙識旗幟呼其父兄子弟相問勞無恙輒喜謂宋都督欺我倒戈走宋忠帥餘衆倉皇列陳未成王麾師渡河鼓噪而前都指揮孫泰先登頗有斬獲燕王擇善射者射泰中之流血被甲慷慨裹血而戰奮呼陷陳死忠軍大敗奔入城燕兵乘之而入忠匿於厠搜獲之并執余瑱皆不屈死都指揮彭聚亦力戰死當時諸將校為燕帥所俘者百餘人皆不肯降發憤死燕兵既克懷來山後諸州皆不守而開平龍門上谷雲中守將往往降附矣丙戌永平指揮陳旭趙彞郭亮以城降旭等遂從燕將徐忠分兵克灤河庚寅大寧都指揮卜萬與其部將陳亨劉貞引兵號十萬出松亭關駐沙河進攻遵化燕王聞之援遵化萬等退保松亭關萬有智勇陳亨陰欲輸欵于燕畏萬不敢發燕王貽萬書盛稱萬而詆亨緘識之召所獲大寧卒解縛賞勞俾歸密與萬故使同獲卒見之尋遣與俱至則同歸卒發其事陳亨劉貞搜得與萬書遂縛萬下獄聞于朝籍其家時帝方鋭意文治日與方孝孺等討論周官法度以北兵為不足憂黃子澄謂北兵素强不早禦之恐河北遂失乃以長興侯耿炳文佩大將軍印駙馬都尉李堅為左副將軍都督寧忠為右副將軍帥師北伐子澄又請命安陸侯吳傑江陰侯吳髙都督都指揮盛庸潘忠楊松顧成徐凱李文陳暉平安等帥師並進擢程濟為翰林編修充軍師護諸將北行吳傑等各帥偏師步騎號百萬數道並進期直搗北平檄山東河南山西三省合給軍餉帝誡諸將士曰昔蕭繹舉兵入京而令其下曰一門之內自極兵威不祥之極今爾將士與燕王對壘務體此意毋使朕有殺叔父名八月己酉耿炳文等率兵三十萬至真定徐凱率兵十萬駐河間潘忠駐鄚州楊松帥先鋒九千人據雄縣約忠為應張玉往覘炳文營還報燕王曰炳文軍無紀律其上有敗氣無能為潘忠楊松扼吾南路宜先擒之燕王恱躬擐甲胄帥師至涿州壬子屯於婁桑令軍士抹馬蓐食晡時渡白溝河謂諸將曰今夕中秋彼不備飲酒為樂此可破也夜半至雄縣緣城而上松與麾下九千人皆戰死獲馬八千餘匹燕王度潘忠在鄚州未知城破必引衆來援諭諸將曰吾必生擒潘忠諸將未喻遂命談淵領兵千餘渡月樣橋伏水中領軍士數人伏路側望忠等接戰即舉炮既而忠等果至王進兵逆擊之路傍炮舉水中伏兵起據橋忠戰敗趨橋不得燕兵腹背夾擊遂生擒忠餘衆多溺死燕王問諸將帥所嚮衆未有定玉曰當徑趨真定彼衆新集我軍乘勝可一鼓破之燕王曰善即趨真定耿炳文部將張保來降保言炳文兵三十萬先至者十三萬分營滹沱河南北燕王厚撫保遣歸詐言保兵敗被執幸守者困得脫竊馬歸又令言雄鄚敗狀燕兵旦夕且至諸將請曰今由間道不令彼知蓋掩其不備奈何遣保告之為備王曰不然始不知彼虛實故欲掩襲之今知其半營河南北則當令知我至其南岸之衆必移于北并力拒戰一舉可盡殱之兼使知雄縣鄚州之敗以奪其氣兵法所謂先聲後實也若徑薄城下北岸雖勝南岸之衆乘我戰疲鼓行渡河是我以勞師當彼逸力壬戌燕王率三騎先至真定東門突入其運糧車中擒二人訊狀南岸營果北移率輕騎數十繞出城西南破其二營炳文出城迎戰張玉談淵馬雲朱能等率衆奮擊燕王以竒兵出其背循城夾擊橫貫南陳炳文大敗奔還朱能與敢死士三十餘騎追奔至滹沱河東炳文衆尚數萬復列陳向能能奮勇大呼衝入炳文陳陳衆披靡自相蹂躪死者無算棄甲降者三千餘人騎士薛祿引槊中李堅墜馬獲之寧忠顧成及都指揮劉燧皆被執燕王謂堅至親送北平道卒謂成先朝舊人解其繫與語曰皇考之靈以汝授我因語以故言已泣下成亦泣遂遣人護送北平令輔世子居守炳文奔入真定軍爭門門塞不得入相蹈藉死者甚衆炳文入闔門固守吳傑帥師來援兵潰遁還燕兵攻城三日不能下燕王還北平以擒李堅功授薛祿指揮帝聞怒曰老將也而摧鋒奈何子澄曰勝敗常事毋足慮聚天下之兵得五十萬四面攻北平衆寡不敵必成擒矣曰孰堪將者子澄曰李景隆可比用景隆今破矣遂遣景隆代炳文臨行賜景隆通天犀帶親餞之江滸復賜斧鉞俾專征伐不用命者僇之召耿炳文回九月朔監察御史康郁上言臣聞人主親其親然後不獨親其親今諸王親則太祖之遺體也貴則孝康之手足也尊則陛下之叔父也乃殘酷豎儒持一己之偏見廢天下之大公方周王不軌進言則曰六國反叛漢帝削地執法則曰三叔流言周公是征遂使周王父子流離播遷周王既竄湘王自焚代王被廢而齊臣又告王反矣為計者必曰兵不舉則禍必加是則朝廷激變之也及燕之舉兵迄今兩月前後調兵者不下五十餘萬而乃一夫無獲謂之國有謀臣可乎陛下不察臣愚以為不待十年必有噬臍之悔矣伏願興滅繼絶釋齊王之囚封湘王之墓還周王于京師迎楚蜀為周公俾其各命世子持書勸燕以罷干戈以敦親戚天下不勝幸甚疏上帝不能用鎮守遼東江陰侯吳髙與耿瓛楊文帥師圍永平李景隆乘傳至德州收集耿炳文敗亡將卒并調各路軍馬五十萬進營于河間燕王聞之呼景隆小字曰李九江膏粱豎子耳寡謀而驕色厲而餒未常習兵見陳輒豫以五十萬衆是自坑之也復聞景隆軍中事燕王笑曰兵法有五敗景隆皆蹈之為將政令不修上下異心一也北平早寒南卒裘葛不足披冒霜雪又士無贏糧馬無宿藁二也不量險易深入趨利三也貪而不治智信不足氣盈而愎仁勇俱無威令不行三軍易撓四也部曲喧譁金鼓無節好諛喜佞專任小人五也九江五敗悉備保無能為然吾在此彼不敢至今往援永平彼知我出必來攻城回師擊之堅城在前大軍在後必成擒矣諸將曰北平兵少奈何王曰城中之衆以戰則不足以守則有餘兵出在外竒變隨用吾出非專為永平直欲誘九江來就擒耳吳髙怯不能戰聞我來必走是我一舉解永平圍且破九江也遂行而誡世子居守曰景隆來堅守毋戰也壬申燕軍援永平諸將請守盧溝橋王曰方欲使九江困于堅城之下奈何拒之燕師猝至永平吳髙不能軍退保山海關燕兵奔之斬首數千級燕王曰髙雖怯行事差密楊文勇而無謀去髙文不足慮也乃遣人貽二人書盛譽髙而詆文帝聞之削髙爵徙廣西獨命文守遼東耿瓛數請攻永平以動北平不聽冬十月燕兵趨大寧初太祖諸子燕王善戰寧王善謀洪武間燕王受命巡邊至大寧與寧王相得甚歡大寧領朵顔諸衛多降人驍勇善戰燕王既起兵謀取之而朝廷亦疑寧王與燕合削其三護衛燕王聞喜曰此天贊我也取大寧必矣乃為書貽寧王而陰率師兼程趨之諸將曰劉貞守松亭關急未易破李景隆兵方盛不如還師救北平以為後圖燕王曰今從劉家口徑趨大寧不數日可達大寧將士悉聚松亭關其家屬在城皆老弱居守師至不日可拔城破之日撫綏其家松亭之衆不降且潰矣北平深溝髙壘縱有百萬之衆未易以窺吾正欲其頓兵堅城之下還兵擊之如拉朽耳諸公第從豫行毋憂也乃自徑道捲斾登山從後攻度關至大寧克其西門獲都指揮房寬殺卜萬于獄都指揮朱鑑戰死劉貞陳亨引軍還援陳亨竟襲破貞率其衆降貞單騎負勑印走遼東浮海歸京師大寧既拔燕王駐師城外遂單騎入城㑹寧王執手大慟言北平旦夕且破非吾弟表奏吾死矣寧王為草表謝請赦居數日情好甚洽燕王鋭兵出伏城外諸親密吏士稍稍得入城遂令陰結三衛渠長及閭左思歸士皆喜定約燕王辭去寧王出餞郊外伏兵起執寧王諸騎士卒一呼皆集遂擁寧王入關與俱曰燕兵既得朵顔諸衛兵益盛分遣薛祿下富峪㑹川寬河諸處於是寧府妃妾世子皆携其寶貨隨寧王還北平李景隆聞燕兵攻大寧帥師進渡盧溝橋喜曰不守此橋吾知其無能為矣遂薄城下築壘九門景隆攻麗正門幾破城中婦女並乘城擲瓦礫景隆令不嚴驟退北平守益堅景隆遣别將攻通州又結九營于鄭壩村親督之以待燕王號令壘營人各為戰非受命不得輕動遂攻燒順城門燕府儀賔李讓與燕將梁明等拒守甚力世子嚴肅部署選勇士時時夜縋城砍營南軍擾亂退營十里唯都督瞿能奮勇與其二子帥精騎千餘殺入張掖門鋭不可當後不繼乃勒兵以待景隆忌能成功使人止之候大軍至俱進於是連夜汲水灌城天寒氷結明日不得登燕王至㑹州簡閲將士立五軍命都指揮張玉將中軍朱能將左軍李彬將右軍徐忠將前軍房寬將後軍軍各置左右副將以大寧歸附之衆分𨽻各軍十一月庚午李景隆移營向河西先鋒都督陳暉渡河而東燕王率兵至孤山列陳於北河西河水難渡是日雪默禱曰天若助豫則河氷合是夜氷果合遂率師擊敗前哨都督陳暉兵暉衆跳氷遁氷乃解溺死無算燕王見景隆兵動以竒兵左右夾擊遂連破七營逼景隆營張玉等列陳而進至城下城中亦出兵內外交攻景隆不能支宵遁翌日九壘猶固守北兵次第破其四壘諸軍始聞景隆走乃棄兵糧晨夜南奔景隆遂還德州燕諸將頓首賀王神算王曰偶中耳諸君所言皆萬全策也都督火真焚敝韉以暖燕王鎧者趨焉楯人呵之王曰止是皆壯士景隆師既敗黃子澄等匿不以聞帝曰外間近傳軍不利果何如子澄曰聞交戰數勝但天寒士卒不堪今暫回德州待來春更進子澄遂遣人密語景隆隱其敗勿奏乙亥燕王上書自理以誅齊泰黃子澄傳檄天下十二月加李景隆太子太師景隆之敗子澄不以聞且云屯德州合各處軍馬期以明年春大舉故有是命兼賜璽書金幣珍醖貂裘燕王諭諸將曰李九江集衆德州將謀來春大舉我欲誘之以敝其衆今帥師征大同大同告急景隆勢必來援南卒脆弱苦寒之地疲于奔命凍餒逃散者必多善戰者因其勢而利導之諸將曰善遂帥師出紫荆關攻廣昌守將楊忠以城降罷兵部尚書齊泰太常寺卿黃子澄以燕王疏列二人罪也二人名雖罷退實籌畫治兵如故薊州鎮撫曽濬起兵攻北平不克死之河北指揮張倫等率兩衛官軍自拔南歸曰矢死報國參贊軍務髙巍上書言臣願使燕曉以禍福遂遣至燕上書燕王曰太祖升遐皇上嗣位不意大王與朝廷有隙張皇六師臣以為動干戈不若和解君臣之義大明骨肉之親愈厚故願奉明詔置死度外親見大王昔周公聞流言即避位居東若大王能割首計者送京師解去護衛質所愛子孫釋骨肉猜忌之疑塞殘賊離間之口不與周公比隆哉慮不及此遂檄逺邇大興甲兵襲疆宇任事者得藉口以為殿下假誅左班文臣實欲效漢吳王倡七國誅朝錯大王獲罪先帝矣今大王據北平取密雲下永平襲雄縣掩真定數月以來尚不能出區區蕞爾之地較以天下十五而未有一焉大王將士殆亦疲矣大王同心之士大約不過三十萬大王與天子義則君臣親則骨肉尚在離間以三十萬異姓之士可保終身困迫死于殿下乎大王信臣言上表謝罪按甲休兵天意順人心和太祖在天之靈亦安矣不然執迷不回幸而兵勝得成後世公論謂何倘有蹉跌取譏萬世於斯時也追復臣言可得乎書再上不報二年春正月燕王進兵圍蔚州指揮王忠李逺以城降遂進攻大同李景隆帥師救大同出紫荆關燕王由居庸關入還北平景隆軍凍餒死者甚衆墮指者十二三委棄鎧仗于道不可勝紀二月韃靼率衆助燕夏四月朔李景隆㑹兵德州武定侯郭英安陸侯吳傑等進兵真定以圖燕帝賜景隆斧鉞旌旄中官齎往忽風雨舟壞沉于江復賜之景隆自德州進兵北伐軍過河間前鋒將至白溝河郭英等過保定期于白溝河合勢同進燕王率諸將進駐固安燕王謂丘福等曰李九江等皆匹夫無能為惟恃其衆耳然衆豈可恃也人衆易亂擊前則後不知擊左則右不應將帥不專政令不一甲兵糧餉適足為吾資耳爾等但秣馬厲兵以待張玉請先往駐白溝以逸待勞王從之命率衆先往既至三日景隆前鋒都督平安至白溝河是日燕兵渡五馬河駐蘇家橋其夜大雨平地水深三尺燕王坐胡床待旦忽見兵刃有火光如毬擊煜然上下金鐵錚錚作聲弓絃皆鳴燕王喜曰此勝兆也帝慮景隆輕敵乃遣魏國公徐輝祖帥京軍三萬為殿星馳㑹之己未李景隆及郭英吳傑等合軍六十萬號百萬次于白溝河列陳以待平安伏精兵萬騎遊擊燕王曰平安豎子從吾出塞識吾用兵以故敢為先鋒今日吾先破之安驍勇善戰鋒初交安奮矛率衆而前都督瞿能父子亦奮躍所向披靡殺傷燕兵甚衆燕兵遂却燕有內官狗兒者亦敢勇率千戶華聚力戰河北岸百戶谷允入陳得級七王親率兵夾擊殺數千人都指揮何清被執時已暝戰猶未巳至夜深始各收軍還是日也兩軍互相殺傷安軍哨馬失百餘匹而已景隆英傑藏火器地中人馬遇之輒爛戰既解燕王從三騎殿後迷失道下馬伏地視河流辨東西始知營自上流倉猝渡河而北燕王既收軍還營擢谷允指揮夜秣馬待戰使張玉將中軍朱能將左軍陳亨將右軍為先鋒丘福將騎兵繼之馬步十餘萬黎明燕軍畢渡瞿能率其子搗房寬陳平安翼之寬陳披靡擒斬數百人張玉等見寬敗有懼色王曰勝負常事耳彼兵雖衆不過日中保為諸君破之即麾精鋭數千突入左掖髙煦率張玉等軍齊進王先以七騎馳擊之且進且退如是者百餘合殺傷甚衆南軍飛矢如注射王馬凡三被創三易之所射矢三服皆盡乃提劍左右奮擊劍鋒折缺不堪擊馬却阻於隄幾為瞿能所及燕王急走登隄佯麾鞭若招後繼者景隆疑有伏不敢上隄而燕王復率衆馳入陳斬其騎數人平安善用鎗刀所向無敵北將陳亨徐忠皆被創已而安斬亨於陳忠兩指被砍未斷自斷而擲之裂衣裹鎗而戰髙煦見事急帥精騎數千前與王合髙煦接戰彼此相持而王亦疲矣日薄午瞿能復引衆躍而前大呼滅燕斬其騎百餘人越嶲侯俞通淵陸涼衛指揮滕聚復引衆赴之㑹旋風起折大將旞南軍相視而動王乃以徑騎繞出其後突入馳擊與髙煦騎兵合殺瞿能父子於陳平安與朱能戰亦敗於是列陳大崩奔走之聲如雷通淵與聚等皆死燕兵追至其營乘風縱火燔其營壘郭英等潰而西李景隆潰而南委棄器械輜重山積斬首及溺死者十餘萬燕兵追至鞾山月樣橋殺溺蹂躪死者復數萬橫尸百餘里景隆單騎走德州其降軍燕王悉慰遣之南師聞者皆解體是戰也魏國公徐輝祖帥軍為殿獨全軍而還壬戌燕王進攻德州五月辛未李景隆自德州奔濟南燕兵遂入德州籍吏民收府庫獲糧百餘萬自是兵食益饒哨騎至濟陽縣執教諭王省既而釋之省還升明倫堂集諸生曰此堂明倫今日君臣之義何在遂大哭諸生亦哭以頭觸柱而死先是山東參政鐵鉉方督餉赴景隆軍㑹景隆師潰東奔次臨邑諸城堡皆望風瓦解鉉與參軍髙巍酌酒同盟收集潰亡守濟南相與慷慨涕泣以死自誓及景隆奔就鉉燕王令諸將乘勝倍道而進庚辰至濟南景隆衆尚十餘萬倉猝出戰布陳未定燕王帥精騎馳擊之景隆復大敗單騎走於是燕兵列陳圍之鉉督衆悉力捍禦事聞乃升鉉為山東布政司使召李景隆還以左都督盛庸為大將軍右都督陳暉副之景隆還朝帝赦不誅黃子澄痛哭曰景隆出師觀望懷二心不亟誅何以謝宗社勵將士副都御史練子寧執而數之朝以哭請卒不問燕王圍濟南久令人射書城中促降有儒生髙賢寧在城中乃作周公輔成王論請罷兵不報燕王圍濟南已三月不下乃堰城外諸溪澗水灌城城中人大懼鉉曰無恐計且破之不三日遁矣鉉乃議令軍中詐降迎燕王入約壯士懸鐵板伏城上闉王且入則下鐵板拔橋計定使守陴之卒晝夜哭曰濟南魚矣亡無日矣乃撤守具出居民伏地請曰奸臣不忠使大王冒霜露為社稷憂誰非髙皇帝子誰非高皇帝臣民其降也然東海之民不習兵革見大軍壓境不識大王安天下子元元之意或謂聚而殱之請大王退師十里單騎入城臣等具壺漿而迎燕王大喜時王苦兵間謂濟南降即不得金陵可斷南北畫中原自守亟下令退軍王乘駿馬徐行張蓋率徑騎數人渡橋直至城下城門開守陴者皆登城伏堵間燕王比入門門中人呼千歲鐵板亟下傷燕王馬首王驚易馬而馳濟南人挽橋橋則堅燕王竟從橋逸去復合兵圍濟南鉉令守陴罵燕王大怒乃以駁擊城垂破鉉書髙皇帝神牌懸城上燕兵不敢擊鉉每出不意募壯士突擊燕兵破之燕王憤甚計無所出僧道衍進曰師老矣請暫還北平以圖後舉於是撤圍還北平鉉及盛庸等兵乘勢追之遂復德州兵勢大振上即軍中擢鉉為兵部尚書贊理大將軍軍事封盛庸為厯城侯九月朔詔大將軍盛庸總平燕諸軍北伐副將軍吳傑進兵定州都督徐凱等屯滄州宋參軍說鉉曰濟南天下之中北兵南來其留守者類老弱且永平保定雖叛諸郡堅守者實多郭布政輩書生公能出竒兵陸行抵真定南朝諸將潰逸者稍稍收合不數日可至北平其間豪傑有聞義而起者公便宜部署號召招徠之北平可破也北兵回顧家室必散歸徐沛間素稱驍勇公檄諸守臣倡義集勇候北兵歸合南兵征進者晝夜躡之公館榖北平休養士馬迎其至擊之彼腹背受敵大難旦夕平耳鉉以軍餉盡于德州城守五月士卒困甚而南將皆駑材無足恃莫若固守濟南牽率北兵使江淮有備北兵不能越淮歸必道濟吾邀而擊之以逸待勞全勝計也乃設宴天心水面亭犒問辛苦激發忠義冬十月燕王聞盛庸兵北回欲出兵攻滄州恐南師為備乃陽下令征遼東諸將士聞之不樂至通州張玉朱能請曰今密邇大敵而勤師逺征遼地寒早士卒不堪恐非利也燕王屏左右語之故曰今盛庸駐師德州吳傑平安守定州徐凱陶銘築滄州相犄角為吾梗德州城壁堅且敵衆所聚定州修築已完城守亦備皆難猝下獨滄州土城潰圯日久天寒地凍雨雪泥淖築城不易我乘其未備急趨攻之必有土崩之勢今佯言往征遼東因其懈怠偃旗捲甲由間道直搗城下破之必矣玉與能頓首稱善徐凱諜知北兵征遼東不為備遣兵四出伐木晝夜築城燕師至天津過直沽王語諸將曰彼所備者惟青縣長蘆今磚垜竈兒等坡無水彼不為備由此可徑至滄州城下乃下令軍士循河而南軍士疑曰征東何南也王曰夜有白氣二道自東北指西南占曰利南乃自直沽一晝夜疾行三百里遇偵騎盡殺之比曉至滄州凱猶不知督衆運土築城如故兵至城下乃覺亟命分守城堞衆皆股栗不能甲燕兵四面急攻之玉帥壯士由城東北隅肉薄而登遂拔其城先遣兵斷歸路生擒凱及都督陳暹都指揮俞琪趙滸胡原等斬首萬餘級餘衆悉降燕將談淵盡坑殺之械凱等至北平十二月燕王移直沽之舟至長蘆載降獲輜重順流而北王自率衆循河而南盛庸出兵襲後不克燕王遂至臨清移屯館陶掠大名焚軍餉甲午燕王至汶上掠濟寧盛庸鐵鉉率兵躡其後營于東昌先鋒將孫霖營滑口燕將朱榮劉江襲破霖軍都指揮唐禮被執霖走乙卯燕師至東昌庸與鉉等聞燕兵且至宰牛宴犒將士誓師勵衆簡閲精鋭背城而陳具列火器毒弩以待時燕軍屢勝見庸軍即鼓譟前薄盡為火器所傷㑹平安兵至與庸合於是庸麾兵大戰燕王以精騎衝左掖入中堅庸軍厚集圍燕王數重燕王自衝擊不得出朱能周長率畨騎奮擊東北角庸等撤西南兵往禦圍稍緩能衝入奮力死戰翼燕王出張玉不知王已出突入陳救之沒于陳庸軍乘勝擒斬萬餘人燕兵大敗遂北奔庸趣兵追之復擊殺者無算是役也燕王數危甚諸將奉帝詔莫敢加刃燕王亦知之故挺身出輒短兵接戰王騎射尤精追者每為所殺至是奔北獨以一騎殿後追者數百人不敢迫適髙煦領指揮華聚等至擊退庸兵獲部將數人而去燕王喜以煦肖已慰勞之薛祿亦數擊退南兵燕王聞張玉敗歿乃痛哭曰勝負常事不足慮艱難之際失此良輔殊可悲恨師還與諸將語每及東昌事曰自失張玉吾至今寢食不安遂涕下不已諸將皆泣後舉報功之典謂侍臣曰論靖難功當以張玉為第一追封榮國公河間王三年春正月辛酉朔東昌捷至詔褒賞將士召齊泰黃子澄還朝仍預軍事享太廟告東昌之捷初燕王師出僧道衍曰師行必克但費兩日耳及自東昌還道衍曰兩日昌也自此全勝矣二月燕王自撰文流涕祭陳亡將士張玉等脫所服袍焚之以衣亡者曰雖其一絲以識余心將士家父兄子弟見之皆感泣燕王因激勸將吏召募勇敢以圖進取乙未帥師南出進諸將士諭曰爾等懷忠奮勇每戰必勝可謂難矣比者東昌之役接戰即退遂棄前功夫懼死者必死捐生者必生白溝河之戰南軍先走故得而殺之所謂懼死者必死也爾等奮不顧身故能出萬死全一生所謂捐生者必生也自今無輕敵無選愞違者殺無赦己酉師至保定盛庸合諸軍二十萬駐德州吳傑平安出真定燕王與諸將議所向丘福等言定州府民新集城池未固攻之可拔王曰野戰易攻城難今盛庸聚德州吳傑平安駐真定相為犄角攻城未拔頓師城下必合勢來援堅城在前強敵在後勝負未可決也今真定相距德州二百餘里我軍界其中敵必出迎戰取其一軍餘自膽破諸將曰軍介兩敵使彼合勢夾攻吾腹背受敵奈何王曰百里之外勢不相及兩軍相薄勝敗在呼吸間雖百步不能相救況二百里哉明日遂移軍東出三月朔師次滹沱河遣遊騎哨定州真定多為疑兵誤之諜報盛庸軍夾河為營平安駐師單家橋燕兵由陳家渡過河逆之相距四十里辛巳盛庸軍及燕兵遇于夾河燕王以三騎覘庸陳庸結陳甚堅陳旁火車大銃強弩齊列王掠陳過庸遣騎追皆射却之乃以步騎萬餘薄庸陳攻其左掖庸軍擁盾自蔽矢刃不能入燕軍預作長􅗋約六七尺橫貫鐵釘于端釘末有逆鈎令勇士直前擲之直貫其盾亟不得出動則牽連乘隙急攻之庸軍棄盾走燕兵蹂陳而入南軍奔潰燕將談淵從軍中望見塵起遽出兵逆擊之莊得帥衆死戰淵與其部下指揮董中峯皆為得軍所殺朱能張輔率衆並進王自以徑騎繞出南軍背貫陳前出與能軍合庸軍火器不及發遂却都指揮莊得陷陳沒驍將楚智被執不屈死之張皂旗亦戰死張皂旗者常以皂旗先登燕軍畏之呼皂旗張及死猶執皂旗不仆是日戰酣迫暮皆斂兵入營燕王以十餘騎迫庸營野宿天明見四面皆庸兵左右請亟去燕王曰毋恐日出乃引馬鳴角穿敵營從容去諸將相顧莫敢發一矢燕王既還營復嚴陳約戰諸將曰昨日談淵逆擊太早故不能成功彼雖少挫尚鋭必欲絶其生路安得不致死我也今日爾等嚴陳戰我以精騎往來陳間敵有可乘之隙即入擊之兩陳相當將勇者勝此光武之所以破王尋也壬午復戰庸軍西南燕軍東北燕王臨陳督戰張竒兵往來衝擊自辰至未兩軍互勝負屢退屢進將士皆疲各坐息少頃復起戰相持不決忽東北風大起塵埃漲天沙礫擊面兩軍瞇目咫尺不見人北軍乘風大呼縱左右翼橫擊之鉦鼓之聲振地庸軍大敗棄兵走燕兵追至滹沱河踐溺死者不可勝計降者燕王悉縱遣之盛庸走德州當是時盛庸恃東昌之捷輕敵將士咸携金銀扣器錦繡衣袍曰破北平張筵痛飲至是盡為燕兵所獲燕王戰罷還營塵土滿面諸將不能識聞語聲始趨進見詔竄逐齊泰黃子澄于外令有司籍其家以謝燕人有司奉行徒為文具實使出外募兵也閏三月己亥吳傑等自真定引軍出欲與盛庸軍合未至八十里聞庸敗復還真定燕王語諸將曰吳傑若嬰城固守為上策若軍出即歸避我不戰是謂中策若來求戰則下策也我料其將出下策破之必矣乃下令軍士出取糧戒勿逺故令校尉荷擔抱嬰兒佯作避兵狀奔入真定報云燕軍各散出糧營中無備傑等信之乃謀輕師掩不備遂出軍滹沱河距燕軍七十里燕王聞之大喜薄暮趣兵渡河諸將請俟明旦王曰機不可失也稍緩之彼退守真定城堅糧足攻之難矣遂進王先策馬渡河河水深麾騎兵由上流並渡遏水令淺輜重步卒得由下流畢渡循河行二十里與傑軍遇于藁城㑹日暮燕王恐傑軍道去親率數十騎逼敵營宿以綴之明日吳傑等列方陳于西南以待燕王謂諸將曰方陳四面受敵豈能取勝我以精兵攻其一隅一隅敗則其餘自潰矣乃以軍糜其三面而親帥精鋭攻東北隅大戰右軍稍却薛祿馳赴奮擊出入敵陳馬蹶為南軍所執奪敵刀斬數人復跳而免督戰益力燕王親率驍騎循滹沱河繞出陳後突入大呼奮擊南軍矢下如雨集王所建旗如蝟毛焉燕師多被殺傷平安於陳中縛髙樓上可數丈登以望燕軍燕王以精騎衝之將及樓平安墜而走㑹大風起發屋拔樹燕軍乘之傑等師大潰燕王麾兵四向蹙之斬首六萬餘級追奔至真定城下又擒其驍將鄧戩陳鵬等盡獲軍資器械吳傑平安走入城南兵降于燕燕王悉釋之南還王遣使送所建旗還北平諭世子曰善藏之使後世勿忘也燕兵自白溝河至藁城三捷皆有風助之癸丑燕兵略順德廣平河北郡縣多降夏四月燕兵次于大名大名官吏迎燕兵諜者言齊泰黃子澄皆竄逐有司已簿録其家王乃上書稱臣燕王棣大略言齊黃剪削宗藩欲加死地故以兵自防誠不得已大軍之至每自摧衄臣不敢為喜輒用傷悼比聞齊泰黃子澄皆已竄逐臣一家喜有更生之慶而將士皆曰恐非誠心姑以餌我不然吳傑平安盛庸之衆當悉召還而今猶集境上是奸臣雖出而其計實行臣思其言恐亦人事或然也故不敢遽釋兵惟陛下斷而行之毋為奸邪所蔽書上帝以示方孝孺及侍中黃觀孝孺對曰諸軍大集燕兵久羈大名暑雨為沴不戰自罷急令遼東諸將入山海關攻永平真定諸將渡盧溝橋搗北平彼顧巢穴歸援我以大軍躡其後必成擒矣今宜且與報書往返踰日彼心解而衆離我謀定而勢合機不可失也帝曰善命孝孺草詔赦燕王父子及諸將士罪使歸本國勿預兵政仍復王爵永為藩輔遣大理少卿薛嵓齎往燕師又為榜諭數千言授嵓令至燕軍中密散諸將士嵓遂齎詔至燕軍燕王讀之怒問嵓臨行上何言嵓曰上言殿下旦釋甲謁孝陵暮即旋師燕王曰嚄是不可紿三尺兒而指侍衛將士曰有丈夫者嵓惶恐不能對諸將盡譁請殺嵓王曰奸臣不過數人嵓天子命使母妄言嵓戰栗流汗被體燕王乃耀武令各軍連營百餘里戈甲旗鼓相接而馳射其中使嵓觀之留數日遣中使送出境語之曰歸為老臣謝天子天子于臣至親臣父天子大父天子父臣同産兄臣為藩王富貴已極復何望天子素愛厚臣一旦為權奸讒搆以至於此臣不得已為救死計耳幸䝉詔罷兵臣一家不勝感戴但奸臣尚在大軍未還臣將士存心狐疑未肯遽散望皇上誅權奸散天下兵臣父子單騎歸闕下唯陛下命之嵓歸至京方孝孺私就問燕事嵓具以告且曰燕王語直而意誠又言其將士同心南師雖衆驕惰寡謀未見可勝孝孺默然嵓入見帝亦備述前意帝語孝孺曰誠如嵓言曲在朝廷齊黃誤我矣孝孺惡之曰此為燕游說也五月燕師駐大名吳傑平安發兵斷北平餉道燕王遣指揮武勝復奏書于朝大略言朝廷許罷兵而盛庸等攻北絶糧餉與詔㫖背馳帝得書有罷兵意以示方孝孺曰此孝康皇帝同産弟朕叔父也吾他日不見宗廟神靈乎孝孺曰陛下果欲罷兵耶即兵一罷散不可復聚彼長驅犯闕何以禦之今軍聲大振計捷書當不逺願陛下毋惑甘言上然之縛勝下錦衣獄燕王聞怒曰俟命三月今武勝見執是其志不可回矣彼軍駐德州資糧所給皆道徐沛以輕騎數千邀焚之德州必困若來求戰吾嚴師待之以逸待勞可必勝諸將皆曰善乃遣都指揮李逺等帥輕騎六千詣徐沛令易士卒甲胄與南師同插栁枝于背為識逺等至濟寧榖亭盡焚軍興以來儲積丘福薛祿合兵攻濟州塞濠登陴破其城遂潛兵掠抄沙河沛縣南軍不之覺糧船數萬艘糧數百萬悉為所焚軍資器械俱為煨燼河水盡熱漕運軍士散走京師大震德州糧餉遂艱李逺率兵還盛庸遣將袁宇以三萬人邀逺軍逺設伏擊敗之斬首萬餘級秋七月燕兵襲彰德時都督趙清守彰德燕王遣數騎日往來城下擾其樵採清遣兵追之則引而去於是城下乏薪拆屋而炊既而王令伏兵城傍山麓仍遣數騎至城下誘之清果遣兵出入伏擒殺千餘人南軍據尾尖寨梗餉道險隘難下燕王遣張禮間道夜襲擊下之乃使人招清清對使者言殿下至京城日但以二指許帖召臣臣不敢不至今未敢也王悅其言為之緩攻平安自真定率兵攻北平營于平村離城五十里擾其耕牧燕世子督衆固守遣人如燕王軍告急燕軍還次定州聞北平被圍王召劉江問策將安出江慷慨請行且曰臣方思之髙煦請與江先往江曰此不可疲于奔命徒為敵笑耳俄而曰臣策成矣王喜呼酒送其行江與王約曰臣至北平以炮響為號二次炮響則決圍三次炮響則進城若不聞第三炮則臣戰死矣臣若入城中既聞外間救至則守城軍士勇氣自倍宜令軍士人帶十炮為殿者放炮常不絶聲則逺近皆謂大軍既來平保兒必駭散矣保兒安小字也王大喜然其計江乃率兵渡滹沱由間道行張旗幟夜多舉火炬至則與安戰果如其策大敗之斬獲數千人安還走真定方孝孺門人林嘉猷嘗居北平邸中知髙煦髙燧弗恭于燕世子中官黃儼素奸險儼方曲事髙燧髙燧與世子協守北平髙煦從燕王軍時時傾世子而是時河北師老無功德州餉道絶方孝孺乃言於上曰兵家貴間燕父子兄弟可間而離也世子誠見疑王必北歸王歸而我餉道通事乃可濟上善之立命孝孺草書遣錦衣衛千户張安如燕貽世子令歸朝廷許以王燕世子得書不啓封遣人并安等送軍前中官黃儼者比書至北平則已先使人馳報燕王曰世子且反王疑之問髙煦髙煦曰世子固善太孫語未竟世子所遣使以書及張安至燕王啓視遽曰嗟乎幾殺吾子乃囚安等盛庸等檄大同守將房昭引兵入紫荆關略保定諸縣駐兵易州西水寨寨在萬山中昭欲據險為持久計窺北平燕王在大名聞之曰保定股肱郡保定失即北平危矣豈可不援遂下令班師八月師北渡滹沱河至完縣諸山寨民來附悉慰遣之令孟善填保定諜報吳傑遣都指揮韋諒以兵萬餘轉餉房昭軍燕王王曰昭據西水寨寨所乏糧耳使真定餽餉入昭得固守未易拔也率精騎三萬邀擊破之又命朱榮等以兵五千圍定州燕王曰我圍房昭寨急真定必來援然摧敗之餘進必不鋭我姑輕騎往定州彼聞必速來來則據險以待我還兵合擊必敗之援兵敗寨可不攻下也時圍寨久寨軍多南人天寒衣薄㑹夜霜月燕王令四面皆吳歌南軍聞之多淚下有潛下寨降者十月真定援兵果至燕王自定州還與圍寨兵合擊南兵於齊眉山下令勇士捲斾登山潛出陳後張旗幟寨中望見大駭與真定兵俱潰斬首萬餘級墜崖死者甚衆獲其將花英鄭琦王恭詹忠等惟房昭韋諒走免遂破西水寨還師北平十一月遣駙馬都尉梅殷鎮守淮安殷尚太祖女寧國公主有才智太祖特眷注之臨崩帝與殷侍側受顧命太祖謂帝曰燕王不可忽顧語殷曰汝老成忠信可託幼主出誓書及遺詔授之曰敢有違天者為朕伐之言訖崩至是燕兵漸逼諸將多選懦觀望乃召募淮南兵民令軍士號四十萬命殷統之駐淮上以厄燕師既而燕王遺殷書以進香金陵為辭殷答曰進香皇考有禁遵者為孝不遵者不孝割使者耳鼻口授數語詞甚峻王怒遼東守將楊文與王雄等引兵圍永平略薊州遵化諸郡縣燕王遣劉江率衆趨永平命江曰爾至永平敵必遁歸山海勿追之但聲言還歸北平既出則以夜捲旗囊甲復入永平城中楊文聞爾還北平復來爾速出擊之必大獲江如言果敗文兵于昌黎殺數千人獲將士王雄等燕王還北平悉縱遣之仍令歸諭楊文等時燕王起兵三年所得止永平大寧保定旋得旋棄戰死者甚多南軍分布頗盛時時告捷廷議多謂燕出沒勞苦軍少不足慮帝又御內臣甚嚴皆怨望遂密謀戴燕王告以金陵空虛宜乘間疾進王亦太息曰頻年用兵何時可已政當臨一決不復返顧矣於是踰城不攻決計趨金陵十二月燕師出北平駐軍蠡縣復移營汊河命李逺率輕兵前哨四年春正月命魏國公徐輝祖率京軍往援山東燕李逺兵至藁城遇德州禆將葛進領馬步萬餘為前鋒乘氷渡滹沱河半渡逺進擊之進望見逺兵少斂退繫馬林間以步卒來戰逺佯却進來追逺分兵潛出其後解縱所繫馬前軍奮擊之進軍退失馬遂大敗斬首四千餘級進僅以身免燕將朱能率輕騎千人哨至衡水遇都督平安遣兵復通州能擊之斬首七百餘級生擒部將賈榮等燕王乃以師由館陶渡見一病卒仆道傍王命左右以從馬載之曰壯士為我也聞者感泣進攻東阿破之指揮詹璟被執吏目鄭華死之攻汶上都指揮薛鵬被執師至沛縣知縣顔伯瑋知勢不敵遣縣丞胡先詣徐州告急預送其子有為出走令還告其父母云子職弗能盡矣賦詩書公署壁間夜二鼓師至東門指揮王顯以城降師遂入伯瑋衣冠南向再拜慟哭曰臣無以報國乃自縊死子有為不忍去復還自剄以從無何將士擒主簿唐子清典史黃謙至皆死之胡先還收伯瑋父子尸葬之城南沛縣既破燕師遂向徐淮燕王久不見南師出遣畨騎指揮欵台帥十二騎前覘至鄒縣遇南師轉餉卒三千人欵台大呼馳入其陳曰燕王大軍至矣轉餉卒驚潰擒千戶二人歸燕王曰欵台以十二騎破三千人真壯士命左右録其功遂進師徐州守將閉城不出燕王欲驅兵南進而士卒多散出取糧恐後至者為城中兵所掩乃伏兵九里山又先匿百餘騎演武亭令數騎往來城下誘之城中兵不出乃嫚罵焚其廬舍徐發一矢射城上抵暮乃去明日復如之城中不勝怒乃開門以兵五千出追所遣騎按轡徐行既渡河炮舉伏發燕王親率徑騎馳西門斷其歸路腹背夾擊之城中兵大潰爭渡橋橋壞溺死千餘人斬首數千級餘皆奔入城後單騎往來城下城中兵竟不敢出乃以師南行三月師趨宿州燕王謂諸將曰敵綴我當備之乃留都指揮金銘將游騎百人哨其後戒之曰敵至見爾孤軍必追襲爾列隊徐行彼疑爾為誘必不敢進吾令都指揮冀英先以數騎伏河南覘爾渡河如敵來追即舉炮敵疑有伏猶豫未決爾師畢渡矣銘往果遇南軍萬餘徐行臨河南軍來追冀英連舉炮南軍即斂退銘遂得渡河與燕王㑹宿州乃進兵蒙城渦河等處平安率馬步兵四萬躡燕軍燕王曰此濵河多林木彼必疑有伏淝河地平無樹彼不疑可伏兵遂親率騎二萬持三日糧至淝河按伏勑諸軍皆束炬相屬於道戒之曰俟與敵戰則舉火一炬舉餘炬皆應敵見舉炬火多必驚潰按兵數日敵不至糧且盡諸將請還師燕王曰彼逺來鋭氣求戰肯委之而去耶但一敗其前鋒彼自奪氣姑按甲待之時迫暮令畨騎指揮欵台以數騎往哨去南營四十里聞其更鼓還報南軍且必至王喜命王真劉江各將百騎往逆之戒以緣路按伏遇敵誘入伏與戰又令王真束草置囊中如束帛狀載馬上南軍來追擲於地使往取亂之真等進與安軍遇相接戰南軍追至擲囊餌之南軍競往取囊陳稍亂又入伏內伏發南軍還走燕王率兵至平安以三千騎走北岸燕王以數十騎當之平安禆將火耳灰者故燕畨騎指揮素驍勇被召入京師遂𨽻平安麾下持矟直犯燕王相距十步許燕王令胡騎指揮童信射其馬蹶遂獲火耳灰者其步曲哈尚特穆爾亦勇見火耳灰者被獲持矟突陳亦射擒之平安易服以數騎走燕王率兵追之南軍大敗驍將林特穆爾等被執平安退屯宿州是日釋火耳灰者令入宿衛諸將以為言不聽燕兵破蕭縣知縣陳恕死之燕王以師向臨淮諭將士曰我師利在速戰敵駐宿州為持久計若斷其糧餉彼不攻自潰矣乃遣談清帥兵至徐州擊轉餉兵大破之南至淮河又燒餉舟甚衆清還南軍圍之燕王見清旗幟亟馳往援鐵鉉來戰燕軍不利却王馳入陳火耳灰者翼之殺南軍數十人南軍披靡欲南遁燕王常以騎兵綴之又遣陳文李逺哨淮河擊敗守淮兵數千人夏四月平安營於小河燕兵據河北燕王令陳文扼要處為橋先渡步卒輜重騎兵隨之遂分兵守橋明日總兵何福列陳十餘里張左右翼緣河而東燕王帥騎兵戰福麾步兵而前爭所守橋福率後軍來援奮擊破之俘獲數百人遂斬陳文于陳平安轉戰圍王真數重真身被十餘創自刎馬上平安遇王于北坂王急幾為安槊所及馬蹶不得前燕畨騎指揮王騏躍馬入陳援燕王得脫南軍奪橋而北勇氣百倍燕將張武率勇敢士自林間突出與王騎合擊却之指揮丁良朱彬被執燕將都指揮韓貴亦戰死於是南軍駐橋南北軍駐橋北相持者數日南軍糧盡採蕪而食燕王曰南軍饑更一二日餉稍集未易破也乃留兵千餘守橋而潛移諸軍輜重去南營三十里夜半渡兵而南繞出其後比旦始覺時徐輝祖軍至甲戌大戰齊眉山自午至酉勝負相當蔚州衛千戶李斌馬蹶為南軍所擒猶力斬數人乃死是時南軍再捷王真陳文李斌皆驍將敗沒燕諸將皆懼說燕王曰軍深入暑雨連綿淮土蒸濕且疾疫小河之東平野多牛羊二麥將熟若渡河擇地休息士馬觀釁而動可持久也燕王曰兵事有進無退勝形成矣而復北渡士不解體乎公等所見拘攣耳下令曰欲渡河者左不欲渡河者右諸將多趨左王怒曰公等自為之朱能曰諸君勉矣漢髙十戰而九不勝卒有天下豈可有退心燕王不解甲者數日南軍相慶時廷臣有曰燕且北矣京師不可無良將帝因召輝祖還何福軍聲遂孤時南軍所至掘塹作壘為營軍士通夕不得休暨成而將旦復行往往虛敝人力故臨陳之際卒先罷困燕王行營不為塹壘但分布隊伍列陳為門敵不敢犯故將士至營即得休息自便暇則射獵周覽地勢得禽輒頒將士每拔破壘悉以所獲財物賚之人樂為用至是對壘日久諜報南師糧運且至燕王語諸將曰敵慮我擾必分兵護之乘其兵分勢弱必不能支遂遣朱榮劉江等率輕騎截南軍餉道又令游騎擾其樵採何福乃下令移營靈壁就糧時南軍運糧五萬平安帥馬步六萬護之使負糧者居中燕王覘知之分壯士萬人遮援兵而令髙煦伏兵於林間戒伺敵戰疲即出擊於是躬率師逆戰以騎兵為兩翼安引軍突至殺燕兵千餘矢下如雨王麾步軍縱擊橫貫其陳斷而為二南軍遂亂何福等出壁與安合擊殺燕兵數千却之髙煦窺見南師罷即帥衆自林間突出王還兵掩擊其後福等大敗殺傷萬餘人喪馬三千餘匹燕師盡獲其糧餉福等以餘衆入營塞壘門堅守是夜福下令期明日聞炮聲三即突圍出師就糧于淮河庚辰燕軍攻靈壁營王躬率諸將先登軍士蟻附而上燕兵三震炮福軍誤為已炮急趨門門塞不得出營中紛擾人馬墜濠塹皆滿燕兵急擊之遂破其營指揮宋垣力戰死何福遁走副總兵陳暉平安參將都督馬溥徐真都指揮孫晟王貴等皆被執參贊軍務禮部侍郎陳性善大理寺丞彭與明皆死之平安被俘見王曰淝河之戰公馬不躓何以遇我安大言曰刺殿下如拉朽耳王太息曰髙皇帝好養壯士釋之遣還北平自是南軍益衰矣黃子澄聞之撫膺大慟曰大事去矣吾輩萬死不足贖誤國之罪是月上用齊泰黃子澄謀調遼兵十萬至濟南與鐵鉉合以絶燕兵後總兵楊文至直沽遇燕將宋貴截殺師潰文被執竟無一人至濟南者五月燕兵至泗州守將周景初舉城降燕燕王謁祖陵泣曰橫罹權奸幾不免矣幸賴祖宗得今日拜陵下陵下父老來見悉賜牛酒慰勞遣之師抵淮盛庸領馬步兵數萬戰艦數千列淮之南岸燕兵列北岸相對燕王命􅋈舟編筏揚旗鼓噪指麾若將渡者南軍望之有懼色潛遣丘福朱能狗兒等將驍勇數百西行二十里以小舟潛濟南軍不之覺也及漸近營舉炮南軍駭愕福等前奔之南軍棄甲走庸股栗不能上馬其下掖之登舟單舸脫去北兵盡獲其戰艦遂濟淮駐南岸是日攻下盱眙燕王乃㑹諸將議所向或欲先取鳳陽遏其援兵乃以兵趨滁和集舟渡江别遣一軍西搗廬州出安慶據長江之險或欲以淮揚為根本次取髙郵通泰以及真揚遂可渡江無後顧憂燕王曰鳳陽城守固非盡力攻取不易下恐震驚皇陵淮安髙城深池兵強糧足若攻之不拔曠日持久援兵四集力屈形見非我之利今宜乘勝直趨揚州指儀真兩城勢單弱兵至可招之而下既得真揚則淮安鳳陽人心自懈我聚舟渡江久則必有內變諸將皆頓首稱善遂以師趨揚州遣使吳玉招諭守將王禮先是禮聞燕師至謀舉城降時監察御史王彬巡江淮治揚州倚任指揮崇剛練兵繕濬城濠晝夜不解甲與彬共守揚州城禮既有異謀彬與剛知之執禮及其黨繫獄有力士能舉千斤彬常以自隨燕兵飛書城中有縛王御史降者官三品左右憚力士莫敢縛禮弟宗者厚誘力士母呼其子出㑹彬解甲浴盤中為千户徐政張勝所縛遂出禮于獄開門降庚子燕兵至天長禮等縛二人以獻不屈皆死燕王遂至揚州命禮同指揮吳庸等諭下髙郵通泰諸城并集舟以備渡江燕兵至髙郵指揮王傑降遂克儀真立大營于髙資港儀真既破北舟往來江上旗鼓蔽天京師聞北兵漸近益危懼遣侍中許觀修撰王叔英募兵廣德諸郡都御史練子寧募兵杭州燕王駐師江北朝廷六卿大臣多為自全計求出守城都城空虛帝下詔罪已遣使四出徴勤王兵方孝孺曰事急矣宜以計緩之遣人許割地稽延數日東南募兵當至長江天塹北兵不間舟楫相與決戰於江上勝敗未可知帝從之乃以吕太后命遣慶城郡主如燕師議和以割地分南北為請郡主燕王從姊也燕王見郡主哭郡主亦哭燕王問周齊二王安在郡主言周王召還未復爵齊王仍拘囚燕王益悲不自勝郡主徐申割地議燕王曰凡所以來為奸臣耳皇考所分吾地且不能保何望割也但得奸臣之後謁孝陵朝天子求復典章之舊免諸王之罪即還北平祗奉藩輔豈有他望此議蓋奸臣欲緩我師俟逺方兵至耳郡主默然辭歸燕王送之出曰為我謝天子吾與上至親相愛無他意幸不終為奸臣所惑更為我語諸弟妹吾幾不免賴宗廟神靈得至此相見有日矣郡主還具言之帝出語方孝孺且問曰今奈何孝孺曰長江可當百萬兵江北船已遣人燒盡北師豈能飛渡寧波知府王璡永清典史周縉募兵勤王六月癸丑朔燕王命都指揮吳庸集髙郵通泰船于瓜州命內官狗兒狗兒後賜名彥回領都指揮華聚為前哨兵至浦子口盛庸諸將逆戰敗之燕王欲且議和北還㑹髙煦引北騎至王大喜遽起按甲仗鉞撫煦背曰勉之世子多疾於是煦殊死戰燕王率精騎直衝庸陳庸軍小郤朝廷大臣多遣使來燕軍獻渡江及入京城策者帝方遣都督僉事陳瑄率舟師往援庸瑄乃降燕時兵部侍郎陳植督師江上麾下謀迎降金都督首欲叛去植以大義責之遂為所殺金率衆降燕且邀賞燕王立誅之具棺斂植遣官護葬于白石山乙卯陳瑄具舟至江上來迎燕王乃祭大江之神誓師渡江舳艫相銜旌旗蔽空金鼓大震微風輕揚長江不波盛庸所駐海艘列兵沿江上下二百里皆大驚愕師漸近岸庸等整衆以禦燕王麾諸將鼓譟先登以精騎數百衝庸軍庸師潰追奔數十里庸單騎遁餘將士皆解甲降諸將請徑薄京城燕王曰鎮江咽㗋之地若城守不下往來非便先下鎮江則彼勢益危矣乃令來降海舟懸黃幟往來江中鎮江城中望見驚曰海舟皆已降吾將何為其守將童俊率衆降帝聞江上海舟暨鎮江皆降甚憂鬱徘徊殿廷間召方孝孺問計孝孺即班中執李景隆請誅之曰壞陛下事者此賊也羣臣鄒公瑾等十八人即殿前毆景隆幾死請亟加誅不聽孝孺曰城中尚有徑兵二十萬城髙池深糧食充足盡撤城外居民驅入城城外積木皆令民運入彼無所據其能久駐乎帝從之下令軍民商賈晝夜撤屋運木盛暑中饑渴勞苦死者相枕藉民憚于運木多自縱火焚其居火連日不息西南城崩役兵民修築未竟東北復崩民晝夜不得息方孝孺請令諸王分守城門乃命谷王橞安王楹分守都城門遣李景隆及兵部尚書茹瑺都督王佐往龍潭仍以割地講和為辭觀虛實以待援兵景隆瑺至龍潭見燕王伏地叩頭而已燕王笑曰勤勞公等至此有言乎景隆等惶恐叩頭稍稍及割地事燕王曰公等說容耶始吾未有過舉輒加之大罪削為庶人云大義滅親吾今救死不暇何用地為且今割地何名皇考裂土分封吾故有地矣此又奸臣計也凡所以來欲得奸臣耳公等歸奏上但奸臣至吾即解甲謝罪闕下謁孝陵歸奉北藩永祗臣節天地神明在上景隆瑺還報命帝令景隆再如師言罪人已竄逐候執至來獻景隆趦趄帝令諸王與偕既至燕王見諸王相勞苦諸王具述帝意燕王曰諸弟試謂斯言誠僞諸王曰大兄洞見矣燕王曰吾來但欲得奸臣耳不知其他遂宴諸王遣歸帝㑹羣臣慟哭或勸帝且幸浙或曰不若幸湖湘方孝孺請堅守京城以待援萬一不利車駕幸蜀收集士馬以為後舉齊泰奔廣德州黃子澄奔蘇州逃難且促徴兵時王叔英在廣德募兵無應者子澄欲航海徴兵于外洋不果帝太息曰事出汝輩而今皆棄我去乎長吁不己癸亥燕先鋒將劉保華聚哨至朝陽門外燕王慮京城完繕四方或有勤王者日夜為攻城計乃命保等領先鋒騎兵千餘哨至朝陽門覘知無備還報燕王大喜乃整兵而進先是左都督徐增壽謀應燕御史魏公冕等請誅之不聽至是燕兵進屯金川門帝乃命左右捽增壽至責以大義斬之時谷王橞與李景隆守金川門燕兵至遂開門降魏國公徐輝祖率師迎戰敗績王馳千餘騎衛周齊二王周王曰吾死矣曰燕王之騎兵也乃喜入見拜且哭燕王亦哭已並轡至金川門下馬登樓燕王具言被讒罹禍不得已舉兵之由與周王相勞苦時朝廷文武俱降來迎帝左右唯數人遂盡閉諸后妃宫內縱火焚之挈三子變服出走倉皇復棄三子於宫門被燕軍執置師中帝遂遜國去是日茹瑺先羣臣叩頭勸進文臣迎附知名者吏部右侍郎蹇義戶部右侍郎夏原吉兵部侍郎劉俊右侍郎古朴劉季箎大理寺少卿薛嵓翰林學士董倫侍講王景修撰胡靖李貫編修吳溥楊榮楊溥𫝊書黃淮芮善待詔解縉給事中金幼孜胡濙吏部郎中方賔禮部員外宋禮國子助教王達鄭緝吳府審理副楊士竒桐城知縣胡儼揭榜左班文臣二十九人太常寺卿黃子澄兵部尚書齊泰禮部尚書陳迪文學博士方孝孺副都御史練子寧禮部侍郎黃觀大理少卿胡閏寺丞鄒瑾戶部尚王鈍侍郎郭任盧逈刑部尚書侯泰侍郎暴昭工部尚書鄭賜侍郎黃福吏部尚書張紞侍郎毛太亨給事中陳繼之御史董鏞曽鳳韶王度髙翔魏公冕謝升前御史尹昌隆宗人府經厯宋徵卓敬修撰王叔英户部主事巨敬燕王指以上諸人為奸臣别其首從先是出賞格凡文武官員軍民人等綁縛奸臣為首者升官三級為從者升二級綁縛官吏為首者升二級為從者升一級有司奉㫖出示自是擒獲得官者甚衆乘機報私讐劫掠財物者紛紛雖禁不能止也既而鄭賜王鈍黃福尹昌隆皆迎駕歸附自陳為奸臣所纍乞宥罪令復其官以茹璫李景隆言并宥張紞復為吏部尚書餘皆不宥尋復揭榜于朝堂增徐輝祖葛成周是修鐵鉉姚善甘霖鄭公智葉仲惠王璉黃希范陳彥回劉璟程通戴德彞王艮盧原質茅大芳胡子昭韓永葉希賢林嘉猷蔡運盧振牛景先周璿等共五十餘人丙寅諸王及文武臣請即位燕王曰豫始遘於難不得已以兵救禍誓除奸惡安宗社庶幾周公之勳不意少主不亮豫心自絶於天今纘承洪業當擇有才德者顧豫菲薄豈敢負荷諸王及文武大臣皆頓首曰天生聖人為宗社生民主今天下者太祖之天下生民者太祖之生民天下豈可一日無君殿下為太祖嫡嗣德冠羣倫功在社稷宜正天位使太祖萬世之洪業永有所托丁卯諸將上表勸進戊辰諸王上表勸進燕王再辭諸王羣臣頓首固請燕王乃命駕將入城學士楊榮迎駕前曰殿下先入城耶先謁孝陵耶燕王悟遂謁孝陵畢入城燕王曰諸王羣臣以為奉宗廟宜莫如豫宗廟事重豫不足稱今辭弗獲勉狥衆志諸王羣臣各宜協心輔豫不逮遂詣奉天殿即皇帝位諸王文武羣臣皆上表稱賀復周王橚齊王槫封爵先是建文中有道士歌于途曰莫逐燕逐燕日髙飛髙飛上帝畿已而忽不見人莫能測至是始驗其言云清宫三日諸宫人女官內官多誅死惟得罪于建文者乃得留上詰問宫人內侍以建文帝所在皆指認后尸應馬乃出尸於煨燼中哭之曰小子無知乃至此乎召翰林侍讀王景問葬禮當何如景對曰當葬以天子之禮從之復諸殿門舊名革去興宗孝康皇帝廟號仍舊諡號懿文皇太子遷太后於懿文陵降封吳王允熥為廣澤王衛王允熞為懷恩王徐王允熙為敷惠王尋復降允熥允熞為庶人允熙改封甌寧王後皆不得其死追封都督徐增壽為武陽侯帝念增壽之死痛悼不已故即位首褒封之尋進爵定國公子孫世襲中山王之後一門二公焉下魏國公徐輝祖于獄時武臣無一人不歸附者惟輝祖不屈帝親召問輝祖不出一語始終無推戴意法司迫取供招輝祖默然操筆惟書其父開國功臣子孫免死而已帝大怒以元勳國舅欲誅又輒中止徘徊久之竟從寬典止勒歸私第革其祿米而已録用建文中所罷斥諸臣馬興張得李諒等宥前御史尹昌隆命為北平按察司知事初燕兵南下昌隆上書言今事勢日去而北來奏章有周公輔成王之語不若罷兵息戰許其入朝彼既欲伸大義於天下不應便相違戾設有蹉跌便須舉位讓之猶不失藩王也若沈吟不斷禍至無日進退失據雖欲求為丹徒布衣不可得矣不報及是按名捕治奸黨昌隆被執將就刑當陛大呼曰臣曽上章勸以位讓陛下奏牘尚存可覆案也帝乃命停刑閲其奏流涕曰火燒頭若早從此言南北生靈可免酷禍朕亦無此勞苦也詔貸其死得建文時羣臣封事千通命解縉等閲視凡言兵食事宜者留覽餘有干犯者悉焚之既而從容問縉等曰爾等宜皆有之衆稽首未及對修撰李貫對曰臣實無之帝曰爾以獨無為賢耶食其祿則思任其事當國危之際近侍獨無一言可乎朕非惡乎盡心於建文者但惡導誘建文壞祖宗法亂政經耳爾等前日事彼則忠於彼今日事朕則忠於朕不必曲自隱蔽也帝臨朝詰問建文中變亂官制顧侍臣太息曰只如羣臣散官一事前代沿襲行之已久何關利害亦欲改易且陵土未乾何忍紛紛為此又曰凡開創之主其經厯多謀慮深每作一事必籌度數日乃行亦欲子孫世守之故詩書所載後王之言必曰不愆不忌率由舊章干戒警後王必曰率乃祖攸行曰監於先王成憲此皆老成之言後世輕佻諂諛之徒以其私智小見導嗣君改易祖法嗣君不明以為能而寵任之狥小人之智謀至于國弊民叛而喪其社稷者有之矣豈可不以為戒時吏部尚書張紞懼退而自經死秋七月壬午朔大祀天地于南郊以即位詔天下大赦仍以洪武三十五年為紀改明年為永樂元年建文以來祖宗成法有更改者悉復舊制幽建文帝少子於中都廣安宫後莫知所終召前北平按察使陳瑛至京以為都察院右副都御史初瑛坐交通藩邸謫廣西帝即位首召用之瑛怨建文諸臣最深既而瑛奏言建文之臣如黃觀廖升王叔英周是修顔伯瑋皆不順天命而效死于建文計其存心與叛逆無異宜加追戮帝曰朕初舉義誅奸臣不過齊黃數輩耳其後二十九人中如張紞王鈍鄭賜黃福尹昌隆等皆宥而用之今汝所言數人其身已死況有不與二十九人之數者彼食其祿自盡其心耳不聽擢户部侍郎夏原吉為户部尚書初原吉自福建召還帝欲大用之忌者或沮之曰彼建文用事之臣豈宜置之髙位上曰原吉父皇太祖之臣也彼忠於太祖故忠於建文豈不忠於朕哉逾日遂進擢尚書九月封賞從征將士封丘福為淇國公朱能為成國公張武為成陽侯鄭亨為武安侯顧成鎮逺侯王總武成侯陳圭泰寧侯孟善保定侯郭亮成安侯王忠靖安侯徐忠永康侯張信隆平侯李逺安平侯徐祥興安伯徐理武康伯李濬新城伯唐雲新昌伯孫巖應城伯趙彞欣城伯陳旭雲陽伯張玉子張輔信安伯談淵子談忠新寧伯已上並子孫世世承襲封房寬為思恩侯子孫世襲指揮房勝為富昌伯劉才廣恩子孫世襲指揮同知以曹國公李景隆兵部尚書茹瑺都督王佐陳瑄有默相事機功增景隆祿一千石封茹瑺忠誠伯王佐順昌伯陳瑄平江伯子孫世襲指揮使以駙馬都尉王寧罹誣陷封永春侯子孫世世承襲餘將士論功有差成祖永樂元年詔以北平布政司為北京設留守及行部官改北平為順天府谷應泰曰天未厭兵孝康蚤世燕王在北怏怏非少主臣也然而髙帝賔天太孫即位令帝開誠布公杜釁修睦几杖之賜頻及智囊之計不行獄詞燒毁曲庇梁王朝士留章封還錢俶羈縻之道亟行柴草之謀未決也若謂事憂厝火計決徙薪季友進酒而叔牙亡𤣥武喋血而建成敗當其堂皇不避升陛不拜則相如奏筑血犯秦王朱虛行酒追斬吕氏抑數武士力耳齊黃獨不能乎建文仁柔類元帝舉事則學景宣齊黃迂謹類王陵進謀則效鼂錯先主已去操乃追擊當陽劉裕辭歸𤣥乃悔使京口為燕王者將散甲歸兵縛見天子乎抑束手無策闔門自焚也遣張昺遣謝貴彼豈能擒燕王者哉速之反而假以名也燕既起兵非帝殺王即王弒帝其傳檄天下自比周公上書帝闕欲清君側呼忱日月指誓河山藉令帝囚縛齊黃歸致燕館亦或開門延叔握手迎師王敦既收伯仁安能反臣姑孰侯景朝見太極惟有幽帝東堂史稱文帝伏犀日角皇孫落月偏顱天生兩人聚於一宫久無瓦全之理矣而齊黃用兵罪自難逭真定之戰炳文所將三十萬鄭灞村之戰景隆所將五十萬白溝河之戰景隆合兵又三十萬滹沱河之戰盛庸所將猶二十萬合天下之兵握一人之手不知燕王單旅孤城利於戰不利於守利於合不利於分嚮令山東北平堅城深溝繕甲儲粟驍將數十輩各將數萬衆分據險阻出沒敵間進破滎陽彭越燒其糧道南追漢王韓信收其河北燕王雖百戰百勝久且左支右詘寧能縱馬飲濟水之西加矢及聊城之上乎奈何挾萬全之勢搏匹夫之勇驚颷掃葉疾電奔雷執九江於朝堂哭包胥於海外嗚呼晚已獨是建文之初升平繼體海宇晏清而燕王橫貪天位靦顔人上子突入而昭公出奔曲沃盛而孝侯遇弒母亦弱肉強食豈為天與人歸宜乎練子寧噀血地上書成王安在而方孝孺衰絰大罵以為不立成王之子弟也當其大內灰飛緇衣宵遁為燕王者急宜降德音下明詔咸與維新計安反側而乃縣賞討奸清宫戮御斬祛之怨旁及五宗射鉤之嫌蔓延婦寺國君含詬固如是乎至若司馬之心久暴於路人齊鸞之謀早形於咨議乃猶南向讓三連章勸進者欺天乎吾誰欺也幸而即位之後山東首給農器雲南不輕用兵省視旱蝗周諏郡縣勑吏部以拔幽隱顧學士以求直言而且耀武邊陲尊崇先聖政事之美頗班班可考焉然以豫論之梁皇弒主肺石達寃衛武篡兄賔筵好學蓋曲終奏雅逆取順守亦晚蓋之常規非哲王之天性也明史紀事本末卷十六
