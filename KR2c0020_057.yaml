body:
  text: 明史紀事本末卷五十七浙江提學僉事谷應泰編大同叛卒世宗嘉靖三年秋七月大同正堡軍叛殺巡撫張文錦參將賈鑑大同古雲中地北距塞地平漫不甚厄險巡撫都御史張文錦議鎮城北九十里築五堡將成欲徙鎮卒二千五百家往戍之堡五百家為大同藩籬諸鎮卒竊相謂去城下二十里猶苦抄掠無寧日今五堡孤懸幾百里敵至誰復相應援者即死不願徙也訴之文錦文錦不許嚴令趣之又所遣董役參將賈鑑望風白文錦杖其隊長且罪之諸鎮卒遂變有郭鑑柳忠暨諸驍悍者倡亂殺賈鑑裂其尸時二十二日也遂嘯聚塞下焦山文錦恐與冦連招撫之入城即索治首亂者二十七日郭鑑柳忠脅諸卒焚大同府門劫獄囚又焚都察院門文錦倉卒踰垣避匿宗室博野王所諸亂卒掠其家脅博野出文錦殺之亦裂其尸遂發府庫兵仗盡甲而馳欲殺鎮守王某不果又欲殺總兵官江桓走免掠其家乃出逮繫故總兵官朱振於獄脅令主之振知不免乃告曰吾與衆約三事勿犯宗室勿掠倉庫勿縱火殺人能從我則可不從寧死無與諸亂卒曰唯命衆稍戢遂脅鎮巡為奏乞赦宥八月代王出居宣府時廷議遣兵部侍即李昆宣𠡠赦諭之復命太監武忠鎮守都督桂勇為總兵官擢按察使蔡天祐為巡撫先是撫臣既遇害諸亂卒肆行劫掠天祐至乃會武忠桂勇集亂卒宣諭朝廷恩威反覆開諭諸亂卒稽首謝暫解散然皆恐不安又姦盜多乘隙亂亂卒劫掠居民桂勇稍督兵捶殺五十餘人乃笞郭鑑柳忠諸亂首餘釋之而人情洶洶相傳必盡殺大同人無何妄報京營暨諸鎮兵已駐近地勦大同矣適戶部遣進士李枝轉餉至鎮諸亂卒謂密㫖也衆夜集擊李枝門訊故枝自門隙出公移示之始信然衆已集有謂知縣王文昌曽白巡撫欲誅衆卒者遂往執文昌殺之又縱火延燒居民百餘家亂復大作明日逼脅代府謂其請兵也且索府賄代王曲應之解去王懼陷害率子弟數人潜出居宣府天祐委曲撫諭不定以狀聞九月命戶部侍郎胡瓉都督魯綱帥師討大同叛卒制曰誅首惡脅從不問也冬十一月大同叛卒執總兵桂勇胡瓉至陽和密檄桂勇督城中兵計擒首惡文移日下數十於是城中大懼衆白天祐求自全天祐傳制諭之曰兵來惟誅首惡脅從不問也汝輩勿助惡即良民無事矣以是首惡者煽惑衆多不從桂勇遂率苗登諸將計擒郭鑑柳忠等十一人皆斬之鑑父郭疤子糾胡雄黃臣徐氊兒等復倡亂報復逼脅諸亂卒盡甲閉城門夜圍桂勇第掠其資殺家衆數人磔尸於坊有啖其肉者遂擁桂勇至葉總兵宅天祐暨太監武忠亟馳至諭之反覆譬曉衆復少定勇得不遇害衆詣天祐泣訴求止兵天祐曰汝等自作孽至此奈何若今能擒首惡吾為若轉逹兵猶庶可止也諸亂卒乃復擒徐氊兒等首惡四人以獻天祐斬之函首詣瓉郭疤子暨諸首惡皆逃匿瓉聞之欲提兵而西城中士人數十共詣瓉請緩師不聼天祐乃疏請班師復以書止瓉謂首惡既誅餘黨釡魚耳易處也疏上命瓉旋師瓉還御史蕭一中給事鄭一鵬等劾瓉討叛無功逆黨未盡得乃師不臨城歸冒功賞請治欺罔罪别遣大臣督兵討亂疏寢不報惟𠡠天祐等擒捕餘黨仍宥脅從弗治復遣使諭慰代王還國四年春二月巡撫蔡天祐諭鎮城兵民各安業所劫軍器令首官衆稍寧郭疤子胡雄既潜入城度終不自容復誘聚餘黨數十人夜焚總兵王振第諸卒奔告天祐天祐曰曉當治之明日集諸卒諭以朝廷班師不屠城之意且詰亂故衆曰夜倡亂者皆知請閉諸門戶索之得首惡郭疤子胡雄等四十人斬之人皆稱快事聞優詔答之賞賚有差天祐厚賚間諜因事捕誅逆黨近數百人大同始定數年天祐遷兵部侍郎言者追論其費財竟罷去多枉之張文錦妻李氏上疏請恤上怒執抱疏者治之廷臣屢以為言不許江西巡撫陳洪謨疏言文錦邊圉重臣致滋大患誠宜譴責苐事在朝廷雖誅僇之可也若假手士卒又慫恿之臣恐羣小藉口寢生陵替之階其於國家紀綱所損不小書奏上切責之萬厯中贈文錦右都御史諡莊愍十二年冬十月大同戍卒叛殺總兵李瑾先是七月套部渡河將入冦巡撫大同都御史潘倣以聞兵部尚書王憲曰非設總制重臣不可乃請以兵部侍郎劉源清為總制都督郤永總兵禦之舊鎮大同總兵李瑾議於天城之左濬濠四十里以遏突騎源清從之期三日事竣瑾素嚴馭士卒少恩及承源清令益為捶楚鎮卒季富子王寶等倡亂從者六七十人脅朱振攝指揮使遂殺瑾還圍巡撫潘倣倣踰垣避匿亡其符勑諸卒搜得之倣為奏鎮將用法苛刻兵悉變請置勿問源清曰即兵悉變法不可廢請討之事下兵部議尚書憲曰兵未必悉變脅從宥弗治渠魁必殱降璽書責總制巡撫相機撫勦之倣督僉事孫允中等計擒首惡十餘人縛以獻時源清駐陽和乃傍示大同城中曰五堡之變朝廷處太寬乃今稔惡戕王帥天討所必加者五堡遺孽見榜示輒偶語不自安謂追理甲申事也允中檻諸囚詣軍門請沮帥稍徐圖之逆黨可盡得又五堡事朝廷已處分願勿以為言源清曰甲申之役胡公以兵不臨城致言者紛紛吾不可更襲前轍乃以囚屬御史蘇祐訊而遣參將趙剛等率甲士三百人捕亂黨倣驗所捕名多擒賊有功為諸囚所仇誣者乃止捕無功八十餘人比晚諸鎮卒皆變拒巷不納捕者源清遣允中入城諭意令明日釋甲迎王師至夜城中益譁言兵來屠城矣遂羣起為亂倣命允中暨諸禆將擒斬二十餘人餘解散源清為書召朱振振至切責之振飲藥死明日源清師至城下斬關入大肆殺掠城外橫尸枕藉五堡遺孽遂變悍橫不可制閉城門弗啓擁指揮馬升楊麟為渠帥亡何郤永師亦至整隊及城亂兵開門迎敵殺參將一人倣允中亟馳往諭之衆曰城外尸塞道矣尚紿我反覆諭不聼倣與允中計曰亂不可遏矣乃列將士貪功妄殺激變鎮兵狀間道上之源清亦疏奏巡撫諸臣黨逆卒致抗王師言官劾倣罷去源清次聚落驛允中往見之言將士妄殺故源清曰毋為賊說允中遂留居懷仁時禮部侍郎顧鼎臣黃綰皆言用兵之非綰言尤力忤輔臣張孚敬意吏部以他事謫參政出綰發憤上疏自列且指言用兵失上悟命復其官十一月兵部尚書王憲謂大同之變非大發兵誅之不可張孚敬主其議乃以汪桓總兵擢參政樊繼祖為大同巡撫繼祖至陽和與劉源清議大忤遂上疏請假金牌單騎入城諭之可立下且云恐賊計無復之且北走胡貽患非小也疏入不報源清於諸關設邏卒遏城中章疏又連疏奏宗室諸文武悉已從賊實天欲棄此城矣兵部是其議有㫖命趨攻之源清乃百道攻城令郎中李文芝主事楚書穴城決水灌之諸叛卒堅守不下十三年春正月小王子冦大同塞初大同叛卒大掠城中潜出漠北誘小王子數萬人大衆入冦郤永回師禦之失利殺傷甚衆城中叛卒鼓譟以應之其渠長數十人入城諸叛卒指代府曰兵退以此謝小王子留精兵相持餘衆分掠渾應朔懷諸郡邑數月乃去羽檄逹京師中外洶洶二月劉源清罷源清畏北騎猖獗再請設總制分禦之而已專事攻城張孚敬請從之上納夏言議不許下御劄謂叛卒殺主將法毋赦然非舉城所為郤永劉源清貪功引水灌城大同北門鎖鑰源清必欲城破人誅衆使成功何由興復其罪二臣别遣大臣禦之密擒逆賊之魁庶免師老財匱劄下中外始知用兵非朝廷意源清聞之乃詣城下索首惡時郎中詹榮都指揮紀振游擊戴亷俱陷賊中相與謀曰總制誠索首惡當謀為內應指揮馬升者為賊所擁戴威令行於城中榮等激以大義升委心焉遂歃血盟令鎮撫王掌出告樊繼祖繼祖深加奬慰告源清源清陽許之令人穴城詐給票汲水灌之穴者死焉升大恚恨將不利於榮等事遂已源清知不可為乃謝病乞解任上大怒罷斤之以戶部侍郎張瓉代源清總制瓉入軍下令曰毋攻城吾將有請也因遣騎招孫允中於懷仁與議時允中已被劾落職矣又密遣使諭城中主事楚書觀兵城下城中登陴請曰吾輩非殺將者畏死自全耳請書入書遂入慰諭之且言用兵非朝廷意衆皆望闕呼萬嵗書仍進馬升等陳朝廷威德曉以禍福令獻首惡是夜斬倡亂黃鎮等二十四級獻軍門於是繼祖亦馳入城以鎮撫人心郤永猶沮撓倡言繼祖伏兵為內應衆果夜驚繼祖堅卧不起乃安瓉復遣允中入城宣諭之繼祖乃榜諭城中大發倉粟賑濟稍稍繩以法無賴縱恣者撾殺一二人以狥衆稍寧瓉遂馳至城下退諸路兵二舍外諸將領以次上謁次日張鼓吹與御史蘇佑自南門入置酒髙會賞賚將士城中乃大定小王子聞之亦逺遁瓉還居上谷遙制之事聞上大悅降璽書遣禮部侍即黃綰往核功罪定賞罰永猶欲沮敗事綰先疏罷永始抵鎮宣御劄璽書慰宗室傷殘掩骸骼賑窮乏命守臣捕誅遺惡雪誣罔乃核激變之由正欺蔽之罪差别諸將士功賞疏上久之徵劉源清郤永下獄源清削籍去永降級立功贖罪潘倣孫允中復原職致仕張瓉樊繼祖等各賞賚有差谷應泰曰大同南蔽太原西阻榆林東連上谷蓋屹然重鎮矣更得一二賢明將吏分甘絶少噢咻士卒號令嚴明勇氣百倍則李牧守郡匹馬不窺郅都在邊幕庭逺徙斯蓋外攘之重寄寧有內潰之猝患哉乃嘉靖三年巡撫張文錦議以去城百里增築五堡堡名列戍徙卒實之藩籬固而後明堂尊屏障列而後天府重文錦之策未為謬也但當出車以遣新軍采薇以勞還戍拊循有素踐更有法信而後勞誰敢違者奈何澤門興役鞭箠賈怨秦法送徒後期皆斬而郭鑑柳忠一呼倡亂文錦賈鑑裂尸並亡嗟乎楊炎建城而涇原兵叛𢎞靖刻糧而盧龍軍反事勢相激無足怪者此時便當擇智勇之臣秉節鉞之重或恩義久敷或雅量素蓄聲罪渠魁撫輯餘醜收元振之黨以戮叛人燒王郎之書以安反側則戍卒雖譁可一鼓而定也無如下多獷悍叛服不常上鮮方略勦撫均失以故鑑忠授首郭疤復起氊兒既斃季富又興脫巾相尋勢若蝟毛此固不可以勦也又若泣訴天祐更焚王振縛獻胡雄旋殺李瑾磨牙相向狀同瘈拘此又不可以撫也逮至劉源清斬關大殺李文芝決水灌城而後獸不走險鹿不擇音非馬頴厚結元海即懷恩外誘吐番許河西以賂秦師指金帛以酬回紇邊關重險幾於拱而授之矣所幸樊繼祖單騎直入張瓉麾退王師發粟賑饑鼓吹髙宴亂卒憂危自兹釋矣譬之子儀入河中而一府無譁秀實入軍門而衆皆解甲無他開誠布公推以赤心而已然則亂延十祀變凡七起者非真豺豕性成威惠兩絀也特以上下相䝉弓影之疑蓄於中恩信不著投抒之說動於外也所可恨者劉源清之主勦也王憲和之於內張孚敬持之於上而繼祖疏入不報便宜濟事卒之樊獲璽書劉繫廷尉奸臣在內大將立功賴肅帝之心開爾明史紀事本末卷五十七
