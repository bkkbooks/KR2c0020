body:
  text: 明史紀事本末卷六十一浙江提學僉事谷應泰編江陵柄政世宗嘉靖四十三年秋七月以諭德張居正充裕王講官穆宗隆慶元年二月加恩侍從藩邸諸臣以禮部右侍郎張居正為吏部左侍郎兼東閣大學士直內閣四月進禮部尚書武英殿大學士二年春正月進大學士張居正少保八月居正上疏陳大本急務六事一曰省議論凡事不貴無用之虛詞務求躬行之實效欲為一事須審之於初及計慮已審即斷而行之如唐憲宗之討淮蔡雖百方沮之而不為搖欲用一人須慎之於始既得其人則信而任之如魏文侯之用樂羊雖謗書盈篋而終不為之動一日振紀綱近年以來綱紀不肅猥以模稜兩可謂之調停以委曲遷就謂之善處伏望刑賞豫奪一歸公道而不曲狥乎私情政教號令一斷宸衷而勿紛更於浮議一曰重詔令近日以來朝廷詔㫖多格廢不行至十餘年未竟者文卷委積多致沈埋年月既逺事多失真遂使漏網終逃國有不中之法覆盆自苦人懷不白之寃是非何由而明賞罰何由而當伏乞勑下各司嚴立限期責令奏報違者查恭一曰核名實器必試而後知其利鈍馬必駕而後知其駑良今用人則不然官不久任事不責成更調太繁遷轉太驟資格太拘毁譽失實臣願皇上慎重名器愛惜爵賞用人必考其終授人必求其當仍勑吏部嚴考課之法審名實之歸一曰固邦本今風俗侈靡官民服舍俱無定制外之豪强兼併賦役不均花分詭寄偏纍小民乞勑內外諸司悉心清理一曰飭武備今議者皆曰兵不多食不足將帥不得其人臣以為此三者皆不足患也夫兵不患少而患弱今軍從雖缺而糧具存若能按籍徴求清查冒占隨宜募補從實訓練何患無兵捐無用不急之費以撫養戰鬭之士何患無財懸重賞以勸有功寬文法以伸將權則忠勇之夫孰不思奮又何患於無將至於目前自守之䇿莫要於選擇邊吏圑練鄉兵併守墩堡臣考前代及吾祖宗俱有大閲之禮以習武事而戒不虞今京師內外守備單弱伏乞勑戎政大臣申嚴軍政設法訓練每歲農隙之時恭請大閲以試將帥之能否軍士之勇怯注意武備整飭戎事亦足以伐外寇之謀銷未萌之患疏入上曰覽卿奏皆深切時務具見謀國忠悃所司詳議以聞於是都御史王廷等覆振紀綱重詔令二事析為八則疏上上允行之兵部覆飭武備事宜一議兵一議將一議團練鄉兵一議守城堡一議整飭京營又奏大閲之禮宣宗英宗嘗行之恭請親臨較閲如閣臣所奏上曰大閲既有祖宗成憲允宜修舉其先期整飭俟明年八月舉行餘悉如議戶部議固邦本言財用之當經理者有十宜嚴法整飭上一一允行之十二月廢遼王大學士張居正故𨽻遼王尺籍至憲㸅頗驕酗多所凌轢居正銜之而又羡其府第壯麗㑹告王謀反刑部訊治侍郎洪朝選案驗無謀反狀僅坐以淫酗憲㸅錮高墻廢其府居正攘以為第後復恚朝選不附反律謀殺朝選三年九月上大閲於京營教場勑諭戎政官及諸吏卒先是給事中駱問禮言大閲非今時所急不必仰煩聖駕居正力持其說上遂行之四年十二月大學士張居正秩滿進兼太子太傅吏部尚書進少傅兼建極殿大學士六年春正月進大學士張居正少師五月上不豫己酉大漸召閣臣高拱張居正高儀至乾清宫受顧命上倚坐御榻皇后及皇貴妃咸侍東宫立於左上困甚太監馮保宣顧命曰朕嗣統方六年今疾甚殆不起有負先帝付託東宫幼冲以屬卿等宜協輔遵守祖制則社稷功也拱等泣拜而出翼日上崩六年甲子皇太子即位年始十歲時太監馮保方居中用事矯傳大行遺詔云閣臣與司禮監同受顧命廷臣聞之俱駭一日內使傳㫖至閣拱曰㫖出何人上冲年皆若曹所為吾且逐若曹矣內臣還報保失色謀逐拱拱與居正俱負氣不相下居正乃結保自固時臺諫交劾保必欲斥之而高拱自以與居正及高儀同與憑几每慷慨收宫府權曰老臣謬膺托孤不敢不竭股肱凡內降命􅎁府部章奏自合公聽並觀有傳奉中㫖所司按法覆奏白老臣折衷之以復百官總已之義拱內慮馮保專恣與居正儀謀去之居正隂泄之保乃與保謀去拱六月既望庚午昧爽拱在直居正引疾召諸大臣於會極門促居正至拱以為且逐保也保傳皇后皇貴妃皇帝㫖曰告爾內閣五府六部諸臣大行皇帝賔天先一日召內閣三臣御榻前同我母子三人親受遺屬曰東宫年少賴爾輔導大學士拱攬權擅政奪威福自專通不許皇帝主管我母子日夕驚懼便令回籍閒住不許停留爾等大臣受國厚恩如何阿附權臣蔑視幼主自今宜洗滌忠報有蹈往轍典刑處之拱即日出朝門得一牛車立而附載緹騎兵畨踉蹌追逐喪厥資斧大臣去國以為異聞拱去居正為乞馳驛乃傳歸而高儀未幾亦卒以病死居正裒然首輔矣辛酉上御平臺召張居正慰勞之曰皇考屢稱先生忠臣居正傾首泣謝曰今國家要務惟在遵守舊制不必紛更至於講學親賢愛民節用又君道所先乞聖明留意上曰善隨賜酒饌銀幣居正既柄政慨然以天下為己任中外想望丰采一意尊主權課吏實嘗言髙皇帝得聖之威者也世宗能識其意是以髙卧法宫之中朝委裘而不亂今上世宗孫也奈何不法祖具詔草請於上召羣臣廷飭之百寮惕然八月張居正請開經筵復請更定常朝日期御門聽政俱從之上遂御文華殿日講以為常十一月太監崔敏請買金珠寶石居正上言前六月間奉命停止今忽有此舉是前詔不信也乞暫停之以蘇民力因封還敏疏遂報罷十二月張居正進帝鑑圖說上見捧册進喜動顔色遽起立命左右展册居正從旁指陳大義上應如響因即宣付史館賜居正銀幣一日上御文華殿講畢覽至漢文帝勞軍細柳事居正因言皇上當留意武備祖宗以武功定天下承平日久武備日弛不可不及早講求也上稱善甲戌張居正奏請明年正月上旬即御殿日講但先帝喪未期勿設宴并免元夕燈火上曰已早停止每侍聖母膳甚簡素或逢節日具果宴不設樂居正稱善尋諭光祿卿免節間供應七百餘金戊寅張居正上言制勑宜尚簡嚴近來過為誇侈臣諛其君猶謂之佞况以上諛下乎乞戒代言諸臣復古從實毋壞制體從之神宗萬厯元年春正月辛卯命成國公朱希忠大學士張居正知經筵事上甚敬禮居正每日御經筵居正以詩書入在文華殿後張小幄造膝密語一日居正在直廬感病上御暖閣親調椒湯賜之盛暑御講上就居正立處令內使搖扇隆冬進講以氈片鋪地庚子早朝上出乾清宫見一無鬚男子僞作宦者狀袖有佩刀趨走惶遽左右執之馮保立鞫之曰南兵王大臣奚自曰自總兵戚繼光來保使密報居正而居正令附保耳曰戚公方握南北軍禁無妄指可借以除髙氏保故甘心陳內監洪已逮洪錮禁獄令大臣供之矣先是大臣為戚帥三屯營南兵不遂流落都下為人巧捷便佞一中貴昵之至是令稱拱使改籍武進縣即令厠卒辛儒衣大臣蟒袴豫二劒劒首飾猫精異寶送繫厰中入以聞請究主使人居正亦上疏如保意上即付保鞫保令辛儒屏語大臣曰苐言髙相君怨望使汝來刺願先首免罪即官汝錦衣賞千金不然重搒掠死矣因使儒畀大臣金美飲食之儒日與大臣狎欵即令誣拱家人為同謀獄具保飛發五校械拱僕而居正前疏傳中外口語籍籍謂且逮拱居正乃密謀于吏部尚書楊博博曰迫之恐起大獄抑上神聖英鋭持公平察高公雖粗暴天日在上安得有此居正面赤不懌㑹大理少卿李幼孜者居正鄉人亦輿疾告居正曰公奈何為此惡名汙青史矣居正强應曰吾為此事憂不如死何謂我為居正禁科道官不得有言而御史鍾繼英上疏不敢明言暗指之居正怒擬㫖詰問左都御史葛守禮語楊博過張公必諍之博曰向已告矣守禮曰輿望屬公謂公能不殺人媚人耳大獄將起公奈何以己告為解即共過居正居正曰東厰獄具矣同謀人至即疏處之耳守禮曰守禮敢附亂臣黨耶願以百口保髙公居正默不應博曰願相公持公議壯元氣厰中寧有良心倘株連者衆事更有不可知者居正堅不承博與守禮因歷數先朝政府同心輔政及貴溪分宜華亭新鄭遞相傾軋相名坐損可為殷鑒居正憤曰二公意我甘心髙公耶奮入內取厰中揭帖投博曰是何與我揭帖有居正竄改四字曰歷歷有據而居正忘之守禮識居正手笑而納諸袖居正覺曰彼法理不諳我為易數字耳守禮曰機密重情不即上聞先政府耶吾兩人非謂相公甘心髙公以回天非相公不能居正揖謝曰茍可效敢不任苐何以善後博曰相公患不任耳任則何難善後須得一有力世家與國休戚者乃可委治居正悟始言上前度處之上即命馮保與左都御史葛守禮都督朱希孝會審而希孝懼與其兄成國公希忠相對泣曰誰畫此䇿也以覆吾宗急詣居正請命居正曰苐見冢宰大中丞希孝泣謁博博曰欲借公全朝廷宰相體耳何忍以身家陷公顧亦何難公苐使善詗校尉入獄訊刀劍口語所從來雜高家僕稠衆中令别識且問見髙公何所今在何地立辨矣希孝如博言使善詗校尉密詢大臣何自來則來自保所語盡出保口校尉即告大臣入宫謀逆者法族奈何甘此若吐實或免罪大臣茫然哭曰始紿我主使者罪大辟自首無恙官且賞豈知當實言道髙家僕逮至希孝雜諸校中令物色大臣不辨也及會審風霾大晦尋雨雹不止東厰理刑白一清者謂保初問官二千户曰天意若此可不畏乎髙相國顧命大臣本無影響强我誣之我輩皆有身家異日寧免誅僇耶皆曰馮公已為且詞固有隂持之者奈何一清曰東厰機密重情安得送閣改乎頃之天稍明出大臣會問故事先雜治大臣呼曰故許我富貴何雜治也馮保即問曰誰主使者大臣瞪目仰面曰爾使我乃問也保氣奪强再問爾言髙相國何也曰汝教我我則豈識髙相國希孝復詰其蟒袴刀劒曰馮家僕辛儒所豫保益懼希孝曰爾欲汙獄使耶遂罷保密飲大臣生漆酒瘖之而內以拱行刺事上聞有殷內監者年七十餘奏上曰髙拱故忠臣何為有此隨顧保曰髙鬍子是正直人張居正故懷忮刻必殺之我輩內官何須助彼保大沮而內監張宏亦力言不可於是上下刑部擬罪竟論大臣斬拱被居正齮齕杜門屏居仕宦中州者不敢過新鄭率枉道他去六月張居正上言稽劾章奏隨事考成有遷延隱蔽者即舉劾上從之冬十月上御文華殿張居正進講言及宋仁宗不喜珠飾上曰賢臣為寶珠玉何益居正曰明君貴五穀而賤珠玉五穀養人珠玉饑不可食寒不可衣上曰然宫人好冶粧朕歲賜未嘗不節省居正曰皇上言及此社稷生靈之福也上又曰秦始皇銷兵梃可傷人何銷兵為居正曰人君布德修政以結民心為本天下之患每出所防之外秦亡於戍卒故天時不如地利地利不如人和上曰然人定真能勝天也二年春正月大學士張居正請上引見亷能官倣祖宗午朝之儀從之甲午上御皇極門引見朝覲清亷卓異浙江布政使謝鵬舉等二十五人特加奬勵各賜金幣并宴張居正進講章疏略曰義理必時習而後能悅學問必溫故而知新臣今將今歲所進講章重復删定大學一册虞書一册通鑑四册進呈睿覽雖淺近之言然亦行逺登髙之一助四川西南都蠻平初隆慶時都蠻作亂張居正薦曽省吾往討之省吾有偉略而四川總兵劉顯以在閩事被彈居正曰臨敵易將兵家所忌倘蜀事不效當并閩事逮治之於是顯奮不顧身受省吾方略以平蠻自效凡六越月諸寨悉平俘蠻長三十六人拓地四百里上御文華殿講畢問建文果出亡否張居正曰國史不載但故老相傳披緇雲遊題詩於田州有流落江湖四十秋之句上太息命録詩進居正曰此亡國之事不足觀也請録皇陵碑及髙皇御製集以上見創業之艱聖謨之盛明日輔臣進皇陵碑上覽畢謂居正曰朕覽碑讀之數過不覺感傷欲泣居正曰祖宗當日艱難蓋以天心為心故能創制顯庸皇上以聖祖之心為心乃能永保洪業因述聖祖微時事及即位勤儉上愴然曰朕敢不黽勉法祖然尚賴先生輔導也秋九月辛巳刑部請録囚慈聖太后欲停之上問張居正對曰春生秋殺天道之常皇帝即位以來停刑者再矣稂莠不除反害嘉禾凶惡不去反害良民上為請太后從之十二月壬子張居正率大臣上御屏屏繪天下疆域及職官姓名用浮帖以便更換上命設於文華殿後時加省覽閏十二月丁亥上御書弼豫一人永保天命賜張居正明日居正侍進諫曰帝王之學當務其大自堯舜至唐宋賢主皆修德行政治世安民不以一藝漢成帝知音律能吹簫度曲梁武帝陳後主隋煬帝宋徽宗皆能文善書盡無救于亂亡則君德之大豈沾沾一藝哉他日上日講畢問居正元夕烟火鼇山祖制乎曰非也成化間以奉母后時多諫阻今新政宜裁上曰然居正曰明年雖禫繼此當大㛰又皇弟潞王出閣諸公主釐降所費甚煩宜預節省上曰朕極知民窮居正請減元日賜賚上大然之上又嘗語輔臣曰昨日禁中花盛開侍母后賞宴甚歡蓋指慈寧也居正奏曰仁聖太后處多時寂寞惟皇上念之起還宫白慈聖即自駕往迎仁聖過大內賞花傳觴歡宴而罷三年夏五月大學士張居正上言近郡縣入學大濫宜勑學臣量加裁省并勑吏部凡所在督學臣非方正勿遣遼東告警上深以為憂張居正對曰暑月非北騎狂逞之時必無慮既而薊遼總兵戚繼光報稱諸部解散無警居正因上疏論邊事曰昨遼東撫臣張學顔報稱寇衆二十餘萬謀犯遼東前鋒已抵大寧皇上面諭臣臣已面奏料其無事今據總兵戚繼光報稱寇久解散臣又使人于宣府密偵西人青巴圗動靜則巴圗在巢駐牧未嘗東行遼東所報皆屬虛聲臣等因此反切憂慮夫兵家之要必知彼已審虛實而後可以待敵取勝今無端聽一訛言倉皇失措則是彼己虛實茫然不知其與風聲鶴唳草木皆兵者何異敵情狡詐萬一彼常以虛聲恐我使我驚惶疲于奔命久之懈弛不備然後卒然而至措手不及是在彼反得先聲後實多方以誤之之䇿而在我顧犯不知彼己百戰百敗之道他日邊臣失事必由於此故臣等不以寇之不來為喜而深以邊臣不知敵情為慮也兵部以居中調度為職猶貴審察機宜沈謀果斷乃能折衝樽俎坐而制勝今一聞奏報便爾張皇事已之後又寂無語徒使君父焦勞于上以憂四方豈僅以題覆公牘謂已畢本兵之事耶乞傳諭兵部詰以寇情虛實之由使之知警并請賑各邊饑卒俱從之八月張居正請增閣臣許之即日進吏部左侍郎張四維為禮部尚書入東閣故事入閣者止曰同某人辦事至是上手注隨元輔入閣辦四維恂恂若屬吏矣十一月張居正上郊祀圖著為書三册首敘分合沿革之由次具壇壝陳設次列儀注樂章大意遵髙皇定制歲一合祀奉二祖並配上褒答之四年春正月御史劉臺劾大學士張居正專擅威福如逐大學士髙拱私贈成國公朱希忠王爵引用張四維張瀚為黨斥逐言官余懋學傅應楨罔上行私橫黷無厭居正怒甚見上辭政曰臣之所處者危地也言者以為擅作威福而臣之所行正威福也將巽順以悅下耶則負國竭公以事上耶無以逃專擅之譏伏地不肻起上下御座手掖之曰先生起朕當責臺以謝先生詔下臺獄杖之百逺戍之時議藉藉居正不自安復具疏為解免杖奪職為民然心終恨之後竟置之死三月戊戌上御文華殿言及唐𤣥宗於勤政樓宴安祿山上曰樓名勤政而佚樂何也張四維曰𤣥宗開元之治有三代風至天寶荒佚乃致播遷居正曰無論往代我世宗皇帝初年西苑建無逸殿省耕勸農末年崇尚𤣥修不復臨幸治平之業亦寢故大寶針云民懷其始未保其終上嘉納之五月辛酉上視朝張居正等請覽奏章時閲聖祖所親批疏稿為法上曰然居正因簡內閣所藏聖祖手諭六十三道御製四十四道聖㫖并帖共七十道上之秋七月丁酉張居正上言致治之道莫要於安民安民之法莫重於守令守土牧民者削下奉上以希聲譽奔走趨承以求薦舉徴發期會以完簿書茍且草率以逭罪責其實心愛民者未嘗概見明春外計考察舉錯乃向背所係惟以安靜宜民為最虛文矯飾雖浮譽素隆當列下考居正又請行考成法有司以徴解為殿最於是奉行者督責小民不勝朴楚相率為怨言然賦以時起居正上言近者仰賴皇上愛人節用京通儲粟足支八年太倉銀庫所積尚少宜將明年漕糧量折十三足國裕民一舉兼得上從之時府庫充溢太僕寺亦積金四百餘萬冬十月丙子進張居正左柱國太傅仍加伯爵敕曰先生親受先朝顧命輔朕冲年今四海升平實賴匡弼精忠大勳言不能殫惟我祖宗列聖祐爾子孫與國咸休欽哉居正固辭伯爵許之山東撫按劾昌邑知縣孫鳴鳯貪賄上怒甚欲遣逮張居正曰貪人固當盡治但故事俱下臺訊上曰然鳴鳯之婪乃出進士乎居正曰此人惟恃進士故爾恣肆若乙科明經尚有畏忌今後用人但問功能不可拘資格上深然之十二月上御文華殿舉袍示輔臣曰此何色也居正以為青上曰紫也久而色渝居正曰紫易渝昔皇祖不尚服御衣敝甚始易享國長久未必不由此願皇上以皇祖為法節一衣民間有數十人得其暖者輕一衣民間有數十人受其寒者不可不念也時左右亦言民窮至鬻妻子應上供上深然之五年春正月庚午上御文華殿大學士張居正言殿之東堂祀伏羲以下數聖君皇上所當法也法古聖惟在省覽章奏日閲一二講明國事則他年躬攬萬幾無難矣上嘉納之五月戊申諭修慈慶慈寧南宫張居正言兩宫于萬厯二年落成今壯麗如故足以娛聖母乃欲壞其已成更加藻飾非所急也請輟工從之嶺西羅旁平羅旁據山海間驚江急峽巖壑險絶諸猺窟穴其中前代不入版籍國初甫一定之世宗朝諸猺轉相寇掠不可撲滅督撫殷正茂既討平惠潮寇上疏言羅旁當誅廷議不能决居正毅然言當誅舉兵部尚書凌雲翼請賜璽書屬之討賊雲翼瀕行居正謂之曰雖鞭之長不及馬腹即今兩廣諸猺雖所在都有然乘間竊發要當審所緩急耳雲翼既至部諸路兵號三十萬八道並進克木衣山破諸峒五百六十有四俘斬四萬二千有竒拓地數百里置郡縣捷聞賜賚有差先是四方多草竊有司祕不以聞張居正特嚴其禁匿盜者雖循吏必黜得盜即報决有司凜凜盜亦衰止閏八月丁亥上視朝張居正因言近因隂雨朝講暫輟恐中外不知謂皇上勤學漸不如初願日慎一日非有他事及風雨不得輟上深然之九月上諭停刑蓋慈聖太后以大㛰期近也居正上言春生秋殺天道所以運行雨露霜雪萬物因之發育明王奉若天道刑賞豫奪皆奉天意以行事若棄有德而不用釋有罪而不誅則刑賞失中慘舒異用矣且臣近詳閲所開諸犯皆逆天悖理其所戕害含寃蓄憤聖主明王不為一泄彼以其怨恨寃苦之氣鬱而不散或上蒸為妖沴氛祲之變下或致凶荒疫癘之疾則其為害又不止一人一家也請俟明年吉典告成然後概免一年從之己卯張居正父喪訃至上以手諭宣慰視粥止哭絡繹道路又與三宫賻贈甚厚然亦無意留之所善同年李幼孜等倡奪情之說於是居正惑之乃外乞守制示意馮保使勉留焉冬十月居正再上疏乞終制不允乃請在官守制不造朝許之居正既父喪奪情吉服視事編修吳中行檢討趙用賢因星變陳言刑部員外艾穆主事沈思孝合疏言居正忘親貪位居正大怒時大宗伯馬自强曲為營解居正跪而以一手撚鬚曰公饒我公饒我掌院學士王錫爵徑造喪次為之解居正曰聖怒不可測錫爵曰即聖怒亦為公語未訖居正屈膝于地舉手索刃作刎頸狀曰爾殺我爾殺我錫爵大驚趨出十月二十二日中行等四人同時受杖中行用賢即日驅出國門人不敢候視許文穆方以庶子充日講鐫玉杯一曰班班者何卞生淚英英者何藺生氣追追琢琢永成器以贈中行鐫犀杯一曰文羊一角其理沈黝不惜剖心寧辭碎首黃流在中為君子夀以贈用賢穆思孝復加鐐鎖且禁獄越三日始僉解發戍為更慘毒時鄒元標觀政刑部憤甚視四人杖畢而疏上越三日受杖謫戍貴州都勻衛罷吏部尚書張瀚先是瀚為南京工部尚書廷推吏部瀚名第三以居正言上越次用之居正以為德希瀚報奪情議起遂邀中㫖屬瀚留居正居正亦自牘風之使留已瀚若不喻其意者謂政府奔喪當以殊典恤之宗伯事也何關吏部居正乃令所善客說瀚瀚不聽又不欲顯居其名乃偕三尚書密晤居正動以微言居正大不悅於是有詔切責瀚謂瀚奉諭不復無人臣禮是時廷臣爭惴栗各倡保留之議瀚拊膺太息曰三綱淪矣居正益怒嗾臺省劾之以為昏耄勒令致仕丙午上戒諭羣臣曰奸臣小人藐朕冲年忌憚元輔乃借綱常之說肆為誣論欲使朕孤立于上得以任意自恣兹已薄處如或黨奸懷邪必罪不宥時言奪情者得罪都人士皆憤怒作謗書懸長安門謂居正且反上聞之故宣諭于朝謗議稍息己而召居正於平臺慰諭甚至即日入直初居正喪次凡閣中事令吏賫奏就擬處分手詔稱元輔稱太師稱先生皆盡古師臣之禮十一月癸丑朔以星變考察羣臣始張居正自矯飾雖或任情而英敏善斷中外羣譽之居正亦自負不世出逮劉臺論居正得罪志意漸恣至是益知天下不見與思威權劫之矣令天下度田國初天下土田八百五十萬頃至後漸減歲久滋僞豪民有田不賦貧民曲輸為纍民窮逃亡故額頓減張居正請料田凡莊田民田職田蕩地牧地皆就疆理無有隱其撓法者下詔切責之六年春正月將舉大㛰首輔張居正充納采問名副使給事中李淶疏言居正有服制不宜與執事乞改命上不允以聖母諭諭居正遂從吉三月甲寅張居正乞歸治葬許之辭朝上召見于平臺勞諭之曰朕不能捨先生恐重傷先生懷是以忍而允所請雖然國事至重朕將焉依居正奏言皇上大婚之後宜撙節愛養留心萬幾因伏地而哭上亦為之哽咽墮淚曰先生雖行國事尚宜留心乃賜銀印曰帝賚忠良令得密封言事進辭兩宫各賜贐金慰諭有加庚辰遼東再奏大捷上歸功張居正使使馳諭俾定爵賞以聞召趣還朝居正以母老俟秋上道命錦衣歸馳趣之六月乙未張居正還朝上召見於文華西室問沿途所見稼穡何如民生何如邊事何如居正對甚悉上大悅賜休沐十日十二月命纂宗藩要例書頒示諸王先是世宗朝公族繁盛國用困竭以故頗知損抑至是居正等念諸藩裁削非天子親親意乃略舉事例未當者十一條請􅎁禮官集議著為令諸藩於是感激親上而厚薄親踈有體矣七年二月上患疹慈聖太后命僧於戒壇設法度衆張居正上言戒壇奉皇祖之命禁止至今以當時僧衆數萬恐生變敗俗也今豈宜又開此端聖躬違豫惟告謝郊廟社稷斯名正言順神人胥悅何必開戒壇而後為福哉事遂寢二月河工成先是淮安有水患河決入淮淮勢不敵淮揚咸為巨浸直逼泗洲患近陵寢上以問張居正因上言故河道都御史潘季馴可使乃降璽書即其家拜都御史使持節治河一切假以便宜久任帑藏不問出入諸奉行不及事者下詔獄鞫治之於是當事者日夜焦勞蓋踰年而堤成轉漕無患三月上疹愈徴光祿寺十萬金張居正上言財賦有限費用無窮使積貯空虛不幸有四方水旱之災疆場意外之變可為寒心此後望力加撙節若再徴金臣等不敢奉詔矣時上漸備六宫太倉所儲屢有宣進居正上戶部所進御覽錢糧數目請置之坐隅時賜省覽量入為出因言萬厯初年所入四百三十五萬有竒六年所入僅三百五十五萬有竒則已少八十餘萬矣五年歲出四百四十九萬有竒則已多四十餘萬矣夫歲出則浮于前歲入則損于前此不可不留心也王制量入為出計三年之出必有一年之餘而後可况財用止有此數設法巧取不能增多惟加意撙節則用自足上嘉納之夏四月上以內庫缺錢賞賚不足命部鑄大錢以進張居正上言先朝鑄錢呈式非供上用也萬厯二年進錢一千萬其後歲半之己非本意若闕錢鑄進是以外府之儲取供內府大失舊制矣上從之乃罷鑄錢癸卯張居正上肅雍殿針命書于御屏五月封遼東總兵李成梁為寧逺伯張居正言成梁屢立戰功忠勇為一時冠加以顯秩此鼓勵將士之法也己而成梁使使餽以金居正曰而主以百戰得功勳我受其金是得罪髙皇帝也却不受七月甲子給事顧九思王道成等以江南水災請罷浙直織造內臣上以示張居正居正奏民重困宜召還孫隆上曰彼織幣且完當俟來春耳居正曰地方多一事則有一事之擾寬一分則受一分之惠災地疲民不堪催督暫去之俟稍稔可復也上從之時給事中李淶請恤江南水災并言四事上怒其譏訕居正曰水災請恤亦言官之常雖或觸忤恐傷聖度上意乃解冬十月薊遼總督梁夢龍報土蠻大舉入寇張居正奏言臣諭邊臣如敵騎入勿輕戰堅壁清野野無所掠彼將自阻請令夢龍駐永平戚繼光駐一片石伺間邀擊上善之既而土蠻以四萬騎犯前屯梁夢龍李成梁率兵禦却之十二月張居正服闋召見于平臺八年春正月己未先是永豐梁汝元聚徒講學吉水羅巽亦與之游汝元揚言張居正專政當入都頌言逐之居正微聞其語授指有司捕治之己湖廣貴州界獲妖人曾光竄入汝元巽姓名云謀不軌汝元巽俱先死湖廣守臣具爰書下法司訊之并曾光亦非真也苐據律論罪三月大學士張居正具疏乞休再上上慰留懇切最後手書傳慈聖口諭張先生受先帝付托豈忍言去俟輔爾至三十却再審處讓後人非晚也居正因復就職甲子賜進士張懋修等三百人及第出身有差懋修兄敬修亦成進士得禮部主事俱居正子八月戊子刑部侍郎劉一儒移書張居正曰竊聞論治功者貴精明論治體者尚渾厚自明公輔政立省成之典復久任之規申考憲之條嚴遲限之罰大小臣工鰓鰓奉職治功既精明矣愚所過慮者政嚴則苛法密則擾今綜覆既詳弊端剔盡而督責復急人情不堪非所以培元氣而養敦渾之體也昔臯陶以寬簡贊帝舜姬公以惇大告成王淪洽當代矩矱後世願明公法之居正得書不懌十一月戊寅上以夜宴惑於內侍孫海客等撻二內使幾斃慈聖太后聞之切責上令取霍光傳入覽上悔悟降孫海客等明日上諭閣臣朕在冲年自多過愆惟藉諸先生力諫使朕為堯舜之君張居正因奏諸內臣老成亷慎者存之諂佞放恣者汰之皇上亦宜痛改戒宴飲以重起居專精神以廣繼嗣節賞賚以省浮費却玩好以定心志親萬幾以明庶政勤講學以資治理端趨向以肅士風則聖德愈光矣上深嘉納之十二月甲辰張居正請屬儒臣以纍朝寶訓實録分四十餘則曰創業艱難曰勵精圖治曰勤學曰敬天曰法祖曰保民曰謹祭祀曰崇孝敬曰端好尚曰慎起居曰戒遊佚曰正宫闈曰教儲二曰睦宗藩曰親賢臣曰去好邪曰納諫曰守法曰敬戒曰務實曰正紀綱曰審官曰久任曰重守令曰馭近習曰待外戚曰重農曰興教化曰明賞罰曰信詔令曰謹名分曰却貢獻曰慎賞賚曰甘節儉曰慎刑獄曰褒功德曰屏異端曰飭武備曰禦寇盜仍勑次第進呈俟明年開講其諸司章奏切要者即講畢面裁時上留意翰墨居正以為筆札小技非君德治道所係故有是請上嘉納之九年春正大學士張居正請令翰林分番入直應和文章或令侍上清宴質問經義陳說治理如唐宋故事夏四月辛亥上御文華殿張居正以給事中傅作舟疏進覽云今江北淮鳯及江南蘇松連被災傷民多乏食至以樹皮充饑或相聚為盜大有可憂上曰淮鳯頻年告災何也居正對曰此地從來多荒少熟元末之亂皆起于此今當破格賑之上曰然居正極言今有司負職如積穀一事屢㫖申飭竟成虛文上作色曰有司忽民宜重處之居正曰以後犯者當如聖諭又曰江南北旱河南風災畿內不雨勢將蠲賑惟皇上量入為出加意撙節如宫費及服御可減者減之賞賚可裁者裁之至若施舍緇黃不如豫吾赤子也上曰然今宫費俱節賞賚不溢居正曰皇上謂從舊亦近例耳如今年暫行明年即為例非祖制也臣不敢逺引如皇祖用度最繁然內帑尚有餘積隆慶初庫貯尚有餘萬今歲入百二十萬猶稱乏惟皇上省察上是之十一月張居正一品考滿賜金幣及酒果甚厚手勑褒諭有精忠大勳言不能盡官不能酬之語加上柱國太師支伯爵俸居正固辭允之十年二月丁酉大學士張居正上言安民之道在察其疾苦今尚有一事為民害者帶徴稅糧也夫百姓財力有限一歲之入僅足供一歲不幸歲歉目前尚不能辨豈復有餘力更完纍歲積逋乎有司避責往往將今年所徴抵完舊逋即今歲所缺又為將來帶徴矣况徴輸額緒繁多年分淆雜小民竭脂膏胥吏飽溪壑甚者不肖有司因而􅀈獵夫與其朘民以實奸貪之槖孰若盡蠲以施曠蕩之恩乞諭户部核萬厯七年以前積負悉行蠲免將見年正額責令盡完在百姓易辦在有司易徴是官民兩利也上從之詔下中外大悅三月丁卯張居正有疾求私宅票擬從之六月甲午居正以疾再乞休不允上以細務委張四維大事即居正家平章以遼左大捷斬速把孩功進張居正太師甲辰上遣司禮太監賚手勑諭張居正曰聞先生糜飲不進朕心憂慮國家大事當一一為朕言之居正力疾疏謝并上密奏薦禮部尚書潘晟吏部左侍郎余有丁明日上即命二人入閣丙午大學士張居正卒上震悼輟朝遣司禮太監張誠監護喪事賜賻甚厚兩宫太后及中宫俱賜金幣賜祭十六壇贈上柱國諡文忠居正性深沈機警多智數為史官時嘗濳求國家典故及時務之切要者者剖晣之遇人多所咨詢及攬大政登首輔慨然有任天下之志勸上力行祖宗法度上亦悉心聽納十年來海內肅清用李成梁戚繼光委以北邊壤地千里荒外警南蠻纍世負固者次第遣將削平之力籌富國太倉粟可支十年冏寺積金至四百餘萬成君德抑近幸嚴考成核名實清郵傳核地畝一時治績炳然惜其褊衷多忌剛愎自用初入政府即以私憾廢遼王久直信任奸佞好諛成風六曹之長咸唯唯聽命至章疏不敢斥名苐稱元輔始譽以伊周漸進以五臣且諛之舜禹居正亦恬然居之而中允高啓愚至以舜亦以命禹題試士當時目為勸進居正卒餘威尚在言官奏事尚稱先太師方奪情時威權震主上雖虛己以聽而內顧不堪身死未幾遂遭削奪并籍其家子孫皆不保云初上在講筵讀論語色勃如也誤讀作背字居正忽從旁厲聲曰當作勃字上悚然而驚同列皆失色上由此憚之及居正卒後䝉禍時比之霍氏之驂乘御史郭維賢疏薦吳中行等降調然上意已漸移御史楊寅秋劾王國光罷之發馮保南京閒住吳中行趙用賢艾穆沈思孝王用汲余懋學朱鴻謨趙應元傅應禎趙世卿鄒元標俱復官會潞王昏禮所需硃寶未備太后間以為言上曰辦此不難年來廷臣無耻盡獻張馮二家耳太后曰已抄沒矣必可得上曰保黠猾盡竊而逃自此內中張先生張太嶽稱謂絶以為諱而籍沒之舉亦胎於此十二年上從遼府次妃王氏奏請籍沒張居正家其産不及嚴嵩二十分之一株連頗多荆川騷動上曰遼府廢革既奉先帝宸斷又無應繼之人著推舉親枝以本爵奉祀仍准王歸葬原封抱養子述璽准依親居住給興庶糧二百石本折中半支王氏從厚援徽府例贍養張居正誣衊親藩箝制言官蔽塞朕聰私占廢遼地畝假以丈量遮飾騷動海內專權亂政罔上負恩謀國不忠本當斫棺戮尸念效勞有年姑免盡法伊屬張居易張嗣修張順張書俱令烟瘴地面充軍谷應泰曰聞之虞書良弼義取協恭秦誓個臣都無他技蓋下吏奉職乃在才具而端揆裁物則在度量卿二奔走不越章程而宰相坐論必資道術也矧承平之相與創制異冲人之相與長君異周公以惇大告成王韓琦以才偏貶公著凡以養䝉作聖不專在于宣之綜核明之察察耳世稱張居正相業譽者或許其幹略毁者僅惡其專恣然豫以皆非事實真知居正者也考居正大節特傾危峭刻忘生背死之徒耳而其他緣飾以儒術炫耀以智數譬之楊子艾墻髙基下陽處父華而不實求其論思密勿之地表帥百寮之間此實難矣方夫穆宗憑几顯帝冲齡居正拱儀同受顧命而內臣馮保竊叢于側斯時逐刁之議未行弔讓之謀濳固賣交附璫漏言市重彼商鞅之因景監相如之藉繆賢揆之結主固如是乎卒之會極傳宣新鄭被斥而馮保以快已之怨者即以酬次輔之恩居正以去保之疾者還以固綸扉之寵鬻權夷毗若互市然及乎九齡逺引頤浩外徙始乃宫府交通更唱迭和馮倚執政則言路無憂張恃中涓即主恩罔替以故扇殿清暑鋪氈禦寒居正所䝉一皆媚璫之力也至于犯蹕具獄詞連拱奴謀發宰臣風生內侍茍非天變見于上公議格於下則上官黠詐立碎奉車易之飛文赤誅魏氏居正之包藏禍心傾危同列真狗彘不食其餘矣若夫父喪奪情太阿不釋李幼孜倡之於外馮保應之於內而居正貌乞持服心冀慰留無魯伯禽之東郊不啓蹈翟方進之脫衰視事語云求忠于孝又云移孝作忠居正其無人心者乎何相倍之戾也矧乃三月歸葬六月還朝宰我之意惟在短喪曹瞞之心恐失兵柄而且吳中行趙用賢俱以星變陳言艾穆沈思孝鄒元標各以忘親入告乃復橫被鎖鐐咸加杖戍又且論死劉臺瘦斃士期錫爵以刎頸驚奔張瀚以拊膺被斥雖王巨君之芟除忤恨梁將軍之收拷太史淫刑以逞不是過也又况懋修敬修非列巍科則躋清秩是豈向歆之學冠于漢廷抑亦京絛之𣲖相援宋室乎蓋至身死踰年遼妃訴闕而東園祕器甫賜泉門緹騎金吾旋圍府第匪漢元虧師傅之恩亦田蚡貽滅族之釁也乃論者以居正之為相也進四書經解而聖學修明進皇陵碑帝鑑圖而治具克舉請詞林入直而清宴無荒請宫費裁省而國用以富任曾省吾劉顯而都蠻悉平用李成梁戚繼光而邊陲坐拓厥罪雖彰功亦不泯焉然豫以居正救時似姚崇褊礉則似趙普專政似霍光剛鷙則類安石假令天假之年長轡獲騁則吏道雜而多端治術疵而不醇斯豈貞觀之房杜而元祐之司馬乎更可異者自居正以錢穀為考成而神宗中葉大啓礦稅居正以名法為科條而神宗末造叢脞萬幾嗚呼手實之禍萌自催科申商之後流為清靜則猶居正之貽患也明史紀事本末卷六十一
