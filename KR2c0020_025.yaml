body:
  text: 明史紀事本末卷二十五浙江提學僉事谷應泰編治水江南成祖永樂元年夏四月命户部尚書夏原吉治水江南時嘉興蘇松諸郡水患頻年屢敕有司督治無功故有是命六月命侍郎李文郁往佐尚書夏原吉相度水田量免今年租稅秋八月遣都察院僉都御史俞士吉齎水利集賜夏原吉使講求疏治之法原吉上言江南諸郡蘇松最居下流常嘉湖三郡土田髙多下少環以太湖亘綿五百里納杭湖宣歙諸山水注澱山諸湖入三泖頃浦港湮塞滙流漲溢傷害苗稼拯治之法宜浚吳淞諸浦港泄其壅淤以入于海吳松江袤二百餘里廣百五十餘丈西接太湖東通海前代屢疏以當潮汐沙泥淤積旋疏旋塞自吳江長橋至下界浦約百二十餘里雖稍通流多有淺窄又自下界浦抵上海南倉浦口可百三十餘里潮汐壅障茭蘆叢生已成平陸欲即開浚工費浩大臣相視得嘉定劉家港即古婁江徑通大海常熟白茆港徑入大江皆廣川浚流宜疏吳淞江南北兩岸安平等浦港引太湖諸水入劉家白茆二港使直注海松江大黃浦乃通吳淞要道下流壅塞難即疏浚傍有范家濱至南倉浦口可徑達海宜浚令深濶上接大黃浦以達茆湖之水此即禹貢三江入海之迹俟既開通相度地勢各置石閘以時啓閉每嵗水涸時修墟岸以禦暴流疏上行之役夫凡十餘萬原吉布衣徒步日夜經畫盛暑不張蓋曰百姓暴體日中吾何忍于是水泄農田大利二年春正月復命户部尚書夏原吉往蘇松疏通舊河以大理寺少卿袁復副之六月以陜西按察司副使宋性為布政使右參政從夏原吉蘇松治水九月戊辰户部尚書夏原吉治水功成還朝三年夏六月命户部尚書夏原吉僉都御史俞士吉通政使趙居任大理寺少卿袁復賑濟蘇松嘉湖飢民上曰四郡之民頻年厄于水患今舊榖已罄新苗未成老稚嗷嗷朕與卿等能獨飽乎其往督郡縣發倉廩賑之所至善加撫綏一切民間利害有當建革者速以聞宣宗宣德七年九月蘇州知府況鍾上言蘇松嘉湖之地其湖有六曰太湖曰傍山曰陽城曰昆承曰沙湖曰南湖聫屬廣袤凡三千里其水東南出嘉定吳淞江東出崑山劉家港東北出常熟白茆港永樂初朝廷命尚書夏原吉督理疏濬水不為患年久淤塞一遇久雨遂成巨浸田皆溺焉乞仍遣大臣督郡縣吏于農隙時發民疏濬則一方永賴矣上命周忱與鍾計工力多寡難易行之世宗嘉靖元年巡撫李克嗣開吳淞江吳淞自周忱修治後天順中命巡撫崔恭濬大盈浦出吳淞𢎞治中設水利僉事伍性復濬吳淞中股及顧會趙屯浦又命工部侍郎徐貫復治吳淞自帆歸浦至分莊七十餘里至是克嗣用華上嘉崑四縣民力開吳淞江四千餘丈十餘年無水旱之憂二十二年巡按吕光詢疏修水利三事一曰廣疏濬以備瀦泄蓋三吳澤國西南受太湖陽城諸水形勢尤卑而東北際海岡隴之地視西南特髙昔人于下流疏為塘浦𨗳諸湖之水由北以入于江由東以入于海而又畎引江潮流行于岡隴之外是以瀦泄有法而水旱皆不為患今惟二江頗通一曰黃浦一曰劉家河然大河諸水源多勢盛二江不足以泄之而岡隴支河又多壅絶于是髙下俱病治之之法先其要害者宜治澱山等處菱蘆之地𨗳引太湖之水散入陽城昆承三泖等湖又開吳淞江并太石趙屯等浦泄澱山之水以達于海濬白茆港并鮎魚口等處泄昆承之水以注于江開七浦鹽鐵等塘泄陽城之水以達于江又𨗳田間之水悉入于大浦使流者皆有所歸而瀦者皆有所泄則下流之地治而潦無所憂矣于是乃濬臧村第港以溉金壇濬澡港等河以溉武進濬艾祁通波以溉青浦濬顧浦吳塘以溉嘉定濬大瓦等浦以溉崑山之東濬許浦等塘以溉常熟之北二曰修墟岸以固橫流蓋蘇松常鎮最居東南下流而蘇松又居常鎮下流秋霖泛漲風濤相薄則河浦之水逆行田間衝齧為患宋轉運使王純臣常令蘇吳作田塍禦水民甚便之而司農丞郟亶亦云治河以治田為本蓋惟田墟漸壞而嵗多水災也三曰復板閘以防淤澱河浦之水皆自平原流入江海水緩而潮急沙隨浪湧其勢易淤不數年既沮洳成陸嵗嵗修之即不勝其費昔人權其便宜去江海十餘里或七八里夾流而為閘平時隨潮啓閉以禦淤沙嵗旱則閉而不啓以蓄其流嵗潦則啓而不閉以宣其溢志稱置閘有三利蓋謂此也而宋臣郟僑亦云漢唐遺迹自松江而東至于海又𨗳海而北至于揚子江又沿江而西至于江陰界一河一浦大者皆有閘小者皆有堰臣按郡志與僑頗合然多湮廢惟常熟縣福山閘尚存正德間巡按御史謝琛議復吳塘等閘而不果即今金壇縣議復莊家閘江陰縣議復桃花閘嘉定縣議于橫瀝練塘鹽鐵各置閘如舊穆宗隆慶四年巡撫海瑞委松江府同知黃成樂上海知縣張嵿開浚王渡起至宋家港共長一萬一千五百七十一丈濶三十餘丈今議減半開河面一十五丈底濶七丈五尺深一丈五尺六寸共用工銀六萬餘兩是嵗大飢畚鍤雲集不兩月而河工告成民得仰食焉神宗萬厯十五年以吳中嵗遭水患奏請特設水利副使一員駐松江是嵗命許應逵蒞任發帑金十萬為修治費及首濬吳淞後及支幹開浚未完而故道反塞不一年盡為平壤功未竟谷應泰曰天下之賦半在江南而天下之水半歸吳會蓋江南之田資水灌沃特號塗泥又易霑足偃鼠飲河酌多孔取非如雍州土厚水深冀州神皋天黨也考浙西及蘇松諸郡以杭湖宣歙萬山之水奔騰涌溢盡入太湖太湖蓄瀦之餘溢于三江東流入海所謂三江既入震澤底定是也然則三江無可入之道則震澤無可定之波也明矣而乃吳淞婁江率皆淤塞黃浦白茆僅見虛名江海之門泄瀉既少震澤汪洋承流遂緩矣加以山水多沙夏秋暴漲乘勢飄流勢緩波平沙因類聚瀕湖諸泖相繼堙蕪矣夫懸師井陘僅容單騎則良將為之躊躇入告君門路隔九閽則忠臣為之泣血況于滔天臣浸泄于一線之流倒峽傾江阻于一壞之土其魚之歎能不為之寒心哉而或者謂溪不入湖皆由吳江長橋之築水清沙滯勢至壅閡賴江流剽疾聚族兼行今橋梁既立水勢紆回清浮則去濁重則沉此猶賈讓治河必欲盡徙民居放河北流以入渤海而宣房築渠更播德棣分為八河以息民患誠云上䇿其事蓋難言之大抵嘉湖地據上流故溪不入湖則嘉湖代受震澤之水蘇松勢處下流故湖不入江蘇松且代受三江之水夏原吉躬履勘驗始稱太湖泛溢宜浚吳淞然蘇之吳淞沙泥淤塞旋疏旋積松之吳淞茭葦叢生漸成陸地請于嘉定開劉家港常熟開白茆港而蘇水入海于松江更開范家墳以達大黃浦而松水亦入海廣濬分支其受三江之水即所謂三江既入多為尾閭以殺震澤之怒即所謂震澤底定禹貢所書明易簡盡原吉所治委曲詳至江南水勢大略可睹矣至宣德七年況鍾復請修舉夏緒起民昏墊夫鍾之去夏僅三十年芍陂煩艾渭渠需莊而況金城柳大滄海田成世紀奄逝陵谷摧移又有吕光詢治水三利海瑞濬築奏功苟非泥橇山樏視同推溺何以稱焉明史紀事本末卷二十五
