body:
  text: 明史紀事本末卷四十六浙江提學僉事谷應泰編平蜀盜武宗正徳三年冬十月四川保寧賊藍廷瑞鄢本恕起漢中攻陷郡縣起右副都御史林俊廵撫四川兼贊理軍務督兵討之初廷瑞行山中得古棄印亡何又得一劔自謂有天命遂與其黨惑愚民倡亂時保寜賊劉烈亦聚衆作亂侵掠陜西漢中等處四年十二月藍廷瑞自稱順天王鄢本恕自稱刮地王廖惠自稱掃地王合衆十萬入冦湖廣鄖陽等處已而聞巡撫林俊督兵捕勦因流侵他境劉烈等復還至四川初烈等四出剽掠侵陜西漢中勢頗猖獗至是復還勑巡撫都御史林俊相機勦賊未㡬劉烈為亂兵所殺餘黨廖麻子喻思俸復熾五年春正月命刑部尚書洪鐘兼左都御史總督川陜湖廣河南四省軍務征勦四川等處流賊夏四月藍廷瑞廖惠等破通江縣林俊遣官兵及調玀􅉰石柱等處土兵攻敗之殺溺死者六千餘人生擒廖惠藍廷瑞奔紅口與鄢本恕合兵過陜西漢中三十六盤至大巴山俊復遣兵追及大敗之賊棄輜重走六年春正月朔江津賊曺甫自稱順天王攻圍縣治僉事吳景被殺巡撫都御史林俊聞報馳赴乗元日賊方醉酒不設備乃夜半蓐食銜枚徃圍燒之賊奔潰又于山坪伏子岸等連戰敗之抵賊營殺死曹甫等先後擒斬三千餘人收回被掠男婦七百餘口獲馬騾器仗無算五月鄢本恕藍廷瑞等縱掠蓬劔二州命總制尚書洪鐘同巡撫林俊總兵楊宏相機勦捕以靖地方復勑巡視都御史高崇熈鎮守太監韋興同洪鐘林俊㑹勦劇賊藍廷瑞鄢本恕六月洪鐘至四川與林俊議多不合軍機牽制不得速進藍廷瑞招集散亡勢復大振攻燒營山縣治殺僉事王源鐘乃㑹俊督四川陜西巡撫都御史藍章督陜西兵及檄湖廣河南兵分路進勦鐘與俊親監督之湖廣兵先追及于陜西石泉縣熨斗壩賊見追急求招撫令至四川東鄉縣金寶寺聽撫鐘給榜示并檄召廷瑞等約日出降賊意在緩師延至六月十四日始至信地依出駐營廷瑞本恕俱不出但使人來言欲得營山縣治或臨江市駐其衆方出見且要取旗牌官為質鐘等俱許之鄢本恕來見回營藍廷瑞始復來見且降且肆殺掠仍于松樹埡刼掠民家計欲脫走官兵分七哨扼之不得間賊窘甚漸潰散十五日廷瑞以所掠女子詐為已女嫁與領兵土舍彭世麟為妾結歡世麟世麟白軍門受之遂邀賊首至營宴㑹鐘令廷瑞所親鮮于金說廷瑞及本恕于十六日帥諸賊二十八人同至彭世麟赴宴伏兵盡擒之衆聞變遂大潰四出奔逸山谷鐘等遣諸路兵分道追勦之擒斬溺死并俘獲老弱兵仗騾馬甚衆未盡者許自首撫之惟賊首廖麻子未獲㨗聞加鐘太子太保俊章陞賚有差江津賊曹甫餘黨方四任鬍子麻六兒等擁衆走綦江入思南石阡等府方四偽稱總兵任鬍子偽稱御史賊首三十餘人偽稱評事等名貴州兵敗之于思南播州兵敗之于三跳等處先後擒斬三千賊由貴州復入四川八月賊攻南川南頸雀子岡等闗官兵禦之又攻東鄉永澄諸處玀􅉰兵禦之前後頗有斬獲㑹百户桞芳等陣沒官軍却賊遂聲言欲取江津重慶瀘州敘州以攻成都逺近震駭林俊駐江津高崇熈駐瀘州太監韋興駐成都都御史王綸駐重慶檄副使何珊都指揮鄒慶帥兵由合江進副使李鉞知府曹恕率兵由江津進夾攻之九月賊攻江津㑹石砫兵至并力禦之賊敗走追至合小坪破其四營賊以八千人舁攻具復攻江津林俊李鉞曹恕督酉陽播州石砫等兵三道迎擊之賊敗追至高觀山斬首五百餘級俘獲二百餘人官兵乗勝追擊賊乃乘高下石不得進賊復擁衆時出衝擊李鉞㡬不免頼從吏何士昻等力戰得解林俊見賊勢猶盛遣降賊周大富入營招撫之方四偽令其黨李廷茂出降竟不出高崇熈知賊首皆仁夀人遣人詣仁夀取各賊家屬入營招之方四等殺其族屬不聽撫遣人來言聽其自散去乃從翼日李鉞督諸將校分兵為六哨由大埡小埡月埡關並進直衝高梁賊不能支六面皆合破其中堅斬賊首任鬍子等賊大敗追殺三十餘里斬首一千八百餘級生擒方四妻妾俘獲男婦三千四百餘人餘衆墜崖填壑數里奪獲馬騾四千五百有竒土兵乘勝追勦又殺二百餘人賊見官兵少還擊殺千户田宣冉廷質等方四妻妾復逸去遂率餘賊二千餘人遁入思南境内巡撫右副都御史林俊乞致仕許之時宦者用事各邊征勦必以其弟姪私人寄名兵籍冒功陞賞俊一切拒絶權倖惡之又與洪鐘議多不合因乞致仕疏上忌者謂盜已平内批即允之臺諫疏留不報俊歸蜀人號哭追送未幾麻六兒喻思俸駱松祥范藻等賊復熾内江䝉慶之境騷然踰年不能定矣命巡撫都御史高崇熈調兵討方四廖麻子麻六兒等七年二月江津賊方四等自去年正月奔貴州八月復聚至是刼掠南川等縣高崇熈連戰敗走之閏五月方四自南川破綦江僉事馬昊敗之奔􅄔川衆遂散乃變姓名潛走開縣義官李清獲之送于官十一月漢中賊廖麻子喻思俸内江賊駱松祥崇慶賊范藻等分刼州縣衆號二十萬洪鐘分勦不暇給御史王綸劾鐘縱冦殃民罷職命右都御史彭澤總制軍務同總兵時源征之八年二月巡撫四川右都御史高崇熈以盜賊不盡滅逮下獄以右僉都御史馬昊巡撫四川夏四月彭澤率苖兵攻漢中劇賊廖麻子破之衆遯竄山寨多伏匿箐棘中澤分兵搤出入奪水道渡開一面縱賊夾誅之且盡廖有異術能隠形事急跳身遁購之卒不獲因移兵内江討松祥平之九年春正月彭澤率兵討崇慶劇賊范藻等平之四川羣盜悉定加總制軍務彭澤為太子太保左都御史時源為左都督谷應㤗曰正徳中蜀盜藍廷瑞鄢本恕廖惠起漢中曹甫方四起江津廷推林俊優詔特起俊時憂闋家居也俊既受命通江之戰擒廖惠走廷瑞賊勢窮蹙轉窺秦隴呉景之死曹甫授首江津不振僅走貴州俊之視蜀初効可謂李綱入來方有朝廷光弼代軍旌旗變色者矣而乃洪鐘出督崇熈㑹勦兵有連鷄之形將無輔車之勢我志方瑕醜氛復振然後羣帥戮力數道並進雖誘而殺降疑近不祥詎知縱之復叛無異養癰廷瑞本恕檻車詣闕保寧餘黨誅鋤畧盡所不獲者廖麻子一賊耳方四再冦江津俊又六面督攻斬其渠帥四之妻孥悉俘帳下雖蠻官卜衂四幸漏網喙息黔中已墮心膽假令借籌有人處置得宜璽詔優奬留俊撫綏汲黯卧治淮陽韋臯乆鎮西川錦江三峽之間遂将桴鼔不鳴乎角巾扁舟䡖装還里蜀民追送涕泗横流誰秉國成何其謬哉於是漢中餘孽廖麻子再與喻思俸等倡亂矣黔中逋冦方四復與麻六兒等出掠矣内江崇慶相繼効尤范藻松祥人思雄長夫蜀冦紛紜本非劇賊王師壓境實皆勁旅然而中人邀爵必使子弟監軍鄙夫秉均喜言賊平受賞彭澤甫出餘黨旋平葢用兵六載屢成屢衂俊既去位人多畏咎至崇熈逮而洪鐘撤爭利諸臣抑已知難而退矣澤遂得專制閫外削平全蜀夫林俊當小腆初張舉朝貪功之日而彭澤當賊氛滋蔓命臣畏禍之時澤遂享有功名俊以齎志老死君子於俊不無李廣祖逖之感焉明史紀事本末卷四十六
