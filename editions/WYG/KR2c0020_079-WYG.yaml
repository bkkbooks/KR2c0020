body:
  text: 明史紀事本末卷七十九浙江提學僉事谷應泰編甲申之變懷宗崇禎十七年春正月朔大風霾占曰風從乾起主暴兵城破鳳陽地震李自成稱王於西安僭國號曰順改元永昌賊掠河東河津稷山榮河絳州一路俱陷自成偽牒兵部約戰言三月十日至兵部執牒者則京師人自涿州還值逆旅客予十金代投以為詐斬之上憂寇臨朝而歎曰卿等能無分憂哉大學士李建泰進曰主憂如此臣敢不竭力臣晉人頗知寇中事臣願以家財佐軍可資數月之糧臣請提兵西行又曰進士石嶐願單騎走陜北連甘肅寧夏之兵外連羌部召募忠勇勸輸義餉𠞰寇立功否亦内守西河扼吭延安使賊不得東渡上悦曰卿若行朕當倣古推轂上欲用石嶐建泰曰俟臣西行酌而用之癸丑夜星入月中占云星入月中國破君亡乙卯上命大學士李建泰出師行遣將禮命駙馬都尉萬煒以特牲告太廟上臨軒廷授建泰節劍備法駕警蹕御正陽門賜宴餞之命五府掌印侯伯内閣六部都察院掌印官及京營總協侍坐鴻臚贊禮御史糾儀大漢將軍侍衛設宴作樂上親賜巵酒曰先生之去如朕親行建泰頓首起行上目送之良久返駕是日大風揚沙占曰不利行師建泰御肩輿不數武杆折識者憂之授進士凌駉職方司主事隨輔臣監軍赦李政修罪隨輔臣軍前效用以郭中􅇐為副總兵充督輔中軍旗鼓西洋人湯若望隨行修火攻水利進士程源私于監軍凌駉曰此行也兼程抵太原收拾三晉猶可濟也若三晉失守無能為矣建泰出都道聞山西烽火甚急建泰家且破因遲行日三十里師次涿州營兵逃歸者三千人行至廣宗紳衿城守不納攻三日破之殺鄉紳王佐笞知縣張𢎞基是日即移兵出城初建泰承上寵命恃有家財可佐軍需已聞家破進退失措逡巡畿内而已二月朔上平旦視朝忽得偽封啟之其詞甚悖末云限三月望日至順天㑹同館暫繳一時相顧失色朝罷遂不復問李自成陷蒲州及汾州懷慶不守福王出奔與太妃相失遂至衞輝依潞王自成至太原太原無重兵為守山西巡撫蔡懋德遣牙下驍將牛勇朱孔訓出戰孔訓傷于砲牛勇陷陣死一軍皆歿城中奪氣賊移檄逺近有云君非甚暗孤立而煬蔽恒多臣盡行私比黨而公忠絶少甚至賄通宫府朝廷之威福日移利入戚紳閭左之脂膏盡竭又云公侯皆食肉紈袴而倚為腹心宦官皆齕糠犬豚而借其耳目獄囚纍纍士無報禮之心征斂重重民有偕亡之恨人讀之多為扼腕蔡懋德知事必不支寫遺表令監紀賈士璋間道奏京師中軍盛應時見之退歸先殺其妻子誓將死敵初八日風沙大起賊乗風夜登城懋徳應時策馬赴敵死趙布政毛副使及府縣各官四十六員咸死之賊屍之于城李自成至黎城他將陷臨晉上下罪已詔曰朕嗣守鴻緒十有七年深念上帝陟降之威祖宗付託之重宵旦兢惕㒺敢怠荒乃者災害頻仍流氛日熾忘累世之豢養肆廿載之凶殘赦之益驕撫而輒叛甚至有受其煽惑頓忘敵愾者朕為民父母不得而卵翼之民為朕赤子不得而懷保之坐令秦豫丘墟江楚腥穢罪非朕躬誰任其責所以使民罹鋒鏑蹈水火殣量以壑骸積成丘者皆朕之過也使民輸芻輓粟居送行齎加賦多無藝之征預徴有稱貸之苦者又朕之過也使民室如懸磬田卒汙萊望烟火而無門號冷風而絶命者又朕之過也使民日月告凶旱潦薦至師旅所處疫癘為殃上干天地之和下叢室家之怨者又朕之過也至于任大臣而不法用小臣而不㢘言官首䑕而議不清武將驕懦而功不奏皆由朕撫馭失道誠感未孚中夜以思跼蹐無地朕自今痛加創艾深省夙愆要在惜人才以培元氣守舊制以息煩囂行不忍之政以收人心蠲額外之科以養民力至於罪廢諸臣有公忠正直㢘潔幹才尚堪用者不拘文武吏兵二部確核推用草澤豪傑之士有恢復一郡一邑者分官世襲功等開疆即陷沒脅從之流能舍逆反正率衆來歸許赦罪立功能擒斬闖獻仍予通侯之賞於戲忠君愛國人有同心雪恥除凶誰無公憤尚懷祖宗之厚澤助成底定之大功思克厥愆歴告朕意詔下賊前鋒已至大安驛議京師城守賊至忻州官民迎降遂攻代州五臺官吏迎降總兵周遇吉守代州出奇奮撃連戰十餘日殺賊萬餘賊合諸路賊進攻遇吉兵少食盡退守寧武闗賊陷懷慶抵固闗分趨真定保定督輔李建泰兵過東光不戢士民閉城拒守建泰怒留攻三日破之上至是始聞山西全陷命跡訪諸王遣内官監制各鎮太監髙起潛監寧前鎮盧惟寧監天津通徳臨津方正化監真定保定杜勲監宣府王夢弼監順徳彰徳閻思印監大名廣平牛文柄監衛輝懷慶楊茂林監大同李宗允監薊鎮中協張澤民監西協兵部言各處物力不繼而事權紛拏反使督撫藉口上不聽真定兵叛降賊知府丘茂華聞儆先遣家人出城總督徐標執茂華下獄標麾下中軍伺標登城晝守禦刦標城外殺之出茂華茂華遂檄屬縣叛待宼賊數騎入城收帑籍近京三百里寂然無言者進魏藻徳禮部尚書文淵閣大學士總督河道屯練往天津進方岳貢户部尚書兼兵部尚書文淵閣大學士總督漕運屯練往濟寧魏藻徳辭新銜允之有言各官不可令出出即潛遁遂止藻徳等不遣詔徴天下兵勤王命府部大臣各條戰守事宜上候於文華殿都察院左都御史李邦華少詹事項煜右庶子李明睿各言南遷及東宫監撫南京上驟覽之怒甚曰諸臣平日所言若何今國家至此無一忠臣義士為朝廷分憂而謀乃若此夫國君死社稷乃古今之正朕志已定毋復多言吏科都給事中吳麟徴請棄山海闗外寧逺前屯二城徙吳三桂入闗屯宿近郊以衛京師廷臣皆以棄地非策不敢主其議前總督陜西余應桂奏賊衆號百萬非天子全力注之不可天下鎮將河南左良玉闗東吳三桂并髙傑唐通周遇吉黄得功曹友義馬科張天祿馬岱劉澤清土國寶劉良佐葛汝芝及副將丘磊惠登相王光恩孔希賢金守亮等合之調赴軍前㑹師真保之間督撫之外加一督師如史可法王永吉其人賜以尚方懸公侯之賞以鼔勵之庶賊可滅也大學士陳演乞休許之賜金幣始上憂秦寇演謂無足慮至是不自安求去宼薄寧武闗傳檄五日不下且屠總兵周遇吉悉力拒守大砲撃賊萬餘人㑹火藥盡或言賊勢重可款也遇吉曰戰三日殺賊且萬若輩何怯耶能勝之一軍盡為忠義萬一不支縛我以獻若輩可無恙於是開門奮擊殺賊數千人賊懼欲退或為賊策曰我衆彼寡但使主客分别以十擊一蔑不勝矣請去帽為識見戴帽者撃之遞出戰不二日可殲也賊引兵復進迭戰脫帽以自别我兵大敗遇吉闔室自焚揮短刀力鬬被流矢牙兵且盡見執罵賊賊于市磔焉遂屠寧武嬰穉不遺李自成既殺遇吉嘆曰使守將盡周將軍者吾安得至此寇犯大同兵民皆欲降命城守不應總兵朱三樂自刎巡撫衞景瑗督理糧儲户部郎中徐有聲朱家仕俱死之文學李若葵闔家九人自縊先題曰一門完節李自成入大同六日殺代府宗室殆盡留偽將張天琳守之天琳殺僇凶暴閱兩月陽和軍民約鎮城軍民内應殺天琳二月己丑命部院厰衞司捕各官譏察奸宄申嚴保甲巷設邏卒禁夜行巡視倉庫草塲魏藻徳請自出京議餉不許召兵部尚書張國維庶吉士史可程進士朱長治陳川諸生張鑻于中左門鑻言三策首請太子監國南首擇耆臣輔之宣府告急命鎮朔將軍王承𦙍偵寇所向庚寅召文武大臣科道于中極殿問今日方畧奏對可三十餘人有言守門乏員當今之急無如考選科道餘皆練兵加餉習聞也是日命内監分守九門稽出入京城武備積弛禁兵皆南征太倉久罄至是命襄城伯李國楨提督城守守西直門各門勲臣一卿亞二諭文武各官輸助初議僉民兵魏藻徳曰民畏賊如一人走大事去矣上然之禁民上城辛卯督師大學士李建泰上書請駕南遷願奉太子先行壬辰上召對平臺諭閣臣曰李建泰有疏勸朕南遷國君死社稷朕將何往大學士范景文左都御史李邦華少詹事項煜請先奉太子撫軍江南兵科給事中光時亨大聲曰奉太子往南諸臣意欲何為將欲為唐肅宗靈武故事乎景文等遂不敢言上復問戰守之策衆臣黙然上嘆曰朕非亡國之君諸臣盡亡國之臣爾遂拂袖起欽天監奏帝星下移詔封總兵吳三桂平西伯左良玉寧南侯唐通定西伯黄得功靖南伯給􅎁印劉澤清實陞一級劉良佐周遇吉髙傑馬岳馬科姜宣孔希貴黄蜚葛汝芝髙第許定國王承𦙍劉芳名李棲鳳曹友義杜允登趙光逺卜從吉楊御蕃各陞署一級督撫馬士英王永吉黎玉田李希沆分别應加實署始棄寧逺徴吳三桂王永吉率兵入衛又召唐通劉澤清率兵入衞澤清前命移鎮彰徳因縱掠臨清南奔惟唐通以八千人入衞已同太監杜之秩守居庸賊犯保定大學士李建泰已病中軍郭中傑縋城降賊兵潰賊入保定建泰被執御史金毓峒守西門賊執之入三皇廟見賊帥毓峒奮拳毆賊帥仆之躍入井中死妻王氏自經毓峒從子振孫以武舉效力行間登城射賊多應弦而斃城陷衆解戎衣自匿振孫王裲襠大呼曰我御史金毓峒姪也賊支解之毓峒子罌婦陳氏年十八與其祖母張母楊嫂常一時盡投于井張抱孫于懐同下侍婢四人亦從下乙未命太監馬思理馳赴大同督兵援𠞰李自成宿陽和遂長驅向宣府宣府叛將白廣恩貽總兵姜瓖書約降監視太監杜勲緋袍八騶郊迎三十里軍民聚謀籍籍巡撫朱之馮懸賞勞軍守城無一應者三命之咸叩頭曰願中丞聽軍民納款之馮獨行巡城見大砲曰汝曹試發之可殺數百人賊雖殺我無恨矣衆又不應之馮不得已乃自起燃火兵民競挽其手之馮乃奪士卒刀自刎宣府軍民俱迎降于賊鄉紳張羅彥自殺上按籍勲戚大璫徴其助餉遣太監徐髙諭嘉定伯周奎為倡奎謝無有髙泣諭再三奎漫詞以對髙拂然起曰外戚如此國事去矣多金何益奎奏捐萬金上少之勒其二萬奎密書皇后求助后勉應以五千金令奎以私蓄足其額奎匿中宫所畀二千金僅輸三千金太監王永祚曹化淳助至三萬五萬王之心最富上面諭之僅獻萬金諸内官各大書于門曰此房急賣復雜出雕鏤玩好諸物陳于市以求售後賊拷王之心追十五萬他金銀器玩稱是周奎抄見銀五十二萬珍幣復數十萬魏藻徳首輸百金陳演既放未行召入訴清苦百官共議捐助勉諭至再最後每省限額浙江六千山東四千先後共二十萬時諭上等三萬金皆無應惟太康伯張國紀輸二萬餘不及也又議前三門巨室各輸糧給軍且贍其妻孥使無内顧諸巨室多不樂而止或謂從逆官吏多非其心請赦河南北所俘偽官以攜賊黨丙申大風霾晝晦命司禮太監王承恩提督内外京城總督薊遼王永吉節制各鎮俱聽便宜行事賊警益逼有勸上南遷者上怒曰卿等平日專營門户今日死守夫復何言諭兵部曰都城守備有餘援兵四集何難刻期滅寇敢有訛言惑衆及私發家眷出城者擒治庚子上召對惟問兵餉以舉朝無人常泣下廷臣長策惟閉門止出入餘無一籌議増兵外城則内闕増兵内城則外闕襄城伯李國禎在事亦不敢抗王承恩辛丑分營都門設大砲上又召對羣臣問禦寇方畧諸臣皆嚄唶不能對廷臣舉兵部職方司員外萬元吉知兵筭任司馬給九門守者人百錢召前太監曹化淳可守城南京孝陵夜哭癸卯風晦寇自柳溝抵居庸闗踰柳溝天塹百人可守竟不設備總兵唐通太監杜之秩迎降撫臣何謙偽死私遁總兵馬岱自殺其妻子疾走山海闗時京師以西諸郡縣望風瓦解將吏或降或遁偽權將軍移檄至京師云十八日至幽州㑹同館暫繳京師大震詔三大營屯齊化門外甲辰賊陷昌平州諸軍皆降總兵李守鑅罵賊不屈手格殺數人人不能執諸賊圍之守鑅抜刀自刎賊焚十二陵享殿傳儆至京師先是上知寇儆益急下吳麟徴請徙寧逺疏飛檄趣三桂入闗三桂徙五十萬衆日行數十里是日始及闗賊騎已過昌平矣太監髙起潛棄闗走西山賊分兵掠通州糧儲上方御殿召考選諸臣問裕餉安人滋陽知縣黄國琦對中㫖授給事中餘以次對未及半秘封入上覽之色變即起入諸臣立候移刻命俱退始知為昌平失守也是夜賊自沙河而進直犯平則門竟夜焚掠火光燭天京師内外城堞凡十五萬四千有奇京營兵疫其精銳又太監選去登陴羸弱五六萬人内閹數千人守陴不充無炊具市飯為餐餉久闕僅人給百錢無不解體而賊自破中原旋收秦晉久窺畿輔空虚潛遣其黨輦金錢氊罽飾為大賈列肆于都門更遣奸黨挾貲充衙門掾史專刺陰事纎悉必知都中日遣撥馬探之賊黨即指示告賊賊掠之入營厚賄結之撥馬多降賊無一騎還者有數百騎至齊化門迤平則門而西營兵屯近郊者詰之曰陽和兵之勤王者實皆賊候騎也時人心洶洶皆言天子南狩有内官數十騎擁䕶出得勝門矣守門皆内官為政卿貳勲戚不得上乙巳昧爽開西直門納避難者内官坐城上以令箭下門立啟無敢詰問勲戚大臣惟坐視而已上早朝召對諸臣而泣俛首書御案十二字以示司禮監王之心尋拭去漏下已刻急足叩城下曰逺塵衝天寇深矣守城内臣使騎探之報曰哨騎也不為意日且午有五六十騎彎弓貫矢大呼開門守卒亟發砲斃二十騎難民死數十人門始閉須臾賊大至方報過盧溝橋俄攻平則彰義等門矣城外三大營皆潰降火車巨礟蒺藜鹿角皆為賊有賊反礟攻城轟聲震地京軍五月無餉一時驅守率多不至每堵一人多不及諸臣方侍班襄城伯李國楨匹馬馳闕下汗浹霑衣内侍呵止之國楨曰此何時也君臣即求相見不可多得矣内臣叩之曰守軍不用命鞭一人起一人復臥如故上召入因命内臣俱守城譁曰諸文武何為且言官止内操我甲械俱無奈何或曰我輩月食五十萬效死固當乃請如己巳嵗所𣲖數俱乗城凡數千人上括中外庫金二十萬犒軍是日細民有痛哭輸金者或三百金或四百金各授錦衣衞千户丙午寇攻城礟聲不絶流矢雨集仰語守兵曰亟開門否且屠矣守者懼空礟向外不實鉛子徒以硝燄鳴之猶揮手示賊賊稍退礟乃發賊驅居民負木石填濠急攻我發萬人敵大砲誤傷數十人守者驚潰盡傳城陷閤城號哭奔竄賊駕飛梯攻西直平則徳化三門勢甚危急太常少卿吳麟徴累土填西直門因單騎馳入西安門吏部侍郎沈惟炳守門曰内守有宦寺百官不得入奈何麟徴排門而入太監王徳化語麟徴曰守城人少奈何請増益之麟徴至午門遇大學士魏藻徳止之曰兵部調度兵餉已足公何事張皇耶藻徳且出閣上方休公安從入麟徴流涕固請得以非時見藻徳挽之出是日封劉澤清東平伯時左諭徳楊士聰衞𦙍文入直語閣臣左良玉吳三桂俱封而遺劉澤清且臨清地近可虞也閣揭上得封都察院左都御史李邦華至正陽欲登城中貴拒之李自成對彰義門設座晉王代王左右席地坐太監杜勲侍其下呼城上人莫射我杜勲也可縋下一人以語守者曰留一人下為質請公上勲曰我杜勲無所畏何質為提督太監王承恩縋之上同入見大内盛稱賊勢重皇上可自為計守陵太監申芝秀自昌平降賊亦縋上入見備述賊犯上不道語請遜位上怒叱之諸内臣請留勲勲曰有秦晉二王為質不反則二王不免矣乃縱之出仍縋下勲語守璫王則堯褚憲章輩曰吾黨富貴自在也初聞勲殉難贈司禮監太監廕錦衣衛指揮僉事立祠至是方知勲固從賊為逆也兵部尚書張縉彦奏曰時勢如此危急臣屢至城閾欲覘城上守禦輒為監視抑沮今聞曹化淳王化成縋賊杜勲上城未知何意恐有奸宄不測章上上手書遣縉彦上城按之至城内監沮之如故示以上傳始登問杜勲安在云昨暮上今晨下之已上聞無容致詰又曰尚有秦晉二王在城下亦欲通語縉彦曰秦晉二王既降寇如何可上化淳拂衣去因閱城上守卒寥寥兵部侍郎王家彦痛哭云賊勢如此監視將營兵調去李襄城處尚有十之四家彦所守兩堵僅一卒語未竟城下坎墻聲急太監王承恩砲撃之連斃數人化淳化成飲酒自若縉彦馳至内閣約同奏至宫門傳止之上下詔親征召駙馬都尉鞏永固謀以家丁䕶太子南行對曰臣等安敢私蓄家丁即有之何足當賊乃罷已召王承恩亟飭内員備親征申刻彰義門啟蓋太監曹化淳獻城開門也賊恣殺掠前太學士蔣徳璟宿㑹館被創上亟召閣臣入曰卿等知外城破乎曰不知上曰事亟矣今出何䇿俱曰陛下之福自當亡慮如其不利臣等巷戰誓不負國命退是夕上不能寢内城陷一閹奔告上曰大營兵安在李國楨何往答曰大營兵散矣皇上宜急走其人即出呼之不應上即同王承恩幸南宫登萬嵗山望烽火燭天徘徊踰時回乾清宫硃書諭内閣命成國公朱純臣提督内外諸軍事來輔東宫内臣持至閣因命進酒連沃數觥嘆曰苦我民爾以太子永王定王分送外戚周田二氏語皇后曰大事去矣各泣下宫人環泣上揮去令各為計皇后頓首曰妾事陛下十有八年卒不聽一語至有今日皇后拊太子二王慟甚遣之出后自經上召公主至年十五嘆曰爾何生我家左袖掩面右揮刀斷左臂未殊死手慄而止命袁貴妃自經繋絶久之蘇上抜劒刃其肩又刃所御妃嬪數人召王承恩對飲少頃易靴出中南門手持三眼鎗雜内豎數十人皆騎而持斧出東華門内監守城疑有内變施矢石相向時成國公朱純臣守齊化門因至其第閽人辭焉上太息而去走安定門門堅不可啟天且曙矣帝御前殿鳴鐘集百官無一至者遂仍回南宫登萬嵗山之夀皇亭自經亭新成所閱内操處也太監王承恩對縊上披髪御藍衣跣左足右朱履衣前書曰朕自登極十七年逆賊直逼京師雖朕薄徳匪躬上干天咎然皆諸臣之誤朕也朕死無面目見祖宗于地下去朕冠冕以髪覆面任賊分裂朕屍勿傷百姓一人又書一行百官俱赴東宫行在猶謂閣臣已得硃諭也不知内官持硃諭至閣閣臣已散置几上而反文武羣臣無一人知者丁未昧爽天忽雨俄微雪須臾城陷賊先入東直門殺守門御史王章守卒蟻墜兵部侍郎張伯鯨走匿民舎賊騎塞巷大呼民間速獻騾馬賊經象房橋羣象哀鳴淚下如雨内臣前導兵部侍郎王家彦自經于民舍大學士魏藻徳等未聞變猶傳單醵金方岳貢范景文方傳導至西長安門亟還賊千騎入正陽門投矢令人持歸閉門得免死於是俱門書順民太子走詣周奎第奎臥未起叩門不得入因走匿内官外舍上之出至南宫也使人詣懿安皇后所勸后自裁倉卒不得達兩宫已自盡宫人號泣出走宫中大亂懿安皇后青衣䝉頭徒步走入成國公第尚衣監何新入宫見長公主斷肩仆地與宫人救之而甦公主曰父皇賜我死我何敢偷生何新曰賊已將入恐公主遭其辱且至國丈府中避之乃負之出午刻李自成氊笠縹衣乗烏駁馬偽丞相牛金星尚書宋企郊等五騎從之時宫中大亂諸賊帥率其騎皆擐甲執兵先入清宫諸宫人逸出遇賊復入宫人魏氏大呼曰賊入大内我輩必遭所汚有志者早為計遂躍入御河死頃間從死者積一二百人自成自西長安門入彎弓仰天大笑手發一矢中坊之南偏至承天門自成顧盼自得復彎弓指門榜語諸賊曰我一矢中其中字必一統射之不中中天字下自成愕然牛金星趨而進曰中其下當中分天下自成喜投弓而笑司禮視印太監王徳化以内員三百人先迎徳勝門令仍舊任各監局印官迎亦如之因集選百餘人餘皆散去自成入宫問帝所在大索宫中不得偽尚璽卿黎某進曰此必匿民間非重賞嚴誅不可得今日大事不可忽也乃下令獻帝者賞萬金封伯爵匿者夷族自成登皇極殿據黼座牛金星檄召百官期二十一日俱集于朝禁民間諱自成等字自成同偽都督劉宗敏等數十騎入大内太監杜之秩曹化淳等前導自成責其背主當斬秩等叩首曰識天命故至此自成叱去之賊分宫嬪各三十人牛金星軍師宋獻策等亦各數人宫人費氏年十六投眢井賊鈎出之見其姿容争相奪費氏紿曰我長公主也若不得無禮必告汝主羣賊擁之見自成自成命内官審之非是賞部校羅賊羅攜出費氏復紿曰我實天潢之𦙍義難茍合惟將軍擇吉成禮死生惟命賊喜置酒極歡費氏懷利刃俟賊醉斷其喉立死因自刎自成大驚令收塟之内臣獻太子自成留之西宫封為宋王太子不為屈辛亥改殯先帝后出梓宫二以丹漆殯先帝黝漆殯先后加帝翼善冠衮玉滲金靴后袍帶亦如之谷應泰曰粤稽愍帝以戊辰即位而李自成諸賊即以是嵗起延安禍本相尋若與俱始焉自兹以後愍帝未明求衣徴兵檄餉日以討賊為事而自成輩蹶而復振有同鳥獸之散忽若鳶烏之聚遂使民勞板蕩將霣妖氛蓋至十七年之久而黄巢直逼闗門赤眉大入内地雖有智者又安所謀禦敵哉乃若正旦風霾孝陵夜哭恒星入月帝曜下移則天變見矣又若僭號咸陽畧據太原突入居庸驟窺畿輔則地險失矣更若勤王之徼徴者未赴罪已之詔聞者不感飾賈吏于輦下而機務盡輸誘撥馬於營中而偵刺鮮實則人事去矣當此之時茍且以自救忍恥以圖存者止三策耳余應桂請㑹師真保吳麟徴請徙帥入衛范景文李邦華請遷國南都此其可行者也然而發言盈庭是用不集者智絀于晚圖而事乖于窘步也卒之北門鎖鑰盡授貂閹東閣鼎鐺徒聞肉食帑乏瓊林之聚兵多祁父之呼奪禁門而不啟幸戚里而却返斯時虞淵日墜空想揮戈周鼎天移誰能沒水蓋至後宫賜盡三王出奔國破家亡既血飛于繡襪生人死别又腸斷于桓山豈非涉亂世而多艱生皇家而不幸者乎更可哀者酌巵内殿望火南宫殺生取義寧從青蓋之占披髪投繯不入景陽之井然且朕屍可裂民命毋殘恨結幽泉言存衣帶語云國君死社稷又云亡國正其終宜乎蓐螻之􅉏御誓欲前驅而茇舍之大夫相從地下也然而致禍有由因衰激極彼周業衰于幽厲不在􅓆狐漢道替于桓靈豈闗蜀郡故明不亡于武皇者以孝宗之藴澤厚而明無救于愍帝者以熹廟之留毒長也乃論者又以善善惡惡郭公致亂知人則哲帝堯所難即懐宗遺詔亦以諸臣誤國理或有然爾明史紀事本末卷七十九
