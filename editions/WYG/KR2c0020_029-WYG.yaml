body:
  text: 明史紀事本末卷二十九浙江提學僉事谷應泰編王振用事宣宗宣徳十年春正月甲戌帝崩于乾清宫時皇太子方九嵗即皇帝位詔以明年為正統元年秋七月命司禮太監王振偕文武大臣閲武于將臺振矯㫖以隆慶右衞指揮僉事紀廣為都督僉事振山西大同人初侍上東宫及即位遂命掌司禮監寵信之呼為先生而不名振遂擅作威福時輔臣方議開經筵而振乃導上閲武將臺臺在朝陽門外近郊集京營及諸衞武職試騎射殿最之紀廣者常以衞卒守居庸往投振門大見親䁥遂奏廣第一超擢之宦官專政自此始太皇太后張氏嘗御便殿英國公張輔大學士楊士奇楊榮楊溥尚書胡濙被㫖入朝上東立太皇太后顧上曰此五人先朝所簡貽皇帝者有行必與之計非五人贊成不可行也上受命有頃宣太監王振振至俯伏太皇太后顔色頓異曰汝侍皇帝起居多不律今當賜汝死女官遂加刃振頸英宗跪為之請諸大臣皆跪太皇太后曰皇帝年少豈知此輩禍人家國我聽皇帝暨諸大臣貸振此後不可令干國事也英宗正統元年冬十月上閲武于將臺命諸將騎射以三矢為率受命者萬騎惟駙馬都尉井源彎弓躍馬三發三中上大喜撤上尊賜之觀者皆曰往年王太監閲武紀廣驟陞今天子自來顧一杯酒耶然竟無殊擢四年冬十月福建按察僉事廖謨杖死驛丞丞故楊溥鄉里僉事又士竒鄉里也溥怨謨論死士竒欲坐謨因公殺人爭議不决請裁太后振曰二人皆挾鄉故抵命太重因公太輕因對品降調太后從之降謨同知振言既售自是漸摭朝事五年春二月命侍講學士馬愉侍講曹鼐並直内閣機務先是王振語楊士奇曰朝廷事賴三位老先生然三公亦髙年倦勤矣後當何如士奇曰老臣當盡瘁報國死而後已榮曰先生安得為此言吾輩老無能效力當以人事君耳振喜越日即薦曹鼐苗衷陳循髙榖等遂次第擢用士奇因尤榮榮曰彼厭吾輩吾輩縱自立彼容能已乎一旦内中出片紙命某某入閣則吾輩束手矣今四人竟是我輩人何傷也士奇是其言六年夏四月太監王振矯㫖以工部郎中王佑為工部右侍郎振既㺯權佑以謟媚超擢與兵部侍郎徐琋極意逢迎之佑貌美而無鬚善伺候振顔色一日振問曰王侍郎何無鬚對曰老爺所無兒安敢有聞者鄙之五月兵科給事中王永和劾掌錦衣衞事指揮馬順怙寵驕恣欺罔不法不報順王振黨也八月召山東提學僉事薛瑄為大理寺左少卿初王振問楊士奇曰吾鄉人誰可大用者士奇薦瑄乃有是召至京朝見不謁振振至閣下問何不見薛少卿二楊為謝振知李賢素與瑄厚召至閣下令致己意且言振素問之賢至朝房與瑄言瑄曰厚徳亦為是言乎拜爵公朝謝恩私室吾不為也久之振知其意亦不復問一日㑹議柬閣公卿見振皆拜一人獨立振知其為瑄也先揖之且告罪然自是益深衘之十月三殿工成宴百官故事宦者雖寵不得預王庭宴是日上使人視王先生何為振方大怒曰周公輔成王我獨不可一坐乎使以聞上為蹙然乃命東華開中門聽振出入振至問故曰詔命也至門外百官皆望風拜振悦械户部尚書劉中敷侍郎呉璽陳瑺於長安門時以京城乏草御用牛馬欲分牧民間言官劾其紊制王振命械之閲十六日得釋以侍郎王佐署部事七年冬十月太皇太后張氏崩初宣宗崩上冲年踐阼事皆白太后然後行委用三楊政歸臺閣毎數日太后必遣中官入閣問施行何事具以聞或王振自斷不付閣議者必立召振責之太后既崩振益無所憚矣太監王振盗去大祖禁内臣碑洪武中太祖鑒前代宦官之失置鐵碑髙三尺上鑄内臣不得干預政事八字在宫門内宣徳時尚存至振去之十二月太監王振矯㫖以徐晞為兵部尚書時振權日重晞以謟見擢於是府部院諸大臣及百執事在外方面俱攫金進見毎當朝覲日進見者以百金為恒千金者始得醉飽出由是競趨苞苴乃被容接都御史陳鎰王文俱跪門俯首焉振姪千戸山為錦衣衛指揮同知世襲尋命侍經筵八年夏四月雷震奉天殿鴟吻詔求直言初張太后既崩王振遂無忌憚作大第于皇城又作智化寺于居東以祝釐自撰碑始弄威福時楊榮先卒楊士竒以子稷故堅臥不出惟楊溥在朝年老勢孤繼登庸者悉皆委靡于是大權悉歸振矣侍講劉球上言十事勤聖學以正心德親政務以總乾綱别賢否以清正士選禮臣以隆祀典嚴考核以篤吏治慎刑罰以彰憲典罷營作以蘇民勞定法守以杜下移息兵威以重民命修武備以防外患疏入下獄初王振憾球阻麓川之師錦衣指揮彭德清球鄉人也往來王振門用事公卿率趨謁球獨不為禮徳清銜之㑹球疏上乃激振曰公知之乎劉侍讀疏之三章葢詆公也振怒欲置之死㑹編修董璘自陳願為太常而球疏有太常不可用道士宜易儒臣語乃逮璘及球俱下獄振即令其黨錦衣衞指揮馬順以計殺球一夕五更順獨攜一校推獄門入球與董璘同臥小校前持球球知不免大呼曰死訴太祖太宗校持刀斷球頸流血被體屹立不動順舉足倒之曰如此無禮遂支解之裹以蒲埋衞後隙地董璘從旁匿球血裙尋得釋宻歸球家家人始知球死子釪鉞求屍僅得一臂乃以血裙塟焉小校盧氏人故與耿九疇鄰一日見九疇視其瘠不類平時曰汝得無疾乎校具以實告且曰馬順將舉事宻語我曰今夕有事汝當早來至則使懐刃相隨迫于勢不得不爾比聞劉公忠吾儕小人死有餘罪矣因慟哭死未幾馬順子亦死死時捽順髪拳且蹴之曰老賊令爾異日禍踰我我劉球也太監王振陷大理寺少卿薛瑄下錦衣獄誣死罪瑄素不為振屈振銜之㑹有武吏病死其妾有色振姪王山欲奪之妻持不可妾因誣告妻毒其夫都御史王文究問已誣服瑄辨其寃屢駁還之王文謟事振譛之嗾御史劾瑄受賄故出人罪廷鞫竟坐瑄死下獄瑄怡然曰辨寃獲咎死何愧焉在獄讀易以自娯初瑄既論死子淳等三人請一人代死二人戍贖父罪不許將決王振老僕泣于㸑下振問之曰薛少卿不免是以泣曰何以知之曰鄉人也因述其平生振少解㑹侍郎王偉申救之得免死除名放歸田里南京國子監祭酒陳敬宗考績至京振素慕敬宗名欲致之門下適南畿巡撫周忱亦在京師謁振知忱與敬宗同年語之意忱詣敬宗達之敬宗曰為人師表而求謁中官可乎忱乃謂振曰陳祭酒善書法以求書為名先之禮幣彼將謁謝矣振然之乃遺金綺求書程子四箴敬宗為書之而返其幣竟不往見敬宗為祭酒十八年不遷秋八月王振枷祭酒李時勉于國子監門尋釋之王振嘗詣監銜時勉無加禮令人㢘其事無所得彛倫堂有古樹故許衡所值也時勉嫌其陰翳妨諸生班列稍命伐其旁枝振遂誣以伐官木私家用矯㫖令荷校肆諸成均時為三械與司業趙琬掌饌金鑑同校時勉校特重而竅隘鑑請易之時勉不可監生石大用乞以身代號哭奔走闕下上疏求解者數千人㑹昌伯孫繼宗言于孫太后太后為上言之始知振所為也命立釋之内使張環顧忠匿名寫誹謗語錦衣衞鞫之得實詔磔于市仍令内官出觀乃知誹謗者訐振惡也九年秋七月駙馬都尉石璟詈家閹吕寳太監王振惡之下錦衣獄冬十月下監察御史李儼錦衣獄時儼監收光祿寺祭物值太監王振不跪遂得罪戍鐵嶺衞十年春正月錦衣衞卒王永陰掲王振罪于通逵匿其名邏校緝得之詔即磔于市不覆奏秋七月霸州知州張需下錦衣獄需善字民順天府丞王鐸嘗旌異之有牧馬官擾民需置于法牧馬官以譛太監王振遂被逮箠楚幾死謫戍邊併坐鐸私舉下于理十一年春正月賜司禮太監王振白金寳楮綵幣諸物振姪林為錦衣衞指揮僉事賜振勑曰朕惟旌徳報功帝王大典忠臣報國臣子至情爾振性資忠孝度量𢎞深昔皇曽祖時特用内臣選拔事我皇祖教以詩書玉成令器眷愛既隆勤誠彌篤肆我皇考以爾先帝所重簡朕左右朕自在春宫至登大位幾二十年爾夙夜在側寢食弗違保䕶贊輔克盡乃心正言忠告禆益實至特兹勑賞擢爾後官詩云無徳不報書曰謹終如始朕朝夕念勞爾其體至意焉三月降巡撫山西河南兵部侍郎于謙為大理寺左少卿仍巡撫謙撫梁晉十餘年懼盈滿舉叅政孫原貞王來自代時王振方用事謙每入京末嘗持一物交當路又御史有姓名類謙者常忤振振意以為謙嗾言官劾之罷為大理少卿二省民倍道赴闕乞留親藩亦以不可無謙請乃復命巡撫十三年春二月修大興隆寺寺初名慶夀在禁城西金章宗建太監王振言其敝命役軍民修之費巨萬壯麗甲于京都上臨幸焉十四年秋七月衛拉特額森大舉入宼王振挾帝親征八月師潰于土木帝北狩䕶衞將軍樊忠者從帝旁以所持棰捶死振曰吾為天下誅此賊遂突圍殺數十人死之報至廷臣請族誅振振所親馬順及王毛二侍一時被擊死都御史陳鎰奉郕王令㫖籍其家并振從子山臠于市族属無少長皆斬振家當京城内外凡數處重堂邃閣擬于宸居器服綺麗尚方不逮玉盤百面珊瑚髙六七尺者二十餘株金銀六十餘庫幣帛珠寳無筭天順元年五月英宗復辟思振諱為忠所殺詔復振官刻木為振形招魂塟之祀智化寺賜額曰旌忠谷應泰曰宣皇晏駕新主幼沖王振以青宫舊侍儼然自負顧命其時三楊猶在位也太后賢明有漢馬氏宋髙后風當其責振掖庭呼刅加頸三楊能叩首力爭逺竄裔土勢如摧枯非直瑾城狐外庭口舌比也乃競庇鄉曲爭辨朝堂振陽持平允之名陰得中宫之喜然後知三楊之瑕振固已窺之早矣匡衡入相不制𢎞恭胡廣三公難除甫節心熏祿位志怵禍機前有䜛而不見後有賊而不知而小人遂得乘其隙也太后升遐東楊謝世二楊衰老後進孤危以諸賢垂暮之氣當奸人新發之鋒李時勉祭酒也頭囊三木劉中敷上卿也荷械九門石璟帝婿也待繫請室薛瑄廷尉也論斬禁獄而侍中劉球竟為振黨竊殺蒲埋犴狴歸塟血裙悲夫侍中戰死僅返汚衣吕祉魂歸惟持括帛雖范滂不祭皋陶綘侯見溺死灰未有若斯之慘者也英宗初立年僅九齡至張后崩時年已十六質果英敏亦當知上官之詐矣何至呼為先生使振周公自待大晏不預懼振慚憤乃開東華中門令振出入以悦之此何異哀寵董賢願讓天下僖呼阿父遂作門生者與夫宵人搆禍自古多有然或驪龍乘睡盜竊寵靈以故武愛韓嫣旋為賜死文信新垣亦隨誅滅小人敗露固有時也亦或受制家奴危同履虎晉簡文風神憔悴唐文宗涕下沾袍猶曰勢已去矣云如之何未有㚥形屢敗酷政亟聞外戚入暴其非親藩共聞其狀振又勢若孤雛根非磐據而白金綺幣頒賜寵褒擅殺剬威槩置不問土木之變六軍敗績九廟震驚青城覆轍躬自蹈焉馬嵬播越應思林甫之奸回紇稱戈當悞元載之罪而乃復辟以來常懐聖慮九原可作發嘆拊髀三徑猶存空悲盧宅招魂榆塞雕木浮屠為振復讎貽譏後世何其謬哉考直瑾忠賢皆䝉主眷而没後追思惟振一人天祐人國假手額森樊忠殺振而後戰没功何偉也嚮令英宗不䧟賊兇璫不授首天假之年而滋其毒明社之屋寧竢今矣明史紀事本末卷二十九
