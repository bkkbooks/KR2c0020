body:
  text: 明史紀事本末巻四十浙江提學僉事谷應泰編興復哈密憲宗成化九年秋九月土魯番蘇勒坦阿里王入哈宻掠王母併金印去哈宻漢西域唐伊州地也漢武帝置酒泉張掖燉煌三郡即令甘涼肅之境又出玉門關通西域置都䕶及戊巳校尉以斷單于右臂則今之哈宻云晉為涼州牧張實所據歴後魏西域復通隋焬帝因裴矩進圖記躬度玉門關置伊吾且未鎮唐𨽻隴右道安氏之亂盡没吐番地無水而常寒多雪雪銷乃得水元封其裔烏訥錫哩為威武王居之明初髙皇帝定陜西甘肅諸鎮嘉峪關以西置不問永樂二年恩克特穆爾貢馬詔封為忠順王即其地置哈宻衛關以西衛七曰哈宻安定鄂端齊勤䝉古察遜罕東罕東左而哈宻最西東去肅州西去土魯畨各千五百里北數百里抵衛喇特以天山為界授其目瑪哈穆特和濟木等指揮分居峪城賜金印詔命凢西域入貢悉道哈宻譯上亦漢武遺意也洪熈元年哈宻貢硫黄上曰哈宻旣有硫黄猝遇戰鬬須有備敕邊吏知之正統四年衛喇特强數侵哈宻哈宻懼稍持兩端璽書諭毋背徳終不悛至拘留漢人轉鬻使至多暴横邊吏請責詔曲貸之而忠順王再𫝊為博囉特穆爾天順末見弑無子王母遵達實哩署國事為竒木嘉色稜所破成化二年兵部奏王母以竒木嘉色稜侵掠避居齊勤苦峪今冦退宜敕復還哈宻乃以巴圗穆爾為右都督守哈宻巴圗穆爾本輝和爾族故忠義王外孫也巴圗穆爾死子哈尚嗣而土魯畨時强盛控弦可五萬其蘓勒坦阿里尤雄黠至是挟哈宻哈尚諸夷王母不從遂見掠及劫金印去哈尚竄苦峪城衆或歸附居肅州亦有隨土魯畨去者甘肅撫臣婁良以聞兵部尚書白圭言哈宻為我西藩土魯畨無故凌奪不救則齊勤諸衛盡為蠶食嘉峪外皆强敵而禍中甘肅請集廷議恢復因舉髙陽伯李文右通政劉文徃經畧之比至哈宻衆已潰散文等不敢深入止調集罕東齊勤諸番兵數千駐苦峪不敢進謬言阿里欲乘虚擣二衛宜還兵自為守遂引還阿里始輕中國益侵内屬諸衛矣十二年秋八月土魯畨蘇勒坦阿里遣使齊爾宻朗來貢且致書鎮巡飾罪稱王母已死朝使至即歸金印城池然特漫語無還意其冬更鑄哈宻衛印賜哈尚于苦峪立衛居之給土田及牛具榖種十四年秋九月土魯畨蘇勒坦阿里死子阿哈瑪特立甘肅撫臣王濬請乘間納哈尚二十年冬十一月哈尚入哈宻嗣忠順王哈尚貪殘國人觖望西城諸貢使苦要索亦有違言孝宗𢎞治元年冬十二月土魯畨阿哈瑪特殺忠順王哈尚復據哈宻時有奸回誘阿哈瑪特攻哈宻阿哈瑪特亦壯乃曰哈尚非托克托族安得王王故應我陽好語哈尚聨姻至哈宻城下頂經盟誘殺之亦未敢頌言據哈宻遣使入貢請代領西域職貢且乞大通事徃和番兵部尚書馬文升議阿哈瑪特與哈宻各有分地安得相併以北敵之强我屢卻欵何小蠢輙與我搆且􅍀然王也姑許如例入貢請敕阿哈瑪特還王母及金印歸我哈宻璽書下阿哈瑪特怒欲勒兵近塞要求之其帥伊蘭曰哈宻去吾土千餘里敵國輻輳逺出已難况又近塞乎今旣殺其國王番漢之心皆怒若合謀并進非我利也不如乘勢還城印以欵之再圖後舉阿哈瑪特以為然四年秋九月遣哈宻衛目舎音和珊齎敕諭阿哈瑪特時王母已死阿哈瑪特亦悔禍上金印及所據城詔褒予金幣以舎音和珊為都督僉事五年春二月封哈宻善巴為忠順王遣使䕶歸之馬文升謂戎俗重種類且服元久哈宻故有囘囘輝和爾哈喇輝三種而北山又有實埒圗黙格埓相侵逼必得元裔填之可懾諸番乃行求忠順近屬得錫黙安定王姪善巴奏令甘肅守再詢諸番族立善巴可否狀番族合詞稱善巴可立為王主國事乃遣使立之輔以恩克保喇阿木呼朗未幾諸番索善巴犒賜不得阿木呼朗更引哈喇輝彛掠土魯番牛馬阿哈瑪特怒復搆兵六年冬十月土魯番復入哈宻執善巴支解阿木呼朗掠金印去事聞大學士丘濬謂馬文升曰哈宻事重須公一行文升曰方隅有事臣子豈敢辭勞但西域賈胡嗜利不善騎射古未有西域能為中國大患者徐當靖之濬復言文升乃請行諸大臣言北㓂方强文升不當徃甘涼委四方邊事乃敕兵部侍郎張海都督侯謙徃經理之㑹阿哈瑪特前遣部目賽音莽蘇爾等四十餘人修貢至京事下廷議通事王英言罕東及黙格勒等諸部怨土魯番刺骨撫而用之皆吾兵也西域使者方扣關互市為利我聲阿哈瑪特罪謝勿與通令彼窮而歸怨皆吾間也而廷議皆欲命海以檄徃如土魯番歸善巴聽予貢否則留前使勿遣而絶其後使上從之海等至甘州遣哈宻人齎璽書徃責阿哈瑪特歸善巴不報乃修嘉峪關捕哈宻奸囘通阿哈瑪特者二十餘人奏請戍廣西七年春三月下張海侯謙于獄張海等不候命遽歸上言西域逺方勢難興師哈宻存亡不必過煩中國上怒其無功下海謙獄黜之馬文升乃請安置賽音穆蘓等四十餘人于閩廣示懲創而稍用王英䇿閉嘉峪關命西域諸賈人歸怨阿哈瑪特以攜其黨從之乃閉嘉峪關絶西域貢時西域諸胡皆言成化間我入貢皇帝先遣中貴人迓我河南至京宴賜甚夥今不撫我我泛海萬里貢獅子謂我開海道却不受即從河西貢者賞宴亦薄天朝棄絶我相率從阿哈瑪特且拒命中國能奈我何阿哈瑪特遂復入據哈宻自稱為汗大掠罕東諸郡諜言土魯番用雲梯攻肅州且􅏳甘州文升曰是虚聲恫喝我耳土魯番至哈宻十數程中經黑風川哈宻至苦峪又數程皆絶水草貢使徃返䭾水行我苐整師旅謹斥堠俟彼至肅州出竒縱撃以逸待勞可匹馬不返也八年春正月阿哈瑪特西去留其將伊蘭與蘓都爾率精鋭二百守哈宻伊蘭機警驍勇絶人能并開六弓夜宿十徙雖近人莫知所在哈宻脅從者皆懾服不敢動其雄黠者反從之教以撓中國之術馬文升聞之曰是可襲而執也召肅州指揮楊翥至計事撫其背曰爾諳畨情悉西域道里今欲擒斬伊蘭策安出翥言罕東有間道可進兵不旬日逹哈宻文升曰如若言以罕東兵三千為前鋒我師三千後繼各持數日熟食兼程襲之若何翥稱善而甘肅廵撫都御史許進亦以方畧聞且曰不斬伊蘭則天威不振土魯番終不知懼文升乃即以前䇿屬之遣副總兵彭清統鋭卒由南山馳至罕東即調罕東諸畨兵乘夜倍道襲伊蘭冬十一月許進及總兵劉寜抵肅州駐師嘉峪關外遲罕東兵不至乃偕彭清循大路行以水草乏絶不得馳伊蘭詗知乘千里馬宵遁惟餘畨人八百登臺自保師入哈宻得善巴妻女并牛羊三千斬級六十㧞哈宻脅從者八百餘人還我士馬乏糧多物故文升徒取空城竟失伊蘭然西域亦自是頗惮中國上念邊吏冒險出塞進等及太監陸誾皆以功陞秩九年三月阿哈瑪特自將蘓都爾等復襲哈宻據之先是王師入哈宻伊蘭遁歸阿哈瑪特方與齊勤䝉古衛相讐攻不能大發兵使别將將輕騎五百圖復哈宻復為齊勤䝉古所邀殺殆盡至是乃自率兵下之令蘓都爾恩克保喇居守蘓都爾不敢守哈宻就拉木城駐軍恩克保喇宻結衛喇特實埓圗襲斬蘓都爾還府哈宻阿哈瑪特遣兵圍之哈宻人舉火實埓圗来援退走十年冬十月阿哈瑪特以絶貢失互市又自許進撫甘肅實埓圗及黙格勒等部中國撓之窘甚令其兄瑪哈上書願悔過還善巴及金印易前四十餘使予貢如故馬文升恐挾詐請俟善巴金印至甘州始取賽音穆蘓等於閩廣十一月起前左都御使王越總制甘涼等處邊務經畧哈宻十一年秋八月復封善巴為哈宻忠順王先是都御史王越出河西而善巴至甘州越乃令三種都督囘回則舎音和珊輝和爾則恩克保喇哈喇輝則拜達勒黙色共佐善巴恩克保喇以哈尚弟與善巴不協乃妻善巴以哈尚女結好遂賜善巴蟒玉大帽為忠順王而釋賽音穆蘓等西歸㑹越卒哈宻三種人久厭兵初以國亂入居甘肅境上射獵為生不願歸哈宻文升請留家之半肅州徃來自便十二年春正月遣兵䕶忠順王善巴還哈宻以都督舎音和珊恩克保喇拜達勒黙色三種輔之主國事土魯番諸部許復入京朝貢勞賜良厚已而善巴嗜酒掊尅諸部阿布納等咸貳十七年春三月阿布納隂搆阿哈瑪特迎其次子津特穆爾來王哈宻善巴棄城走沙州邊吏遣指揮董傑及恩克保喇徃諭部衆迎善巴還阿布納不從傑等遂擒殺阿布納并其黨六人餘怖服乃别令都指揮朱瑄勒兵送善巴復王而以津特穆爾還土魯番津特穆爾時年十三其母亦哈尚女也㑹阿哈瑪特死諸子讐殺津特穆爾懼不敢還恩克保喇曰吾外祖也守臣恐與善巴嫌乃攜還使居甘州而其兄莽蘇爾尋定國亂自立武宗正徳元年秋九月忠順王善巴死子巴雅濟嗣位淫虐不親政事八年春二月津特穆爾還土魯番先是莽蘇爾稱蘓勒坦朝貢上書求津特穆爾兵部議質所愛不予尋逸出城追獲之七年冬始令哈宻三都督送津特穆爾西還至哈宻恩克保喇欲止之舎音和珊莽賚哈斯不可䕶至土魯番以國情輸莽蘇爾潛誘巴雅濟叛中國巴雅濟淫暴心􅇶屬部謀害欲掩恩克保喇往不從恩克保喇奔肅州八月巴雅濟棄城叛歸土魯番莽蘇爾令頭目和卓塔濟迪音與舎音和珊莽賚哈斯取金印守哈宻又令和卓瑪哈瑪廸等至甘州索賞哈宻諸部乃譯書言巴雅濟棄國從番乞命将守哈宻巡撫趙鑑謬謂莽蘇爾忠義守城勤勞命撫戎官賜之金幣撫戎官入哈宻莽蘇爾亦率衆至分據拉木等城津特穆爾又言河南大饑人死亡且半甘州城南黒河可引灌城於是莽蘇爾及和卓塔濟迪音雅穆拉日夜聚謀侵甘肅矣九年秋八月命右都御史彭澤總督甘肅統延寜固原諸鎮兵經畧土魯番莽蘇爾旣據哈宻遺責鎮廵索金幣萬贖哈宻城印總制都御史鄧璋以聞故有是命敕都督恩克保喇舎音和珊等共守哈宻齊勤等衛如遇土番内侵并力捍禦十年春正月土魯番和卓塔濟迪音㓂齊勤苦峪諸處殺掠甚慘彭澤抵甘州復遺澤書索金幣澤度莽蘇爾强未易兵定番戎可以利啗乃以繒綺二千白金噐遣通事火信同舎音和珊入土魯番説令和好莽蘇爾喜許增幣歸金印土地澤不俟報遽上言蘓勒坦莽蘇爾畏威悔禍已還哈宻侵地及金印四月遂召澤還京廵按甘肅御史馮時雍言澤處置失宜講和辱國兵部尚書陸完寢其奏莽蘇爾諜知兵罷益驕四出侵掠關外諸衛及結衛喇特寇我河西且遣人索所許增幣歸印十一年秋九月土魯番復據哈宻侵肅州初彭澤旣召還趙鑑亦去陜西左布政使李昆代鑑廵撫甘肅莽蘇爾以金印來歸兵備副使陳九疇語昆曰彭總督遇事多模稜何面目立天地間昆不能違以雜幣二百貽之令送巴雅濟還國質留来使呼都克婁賽音扎拉縻其意莽蘇爾聞留二使怒令和卓塔濟迪音雅穆蘭復據哈宻而身引萬騎直犯肅州總兵史鏞欲自甘州來援九疇以乏食止之肅州急乃以游擊芮寜出禦土魯番鋒鋭甚芮寜陣沒亡七百騎兵迫城下哈宻䧏囘居肅州城頗為内應九疇亷得其情収繫諸囘及都督實伯音德爾等凢衷甲者捶殺之嬰城守調屬部兵劫其老營而潛遣使誘衛喇特擣巢穴破其三城莽蘇爾狼狽走副總兵鄭廉及恩克保喇尾撃敗之𤓰州土魯番乃引去九疇遂發舎音和珊傾䧟哈宻狀莽蘇爾復請和廵撫李昆以聞時方命彭澤及中使張永視師疏至罷遣而莽蘇爾實無意和又不歸巴雅濟九疇謂土魯番不臣宜絶其使勿通與昆異議兵部尚書王瓊修郄澤雅右昆且忌九疇功日媒孽河西事十二年夏六月實伯音德爾子穆爾瑪哈穆特方入貢在京覘知王瓊與彭澤郄突入長安左門訟寃下錦衣衛㑹兵部三法司奏行河西訊報瓊因發澤欺㒺辱國及陳九疇輕率激變罪逮昆九疇至請定鞫户部尚書石玠曰大夫出使于外苟利社稷專之可也王瓊曰納幣㓂廷致貽後患利乎不利乎衆不能奪澤幾不免大學士楊廷和善澤得與九疇並削籍昆謫浙江副使已刑部㑹訊并脱舎音和珊死上幸㑹同館舎音和珊以秘術干進得賜國姓隨上南征十六年夏四月帝崩世宗踐祚六月逮兵尚尚書王瓊下獄謫戍榆林言官劾其忌功䧟彭澤陳九疇也遂起彭澤兵部尚書九疇僉都御史廵撫甘肅舍音和珊論斬死獄中世宗嘉靖元年秋八月土魯番莽蘇爾大舉入㓂以二萬騎入甘州都御史陳九疇率衆先登力戰解甘州圍莽蘇爾走肅州九疇乗夜倍道間抵肅州夾撃破之殺其驍將和卓塔濟廸音衆譁莽蘇爾中流矢死遂以聞時上以河西危急方遣兵部尚書金獻民都督杭雄濟師至蘭州聞捷用九疇議遷其使閉闗絶貢而莽蘇爾故無恙也莽蘇爾歸路遇額布勒兵復邀擊之大創去四年春二月土魯番雅穆蘭復據哈宻率衆入沙州侵及肅州五年春三月命尚書王憲提督陜西邊務先是起楊一清提督軍務一清聽羈縻土魯番還城印未幾召入閣以憲代憲盡出平涼羈留貢使徃諭土魯番令悔過伏罪歸我哈宻七年春正月起王瓊為兵部尚書兼右都御史提督陜西軍務初哈宻二種避讐内徙一居肅州東闗一居金塔寺諸處陳九疇議移肅州北境棄地以杜後患大學士楊一清以各部一旦外徙不北合衛喇特必西連土蕃徒足召釁議遂寢尋王憲為提督復遣使徃諭之土魯番亦未肯服而楊廷和坐議禮罷彭澤亦去職張璁桂蕚等用事方讐廷和知王瓊故怨之言哈宻不靖由彭澤澤以廷和曲庇惟急用瓊西鄙乃可寜也至是遂以瓊代憲總督瓊被用即上書論澤九疇事言莽蘇爾實不死按騐九疇誣㒺璁蕚擬坐斬并罪廷和刑部尚書胡世寜力爭九疇雖上首功失實然其人忠勇再保河西有功為土魯番所忌得不死戍邊澤金獻民歸里廷和得免十二月雅穆蘭率衆來歸雅穆蘭者本察遜人幼為土魯番所掠黠而善兵莽蘇爾倚之與舎音和珊等專伺我虚實且數盗邊至是莽蘇爾令雅穆蘭據沙州索羈留貢使且率特黙格圗卜攻肅州以遲囘欲殺之雅穆蘭惟率􅄢帳二千老稚萬人奔肅州降乞白城山金塔寺住牧未報莽蘇爾以討雅穆蘭為辭糾衛特冦肅州副使趙載遊擊彭濬等拒却之八年春二月置哈宻諸部于肅州莽蘇爾以雅穆蘭叛乃遣人貢獅子因齎譯書言願歸哈宻城及原掠人口求雅穆蘭王瓊上言哈宻旣歸乞令實伯音徳爾子穆爾瑪哈穆特守之其所歸各番貢使千餘人宜散置沙州圗卜特黙格部落五千四百人置白城山哈宻都督且吉特巴勒部落置肅州東部齊勤都督索諾木東置肅州北山金塔寺罕東都指揮枝丹置甘州南山且欲縛雅穆蘭予之下兵部議廷臣頗言哈宻難守詹事霍韜力言置哈宻者離西北之交以屏藩内郡或難其守遂欲棄之將甘肅難守亦棄不守乎太宗之立哈宻因元遺孽力能自立借虚名以享實利今嗣王絶矣天之所廢誰能興之惟於諸戎中求雄傑能守城印戢部落者因而立之毋規規忠順後可也兵部尚書胡世寜言先朝不惜棄大寜交阯何有於哈宻哈宻非大寜交阯比也忠順自哈尚以來狎比土魯番且邀索我矣國初封元孽和寜順寜安定俱為王安定又在哈宻之内近我甘肅今存亡不可知一切不問而議者獨言哈宻何也臣愚謂宜專守河西謝哈宻無煩中國便又言雅穆蘭本屬部歸正非叛者不宜遣還唐悉怛謀之事可鑒也張璁等不聽力主王瓊議安置諸戎于肅州境内獨留雅穆蘭不遣如世寜言九年冬莽蘓爾遣呼哩木納衮及天方諸使貢方物復索雅穆蘭不予莽蘓爾欲伺納衮歸即率諸戎㓂肅州㑹呼哩木納衮歸道死衛拉特又攻其北鄙我稍息肩來降人言土魯番欲以哈宻城與實伯音徳爾妻兵部因請許土魯番貢令三年或五年為期使十二人入京餘留塞上是後名存哈宻而金印遂失忠順王巴雅濟終不可復無何哈宻竟為土魯番所據諸戎部落皆為薦食失故土雲翔河西塞而北㓂窟西海衛喇特巢北山河西三面並居冦盗守臣頻嵗備羌戎無暇及闗外事矣谷應泰曰環西北鄙部落百千非叩邊而臣即仰闗而攻也漢武帝開河西四郡以隔絶南羌収三十六國以斷單于右臂殫財隕兵浮河抵漢其與蒲桃天馬妄事異域者殊矣髙帝開置甘肅二鎮勢甚孤危成祖乃設立哈宻七衛西出肅州千五百里北抵天山所謂斷右臂隔西羌也取不亡矢遺鏃守不留兵屯戍百年逋冦扼其吭而有之為國西藩計誠盛哉英宗即位土魯番始盛控弦數萬奄有哈宻劫其王母夫晉楚勢鈞猶爭新鄭蜀呉通好必取荆州以世守西藩不能出一旅相存活僅鑄哈宻衛印更賜哈尚棄地損威端先見矣其後乗䘮納主盡非長䇿阿哈瑪特旣壯復修夙釁再殺哈尚孝宗仍聽其欵更立善巴至七年善巴就執張海見欺朝議方主用兵許進上方畧楊翥議乗間夫定逺以一介使者決機俄頃猶然横行絶塞諸部怵息至甘英抵條支歴安息臨西海而進等䇿召罕東罕東不赴計斬雅穆蘭雅穆蘭宵遁兵不遇敵死亡畧盡僅得空城為世口實中國長技葢可見矣自此以後賀蘭以外不見漢室旌旗成紀以西無復李家部曲然土魯猶心惮中國蒲伏納土自武宗時忠順王巴雅濟棄城抱印歸番而番長乗釁移書邊將責取金幣贖還城印廵撫彭澤復私許繒幣邀功恢復罪過王恢辱浮廣利自西方用兵幾四十年土番未嘗一矢及闗也自此心輕中國徑薄甘肅中國稍稍被兵焉封疆之㓂未除中朝之鬭旋作左袒彭澤者輔臣力排彭澤者司馬訟大禮者又借封疆為赤幟修小隙者還假通敵為兵端嫉輔臣之激始許彭澤之欺發主帥之謀并陷九疇之㒺去年對簿今嵗賜環暮入軍門朝流荒徼置大帥如奕棋視岩疆如孤注而河西以外拱手授之他人若夫天府金湯棄同敝屣而西藩甌脱又當罪從末減矣明史紀事本末卷四十
