body:
  text: 明史紀事本末卷四十五浙江提學僉事谷應㤗編平河北盗武宗正徳四年秋九月畿南盗起時劉瑾用事專恣驕横京師之南固安永清霸州文安地方京衛屯軍雜居其地人性驕悍好騎射往往邀路刦掠號響馬盗至是聚黨益熾瑾欲速除之分遣御史寗杲于真定殷毅于天津薛鳳鳴于淮陽專事捕盗舊例御史出不得以家屬随至是杲等許􅂝家往以滅賊為期鳳鳴在歸徳與守備指揮石璽㑹飲令人歌舞為樂邏卒奏之傳㫖降鳳鳴爲徐州弓手毅在天津稍收歛惟杲奏立什五連坐法盗賊捕獲無虚日每械盗賊入真定用鼔吹前導金鼓之聲彌日不絶瑾以捕盗功擢杲毅僉都御史仍專督捕事五年冬十月霸州隆盗劉六劉七叛初霸州文安縣大盗張茂家有重樓複壁多為深害同時劉六劉七齊彦名李隆楊虎朱千户等皆附之諸大璫多文安人茂通賂納交太監張忠者號北墳張與茂居鄰結為兄弟因得徧賂馬永成谷大用輩常因内官家人出入禁中進豹房觀上蹴踘益無忌憚河間叅将袁彪數敗賊茂窘乃求救于忠忠置酒私第招彪與茂東西坐舉酒屬彪字茂曰此彦實吾弟耳今後好相看無相扼也又舉屬茂曰袁将軍與爾好今後無擾河間彪畏忠不敢誰何諸將聞風􅀈朒及寗杲至有廵捕李主簿承杲意偽作彈琵琶優人入茂家具知曲折杲率驍勇數十人乗不備掩擒之斧折茂股載歸餘賊相率至京謀逭罪忠與永成為請于上且曰必獻銀二萬乃赦之劉瑾家人梁洪亦索萬金六七楊虎計無所出潜刼近境冀以足所獻㑹虎焚官署六七知事敗散去六七膽力弓矢絶倫諸盗皆畏之涿州州官知其能召至協捕有功御史蒋瑶亦用而賞之或勸瑶并絶禍本二人竟颺去杲仍圖形捕之逮繫妻孥盡破其家六等窮蹙憤恚乃相聚抗官府刼行旅既劉瑾伏誅杲亦被劾麾下健兒多歸之詔下討賊仍許自首免罪六等遣其姊出首自領三十四人詣州知州郭坤以聞貰之令捕他盗自效至是復叛去往附畿内盗白英時英已流刼至山東六年春正月霸州巨盗劉六劉七聚衆攻安肅縣刦取繫獄盗黨齊彦名時窮民響應旬日間衆至數千刦掠畿南州縣霸州文安生員趙風子者多鐩有勇力好任俠每大言自負先是劉六等攻掠文安鐩率妻子避賊立水中賊刼其妻將汙之鐩怒奮往殺傷二賊為劉六劉七所擒説使䧏許納歸家與弟鐇鎬聚五百人㑹于河間由是賊黨益繁自畿南逹山東倐忽來去勢如風雨乃命指揮同知李瑾綂京營千人往討瑾至徳州奏言白英約四百人分為二一刦諸城高密安丘沂水一自穆陵關南陷魚臺直趨金鄉賊所得皆民間馬一晝夜數百里馳而官軍馬少無以追敵請于山東直𨽻取給備戰從之命瑾充叅將捕盗三月賊入博野饒陽南宫無極東明等縣深冀定祁開等州境大肆殺掠攻濱州臨朐臨淄昌樂日照蒲臺武城陽信曲阜及㤗安州皆破之時賊衆强多出不意突犯所在單弱勢不能支李瑾東西奔命吏部尚書楊一清建言推用大將及文臣有才望者提督軍務從之命恵安伯張偉充總兵官召馬中錫為右都御史提督軍務綂京營兵征流賊夏五月兵部尚書何鑑奏禦盗事宜時承平日久民不知兵郡縣望風奔潰甚至開門迎欵以故南北不通人情洶洶鑑建議選將練兵嚴號令公賞罸募義勇起用舊將白玉等數人奏行山東直𨽻等處修濬城隍選補軍餘録用民間武勇不許遺以資賊鄉村鎮店結伍立寨互相應援河南山西等處設兵黄河斷太行以防奔突京操官軍俱留本處分守郡縣又于漕運十二把總部下每船選精卒一人沿河駐劄以防運道商旅詔悉從所議鑑復奏遣都督黄琮張俊綂兵分布霸州等處六月流盗趙鐩劉三邢老虎楊虎分掠河南劉六劉七齊彦名分掠山東鐩等由河南山西自西而東踰曲周威縣直抵文安復往河間泊頭慶雲由山東陽信海豐向西南上江為散地六七等踰山東河南出湖廣江西仍由故道入長清齊河等縣直抵霸州徒走山東向東南下江為絶地所至縱橫如蹈無人之境大抵賊俱起畿内恃馬力倐忽馳驟棲野不佔城郭蹈虚不立方所每戰驅脅從者居前呼號衝突官軍見形即縮賊相與笑樂恣所殺掠稍遇勁兵前者俱䧟自以精騎覘勢為進退莫可控揣官軍雖屢有小㨗然失亡多黠者又受賊賂多縱舎賊指揮桑玉嘗與劉六劉七遇文安村中六七匿民家樓上欲自剄玉故縱之有頃齊彦名持大刀脇官軍敗衂者數十人至樓下彦名曰呼諸敗軍皆呼彥名曰救至矣無恐也六七遂彎弓注矢以出射殪數人去各地方官互相推委時馬中錫張偉所領京營人馬多不簡閲中錫書生欲效龔遂化渤海事招撫解散張偉紈袴子怯不能戰中錫遍檄諸路榜示劉六等經過所在官司不許捕獲與供飲食若聼撫待以不死劉六等聞之所至不殺掠然且信且疑中錫至徳州桑兒園駐兵單車從數卒直抵賊壘開其自新劉六等來謂中錫開誠撫之劉六欲降劉七曰今内臣主國事馬都堂能自踐其言乎潛使人至京伺諸中貴無招降意又以山東所刦金銀輦載至京饋權倖求赦不得遂益肆刦掠衆至數萬中錫故城縣人賊至故城戒令勿焚刼馬都堂家由是謗騰謂中錫玩寇殃民兵部尚書何鑑劾中錫偉擁兵自衛縱賊不戰逮下錦衣衛獄論死中錫竟死獄中偉革爵閒住八月丁巳劉六劉七齊彦名楊虎等合兵以二千騎破棗强縣屠戮甚慘知縣段豸死之命伏羌伯毛鋭充搃兵官太監谷大用總督軍務兵部侍郎陸完提督軍務大發兵討流賊馬中錫等既無功中官因以討賊非書生所能辦遂以大用等帥兵討賊何鑑奏令陸完率領主事田蘭等招募民兵地方大擾又奏調宣府副總兵許㤗遊擊郤永大同總兵張俊逰擊江彬延綏副總兵馮禎入征内地俱聼谷大用陸完節制逮廵撫山東都御史邊憲真定都御史蕭翀憲等撫馭無方遇賊失機兵部奏逮下獄除名為民且著為令凢州縣官失守者比守邊將士例劉七等困滄州不克進抵霸州信安京師戒嚴時兵部侍郎陸完提督軍務師已出涿州賊在固安甚急上召大學士李東陽楊廷和梁儲兵部尚書何鑑諭曰賊在東師乃西出恐緩不及事卿等何以處之鑑對曰邊兵已至涿州賊來送死但恐望風遁去耳上喜初副總兵許㤗奉調率部下入居庸關駐涿州馮禎入紫荆關駐保定上乃諭鑑即追還陸完東出往信安鑑承㫖畢退至部中已秉燭矣遣人留都門鎻鑰賫牌馳諭戒以失誤者斬時陸完方欲整兵南行而賫牌適至遂直趨固安許泰郤永出霸州平口賊易之㤗等逆擊殺數百人賊始懼南奔天津指揮賀勇遏之信安灣賊復敗泰等追擊於東光半壁店擒斬二百七十人永再破之景州鑑橋馮禎敗賊于東明裴子巖斬賊偽千户郤永復破賊棗强縣合兵又破之叄老集及薛家屯擒斬千餘人皆楊虎趙鐩黨也諸将進擊虎鐩于景州朱門村一日數戰殺賊千餘人賊奔遁小灘河北保定都司田彬率指揮趙文等扼之敗績文被獲尋走還副總兵李瑾撃趙鐩于山東䝉山亦敗賊得我神器盔甲及蠎衣虎鐩衣蠎衣沿途炫燿過泰安縣題詩有縱横六合誰敢捕之句沂水楊頭管四馬武張通等皆歸賊賊勢益熾冬十月劉六等攻濟寧不克初賊自滄州觧圍南走破日照海豐夀張陽榖安丘寧陽曲阜沂水泗水費十城至是攻濟寧焚運船千二百艘執工部主事王寵釋之給事中竇明言弭盗安民擇將事下獄太監張永選團營驍卒聽征擢山東樂陵知縣許逵為山東按察司僉事備兵武定州逵河南固始人令樂陵期月令行禁止時流賊横行河北逵修城濬隍踰月而成又使民家各築墻髙踰屋簷仍開墻竇如圭僅可容一人家令一壯丁執刀俟于竇内其餘人皆入隊伍令守號令視旗鼓進退違者無赦又設伏巷中洞開城門未幾賊果至旗舉伏發賊火無所施兵無所加盡擒斬之自是賊不敢近樂陵撫按交薦其才擢是職十一月趙鐩等至宿遷初鐩等攻破靈山衞及日照諸縣南攻徐州不下至是至宿遷淮安知府劉祥率兵逆賊不戰自潰溺水死者無數祥被執縱還遂渡河殺高郵等衛官軍三百餘人執指揮陳鵬攻靈壁知縣陳伯安戰敗被執攻宿州不克焚其西關欲降伯安不屈劉三欲殺之鐩止之得釋又破虹縣永城夏邑虞城等縣執虞城知縣尋亦釋之又破歸徳府守備萬都司率衆追至亳州武平縣指揮石堅率兵千人僧兵三百人邀戰皆敗殺僧兵七十餘人至白龍王廟渡小黄河武平衞百户夏時扼之河楊虎率壯士黄寜九騎渡河時兵不知其為虎也擊之虎奪舟欲濟官軍以土石擊覆其舟虎溺水死鐩等推劉三為主總兵白玉擊劉三於㤗和縣小南門敗績殺官軍一千五百餘人失亡盔甲鎗刀二千神器七十餘攻破霍丘殺萬人執指揮潘翀釋之殺都指揮三保射殺河南布政司經歴任傑軍民死者千餘人至鹿邑鹿邑潰執守城千户有陳翰者自稱兵部主事乞為劉三子至新蔡致仕知府張釋率衆遺劉三金帛萬計不攻去當是時河淮南北官吏望風遁諸将利刼掠戰不及賊勢日甚劉三妄欲舉大事與陳翰寗龍謀兵無主必亂共推劉三為奉天征討大元帥趙鐩更名懐忠稱副元帥小張永前軍管四後軍劉資左軍馬武右軍邢老虎中軍並稱都督陳翰為侍謀軍國元帥長史分二十八營應二十八宿各樹大旗為號置金旗二大書虎賁三千直抵幽燕之地龍飛九五重開混沌之天又造釣牌令所至官吏修道路橋梁備芻糧酒肉供軍降者秋毫無犯拒者寸草不遺劉六等攻徐州掠淮西劉七等覘知谷大用毛鋭等駐軍臨清復擁衆走霸州賊以十二月朔車駕出郊宫省牲圖犯御蹕時兵部尚書何鑑未寢左右無一吏卒乃自具帖予令厠卒遞入長安門逐門遞入司禮監轉奉上知復傳示各衙門嚴加防守又縋城賫報通州良鄉涿州各守備官整備兵馬兼以常制駕出南郊分調軍馬於南海子盧溝橋羊房角三處下營以防衝突處分甫定漏下五皷矣有頃上命司禮監太監召鑑至左順門問今日駕可出否對曰駕當早出以安人心車駕遂出迄暮方回賊知有備不敢犯十二月劉六等西奔掠新城雄縣定興安肅易州淶水而南破髙陽蠡縣博野容城深澤束鹿覘知祁州有備乃迂道竟攻臨城髙邑成安饒陽由真定掠趙州安平直抵晉州藁城栢鄉内丘南河衡水等處鑑計賊非東向臨清必南奔彰徳移文促陸完督軍分道追襲至彰徳賊方圍湯隂聞官軍至望風遁去許泰馮禎郤永金輔李瑾張俊成釗追戰敗之渡河溺死者無算劉七等復糾衆萬餘圍李瑾馮禎營許泰與禎瑾内外夾攻敗之賊遁去劉六劉七齊彦名劉三趙鐩邢老虎等復分掠山東河南賊欲牽制官軍故分㓂其勢益熾劉三等攻陷上蔡縣知縣霍瑄死之前鋒臨商水知縣率吏民降進攻西平知縣王佐拒敵被執罵不絶口賊支觧之乗勝攻破舞陽刼獄獄有僧徳静偽稱唐府宫人子賊黨賈勉兒留之至葉縣執知縣唐天恩并其父殺之攻㐮城㐮城人餽銀馬不攻攻破寶縣僉事孫盤賫黄榜撫賊趙鐩復書曰羣奸在朝濁亂海内誅殺諌臣屏斥元老乞皇上獨斷梟雄之首以謝天下斬臣之首以謝羣奸有掠縣令妻子者鐩殺之破裕州殺都指揮詹濟同知郁采屠其城命遼東廵撫都御史彭澤提督軍務以咸寜伯仇鉞為平賊将軍充總兵官帥延綏榆林諸路軍馬討河南賊澤至大陳軍容擐甲引見諸大校責以退縮嚴軍政論行法建纛諸大校無不惕息頓首請自効良久釋之遂鼓行前時河南親藩告急何鑑建議復于宣府大同遼東延綏諸将部下續調未發官軍分道赴之復以諸賊分責諸将計日𠞰滅七年春正月劉六等復攻霸州何鑑續調宣府邊兵在涿州者遏之賊遁去先是陸完聞賊北奔恐犯京師即調許泰卻永追至徳州泰永方恐後期獲罪而賊東遁之報忽至泰永驚喜久之乃知遏賊宣府續調兵也嘗語人曰何公此舉既觧霸州之危復舒吾軰之罪既而遼東續調軍亦至卻永率邊軍追賊至山東大敗賊李隆于穆陵闗隆奔劉七營劉七惡其反覆斬之并其衆復歸河南陸完分調諸将許泰等大敗賊衆于汴北時撫治鄖陽李士實亦發兵夾攻賊奔商水倉皇阻河不能渡官軍併力蹙之方可殄滅而紀功御史雷宗力勸諸将朝崇府盤薄久之賊因得渡商水何鑑劾宗阻誤兵機逮下獄伏羌伯毛銳至真定敗績銳衰老怯懦所領京軍萬餘皆怯不諳戰谷大用擁衆觀望不敢進鋭帥師至真定遇劉七等與戰大敗適許泰援至銳僅以身免失亡所佩将軍印徴回京師以與大用同事不問罷歸第二月趙鐩等攻唐縣先後二十八日不破邢老虎病死鐩併其衆號十三萬騎五干轉掠㐮陽樊城􅀥陽隨州新野破泌陽前大學士焦芳僅以身免盡發其先世塚墓無遺骸取芳衣冠被庭樹歴數其惡命劍士斬之曰吾手誅此賊以謝天下進攻均州不克賊黨聲言欲屠城趙鐩以馬文升家在圍中引衆去之總制彭澤咸寜伯仇鉞督各邊将帥敗鐩于西河縣殺賊二千餘人奪回馬騾器械無算鐩奔鄢陵焚掠而過至新鄭鄭州攻城不能入遂至滎陽汜水攻偃師陞陸完右副都御史先是楊一清議擒斬賊三名者陞一級時劉六劉七齊彦名雖擁衆數萬然多刦掠脇從之徒其親信驍勇善騎射者不及千人官軍毎追及賊首驅脇從良民對敵并棄所掠財帛奔逸而去官軍競取財帛斬獲脇從首級屢報㨗音陸完谷大用降𠡠奨勵十餘次前後報功萬計而正賊卒無獲者甚至賊已去而官軍遇平民亦殺之以報功大同遊擊江彬過冀州入民家殺二十三人有司申状大用完皆不問大用復奏帶權勢子弟僕從坐功冒級日費餼廩自出師以來芻糧犒賞費太倉銀二百餘萬府庫為之虚耗三月劉三趙鐩等至河南府叅将金輔懼不敢渡河總兵馮禎率榆林兵方列陣而姚信所部京軍馳越禎前失利先遁賊麾衆突至禎下馬力戰死賊亦殺傷多乗夜奔汝州復犯汝寜府殺湖廣土軍數十人入潁州朱臯鎮官軍追敗之前後斬賊及渡河淹死人馬五千有餘沿途逃散者甚衆鐩等由光山六安州攻破舒城刦掠人馬夏四月桐柏知縣李聚率鄉兵敗趙鐩于縣外生擒潘僧等八名泌陽縣劉機率鄉兵擒獲逆盗劉喜等總制彭澤督官軍敗趙鐩于六安州殺獲四百餘人追至定逺連敗之湖廣僉事郭韶敗劉三趙鐩等于應山縣二郎畋廣水店追逐懸崖溺水者千餘人彭澤同廵撫劉丙督各路軍馬追殺鐩等扵應山并子舖隨州蓬甑山等處劉三劉資等潜匿山谷去李鋐率邊軍敗劉六等于臨煦沂水殄之劉六劉七等東入登萊掠膠州平度萊陽破文登招逺攻圍寜海陸先復分調許泰卻永合兵追勦賊潰分兩隊一隊由高宻西奔李鋐追至沂水勦殺無遺劉六劉七齊彦名等復北走霸州犯香河寳坻玉田諸縣敗官軍殺恭政王杲于武清八里荘兵部奏調恭将成釗等統領京軍陸完寗杲亦分調諸将㑹兵截殺賊過馬東圏殺戮寗杲子弟兵甚衆乃越霸州竟往雄縣迤南直抵山東賊雖屢衂然隨在脇聚寡而復衆先是正月劉六等自文安而下二月至宿遷屯小河口刼船欲渡指揮周正禦之不得前退往桃源屯于城子河率衆萬餘掠邳州之泇口集遂由贛榆過郯城既擁衆復寇邳州賊皆白衣瀰漫郊野知州周尚化悉力拒走之三月賊過吕梁沿途焚掠無遺總兵劉暉破賊于滕之吕孟社尋敗賊于邳之郭家莊殺獲千餘人賊且戰且走至魚頭集復破之四月賊奔登州海套陸完率大軍與劉六劉七齊彦名等遇于嵩淺坡古縣集等處時宣大鐵騎及中上材官良家子悉集将十萬人合圍諸軍奮勇鏖戰斬首二千三百殺傷三千有竒俘獲百餘諸酋渠殆盡六七彦名獨挾驍騎三百餘潰圍而走間道馳至河西務其勢無前諸軍悉出莫能禦賊将北出塞外尼闗險不得通乃復越臨清而南下邳之新安迤􅆔馬家淺雙溝頻欲渡不得復由靈壁西南而去閏五月劉三自河南入羅田轉掠黄陂都指揮陳表擊敗之還據羅田仇鉞擊賊于光山神周姚信為左時源金輔為右大敗之斬首三百九十人盗奔六安諸将進至七里岡賊分為三神周追趙風子姚信追賈勉兒二賊急復合其黨張通等率衆數千降鐩屢與官軍戰不利陳翰見勢敗亦向總兵仇鉞降時源金輔追劉三由黄陂光羅至桐柏南召從騎十七人夜亡其半至土地陂指揮王瑾射劉三中其左目三縱火自焚瑾滅火斬其首都指揮朱忠等復追擊賈勉兒于扶溝賊奔沙河溺死者甚衆追至永城勉兒變姓名匿項城之丁村老人王斌獲之餘衆悉潰趙風子走徳安知事不成行至應山縣東化山坡下遇僧真安因削剃鬚髪藏度牒令賊黨邢本道等各散遂同真安欲渡江從江西賊再圗大舉湖廣廵撫劉丙督官軍擒邢本道等三十餘人于隨州天王險寨等處斬賊百餘級獲馬騾器械千數本道被獲始知鐩削髪遁去分命各道物色之武昌衞軍人趙成趙宗等行至黄陂縣九十三里陂遇鐩過見鐩状貌異常思與頒示合心疑之追至武昌江夏縣管家套鐩入軍人唐虎店飯成等進擒之捜獲真安度牒檻車入京伏誅劉七楊寡婦以千騎犯利津僉事許逵追至高苑敗之錢鸞以百騎劫徳平逵復引兵追至楊二荘盡殱之劉六劉七圍邳州督漕都御史張縉擊敗之東海千戸張瀛率銳卒開柵迎敵賊三騎馳突而前皆渠帥也中矢斃其黨悉遁六等遂從棗林渡邳騎能屬者纔三百人奔河南光山確山入湖廣棄馬登舟沿江掠聚復聚黨至七百人駐兵武昌陽邏團風鎮湖廣廵撫都御史馬炳然携家赴官賊遇之丁爛泥舖脅與俱至南京炳怒罵之遂遇害掠其家人内㫖立監鎗名太監陸誾以陸完討賊久不滅謀出統軍禮部尚書傅珪曰今兵老民疲直以多冒功者失将士心禍旦夕及宗社諸公尚唯唯乎力争之明日竟遣誾監鎗出征傳㫖令珪致仕劉六為湖廣官軍所追風折㠶檣擊死于水其子劉仲淮數人亦死劉七齊彦名等糾合水㓂自黄州下九江剽湖口彭澤等一帶郡邑經安慶太平儀真所過殘滅六月陸完帥諸将邊兵馳至揚州斬退避指揮程鵬劉七龎文宣等舟過蕪湖操江官軍不敢逼直抵𤓰州燒燬戰船搶奪軍器鎮江官軍禦之敗績殺掠過壩泊于通州之狼山常熟之福山港遂凌駕江面縱横上下通泰如臯濵江之區咸被創殘秋七月劉七等復自通州泝流上犯九江劉七彦名等在江不安舟居日上通州逰掠欲自通泰登岸趨淮安復還山東為揚州官軍所拒與其黨韓三等謀復自海門而上泝流過采石泊蕪湖之月子湖賊凡三過南京往來如入無人之境賊在海門東七里港謀入海由張網海口深入裹河不果又泊𨽻上斷腰地方遂自湖口縣乗風而西㓂南康迤􅆔蘄黄登光州固始還泛九江安慶至石灰河江口遂往銅陵時陸完自臨清馳至江上都御史張縉王鎮叢蘭俞諌及副總兵時源等分兵守要害賊復沿江東下越𤓰州蹂周家橋厯孟瀆下港掠常州殺常州守李嵩遂犯江隂殺縣丞余凌雲仍泊狼山下賊有舟三千餘衆六七百人陸完至鎮江留總兵仇鉞駐温恭騎兵駐江北劉暉卻永以舟師趨江隂八月劉七等既泊狼山其黨以失地利相尤多潰去丁丑賊率衆二百餘攻通州我軍擊之賊退入船是夕􅄓風大作賊船皆解散飄沒其衆顛踣不支嘔泄臭穢自相擊撞蘇人有應募獻計用火攻其名水老鴉藏藥及火于礟矢中發之又為形如鳥喙持之入水以喙鑚船機發自為運轉轉透船沉試賊一舟沉之賊益駭勢廹乃登山團聚或下崖散逸輙為通州兵所蹙通州最與賊宻邇而守吏亦特嚴整壬辰夜三鼓副總兵劉暉帥東兵千總任璽帥大同兵㳺擊卻永帥宣府兵並進癸巳與賊戰我軍聲燄震天風火交熾賊披靡躋山巔古垣憑高控險鎗矢瓦石雨下鏖戰賊初不識山路火勢既熾僧行居人逸出賊從之上山得路而我軍方奮勇直前日加晡劉暉率部将張春蕭澤髙雲李春美饒徴等誓死决戰分軍為三劉暉在山北卻永在山南皆戴盾跪行而上手施鎗礟且上且攻盾上矢集如蝟不退遂奪其垣賊墜崖死者無算其餘先具舴艋山下以備逃竄至是覓嬰谷下山争船不得入劉暉立崖下百矢齊發劉七勢迫遂赴水死彦名為宣府逰兵十旗張鑑斬首劉暉擒獲餘賊及龎文宣等觧京伏誅賊逸而北者高雲追斬之皆盡九月論平流賊功封谷大用弟谷大寛為高平伯陸誾弟陸永為鎮平伯咸寜伯仇鉞進封咸寜侯並賜誥券世襲都御史陸完彭澤加太子少保完召囬掌院事廕一子錦衣衞百戸内閣李東陽楊廷和梁儲費宏各廕一子錦衣衞正千户谷應泰曰劉六劉七齊彦名等初發難于霸州趙鐩邢老虎劉三等附之而盗愈劇至鐩等入河南七等入山東是羣盗分㓂之始也既而并兵薄都城至尊倉皇召對左順中㫖夜出指授方略社稷無人幾于發䝉振落矣乃馮禎纔破鐩于景州而田彬沒全師于山左許泰甫奏㨗于裴巗而劉七屠名城于冀右徒敗車奔旗靡轍亂以此易彼得不償失㳺魂漸大禍延淮北賊騎有京觀之築池隍無即墨之堅指斥乗輿妄陳天命而羣盗再薄都城矣夫金湯天險百靈呵䕶么麽小㓂敢爾蹂躪則以七等固嘗潜入宫門縱觀禁掖窺龍顔于豹房分天香于御苑彼項籍偶觀㑹稽石勒倚嘯東門亦未有睥睨彤闈鼾寝臥榻如兹盗者也于是宫門晨扄南郊幾阻徴調繁興六師雲集然後七等再入齊鐩等再入豫自此以後盗不復合劉三趙鐩猖獗于兩河廵撫彭澤以大同遼東宣府之師禦之劉六劉七枝蔓于濟北少司馬陸完及禎暉許泰諸将禦之其餘咸寜侯仇鉞伏羌伯毛銳中貴谷大用邊将江彬類皆将門世胄良卒信臣莫不赤羽耀日鐵騎屯雲然而魚駴鳥窮狼奔豕突偏師少利擁麾不前軍氣初揚緩追逸賊甚至斬掠難民邀勲幕府紈袴徒輿動加青紫太倉少府濫若泥沙此怨毒所以日深中原所以不靖也既而鐩等屢挫自豫南竄楚境楊虎溺而賊勢蹙趙鐩擒而賊黨盡矣七等自齊北掠京畿南窺徐宿鋒似䲭張勢亦窮廹由邳流豫由豫流楚劉六沉于水濵此亦天亡之秋也然而舍陸登舟死灰復燃賈其餘勇三江騷動天門無安都之柵京口無徐盛之城踰楚窺呉如履平地幸而妖星已隕風伯揚威當是時劉暉帥遼東兵任璽帥大同兵却永帥宣府兵聚天下之全力撲窮途之逋㓂猶莫不水戰火攻矢窮弦絶然後骨載専車頭行萬里當其始也劉瑾以威激之張忠以賄縱之及其繼也寗杲以酷激之馬中錫以撫縱之事發扵中官禍成于庸帥卒之封爵定勲先及中人子弟焉夫張譲通書張角黄巾平而譲等俱封列侯令孜致亂黄巢長安破而令孜居功扈駕敗亡之主各賢其臣而五省生靈魚糜肉爛悲夫明史紀事本末卷四十五
