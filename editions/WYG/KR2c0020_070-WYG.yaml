body:
  text: 明史紀事本末卷七十浙江提學僉事谷應泰編平徐鴻儒附王好賢于𢎞志熹宗天啟二年夏五月山東妖賊徐鴻儒倡亂鴻儒鉅野人遷鄆城萬厯末以白蓮敎惑衆黨數千人深州人王森以救一妖狐妖狐斷尾令藏之招人人聞異香多歸附之號聞香敎森死遺貲巨萬子好賢藉其資以結客有異志景州于𢎞志以棒箠㑹聚惡少年好賢與通密約鴻儒于八月望日三方同起而鴻儒以他事相激先發在卞家屯刑牲誓衆令衆至梁山泊寄家口然後起兵往圍魏家莊又二千餘人圍梁家樓據為巢去縣二十里官兵不敢前又攻鉅野縣其黨楊子雨李泰等被擒又曹州擒張世佩其身旁匿紙人數千號四大金剛亦鴻儒黨也鴻儒攻鄆城知縣余子翼逃遂據城曹濮騷動充西道閻調羮以聞巡撫都御史趙彦總河侍郎陳道亨巡撫都御史王一中合兵捕之其時四川亦有白蓮妖賊洪衆劉應選白仙台等助賊蜂起巡撫朱燮元擒捕正法夏六月徐鴻儒陷鄒縣署印通判鄭一傑挈家出走進陷滕縣知縣姚之𦙍逃遂踞二城時括遼餉殆盡至是徵兵無餉可給止練鄉勇責有司捕治魯王捐貲保城璽書褒之山東都司廖棟破武安賊巢焚之撫臣趙彦奏捷賊盤踞巢穴動以數萬官兵奮勇力戰斬首三千餘級砲擊死者六七百人又焚武安集賊巢近旁小寨俱燬之賊勢窮蹙奔梁家樓都司楊國盛與賊對壘斬首千級其東南東北之賊充塞道路官兵攻擊賊不能支復斬首二千餘級賊欲窺伺兖府官軍尾其後襲之連戰皆捷遂復鄆城鉅野秋七月録叙山東平妖將士楊國盛廖棟等功績巡撫趙彦奏妖賊聚衆日多官兵策應日難乞暫留秋班邊軍隨營勦賊可省招募之費從之賊攻夏鎮至彭家口掠糧船四十餘艘阻絶運河侍郎陳道亨告急上命兵部議添兵防守時沙溝營把總姚文慶等集軍壯鄉勇擒賊十一人殺五十餘人奪回漕艘淮兵又驅斬夏鎮妖賊運道復通山東一日二報捷賊奔滕縣與鄒縣賊㑹合攻曲阜領馬步萬餘擁至城下知縣孔聞禮率民兵極力捍禦殺賊甚衆賊不能陷旋以援至拔營而去復刦官營都司楊國盛大敗遊擊張榜等皆死之營内糧草火砲器刃俱被刼賊僭稱大乗興勝元年巢有十數兵十餘萬欲先取兖州次取濟南聲勢甚銳陳道亨疏請登萊兵防兖恐糧餉有失也景州妖賊屯阜城武邑殺人祭旗聲言取景州焚掠四十餘里官兵往捕之賊首于𢎞志立馬仗弓飛舞而來官兵斬之于馬下餘賊披靡四散又擒妖民田付民等于是賊衆牛朝利等退據白家屯掘深濠伐木為寨以固守艾山賊趙大奉劉永明為主稱安民王以二十八人塗面稱二十八宿聚黨二萬餘人合鄒滕賊共十七枝官兵攻破之獲永明臨刑猶稱寡人云賊攻充州先是趙彦親至兖州同監軍道王從義徐從治總兵楊肇基至演武塲閱兵賊衆進逼城下肇基迎敵都司楊國盛廖棟分擊殺賊千餘人賊回滕縣九月賊流刼金山口徐州震動官軍復錫山賊始懼偽都督侯五偽總兵魏七等據城乞降去其幟而鴻儒同黨髙尚賔歐陽徳酆九叙許道清等三百餘人復力守官兵分攻之趙彦下令鴻儒不出即四面焚攻賊因縛鴻儒出降三道臣入城安撫軍民復滕城十月安插鄉民共二萬七千餘人收騾馬千匹神槍八百杆大砲二百六斧九十九餘弓刀亡算十二月獻山東俘徐鴻儒等磔于市加趙彦兵部尚書餘進秩有差鴻儒臨刑嘆曰我與王好賢父子經營二十餘年徒屬甚衆更遲數日孰敢攖其鋒者而好賢見鴻儒敗走薊州又挈家二十餘人南走至揚州事露就擒吏科給事陳熙昌上言東省妖賊雖平地方善後宜策并請存恤修復孟氏墓廟上從之命官致祭四年八月鄒縣賊餘黨因旱災復聚于泗州數百人刦掠兗州知府曹文衡鄒縣知縣郭人吉署泗水縣事同知張景親詣其地安撫李守己等二十餘人訴為鄉里凌偪願就招撫編入保甲始安谷應泰曰慨自周之成康刑措不用漢之文景斷獄四百海内乂安何其盛也其他致治之主非有外患則有内憂若夫火坑之寇旋即艾除飛燕之兵逾時解散此亂之小者也然而疥癬致患蜂蠆有毒兩葉不去斧柯是尋有國者可不慎乎明室數傳中外多盜憲武世神反者數起雖常命張敞于京兆遣虞詡于朝歌而沸釡游魚相隨斬馘然弄兵者疇非赤子蠶食者皆吾腹心止渴而進鴆酒救疾而吞烏喙萑苻屢殄明祚不得長矣比及熹宗東省又起鄆人徐鴻儒倡亂號白蓮敎應之者深州王好賢號聞香敎景州于𢎞志號棒棰㑹艾山劉永明號安民王而其餘四大金剛二十八宿莫不三方並起尅日興師猶之樊崇鼔亂而下江新市互有聲援張角煽妖而小方大方各推渠帥雖賊徒之故智亦奔命之深憂也然聞之孽不自生釁由人作考其時閹璫擅政必外吏撟䖍苞苴在官必朘削在下俗敝則輕于為非民貧則去而為盜固然其無足怪而論者又云蓮社以梵敎而惑妖狐以吹火而興經營廿年盜亦有道豈足盡信哉乃若魯藩捐貲保城趙彦盡力擒捕而廖棟破之于武安楊國盛殱之于鉅鹿夏鎮告捷運艘復通滕縣既恢鴻儒遂磔彼諸臣者雖非龔遂之平渤海亂絲徐理抑亦廣漢之治三輔枹鼓不鳴矣然而荓蜂不懲亂令亟行黄巾既叛仍行鉤黨之誅河朔初平更遣括田之使從此鴻蜚滿野萇楚無家政散民流積薪藴火人以為潢池雲擾禍烈于愍帝予以為東陵伏莽釁叢于熹廟也後三年而餘孽聚泗州又七年而李自成起米脂明竟以亡悲夫明史紀事本末卷七十
