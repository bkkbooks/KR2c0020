body:
  text: 明史紀事本末卷四十一浙江提學僉事谷應泰編平固原盗憲宗成化四年夏四月固原托逹穆蘇叛據石城初洪武中平陕西故元平凉萬户巴勒丹率衆歸附髙帝授平凉衛千户其部落散處開城等縣號托逹以畜牧射獵為生家多殷富巴勒丹孫穆蘓以貲力雄諸族成化初保喇瑪拉噶内侵托逹李俊者獨以羊酒奉保喇保喇喜賜以馬俊遂有北徙意致仕都督張泰牧鳴沙州與托逹鄰張巴延等時時假冦盗刼掠之泰以狀聞于巡撫陳介㑹有通渭縣民避徭役匿穆蘇所陳介下吏捕治之穆蘇素縱佚不知法頗危懼叅將劉清初至指揮馮傑歛諸托逹賄利為餽李俊素狡黠遂以言激穆蘇等為亂穆蘇姪滿璹為平凉指揮有司移檄平凉衛捕滿四張巴延甚急璹素戅不知穆蘇等異謀率衆徃捕穆蘇知之俟璹至佯許歸罪有司紿遣其衆散遂刦璹號集諸土達以四月叛入石城石城在衆山中去平凉千里四面峭壁數十仞無徑非引繩不可登西山頂平可容數干人山罅皆墻髙二三丈城中有數石池可汲池外設棧道而棧道下則築小城䕶之前有小山髙數仞如拱壁狀山後悉築墻髙二丈五六尺各留小門僅容單騎城外皆亂山盖昔人造之避亂者不知所始穆蘇等往獵射故熟知其險可據而先掘地得前代行帥府印心動遂叛入居之其徒相率偽尊四為招賢王李俊順理王散刼甘州旋攻固原千户所李俊戰死劉清自靖鹵率衆馳戰不利都指揮邢瑞申澄率各衛軍往捕戰于城下兵敗申澄死之賊勢大振民失職者多從之逺近震駭五月勅陜西巡撫都御史陳介總兵寧逺伯任夀廣義伯呉琮巡撫綏延都御史王鋭參將胡愷各率所部兵討之秋七月寧夏兵先至介等不候綏延兵自固原急趨蔡祥堡夜二鼓營壘始定軍士勞疲比曉即出架梁順嶺而行去石城十里許賊數千出迎請降有卒馮信頗知兵言于介等曰賊雖降誠僞叵測然我軍夜至未休暇即行且乏水飲力疲矣不可戰姑聽彼請緩師徐議攻討呉琮叱之曰賊計欵我兵至此豈可退乎遂麾兵進賊遁去至城遂驅牛羊數千在前而精兵後繼時賊尚無兵械執木挺而鬬官兵大敗任壽呉琮俱退保東山陳介欲自殺左右救免遺失軍資甲械千數兵有被圍在山者皆棄之而歸盡殱焉賊乃益猖獗凢係托逹盡逼入城時截靜寧州道掠奪甘肅粮運無算且聲言欲窺陜西事聞逮陳介任壽呉琮劉清馮傑等下錦衣獄命都御史項忠總督軍務總兵劉玊叅將夏正率京營兵并發陜西三邉兵五萬人徃討之起大理寺少卿馬文升為都御史巡撫陜西恊勦冬十月朔項忠馬文升先後至固原明旦于營外得賊所遺書求宥罪容居石城免其徭役衆知為緩兵計置之忠等議進兵方畧令善畵者圖其山谷形分六路進兵忠與文升等屯中路山莽金佛溝進延綏巡撫王鋭叅將胡愷由李俊溝進伏羌伯毛忠由木頭溝進右叅將夏正由亂麻川進都指揮姜盛由墨城子進副總兵林盛由好水川進都指揮張英由驢母川進期三日諸路少出兵嘗賊且探地勢後乃大舉比至城外賊來迎敵延綏兵恃勇輕進失利明日復㑹戰賊佯敗歛衆入城伏羌伯毛忠麾其兵進據木溝翼日忠督精鋭四千先登奪山北三峯又奪山西四峯與各路官軍㑹進攻石城擒斬甚衆忠為流矢所中還至半山而卒諸軍皆却劉玉被圍城下衆潰玊中流矢項忠斬退縮千戸一人以狥衆懼不敢退玉得免項忠以兵敗憂失色文升曰勝負常事耳况賊死亦多勢已不振此時黄河未凍賊不能北徙無深憂可徐圖之朝廷聞毛忠敗死兵部尚書程信撫寧侯朱永定襄伯郭登等議恐賊連北冦奏遣朱永率京兵四萬徃益師朱永欲張大其事請定賞格乃行事下閣議大學士彭時知賊可平嫌其張皇㑹項忠報軍中事至時曰賊四出掠信可慮今入保山我師圍之甚固賊已困行當就擒矣京兵何庸再出大學士商輅亦曰觀項忠布置賊不足慮也程信忿其言不行出危言曰項忠軍若敗必斬一二人然後發兵去耳時廷臣羣然附和謂不出師必遂失關中多尤時輕敵時曰觀項忠疏曲折保無虞也詔問忠須益兵否忠上疏言京軍怯不諳戰益之無補請命永率精兵五千沿邉西得賊平報止不來未平則西戮力攻之信等以忠異已各煽浮言㑹有星孛于台斗中外洶洶占者以為木在秦州不利西師忠聞之曰賊虐害生靈惡貫滔天今仗皇威問罪師直而壯兵法曰禁祥去疑昔李晟討朱泚熒惑守歲卒以成功今類此乃不待援師至即督兵攻圍賊堅壁不出戰文升與忠謀曰賊城中無水芻粟亦漸乏若絶其芻汲則釜魚當自斃矣忠然之令官軍掩捕芻汲者多被擒乃知城中無水忠等日引兵至城下挑戰至暮引還以疲之賊信胡神神降曰若今日出戰勝則利不勝已矣是日賊一出敗歸始大懼㑹調甘州兵三千至乃益兵攻城兵已登山山髙險卒不能克㑹日暮兵在山上者數千人未能退方懼賊亦自危詐請降忠等遂許之以退山上兵賊邀忠文升等詣城下與語忠與劉玉皆單騎徃賊數百人擐甲馳遶門外以示武文升在溝外賊來邀亦赴之帥數十騎徃叱賊使歛兵穆蘇等訴被劉指揮馮叅將激變故乞宥死請降忠等言劉馮二人朝廷已械赴京下獄矣爾速降朝廷必宥爾死又問滿璹曰爾被刦入城非反者璹乞命忠等遂納其降撫璹歸營而滿四狐疑復走上山明日復設木柵請戰不降十一月諸將相持乆時天寒甚士卒墮指忠等言曰師老矣恐生他變即黄河凍倘有外警我師豈能乆駐倘賊乗問突出與西戎合患有不可言者須急攻城破之衆不能决文升議欲縛木為廂車渡濠攻城衆恐多傷人不果然賊見攻具甚懼漸有出降者忠等皆給票縱之歸賊聞出降者益衆有楊虎貍者最驍悍穆蘇所任倚夜使虎貍出營逺汲被擒忠先揚言斬之虎貍乞命仍諭之順逆許以不死解所束金鈎賜遣之令為内應劉玉刮刀與誓曰爾能生擒穆蘇或殺之來朝廷有賞格必不爾負虎貍請自效且曰賊兵精當以計移其精騎于山上誘四出東山口出戰可擒也忠等厚撫􅇺遣之明日整兵至山下東山口係延綏兵所守忠等不欲泄謂其將曰爾暫休今日余代爾守乃令人登髙覘之見一人白馬出城即穆蘇也既而果有精兵駐山上忠等始信虎貍約乃伏兵東山口穆蘇出諸軍競前撲之伏兵四起穆蘇倉皇突陣墜馬遂就擒斬首七千餘級俘獲二千餘文升欲乗勝擣城忠恐倉猝難㧞遂以穆蘇歸營乃奏㨗止援兵明日城中復立舊逹官哈勒沁為主忠等乃遣偵夜探城下賊北行即捕南行勿追葢欲散其黨使易成擒劉玉欲撤兵退令賊自解散忠曰賊自叛逆以來前後大小三百餘戰殺我一伯三指揮官軍死者數千人今若縱之逸去他日必為陜患乃屯兵日􅀈之賊度不能支一夜潰走散去因發兵分捕復斬首數千級穆蘇從子滿能者最驍㨗逸去詢其黨知入青山洞乃用火薫之出亦就擒并獲家屬百餘口諸營搜山又獲賊五百餘人㓜男婦女不下數千人盡分給諸軍惟宥楊虎貍家文升謂忠曰石城之險非盡毁前後所築墻垣恐後有叛者必據此為巢窟遂令萬人悉平之立石紀平賊歲月于山餘賊百餘人走據彗箒山㑹有報西戎入套乃留精兵三千人伺勦餘賊忠等還固原時生擒千人惟穆蘇哈勒沁等并各罪大者械送京師餘八百人就軍中斬之㨗奏至人始服彭時料敵明審鎮靜得體云初忠日披堅于石城下矢石如雨畧不退怯文升勸其持重忠曰奉命討賊乆無成功死所甘心時論偉之五年正月彗箒山賊首茂哈喇被獲誅之餘賊解散忠等下令各歸農業不問奏于石城北西安州增設一千戸所設兵防守之忠等遂班師論功陞賞有差谷應泰曰太祖之平陜也元部落巴爾丹率衆歸附授平凉衛千户以畜牧射獵為生頗饒樂足用而成化初年巴爾丹孫穆蘇又以貲雄諸族然招納亡命抵觸文網石勒倚嘯東門劉淵請歸㑹葬葢未嘗一日忘北徙也乃以撫臣陳介捕治逋逃叅將劉清歛錢餽贈而遂聽李俊之狡黠刧滿璹以鼓亂然不西通甘肅東屯河套而但入據石城憑險負固者此直緩死之圖非有啓疆之志也夫石城去平陽千里而遥縁峭壁十仞而上繩行懸度四面陡絶昔人經營以避禍亂者萬年奄有氐服豈居郿塢之中劉曜入據長安匪保桃源之境吾知穆蘇者特僨轅之小犢非飛食之攫獸矣比至陳介出討賊衆僞降斥馮信緩師之謀用呉琮進兵之䇿薄城一戰軍盡殱焉假令禁馬謖之輕出則街亭無敗用許厯之據險則閼與可勝介實輕敵罪則奚辭若夫項忠身冒矢石馬文升躬擐甲胄圖山谷則聚米成形斷樵牧則困獸自斃而且金鈎陽虎貍刮刀誓賞格數月之内俘獻京師功垂竹帛乃知岳節使之神算竟定湖湘祭征鹵之奉公終摧隴蜀者也然其始王師屢挫兵力單微中外洶洶頗言星孛不利西方書生豈能料敵而忠以晟討朱泚熒惑守嵗安拒苻堅郗部遣罷豈非意思安閒知彼知此者耶總之辦賊之方由于將帥命將之畧本于政府所喜者彭時斷其就擒商輅欽其布置夫論思密勿之地决勝千里之外比于真長料桓温之必克郄超識謝𤣥之有成猶為過之而彼張解設難發言盈廷豈非肉食者鄙哉若夫丹穴之逃薰以蕭艾東門之役撤其關梁則尤長駕逺馭之規毋俾易種于兹邑也明史紀事本末卷四十一
