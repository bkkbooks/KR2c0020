body:
  text: 明史紀事本末卷五十三浙江提學僉事谷應泰編誅岑猛世宗嘉靖五年夏四月姚鏌督師討田州指揮岑猛按廣西諸土族岑氏為大自稱漢岑彭後國初元安撫總管岑巴延以田州歸附高帝嘉其誠設田州府令巴延為知府子孫世襲三傳為岑溥溥二子長猇次即猛𢎞治六年猇以失愛弑溥土目黄驥李蠻發兵殺猇嗣位未定而驥與蠻搆釁驥以猛奔梧州督府奏以猛襲其父官慮蠻方命乃檄思恩知府岑濬以兵衛猛入田州濬猛族也亦土官兵力方雄兩江洎至田州李蠻拒猛不納驥復以猛奔思恩濬留之不遣十一年都御史鄧廷瓚檄濬歸猛濬不從以兵徴之濬始釋猛督府納之田州遂與濬仇釁十五年十月濬襲攻陷田州偽以其族子洪守之猛走免十八年都御史潘蕃奏發兵討濬戮之并誅洪改思恩為流官知府兼攝田州降猛福建平海所千戸正德初猛賂劉瑾得復為田州府同知領府事猛撫輯遺民兵威復振稍蠶食傍郡自廣嘗自言督府有調發願立功兾復故秩督府使至田州猛厚賂之衆譽猛籍甚會江西盗起都御史陳金檄猛討之猛兵大肆侵掠所至民徙村落避之賊平金疏猛功稍遷指揮同知猛兾復知府秩授官不愜初意遂怨望驕蹇督府使又不得曩者厚賂多譖猛不法猛亦恃兵力凌轢鄰府日甚或言猛反者都御史盛應期惴猛兾得猛重賂猛遂出不遜語應期怒疏猛反狀請討之未報應期去都御史姚鏌代遽再疏請征猛制曰可至是鏌遣都指揮沈希儀張經李璋張佑程鑒等五將軍師兵八萬分道進而令叅議胡堯元為監軍督之九月岑猛奔歸順州知州岑璋誅之初猛聞大軍至令其下毋交兵裂帛書寃狀陳軍門乞憐察之鏌不聽督兵益急沈希儀擊斬猛長子邦彦諸軍繼入猛懼謀出奔猛婦翁岑璋歸順州知州也以其女失愛于猛素憾之欲乗間擒猛自為功乃誘猛走歸順先是軍門令諸土官有能擒猛者賜千金爵一級畀其半地黨惡者移兵誅之又恐璋為猛婦翁或黨猛召希儀問計希儀知璋以女失愛故憾猛對曰俟旬日當得實以復希儀察其部下千戸趙臣者雅善璋乃召臣問曰聞岑璋與猛有隙吾欲遣説之藉令破猛如何臣曰璋多智善疑直語之必不信當以計説之希儀曰計將安出臣曰鎮安與歸順為世讐督府徃使人歸順則鎮安疑使人鎮安則歸順疑公今誠遣臣徴兵鎮安臣迂道過璋璋必詢故臣為好故以死泄漏其事璋要領可得也希儀曰善乃遣臣徃檄鎮安兵臣過璋璋果喜迓臣曰乆不見故人今肯念我來耶臣黙然佯為不豫者璋曰趙君有嗔乎臣曰感故人厚意乆契濶故迂道來何嗔也稍語須㬰復歎息起璋心疑之明日璋置酒欵臣臣愈不豫若有沉思者璋益疑問故曰軍門有意督我過耶臣曰無之璋曰鄰壤有所控訴將逮勘耶臣曰無之璋挽臣卧内跪叩之臣澘然泣下璋亦泣曰璋死即死耳君何秘不告我臣乃曰託君肺腑有急不敢不告然今日非君死即我死矣璋驚曰何故臣曰督府討田州謂君猛婦翁必黨猛令我檄鎮安兵襲君我不言君死我言君必驟發為自脫計即我泄漏機事矣必我死奈何璋頓首謝曰君實生我君不言我赤族不悟猛取吾女讎視之吾何䁥焉吾欲殺猛乆矣無間也臣曰君心如是盍自列督府匪直免禍功有藉也璋遂強臣稱疾留傳舎亟遣馳詣希儀所告變陳猛反狀恐連及願擒猛自效希儀許之遂陽使追臣返以其事白鏌鏌喜乃不備璋岑猛子邦彦守工堯隘璋以姻故遣兵千人助之實為間邦彦欣然納之璋則遣報希儀曰已遣千人為内應矣衣别有識幸勿加戮希儀許之及戰歸順兵先呼敗惑衆田州兵驚潰希儀斬邦彦猛欲奔璋使人招之曰事急矣願主君走歸順三四夕可逹安南再圖興復耳猛倉卒無所之又以姻故遂佩印走歸順璋佯涕泣迎之處猛别館盛供張列侍美女地逺僻左右無一田州人璋日詭猛曰天兵退矣又曰天兵聞君走交南不敢輙加兵交南境遣使詣督府請進止也猛喜不疑胡堯元與諸將見希儀已破隘欲攘其功頗聞猛走匿璋所遂以兵萬人擣歸順璋亟遣人持牛酒犒師境上而自來見諸將頓首謝曰猛敗昨越歸順欲走交南璋邀擊之猛目被流矢南走不知所之急之恐入交南連逆賊為變幸緩五日當捕致之堯元等許之璋歸復詭猛曰天兵已退非陳奏事不白為君草封事令人上之如何猛曰固所願也乃為䟽令猛出印印之璋得知猛寘印所乃置酒賀猛樂作持鴆酒一盂獻曰天兵索君急不能庇也請自為計猛大怒罵曰悔墮此老奸計也遂飲鴆死璋斬其首并所佩印遣使間道馳詣軍門上之諸將聞之引還猛三子長為邦彦既敗死次邦佐邦相出亡邦彦側室子曰芝方襁褓匿民間諸惡目韋好陸緩馮爵俱被擒斬惟盧蘇王受未授首㨗聞論功行賞鏌請置流官治之事下兵部覆奏從之六年五月盧蘇王受反有自右江來者言岑猛實不死糾安南莫氏入寇陷思恩矣藩省旦暮當不保于是靖江諸宗室倉皇出奔人情惶懼藩臬諸司素衘姚鏌者又倡言猛實未死鏌為歸順所紿御史石金聞之遂劾鏌攘勦無䇿輕信罔上圖田州不得并思恩而失之帝大怒落鏌職以王守仁代之先是鏌上言田州遺黨復叛再乞集兵勦捕軍興錢榖相應議處帝命動支廣東司府帑庫金錢不得自分彼我致悮事機至是守仁未至鏌候代偵知思恩未陷欲徴兵擒蘇等自贖乃徴廣西諸司議事而銜鏌者紿郵吏發檄交誤各以檄誤不至鏌竟不獲集兵而去七年春正月王守仁將至田州調集湖兵數萬人南下諸土目皆憚之守仁乃自弢晦示以無事及南抵寧見盧蘇王受勢熾度不可卒滅乃使人招諭使來輸罪會有造浮言誑蘇受欲取其賂者蘇受疑懼不即來守仁遣使慰諭之且與之誓蘇受言來見必陳兵衛又欲易軍門左右祗候皆盡以田州人守仁許之蘇受乃期日來見盛兵自衛守仁數罪箠之蘇受衷甲受箠已而諭歸俟命守仁乃上疏言思田久苦兵革民間已不勝况田州外捍交阯縱使克之置流官兵弱財匱恐生他變岑氏世有功治田州非岑氏不可請降田州府為田州官猛子邦相為判官以盧蘇王受為廵檢别立思恩府設流官統之帝皆從焉乃命邦相歸田州盧蘇等各之官田州以寧守仁復薦布政使林富為廵撫都御史張佑為總兵官鎮廣西守仁乃徃南寧三月王守仁檄盧蘇王受等攻斷籐峽八寨盗賊盡平之兩江底定守仁上言盛稱蘇受等功大獲賞賚時兵部侍郎張璁及桂蕚言守仁處田州非是上頗疑之十三年秋九月廵檢盧蘇殺田州判官岑邦相先是林富代王守仁為提督奏言思恩改設流官二十年兵不得罷田州决非流官所能控禦竟主守仁前議降田州為州治以邦相為判官命副總兵張佑鎮之許以二年而代時邦相年十五六張佑兒子畜之盧蘇自矜功大專横邦相不能平遂有隙會張佑將代去望邦相厚賂已邦相賄之不滿意佑遂與盧蘇比欲沮奪邦相乃購得邦彦子芝育之别所邦相時時欲殺芝佑不果代留鎮庇芝得免尋佑中邦相毒卒芝奔梧州督府都御史陶諧畜之至是盧蘇遣其黨刺邦相不克邦相與土目羅玉等伐盧蘇事覺蘇伏甲擒斬羅玉遂刼諸土目攻邦相執而殺之燔其屍賂陶諧言邦相病死無後乃立芝遣歸田州于是猛仲子邦佐爭立而鄰府諸土官皆不平盧蘇弑主也合兵助邦佐攻田州入之蘇走免亂復大作兩江震駭諧遣人諭諸土官曰邦相實病死盧蘇何與而爾等自相殘害也亡何諧以憂去都御史潘旦蔡經相繼代皆曰思田苦兵革久矣朝廷今復以盧蘇故興問罪之師征伐當何時已乎朝議下核實副使葉俛叅議陳大珊曰盧蘇稱亂弑主罪安可盡赦也縱宥之不誅當以上聞令立功贖罪耳經不聽上言邦相不孝奪其母田又虐殺其部下盧蘇因衆怨殺之朝廷遂置蘇不問仍官芝等如故于是兩江土官聞之莫不解體谷應泰曰田州為粤西南徼蠻瘴荒裔不足重輕後失安南議者稍稍視田州為南海外屏欲寄重焉岑氏世守田州自𢎞治六年岑猛父膏逆􅀈身逼强鄰間闗奔走存邢遷衛朝廷視猛恩至渥也至十八年岑濬始懸首藁街正徳中岑猛始克復舊業黎子式微重耳河水猛身扞天朝不忘舊徳分固應爾而乃晉惠入絳遽絶秦闗衛燬廬漕坐觀齊亂猛之單騎棄軍仰藥逆旅天亡之矣然猛桀驁性成反形未見追兵四集猶勑下勿交鋒裂帛書寃上狀軍門亦云哀已而雲夢陳兵决收韓信陳平奏詔竟斬舞隂姚鏌輕于討賊重于受降信于請兵疑于對壘猛既寃死不白鏌亦功名不終猛負國恩而身殛鏌貪軍功而官奪天道好還適相當也至盧蘇王受之反釁本姚鏌失又似由新建盖新建怜田恩厭苦兵革曲撫盧王立岑氏之後設田州之官隂假戰功陽羈蘇受而所舉張佑貪賄比匪種禍岑族張佑既隕邦相之毒邦相旋膏蘇受之戈沈王搆惡義真必棄闗中鍾鄧相傾姜維幾反蜀道新建寄托不終識者微有憾焉而繼佑來督者陶諧也邦相賊殺鎮臣朝廷寢而不問蘇受執殺州主大臣陽言病亡夫天南末郡不知天子寵靈式慿皆懸督府張佑索裘不與拘執唐侯陶諧寳賂亟行遂黨莒僕處置舛錯刑賞乖張貽笑蠻方損傷國體君子知明網不振先在逺彛矣要之姚鏌之非在于捕反太急而貽謀者索賄之盛應期陶諧之罪在于有賊不討而貽謀者亦索賄之張佑官務賄章邊釁日急故皇甫安邊奏免墨吏奉仙載寳僕固稱兵好利亡國好色亡身古今龜鑒葢不誣矣明史紀事本末卷五十三
