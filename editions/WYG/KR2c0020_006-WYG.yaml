body:
  text: 明史紀事本末卷六浙江提學僉事谷應泰編太祖平閩元順帝至正十二年盗起海上勢且及汀元汀州判蔡公安募吏士乗城福清人陳友定以明溪驛卒談軍事公安竒之授黄土寨廵檢從討延平邵武諸山賊平之遷清流簿尋為清流令友定一名有定字安國從福清徙居清流少孤病頭瘡傭于富室羅氏常與羣兒樵設隊伍為戱羅竒之將以為壻媼不悦曰頭病郎足婿耶因失鵞而奔于隣隣家夢虎踞門得友定大喜召飲食乞于羅媼竟壻之俾習商販善敗大困然其為人勇沈喜游俠擊斷不問家人有無要以借軀徇急行其志而已衆憚服之争願為之役十九年陳友諒遣其將康泰取邵武鄧克明寇汀州友定以總管禦之戰于黄土盡獲其部衆克明逃去遷行省叅政二十年二月庚申元福建行省叅政袁天禄以福寜州來歸先是福建義兵萬户賽富迪音阿里瑪丹據泉州陳友諒兵入杉闗攻䧟邵武汀州延平諸郡縣羣盗乗勢竊發閩地騷動天禄輩知元勢不振至是見明師下浙東方國珍歸附天命有在遂遣古田縣尹林文廣納欵時福清同知張希伯亦遣其屬來降太祖賜書褒嘉之二十一年鄧克明復寇汀州陳友定逆戰敗之遂開省于汀州遷左丞二十二年夏元以陳友定守汀州友定兵勢日盛郡縣倉庫悉入其家元行省平章雅克布哈擁虚位而已二十四年陳友定開省延平遷行省平章政事時元大都道絶友定遣貢舶多由海道取登萊十逹三四元主下詔褒美方國珍來寇擊敗之二十五年二月陳友定侵處州叅軍胡深撃之遁復追敗之己丑遂下浦城四月乙丑叅軍胡深進攻建寜之松溪克之獲陳友定守將張子玉餘衆敗奔崇安深請發廣信撫州建昌三路兵併攻之因取八閩太祖如深言遣廣信衛指揮朱亮祖由鉛山建昌左丞王溥由杉闗㑹深進兵擊之五月胡深等進兵克浦城遂與友定將頼元帥大戰于浦城之南敗之六月㑹朱亮祖克崇安建陽遂進攻建寜大兵次城下亮祖即欲攻之深視氛祲不利謂亮祖曰天時未協將必有災未可與戰亮祖曰叅軍何得以災為解師已至此庸可緩乎且天道𤣥逺山澤之氣變態無時何足徴也迫深進兵深猶執不可㑹建寜守將阮德柔以兵四萬屯錦江逼深陣後亮祖咎深督戰益急深不獲已遂引兵鼓譟進撃之破其二門德柔盡率精鋭扼深軍圍之數重時日已暮深知營壘未安而兵圍不解難以持乆即突圍出德柔伏兵忽起深馬蹶被執友定頗禮遇之深為具道朝廷威德并陳天命所在且援竇融歸漢故事諭之友定初無害深意㑹元遣使者至督迫之遂殺深先是日中有一黒子劉基奏曰東南當失一大將至是深果敗沒深有文武才守處州五年威惠甚著太祖聞報痛惜之遣使賜祭追封縉雲郡伯二十六年八月元以陳友定既敗胡深命為福建行省平章政事兼守八閩友定有勝兵萬人益發取諸郡縣逺近瓦解無敢角而長汀人羅良者故亦以散資募士為元捕殺漳山寇提兵解福州圍為閩將第一良數從海道漕元元爵良晉國公貽友定書曰足下向為叅政國大臣汀州之復固本職雅克平章足下僚長也足下迫之郡邑之長出自朝命足下竄之百司朝廷之役足下臣妾之足下所收復郡邑得其倉庫入為家資口言為國心實身耳跬歩之間真偽甚明不審足下將為郭子儀抑為曹孟德友定大怒發兵攻漳良使三千人操弩毒矢伏險待之十長石古違良節制友定兵得渡桞營江良迎戰馬岐山敗績進圍漳良堅守旬月死之友定據漳使人鑿山道城守自固十二月友定建寜守將阮德柔遣使來納欵太祖呉元年元至正二十七年也十月甲子命中書平章胡廷美為征南將軍江西行省左丞何文輝為副將軍率師取福建以湖廣叅政戴德隨征諭廷美曰汝以陳氏丞相來歸事吾數年忠實無過故命汝總兵徃取福建何文輝為汝之副湖廣叅政戴德從汝調發二人皆吾親近之人勿以此故廢軍政凡號令征戰一以軍法從事吾昔微時在行伍中見將帥統馭無法心竊非之及後握兵柄所領一軍皆新附之士一日驅之野戰有二人犯令即斬以狥衆皆股栗莫敢違吾節制人能立志何事不可為聞汝徃年嘗攻閩中必深知其地理險易今總大軍征進凡攻圍城邑必擇便利可否為之進退無失機宜克定之功全頼于汝廷美拜命出十一月壬寅胡廷美度杉闗畧光澤縣下之己酉廷美克邵武元守將李家茂以城降丁巳廷美克建陽元守將曹復疇亦降戊午勅征南將軍湯和副將軍廖永忠率舟師自海道取福州庚午湯和克福州初友定環福州城外皆築壘為備每五十歩更築一臺嚴兵守之聞我師入杉闗乃留同僉頼正孫副樞謝英輔院判鄧益以衆二萬守福州友定自率精鋭守延平時湯和偕廖永忠吳禎等自明州乗東北風不數日奄至福州五虎門駐師南臺遣人入城招諭為元平章庫春所殺大兵登岸將圍城庫春領衆出南門拒戰指揮謝得成等撃敗之衆潰入城拒守是夜叅政袁仁密遣人納欵黎明大兵蟻附登城遂開南門和擁兵入鄧益拒戰于水部門撃殺之正孫英輔自西門出走延平庫春塔海穆爾哈扎拉布哈左丞敦珠卜中丞特穆爾喇實等皆懐印綬挈妻子遁去㕘軍尹克仁赴水死時僉樞拜特穆爾居官聞大軍攻城急曰戰守非吾得為無以報國乃積薪樓下殺其妻妾及兩女縱火焚之遂自刎湯和入省署撫輯軍民獲馬六百餘匹海舟一百五艘糧一十九萬餘石和遣袁仁暨員外余善招諭興化漳泉諸路其福寜等州縣之未附者分兵徇之太祖洪武元年春正月元興化守將葉萬户棄州遁耆民李子成等率衆詣湯和降和遣都指揮俞良輔徃守之于是莆田等十三縣皆降和進攻延平徇胡廷美何文輝等率師至建寜元守將同僉逹爾瑪叅政陳子𤦺集僚佐謀曰聞明兵驍勇自入杉闗諸鎮望風瓦解其鋒不可當今吾城中軍士不下萬餘儲蓄尚富可以拒守不可與戰彼攻吾城不克必將自逸吾因而乗之可以得志衆皆曰然由是備禦甚堅廷美等進圍之數挑戰逹爾瑪等固守不出廷美督兵環其四門晝夜急攻之逹爾瑪不能支夜濳至副將軍何文輝營納欵詰旦總管翟額森布哈亦率衆詣文輝降廷美怒二人不詣已欲屠其城文輝曰與公同受命至此為安百姓耳城降欲以私忿殺人可乎乃止壬辰整軍入秋毫無犯執叅政陳子琦送京師獲將士人馬銀糧以萬計命指揮費子賢領兵守之湯和廖永忠等進兵取延平垂發先遣使招諭友定友定大㑹諸將殺使者取血置酒中盟諸將慷慨飲之誓以死報元大兵遂至延平隔水而陣分一軍渡水攻其西門友定戰不利歸謂諸將敵千里逺鬬氣鋭慎毋戰戰徒殺吏士耳吾墉山塹壑蓄犀器飽士為持乆計困之衆曰善遂乗城守日夜勒吏士擊刁斗被甲偶立不得更番休息守者怨甚㑹諸將欲出戰友定不許數請不已友定遂疑其部將蕭院判劉守仁有携貳心收蕭院判殺之奪守仁兵守仁降士卒多踰城走者圍十日城中軍局火砲聲發明兵疑有内應急擊破之友定知事已廹乃與樞密副使謝英輔叅政文殊哈雅訣曰公等善為計吾為元死耳坐省堂按劍仰藥飲盡英輔與達嚕噶齊白哈瑪爾具服北嚮拜自經死文殊哈雅頼正孫等開門降庚子大兵入城輿友定出俄值大雷雨復蘇其子海自將樂來就死并執送京師太祖面詰曰元已亡若為誰守殺我胡將軍又不内使者今何憊也友定恚曰已矣毋多談安得加我死乎遂併其子棄市胡廷美等進兵克興化遣建陽降將曹復疇招諭汀州及寜化連城等縣元汀州守將陳國珍納欵于是泉州漳州潮州郡縣相繼降置延平衛廷美以部將蔡玉守之六月甲子友定故將金子隆馮谷保等復率衆寇延平玉撃敗之追至沙縣青雲寨子隆負險自守㑹建寜指揮沭英攻鉛山上命英以兵㑹和丙寅英引兵夾攻破之擒谷保戊辰命平章李文忠率兵討金子隆等閏七月李文忠帥師攻清化寜化諸山寨擒金子隆及其餘黨誅之閩地悉平谷應泰曰太祖之取閩也嘗分兵從兩道入胡廷美何文輝由陸路湯和廖永忠督海師而其時為元守封疆者則福清人陳友定也友定以布衣談兵謁州判蔡公安從攻延邵諸山賊起家廵檢歴功擢行省平章何其偉也乃其為人勇沉喜游俠捐軀報仇不問生産又且明兵壓境義無反顧殺使者盟諸將嬰城固守誓死報元豈非犖犖尤異者歟方羣雄割據中原雲擾之時友定藉海舶之利乗闗門之險北引東甌南襟嶺表練兵積粟専制一方則無諸之業閩越王之尊可坐而致也又不然則如徐煜之在江南錢俶之據呉越持虚名以奉唐挈土地以歸宋列爵王侯不失富貴亦數世之利也乃友定計不出此始終為元延平垂破慷慨就死仰藥復蘇父子駢戮亦足愧智士之持兩端人臣之懐二心者矣雖其間胡深之殺頗有狐疑劉守仁之降亦多猜刻定之方畧要亦未稱盡善而英輔與瑪勒以自經告終金子隆與馮谷保又血戰致斃葢若田横既死義士悉從李芾自裁潭城皆盡豈非激于忠勇奮臂不顧者耶然予獨怪至正之末猶德祐之末也内則判官離次外則委印棄城一矢加遺望風相屬乃其部落多奔潰而閩人獨為扼守京畿多散亡而閩地獨能死守者豈漢室將衰邊庭請附晉家解紐張駿稱藩荒裔絶域固未測中朝之虚實也明史紀事本末卷六
