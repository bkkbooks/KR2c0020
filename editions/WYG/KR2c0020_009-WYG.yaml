body:
  text: 明史紀事本末卷九浙江提學僉事谷應泰編畧定秦晉太祖洪武元年元將李思齊張良弼聞王師下河南即駐兵潼闗以拒既而火焚良弼營思齊仍移軍退守葫蘆灘遣其部將張徳欽穆薛飛守闗五月都督同知馮宗異抵潼闗思齊棄輜重走鳯翔良弼奔麟城丙寅宗異遂入潼闗引兵西至華州元守將望風奔潰先是宗異下陜州上遣使諭之曰若克潼闗勿遽乗勝而西今大將軍方有事北方宜選將守闗以遏其援兵爾且率師囘汴梁至是五月庚午徐達調僉事郭興將慶陽衛指揮于光威武衛指揮金興旺守之丙子宗異囘軍至陜州與徐達俱還河南八月大將軍徐達副將軍常遇春既定元都受命帥師取山西副將軍馮宗異偏將軍湯和平章楊璟俱從大將軍徐達征討九月乙丑副將軍常遇春等下保定留指揮李傑守之丁卯下中山以指揮董勲守之遂帥師趨真定元守將孫平章棄城走十月戊辰大將軍徐達遣廣武衛鎮撫劉聚守河間兼領府事副將軍馮宗異偏將軍湯和由河南渡河克武陟下懐慶元平章白索珠棄城遁兵至太行山􅔉子城破其闗元兵奔潰進取澤州元平章賀宗哲棄城遁破磨盤寨獲叅政俞仁戮之進克潞州分兵克雄州以鎮撫程信守之十一月癸丑徐達克趙州以叅隨王成守之右丞薛顯敗元托克托特穆爾于石州庫庫特穆爾遣其将哈扎爾来攻澤州楊璟張彬徃援之遇元兵于韓店大戰失利十二月大将軍徐達率諸軍進取太原庫庫特穆爾敗走庫庫特穆爾者察罕特穆爾甥也先是察罕與羅山人李思齊起兵撃賊元授察罕汝寜達嚕噶齊察罕死詔庫庫領父兵封河南王而李思齊亦在節制中思齊自謂父行與他將張良弼孔興圗嚕卜等皆欲異軍思齊遂據盩厔良弼據麻臺庫庫遣闗保珪琳齊攻麻臺李思齊孔興圗嚕卜皆與良弼合元數趣庫庫出師庫庫遣其弟托音特穆爾及部将旺扎勒摩該往山東而自與思齊良弼相攻一嵗餘元下詔與和解庫庫殺詔使拒命遣兵據太原元太子與闗保思齊良弼諸軍合夾攻澤復削奪庫庫爵邑令思齊等誅之庫庫退守平陽闗保據澤潞二州與摩該合戰而明兵已及河南思齊良弼乃自詣庫庫與結好因解兵西歸庫庫與摩該闗保戰擒之上疏陳罪元赦庫庫特穆爾復其官使出兵禦明命右丞伊蘇趨山東圗嚕出潼闗李思齊出七盤金商圖復汴梁然大將軍已至通入北平順帝夜開建徳門北走仍命庫庫率兵出雁門闗由保安州經居庸闗以攻北平達聞之謂諸將曰王保保率師逺出太原必虚北平孫都督總六衛之師足以鎮禦我與汝等乗其不備直抵太原傾其巢穴彼進不得戰退無所依此兵法所謂批吭𢷬虚也若彼還軍救太原則已為我牽制進退失利必成擒矣遂引兵徑進庫庫既至保安州聞之果還軍前鋒萬騎突至傅友徳薛顯率敢死士數十騎衝却之庫庫軍於城西壓明軍而陣指揮郭英慿髙望之謂常遇春曰彼兵多而不整營大而無備請夜劫之遇春然其計與徐達謀曰我騎兵雖集而歩兵未至何以能戰莫若遣精騎夜劫其營其衆可亂衆亂主將可縛也會庫庫部将呼必瑪勒潛遣人約降且請為内應達大喜遂乗夜襲之先遣五十騎伏城東十里以舉火鳴砲為期至夜郭英率十餘騎潛入其營舉火鳴砲伏兵應之遇春等兵大至鼓噪相接軍大潰自相蹂躙庫庫方燃燭坐帳中使兩童子執書侍倉卒不知所出亟納靴未竟跣一足踰帳後出得驏馬從十八騎遁去達等勒兵進營城西呼必瑪勒以其將校降得兵四萬人馬四萬餘匹庫庫奔大同遇春率兵追至忻州不及得行人汪河還庫庫走甘肅庚午徐達遣傅友徳薛顯將歩騎邀擊賀宗哲於石州敗之以戴復初署霍州丁玉明署忻州蔣應宗署崞州翁子竒守大石副將軍馮宗異西至猗氏擒元右丞賈成甲戌進攻平陽擒元右丞李茂下之叅政陸聚率兵攻車子寨及鳯山成山帖山三寨降之復取故闗山寨承天寨宗異進攻絳州克之擒元右丞田保徐伯昌獲将士五百人陽曲盤闢勒等十寨頭目各以其衆詣大將軍徐達營降二年春正月詔免北平燕南山東山西河東河南潼闗唐鄧光恩等處税糧甲寅副將軍常遇春帥師攻大同庚申兵至大同元守將珠展棄城走擒知院于陳等八十餘人叅政傅友徳將兵屯朔州右丞薛顯攻下潞州桃花寨大將軍徐達遣叅政陸聚分兵守井陘散闗聚進攻承天寨克之癸亥遣使賫勅往山西諭諸將曰近者大夫湯和定浙左平閩中平章楊璟靖湖湘定廣西班師還朝未有定賞以大將軍等滅元未還故也於是遣諸偏將從大將軍征進楊璟兵出澤潞中道與賊相拒雖少算以累軍此亦兵家常事且太原得此為犄綴以分其勢今定左副將軍馮宗異居遇春之下偏將軍湯和居宗異之下偏將軍楊璟居和之下協力同心剪除餘寇二月大將軍徐達師次河中副將軍常遇春馮宗異先渡河趨陜西三月乙未元鄜城守將副樞施成詣軍門降徐達仍令成守之庚子徐達師至鹿臺遂入奉元路先是李思齊據鳯翔副將欽穆薛飛等守闗中張思道與孔興圗嚕卜金牌張龍濟民李景春等駐鹿臺以衛奉元至是大兵入闗思道等先三日由野口遁去達遣都督僉事郭興將輕騎𢷬奉元而自率大軍繼進渡涇渭至三陵坡父老千餘迎降達按兵遣左丞周凱入城撫諭明日整兵入改奉元路為西安府以夏徳署府事留耿炳文守之炳文在長安修築涇陽洪渠諸堰十萬一千餘丈民便利之大軍西征供億繁急炳文輸餉五千石赴鞏昌軍食頼以足達師之至鹿臺也元陜西行省平章哈瑪爾圗棄奉元走盩厔為民兵所殺平章烏爾圗西臺治書侍御史王武遁去復降斬之西臺御史僧格實哩守闗家洞達遣攻之勢窮促不屈與妻子俱投崖死左丞貝沁古逃入終南山郎中王可仰藥死檢校實克布哈自縊死三原尹朱春與其妻亦俱投崖死時闗中饑上聞命户賜米一石繼又命赴孟津倉户給米二石民大悦癸卯常遇春馮宗異等帥師發陜西進克鳯翔初李思齊之奔鳯翔也上以書諭之曰前者遣使通問至今未還豈所使非人忤足下而留之與抑元使適至不能隱而殺之若然亦時勢之常大丈夫當磊磊落落豈以小嫌介意哉夫堅甲利兵深溝髙壘必欲竭力抗我軍不知竟欲何為昔足下在秦中兵衆地險雖有張思道專尚詐力孔興等自為保守庫庫以兵出沒其間然皆非勍敵足下此時不能圖秦自王已失此機今中原全為我有向與足下相為犄角者皆披靡竄伏足下以孤軍相持徒傷物命終無所益厚徳者豈為是哉朕知足下鳯翔不守則必深入沙漠以圖後舉然非我族類其心必異倘中原相從之衆以塞地荒凉一旦變生肘腋妻孥不能相保矣且足下本汝南之英祖宗墳墓所在深思逺慮獨不及此乎誠能以信相許翻然來歸當以漢竇融之禮相報否則非朕所知也思齊得書有降意其麾下誘之與西入吐番思齊惑之至是大兵至鳯翔思齊懼遂帥所部奔臨洮叅政傅友徳克鳯州以指揮張能守之夏四月丙寅大將軍徐達會諸將於鳯翔議所向諸將咸以張思道之才不如李思齊慶陽易於臨洮欲先由豳州取慶陽然後從隴西攻臨洮達曰不然思道城險而兵悍未易猝㧞臨洮之地西通番戎北界河湟取之其人足以備戰鬭其土地所産足以供軍儲今以大軍蹙之思齊不西走胡則束手就縛矣臨洮既克則旁郡自下諸將然之達乃留御史大夫湯和守營壘輜重令指揮金興旺余思明等守鳯翔遂移師趨隴州克之尋至秦州馬跑泉元守將吕徳張義遁去遣都督僉事陳徳追獲之以合肥衛千户王宏將兵五百守隴州張規魯將兵千人守秦州達進師至鞏昌元守將梁子中汪靈真保等出降以都督僉事郭興守之遣馮宗異攻臨洮顧時戴徳攻蘭州丁丑顧時等克蘭州以指揮韓溫守之馮宗異師至臨洮李思齊窮迫舉城降宗異遣人送徐達營達遣指揮韋正等守之臨洮捷奏至上覽畢即遣使諭徐達曰李思齊既降宜進攻慶陽寧夏張思道兄弟多詐若來降當審處之勿墮其計也李思齊入見命為江西行省左丞不之官食祿於京師己卯徐達師入安定州以降將陳宗聚署州事調青州右衛官軍守之克會州以叅隨黎宗文署州事指揮陳夀守之乙酉徐達師入靖寧州遂狥下隆徳縣五月丁酉大將軍徐達師至蕭闗下平凉指揮朱明克延安以明守之辛丑元將張良臣以慶陽降初張思道在慶陽聞王師克臨洮懼走寧夏而使其弟張良臣平章姚暉守慶陽思道至寧夏與金牌張等俱為庫庫特穆爾所執徐達既下平凉即謀取慶陽令湯和遣兵往涇州别遣指揮張煥將騎兵偵邏慶陽遣人招良臣良臣以其兄被執遂以城降良臣驍勇善戰軍中呼為小平章戊申良臣復據慶陽叛初良臣之降也遣其花叅政詣徐達獻軍民數目尋又遣知院李克仁葛八來獻馬數達遣右丞薛顯將騎兵五千人同克仁等赴慶陽比良臣出迎匍伏道左佯為卑下以示歸順薄暮即以兵劫營顯等不意其叛為所衝潰指揮張煥被執顯被傷走還達聞語諸將曰帝明見萬里外今日之事果如前言然良臣之叛祗取滅亡耳當與諸公戮力剪之於是馮宗異傅友徳聞良臣叛帥師自臨洮至涇州湯和亦帥所部來會達恐其黨相扇為聲援乃先遣兵抄其出入俞通源將精騎畧其西顧時畧其北傅友徳畧其東陳徳畧其南達帥諸將趨慶陽以兵四面圍其城良臣出兵挑戰達麾兵擊敗之六月辛巳達督諸軍攻慶陽張良臣遣珠克往寧夏求援於王巴拜獲斬之仍以叅隨王敬祖將兵守彭原秋七月甲午徐達遣降將李茂等將騎兵千人往隆徳秦安等處收捕未附頭目杜拜布哈羅左丞相等辛亥王巴拜部將哈扎爾䧟原州指揮陳夀死之徐達聞報與馮宗異傅友徳議以驛馬闗當其衝遣右丞徐禮將兵據之又遣指揮葉石真守彭原調指揮韋正守邠州傅友徳薛顯駐靈州扼之宗異復與徐達謀曰今大軍圍慶陽張良臣雖困未能遽下王巴拜欲為良臣聲援故令哈扎爾攻原州欲以救慶陽請得移軍逼闗以扼原州彼無所施矣達然之宗異遂以其軍西臨驛馬闗去慶陽三十里而軍是夜哈扎爾復攻䧟涇州丁千户退保靈臺縣宗異自驛馬闗引兵赴之哈扎爾走追至邠州又走宜祿遁去宗異還屯驛馬闗八月丙寅慶陽小元帥謀納欵為張良臣所囚城中降者夜劫小元帥出詣大將軍營達受之令軍中無虐降者先是七月己亥常遇春還次柳河川得疾卒上令偏將軍李文忠代領其衆至是詔文忠自北平㑹師攻慶陽行至太原會元將圗嚕卜等攻大同甚急文忠謂左丞趙庸等曰吾與公等受命而來閫外之事有利於國專之可也今大同被攻甚急若候進止豈不失機衆皆諾遂由代出鴈門至馬邑適游騎數千奄至猝遇我師與戰敗之擒其平章劉特穆爾進至白楊門又擒黠冦四大王時天雨雪文忠疑有伏乃身引數騎入山察視之前軍已駐營去敵五十里文忠至遽令遷之復前至五里營於漫地阻水先遣由間道達大同使知之元將圗嚕卜悉鋭來攻文忠令將士秣馬蓐食閉營不出先以兩營誘敵督令死戰自寅至辰前營報數至文忠不為動良乆度其饑疲乃分軍為左右翼身當前鋒奮擊大敗之生擒圗嚕卜降其衆萬餘獲馬匹輜重甚衆縛圗嚕卜詣軍門文忠解其縛與之共食遂進兵東勝州至莽果倉而還先是元主北走騰格哩命圗嚕卜孔興以重兵攻大同欲圖恢復至是圗嚕卜被擒孔興走綏徳其部將復斬之來降元主知事不濟無復南向矣圖嚕卜至京師上曰彼各為其主耳釋之賜冠帶衣服癸未徐達克慶陽先是徐達率諸將四面圍其城張良臣出戰東門顧時擊敗之復自西門出戰馮宗異禦之走還良臣登城呼吕徳約降達不聽初良臣之叛也自以其城險而下有井泉可據以守其兵精悍養子七人皆善戰軍中語曰不怕金牌張惟怕七條鎗又其兄思道與王巴拜為聲援賀宗哲哈扎爾為羽翼姚暉葛行為爪牙故欲拒守以圖大功及明師列營城下困之良臣不得逞數出戰俱不利遣人赴寧夏求援輙被獲内外音問不通糧餉乏絶至煮人汁和泥嚥之姚睴熊左丞胡知院知事不濟開門納降達勒兵自北門入良臣父子俱投井中引出斬之明日誅良臣黨柴知院等二百餘人以都督僉事陳徳守之先是賀宗哲攻鳯翔或隧地或突至甕城凡十五日指揮金興旺周興嬰城固守至是慶陽下宗哲乃引去徐達聞宗哲由六盤山遁遣顧時薛顯傅友徳將萬騎追之宗哲以其衆掠蘭州達遣馮宗異率歩騎一萬七千道靖寧擊之宗哲由徳哷蘇渡河遁去宗異乃率所部還九月大將軍徐達御史大夫湯和發平凉還京師以右副將軍馮宗異總制軍事十二月王巴拜知大將軍南還自甘肅以兵襲蘭州奄至城下守將指揮張温會諸將校曰彼悉衆襲我我兵寡難與為敵然彼逺來未知我衆寡乗暮擊之可挫其鋒彼不退則固守以待援於是整兵出戰巴拜兵少却温歛兵入城巴拜進圍之温堅守不與戰鷹揚衛指揮于光守鞏昌將兵來援至蘭州之馬蘭灘卒遇保保兵戰敗被執至蘭州城下使呼張將軍出降光大呼曰我不幸被執公等但堅守徐總兵將大軍至矣敵怒批其頰遂遇害城中聞光言守益堅夜二鼔巴拜以兵登城千户朱祐醉不能起巡卒擊却之温屢設方畧乗怠破其兵巴拜圍數月不利且聞大軍至遂引去温執朱祐數其罪將殺之知事朱友文諫曰當其時斬祐以狥所謂軍法從事也今賊已退誅之無及徒有專殺罪温杖而釋之事聞陞温都督僉事贈䘏于光谷應泰曰初太祖之北伐也直趨青濟者正兵而西扼潼闗者疑兵也故以徐中山大軍搗彼胸腹而以馮宗異孤軍綴彼聲援原未嘗命其仰闗而攻躍馬而入也此時元將之守晉者為庫庫特穆爾其守秦者為李思齊張思道皆庸才耳庫庫之應詔入援出鴈門經居庸其算神矣而太原根本空國而去一軍奄至巢覆穴傾此晉之所以亡也李思齊負百二之險藉建瓴之勢乃不捲甲出闗以斷河南要路而反徘徊闗内風鶴驚奔使宗異拱手而取河西安驅而入華陽此秦之所以亡也假令庫庫留守如孟徳之保三城思齊出闗如趙奢之爭閼與則明之重兵深入雲代既壓其前韓魏又議其後托權未去伊蘇重來安危之機正未可必也奈何徐常諸將由豫入晉自晉達秦庫庫不戰於北平而戰於晉陽思齊不戰於河津而戰於崤底譬之腐鼠孤雛直坐受人縛耳然又不特此也思齊以父行倔强庫庫以私釁稱兵大敵在前而兩虎自鬭遂使明兵直入河南迅掃上谷方始解甲西歸輸誠結好憂卞莊之刺講亷藺之歡嗚呼晚矣以予觀之唐起冀方混一區宇秦據雍州蠶食六國而元末武臣坐失事機怯於公戰正所謂倔强蓁莽之間遷延嵗月之命豈真伏義勤王有深圖逺算之概哉至於哈扎爾之河隍剽掠張良臣之慶陽復叛而明師乃能西臨驛馬東叩大同出竒無窮料敵制勝則晉室之表裏山河秦地之隩區陸海安得不為新主資也明史紀事本末卷九
