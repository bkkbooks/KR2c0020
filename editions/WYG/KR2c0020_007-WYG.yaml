front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0020_WYG_007-1a, image: WYG0364/WYG0364-0181c.png}
body:
  text: 明史紀事本末卷七浙江提學僉事谷應泰編平定兩廣吳元年元至正二十七年也十月甲子命湖廣行省平章楊璟左丞周德興張彬率武昌荆州潭岳等衛軍由湖廣取廣西諭璟等曰南方之人皆入版圖惟淮北山東尚未寜一兩廣八閩尚未歸附已命丞相徐逹平章常遇春等北定中原平章胡廷美分道南征以取八閩俟八閩既定就以其師航海取廣東故命爾等率荆湘之衆進取廣西兩軍合勢何征不克爾其務靖亂止暴使逺人畏服毋替予命璟等頓首出太祖洪武元年正月乙亥楊璟等進兵攻永州元全州平章阿爾斯蘭遣兵來援逆擊敗之進逼永城守將鄧祖勝出兵南門拒戰又敗之獲其將王鑑祖勝歛兵入城固守元兵復自廣西來援駐東鄉倚湘水列七營軍容甚盛璟遣指揮袁子明擊敗之獲其萬户丁武等千餘人二月癸邜命平章廖永忠為征南將軍叅政朱亮祖為副將軍由海道取廣東上諭永忠等曰王者之師順天應人以除暴亂朕昔平定武昌荆湘諸郡望風欵附常遇春克贑州南安嶺南數郡亦相繼來歸此無他師出以律人心悦服故也今兩廣之地逺在南方彼此割據民困乆矣彼聞八閩不守湖湘已平中心震懾若先遣人宣布威德以招徠之必有歸欵迎降者如其拒命然後舉兵扼其險要絶其聲援聞廣東要地惟在廣州廣州既下則循海諸郡可傳檄而定海南海北以次招徠留兵鎮守仍與平章楊璟合兵取廣西肅清南服在此一舉癸丑楊璟遣千户王廷將兵取寶慶先是既克寶慶復為陳友諒將周文貴所陷至是廷進兵茱萸灘賊衆千餘據險拒戰廷擊敗之文貴遁遂復寶慶壬戌勅贑州衛指揮使陸仲亨等帥師㑹廖永忠征廣東上諭仲亨等曰近命平章楊璟等由湖南取廣西廖永忠等由福建取廣東今特命爾等率師由韶州直𢷬德慶三方進兵為犄角之勢舉無不克廣東既下合兵取廣西先聲既振勢如破竹但當撫輯生民毋縱殺掠三月楊璟遣左丞周德興叅政張彬率兵取全州壬申我師克全州元平章阿爾斯蘭遁去道州莫友遜寜逺州李文卿藍山縣黎元帥相繼降廖永忠等率舟師自福州航海取廣東元左丞何真降先是嶺海騷動真固保鄉里邑人王成陳仲玉搆亂真請於行省舉義兵除之擒仲玉以歸成築砦自固圍之乆不下真募人能縛成者予鈔十千於是成僕縛成以出真笑謂曰公奈何養虎自貽患成慙僕求賞真如數予之使人具湯鑊車上成懼以為將烹已也真乃縛僕於上促烹之使數人鳴鉦督僕妻炊火僕一號則羣應之曰四境有如僕縛主者視此於是人具服以為光武待蒼頭子宻不能及也競歸之遂併有循惠二州授惠州路通判尋以真為叅政遷右丞嶺表民頼以安或陳符瑞勸為尉佗計者輙斥絶之初廖永忠駐福州遣人以書諭元江西分省左丞何真畧曰乃者元君失馭天下土崩豪傑之士乗時而起分剖州郡竊據疆土或假元號令或自擅兵威暴征横歛蚕食一方生民塗炭可謂極矣今天子受天明命肇造區夏江漢既已底定閩越又皆帖服中原之地相繼削平惟兩廣僻在遐方未霑聖化予受命南征順者撫綏逆者誅殛恐足下未悟輙先走一介之使相告足下其留意焉至是永忠等至潮州真遣其都事劉克佐上印章籍所部郡縣户口甲兵錢榖奉表歸附上嘉其保境息民視漢唐竇融李勣等特召乗傳來朝丙戌平章楊璟遣兵攻武岡州元守將曽權舉城降四月朔辛丑廖永忠等師至東莞何真率官屬迎見進次虎頭闗元將盧左丞張元帥各率所部來降遂入廣州陸仲亨率兵下英德清逺連江連州肇慶等郡縣辛丑進克德慶路元守將張鵬程棄城遁按何真東莞人常為淡水塲管勾元末嶺南盜蜂起剽掠真鄉真結豪民保障及亂兵據惠州真率衆復之以功授惠州路通判陞宣慰司都元帥時南海寇邵宗愚陷廣州真又擊走之元立江西分省於廣東以真為叅政又陞右丞遂據有廣東諸州郡至是始降乙卯廖永忠擒廣州偽叅政邵宗愚等誅之時宗愚據三山寨遣人納降而遷延不至永忠知其詐下令徃攻夜二鼓發兵抵其寨詰旦破之獲宗愚斬於市分捕新㑹黄彬河源曹文昌汲州廖仁南海麥康祖等皆誅之何真入朝賜宴并白金千兩文綺紗羅綾叚各百疋將校分賜有差諭之曰天下紛紛所謂豪傑有三易亂為治者上也保民逹變識所歸者次也負固偷安毒流生民身死不悔斯不足論矣頃者師臨閩越卿即輸誠來歸不煩一旅之力民庶安堵可謂識時逹變授真江西行中書省叅知政事楊璟圍永州乆不下命指揮胡海洋等築壘困之復造浮橋於西江上練習軍士示以必克至是食盡力窮守將鄧祖勝仰藥死叅政張子賢等猶率衆拒守百户夏昇縋城詣璟降因言祖勝死狀夜三鼓璟督兵四面攻之胡海洋等踰城入子賢復率衆巷戰天明衆潰子賢與元帥鄧思誠等俱就執獲其全城士馬璟調衡州衛指揮同知丁玉守之於是來陽等州皆遣人降五月己卯征南將軍廖永忠叅政朱亮祖等兵至梧州元逹嚕噶齊拜穆率官吏父老迎降時元吏部尚書布延特穆爾張翔以便宜行事入廣西行次藤州永忠兵適至募兵欲迎戰民無應者既而藤州守吳鏞出降乃率所部百餘人走欝林亮祖勒兵追之布延特穆爾戰沒張翔赴水死亮祖駐兵藤州甲午朱亮祖引兵至容州同知明布哈及普寜縣逹嚕噶齊瑪嚕等迎降朱亮祖師次貴州元欝林州知州張那海迎降六月甲辰元海南海北道元帥羅福等及海南分府元帥陳乾富等俱遣使降壬戌克靖江路先是周德興克全州即分兵柵據靖江險要絶其聲援璟既克永州遂引兵抵靖江城下屯於北闗叅政張彬屯西闗朱亮祖亦帥師自廣東來㑹屯於東門象鼻山下攻城二旬不克璟語諸將校曰彼所恃者西城濠水耳當先取閘口闗决其堤岸則破之必矣諸將曰諾明日遣指揮使丘廣引輕兵攻閘口闗殺守堤兵决堤濠水涸因築土堤近與城接以通士卒遂克其北門月城又克其北門水隘斬獲百餘人復攻其西門不利相持凡兩閲月攻圍益力額爾吉納勢窮蹙驅兵南門出戰指揮胡海擊敗之獲其萬户皮彦髙楊天夀等璟因使彦髙陰搆其總制張榮榮麾下裴觀以書繫矢射璟營期以是夜降既二鼓觀縋城出見璟備言城中積貯空虚人無鬬志可立取狀璟乃給白皮㡌百餘俾歸為識約四鼓從賓賢門入至期璟命諸將率衆徑進額爾吉納聞變倉卒走追至城東伏波門執之初張彬始攻城為守者所詬恚曰城破當悉屠之比克城璟懼其縱殺下令曰殺人者死彬乃止衆心遂安戊辰廖永忠進兵南寜元土浪屯田千户宋真執其守將平章恩楚等遣使降永忠悉收諸司印章命真守其城送爾珠等赴京師七月己巳廣西左江太平府土官黄英衍右江田州府土官岑伯顔等遣使齎印章詣平章楊璟降元平章阿爾斯蘭自全州之敗率餘衆退保象州廖永忠遣指揮耿天璧等討之師至賓州境阿爾斯蘭遣其部將李左丞拒戰天璧擊敗之阿爾斯蘭窮迫乃遣其子僧保來納欵戊子遂自帥所部詣永忠降獻其銀印三銅印三十七金牌五丁酉元彬州守將左丞楊以誠詣平章楊璟營降廣西悉平楊璟等自靖江振旅還二年二月詔改慶逺府為慶逺南丹軍民安撫司湖廣行省臣言慶逺地接八番溪洞所轄南丹宜山等處宋元皆用其土酋為安撫使大兵下廣西安撫使莫天祐首來欵附宜録用以統其民則蠻情易服守兵可減上從之以天祐為安撫司同知三月癸亥置廣西行省初廣西𨽻湖廣至是時置行省九月戊午征南將軍廖永忠副將軍朱亮祖還京師冬十一月丙午遣中書照磨蘭以權賫詔徃諭廣西左右兩江溪洞官民曰朕惟武功以定天下文敎以化逺人此古先哲王威德並施遐邇咸服者也睠兹兩廣地邊南徼風俗質樸自唐宋以來黄岑二氏代居其間世亂則保境土世治則修職貢良由審時知幾故保世滋大頃者朕命將南征八閩克清兩廣平定爾等不煩師旅奉印來歸嚮慕之誠良足嘉尚今特遣使徃諭爾其克慎乃心益懋厥職宣布朕意以安居民谷應泰曰呉元年太祖命平章楊璟由湖廣取廣西又命征南將軍廖永忠由閩之海道取廣東兩路進師尅期同發趨之如猛獸鷙鳥迫不及待者葢亦乗新勝之威振發䝉之勢者也夷考其時淮北山東曽無經畧秦晉闗陜尚懸度外止徐逹一軍由淮入河長驅北伐耳夫咸陽建瓴百二非止珠崖銅柱之險也中州沃野千里不特桂林象郡之饒也三晉兵馬莫强又不止尉佗之夷風番禺之敝俗也乃太祖不并力中原而分兵南徼不急争隩府而先事蠻方緩急之數得毋出於下䇿乎而予以為不然也方其時元人地大力全雖遣王時未窺虚實合衆叩闗計需嵗月而江南之地漢呉閩三方並沒所向無前粤服先聲畏之如虎更若一矢加遺即可傳檄而定兵法云避實擊虚又云攻其瑕則堅者瑕於是由武岡入者皆長鬛之精騎從海道入者下樓船以濟師而又以陸仲亨一軍出贑踰嶺批吭搗虚雖淮陰之用兵出竒岳侯之神算料敵不是過也究之楊璟戰功止全永二州廖永忠戰績止三山一寨而靖江不下稍煩兩軍合圍旬月耳其餘郡縣無不開門納降望風迎附兵不血刃而拱手得之者則太祖之廟算長也聞之孔明伐魏先定南苖秦國自强首吞巴蜀葢正向而争天下者殊恐人之議其後耳况乎南方既定兵力有餘海上坐收軍資尤盛因而還師轉戰掃滅上游楊璟著唐州之功永忠鼓䕫門之㨗與徐逹諸軍相為犄角克奏蕩平譬之光武悉定江淮然後一意隴蜀宋主先取兩川然後専辦東南所謂事形已濟迎刃而解者也至若元左丞何真者拒自王之謀全歸命之義而太祖嘉其保境息民與竇融李勣軰争烈嗚呼不誣矣明史紀事本末巻七
