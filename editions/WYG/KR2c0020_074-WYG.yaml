body:
  text: 明史紀事本末卷七十四浙江提學僉事谷應泰編宦侍誤國熹宗天啟七年秋八月懷宗踐阼冬十月魏忠賢伏誅南京守備太監楊朝浙直織造太監李實承天守備太監李希哲提督太和山太監馮玉天夀山太監孟進漕運太監李明道崔文昇並免上御日講畢名閣臣入便殿出薊遼督師王之臣疏示之曰王之臣自云贅員又云虚拘非内臣牽制之乎其盡撤各邊内臣十一月戊辰諭曰先朝於宣大薊遼東江諸地分遣内臣恊鎮一柄兩操甚無謂矧宦官觀兵古來有戒其概罷之一切相度機宜俱聴經督節制無復委任不專以藉其口凡爾諸臣宜體此意先是自萬厯以來礦税既行騷然苦之既而魏忠賢擅權敲骨剝髓天下重足而立上即位首罷之朝野翕然望至治焉懷宗崇禎元年春正月命内臣俱入直非受命不許出禁門二月諭戒廷臣結交近侍二年夏四月以内官監太監曹化淳提督南京織造秋七月以司禮太監曹化淳提督東厰冬十一月我大清兵南下始遣乾清宫太監王應朝監視行營太監馮元昇覈軍訖始下戸部發餉又命太監吕直勞軍十二月以司禮監太監沈良佐内官太監吕直提督九門及皇城門司禮太監李鳯翔總督忠勇營提督京營三年春二月司禮太監曹化淳等各廕錦衣衛指揮僉事四年秋九月命太監張彛憲總理户工二部錢糧唐文征提督京營戎政王坤往宣府劉文忠往大同劉允中往山西各監視兵餉冬十月命太監監軍王應朝往闗寧張國元往薊鎮東恊王之心中恊卲希韶西協十一月以太監李竒茂監視陜西茶馬吳直監視登島兵餉初上既罷諸内臣外事俱委督撫然上英察輒以法隨其後外臣多不稱任使者崇禎二年京師戒嚴乃復以内臣眎行營自是銜憲四出動以威倨上官體加于庶司羣相壅蔽矣罷工部郎中孫肇興肇興監督盔甲厰以帑詘疏劾張彛憲上怒落職五年春三月工部右侍郎髙𢎞圖上言臣部有公署中則尚書旁則侍郎禮也内臣張彛憲奉總理兩部之命儼臨其上不亦辱朝廷而䙝國體乎臣今日之為侍郎也貳尚書非貳内臣國家大體臣固不容不慎故謹延之川堂相賓主而公座毋寧已之雖大拂彛憲意臣不顧也且總理公署奉命别建則在臣部者宜還之臣部豈不名正言順而内外平上以軍興餉事重應到部驗核不聴𢎞圖遂引疾求去疏七上竟削籍秋七月以司禮監太監曹化淳提督京營戎政冬十二月南京禮部主事周鑣上言内臣用易而去難此從來之通患然不能遽去猶冀有以裁抑之今張彛憲用而髙𢎞圖之骨鯁不可容矣金鉉之撫蘆雖幸免罪以他事中之矣王坤用而魏呈潤以救胡良機處矣趙良㬢以直糾扶同處矣鄧希詔用而曹文衡以互結投閒矣王𢎞祖以禮數苛斥矣若夫孫肇興王𢎞祖之激直李曰輔熊開元之慷慨無不罷斥未能屈指尤可嘆者每讀邸報半屬内侍之温綸從此以後草菅臣子委䙝天言秪狥中貴之心將不知所極矣上怒其切直削籍禮部員外郎袁繼咸疏救之不聴以司禮監右少監劉勞譽提督九門令百官進馬三品以上各貢一匹餘合進俱納于御馬監實賫金貿之本監也否則雖騎驥亦却之六年春正月大學士周延儒以宣府閲視太監王坤疏劾乞罷不允左副都御史王志道上言王坤不宜侵輔臣上召廷臣于平臺謂志道曰遣用内臣原非得已朕言甚明何議論之多也昨王坤之疏朕已責其誣妄乃廷臣舉劾莫不牽引内臣豈處分各官皆為内臣耶對曰王坤直劾輔臣舉朝皇皇為紀綱法度之憂臣為法度惜非為諸臣地也上曰廷臣於國家大計不之言惟因内臣在鎮不利㚥弊乃借王坤疏要挾朝廷誠巧佞也因詰志道者再周延儒曰志道非専論内臣實責臣等溺職上色稍霽曰職掌不修沽立名論何堪憲紀立命志道退延儒遂放歸夏五月命司禮監太監張其鑑等赴各倉同提督諸臣盤騐収放太監張應朝調南京與胡承詔恊同守備諭兵部流㓂蔓延各路兵將功罪應有監紀特命太監陳大金閻思印謝文舉孫茂霖為内中軍㑹各撫道分入曹文詔左良玉諸營尋復以閻思印同總兵張應昌合勦汾陽知縣費甲鏸以逼迫苦供億墜井死六月命太監髙起潛監視錦寧張國元監視山西石塘等路綜核兵餉秋七月叙内臣守萊州功徐時得翟升各廕錦衣衛正千户命湖廣守備太監魏相監視登島兵餉七年春二月監視登島太監魏相以給事中莊鰲獻上太平十二䇿内撤監視因求罷不允貶鰲獻於外總理太監張彛憲請入覲官投册以隆體統許之山西提學僉事袁繼咸上言士有亷恥然後有風俗有氣節然後有事功如總理内臣有覲官賫册之令皇上從之特在剔釐奸弊非欲羣臣詘膝也乃上命一出靡然從風藩臬守令叅謁屏息得免阿責為幸嗟乎一人輯瑞萬國朝宗諸臣未覲天子之光先拜内臣之座士大夫尚得有亷恥乎逆璫方張時義子乾兒昏夜拜伏自以為羞今且白晝公庭恬不知怪國家自有覲典二百餘年未聞有此所為太息也上以越職言事責之既張彛憲亦奏辨謂覲官㕘謁乃尊朝廷繼咸復上言尊朝廷莫大於典例知府見藩臬行屬禮典例也見内臣行屬禮亦典例乎諸司至京投册吏部各官典例也先謁内臣亦典例乎事本典例雖坐受猶為以安事創彛憲即長揖秖増其辱髙皇帝立法内臣不得與外事若必以内臣繩外臣㑹典所不載上仍切責之夏五月陜西按察司副使賀自鏡奏監紀太監孫茂霖玩㓂宣府太監王坤奏監軍紀功罪耳追逐有將吏在果如自鏡言則地方官罪不在茂霖下矣上不問六月叙禁旅功廕太監曹化淳世襲錦衣衛千户袁禮楊進朝盧志徳各百户賜衣幣以擊盗屢㨗也罷各道監視太監諭曰朕御極之初撤還内鎮舉天下事悉以委之大小臣工比者多營私㒺恤民艱亷謹者又迂疎無通論己巳之冬京都被兵宗社震恐此士大夫負國家也朕不得已用成祖監視之例分遣各鎮監視添設兩部總理雖一時權宜亦欲諸臣自引罪今經制麤立兵餉稍清諸臣應亦知省其將總理監視等官盡行撤回以信朕之初心張彛憲俟漕竣即回監供職惟闗寧密邇外境髙起潛兼監兩鎮暨内臣提督如故秋七月發幣金蟒叚給監軍太監髙起潛賞功九月司禮監太監張從仁改内官監提督九門冬十月命兵部同内中軍張元亨崔良用往西寧監眎及茶馬御史易壯馬總理户工二部司禮太監張彛憲改司禮監提督十一月侍讀倪元璐上言邊臣之情歸命軍容無事禀成為恭㓂至推委百出陽以號于人曰吾不自由也陛下何不信賞必罰以持其後而必使近習之人試之鋒鏑又使藉口迄用無成哉始陛下曰行之有績即撤今行之無績益宜撤不聴十二月以乾清宫太監馬雲程提督京營戎政撤南京守備太監胡承詔張應朝以司禮太監梁洪泰内官太監張應乾恊同守備八年夏四月承運庫太監周禮言崇禎六年七年省金金花銀共逋八十九萬命趣之冬十一月太監髙起潛弟廕錦衣衛中所正千户世襲九年夏六月命司禮太監曹化淳同法司錄囚秋七月我大清兵至居庸遣内中軍李國輔守紫荆闗許進忠守倒馬闗張元亨守龍門闗崔良用守固闗勇衛營太監孫維武劉元斌以六千五百人防馬水沿河兵部尚書張鳯翼督援兵出師以監視闗寧太監髙起潛為總監南援霸州遼東前鋒總兵祖大夀為提督同山海總兵張時傑屬起潛給起潛金三萬賞功牌千購賞格以前司禮太監張雲漢韓贊周為副提督巡城閲軍司禮太監魏國徴守天夀山尋以國徴總督宣府昌平京營御馬太監鄧良輔為分守太監鄧希詔監視中酉二恊太監杜勲分守以張元佐為兵部右侍郎鎮守昌平時内臣提督天夀山者皆即日往上語閣臣曰内臣即日就道而侍郎三日未出何怪朕之用内臣耶以司禮太監盧維寧總督天津通州臨清徳州内中軍太監孫茂霖分守八月命科道各官分地督運從太監張彛憲之言也召廷臣于平臺及河南道御史金光宸初光宸㕘督師張鳯翼及鎮守通州兵部右侍郎仇維楨首叙内臣功為借援又請罷内臣督兵上勿善也是日上怒甚曰仇維楨方至通州爾即借題沽名欲重治之適大雷雨議謫九月我大清兵從建昌冷口還守將崔秉徳請率兵遏歸路總監髙起潛不敢進揚言當半渡擊之偵騎報師已盡行四日起潛始進石門山報斬三級司禮監太監孫象賢調南京同張彛憲守備冬十月工部侍郎劉宗周上言人才之不兢非無才之患而無君子之患今天下即乏才亦何至盡出二三中官下毎當緩急之際必依以大任三恊有遺通津臨徳有遣又重其體統等于總督中官總督將置總督于何地是以封疆嘗試也且小人與中官毎相引重而君子獨岸然自異故自古有用小人之君子終無黨比中官之君子皇上誠欲進君子退小人而復用中官以㕘制之此明示以左右袒也不報賜太監曹化淳等綵幣時各進馬也叙京師城守功太監張國元曹化淳廕指揮僉事各世襲賜金幣初化淳為京營提督収用降丁及守昌平俱散去至有叩京師城下者皆稱京營兵莫能辨十一月叙禁旅功太監劉元斌廕錦衣衛百户命御馬太監陳貴總監大同山西牛文炳分守御馬太監王夢弼分守宣府昌平鄭良輔恊理召兵部左侍郎王業浩司禮太監曹化淳于平臺十二月曹化雨加後軍都督府左都督世襲錦衣衛指揮僉事十年春正月常熟張從儒訐錢謙益温體仁修郄下之獄謙益嘗為王安作祠記太監曹化淳者故王安門下也謙益得免體仁尋致仕還詳東林黨議以御馬太監李名臣提督京營巡捕王之俊副之司禮太監曹化淳提督東厰分守津通臨徳總理太監楊顯名叅前巡鹽御史張養髙欽舜各侵税額詔逮之時養先卒下撫按錄其家夏四月命南京守備太監孫象賢張雲漢同兵部尚書范景文清覈兵馬械杖總監太監髙起潛行部永平道劉景耀闗内道楊于國俱恥行屬禮上疏求免上謂總監原以總督體統行事罷于國降景耀二級以後監司皆莫敢爭時監止之設止多一扣餉之人監視欲滿則督撫鎮道皆有所恃以飭功掩過故邊吏皆樂有監視而上方倚任中官不察也秋七月工部員外郎方壐謫外壐上言皇上親擒魏忠賢而手刅之豈溺情閹豎者不過以外廷諸臣無一可用而借才及之况人臣感激聖功苟知報答何論内外每見廷臣處地懸絶不若宮庭􅉏御効忠倍易凡此内臣徼兹曠典孰不欲棄捐頂踵以酬我皇上者不必鰓鰓過計也刑科給事中何楷駁其通内呈身吏部請削其籍上手改降三級謫外冬十一月以司禮太監曹化淳杜勲等提督京營孫茂霖分守薊鎮中西三恊鄭良輔總理京城巡捕十一年春正月任丘清苑淶水遷安大城定興通州各有司不法上内訪逮入責撫按不先劾為溺職近畿如此逺地可知命部院申飭二月丙申城盧溝名拱極城太監督役掠塗人受工民力為􅉵冬十月以御馬太監邊永清分守薊鎮西恊十二年春正月叙緝奸功東厰太監王之心曹化淳廕錦衣衛百戶二月以司禮太監崔琳清理兩浙鹽課賦税秋七月以司禮太監張榮提督九門王裕民總督京營戒午門端門諸内臣延接朝士九月以内官監太監杜秩亨提督九門十二年春三月詔撤各鎮内監還京夏六月大學士薛國觀免先是上召國觀語及朝士貪婪對曰使厰衛得人朝士何敢如是東厰太監王化民在側汗浹沾背於是専偵其隂事而國觀亦褊忮坐通賄敗詳東林黨議十四年夏四月召大學士周延儒入朝秋八月辛酉上幸太學以重修告成也正一真人張應京請扈從臨雍先期司禮監太監王徳化奉命率羣臣習儀于太學時比之唐魚朝恩講經元李邦寧釋奠事九月改東厰提督京營者亦稱總督冬十一月禁朝士私探内閣通内侍于是待漏俱露立毋敢入直舍十二月諭停内操勅内臣神宫等監及各司局庫等毋于外政并申戒廷臣毋交通近侍十五年春正月罷提督京營内臣御史楊伯願上言臣讀勑諭申結交内侍之律因稽髙皇帝初無所謂緝事之令臣工不法止于明糾無隂訐也臣待罪南城所見詞訟多假番役妄稱東厰甚者諉人作奸挾仇首告矣夫餌人以䧟禍擇人而肆喙惟恐其不為惡又惟恐其不即罹於法揆之皇上泣罪解網之仁豈不傷哉伏願先寛東厰條例東厰寛而刑罰可以漸省抑臣復有請焉如臣子獲罪但勅撫按檻車送詣闕下未為不可若緹騎一遣有資者家門破散無資者地方歛餽為害匪淺上是之諭東厰所緝止于謀逆亂倫其作奸犯科自有司存戒錦衣校尉奉使需擾秋七月以司禮太監齊本正提督東厰王承恩提督勇衛營冬十月誅司禮太監劉元斌初元斌監軍河南羣盜在陜洛元斌留歸徳不敢進縱諸軍大掠殺樵汲者論功及論辟未得旨即奏辨上怒并誅太監王裕民十六年夏五月以内官監太監王之俊提督京城巡捕練兵秋七月戒廷臣私謁内臣果有事朝房商之八月以司禮太監王承恩督察京營戎政韓贊周守備南京冬十二月前大學士周延儒有罪賜死延儒當中外交訌竟無能為上畫一策其罷内監撤厰衛内臣日夜文致之故延儒始終皆以璫敗初延儒受主眷深諸璫稍稍乘間媒孽上俱不信延儒益忽之不為慮迨視師行邊上意稍移而諸璫乃盡發其䝉蔽狀上信之吳昌時事發聖怒遂不可囘矣十七年春二月李自成自山西趨真定保定命太監高起潛等分據要害三月李自成陷宣府太監杜勲迎䧏入居庸闗太監杜之秩迎降以司禮太監王承恩提督内外京城召前太監曹化淳等分守諸門丙午賊騎薄彰義門太監杜勲縋城上入見大内張皇賊勢語守璫輩曰吾黨富貴自在也是夕太監曹化淳開門降上死社稷内臣從死者惟王承恩一人谷應泰曰嘗聞宦者四星在皇位之側而腐身薰子動相衒達金貂左璫口含天憲者所由來漸矣然秦以趙高敗漢唐以宦侍亡太祖鑒之凡内䜿不令讀書取備掖庭給灑掃而已及乎中葉寵用刑餘英憲武熹亂者四世比至懷宗冲齡踐祚睿謀天縱手剪凶璫雖李閏有伺安之功曹騰參建桓之策而卒之張逵坐收甘露無變不動色而去大奸斯已竒矣然其初年江南織造即便撤還塞北監軍悉皆免罷仍諭内臣受命始出禁門廷臣在官勿交近侍於時嚬笑不假狐鼠無竊宫中府中肅清極矣詎意渭水陳兵甘泉舉火而問錢榖則大僚不對咨廟筭則肉食寡謀秦既無人王真孤立乃始參任貂璫往來給使勞軍轉餉偵刺行間葢亦有所不得已也自是之後曹化淳等以錦衣䝉廕而張彛憲緫理戸工唐文征親督京營高起潛監視錦寧張其鑑盤騐收放内外各司必兼貂貴緣邊諸鎮復設中涓語云西頭勢重南衙樞機權過宰相良不誣矣其後高𢎞圖熊開元次第投劾倪元璐袁繼咸先後上章侯覽用事而朱穆發疽朝恩即席而魯公争坐國體既傷宜士大夫之所鄙也然而英主在御太阿未落非有王振土木之罪汪直西厰之酷劉瑾不軌之謀魏忠賢闇奸之狀而潛窺意㫖馴致敗亡者無他陽授以國柄者猶摘龍之珠而陰寄以耳目者直竊叢之神也總之懷宗怒在門戸故必用甫節以伺膺滂而懷宗疑在䝉蔽又必用𢎞石以發楊賈卒之中常子弟悉合黄巾凉州議郎責輸貨賄而天下事不可為矣以予論之崇禎初造人望太平假令推誠置腹則煬竈可除任賢去邪則小羣可渙與其詗之於閹人孰若信之於正士囘天獨坐固無事此曹也獨奈何輔國就誅元振更用左悺既殺張譲復然眉睫之喻乃為識者所悼惜哉明史紀事本末卷七十四
