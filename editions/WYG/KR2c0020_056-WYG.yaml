body:
  text: 明史紀事本末卷五十六浙江提學僉事谷應泰編李福逹之獄世宗嘉靖五年秋七月妖人李福逹坐死福逹山西代州崞縣人一名午初以妖賊王良謀反事發戍山丹衛逃還改名五竄居陜西洛川縣與季父越同倡白社妖術為彌勒佛教誘愚民嘯聚數千人大掠鄜州洛川諸處殺掠亡算己而官兵追勦捕得越及其黨何蠻漢等誅之福逹跳去占籍徐溝縣變姓名為張寅賄縣中大姓以為同宗編立宗譜塗人耳目已又挾重貲入京竄入匠籍輸粟為山西太原衛指揮其子大仁大義大禮俱補匠役以燒煉術徃來武定侯郭鄖後仍徃同戈鎮其仇薛良首發之福逹懼逸入京官司捕其二子按繋之福逹窘乃自詣獄置對先後鞫訊者代州知州杜蕙胡偉證之者李景全等具獄上布政司李璋按察司徐文華等復上廵按御史張英皆如訊獨廵撫畢昭謂福逹果張寅為仇家誣所致反其獄以居民戚廣等為證坐良罪獄未竟昭乞侍養去會御史馬録按山西復窮治之傳爰書如前訊勛為遺書囑免録不從擬福逹謀反妻子縁坐飛章劾勛黨逆賊并上其手書帝下之都察院席書亦助勛為福逹地大理寺評事杜鸞上言劾勛及書乞將二人先正國法徐命多官集議福逹之罪不報都察院覆奏李福逹罪狀宜行山西撫按官移獄三司會鞫先是御史馬録咨于徐溝鄉紳給事中常泰泰言寅為福逹不疑又咨于讞獄郎中劉仕仕鄜人也其言如泰録復檄取鄜洛父老識福逹者辨之俱以為真福逹也乃檄布政使李璋按察使李珏僉事章綸都指揮使馬豸雜鞫之福逹對簿無異辭遂附爰書上録録乃會廵撫都御史江潮上言福逹聚衆數千殺人巨萬雖潛踪匿形而罪跡漸露變易姓氏而惡貌仍前論以極刑尚有餘辜武定侯勛納結匪人請囑無忌雖妖賊反狀未必明知而術客私干不為避拒亦宜抵法薄示懲艾章復下都察院冬十一月左都御史聶賢等覆奏李福逹逆跡昭灼律應磔死帝從之錮獄待决因詰責郭勛令自輸罪勛懼乞恩因為福逹代辨帝置不問勛又令福逹子大仁具奏求雪父寃章下聶賢與原訊御史髙世魁知為勛指奏寢其議勛謂大仁曰茍弗解爾曹姑亡命勿蹈叢戮也于是給事中劉𤦺程輅王科沈漢秦祐鄭自璧御史髙世魁鄭一鵬南京御史姚鳴鳯潘壯戚雄各劾勛交通逆賊明受賄賂福逹旣應伏誅勛無可赦之理給事中常泰亦上言勛以輸罪為名實代福逹求理論以知情何辭勛為福逹居間畫令大仁等事急亡命論以故縱何辭給事中張逵等亦上言凡謀反大逆宜服上刑知情故縱亦從重典今勛移書謝托黨䕶叛逆不宜輕貸聶賢亦奏勛當連坐帝不從勛亦累自訴員以議禮觸衆怒為言帝信之尋命錦衣千户載偉移取福逹獄詞及囚佐下鎮撫司羈候㑹鞫給事中常泰秦祐御史任孚邵豳郎中劉仕復交章劾勛江潮馬録仍會疏極言福逹不枉乞問如律勛乃與張總桂蕚等合謀為蜚語謂廷臣内外交結借事䧟勛漸及議禮諸臣逞志自快帝深信其説而外廷不知也帝命速取福逹至京鞫問刑部尚書顔頥壽侍即王啟劉玉左都御史聶賢副都御史張閏劉文莊大理寺卿湯沐少卿徐文華顧佖寺丞毛伯温汪淵及錦衣衛鎮撫司各官會鞫福逹于京畿道對簿無異辭奏請論磔帝不從命會九卿大臣鞫于闕廷時告者薛良衆證李景全等共指福逹福逹語塞畢昭引證薛良之誣者戚廣也訊之復云我曩未就吏訊安得此言頥壽等以其詞上上心益疑命俟齋祀畢朕親臨鞫問大學士楊一清上言庶獄無足煩聖慮者乞仍屬諸勘官㑹訊刑部主事唐樞言福逹罪狀甚明擬死不枉上怒黜為民頥壽等懼乃雜引前後讞詞指為疑獄帝切責頥壽等六年夏四月遣錦衣官劉泰等逮馬録赴京下鎮撫司獄待鞫仍取原勘各官李璋李珏章綸馬豸詣京卽訊顔頥壽上言福逹反狀甚明法難輕縱况彼以神姦妖術蠱惑人心臣等若不能執一或縱舍異時復有洛川之禍臣雖伏斧質何抵欺罔之罪帝怒謂頥壽職司邦刑朋姦肆誣令戴罪辦事顔頥壽等復請會訊從之乃出録與福逹對鞫情無反異頥壽等復以上請帝謂頥壽等朋比罔上乃逮繋頥壽及侍即劉玉王啟左都御史聶賢副都御史劉文莊大理寺卿湯沐少卿徐文華顧佖于詔獄其原鞫郎中御史寺正等官俱逮繋待罪八月帝命桂蕚攝刑部事張璁攝都察院方獻夫攝大理寺雜治之太僕卿汪𤣥錫與光禄少卿余才忽偶語曰福逹獄已得情何更多事乃爾詗者以白璁等奏聞帝命逮繋𤣥錫才于詔獄并掠之大學士賈詠與馬録俱河南人録被逮詠遺書慰之鎮撫司以聞復搜得都御史張仲賢工部侍即閔稭大理寺丞汪淵御史張英私書上責狀詠引罪得致仕去而逮仲賢等九月張璁桂蕚方獻夫逢合帝意復鞫録等于闕廷榜掠備至録不勝五毒乃誣服挾私故入人罪璁等以聞遂釋福逹帝怒録欲坐以死璁營解之得免乃論戍編伍南丹衛子孫世及焉帝以羣臣皆抗疏劾勛朋姦陷正命逮繋給事中劉𤦺常泰張逵程輅王科沈漢秦祐鄭鵬等御史姚鳯鳴潘壯髙世魁戚雄等刑部即中劉仕大理評事杜鸞等詔獄死箠楚狴犴者十餘人餘戍邊削籍流毒至四十餘人謫大理少卿徐文華顧佖戍邊初顔頥壽等旣逮治備嘗五毒聞者慘之己而皆奪官罷歸獨文華佖論戍邊二人皆與璁等廷爭大禮者江潮李璋李珏章綸馬豸等俱奪官韓良相及其佐證俱論遣璁等自謂平反有功請編欽明大獄録頒示内外諸臣以明頥壽等之欺罔從之四十五年四川妖冦蔡伯貫反己而就擒鞫得以山西李同為師四川撫按官移文山西捕同下獄自吐為李午孫大禮之子世習白社妖教假稱唐裔當出馭世惑民倡亂與大獄録姓名無異撫按官論同坐斬奉㫖誅之都御史龎尚鵬上言據李同之獄福逹之罪益彰而當時流毒縉紳至四十餘人衣冠之禍可謂烈矣郭勛世受恩國乃黨逆冦陷縉紳而樞要之人悉頥指氣使一至于是萬一隂蓄異謀人人聼命為禍可忍言哉乞將勛等官爵追奪以垂鑑戒馬録等特加優異以伸忠良之氣穆宗從之見當時死事謫戍者皆得叙録是獄始明谷應泰曰永嘉安仁是舉也果為平亭寃獄乎哉亦黨武定讐諸臺諫爾當其議大禮時禮官嘗要勛同疏攻永嘉勛後竊語永嘉曰吾嘗謂汪俊此事闗係甚大宜折中不可偏執俊與吾力辨至大詬而止竟署吾名疏中非吾意也永嘉信之收其語于大典中且曰勛竟以是搆怒于衆云及後再議考獻皇帝徐文華等與璁力辨勛遽曰祖訓如是古禮如是璁等言當更何議于是璁等與勛同上議當考獻皇伯孝宗而勛益見悦于永嘉矣游言一唱鼓簧宸聰則帝亦以勛為心膂臣矣及福逹獄起而臺諫諸臣乃力攻勛必欲置之連坐此其所以反覆追讞必翻釋而後已也永嘉等主之必永嘉等成之非為福逹為武定耳武定獲伸則諸臣之竄削有弗恤矣甚哉永嘉之舉也然則臺諫豈盡無過乎夫武定之主福逹罪固有在而必欲連坐則甚矣當福逹判亂時武定豈與其謀耶及福達以方術見勛亦以方術遇之耳而豈知前日之為叛賊也迨其事露特不宜與之請囑耳而嗾使陳白則未知其果有與否也故待福逹獄定之後治其請囑之罪亦足矣而何故必欲其連坐哉况知情藏匿故縱之律本與勛事不相似而必引此繩之欲置重典此其所以激成翻釋之紛紛也福逹之獄前已奉命監決矣使當時諸臣稍存寛緩待福逹伏誅之後羣攻武定則勛亦百口莫解雖欲再鞫福逹以自為地何可得耶惜乎諸臣慮不及此而使法司大臣藩臬諸司俱罹其禍也悲哉明史紀事本末卷五十六
