body:
  text: 明史紀事本末卷二十四浙江提學僉事谷應泰編河漕轉運成祖永樂元年三月瀋陽中屯衛軍士唐順言衛河之原出衛輝府輝縣西北八里太行蘇門山下其流自縣城北經衛輝城下入大名濬縣界迤􅆔扺直沽入海南距黄河陸路五十餘里若開衛河距黄河百步置倉厫受南京所運粮餉轉致衛河交運則公私交便也上命廷臣議俟民力稍甦行之四年秋七月命平江伯陳瑄兼督江淮河衛轉運洪武中航海侯張赫舳艫侯朱壽俱以海運功封嵗運糧七十萬石止給遼左一方永樂初北京軍儲不足以瑄充總兵帥舟師海運嵗米百萬石建百萬倉于直沽尹兒灣城天津衛籍兵萬人戍守至是令江南糧一由海運一由淮入黄河至陽武陸運至衛輝仍由衛河入白河至通州是為海陸兼運八年以舊額漕運二百五十萬石不足給國用特令江浙湖廣三省各布都官自行督運共三百萬石有竒九年春二月己未命工部尚書宋禮都督周長開㑹通河自濟寧至臨清舊通舟楫洪武中河岸衝决河道淤塞故于陸路置八逓運所毎所用民丁三千車二百輛嵗久民困其役永樂初屢有言開河便者上重民力未許至是濟寧同知潘叔正言㑹通河道四百五十餘里其淤塞者三之一浚而通之非惟山東之民免轉輸之勞實國家無窮之利也乃命禮等往視禮等極言疏浚之便且言天氣和霽冝及時用工于是遣侍郎金純發山東直𨽻徐州民丁及應天鎮江等府民丁併力開浚民丁皆給糧犒賞蠲他役及今年田租命宋禮總督之河南河水屢嵗為患先是遣工部侍郎張信往視信訪得祥符縣魚王口至中灤下二十餘里有舊黄河岸與今河面平浚而通之俾循故道則水勢可殺遂繪圖以進詔發河南民十萬命興安伯徐亨王部侍郎蔣廷瓉金純相度開浚併命禮兼督之六月㑹通河成以汶泗為源汶水出寧陽縣泗水出兖州至濟寧而合置天井閘以分其流南流通于淮而新開河則居其西北流由新開河道東昌入臨清計三百八十五里自濟寧至臨清置十五閘以時啟閉又于寧陽築堽城壩遏汶水盡入漕河禮還京上言㑹通河源于汶泗夏秋霖􅕙泛溢則馬常汩之流亦入焉汶泗合流至濟寧分為二河一入徐州一入臨清河流深淺舟楫通塞繫乎泊水之消長泊水夏秋有餘冬春不足非經理河源及引别水以益之必有淺澀之患今汶河上流上自寧陽縣已築壩堰使其水盡入新河東平州之東境有沙河一道本汶河支流至十里口通馬常泊比年流沙淤塞河口宜及時開濬况沙河至十里口故道具存不必施工河口當濬者僅三里河身宜築堰者計百八十丈從之十年春正月巡按山東御史許堪言去年衛河水溢河岸倒塌命工部尚書宋禮相度措置夏四月尚書宋禮奏自衛河東北至舊黄河一十二里内五里舊河有溝渠五里係古路二里係平地今開河泄水以入舊黄河則至海豐大沽河入海上命俟秋成為之九月工部主事藺芳言中灤分𨗳河流使由故道北入于海河南之民免于昏墊誠萬世之利然緣河新築䕶岸掃座用蒲繩泥草不能經久臣愚以為若用木編成大囤若欄圏然置之水中以樁木釘之中實以石却以横木貫于樁表牢築堤土則水可以殺堤可以固而河患息從之尚書宋禮薦其才擢為工部右侍郎十一月浚鎮江京口新港甘露三港達于江十三年三月罷海運糧命平江伯陳瑄于湖廣江西造平底淺船三千艘以從河運嵗運三百餘萬石初漕運北京舟至淮安過壩渡淮以達清河輸輓甚艱故老為瑄言淮安城西有管家湖自河至淮河鴨陳口僅二十里與清河口相值宜鑿河引湖水入淮以通漕舟瑄從之乃鑿清江浦引水由管家湖入鴨陳口達淮就管家湖築隄旦十里以便引舟置四閘曰移風清江福興新莊以時啟閉浚儀真𤓰州通潮鑿吕梁百步二洪石平水勢開泰州白塔河通大江築髙郵湖堤堤内鑿渠亘四十里淮濵作常盈倉五十區貯江南輸税徐州濟寧臨清徳州皆建倉使轉輸議以原坐太倉嵗糧蘇州并山東兖州送濟寧倉河南山東送臨清倉各交收浙江并直𨽻衛分官軍于淮安運至徐州京衛官軍于徐州運至徳州山東河南官軍于徳州接運至通州名為支運年凡四次河淺膠舟處濵河置舍五百六十八所舍置淺夫俾𨗳舟其可行處緣河隄鑿井樹木以便行人乃増置淺船三千餘艘海運遂罷凡漕渠在齊魯間者宋禮功為多在江淮間者陳瑄功為多十四年設淮安之清河福興徐州之沽頭金溝山東之谷亭魯橋等閘各置官于是漕運始達通州宣宗宣徳五年三月陳瑄復言支運法軍民均勞甚善但民病舍穡往還不若益耗兑軍便帝是其議改為兑運法行之既久耗亦納官失初意矣七年置吕梁漕渠石閘初陳瑄以吕梁上洪地險水急漕舟難行奏令民于舊洪西岸鑿渠深二尺濶五丈有竒夏秋有水可以行舟至是復欲深鑿置石閘三時其啟閉以節水庻幾往來無虞事聞命附近軍衛及山東布政司量發民夫工匠協成之憲宗成化四年初正統間漕米入庾始有鋭至是帝詰鋭米戸部執曝揚之數取米石一其鋭曝之得九斗有六升乃以升為耗巡撫江南邢宥修復運河壩閘先是正綂初巡撫周忱經理運道武進奔牛吕城設為壩閘俾漕舟由京口出江最稱便利迨景泰間壩閘漸頽水道淤淺有議從蔡涇孟瀆出江者因迫海洋漕舟多覆溺天順間巡撫崔恭奏請從周忱故道增置五閘至是成之七年罷𤓰淮兊運并改四倉之支運者俱令兊各附近水次其𤓰淮者于原耗外益以脚米四倉故無耗者准量給耗米又復在軍云尋復定兊運改兊之額河淮以南以四百萬供京師河淮以北八百萬供邊境别貯額外米于臨德曰預備米以備漕米之撥補也先是宣德間定耗例二米一他物葢倣洪武時附載土物之意用以資君便民至成化為改兑法則悉從本色聽軍易用然多滯不便世宗嘉靖七年通惠河成糧運從河入省輕齎銀一十一萬詔給軍三之一并令三嵗後量減加耗以寛民初𢎞治中議定折耗銀曰輕賫凡輕齎之銀官給之大扺米以備逺涉及顯加之耗銀以備傭僦鋪墊之用要之正米無缺而止正外諸羡盡歸旗卒官無利焉一時軍卒饒逸漕運于斯為盛亡何漕撫李蕙請齎餘貯庫聽來年缺者貸償之上可其奏著為令嘉靖初河漕總兵楊宏奏輕賫隨軍人緩急有濟若貯漕庫非法也大學士費宏言衛軍終嵗勤勞給京軍幸有羡宜與之詔皆給軍軍驩然久之戸部言輕齎之費倉為甚譬雀䑕之嚙蟣蝨之吮雖禁不可止也上曰禁革下曰扣除不如其已請令運官備列倉費前規聽官給領之而給軍遂革至是通惠河成遂有是命八年疏治清江浦復舊乃由江入淮之道神宗萬厯七年復築髙堰隆慶中髙堰廢淮水壞民田至是議復築之起新莊至越城長一萬八百七十餘丈堰成淮水復由清口㑹黄河入海而黄浦不復衝决又以通濟閘逼近淮河舊址坍損改建于甘羅城北仍改濬河口斜向西南使黄水不得直射因發折新莊閘又改福興閘于壽州厰適中處所其清江板閘照舊増修又議修復五壩惟信字壩久廢不用智禮二壩加築仍舊車盤船隻仁義二壩與清江閘相鄰恐有衝浸移築天妃閘内復命官修揚州髙寳運河減水閘四座加髙閘石九座自是寳應諸河堤岸相接九年于淮安府城南運河之旁自窯灣楊家澗歴武家墩開新河一道長四十五里曰永濟河因置三閘以避清江浦之險十一年建清江浦外河石堤長二里磯嘴七座又建西橋石堤長九十八丈以禦淮河之衝又議淮由昭靈祠南黄河出口歴羊山内華山梁山接境山開河置閘以避戚港之溜十二年揚州髙寳運道石堤之東傍堤開新河三十餘里以避槐角樓一帶之險曰𢎞濟河谷應泰曰堯都冀方九州通貢水陸分道舟車遞興然皆方物筐篚非秸秷粟米負重致逺也秦人輸粟入邊十鍾而致一石葢難之矣漢興海陵之粟號甲天下而分封列侯天子仰食不過中原三輔唐郡縣天下闗中運道龍門險峻再桴罕入嵗值霖潦車牛不給天子至率百官就食東京奉天告圍蔓菁採食韓滉粟至脱巾撤呼宋都汴京運道四達路置兑倉號為轉運此劉晏遺規非豐熙創法也元建都北平張萬戸以鹽盗出沒習知海上險易獻書海運成山直沽無異安瀾明初海運猶致百萬文皇遷鼎屢勤宵旰海漕並進水陸互輸漕制漸増海運遂罷安危之勢易明内外之形易判也夫蜀道千年蠶叢不啟臨海只尺台宕猶遺自燕迄呉徑四千里踰江涉淮天限之已然而平江築堤考自張呉丹徒王氣鑿由孫氏黄池夫差之故跡䢴溝隋帝之遺規假勾呉之霸烈為聖主之驅除藉荒王之游幸啟千年之利涉至于渡淮而北昭陽獨山滕薛瀕湖洸沂汶泗魯郊多水齊擅清濟燕誇濁漳直沽至海潞水踰燕古今人力輸灌裁通逺近地形蓄瀦本盛葢東南舟楫利盡人功西北髙平險因天設莫不枝延蔓引自成萬里之形璧合珠連已見百川之赴因而按圖求轍度地施工所以因山壘石計日成城依井求泉終朝獲汲者也稽其道里之畧京口設閘而浙舟入江謂之浙漕髙郵築堤而江舟入淮謂之江漕入淮以後謂之出黄初鑿吕梁洪舟河行者五百十餘里繼開董家口避河險者二百七十餘里河行至此謂之入口南陽夏村皆引諸湖既達濟寧而湖漕入濟謂之湖漕而進此皆㑹通河矣由天井閘至臨清三百八十餘里而濟漕入衛謂之出口而㑹通河盡矣衛水順流直抵天津謂之衛河衛漕入潞潞水之流謂之白河白漕既入徑抵通州矣若夫江淮以南陳瑄功著齊魯以北宋禮功多潘季馴之鑿開董口朱衡之廬居夏村而天井一閘南北之脊地如建瓴從老人白瑛之請出七十二泉之水南流達徐北流達衛觀其神功此亦秦皇驅石鞭跡猶存大禹鑿山掌形宛在漕河之底績古今之明徳也與明史紀事本末卷二十四
