body:
  text: 明史紀事本末巻三十六浙江提學僉事谷應泰編曹石之變英宗正統六年春正月以定西侯蔣貴為征蠻將軍太監曹吉祥監軍兵部尚書王驥提督軍務郎中侯璡主事楊寧隨軍贊畫討思任發吉祥欒州人出王振門下至是監軍號都督多選降丁騎射以從此内臣總兵之始也十二年春二月以都督僉事石亨為左恭將守萬全亨渭南人伯父巖寛河衛指揮僉事無子亨嗣亨善騎射有膽畧方面豐軀美髯及膝提大刀輪舞如飛每從征挺刀先登輙立竒功累官都指揮使姪彪亦驍勇能挽强弓善揮斧以官舍從亨有功授大同衛鎮撫是年亨為都督僉事彪亦為指揮使從亨恭謀十四年春正月命太監曹吉祥監寧陽侯陳懋軍進討鄧茂七餘黨悉平之事見平浙閩冦七月上北狩八月太后命郕王權總國事逮宣府總兵楊洪萬全左恭將石亨繫錦衣獄九月郕王即皇帝位出楊洪石亨于獄命亨總京營兵十月額森犯京師于謙石亨分營城北額森縱騎剽掠焚三陵殿寢祭器逼宣武門南踰盧溝橋散刼下邑謙督軍出德勝門背城而戰時孫鏜范廣皆小㨗而亨功為第一額森宵遁亨復追擊至定州清風店敵懼且出倒馬闗亨使紿曰石將軍行未至來者皆假將軍名耳敵以為然皆反戰亨彪合擊之大敗始知石將軍在也皆倉皇盡棄其羊馬輜重自紫荆闗遁出當是時亨彪名震幕北矣既論功封亨武清伯尋進侯彪都督僉事為大同左恭將景泰元年閏正月命鎮朔大將軍石亨都督范廣率兵出大同宣府尋召還八月石亨楊洪率師分道出紫荆居庸闗始立團營以曹吉祥劉永誠節制諸軍此内臣總京營之始也三年春正月托克托布哈與額森仇殺石亨請率兵出宣府大同討冦復仇不許天順元年春正月景帝不豫㑹當郊使石亨攝召命于榻前亨見帝委頓狀出與張軏張輗謀謂帝疾必不起不若迎復上皇隂約徐有貞結太監曹吉祥蔣冕内白皇太后外為飛語言于謙且與王文謀立襄世子為東宫遂率其羣從子弟家兵與吉祥等夜叩南城迎上皇復辟乃譖于謙於上殺之論奪門功又第一進封忠國公召彪大同以為都督同知充遊擊將軍其家人石寧等數十人皆授指揮千百户時吉祥已晉司禮監矣姪欽封昭武伯鐸鉉􅀈皆都督此内臣子弟封爵之始也三月以户部侍郎陳汝言為兵部尚書汝言附石亨曹吉祥謀奪門故亨薦用之及理部事益阿比表裏為奸亨冐功陞賞不下四千餘人天下都司及邊吏争趨之夏四月石亨張輗請盡罷各邊省巡撫及提督軍務等官從之逮巡撫大同都御史年富下獄上問李賢曰年富何如賢曰行事公亷在彼能革宿弊上曰此必石彪憚富不得遂其私耳賢曰陛下明見真得其情由是富得致仕歸田里削都御史王竑籍安置江夏石亨忌竑嗾言官論其犯闕也五月石亨擅令守闗軍放歸徐有貞李賢言于上命别遣兵戍之御史楊瑄劾太監曹吉祥忠國公石亨奪民田且言其怙寵擅權之罪上顧徐有貞李賢曰御史敢言如此國家之福也曹吉祥在旁慚懼已盛怒欲罪之上不許及亨出兵歸聞之怒訴御史言不實意賢有貞主使乃激吉祥曰今在内惟爾在外惟我賢等欲排陷其意可知矣初吉祥見亨冒濫恩賞頗不平恒訐其短至是聞亨言勢復合六月彗孛見御史張鵬周斌交章劾石亨諸不法事疏未上給事中王鉉知之潛告亨亨與曹吉祥馳訴上謂鵬乃已僇兇豎張永猶子今結御史為永報仇上震怒御文華殿悉收諸御史面詰之斌執彈章且誦且對言亨事且有驗上曰事即實汝曹何不早言之下錦衣獄問訊瀕死逮大學士徐有貞學士李賢都御史耿九疇下錦衣獄初有貞得首輔欲立功名自異稍與石亨左李賢入閣力助之知無不言曹吉祥不能堪㑹御史張鵬等既詔獄給事中王鉉錦衣指揮門逹乃上疏言九疇阿附有貞賢嗾御史排陷石亨吉祥復乘間頓首言臣等萬死一生迎復皇上内閣必欲殺臣伏地哭不起上從之乃逮有貞等置于理㑹京城大風雹㧞木壞屋走正陽門下馬牌于郊吉祥門老樹皆折亨家水深數尺餘翼日乃降有貞賢叅政九疇右布政張鵬楊瑄等從末減戍邊衛既而上曰近日行事惟有貞一人李賢不可去命召還以贊善岳正直文淵閣正以吏部尚書王翺薦召見文華殿特用之正出赴閣至左順門石亨張軏自外入愕然曰何以至此正不敢對時亨軏已不平比入見上曰今内閣朕自求得一人問為誰上曰岳正亨軏陽賀上曰官卑奈何亨軏因奏曰陛下陞正亦甚易但姑試之果稱職未晩也上黙然秋七月有投匿名書指斥時政者石亨曹吉祥請上出榜募能捕告者賞以三品軄令内閣撰榜格岳正言于上曰為政自有體盗賊責兵部奸宄責法司豈有天子自出榜募購之理時吉祥在傍請甚力上徐曰正言是也已而亨等譖徐有貞怨望謫戍金齒謫内閣贊善岳正為廣東欽州同知初正入值文淵閣上嘗召問曰卿何以輔朕正曰今内臣武臣權過重上頷之正退語曹欽石彪令謝兵歸第欽彪走告吉祥詣上垂泣免冠請死具道所由上曰無之乃召正責其漏言正曰固也臣觀二家必有背叛之滅即今無可按之誅臣欲全君臣共難情故令早自為計上不悦㑹承天門災上命正草詔罪已厯陳奸邪䝉蔽狀亨見之怒遂指為謗訕營内批有是謫兵部尚書陳汝言者故恨正復中以私事戍肅州衛陳汝言阿曹吉祥意取還征雲貴兩廣降下九月救左順閽者今後非有宣召總兵官不得輙入先是石亨張軏怙寵干請無算一日率千戸盧旺彦敬入侍文華殿上問為誰亨曰此臣腹心也迎復功二人居多立請擢二人錦衣指揮使工部侍郎孫𢎞亨鄉人以亨薦得官復請以為尚書上曰且使侍郎再遷則尚書矣亨出曰一遷尚書何不可者乃再遷耶其驕恣如此上亦頗知亨然念其功間屏人語大學士李賢賢對曰權不可下移惟獨斷乃可既又與賢語及奪門功賢對曰迎駕則可奪門二字豈可傳示後世陛下順天應人以復大位門何必奪且内府門寧當奪耶當時亦有以此事邀臣者臣辭不與上驚問故賢對曰景皇帝不起羣臣自當表請陛下復位此名正言順無可疑者何至奪門假事泄此輩固不足惜不審置陛下於何地此輩藉陛下圖富貴耳豈有為社稷之心哉上大悟寖疎之十月孛來近邊求食石亨請領兵巡邊襲之取寳璽以李賢言止不行十一月逮兵部尚書陳汝言下錦衣獄籍其家給事中髙明等交章劾汝言怙勢亂法贓私籍甚故逮之上命所司陳籍汝言物于大内廡下召大臣入視且曰景泰間任于謙乆籍沒無餘物汝言未朞得賂各若是耶時上怒甚色變石亨等皆俛首自是上漸悟謙寃而惡亨等矣初謙之死也皇太后不及知後為上備言迎立外藩之誣上疑之每詰亨軏吉祥等皆對曰臣亦不知徐有貞向臣言耳由是上深惡之軏尋死二年春正月三大營將石亨曹欽言太僕亟㣲諸衛馬非便請𨽻兵部太僕卿程信執奏言太僕軄專馬政髙廟有㫖馬數不令人知今𨽻兵部使馬之登耗太僕不與聞脱肘腋變生馬不備給孰任其咎兵部懼亦以為言詔復其事歸太僕夏四月復設督鎮巡撫官初石亨以文官提督軍務武臣不得逞請罷之邊徼騷然軍無紀律上謂李賢曰朕初復位時奉迎之人皆以此為不便今乃知其謬也三年春正月大同總兵石彪誣奏都御史李秉坐除名八月定逺侯石彪有罪下獄彪之出鎮大同也禦宼磨兒山斬巴圖王搴其衣甲旗幟大敗之三山墩以功封定逺伯召還其明年宼屯賀蘭山又使彪往彪與宼戰安邊營追至昌平墩大敗之埜馬澗半坡墩轉戰六十餘里斬果勒齊平章擒獲無算又召還進侯彪至京會北使入貢者見彪于朝羅拜稱石王其威望如此然性隂狡兇暴在大同素侮總兵官總兵官因彪甞奏城威寕海子遂為流言稱彪有異志上固疑彪屢有功屢召還彪乃隂使大同千户楊斌等五十人詣闕乞留為鎮守上知其詐下彪獄詞連亨上猶念亨功宥之惟罷其兵權令以本籍歸第四年春正月彗星見日暈錦衣指揮逯杲上言石亨怨望與其從孫石俊謀不軌上以章示羣臣遂下錦衣獄初亨見上稍疎斥懷怨望嘗往來大同顧紫荆闗謂左右曰若塞此闗守之據大同京師何由得至一日退朝歸私第語盧旺彦敬曰吾所居官皆爾等所欲為者旺敬不知所謂對曰旺敬以公得至此他何敢言亨曰陳橋之變史不稱其簒爾能助吾吾官非爾官乎旺敬股慄莫敢對會瞽人童先出妖書曰惟有石人不動勸亨舉事亨謂其黨曰大同士馬甲天下吾撫之素厚今石彪在彼可恃也異日以彪代李文佩鎮朔將軍印專制大同北塞紫荆闗東據臨清决髙郵之堤以絶餉道京師可不戰而困矣遂請以盧旺守裏河及孛來宼延綏上命亨往禦之先又力勸亨亨曰為此不難但天下都司除代末周待周為之未晚也先曰時者難得而易失亨不聴先私謂所親曰此豈可與成大事者會彪敗上猶念亨功置不問罷其兵而亨之謀漸急事益露其家人上變告亨謀反逮治之死獄中斬彪于市其黨童先等俱坐死先是上使工部為亨營宅至三百餘間上登翔鳯樓恭順侯瑾撫寧侯永侍上指宅顧問永謝不知瑾曰必王府耳上笑曰非也瑾頓首曰非王府孰敢上顧太監裴當曰人乃不敢言石亨亨生子彌月上召見摩其頂曰虎兒也善撫之朕行與卿結婚姻取金鎖繫兒項名曰鎖定侯葢諷云五年秋七月太監曹吉祥及昭武伯曹欽反殺恭順侯呉瑾都御史宼深懷寧伯孫鏜兵部尚書馬昻率兵討平之吉祥欽俱伏誅方石亨之敗也上命由亨冒功以進者許自首革吉祥念與亨同功亨敗已且不得獨完因日犒諸降丁金帛倚為腹心諸降丁亦念已由吉祥冒功進一旦不測身且隨後相與為死黨吉祥之客有馮益者欽一日問曰自古有宦官子弟為天子者耶益曰君家魏武葢中官節之後欽大喜出其妻行酒馮先生由是隂畜異志未發也錦衣百户曹福來曾役欽家常之外貿易欽慮其洩遣福來妻告福來病狂出走錦衣指揮逯杲奏捕之欽又遣家人亮追獲福來箠楚瀕死廷臣疏劾欽上是之出彈示欽曰速改過不悛罪無赦而下諭廷臣守法無有專縱似欽者先是石彪得罪上亦先諭羣臣欽以故大懼又逯杲伺欽甚急會是月孛來宼丼凉上使懷寧伯孫鏜統京軍往征之兵部尚書馬昻監其軍擇庚子昧爽出師于是欽與諸昆季其黨都督巴延額森數十人謀曰縣官持我急不發我為石彪續矣遂分勒死士畨漢軍五百人約以是日昩爽朝門開則擁殺鏜昻奪門入此時吉祥素所部禁兵且可為内應謀定以其夕飲諸降丁酒厚贈之酒半夜可二皷鏜與恭順侯瑾廣義伯琮方待漏朝房都指揮旺扎勒托琳從欽席上亡走見瑾琮告變瑾琮趨告鏜相與去匿他所手作奏投門罅聞上上止開門縋入吉祥鎖繫之欽不知也與弟鉉􅀈鐸率畨將巴延額森至東長安門門閉欽知事泄即召死士馳至逯杲門杲方出斬之碎其屍杲故吉祥黨被恩遇素厚後為上伺欽欽大恨都御史宼深亦善欽既乃與言官疏劾之欽亦以為恨與鐸馳入西朝房索深斫深肩破其身為兩時長安街中甲卒馳驟入朝者以為征西軍也及訊知各悸散去大學士李賢待漏東朝房欽復馳索之戸外之聲洶洶賢驚出則甲而刃者數人一人砍賢肩傷耳刃跗擊賢背少選欽持逯杲頭來叱刃者執賢手曰今日直為此激變非得已也可為我草疏進上亡何又執尚書王翺賢乃就翺所索紙為草疏同翺投入長安左門隙門堅不啟欽火之守衛軍拆御河之岸磚以壘門欽往來嘯呼擬賢刃者數舍之馳去又索馬昻不得時已昩爽矣懷寧伯鏜謂其子軏若𢎞曰若號于道有獄賊反獲者得厚賞征西軍可集也已稍集至二千人甲兵具鏜曰不見長安門火耶曹欽謀反兵少擊殺者予金皆曰諾工部尚書趙榮被甲躍馬奮呼市中曰能殺賊者從我從者亦數百人鏜之東安門逐賊欽退屯東華門􅀈接戰鏜軍鋭甚賊衆披靡自辰至午擊斬􅀈欽中流矢創巨振策馳恭順侯瑾將五六騎出覘賊猝與遇力戰死欽還駐東大市街相拒至酉鉉以百餘騎往來馳突者三官軍環結自潰鏜執斬潰者以狥發神臂弓以射之遂追斬鉉鏜子軏遇欽于道奮砍中其膊軏亦死欽懼率騎還攻朝陽門不克走安定東直齊化諸門門盡閉大雨夜􅇡歸鏜督兵與戰馬昻以精兵殿會昌侯孫繼宗兵又集鏖戰軍士奮呼而入欽迫投井死鐸見殺遂屠其家親黨同謀一時盡死㨗聞上以是夕御午門下吉祥都察院獄明日磔于市且追磔欽鐸􅀈鉉巴延額森馮益湯序伏誅餘並流嶺南有賀三老者欽妻父也見欽勢盛絶不與通欽嘗欲為求一官力辭不可欽敗姻黨株連三老獲免八月進伯孫鏜為懷寧侯馬昻王翺李賢並加太子少保旺扎勒托琳為都督將士陞賞有差追封呉瑾梁國公諡忠壯贈宼深少保諡莊愍以擒賊詔示天下布寛䘏開言路時李賢奏言曹賊就擒此非小變宜詔天下一切不急之務悉予停罷又言自古治朝未有不開言路者惟奸邪之臣惡其攻已必欲塞之以肆其非上曰此石亨曹吉祥實為之今宜列之于詔使天下聞知谷應泰曰石亨石彪驍勇善戰有隴西李氏之風使之卧虎北陲自當匹馬不南矣帝既北狩額森再薄京師陵寢崩摧祭噐灰燼朔騎憑陵目無中國于謙督軍九門亨彪轉戰甚力徳勝安定彰義清風店倒馬闗諸㨗軍聲復振額森諸部慟哭出闗既懼且悔乃擁還上皇以結好中國戰之力也既而龍歸興慶幕徙南庭亨彪窺伺君側逆知不起合謀曹寺取功奪門李賢有言陛下應天順人門何必奪當前星已隕震位乆虚聖敬方躋乾符奪算上天垂象葢可見矣即在景帝憑扆羣臣憂懼或心歸沂邸或意屬襄藩然而襄王自外入内憲宗以子先父則上皇之必能復辟不待仰步乾象而後决也一旦挟萬乗之尊行僥倖之事乗晦勒兵登垣挟駕萬一謀臣不謹郕邸預知曹石之肉其足食乎邀天之幸私為己功吉祥蒙狐趙之勛亨彪受蕭曹之賞功以倖成福以滿敗當其請官卿貳建第長安武安侯之除吏竇都鄉之沁園曹石此時帝固已芒刺在背矣於時彪鎮大同亨守延綏分控要害屢斬名王捷聞幕府帝輒召還帝既疑石石遂自疑妖言遽興同悲黄犬向使石氏無奪門之功亨彪豈少通侯之賞積勞汗馬以功名終石氏子孫雖至今存可也吉祥無尺寸㣲勞欽鐸􅀈鉉蟬貂簪玉稍加抑裁輒生怨望犯闕稱兵反形尤著易著負乘詩歌相鼠身族誅滅固其宜爾嗟乎方其論吉祥之功曹欽身膺五等未㡬論誅吉祥之功懷寧又進列侯髙帝白馬之盟唐叔桐圭之賜稍稍凌遲衰㣲矣英宗間闗險阻再御萬㡬祭則寡人有同王振至天順五年始下詔悔恨曹石君子以為不勝其悔也明史紀事本末卷三十六
