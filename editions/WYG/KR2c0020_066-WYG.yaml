body:
  text: 明史紀事本末卷六十六浙江提學僉事谷應泰編東林黨議神宗萬厯二十一年二月京察竣三月己未刑科給事中劉道隆論吏部稽勛司員外郎虞淳熙兵部職方郎中楊于庭臺省交謪而吏部曲為解僅議一職方主事袁黄非體上責吏部回奏尚書孫鑨言淳熙臣鄉人安貧好學非有先容之助于庭任西事有功尚書石星亦言之臣不忍以功為罪且既命議覆自有異同惟各原其心求歸于當若知其無罪以科道之言而去之昧心欺君臣不能為上以不引罪奪俸三月考功郎中趙南星鐫三秩調外淳熙等並罷劉道隆以不指名亦奪俸鑨乞休不許鑨復奏曰人臣之罪莫大于專權國家之禍莫烈于朋黨夫權者人主之操柄人臣所司謂之職掌吏部以用人為職進退去留屬焉然必請旨而後行則權固有在不可得專也今以留二庶僚為專權則無往非耑矣以留二京職為結黨則無往非黨矣臣任使不效徒潔身而去俾專權結黨之説終不明于世將來者且以臣為口實又大罪也因請乞骸骨歸先是内計去留先白閣臣鑨及南星力矯之王錫爵不悦鑨既被譴都察院左僉都御史王汝訓通政使魏允貞大理寺少卿曽乾亨禮部郎中于孔兼員外郎陳泰來主事顧允成張納陛賈巖國子助教薛敷教俱論救禮部郎中何喬逺主事洪啓睿復合䟽言之孔兼允成敷教俱謫外甲子禮部員外郎陳泰來䟽曰臣通籍十七年四厯京察部權自髙拱張居正以來尚書惟張澣嚴清選郎惟孫鑨陳有年頗能自立餘則唯唯呐呐濫觴于楊魏而掃地于劉希孟謝廷寀今復借拾遺熒惑聖怒即去時之故智將來必挈權以阿閣臣而後為不專權必植黨以附閣臣而後為不結黨上怒降泰來癸未左都御史李世達請宥泰來等不聼南星淳熙于庭黄各削籍四月辛丑吏部尚書孫鑨罷九月吏部右侍郎趙用賢罷先是用賢為檢討生女三月中書舍人吳之佳約以幣及用賢諌張居正奪情削籍之佳為御史過吳門用賢往餞不為禮因反幣終字女蔣氏之佳子鎮亦他娶不相及也用賢負氣節素不為王錫爵所善鎮訟之罷用賢之佳亦降戸部郎中楊應宿議趙用賢絶婚非是行人髙攀龍申救得罪諸臣語侵閣臣指應宿為諂諛應宿遂訏攀龍并及吏部文選郎劉四科趙南星顧憲成等錫爵封應宿䟽上閏十一月甲午行人髙攀龍上言大臣則孫鑨李世達趙用賢去小臣則趙南星陳泰來顧允成薛敷教張納陛于孔兼賈巖斥近李楨曽乾亨復乞歸選司孟孔鯉又削籍矣中外不曰輔臣不附已則曰近侍不利用正人果謂出于聖怒則諸臣自化鯉而外未見忤旨何以皆至罷斥也皇上有去邪之果斷而左右反得行其媢嫉之私皇上有容言之盛心而臣下反遺以拒諌之誚為聖徳累不小丙申都察院左都御史孫丕揚覈楊應宿激而嫚罵髙攀龍疎而易言命降應宿湖廣按察司經厯攀龍掲陽縣典史仍諭建言諸臣時事艱難不求理財足兵寔政乃誣造是非部院公論所出今後務持平覈寔二十二年正月丁亥吏部推閣臣王家屏沈鯉陳有年沈一貫左都御史孫丕揚吏部右侍即鄧以讃少詹事馮𤦺不允初閣臣王家屏以諫冊儲罷歸至是上諭有不拘資品堪任閣臣語吏部遂以家屏等名上上覽不懌下旨詰責以宰相奉特簡不得專擅吏部尚書陳有年爭之以為冢宰總憲廷推自有故事王家屏為相有名若宰相不廷推將來恐開㨗徑因乞骸骨上命馳驛還籍以孫丕揚代之辛卯以沈一貫陳于陛為禮部尚書兼東閣大學士直文淵閣調文選即中顧憲成給事中盧明陬逯中立先後䟽救上益怒憲成削籍謪明陬中立按察司知事甲午禮部郎中何喬逺奏救憲成謫廣西布政司經厯先是國本論起言者皆以早建元良為請政府惟王家屏與言者合力請不允放歸申時行王錫爵皆婉轉調䕶而心亦以言者為多事錫爵嘗語憲成曰當今所最怪者廟堂之是非天下必欲反之憲成曰吾見天下之是非廟堂必欲反之耳遂不合然時行性寛平所斥必旋加拔擢一貫既入相以才自許不為人下憲成既謫歸講學于東林故楊時書院也孫丕楊鄒元標趙南星之流蹇諤自負與政府毎相持附一貫者科道亦有人而憲成講學天下趨之一貫持權求勝受黜者身去而名益髙此東林浙黨所自始也其後更相傾軋垂五十年二十三年秋七月己卯巡按直𨽻御史趙文炳劾吏部文選郎中蔣時馨倖進鬻爵下廷議尚書孫丕揚代時馨辨丙戌時馨削籍時馨貪黷初知新喻調嘉魚遷南京大理寺評事故為敝衣冠從鄒元標講學厯考功文選二司及被劾請廷質且曰戎政兵部左侍郎沈思孝庇浙江海道丁此吕避察不得又求少宰不得遂同諭徳劉應秋大理右少卿江柬之等詆李三才授趙文炳兾䧟太宰而代之上怒其凟辨甲午逮故浙江海道副使丁此吕蔣時馨既斥孫丕揚為釁由此吕沈思孝以此吕建言不宜察丕揚遂上此吕訪单貪婪賍跡雖建言無倖脱理命逮下獄對簿之日承服硃砂牀具等纍纍丕揚遂與思孝交惡矣八月沈思孝言孫丕揚庇屬負國丕揚乞休不允十一月丁丑工部貟外郎岳元聲言言官攻言官大臣攻大臣不若俱罷之二十四年八月癸亥大學士張位乞罷不許時吏部尚書孫丕揚乞休䟽二十上言權官坐謀鷹犬效力義難再留以位黨丁此吕沈思孝也上責丕揚無大臣體宜恊恭毋相牴牾閏八月吏部尚書孫丕揚右都御史兼兵部侍郎沈思孝罷二十七年五月丁巳以光祿寺卿李三才為都察院右僉都御史巡撫鳯陽二十九年九月戊午禮部尚書兼翰林院學士沈鯉朱賡兼東閣大學士值文淵閣時廷推九人上已㸃朱國祚馮𤦺而沈一貫密掲二臣年未及艾曷少需之先爰立老成者賡得入鯉先任禮部與申時行左請告上不許吏科都給事中陳與郊因䟽劾鯉鯉求去益力上私語曰沈尚書不曉我意遂有是命三十一年夏四月楚王華奎與宗人華趆等相訐章下禮部初楚恭王隆慶初廢疾薨遺腹宫人胡氏孳生子華奎華璧或云内官郭綸以族人如綍奴産子夀兒及弟如言妾子尤金梅所出並入宫長為華奎次華璧儀賓汪若泉嘗訐奏事下撫按王妃堅持之乃寢華奎既嗣楚華璧封宣化王華趆素强禦忤王趆妻又如言女知其詳趆遂盟宗人二十九人入奏楚先王風痺不能御内乃令宫婢胡氏詐為身臨蓐時抱妃兄王如言子為華奎又抱妃族王如綍舍人王玉子為華璧皆出于妻恭人王氏口王氏如言女故知之二孽皆不宜冒爵章入通政司沈子木持未上六月楚王劾宗人䟽亦至事下部禮部右侍即郭正域曰王奏華趆事易竟華趆奏王非恭王子亂皇家世系事難竟楚王襲封二十年何至今始發而又發于女子骨肉之間王論華趆一人而二十九人同攻王果有真見出真情否王假則華趆當别論王真則華趆罪不勝誅沈一貫以親王不當勘但當體訪正域曰正域江夏人一有偏狥禍且不測非勘則楚王跡不白各宗罪不定王跡勘各宗罪不勘人於何服時正域右宗人而輔臣沈鯉又右正域户部尚書趙世卿倉塲尚書謝杰祭酒黄汝良皆謂王非假一時閣部互相齟齬給事中姚文蔚劾郭正域故王䕶衛中人修怨謀䧟王都察院右都御史温純劾御史于永清給事姚文蔚刺及沈一貫九月己巳刑科都給事中楊應文給事中錢夢臯各劾郭正域夢臯并及次輔沈鯉俱不報上卒以王為真而正域罷去尋楚府東安王英燧武岡王華増江夏王華煊等請復勘假王不聴時票楚事皆朱賡二沈引嫌不出十一月妖書事起沈一貫疑郭正域為之錢夢臯遂直指正域且及輔臣沈鯉陜西道御史康丕揚將例轉内監賈忠貞語丕揚乗妖書可免丕揚遂起而佐之後歸獄皦生光得解詳爭國本三十三年春正月考察京官時主察當屬吏部左侍即楊時喬輔臣沈一貫憚其方嚴請以兵部尚書蕭大亨主筆䟽上上以時喬亷直竟屬之時喬與都御史温純力持公道䟽上留中三月辛巳吏部趨計䟽中旨留被察給事中錢夢臯御史錢一鯨等復論京察科道不稱職者甚衆豈皆不肖必有私意朕不得無疑葢以一貫私人被詰責也時喬純言察處科道萬厯二十一年科七人道七人二十七年科五人道九人今議處科四人道七人皆參衆矢公而聖諭嚴切臣等無狀宜罷上不問南京總督糧儲尚書王基以拾遺自辨上特留之夏四月刑科給事中錢夢臯復論楚事請削前侍郎郭正域籍并言左都御史温純黨庇工科給事中鍾兆斗例轉亦誣奏純純乞休大理少卿徐宗濬吏部都給事中侯慶逺御史孔貞一等皆論夢臯違禁妄辨吏部左侍郎楊時喬亦言之俱不報五月侯補職方郎中劉元珍劾沈一貫偏置私人蒙上箝下錢夢臯妄奏求容士林不齒一貫夢臯皆疏辨夢臯謂元珍為温純鷹犬降一級調極邊六月吏部員外郎賀燦然言被察科道與温純皆當去南京吏科給事中陳良訓御史蕭如松朱吾弼各論王基錢夢臯鍾兆斗必不可留沈一貫結近侍陽施隂設秋七月兵部主事龎時雍直攻沈一貫欺罔誤國於是太子太保都察院左都御史温純致仕錢夢臯鍾兆斗各避疾京察始得奏尋謫賀燦然龎時雍奪朱吾弼俸拾遺南京户部尚書王基免時有布衣在一貫坐夢臯戲之曰昔之山人山中之人今之山人山外之人布衣應聲曰昔之給事給黄門事今之給事給相門事識者􅛐之三十四年夏六月吏科給事中陳良訓御史孫居相劾沈一貫奸貪大學士沈一貫沈鯉並致仕一貫連歳乞休䟽八十上始允鯉居位四載嘗列天戒民窮十事書之于牌毎入閣則拜祝之或讒鯉為咀咒上命取觀之曰此非咀咒語也妖書事起危甚頼上知其心得無恙及放歸得旨不如一貫之優各賜金幣鯉半之出都日猶有讒其衣紅袍閲邊者中官陳矩為解乃已孫居相奪嵗俸陳良訓鐫三級調外三十五年五月以禮部左侍郎李廷機南京禮部右侍郎葉向髙為禮部尚書兼東閣大學士直文淵閣又諭朱賡召舊輔王錫爵時顧憲成移書向髙言近日輔相以模稜為工賢否溷淆引張禹胡廣為戒廷機故出沈一貫門人多疑之給事中王元翰胡忻曹于汴宋一韓御史陳宗契等交章劾廷機廷機故清介而攻之者詆為輦金奥援御史葉永盛極辨之廷機伏闕辭不允上下旨切責元瀚等秋七月總督漕運李三才請補大僚選科道用廢棄其論廢棄曰諸臣祗以議論意見一觸當路永棄不收總之于皇上無忤今乃假主威以錮諸臣又借忤主之名以飾主過負國負君莫此為甚叅政姜士昌賫表入京奏别遺奸錄遺逸遺奸指王錫爵沈一貫朱賡又曰古今稱廉相必稱唐楊綰杜黄裳然二賢皆推賢好士惟恐不及而王安石用之驅逐諸賢竟以禍宋時李廷機有清名故士昌規及之賡廷機上䟽辨降士昌廣西僉事御史宋燾論救謫平定州判加謫士昌興安典史三十六年五月禮部主事鄭振光劾輔臣朱賡李廷機大罪十有二指一貫賡廷機為過去現在未來三身布置接受從風而靡上以其誣詆謫普安州判九月先是王錫爵辭召手䟽言皇上于章奏一概留中特鄙棄之如禽鳥之音不以入耳然下以此愈囂臣謂君父至尊必自立于無過之地請幡然降旨盡除闗稅召還内差散内庫之有餘濟邊儲之不足天下必歡呼踴躍以頌聖徳留中章䟽亦自有緩急如推補九卿以吏部都察院為先庶官以科道為急科道考選乆停與其故裁抑留不肖以塞賢者之塗孰若稍䟽通簡新進以决舊日之壅此今日攬權上䇿也時䟽甚密而都御史李三才鈎得之泄言于衆謂錫爵以臺省為禽獸于是南京户科給事中段然首論錫爵與朱賡宻掲擅權亂政不報起孫丕揚太子少保吏部尚書十月壬戌起吏部文選郎中顧憲成為南京光禄少卿辭不至丙寅工科給事中何士晉劾錦衣衛左都督王之楨為輔臣爪牙心腹亟宜顯斥禮科給事中張鳯彩刑科都給事中蕭近髙給事中張國儒交章紏王錫爵朱賡國儒言臺省五十餘人共紏朱賡奸狀而尚書趙世卿曲媚之俱不報十一月壬子朱賡卒于官賡性淳謹同鄉沈一貫當國善調䕶故妖書楚獄其禍不蔓賡卒廷機當首揆言路益攻之廷機决計不出葉向髙獨相而攻廷機者未已也遂移居演象所之尊武廟乞放凡五年至萬厯四十年始得請寒暑閉門無履跡三十七年春二月丙寅御史鄭繼芳劾工科右給事中王元翰貪婪不法元翰亦奏辨繼芳為王錫爵申時行吐氣初給事中王紹徽善湯賔尹營入閣甚急嘗語元翰曰公語言妙天下即一札揚湯君湯君且為公死世間如湯君可恃也元翰辭焉紹徽銜之因嗾繼芳摭元翰夏四月吏科糾擅去諸臣初工科給事中孫善繼拜疏竟去劉道隆繼之王元翰顧天峻李騰芳陳治則各先後去命削善繼籍道隆等各降秩時南北科道互相攻詆至不可問户科給事劉文炳請召鄒元標不報十二月乙丑工部主事邵輔忠論總督漕運李三才結黨徧天下前圖枚卜今圖總憲四岳荐鯀漢臣諛莽天下之大可憂也時三才需次内臺輔忠首劾之繼以御史徐兆魁三才奏辨工科給事中馬從龍御史董兆舒彭端吾南京工科給事中金在衡交章為三才辨俱不報三才負才名初為山東藩臬有聲民歌思之撫淮十年方稅璫横甚獨能捕其爪牙以尺箠斃大盜三才多取多與収採物情用財如流水顧憲成之左右譽言日至憲成信之亦為㳺揚三才嘗晏憲成止蔬三四色厥明盛陳百味憲成訝而問之三才曰此偶然耳昨偶乏即寥寥今偶有故羅列憲成以此不疑其綺靡至是挾縱横之術與言者為難公論詘之三十八年五月壬子吏部主事王三善乞勘李三才不報前吏部郎中顧憲成遺書葉向髙謂三才至亷至淡漠勤學力行為古醇儒當行勘以服諸臣心時給事中金士衡段然力保三才給事中劉時俊兵部郎中錢寀爭之紛如聚訟三十九年二月戊子總督漕運李三才免三月吏部尚書孫丕揚紏御史金明時倡言要挾逃察命下都察院議處初明時巡闕劾寶坻知縣王淑汴吏部右侍郎王圖子也及臨京察知不免遂先發攻王圖御史史記事論之明時奏辨主事秦聚奎言明時論王圖在去年十二月丕揚論明時在今考察先一日而卒之明時撓察之疏杳乎無聞大臣結黨欺君天下大勢趨附秦人今之丕揚非復昔之丕揚矣于是吏科都給事中曹于汴御史湯兆京喬允升俱以撓察論聚奎丕揚奏叅聚奎并以湯賓尹等七人訪单送内閣閣臣葉向髙䟽如丕揚指金明時以不謹免尋以辨䟽犯御諱削籍四月庚辰計䟽下命秦聚奎閒住南京國子監祭酒湯賓尹郎中張嘉言主事徐大化御史劉國縉王紹徽喬應申岳和聲降調有差五月給事中朱一桂御史徐兆魁䟽稱顧憲成講學東林遥執朝政結淮撫李三才傾動一時孫丕揚湯兆京丁元薦角勝附和京察盡歸黨人不報翰林院修撰韓敬疾去敬先師事湯賓尹在禮閳越房㧞為第一敬有時名而好縱横之學恣色貨之好時攻賓尹因及敬四十年二月癸未吏部尚書孫丕揚掛冠出都四十一年二月辛丑御史劉廷元劾光祿寺少卿于玉立依附東林風波翻覆宜顯斥不報十月禮科給事中亓詩教言今日之爭始于門户門户始于東林東林倡于顧憲成刑部郎中于玉立附焉憲成自賢玉立自奸賢奸各還其人而奔競招揺羽翼置之言路爪牙列在諸曹闗通大内操縱朝權顧憲成而在寧願見之哉末刺及葉向髙向髙奏辨四十二年八月癸卯大學士葉向髙致仕十一月御史劉廷元叅李三才佔厰盗皇木結交内侍起官御史劉光復給事中官應震等交章論之命給事中吳亮嗣往勘亮嗣報其實下三才舍人于理三才尋削籍四十五年三月京察革刑部主事王之寀職為民竇子偁陸大受皆被斥時葉向髙既去方從哲獨相庸庸無所短長吏部尚書鄭繼之主察徐紹吉韓浚佐之之寀初爭挺擊為韓浚所紏部處坐以貪汚子偁大受有清操持論與之寀合亦被逐時上于奏䟽俱留中無所處分惟言路一糾其人自罷去不待旨也于是臺省之勢積重不返有齊楚浙三方鼎峙之名齊為亓詩教韓浚周永春楚為官應震吳亮嗣浙為劉廷元姚宗文勢張甚湯賓尹輩隂為之主賓尹負才名而淫汚辛亥京察被斥至是察典竣韓浚以問鄉人給事中張華東華東曰王之寀論甚正何為重處之浚驚愕不語四十六年十二月主事鄒之麟奪職閒住之麟負才名附給事中亓詩教韓浚求轉吏部不得遂訐奏詩教浚又擅離任被斥四十七年十二月㑹推閣員禮部左侍郎何宗彦以吏科給事中張廷登不署名不得預御史薛敷教蕭毅中左光斗李徴儀倪應春彭際遇張新詔等交章惜之而禮科都給事中亓詩教兵科薛鳯翔又屢駁具如延登指各歸責于輔臣方從哲從哲奏辨俱不報先是國本之論起廟堂益相水火上頗厭惡之斥逐相繼持論者愈堅乃一切置之髙閣方從哲獨相七年上喜其無能而安之山東趙焕為冢宰詩教又從哲門人故其勢尤張已而鄒之麟倡言張鳯翔為選君必以年例處姚宗文劉廷元齊浙遂離之麟既被黜其友夏嘉遇魏光國尹嘉賓鍾惺皆有才名俱改用而嘉遇素潔清亦與衆共擯趙興邦為兵垣仍入禮闈之麟嘉遇遂糾之并及詩教言路合疏紏嘉遇興邦遽陞京卿御史唐世濟助嘉遇攻興邦而亓趙之勢衰時廷議所喧持者唯禁道學一事吏治邊防俱置不理泰昌元年即萬厯四十八年也八月己酉起鄒元標為大理寺卿科臣惠世揚上言君子小人之進退闗係國家之治亂然小人不退則君子不進吏部尚書周嘉謨奏列建言得罪諸臣王徳完等三十三人于是王徳完孟養浩鍾羽正滿朝薦悉起部寺諸官壬戌以以侍讀學士劉一燝韓爌為禮部尚書兼東閣大學士直文淵閣仍諭内閣特召舊輔葉向髙初光宗踐祚踰月崩未及用向髙等熹宗既即位乃遣行人徴之十一月給事中惠世揚遇災陳言因叅大學士孫如游薦髙攀龍劉宗周孫居相劉䇿王之寀陸大受等十二月大學士方從哲致仕從哲以紅丸移宫二案臺省交章論之至是歸熹宗天啓元年春正月兵科給事中楊連予告回籍漣以移宫一案御史賈繼春侵之漣因乞歸詳三案御史馬逢臯上言楊漣何罪無罪即功功在安社稷罪在攻大璫罪璫未誅而發璫罪者先作楚囚之悲君子退則小人進矣二月御史周宗建上言國家之治亂由于議論之公私皇祖戊申以後沈一貫未敗之時在朝者豈無君子而一雜以小人則沈鯉可逐郭正域可芟察典可壞大獄可興時則有錢夢臯康丕揚為之首庚戌辛亥之交在朝者豈無君子而一雜以小人則大貪之淮撫可保極險之銓佐可阿直節可摧清流可放時則有史記事徐縉芳等為之首壬子癸丑之交在朝者豈無君子而一雜以小人則學差可擯考選可排吏兵之諸事可日試以為嘗考察之把持可一網以為阱時則有亓詩教趙興邦為之首有如今日三咨並下君子進庸矣而臣竊為先事之慮者以用人言之如所引董應舉髙攀龍史孟麟李邦華熊明遇魏雲中等二十餘人類皆磊落竒才如必借此相引積横之貪邪亦思梯架于月旦窮兇之醜類尚留春夢于餘灰將朝廷大公之盛舉翻作臣子市徳之私縁臣之所謂不得不慮也以移宫言之如方震孺毛士龍等十有餘章闡發既明在科臣楊漣潔志逺嫌不難聴召用于他日臺臣賈繼春實心愛主何妨付定論于國人若復侈談羽翼追憶几筵欲掃疑端愈増滋蔓又臣之所謂不得不慮也臣請約言之銓除在真品毋容夾雜以同升朝論在輿評毋輕出言以佐鬬國家要以邊事為首務毋自起室内之戈今日終以君徳為大本毋徒為將順之節三月起劉宗周禮部主事主之寀刑部主事髙攀龍光祿寺丞八月給奉聖夫人客氏地以陵工成命叙錄魏進忠御史王心一馬鳴起吏科給事侯震暘倪思輝朱欽相等先後糾之降調有差詳魏忠賢亂政二年春正月起吏部郎中趙南星為太常寺卿三月禮科惠世揚䟽叅輔臣沈㴶借募兵之名為䕶身之術隂使其黨晏日華潜入大内誘劉朝等練兵再見江彬之事外戚鄭養性厚募死士有違祖制不聴御史侯震𤾉亦以劾㴶調外六月刑部尚書王紀奏劾輔臣沈㴶巧能移人主之視聴力足倒天下之是非交結權黨誅鋤正士黄臺𤓰詞已賦同文館獄將興又曰臣指其察京而㴶不肯受試取惠世揚周朝瑞魏大中董羽宸等䟽一一讀之則京之為京櫽括于此矣上以煩言責之㴶尋予告回籍紀革職為民八月以楊漣為太常寺少卿兵科給事朱童䝉䟽劾都御史鄒元標副都御史馮從吾建壇講學醵金立院之非標等上䟽自理上優詔答之工科給事郭興治復劾内有比擬妖賊諸語上責其狂悖奪俸于是元標從吾五䟽乞休元標即移家出城遂予告馳驛去翰林修撰文震孟上言勤政講學之寔留中庶吉士鄭鄤䟽足之俱降調詳魏忠賢亂政太僕少卿滿朝荐上言國事顛倒成于陛下者什之一二成于當事大臣者十之八九䟽入除籍為民十一月以趙南星為都察院左都御史十二月以顧秉謙魏廣微為大學士入閣辦事三年二月奪御史周宗建俸南京御史徐世業劾宗建保舉熊廷弼宗建䟽辨詞連郭鞏有結交宫闈献媚進忠之語中㫖切責冬十月以楊漣為右僉都御史協理院事四年二月推南京吏部尚書鄒元標中旨以衰老罷之夏四月吏部尚書趙南星上言吏部四司惟稽勛司一人餘司皆二人以稽勛事寡也然今日之稽勛皆儲為文選考功之用宜就近推補司官不拘資格一省不妨二人引陸光祖調吏部吕坤黄克念等同邑同司之例為言上從之于是南星調職方司郎中鄒維璉為稽勛主外察維璉與原任主事吳羽文皆江西人羽文遂拘舊事求去維璉亦不敢履任刑科𫝊櫆䟽侵之羽文求去益堅維璉亦上䟽力辭櫆復䟽以僉都御史左光斗吏科都給事魏大中交通故内監王安中書汪文言詔下文言于獄嚴訊之光斗上䟽自理大略謂櫆之意不利于稽勛有鄒維璉銓司有程國祥吏垣有魏大中故欲一網去之且指其冒東厰理刑傅繼教為兄弟布置窟穴大中亦上䟽辨得旨命大中赴任供職御史袁化中給事中甄淑相繼為光斗辨大學士葉向髙請骸骨䟽曰臣十八䟽乞歸皇上維時艱主憂臣即去何安顧臣罪戾多矣即如科臣傳櫆所論汪文言寔臣具題左光斗魏大中之善文言尚屬曖昧而臣之用文言則事跡甚明臣取罪之故當聴公論不敢妄辨以滋紛紜耿耿愚忠竊謂言官之訐奏釁不可開駕帖之拏人漸不可長惟皇上罪臣一人而稍寛其他于以釋官府之嫌消縉紳之禍上慰諭留之已而大中既蒞任復𫝊旨詰責大中櫆情事未明何得赴任櫆乃上言明旨不宜二三中旨恐開旁竊紏近臣以自解七月大學士葉向髙予告回籍向髙冄入相政移忠賢同事者更希意阿㫖向髙動即掣肘楊漣二十四罪䟽上忠賢恨刺骨御史林汝翥忤璫羣璫圍向髙第索之向髙知時不可為發憤决去䟽三十三上後得請左都御史髙攀龍紏劾貪汚御史崔呈秀落職回籍呈秀巡按淮陽有狼籍聲吏科都給事魏大中發其餽遺攀龍因回道考察劾罷之已而呈秀以魏璫義子起用冬十月朔有事太廟輔臣魏廣微不至魏大中紏其無禮指稱惟奢安不拜正朔廣微深銜之上䟽自辨御史李應昇復䟽紏之謂廣微不可見乃父于地下廣微見䟽恚甚廣微父魏允貞也嘗為諫官得罪閣臣去降吏科都給事魏大中吏部員外郎夏嘉遇御史陳九疇三級調外吏部尚趙南星左都御史髙攀龍乞罷許之給事中沈惟炳䟽救不允亦調外時推山西巡撫南星以太常卿謝應祥沉靜有為欲以處之言于員外夏嘉遇嘉遇述其意于河南道御史袁化中化中深然之及化中途逢大中告以故先是應祥令嘉善大中知其才守遂㑹推焉陳九疇有私恨遂論應祥昏耄大中以門墻私之互相奏辨有旨㑹勘吏部坐臺臣論人失寔上中旨以比周切責之降大中等于是南星攀龍皆引罪去大學士韓爌力救不聴引疾歸已而刑部尚書喬允昇吏部侍郎陳于庭都御史楊漣左光斗太常卿謝應祥部屬張光前鄒維璉科道袁化中許譽卿等一時盡黜部署皆空户科給事中陶崇道上言諸臣各執成見無不異同尢望皇上盡入陶鎔化其畛域而天語頻煩責以朋比彼此之互異既章水火之情形立見虞廷黜陟不過賢奸唐宋末流可為殷鑒䟽入降調十二月起徐兆魁為吏部左侍郎朱童䝉郭允厚李春煜太僕寺少卿徐大化吕雲鵬孫杰大理寺寺丞霍維華郭興治楊維垣等皆科道以御史梁夢環追論復逮汪文言自是羅織靡已楊漣魏大中相繼斃于獄詳魏忠賢亂政御史李蕃䟽劾輔臣朱國禎時韓爌既去魏廣微未得為首輔嗾蕃劾之五年秋八月御史張訥請廢天下書院殺熊廷弼初楊左事起以移宫為案但屬楊左與顧大章等無與也已復改為封疆周朝瑞曽䟽薦廷弼而顧大章與楊維垣相䟽辨與楊左又無與也乃以封疆牽入移宫于是一網盡也詳魏忠賢亂政七年八月上崩無嗣遺命以信王入繼大統誅魏忠賢客氏其黨相繼伏法詳魏忠賢亂政冬十月吏科都給事中陳爾翼上言東林餘孽徧布長安毎欲因事起釁憂不在小乞勅下厰衛嚴緝禁之上曰羣臣流品先帝澄汰已分朕初御極嘉與士大夫臻平康之理毋事揣摩形影以滋爭競十一月户部員外王守履劾崔呈秀薦舊輔韓爌上以韓爌清忠有執下所司知之愍帝崇禎元年春正月翰林院編修倪元璐上言臣入都抵抄凡攻崔魏者必引東林為並案一則曰邪黨冄則曰邪黨夫崔魏而既邪黨矣向之劾忠賢論呈秀者又邪黨乎虚中言之東林則亦天下之才藪也其所宗主者大都秉清挺之標而或䋲人過刻樹髙明之幟而或持論太深此之謂非中行則可謂之非狂狷則不可且天下之議論寧涉假借而必不可不歸于名義士人之行已寧任矯激而必不可不凖諸亷隅自以假借矯激深咎前人而彪虎之徒公然毁裂亷隅背叛名教矣連篇頌徳匝地生祠夫頌徳不已必將勸進生祠不已必且嵩呼而人猶寛之曰無可奈何嗟乎充一無可奈何之心又將何所不至哉議者論以忠厚之心曲原此輩而獨持已甚之論苛責吾徒亦所謂悖也今大獄之後湯火僅存恩論酌用乃任事諸臣猶以道學封疆之字持為鐡案深防報復臣竊以為過計也水落石出正人相見總屬崔魏之異已即可化牛李為同心况年來借東林以媚崔魏者其人自敗不須東林報復若其不附崔魏又能攻而去之者其人既已喬嶽矣雖百東林烏能報復哉臣所謂方隅未化也與楊維垣互出疏相往復上是其言時元璐屢言事大學士來宗道常曰渠何事多言吾詞林故事惟香茗耳時謂宗道清客宰相五月御史袁𢎞勲劾大學士劉鴻訓一入黄扉揚揚自得浹旬之間革職閒住無虚日最可異者楊所修賈繼春楊維垣夾攻表裏之奸有功無罪而誅鋤禁錮自三臣始且軍國大事未暇平章惟亟毁要典謂水火𤣥黄是書為祟今燬矣水火𤣥黄息耶戰耶未燬以前崔魏借之以空善類既燬以後鴻訓又借之以殛忠良以暴易暴長此安窮鎮撫司僉書張道濬亦訐攻鴻訓工科給事中顔繼祖爭之且言道濬出位亂政非重創不止御史史􅒇髙㨗相繼彈鴻訓鴻訓尋以事罷歸十一月庚申㑹推閣員吏部侍郎成基命禮部侍郎錢謙益等禮部尚書温體仁訐謙益天啓初主試浙江賄中錢千秋不宜枚卜上召廷臣及體仁謙益于文華殿質辨良久上曰體仁所叅神奸結黨誰也曰謙益黨與甚衆臣不敢盡言即枚卜之典俱自謙益主持吏科給事中章允儒曰體仁資深望輕如紏謙益何不先於枚卜也體仁曰前猶冷局今卜相事大不得不為皇上慎用人耳允儒曰朋黨之説小人以陷君子先朝可鍳上叱之下錦衣衛獄削籍禮部以錢千秋試卷呈上責謙益引罪而出旋回籍除名為民下千秋于刑部周延儒曰自來㑹推㑹議皆故事僅一二人主持餘無所言即言出而禍隨之矣上大稱善遂停枚卜卒用延儒延儒力援體仁明年亦入政府初延儒以召對稱旨至是枚卜謙益必欲得之而慮以延儒同推勢必用延儒遂力推止之不知上果意在延儒不推適滋上疑耳於是黨同之疑中於上者深體仁發難而延儒助之謙益不知也忽䝉召對謙益自為枚卜定於此日及入見方知有體仁䟽體仁與謙益廷辨體仁言如湧泉而謙益出不意頗屈二年春正月定逆案召廷臣于文華殿先是御史毛九華劾禮部尚書温體仁有媚璫詩刋本上問體仁體仁謂出自錢謙益誣論又出御史任賛化叅體仁䟽其語䙝上不懌謫賛化于外御史吳甡言因温體仁前削章允儒降房可壯瞿式耜今又斥任賛化班行無色乞召還言官不聼三年五月左諭徳文震孟上言吕純如羅織諸賢今籍奥援思借邊才起用吏部尚書王永光假竊威柄年例變亂祖制考選擯斥清才䟽入命指實具奏永光有清執東林以其異已給事中張國維御史毛羽徤等交劾之俱不問至是震孟再糾之四年春正月翰林院編修黄道周䟽救錢龍錫調外初定魏崔逆案輔臣錢龍錫主之袁崇焕之獄御史史􅒇力謀借崇焕以報龍錫因龍錫以羅及諸臣周延儒温體仁主之欲發自兵部而尚書梁廷棟不敢任又上英察不能遽起大獄也道周䟽上延儒意稍解時大學士韓爌亦被劾歸二月給事中葛應斗紏御史袁𢎞勲錦衣衛都督同知張道濬通賂竊權命下理𢎞勲受叅將胡宗明主事趙建極賄嘱于兵部尚書梁廷棟吏部尚書王永光𢎞勲道濬皆永光所任也俱論戍刑科給事中吳執御論永光誨貪崇墨永光罷五月釋故大學士錢龍錫獄戍定海衛龍錫出獄周延儒即過之極言上怒甚挽回殊難龍錫深徳之未幾温體仁至龍錫因述延儒語體仁曰上固不甚怒也于是聞者謂體仁質直而延儒虚偽然亦體仁之巧於擠延儒也嘉善錢士升為龍錫門生聞體仁語頗多之而輕延儒體仁遂與相結五年春正月刑科給事中吳執御奏薦黄克纘劉宗周等御史吳彦芳奏薦李瑾李邦華等上以其朋比惡之下彦芳執御于理坐上書不以寔律杖為城旦六年三月刑科都給事陳賛化劾大學士周延儒招權納賄遊客李元功借叢威人延儒嘗語去輔李標事云上先允放余封還原䟽上即改留頗有回天之力今上羲皇上人也此是何語豈徒小人之輕泄乎至指借停刑以㒺賄利此固通國所共聞也且引刑科給事李世祺為証世祺亦奏延儒有此言不問户科給事中朱文焕亦劾延儒重荷國恩毫無補救六月大學士周延儒罷始温體仁與延儒深相結納延儒力援之以進至是體仁將奪其位太監王坤䟽攻延儒體仁無一語相助于是陳賛化屢紏延儒即羲皇上人一語窮究不已體仁知上意凡與延儒為難者必隂助之而助延儒者皆詘延儒放歸七年三月召大學士何如寵入朝在道屢引疾不許刑科給事中黄紹杰奏言從來君子小人不能並立如寵徘徊瞻顧則次輔温體仁當知所自處矣自體仁為相水旱洊臻盗賊滿路爕理固如是乎秉政既乆窺㫖必熱中外諸臣承奉其意用一人則曰此與體仁不合也行一事則曰此體仁所不樂也凡此皆召變之由乞命體仁引咎辭位以回天心慰民望上責其率妄調外八月甲戌石廷臣于平臺問誰堪冢宰總憲者令各給條對吏部左侍郎張㨗曰臣之所舉與衆不同上許之勛戚在殿西室文臣在殿東室㨗旁皇四顧大學士王應熊目屬之諸臣覺其異及問所薦則前兵部吕純如也時諸臣或舉鄭三俊勲戚亦如之或舉唐世濟㨗曰總憲世濟可冢宰非純如不可俄入奏力言純如之長諸臣以純如列逆案不可刑科給事中姜應申言之尤力捷失色上問温體仁對曰謝陞可上是之應熊故善周延儒而純如又與延儒善者故體仁隂持之給事中范淑㤗吳甘來交章劾王應熊張㨗同謀黨附計翻逆案乙亥召南京吏部尚書謝陞為吏部尚書以唐世濟為左都御史八年夏六月刑部主事吳江給事中何楷宋學顯御史張纉曽各劾大學士温體仁并及王應熊初流盗陷中都巡撫楊一鵬巡按吳振纓被劾而振纓體仁鄉人曲庇之時何吾騶亦與應熊不合錢士升力劑其間得解秋七月進少詹事文震孟為禮部左侍郎兼東閣大學士震孟講春秋稱㫖既而以疾告不允温體仁語之曰行相君矣何避也至是出特簡入政府十一月大學士何吾騶文震孟罷初吾騶震孟在直欲以工科給事許譽卿補南京太常卿温體仁與吏部尚書謝陞難之陞遂䟽紏譽卿震孟自恃特簡於體仁無所依附嘗與體仁論庶吉士鄭鄤當遷除大拂體仁意至是票陞䟽止欲奪譽卿俸體仁不肯震孟作色擲筆曰即削籍無害體仁夕掲上而吾騶震孟朝罷矣譽卿擊璫有直聲沉淪諫垣十年不調即是削籍震孟有時望入相僅三月而齟齬同官不竟其用逮庶吉士鄭鄤鄤繼母大學士吳宗達女弟也鄤薄于宗達宗達嘗掲其杖母烝妾震孟既忤體仁體仁併恨鄭鄤即以宗達所掲入告下獄九年二月吏部尚書謝陞䟽救陳子壯不聼先是子壯以論宗秩事下獄詳崇禎治亂巡按蘇松常鎮御史王一鶚奏薦周延儒等以濫及廢籍責之夏四月大學士錢士升罷初温體仁深結士升其入相也體仁凡有所為必力推之如用冢宰謝陞總憲唐世濟皆體仁意而士升成之體仁逐文震孟頗引士升為証士升亦助體仁至是體仁并欲去士升因福建右衛經厯吳鯤化訐奏士升弟士晉即擬嚴旨仍囑林釬毋泄言欲借弟以逐其兄也士升遂引歸五月逮滋陽知縣成徳下錦衣獄徳性剛激入前大學士文震孟之門至是連章攻温體仁凡十上盡發其奸狀母張氏伺體仁輿出輒道詬之徳移獄刑部戍延綏秋七月國子祭酒倪元璐免元璐與同邑左庶子丁進不合嗾誠意伯劉孔昭訐奏也十一月下左都御史唐世濟于獄世濟以邊才薦故兵部尚書霍維華上謂維華逆案世濟䝉蔽下刑部獄明年正月霍維華戍没十年春正月常熟章從儒訐奏前禮部右侍郎錢謙益科臣瞿式耜䟽上温體仁修郄逮之下刑部獄幾殆謙益嘗作故太監王安祠記曹化淳出王安門憤其寃發從儒隂謀立枷死謙益等尋相釋二月逮巡按山西御史張孫振初提學僉事袁繼咸守官奉公自書卷外無長物孫振貪穢不職誣奏之貢士衛周祚等訟其寃命并孫振逮訊三月陸文聲陳風俗之弊皆原于士子太倉庶吉士張􅄎前臨川知縣張采倡復社以亂天下命南直提學御史倪元珙覈奏元珙因極言文聲之妄上責其䝉飾降光祿寺錄事􅄎采為古學以相砥礪天下靡然鄉風不為政府所悦故朝論必苛及之時蘇州推官周之䕫亦訐奏􅄎等樹黨挾持夏四月兵科給事中宋學顯貴州道御史張盛羙俱例轉湖廣河南叅議撫寧侯朱國弼劾温體仁私左都御史唐世濟逐學顯盛羙上不聴又劾體仁受霍維華賂令唐世濟發端上慰諭體仁奪國弼侯爵世濟亦戍邊六月大學士温體仁引疾免賜金幣遣行人吳本㤗䕶歸體仁在事諸臣攻者無虚日體仁與舉朝為仇其庇私黨排異己未嘗有跡但因事圖之使若發自上者而主炳隂為所假上竟不之疑八月以薛國觀為禮部左侍郎兼東閣大學士十月定東宫官屬右諭徳項煜編修楊廷麟讓左諭徳黄道周閣臣以道周意見偏上䟽有不如鄭鄤之語寢之刑科給事中馮元颷言道周忠足以動聖鑒而不能得執政之心恐天下後世有以議閣臣之得失也不聴已而道周䟽劾楊嗣昌奪情謫外詳崇禎治亂十一年八月南京户科給事張焜芳論前廵鹽兩淮御史史􅒇侵帑三十餘萬命逮􅒇下刑部先是巡鹽御史張錫命憂去遺課二十一萬􅒇挕事盡入其家簡討楊士聰攻之􅒇諉槖錫命時錫命前卒子沆奏辨大學士錢士升擬旨罪􅒇王應熊曰史太僕大有才未易攖也擬上上果不聴至是􅒇復奏辨又發張焜芳朋黨狀焜芳奪官十二年六月以左懋第袁愷隂潤藺剛中范士髦為給事中詹時雨李近右汪承詔張緒論楊四重為試監察御史吳昌時等並各部主事昌時首選吏部䟽上上自手定先後示不測昌時謂薛國觀所為恨之八月故庶吉士鄭鄤磔于市先是中書舍人許曦訐奏鄤不孝凟倫與温體仁䟽合法司定罪擬辟上命加等鄤初選庶吉士有直諌生文震孟黄道周皆與之遊當時欲借鄤以傾震孟道周讞駁逾重而鄤居鄉多不法遂罹慘禍十三年夏四月巡撫江西右僉都御史解學龍薦舉布政司都事黄道周上以道周黨邪亂政學龍狥私俱逮下理廷杖論戍户部主事葉廷秀請寛之併杖削籍監生凃仲吉上言黄道周通籍二十載半居墳廬稽古著書一生學力止知君親雖言嘗過戅而志實忠純今喘息僅存猶讀書不倦此臣不為道周惜而為皇上天下萬世惜也昔唐太宗恨魏徴之面拆至欲殺而終不果漢武帝惡汲黯之直諫雖逺出而寔優容皇上欲逺法堯舜奈何出漢唐主下斷不宜以黨人輕議學行才品之臣也通政司格之不上仲吉并劾通政使施邦曜遏抑言路再救道周上怒下獄杖之論戍六月大學士薛國觀免初國觀以温體仁援得入閣同官六人皆罷獨國觀秉政至首輔上頗向用之至是因擬諭失旨下五府九卿議處致仕刑科給事中袁愷再䟽劾之言國觀納賄有據并及尚書傅永淳侍郎蔡奕琛等遂下鎮撫司訊初上召國觀語及朝士婪賄對曰使厰衛得人朝士何敢黷貨東厰太監王化民在側汗出浹背于是專偵其隂事以及于敗國觀既削籍吏部尚書𫝊永淳南京吏部尚書朱繼祚並免下左副都御史葉有聲于獄以通賄國觀也時株連頗衆十二月國觀奏辨不聴命入京即訊十四年春正月故大學士薛國觀奏辨刑科給事中袁愷誣劾出于禮部主事吳昌時之意上不聴夏四月召前大學士周延儒張至發賀逢聖入朝至發辭不出逢聖不乆以病歸初延儒既罷丹陽監生賀順虞城侯氏共歛金屬太監曹化淳等營復相至是得召用主事吳昌時之力居多延儒徳之六月故刑部右侍郎蔡奕琛在繫上言去夏六月同邑諸生倪㐮贄于庶吉士張􅄎之門歸語知縣丁煌誇􅄎大力可立致人禍福因言及臣旦夕必逮未幾而王陛彦果劾臣矣一里居庶常結黨昭權隂握黜陟之柄豈不異哉上令丁煌指証下倪㐮于獄既而奕琛亦劾張􅄎并及故禮部侍郎錢謙益八月辛亥故大學士薛國觀賜死誅中書舍人王陛彦各籍其家初國觀以王陛彦通賂免官命伺其邸則王陛彦至執下獄陛彦為吳昌時甥臨刑呼曰此舅氏所作我若有言即累名教矣時國觀事發于東厰僉云昌時寔啓其機十二月甲子戌黄道周解學龍初刑部尚書劉澤深擬道周瘴戍再奏不允因上言道周之罪前兩䟽已嚴矣至此惟有論死死生之際臣不敢不慎也自來論死諸臣非封疆則貪酷未有以建言誅者今以此加道周道周無封疆貪酷之失而有建言䝉戮之名于道周得矣非我皇上覆載之量也且皇上所疑者黨耳黨者見諸行事道周具䟽空言一二臣工始未嘗不相與也今且短之繼而斥之烏有所謂黨而煩朝廷之大法耶去年行刑時忽奉旨停免今皇上豈有積恨于道周萬一轉圜動念而臣已論定噬臍何及敢仍以原擬上上從之十五年夏四月宥馬士英起兵部左侍郎兼右僉都御史提督鳯陽士英初撫宣大以總監王坤論罪至是故太常少卿阮大鋮為營救得起用八月召還黄道周仍任少詹事時周延儒承上眷最深凡上怒莫能回延儒能談言微中先是道周在獄人謂必不可救延儒以微詞解之得减放至是上偶言及岳飛事嘆曰安得將如岳飛者而用之延儒曰岳飛自是名將然其破金人事史或多溢辭即如黄道周之為人𫝊之史冊不免曰其不用也天下惜之上黙然甫還宫即𫝊旨復官十六年三月改禮部儀制主事吳昌時為吏部文選主事署郎中事昌時好結納通司禮太監王化民等欲轉銓司吏部尚書鄭三俊嘗以問郷人徐石麒答曰君子也石麒遂薦于上葢石麒畏昌時機深故譽之而三俊不知例轉給事中范士髦等四人御史陳藎等六人故事例轉科一道二文選主事吳昌時特廣其數意脅臺省為驅除地也夏四月河南道御史祀彪佳劾吳昌時紊制弄權山東道御史徐殿臣賀登選各疏叅之五月吏部尚書鄭三俊以薦吳昌時引咎罷大學士周延儒放歸給事中郝絅復劾吏部郎中吳昌時禮部郎中周仲璉竊權附勢納賄行私内閣票擬機密每事先知總之延儒天下之罪人而昌時仲璉又延儒之罪人御史蔣拱宸何綸交劾之七月乙卯上自訊昌時于中左門拷掠至折脛乃止徴延儒聴勘延儒先薦大學士王應熊途中密語令先抵京上遣緹騎趨延儒入偵知之罷應熊尋誅昌時賜延儒死初延儒再召時庶吉士張􅄎馬世竒以公論感動之故其所舉措盡反前事向之所排更援而進之上亦虚已以聴漙既没世竒逺權勢不入都延儒左右皆昌時輩以至于敗倪元路曰自神祖中葉以來三四十年間朝廷之局凡三變其始天子靜攝聴臣工羣類之自戰而不為之理所謂鼠鬬穴中將勇者勝耳故其時其血𤣥黄時勝時敗其既閹寺擅權宵人處必勝之地正人亦戢心摶志而甘處不勝不敢復言戰宵人亦不曰戰直曰禽馘之耳然其時正人雖嬰禍患其心愈益喜曰吾君子也其後魁柄已振握照虚公百爾臣工皆怵然不敢窮戰而隂制以謀故其時氣戰者敗謀戰者勝謀陽者敗謀隂者勝凡明主所箝鞬以繩貪人者宵人皆借之以穽正人其正人既禍敗即無可自解曰吾君子其宵人亦不靳歸名君子而但使其無救于禍敗宵人正人皆以不敢言黨而黨愈熾黨愈熾而國是不可問矣究之借以朋比斥為偽學竄逐禁錮殆無虚日予以世患無真品望不患無真經濟耳所謂道徳事功垂之竹帛貞之珉石葢槩乎未有睹也嗟呼此後世之所以衰也明史紀事本末卷六十六
