body:
  text: 明史紀事本末卷二十六浙江提學僉事谷應泰編太子監國成祖永樂二年四月冊立世子為皇太子先是洪武二十八年太祖親冊為燕世子時秦晉燕周四世子太祖皆教而試之一日使分閲衞士燕世子還獨後問之對曰寒甚士方食太祖喜使閲章奏擇可施行者報命太祖益愛之後成祖即位議建儲武臣多請立髙煦者謂其有扈從功金忠以為不可上猶豫未定遂召解縉預議縉言立嫡以長復曰好聖孫葢指宣宗也上又宻以問黄淮淮亦曰長嫡承統萬世正法復召問尹昌隆昌隆對與淮同上意遂決及文華寳鑑成上召皇太子諭之曰修已治人之要具于此書堯舜相傳惟曰允執厥中帝王之道貴乎知要汝其勉之皇太子拜受而退上顧侍臣解縉等曰朕皇考訓戒太子嘗採經傳格言為書名曰儲君昭鑒錄此書稍充廣之益以皇考聖謨大訓以為子孫萬世帝王之法誠能守此足為賢君昔秦始皇教太子以法律晉元帝授太子以韓非書帝王之道廢而不講所以亂亡朕此書皆大經大法卿等兼輔東宫從容閒暇亦當以此為説庶幾成其徳業他日不失為守成令主侍講學士王達侍皇太子進講乾九四爻舉儲貳為説講畢皇太子召楊士奇問曰經㫖於此恐無儲貳之説達不含譏否士奇對曰講臣非正道不陳豈敢含譏此本宋儒胡瑗之説也皇太子曰然則常人得此爻亦舉此説耶士奇曰殿下此問甚善因舉程子云凡卦六爻人人有用聖賢有聖賢用衆人有衆人用君有君用臣有臣用無所不通太子悦六年八月詔曰成周營洛肇啓二都有虞勤民尤重巡省朕君臨天下秖率彛典統極之初已陞順天府為北京今四海清寧萬民安業國家無事省方以時將以明年二月巡幸北京命皇太子監國朕所經過處親王止離王城一程迎接軍民官吏于境内朝見一切供億皆已有備不煩于民諸司無得有所進獻冬十一月命丘福蹇義金忠胡廣黄淮楊榮楊士奇金幼孜等兼輔導皇長孫諭之曰朕長孫天章日表玉質龍姿孝友英明寛仁大度年未一紀夙夜孜孜日誦萬言必領要義朕嘗試之以事輒能裁決斯實宗社之靈卿等其悉心輔導七年春正月敕皇太子監國惟文武除拜四裔朝貢邉境調發上請行在餘常務不必啓聞仍命吏部尚書兼詹事蹇義兵部尚書兼詹事金忠左春坊大學士兼翰林侍讀黄淮左諭徳兼翰林侍講楊士奇輔導監國諭義等曰居守事重今文臣中留汝四人輔導監國若唐太宗簡輔監國必付房𤣥齡等汝宜識朕此意敬恭無怠命學士胡廣侍講楊榮金幼孜及户部尚書夏原吉等扈從賜皇太子聖學心法上出一書示胡廣等曰朕因政暇采聖賢之言若執中建極之類切于修齊治平者今已成書卿等試觀之廣等覽畢奏曰帝王道徳之要備載此書遂名曰聖學心法命司禮監刋行上諭黄淮楊士奇曰東宫侍側朕問講官今日説何書對曰論語君子小人和同章因問何以君子難進易退小人則易進難退對曰小人逞才而無恥君子守道而無欲又問曰何以小人之勢常勝對曰此係上人之好惡如明主在上必君子勝矣又問明主在上都不用小人乎曰小人果有才亦不可盡棄須常謹備之不使有過可也朕甚喜其學問有進爾等其盡心輔之二月帝發京師三月帝至北京都御史虞謙給事中杜欽奉命巡視兩淮啟潁川軍民缺食請發廪賑貸太子遣人馳諭之曰軍民困乏待哺嗷嗷卿等從容啟請待報汲黯何如人也即發廪賑之勿緩贊善王汝正毎于皇太子前論説賦詩之法皇太子問楊士奇曰古人為詩者其髙下優劣何如對曰詩以言志明良喜起之歌南風解愠之詩唐虞之君其志尚矣後世漢髙帝大風歌唐太宗雪恥百王之作則所尚者霸力皆非王道漢武秋風辭志氣已衰如隋煬帝陳後主所為則萬世之鑒戒也殿下欲娯意文事則兩漢詔令亦可觀非獨文辭髙古其間亦可禆益治道如詩無益之辭不足為也太子視朝之暇專意文事因覽真徳秀文章正宗羡其學識純正楊士奇曰徳秀所著大學衍義一書尤有益學者為君為臣皆不可不知太子即召翰林典籍取閲大喜曰此為治之鑒戒不可無遂命重刻以賜諸皇孫及廷臣八年冬十月上還南京十一年上幸北京皇太孫從命尚書蹇義學士黄淮諭徳楊士奇及洗馬楊溥等輔導太子監國十二年三月帝發北京親征衛拉特六月班師駐蹕沙河太子遣兵部尚書金忠等賫表往迎八月帝至北京以太子所遣使迎車駕緩且書奏失辭怒曰此輔導者之咎也漢王髙煦復譛之遂遣使逮尚書蹇義學士黄淮諭徳楊士奇洗馬楊溥芮善及司經局正字金問等至中途有㫖宥蹇義回南京黄淮先至北京下獄次日士奇及金問繼至上曰楊士奇姑宥之朕未嘗識金問何以得侍東宫命法司鞫之尋召士奇至問東宫事士奇叩頭稱太子孝敬誠至凡所稽違皆臣等之罪乃下士奇錦衣衞獄未幾特宥復職時金問詞連溥等遂相繼下獄有白事者曰殿下知䜛人乎太子曰吾不知知為子耳十三年秋九月直𨽻鹽城縣颶風海水泛溢傷民田二百一十五頃有奇太子令蠲田租一千一百七十餘石帝至京師十二月歴代名臣奏議書成先是上以璽書諭太子命翰林院儒臣黄淮楊士奇等採古名臣直言彚錄以便觀覽至是書進上覽而嘉之命刋印以賜皇太子皇太孫及諸大臣十五年春三月上巡北京命吏部尚書兼詹事蹇義翰林學士兼諭徳楊士奇侍讀兼贊善梁潛輔太子監國七月賜皇太子務本之訓十六年春三月太子手書賜贊善徐善述言覽卿為予改詩甚善但今卿年邁恐輔余為勞似卿朴直苦口者百無一二面諛順顔者比比有之卿無憚勞弼成余業惟望藥石之言日甚一日毋生犯鱗觸諱之慮余今欲學作表卿可一如詩題立例具詩題與表題間日封進以廣琢磨春煖順時將息以慰余懐書函曰皇太子賫書贊善好古先生好古者善述字也太子視朝之暇手不釋卷被服寛博大類儒者云夏五月上殺贊善梁潛司諫周冕時太子監國上不時有疾兩京距隔數千里小人陰附漢府者䜛搆百端侍從監國之臣朝夕惴惴人不自保㑹有陳千户者擅取民財事覺太子令謫交阯立功數日復念其軍功宥之有譛于上曰上所謫罪人太子曲宥之矣遂逮陳千户殺之以潛冕不諫止并逮下獄皆死六月上遣禮部左侍郎胡濙巡江浙諸郡陛辭上諭曰人言東宫多失當至京師可多留數日試觀何如宻奏來奏字須大晚至即欲觀也濙至京師日隨朝凡見東宫所行之善退即記之勲臣某者語不謹侍衞搥之仍當陛口奏有㫖不問既退亟宣侍衞者賞鈔若干錠於是羣臣皆言不顯責大臣而旌禁衞所以寛其罪而愧其心見殿下之仁明也居稍久楊士奇曰公命使也宜亟行濙權辭謝曰方治冬衣未完爾至安慶始書奏以所見皆誠敬孝謹七事宻疏以聞上覽之大悦自是不復疑皇太子十八年秋九月己巳北京宫殿垂成欽天監言明年正月朔吉宜御新殿命户部尚書夏原吉召太子太孫于京師期十二月終至北京太子赴北京過滁州登瑯琊山指示楊士奇曰此醉翁亭故址也因嘆歐陽修立朝正言不易得今人知其文鮮知其忠葢太子為文章尤善修每曰三代以下文人獨修有雍容和平氣象尤愛其奏議切直嘗命刋修文以賜羣臣且諭之曰修之賢非止于文卿等當考其所以事君者而勉之十一月太子過鳳陽謁祭皇陵畢周步陵傍顧張本楊士竒曰國家帝業所自也徘徊乆之耆老進謁有知太祖時事者從容與語賜勞優厚先是原吉自南京先馳奏上復命迎之且曰東宫緩行至是原吉迎見太子于鳳陽道上㫖太子以不敢緩諭之且手書付原吉與士奇詢訪沿途軍民利病政事得失備顧問太子過鄒縣見男女持筐路拾草實者駐馬問所用民跪對曰嵗荒以為食太子惻然稍前下馬入民舍視民皆衣百結竈釡傾仆嘆曰民隱不上聞至此乎顧中官賜之鈔而召鄉老問其疾苦輟所食賜之時山東布政石執中來迎責之曰為民牧而民窮如此亦動念乎執中言凡被災之處皆已奏乞停止今年秋税皇太子曰民餓且死尚及徴税耶汝宜速發官粟賑之事不可緩執中請人給三斗曰且與六斗汝毋懼擅發倉廪吾見上當自奏也十二月太子及太孫將至北京原吉先入奏上問原吉東宫來何速對曰陛下慈注之深東宫孝思之切上喜賜鈔二百錠命諸臣先期分官出候于良鄉太子至北京奏前過山東境内遇民飢即令布政司發粟賑之上曰昔范仲淹子猶舉麥舟濟父之故舊況百姓吾之赤子乎十九年禮部尚書吕震語太子曰殿下前在南京數遣中使進案牘每有事以殿下過失聞上指其妄言今宜疎此人太子曰過失吾豈能無今至尊既不信之我又與人較耶二十年春三月上北征秋九月還京師二十一年夏五月常山中護衞總旗王瑜上變言常山中護衞指揮孟賢糾合羽林衞指揮彭旭等舉兵將推趙王髙燧為主而謀不利于上及皇太子上命急捕賊既悉得遂召太子趙王及文武大臣皆至上御右順門親鞫之先是上以疾多不視朝中外事悉啟太子處分太子往往裁抑宦侍宦官黄儼江保尤見疎斥儼等日䜛之于上且素厚髙燧常陰為之地因偽造毁譽之言傳播于外謂上注意髙燧以紿外廷由是賢等遂起邪心欽天監官王射成與賢宻言于賢曰觀天象當有易主之變賢等邪謀益急與其弟孟三常山左護衞老軍馬恕田子和興州後屯衞老軍髙正通州右衞鎮撫陳凱等日夜潛謀連結貴近圖就宫中進毒藥于上候上晏駕即以兵劫内庫兵仗符寳分兵執府部大臣豫令髙正偽撰遺詔付中官楊慶養子至期從禁中議以御寳領出廢皇太子而立趙王髙燧為帝布置已定正宻告其甥瑜瑜曰此舅氏滅族之計力止不從瑜遂入告上覽偽譔遺詔震怒立捕楊慶養子誅之顧髙燧曰爾為之耶髙燧惴慄不能言太子為之營解曰髙燧必不與謀此下人所為耳上命文武大臣及三法司鞫治羣臣奏賢等所犯大逆且有顯實當並寘極典上曰且先籍其家王射成以天象誘人速誅之賢等更加窮鞫毋令遽死遂下錦衣衞嚴治尋逮其黨悉誅之八月帝發京師北征十一月還京二十二年春三月上議北征夏四月詔太子監國駕發京師秋七月庚寅上崩于榆木川大學士楊榮少監海夀奉遺命馳訃太子太子慟絶强拜受即遣太孫出居庸赴開平迎梓宫瀕行太孫啟曰出外有封章白事非印識無以防偽太子曰言良是但行急新製不及士奇曰殿下未踐阼有事自應行常用之寳其東宫小圖書可假之行此出一時之權歸即納上太子即取付太孫曰有啟事以此封識不久當歸汝汝可留之既行太子顧士奇曰昔大行臨御儲位久未定浮議喧騰今即以付之浮議何從興壬子太孫奉大行柩至郊太子及親王以下文武羣臣皆衰服哭迎至大内奉安于仁智殿加歛奉納梓宫八月十五日丁巳皇太子即位赦天下以明年為洪熙元年谷應泰曰古之教太子者慎選師傅訓之徳義過龍樓而問寢入虎闈而齒胄葢若是其毖也及乎六師撻伐有事行間則從曰撫軍守曰監國非特重器所寄亦以周知艱大練察治忽為嗣王之要務耳方仁宗之未正青宫也睿質仁明天姿愷惻然而如意類上申生無寵非黄淮進賈詡之謀解縉效鄴侯之議則鳥烏向背羽翼無成金玦偏褧憂方大矣幸而皇祖親冊嫡長分定乘危履險克正重輪重耳之艱阻備嘗楚王之朝嬰夕側非特生于深宫之中長于阿保之手者也又若儲君昭鑒𫝊自髙皇聖學心法頒于成祖比之始皇之教以法律元帝之授以韓非貽謀度越抑何偉歟而況金忠蹇夏輔導于前黄淮楊士奇糾繩于後則商山茹芝之佐也學識特崇真氏文章獨許歐公則家丞秋實之采也賑潁川之饑而先發後聞恤鄒縣之荒而賜鈔輟食則豳風農事之規也又考成祖巡幸順天親征漠北駕凡五出年垂二紀中間大官大邑雖復啟聞而庶政庶獄咸就諮決名為儲位實則長君名為監國實則御宇故人以仁宗之歴祚短而予以仁宗之沛澤長也若夫宫闈煽禍國本瀕傾管蔡流言備極䜛搆一時並集何以為懐又且迎駕緩期而逮捕官屬則髙煦贊之偽撰遺詔而陰行廢立則髙燧主之葢以突陣者自命黄須樹功者侈談天䇿而又加之敬禮之宻推曹植輔國之交鬭兩宫夫是以勢同孤孽危如累卵救過而不暇也自非胡濙宻書七事王瑜上變一言則豫教之淑質壅于上聞含沙之哆口交亂四國非䝉戾園之誅必賜扶蘇之詔而仁宗一載之郅理又烏能時其盛耶嗟乎安慶復而後良鄉侯孟賢敗而後榆川崩天祚人國以有此也明史紀事本末卷二十六
