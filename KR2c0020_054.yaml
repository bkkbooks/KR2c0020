body:
  text: 明史紀事本末卷五十四浙江提學僉事谷應泰編嚴嵩用事嘉靖十五年冬十二月以南京吏部尚書嚴嵩為禮部尚書兼翰林院學士時禮部選譯字諸生嵩至即要貨賄已而苞苴過多更高其價御史桑喬列其狀請罷黜之嵩乃疏辨求免帝曰卿所云為人臣于今日率皆觀望禍福必使人主孤立自勞此言已盡但盡心翼贊以副簡任不必復辭嵩意得甚給事中胡汝霖復劾其穢行既彰招致論列不得飾辭自明以傷大體帝乃令以後大臣被劾宜自省修勿得疏辨嵩懼益為恭謹以媚上十六年秋九月禮部尚書嚴嵩劾應天試官品隲文字不書名大不敬大學士夏言又謂䇿以戎祀為問多譏訕語當置于理遂命官校逮繫典試官江汝璧歐陽衢下詔獄其提調官孫懋楊麒何宏沈應陽俱命南京法司即訊同試官舒文奎等各行所在巡按即訊貢士不得應試南宫十一月嚴嵩摘廣東試録有體存故可以厚本用利故可以明微厚本故可以合同明微故可以鼓舞等語恭錯不經飛衛紀昌道遇交射及黃郊紫微碧虛子之問答詭異尤甚且中庸畢命二篇不道口指俱戾體格帝怒命監臨余光法司鞫問提調陸杰余鑑監視蔣淦鄒守愚巡撫都御史鞫問試官王本才等各巡按官鞫問貢士不得赴試南宫十七年夏五月通州致仕同知豐坊上言請復古禮尊皇考獻皇帝廟號稱宗以配上帝下禮部集議嚴嵩上言萬物成形于秋故王者秋祀明堂以父配之自漢武逮唐宋諸君莫不皆然主親親也若稱宗之禮則未有帝宗而不祔太廟者恐皇考有所不寧帝悅已而嵩復阿上㫖請尊文皇帝稱祖獻皇帝稱宗上從之乃尊太宗文皇帝為成祖皇考獻皇帝為睿宗配上帝詔天下詳更定祀典十八年二月景雲見夏言顧鼎臣以聞嚴嵩請帝御朝受羣臣賀嵩乃作慶雲賦及大禮告成頌上之詔付史館帝南幸嚴嵩從賞賚優渥與輔臣等嵩以桑喬胡汝霖故慚且恨因于帝前以他事自白且激怒帝十九年春正月巡按雲南御史謝瑜上言嚴嵩為桑喬所劾不自咎責反謂贊議明堂扈蹕南幸為諸臣所嫉將以揚已功激聖怒箝衆口且臣以嵩之可論難以枚數選譯字諸生通賄無算宗藩有所陳乞每事徵索故王府胥吏交代動以千計至于齎詔官役去索重賄旋索土物收買內外童子充斥家庭豈宗伯大臣所為乎嵩不以此自省而巧佞誣罔何奸邪無賴至此也不報二十年秋七月交城王絶輔國將軍表柚謀襲之遣校尉任得貴至京以黃白金三千兩賂嚴嵩復賂儀制司令史徐旭及王府科胥人皆受焉嵩乃題覆從之東厰邏卒執其籍以聞下法司問受賂者皆戍邊嵩無恙既而永壽共和王庶子惟燱與嫡孫懷㷽爭立以白金三千賂嵩亦受之為覆允永壽莊僖王妃遣人擊登聞鼓奏訴于是御史葉經劾嵩貪狀乞賜敕正嵩急歸誠于帝帝憫之乃曰表柚惟燱襲爵應否行所司勘之嵩安意任事勿以介意二十一年夏六月大學士夏言罷言與嚴嵩同鄉稱晚進以議禮驟貴嵩謹事之言不為下時嵩為禮部尚書初見寵信欲入閣而言阻之遂有郤會言坐失㫖當罷呼嵩與謀而嵩已造上所幸秉一真人第謀掎言言覺之囑所善者劾嵩時上已心愛嵩攻益力上益憐之上在西苑齊居許入直諸貴人得乘馬言獨用小腰輿以乘上怪之勿言會上不欲翼善冠而御香葉巾命尚方倣之製沉水香為五冠以賜言及嵩等言密揭謂非人臣法服不敢當上大怒嵩于召對日故冠香葉而冒輕紗于外令上見之上果悅留嵩慰諭甚至因泣訴言見凌狀上怒即下敕逐言科道官以失職不糾降調奪秩者七十三人秋八月以禮部尚書嚴嵩為武英殿大學士恭預機務仍掌部事吏科都給事中沈良林御史童漢臣等首論嵩奸汚不當乘君子之器南京給事中王煜御史陳紹等復論嵩并及子世蕃同惡相濟關通苞苴動以千百計嵩疏辨乞休帝優詔百餘言慰留之賜嵩銀記曰忠勤敏逹賜其家藏璽書之樓曰瓊翰流輝奉𤣥之閣曰延恩堂曰忠弼冬十月給事中童漢臣伊敏生喻時等再上疏論嚴嵩巡按四川御史謝瑜上言堯舜相繼百四十年誅四凶而陛下數月之間轉移之頃四凶已誅其二如郭勛胡守中而其二則張瓚嚴嵩是也請陛下奮乾斷亟譴之以快人心于是嵩復上疏乞罷帝慰諭留之已而謝瑜童漢臣俱以他事謫去二十二年夏四月嚴嵩解部事嵩既入內閣竊弄威柄內外百執事有所建白俱先白嵩許諾然後上聞于是副封苞苴輻輳其戶外大學士翟鑾位望先嵩而勢實不競遂至不相能給事中周怡上疏論之語多侵嵩疏入下獄已而鑾以二子幸第削籍去秋九月逮山東巡按御史葉經廷杖死初經劾嚴嵩受表柚惟燱賂嵩銜之及經監山東鄉試嵩摘試録中有諷上語激帝怒逮之至京杖闕下死布政使陳儒以下皆逺謫自是中外益側目畏嵩矣二十三年秋八月以吏部尚書許讃禮部尚書張璧為文淵閣大學士嚴嵩事取獨斷不相關白讃論之嵩乃上言獨䝉宣召于理未安往歲夏言惡與郭勛同列以致生隙夫臣子比肩事主當協恭同心不宜有此嫌異今諸閣臣凡有宣召乞與臣同如祖宗朝蹇夏三楊故事嵩蓋欲示厚同僚且明言妬也二十四年夏五月出南京吏部考功郎中薛應旗補外職初嚴嵩入內閣南京給事中王煜首劾嵩于是言者踵至嵩恨之是春大計京官嵩令所私尚寶丞諸傑移書應旗使黜煜應旗執傑使并其書白尚書張潤欲以奏聞潤止之釋其使而傑先為南京兵部主事有貪聲于是尚書潤及都御史王以旗并黜之常州守符驗故留臺御史也亦在所黜嵩乃嗾御史桂榮劾應旗以私怨黜本郡守謫補外十一月許讃削籍去十二月復召夏言入閣自嚴嵩入相同事者多罷去嵩獨相以太廟工成加太子太師後帝微聞其橫厭之于是詔起夏言言至盡復其原官且加少師位在嵩上言凡所擬㫖行意而已不復顧問嵩嵩亦唯唯雖斥逐其黨不敢救心甚恨之是時嵩子世蕃為尚寶司少卿通賂遺且代輸戶轉納錢榖多所朘削言知之欲以上聞嵩懼甚挈世蕃詣言求哀言稱疾不出嵩賂其門者直走言榻下及世蕃長跪泣謝言遂置不發嵩父子愈恨之會御史陳其學以鹽法論都督陸炳言擬㫖令陳狀炳等造言請死有所進槖皆長跪而解嵩知之日與謀傾言言不悟上左右小璫來言恆僕視之詣嵩必執手延坐持黃金置其䄂中故璫輩爭好嵩而惡言上或使夜瞰嵩言言多酣寢嵩知之每夜視青詞草初言與嵩俱以青詞得幸至是言已老倦思令幕客具草不復簡閲每多舊所進者上輒抵之地而左右無為報言嵩則精其事愈得幸言以是益危二十六年秋七月以尚寶司少卿嚴世蕃為太常寺少卿仍掌尚寶司事世蕃納賄日盛嵩憚夏言知之乃疏遣世蕃歸帝特命馳驛往還世蕃益橫二十七年春正月夏言罷嵩既忌言都督陸炳亦怨言持已隂比嵩圖之會都御史曽銑議復河套言主之而嵩則極言其不可語頗侵言及言請給誓劍得專僇節帥以下上亦稍稍惡之會澄城山崩裂又京師大風上益疑以套議問嵩嵩因詆言擅權自用及退復上疏劾銑開邊起釁言雷同誤國并自求去甚力上溫㫖留嵩而㘦責言于是吏部尚書聞淵禮部尚書費宷左都御史屠僑皆謂言誤國帝乃命緹騎捕銑至京因盡奪言師傅俾以尚書致仕三月殺都御史曾銑銑既被逮嚴嵩復令仇鸞訐之刑部侍郎詹瀚左都御史屠僑錦衣衛都督陸炳阿嵩意謂銑行賄夏言論斬棄西市冬十月殺大學士夏言先是言既歸舟至丹陽復就逮至京上疏極陳為嚴嵩所陷帝不聽刑部尚書喻茂堅等據曽銑律以請而謂言實當入議所謂議貴議能者帝怒責茂堅等阿附言值居庸報警嵩復以開釁力持竟坐與銑交通律棄西市言既死大權悉歸嵩矣十二月給事中厲汝進劾嚴嵩及子世蕃奸惡謫為典史尋以大計削籍二十八年五月杖給事中沈束于闕廷初大同總兵周尚文屢立邊功卒其家奏求恤典不報沈束上疏請恤尚文語侵嚴嵩嵩恚乃下束法司訊鞫法司論贖刑上嵩恨未泄仍豫廷杖長繫鎮撫司二十九年夏六月以仇鸞為宣大總兵鸞坐廢已久以重賂嚴世蕃得之八月加嚴嵩上柱國嵩力辭謂人臣無上引郭子儀不敢當尚書令為比帝悅進嚴世蕃為太常寺卿仍行尚寶司事諳達薄都城令人持書入朝求入貢言多悖嫚上召嚴嵩及禮部尚書徐階于西苑曰事勢至此奈何嵩曰此窮寇乞食耳毋足患帝曰何以應之嵩無以對乃命階集羣臣議司業趙貞吉抗言其不可帝壯之豫金五萬募戰士而敕中無督戰語不得統攝諸將因謁嵩嵩故與貞吉有郤辭貞吉怒㑹通政趙文華趨入謂曰公休矣天下事當徐議之貞吉愈怒罵曰汝權門犬何知天下事叱守門者嵩大恨已而貞吉單騎出城遍諭諸營將諸將皆感奮而大將軍仇鸞獨難之比復命嵩謂貞吉狂誕且追論其申理周尚文沈束非是廷杖謫嶺南殺兵部尚書丁汝蘷初諳達薄都城嵩授汝蘷計謂地近喪師難掩當令諸將勿輕戰寇飽自去諸將固怯戰輒相謂曰有禁勿戰故民間歸罪汝蘷及被逮嵩恐露前畫紿曰毋慮吾為若地汝蘷信之弗自辨臨刑乃大呼曰賊嵩誤我遂棄市冬十二月帝以諳達故詔羣臣令人人盡言刑部郎中徐學詩上言外攘之備在急修內治內治之要貴先正本原今大學士嵩位極人臣貪瀆無厭內而勛貴之結納外而羣小之趨承輔政十年日甚一日釀成敵患其來有漸而嵩泄泄自得謬引佳兵不詳之說以漫清問縱子世蕃受失事李鳯鳴金使任薊州總兵又受郭琮金使補漕運私徒南還輜車數十乘軿車四十乘潞河樓船十餘艘貯載而歸悉假别署封識以誑道路嵩謀已得如君父何今士大夫語嵩父子無不嘆憤而莫有一人敢抵牾者誠以內外盤結上下比周積久而勢成也世蕃狡鷙擅執父政凡諸司奏請稍涉疑畏者必關白然後上聞蓋嵩之機械足以先發制人利勢足以廣交耳目乘機搆隙足以示威脅衆文詞便給足以飾非强辨精神敏給揣摩巧中足以趨避利害而彌縫闕失私交密會令色脂言足以結歡當路而緘奪人口故凡諸論嵩者嵩雖不能顯禍之于正言直指之時亦必托事假人隂中之于遷除考察之際如給事中王煜陳愷御史謝瑜童漢臣等當時已䝉聖恩寬宥今則安在天下之人視嵩父子如鬼如蜮不可測識痛心疾首敢怒而不敢言者誠畏其隂中之也臣請亟罷嵩父子以清本源疏入帝謂其乘間報復下鎮撫司拷訊斥為民三十年春正月杖錦衣衛經歷沈錬于闕廷初諳達薄都城求通貢趙貞吉以為不可錬在衆中申貞吉指不休吏部尚書夏邦竒目之曰何小吏而言若是錬曰大吏弗言故小吏言之已而上疏請以萬騎護陵寢萬騎護通州軍儲而合勤王師邀擊其惰歸必大捷是時大學士嵩用事數寢格邊檄不以上聞故錬書奏不報錬乃抗疏言嵩受國重任貪婪愚鄙不聞咨諏方略治國安邊惟與子世蕃為全家保妻子計以朝廷之賞罰為已出故人皆計嵩愛僧不知朝廷恩威因歷數其十大罪請戮之以謝天下詔以錬詆誣大臣廷杖之謫田保安三月大計京官嚴嵩授指吏部中傷善類甚衆以徐學詩劾已削籍并黜其兄中書舍人應豐吏部奏上帝察其枉留之然亦不問三十一年冬十月御史王宗茂疏論嚴嵩負國大罪入帝謂其狂率謫平陽縣丞三十二年春正月朔日食隂雨不見巡按御史趙錦請罷嵩以應天變疏上帝方以供奉青詞悅嵩命逮繫錦衣獄久之削籍為民兵部員外郎楊繼盛上疏論嚴嵩十大罪五奸略曰方今在外之賊為諳達在內之賊惟嚴嵩賊有內外攻宜有先後未有內賊不去而外賊可除者故臣請誅賊嵩當在勦絶諳達之先嵩之罪惡徐學詩沈錬王宗茂等論之已詳然皆止言貪汚之小而未嘗發其僣竊之大去年春雷久不聲占云大臣專政夫大臣專政孰有過于嵩者又冬日下有赤色占云下有叛臣凡心背君者皆叛也夫人臣背君又孰有過于嵩者如四方地震與夫日月交食之變其災皆感應賊嵩之身乃日侍左右而不覺上天警告之心亦恐怠且孤矣不意陛下聰明剛斷乃甘受嵩欺人言不信雖上天示警亦不省悟以至于此臣敢以嵩之專政叛君十大罪為陛下陳之我太祖高皇帝詔罷中書丞相而立五府九卿分理庶政殿閣之臣唯備顧問視制草故載諸訓有曰建言設立丞相者本人凌遲全家處死及嵩為輔臣儼然以丞相自居挾一人之權侵百司之事凡府部題覆先面禀而後敢啓藁嵩之直房百官奔走如市府部堂司嵩指使絡繹不絶一或少違顯禍立見及至失事又駕罪于人是嵩無丞相之名而有丞相之權有丞相之權而無丞相之責壞祖宗之成法一大罪也權者人君所以統御天下之具不可一日下移嵩一以票本自任遂作威福用一人即先謂曰我薦之也罰一人則又號于衆曰此得罪于我故報之也羣臣感嵩甚于感陛下畏嵩甚于畏陛下竊君上之大權二大罪也人臣善則稱君過則歸已今陛下茍有一善嵩必令子世蕃𫝊于人曰上故無此意我議而成之將聖諭及嵩所進揭帖刻板刋行為書名曰嘉靖疏義欲使天下後世謂陛下所行之善盡出于彼而後已掩君上之治功三大罪也陛下之令嵩票本蓋取君逸臣勞義也嵩何所取而令子世蕃代票又何所取而約諸義子趙文華等羣會而擬題疏方上滿朝紛然既下若合符契如錦衣衛經歷沈錬劾嵩疏發大學士李本擬㫖本即叩之世蕃乃同趙文華自擬以上此人所共知也嵩既以臣而弄君之權世蕃復以子而弄父之柄京師有大丞相小丞相之謠縱姦子之僣竊四大罪也邊事廢壞皆原于功罪賞罰之不明嵩為輔臣欲令孫冒功于兩廣故置其表姪歐陽必進為總督朋奸比黨將長孫嚴效忠冒功奏捷遂升鎮撫效忠告病嚴鵠襲代加升錦衣千戶效忠嚴鵠皆世蕃豢養乳臭子冒朝廷之軍功五大罪也仇鸞總兵甘肅以貪虐論革世蕃乃受鸞重賄薦為大將後知陛下疑鸞遂互相誹謗以掩初迹是通寇者逆鸞而受賄引用鸞者嵩與世蕃也進不肖䝉顯戮引悖逆之奸臣六大罪也諳達犯內深入兵法擊其惰歸嵩乃曰京邊不同勢敗子邊可掩敗于京不可掩且諳達飽自退耳故丁汝蘷傳令不戰及汝蘷臨刑而後知為嵩所紿誤國家之軍機七大罪也刑部郎中徐學詩以論劾嵩世蕃革任為民矣又于考察京官之時罷其兄中書舍人徐應豐戶科給事中厲汝進以劾嵩世蕃降為典史矣嵩于考察外官之時逼吏部削汝進籍夫考察巨典也陛下持之以激厲天下之人心賊嵩竊之以中傷天下之善類亂黜陟之大柄八大罪也府部之權皆撓于嵩而吏兵二部尤大利所在將官既納賄于嵩不得不剝削乎軍士有司既納賄于嵩不得不濫取于百姓皇上雖纍加撫恤豈足以當嵩殘虐之害臣恐天下之患不在塞外而在域中失天下之人心九大罪也先朝風俗淳厚近自逆瑾用事始一少變至嵩為輔臣守法度者以為固滯尚巧滑者以為通材勵節介者以為矯激善奔走者以為練事風俗之壞未有甚于此者壞天下之風俗十大罪也嵩有十大罪昭人耳目以陛下之神聖而若不知者蓋有五奸以濟之嵩知知陛下之意向者莫過于左右侍從厚以賄結之聖意所愛憎嵩皆預知以得遂其逢迎之巧是陛下之左右皆嵩之間諜其奸一通政司納言之官嵩令義子趙文華為之凡疏到必有副本送嵩世蕃先閲而後進早為彌縫是陛下之納言乃嵩之鷹犬其奸二嵩既內外周密所畏者厰衛之緝訪也嵩則令世蕃籠絡厰衛締結姻親陛下試詰嵩所娶者誰女立可見矣是陛下之爪牙乃嵩之瓜葛其姦三厰衛既已親矣所畏者科道言之也嵩于進士之初非親知不得與中書行人之選知縣推官非通賄不得與給事御史之列是陛下之耳目皆嵩之奴𨽻其姦四科道雖入其牢籠而部臣如徐學詩之類亦可懼也嵩又令子世蕃將各部之有才望者俱網羅門下各官少有怨望者嵩得早為斥逐是陛下之臣工多嵩之心腹其奸五夫嵩之十罪賴此五奸以濟之五奸一破則十罪立見陛下何不忍割一賊臣顧忍百萬蒼生之塗炭乎陛下聽臣之言察嵩之奸或召問二王令其面陳嵩惡或詢諸閣臣諭以勿畏嵩威重則置之憲典以正國法輕則論令致仕以全國體內賊去而後外賊可除也疏奏帝怒其引用二王命繫錦衣獄詰訊主使者繼盛曰盡忠在已豈必人主使乎又問引用二王故繼盛大言曰奸臣誤國非二王誰不畏嵩者獄具杖百送刑部尚書何鰲受嵩意欲坐以詐傳親王令㫖郎中史朝賓曰疏中但云二王亦知嵩惡原無親王令㫖三尺法豈可誣也嵩怒降朝賓為高郵判官侍郎王學益助成其說竟坐絞繫獄二月逮兵部郎中周冕下詔獄初楊繼盛劾嚴嵩父子言及歐陽必進竄嚴效忠名冒功濫擢事必進上疏辨請下兵部查核世蕃乃自為題草遣人遺武選司郎中周冕欲冕依草上覆冕奏之略曰臣職司武職敢以冒濫軍功一事為陛下陳之按二十七年十月據通政司狀送嚴效忠年十有六考武舉不第志欲報效本部資送兩廣聽用次年據兩廣總兵平江伯陳圭及都御史歐陽必進題瓊州黎寇平遣效忠奏捷即援故事授錦衣衛鎮撫無何效忠病廢嚴鵠以親弟應襲又言效忠前斬賊首七級例宜加升遂授千戶問效忠為誰曰嵩之厮役也鵠為誰曰世蕃之子也不意嵩表率百僚而壞朝亂紀一至于此今䝉明㫖下本部查核世蕃猶私創覆草架虛遺臣欲臣依草覆奏天地鬼神照臨在上其草見存伏望聖明特賜究正使內外臣工知有不可犯之法疏入帝以冕為挾私逮繫詔獄削籍嚴嵩以十五載考滿録其二子又以京師外城完嵩與有閲視勞遷世蕃為工部左侍郎嵩辭帝諭以修城贊𤣥實為忠首不允三十三年春倭寇浙江工部侍郎趙文華請禱海神殺賊遂遣文華如浙初文華為主事有貪名出為州判以賄嵩得復入為郎未幾改通政與嵩子世蕃比周嵩目為義子不二年擢工部侍郎至是往浙凌轢言吏搜括財物公私苦之三十四年冬十月殺兵部員外楊繼盛初仇鸞既誅上思繼盛言自謫所月餘遷主事隨改兵部武選司員外繼盛嘗感激思報妻張氏曰公休矣一鸞困公幾死今相公嵩父子百鸞也公何以報為休矣且歸耳繼盛不聽密具疏疏成上方怒逮諸言官乃更越十五日而齊齊三日乃上竟得罪繼盛每出朝審諸內臣士庶夾道擁視共指曰此天下義士又指其三木竊嘆曰奈何不以此囊嵩頭司業王材詣嵩曰人言籍籍謂繼盛且不免公不憂萬世耶嵩曰吾行當救之令其子世蕃謀之胡植鄢懋卿懋卿曰此養虎自遺患也植亦言不可嵩意遂决乃以張經李天寵疏覆奏附繼盛于尾上覽之謂江南釀寇遺患遂下㫖行刑是歲論大辟當刑者凡百餘人詔决九人而繼盛與焉將刑張氏疏言臣夫諌阻馬市預伐仇鸞聖㫖薄謫旋因鸞敗首賜湔雪一歲四遷臣夫銜恩圖報誤聞市井之言尚狃書生之見妄有陳說荷上不即加戮俾從吏議杖後入獄割肉二斤斷筋二條日夜籠􅀈備諸苦楚年荒家貧臣紡績供給兩賜奏俱䝉特宥今混入張經疏尾奉㫖處决儻以罪不可赦乞將臣梟首以代夫命夫生一日必能執戈矛禦魑魅為疆場效命之鬼以報陛下奏入為嵩所抑不得逹蓋殺諌臣自此始由是天下益惡嵩父子矣三十五年春正月趙文華自江南還京與吏部尚書季默搆隙知默與嵩異疏劾之摘其部選䇿題有漢武征四夷而海內虛耗唐憲復淮蔡而晚業不終為謗訕上怒收繫獄拷訊竟死獄中嵩德文華擢為工部尚書加太子太保二月以大學士李本攝吏部事本疏諸臣百十有三人别為三等其上二十八人吳鵬趙文華嚴世蕃等其中七十人鄢懋卿徐履祥等其下十五人宜斥免乃葛守禮艾守淳等多可大用者時論非之十一月逮總兵俞大猷下錦衣衛獄大猷不善滑刺世蕃怒其不附已授胡宗憲意論其失事故有是逮逮至大猷假貸三千金餽世蕃得不死罷職發大同立功時有建議薊州增設戶部侍郎督糧練兵者嚴嵩佯以推趙貞吉且召之飲酒詭曰是行非公不可貞吉曰人臣之義死生以之酒半貞吉徐曰今戶侍督糧督京運乎抑民運乎若二運已有職掌徒增擾耳况兵之不練其過宜不在是縱十戶侍出無益也嵩作色而罷嗾其黨張益劾之奪官去十二月賜大學士嚴嵩免朝賀惟入直西苑仍賜腰輿先是賜得乘馬入禁至是復加恩寵為異數云三十六年冬十月楊順路楷殺前錦衣衛經歷沈錬初錬既編保安即孑身至里長老問知錬狀咸大喜遣其子弟從學錬稍與語忠義大節乃爭為錬詈嵩以快錬錬亦大喜日相與詈嵩父子以為常嘗束芻為偶人三目為林甫檜及嵩而射之語稍稍聞嵩父子銜之而侍郎楊順來為總督故嵩黨也應州之役多殺邊民掩敗錬怒讓之且為樂府以誚順順大恚以其私人經歷金紹魯指揮羅鎧走世蕃所白之且謂錬結死士擊劍習射將以間而取若父子世蕃曰吾固知之即以屬巡按御史李鳯毛鳯毛謬為謝曰有之竊隂已解散其黨矣鳯毛得代歸而御史路楷來又嵩黨也世蕃為酒壽楷而使謂順曰幸為我除吾瘍楷至則與順合策捕諸白蓮教通叛者竄錬名籍中以叛聞下兵部議尚書許論不為申理嵩竟殺之籍其家嵩乃豫順一子錦衣千戶楷遷太常卿順猶怏怏曰丞相猶有所不足乎謀之楷復取錬二子杖殺之併繫其長子襄順楷敗乃得脫十二月趙文華罷文華自浙歸私行珍寶于嵩夫婦及世蕃至入內室叩首嵩妻嵩妻勞苦文華謂相公尚不能為郎君易腰帶耶兼以李默故嵩亟稱文華于帝進位尚書躐加太子太保然文華得寵眷乃稍欲結知帝不禀嵩命一日密進藥酒方言授之仙飲可不死獨臣與嵩知之帝曰嵩有是方不奏乃文華奏我嵩聞之大懼且恨立召文華問之曰若何所獻對曰無有嵩取疏示之文華慚頓首謝罪嵩怒不令起呼左右拽出令門者毋得為文華通文華日憂懼不知所出從世蕃乞憐為白夫人夫人以其兒也憐之一日嵩休沭諸義兒及世蕃咸候起居置酒堂上嵩夫人上坐義兒及世蕃侍列文華遙望不得入乃曲賂左右伏軒櫺下酒中夫人曰今日舉家在座何少文華嵩嘻曰阿奴負人那得在此夫人因宛轉暴白嵩色微和文華竊望見遽走入伏席前涕泣嵩不得已遂留侍飲然意未慊也又文華初賂世蕃金絲幕一具其姫二十七人皆寶髻一世蕃以為薄恨之乃為疏草使上引疾歸帝從之而是時帝方修𤣥以其疏中有病語怒削其職子戍邊三十七年三月給事中吳時來上疏劾嚴嵩輔政十二年引用匪人邊事日壞令其子世蕃入直干預國政窺覘幾微以市私恩引其親萬宷為文選郎中方祥為職方郎中比周為奸公行賄賂進退一人行止一事必關白世蕃不論賢否是非唯視所入多寡如趙文華南還餽遺數萬猶為未足而授草引疾張經被逮行金五千及聖斷不貸而為治裝賻恤王汝孝失律以三千而得遣戍蔡克卿撫淮陽以三千而轉地卿楊順誤國而三䕃其子吳嘉會修邊侵冒而驟遷三官邊事之不振由于軍民之困窮軍民之困窮由于上官之貪縱上官之貪縱由于謀國之匪人拔本塞源之喻願皇上察之主事張翀董傳䇿亦交章論之俱下獄廷杖謫戍嶺南三十八年夏五月逮總督侍郎王忬下獄論死嚴嵩以忬愍楊繼盛死銜之忬子世貞又從繼盛遊為之經紀其喪弔以詩嵩因深憾忬嚴世蕃嘗求古畫于忬忬有臨幅類真者以獻世蕃知之益怒㑹灤河之警鄢懋卿乃以嵩意為草授御史方輅令劾忬嵩即擬㫖逮繫爰書具刑部尚書鄭曉擬謫戍奏上竟以邊吏陷城律棄市三十九年夏六月以都御史鄢懋卿總理天下鹽運懋卿益通賄無虛日御史林潤劾其貪冒五罪懋卿疏辨不問四十年春正月以萬壽宫災命大學士徐階工部尚書雷禮興工重建先是嚴嵩在內閣凡御札下問辭㫖深奧西苑𤣥修聖躬臥起不常外廷得失時厪于懷內侍𫝊出或早或暮嵩耄而智昏多瞪目不能解世蕃一見躍然揣摩曲中據之奏答悉當上意又隂結內侍纎悉馳報報必重賚每事必先有以待上益喜蓋上不能一日亡嵩嵩又不能一日亡其子也專政既久諸司以事請裁嵩必曰與小兒議之甚曰與東樓議之東樓世蕃别號也世蕃益自恣一時無行之士債帥墨吏羣然趨之嵩妻歐陽氏嘗語嵩曰不記鈐山堂二十年清寂耶嵩甚愧之馭世蕃尤嚴歐陽氏卒世蕃當護喪歸嵩上言臣老無他子乞留侍許之以孫鵠代行世蕃因大佚樂干預各司事如故然不得入直房代議間飛札走問則世蕃方擁諸姬狎客徴逐胡盧不甚了了亦不能得當如往時中使守直房迫促嵩引領待片紙不得至乃自以意對既至追還復改大抵故步皆失上不懌頗聞世蕃淫縱心惡之㑹方士藍道行以扶鸞見得幸上以為神一日從容問輔臣賢否道行遂詐為箕仙對具言嵩父子弄權狀上曰果爾上𤣥何不殛之詭曰留待皇帝正法上默然適萬壽宫災宫在西苑上自壬寅宫變即移于此不復居大內忽火作乘輿服御皆燬上暫居玉熙宫隘甚邑邑不樂廷臣請還大內上以列聖宴駕于此不報嵩請徙南內故英宗幽錮所也大不樂次相徐階與尚書禮疏并力營新宫上喜報允自是凡軍國大事悉咨之階間有嵩者不過齊醮符籙之類而已十二月吏部尚書吳鵬罷鵬嚴嵩黨也先是御史耿定向劾其六罪故罷嵩復薦所親歐陽必進代之未久亦勒歸進禮部尚書袁煒太子太保入閣恭預機務時帝漸有疑嵩意密諭徐階舉堪輔政者階密奏曰人君以論相為職陛下斷自宸衷則窺伺隂阻之私自塞矣帝從之遂有是命四十一年三月萬壽宫成加大學士徐階少師任一子袁煒少保嵩加祿百石而已五月嚴嵩罷猶給歲祿繫其子世蕃詔獄以御史鄒應龍為通政司恭議初嵩見張璁夏言以言禮驟貴乃從㬰興獻帝稱宗祔太廟眷遇日隆人言不復入自徐學詩王宗茂楊繼盛沈錬吳時來張翀董傳䇿或死或戍縉紳側目不敢言至是徐階日親用事廷臣多知之未發御史鄒應龍欲具疏一夕夢出獵見一高山射之不中東有培壘樓其下甚壯樓俯平田有米草覆其上一注矢拉然醒而悟曰此小兒東樓之兆也遂上疏劾世蕃數其通賄賂行諸不法狀乞置于理因及嵩植黨蔽賢溺愛惡子且曰如臣言不實願斬臣首懸之藁竿以謝世蕃父子帝覽之心動命嵩致仕乘傳去而下世蕃于理擢應龍嘉其敢言世蕃因行金內侍云鄒應龍疏皆藍道行泄之帝怒并逮道行鄢懋卿萬宷復私致道行許以金令其委罪徐階則無事矣道行大言曰除貪官自是皇上本意糾貪罪自是御史本職何與徐閣老事懋卿宷懼乃囑法司量坐世蕃贓銀八百兩擬罪上請于是戍世蕃雷州衛子嚴鵠嚴鴻及其爪牙羅龍文牛信等分戍邊逺衛家人嚴年錮獄追贓年最黠惡即士大夫所呼為蕚山先生者也上猶以嵩故特宥其孫鴻為民嵩既去上追思嵩贊𤣥功意忽忽不樂諭徐階欲遂傳位退居西內專祈長生階極言不可上曰卿等即不欲違大義必天下皆仰奉君命闡𤣥修仙乃可嚴嵩已退伊子已伏罪敢有再言同鄒應龍者俱斬嵩知上意已動仍密賂左右發道行怙寵招權諸奸利道行亦下獄論死六月御史鄭洛劾大理卿萬寀刑部侍郎鄢懋卿太常少卿萬虞龍皆朋比奸贓不職宷懋卿罷虞龍降調九月給事中趙灼劾工部侍郎劉伯躍刑部侍郎何遷右通政胡汝霖光祿少卿白啓常副使袁應樞給事中沈淳劾湖廣巡撫都御史張雨給事中陳瓚劾諭德唐汝楫國子祭酒王材俱罷去伯躍女適嚴嵩之甥應樞嵩壻遷撫江西時厚斂遺嵩父子汝霖雨貪肆不簡啓常匿喪遷光祿入世蕃幕至以粉墨塗面為歡笑汝楫吏部尚書龍之子以父事嵩得及第世蕃弟畜之與材俱出入臥內交通請托至是士論大快之四十二年夏四月嚴嵩具奏起居并進祈鶴文及各宗祕法上優詔答之仍賜銀幣始嵩之致仕歸也至南昌值聖誕即鐵柱觀延道士藍田玉等為上建醮玉自言能書符召鶴嵩試之良驗㑹上遣御史姜警王大任訪祕法嵩乃索玉所藏諸符籙以上久之疏言臣年八十四惟一子世蕃及孫鵠俱赴戍千里之外臣一旦先狗馬填溝壑誰可托以後事惟陛下哀其無告特賜放歸終臣餘年上曰嵩有孫鴻侍養已恩逮矣竟不許世蕃未逹雷州至南雄而返龍文亦逃伍潛住歙縣藏匿亡命刺客一日被酒大言曰要當取應龍與徐老頭泄此恨階聞厚為備嵩久之亦聞驚曰兒誤我多矣幸聖恩善歸汝雖行戍猶在枕席上久可望赦若作此舉止如武元衡故事橫尸都門上方眷徐厚升應龍官一震全族沉矣初階之入政府也肩隨嵩者且十年幾不敢講鈞禮嵩懲夏言禍亦頗自恭謹惟世蕃多行無禮階既曲忍嵩亦不知也方應龍疏上階往謁慰藉甚嵩喜頓首謝世蕃亦盡出妻子為托既歸其子密啓曰大人受侮已極此其時已階僞罵曰吾非嚴氏不至此負心為難人將不食吾餘嵩遣所親探之語如前蓋階亦知上猶眷戀未能即割也嵩既去書問不絶久之世蕃亦忘舊事謂徐老不我毒鳩工大治館舍隂賊彌甚先是伊王不法納數萬金求援嵩既歸遣校尉樂工三十餘人走分宜坐索如數與之密遣人邀于湖口盡劫殺取前資以歸其他睚眦必報類如此嵩益老謬示恭謹而終不能禁世蕃世蕃勢益橫四十三年冬十月復逮嚴世蕃下獄先是御史林潤既劾鄢懋卿罷去知讐在必報㑹袁州推官郭諌臣以公事過嵩里工匠千餘方治園亭其僕為督諌臣至箕踞不起役人戲以瓦礫擲諌臣亦不禁或尤之曰京堂科道官候主人門叱嗟誰敢動此何為者諌臣遂具揭上之潤潤得之大喜乃上疏言臣巡視上江備訪江洋盜賊多入逃軍羅龍文之家龍文下築深山乘軒衣蟒有負險不臣之志推嚴世蕃為主事之世蕃自罪謫之後愈肆凶頑日夜與龍文誹謗朝政動搖人心近者假治第聚衆至四千人道路洶洶咸謂變且不測乞早正刑章以絶禍本疏入詔以世蕃龍文即付潤逮捕至京潤下郭諌臣捕世蕃徽州府推官栗祁捕龍文自駐九江勒兵以待四十三年三月嚴嵩削籍沒其家其子世蕃及羅龍文俱棄市初林潤聞命馳至九江郭諌臣白監司盡散其工匠四千人龍文走匿世蕃家捕得之潤因諭袁州府詳具嚴氏諸暴橫狀得之復上疏數世蕃父子罪略曰世蕃罪惡積非一日任彭孔為主謀羅龍文為羽翼惡子嚴鵠嚴珍為爪牙占會城厫倉吞宗藩府第奪平民房而又改釐祝之宫以為家祠鑿穿城之池以象西海直欄橫檻峻宇雕墻巍然朝堂之規模也袁城之中列為五府南府居鵠西府居鴻東府居紹慶中府居紹庠而嵩與世蕃則居相府招四方之亡命為護衛之壯丁森然分封之儀度也總天下之貨寶盡入其家世蕃已踰天府諸子各冠東南雖豪僕嚴年謀客彭孔家資亦稱億萬民窮盜起職此之由而曰朝廷無如我富粉黛之女列屋駢居衣皆龍鳯之文飾盡珠玉之寶張象床圍金幄朝歌夜絃宣淫無度而曰朝廷無如我樂甚者畜養厮徒招納叛卒旦則伐鼓而聚暮則鳴金而解郭寧三劉相誼洪斗段回等數十百人明稱官舍出沒江廣劫掠士民其家人壽二銀一等隂養刺客昏夜殺人奪人子女諉人金錢半歲之間事發者二十有七而且包藏禍心隂結典楧在朝則為寧賢居鄉則為宸濠以一人之身而總羣奸之惡雖赤其族猶有餘辜嚴嵩不顧子未赴伍朦朧請移近衛既奉明㫖居然藏匿以國法為不足遵以公議為不足恤世蕃稔惡有司受詞數千盡送父嵩嵩閲其詞而處分之尚可諉于不知乎既知之又縱之又曲庇之此臣謂嵩不能無罪也疏入帝怒詔下法司訊狀世蕃猶抵掌曰任他燎原火自有倒海水已而聚其黨竊議自謂賄字自不可掩然非上所深惡聚衆以通倭之說得諷言官使削去而故填楊沈下獄為詞則上必激而怒上怒乃可脫也謀既定乃令其黨揚言之刑部尚書黃光升左都御史張永明大理寺卿張守直亦以為然依其言具稿詣徐階議之階固已豫知姑問稿安在吏出懷中以進閲畢曰法家斷案良佳延入內庭屏左右語曰諸君子謂嚴公子當死乎生乎曰死不足贖然則此案將殺之乎生之乎曰用楊沈正欲抵死階徐曰别自有說楊沈事誠犯天下公惡然楊以計中上所諱取特㫖沈暗入招中取泛㫖上英明豈肯自引為過一入覽疑法司借嚴氏歸過于上必震怒在事者皆不免嚴公子騎欵段出都門矣衆愕然請更議曰稍遲事且泄從中敗事者必多事且變今當以原疏為主而闡發聚衆本謀以試上意然須大司寇執筆謝不敢當羣以讓階階乃出一幅于䄂中曰擬議久矣諸公以為何如皆唯唯因曰前囑携印及寫本吏同至寧忘之乎皆曰已至即呼入扃戶令疾書用印封識而世蕃不知也竊自喜計行謂龍文曰諸人欲以爾我償楊沈命奈何龍文不應執其手耳語曰且鬯飲不十日釋縲絏善歸上因此念吾父别有恩命未可知雖然先取徐階首當無今日吾父養惡故至此今且歸矣用前計未晚誰謂阿儂智者龍文喜問故曰第俟之已而階改疏上但言其通賄僣侈狀且曰逆賊王直徽州人與羅龍文姻舊遂投金十萬于世蕃擬為授官凶藩典楧隂冀非常世蕃納其賄為護持向非聖神威斷或徙或誅則貽憂宗社矣世蕃罪擢髮難數陛下曲赦其死謫戍邊衛不思引咎輒自逃歸羅龍文招集王直餘黨謀與世蕃外投日本世蕃班頭牛信者徑自山海棄伍北走擬誘至北寇相為響應臣按世蕃所坐死罪非一而觖望排上尤為不道罪死不赦上覽疏曰此逆情非常爾等第述潤疏一過何以示天下其會都察院大理寺錦衣衛鞫訊具實以聞命下階䄂之出長安門法司官俱集階略問數語速至私第具疏以聞世蕃雖善探亦不得知也疏中極言事已勘實其交通倭寇潛謀叛逆具有顯證請亟正典刑以泄神人之憤上從之命斬世蕃龍文于市二人聞相抱哭家人請寫遺書謝其父不能成一字都人聞之大快各相約持酒至西市看行刑有譽階能剪大憝者蹙額曰彼殺桂洲我又殺其子人必有不亮者知我其天也已而籍嵩家得銀二百五萬五千餘兩其珍異充斥踰于天府江西巡按鞫彭孔及嚴氏家人得其蔽匿奸盜椎埋殺人及奪民田宅子女罪狀二十七人各遣配有差十一月山西巡按張檟言往者嚴嵩與逆子世蕃奸惡相濟皇上納言官鄒應龍議悉置之法而籍其家矣復顯陟應龍以旌其直第先年首發大奸諸臣如吳時來董傳䇿張翀王宗茂等或雜列戎行或流離瘴癘臣竊痛之乞赦過録用以旌直臣之節疏入上大怒命緹騎逮檟下于理十二月謫原任大理寺卿萬寀充邊衛軍廣西副使袁應樞充烟瘴軍下刑部侍郎鄢懋卿于巡按逮問尋亦遣戍亡何嵩寄食故舊以死谷應泰曰嚴嵩相世宗入于嘉靖二十年八月去位于嘉靖四十一年五月盤踞津要盜竊寵靈凡二十餘歲比之林甫相𤣥寵任十九載元載輔代驕佚十餘年嵩且過其厯矣考嵩以茸闒庸材黷貨嗜利帝號英睿竟稱魚水嵩遵何道哉或者謂其議禮贊𤣥曲當上㫖然議禮創自張桂嵩晚拾唾餘不足要結主歡惟佑贊𤣥功帝心感嵩夫加爵賜酺封禪用以媚臣民美酒明珠天書用以結朝貴英主好怪之心避謗之智方交戰于中而朱能造書寇凖召相桓談非䜟光武加誅桂洲胎禍于香冠分宜追思乎召鶴批逆鱗者無全功盜頷珠者有巧術也况嵩又真能事帝者帝以剛嵩以柔帝以驕嵩以謹帝以英察嵩以朴誠帝以獨斷嵩以孤立贓婪纍纍嵩即自服帝前人言籍籍嵩遂狼狽求歸帝且謂嵩能附我我自當憐嵩方且謂嵩之曲謹有如飛鳥依人即其好貨不過駑馬戀棧而諸臣攻之以無將指之以煬灶微特訐嵩且似汚帝帝怒不解嵩寵日固矣漢武寧用公孫賀田蚡不能用董仲舒汲黯德宗甚喜盧杞裴延齡甚不喜陸贄顔真卿猜忌之主喜用柔媚之臣理有固然無足怪者嗟乎嵩下有殺人之子上事好殺之君身之頻死固亦危矣又從而固寵持位鼓餘沫于焦釡餂殘膏于凶鋒二十七年殺曽銑是年殺夏言三十四年殺楊繼盛三十六年殺沈錬三十七年殺王忬假令嵩早以賄敗角巾里門士林不齒已矣乃至朝露之勢危于商鞅燎原之形不殊董卓非特嵩誤帝帝實誤嵩歐陽氏勸憶鈐山堂鄒御史夢射培壘樓霍山將誅第門自壞申生訴帝披髮見形嵩父子至此寧有死所乎夫羊舌之族將覆叔向之母已知獨惜世宗自負非常而明殺輔臣始于夏言明殺諫官始于繼盛大禮之獄猶云母子之恩為其太甚夏楊之誅乃以憸壬之相甘為戎首萊朱貽戒于自用仲尼致恨于鄙夫其所由來也久矣明史紀事本末卷五十四
