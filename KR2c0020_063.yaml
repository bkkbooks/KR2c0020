body:
  text: 明史紀事本末卷六十三浙江提學僉事谷應泰編平巴拜神宗萬厯二十年二月寧夏巴拜亂拜故韃靼種也嘉靖中拜得罪其酋長父兄皆見殺拜伏水草中得免來投守備鄭印𨽻麾下驍勇屢立戰功歷升都指揮拜妻施氏孕將産拜夢空中大響天裂出火熖一妖物如虎入施脅下不見拜急手劍之驚覺遂産子狼貌梟蹄名曰承恩萬厯十七年拜加副總兵致仕子承恩襲十九年洮河告警上遣科臣巡九邊尚寶丞周宏禴以御史往寧夏舉承恩及指揮土文秀併拜義子哱雲等拜雖請老居恆多畜蒼頭軍聲稱報國會經略鄭洛檄夏鎮調發巡撫党馨奉檄遣文秀率千騎西援拜驚曰文秀雖經戰陳恐不能獨將乃詣洛轅門願以所部三千人與子承恩從征洛壯而許之馨惡其自薦馬羸者不與易有餘馬亦不給拜拜怏怏去至金城見諸鎮兵皆出其下賊平馳還取徑塞外戎騎辟易不敢逼遂有輕中外心恣睢驕橫党馨每裁抑之且欲核拜冒糧罪而承恩以强娶民女為妾箠之二十哱雲文秀又以升授事怨馨會鎮戍請冬衣布花月糧久勿給坐營江廷輔請給前銀以安衆心馨曰此有挾而求漸不可長彼不畏族乎軍鋒劉東𤾉拔撫署前鹿角作忿狀拜嗾之曰若等任為之遂羣哄不可制東𤾉者靖鹵衛人素梟桀有異志於是紏黨晨入帥府白事總兵張維忠素鮮威望為衆所輕見衆驚懾不能彈壓衆露刃執副使石繼芳擁入軍門党馨急匿水洞索得劫至書院同繼芳僇之時二月十八日事也遂縱火焚公署收符印釋囚掠城中劫張維忠以侵糧激變報時河東僉事隨府通政穆來輔適抵鎮賊并劫之請招安以緩師二十日總督尚書魏學曾行部花馬池聞變遣標下張雲郜寵諭降二十三日哱雲土文秀統兵五百自中衛互市歸合叛卒殺遊擊梁琦守備馬承光二十五日索敕印維忠與之自縊死東𤾉遂自稱總兵聽拜主謀據城刑牲而盟授承恩許朝左右副總兵土文秀哱雲左右參將挾慶王代請貰罪承恩乃勒兵分遣王虎何安等據城堡會張雲等至東𤾉曰必欲我降依我所自署授官世守寧夏不者與套騎馳潼關也承恩徇玉泉營遊擊傅垣拒守千户陳繼武執垣降徇中衛徇廣武恭將熊國臣棄城匿河西望風而靡惟土文秀徇平鹵恭將蕭如薰堅守不下如薰妻楊氏總督尚書兆之女也謂如薰曰若為忠臣妾何難為忠婦盡出簮珥勞軍士妻帥之守城賊攻圍數月竟不能克賊又率兵過河欲取靈州齎金帛誘套部卓哩克圗等許以花馬池一帶聽其駐牧勢大猖獗全陝震動三月四日副總兵李昫奉總督魏學曾檄攝總兵進勦統遊擊吳顯趨靈州别遣遊擊趙武趨鳴沙州張奇兵沿河扼賊南渡轉戰獲賊于正等八人舟十八艘賊鋒少挫總督駐下馬關徴調時靈州裨將吳世顯黨逆約是月九日與賊應恭將來保誓死守賊齎書詐門拒却之昫聞急與吳顯兼程馳赴逆謀始折翼日調延綏蘭靖兵稍集昫乃分遣渡河收復營堡廣武僞遊擊張天紀大壩僞守備高天爵俱遁十五日復棗園堡靖鹵恭將吳繼祖搗中衛擒賊黨王虎石空寺堡亦下獲僞守備何安二十日套部千騎薄邵剛堡千總汪汝漢發三矢殺三人乃解去進復玉泉營凡先後收還營堡四十七河西唯鎮城為賊據後三日總督移師小鹽池拜聞套部且至屬土文秀許朝分馳迎之二十五日卓哩克圗打正等引控弦三千騎馳金貴堡二十七日移鎮河堡入屯演武場賊益掠城中子女媚之奉河東西地圖套人聲言已與哱王子為一家拜文秀並易服合兵攻玉泉急二十九日哱雲引卓哩克圗攻平鹵堡恭將蕭如薰伏兵南關佯敗誘之入伏射雲死併傷驍賊吳敖霸套部遁出塞因掠糧道聲犯花馬池諸處趙武駐玉泉被困急李昫馳赴之圍亦解昫會原任總兵牛秉忠督六路兵翼日抵鎮城下時總兵已擢董一奎李蕡副之官兵抵城下賊東北二門各出精騎二千摶戰步卒列火車為營四月五日我師衝鋒奪火車百餘輛追奔入河溺死賊無算延綏副總兵王通戰尤力其家丁高益等三人乘勝先登殺入北門招榆林諸帥兵為後繼不至被殺通亦傷額榆林遊擊俞尚德戰死翼日許朝土文秀脅慶王至東城上樓乞暫罷兵願縛首惡獻劉川白金等謾語支吾顧投誥勑城下示無所畏拜妻施氏時諫不聽又翟珮而立謂拜曰比何來悖德不祥奈何自取竒禍承恩推跌去之登南城遙謂都司李鯤曰吾父出萬死為國捍邊䝉恩至上將撫臣朘削激變自取滅亡吾父子勒部曲待命當事不察反以為罪今首惡具在乃不罪倡亂罪戢亂者吾寧保此完城結塞北自全耳會官軍糗糧乏遂假此休士近堡總督日夜促芻餉調延綏莊浪兵乃以二十一日進攻復抵城下塹濠竪雲梯夾攻賊迎敵多殺傷承恩與東𤾉勒精騎潜伏從延渠掠我糧餉二百餘車先是衆議以李蕡非衝邊才乃調麻貴自戍所代之貴素以勇聞且多蒼頭軍至是軍亦至二十九日夜貴等乘風縱火復以雲梯攻城賊豫治滚木礧石待擲火燃燒我兵千數賊日恣淫虐城中婦女寶貨已經搜括尚根索不已死者甚衆至迫脅慶府甚急妃方氏懼辱拔劍將自刎保母抱持并世子匿土窖中以被服置井上環哭賊見信為溺盡取金帛及他宫人去比發窖妃已死矣總督凡用兵兩月無成功憂之或謂招劉許隂授意殺巴拜父子立功贖罪無不應者督府然其謀遣家丁葉得新往見時四人方約共死生不可間暴其謀執得新折脛下獄命李如松總寧夏兵浙江道御史梅國楨監其軍時言者謂李氏握重兵不宜拒虎進狼而國楨力保如松忠勇可任故有是命巡撫寧夏已推朱正色甘肅都御史葉夢熊上書願討賊詔協力赴之五月巡撫朱正色渡河督戰以上命頒將士賞一軍踴躍賊聞詭請降以張傑嘗總寧夏兵與拜交善追入城招安傑單騎往切責之許朝乃述葉得新用間謀殺語傑未信即舁至使吐實得新大罵曰死狗賊計不得行命也天旦夕磔汝何喋喋為朝怒攢刀殺之傑亦被繫時頓兵數月未能即下乃重懸賞格購巴拜等上特賜總督魏學曾劔違者立斬六月都御史葉夢熊至靈州從甘州攜神炮火器四百車至更約法益徴苗兵會浙江巡撫常居敬募浙江千人糗糧自辦詔嘉其忠調赴寧夏於是分為五軍董一奎攻其南牛秉忠攻其東李昫攻其西劉承嗣攻其北而麻貴率遊兵䇿應二十日並逼城下巴拜自北門出戰意欲自往勾套部麻貴率恭將馬孔英先登赴敵逐拜入城擒斬百十七先是拜與套部深相結日夜從卓哩克圗帳中便調度至是入城不得出套部不得拜亦不敢復渡河深入二十二日御史梅國楨提督李如松統遼東宣大山西兵膺集軍聲大振賊嬰城自守國楨樹受降旗于城南賊因索面陳歸順許之東𤾉許朝等梯城而下劔㦸鱗次刃芒曜目城上皆控弦注矢以待國楨䇿騎直前朝大驚不覺膝之屈也然賊實紿我無降意自此盡力攻城矣二十五日我師用布袋三萬盛土填集登城為炮石擊却都司李如樟夜半以雲梯上南城翼日遊擊龔子敬提苗兵攻南關如松乘勢欲擁入城皆為炮箭擊却我兵會食賊即縋下奪梯牌益縱火焚攻具是夜指揮趙承光葛臣戚欽武生張遐齡百户姚欽約為內間夜半四面並舉烽火城下兵趨上而譙樓火蚤發南火復起城中果鼓譟大呼殺賊欽使遐齡縋城召外兵行未中道欽復亟跳城下呼救而賊早覺已盡縛趙承光戚欽等殱之許朝因欲開小南門逸以外兵整不敢出自是城中糧且盡鋭氣益喪矣七月給事中許子偉劾總督尚書魏學曾惑于招撫罷秩命葉夢熊代之賜劍如故七月二日許朝等至南關請總兵董一奎欵語僉事隨府乘間同家人抱關防從城躍下傷肱不能起賊復縋執繫獄翌日定議水攻寧夏城西北卑下且與金波三塔諸湖之水相近東南逼觀音湖新渠紅花渠形如釜底遂繞城築堤十七日隄成長千七百丈決水以灌先是巴拜遣養子克哷該往卓哩克圗求援松詗知狀命禆將李寧追斬之并其從騎二十九級獲符令箭居有頃套部莊秃賴與卜失兔合部落三萬先使特默額勒吉哷等犯定邊小鹽池而打正以萬騎從花馬池西沙湃入總督檄麻貴偵擊以牽打正别遣董一元乘虛出塞搗其穴麻貴進戰石溝旁敵稍却分趨下馬關及鳴沙州總督遣遊擊龔子敬提苗兵八百堵沙湃口東趨定邊與董一元合亡何一元報搗上昧巢斬獲三千餘級套部驚引去而打正還至沙湃苗兵直前扼之衆寡不敵被圍十餘匝子敬力戰死然套部竟以搗巢解散賊授絶我師益决大壩水八月朔城外水深八九尺是夜賊小舟挖堤泄水官兵擒斬十六級生得一人為言城中乏穀士盡食馬馬餘五百匹民食樹皮死亡相屬翌日城東西崩百餘丈都司吳世顯恭將來保所一堤亦各崩二十丈水頓減總督斬吳世顯以徇來保用靈州功免仍悉力補堤賊數出兵來擾多被斬獲城中飢民擁賊求招安十二日御史梅國楨檄賊以飢民故為治錢穀檄到三日開關迎大兵入賑賊不報時套部數闌入堡來救二十一日卓哩克圗以八百騎入鎮北堡又擁衆萬餘入李剛堡分部渡河總兵李如松遣裨將李寧等馳赴黃硤口擊之以徑卒千餘身往䇿應行至張亮堡遇敵摶戰自卯至已敵鋭甚如松劍斬縮朒二人會麻貴李如樟等亦至張左右翼夾擊李寧手殪二人敵遂却追奔至賀蘭山盡走出塞我師捕斬百二十餘級獲駝馬無算乃移級示賊賊為之奪氣九月三日恭將楊文提浙兵至已苗兵莊浪兵俱至大治臨衝船筏刻日攻城總督葉夢熊布告軍中有能先登以城下者豫萬金後五日水浸北關城崩南關薛永夀等約內應我師陽調舟筏擊北關承恩許朝果趨北關鏖戰李如松蕭如薰潜以鋭卒掩南關總兵牛秉忠年七十賈勇先登梅國楨呼諸將曰老將軍登城矣餘何怯也遂畢登夢熊入城勞苦百姓承恩等見南關下則盡氣奪乃急縋張傑下城懇貸死夢熊陽許諾益治攻具先遣王機密以蠟書行間時承恩雖求撫墐門斷塹守益固有賣油李登者跛而眇負罌木歌于市曰癰之不決而狃于痏危巢不覆而令梟止監軍梅國楨聞之曰是可使也召登授三劄縛木渡東門見承恩曰監軍以哱氏有安塞功今與鼠輩駢首并誅深用惜之軍中非乏所使以登殘民不駭視有密記授將軍將軍幸有意聽登則殺劉許自贖即不聽願死麾下毋留登承恩猶豫許之登趨而出間道詣東𤾉朝亦各致劄曰將軍故漢將而首亂在哱氏何橫身與人嬰禍鎮卒幾何能當都督軍此無異驅乳雀而鬭羣鶻所恃不過套援將軍不記演武臺上彼親土哱目中豈有將軍哉所為貴智者以能度時審勢轉禍為福也東𤾉朝亦心動自是互相猜疑十六日圍愈迫東𤾉頓足歎曰遂至此耶佯為風疾殺土文秀曰好頭頸毋令他人砍之先是鎮民郭坤有妾美坤死賊黨周國柱以繭帨一雙聘焉許朝亦往議妾曰受周家聘矣朝以問柱曰誠有之朝怒其不相讓銜之㑹承恩聞李登之說方惶惑召所親石棟問計棟曰周國柱見事審而决雖東𤾉臣然與朝有隙盍呼之國柱至承恩與謀欲召東𤾉朝飲醉誅之國柱曰兩家前後皆戈鉞之士以一制二恐非萬全將軍當計誅朝城南柱乘間取東𤾉也承恩然之遲明承恩過呼朝時朝正坐考訊承恩急呼曰將軍何暇問此有密事登樓議之麾衆下曰將軍知周國柱有異心乎吾將與將軍斷其首語未竟承恩家卒世富大宜遽曰外營炮向樓無宜久駐此承恩疾下朝跛後從大宣掖之梯半世富抽佩劍砍之首隕梯下因縛其從騎盡斬之國柱見塵遝起有兵劍聲知事濟乃披鎧登樓佯謂東𤾉曰官軍已入南城矣東𤾉驚起憑軒望國柱自後斬之不死走入厠房支户國柱引足破戶梟其首出衆譁曰國柱奈何殺將軍柱叱曰若不避死走官軍盡斬汝誅一逆賊何譁也衆盡散承恩既殺東𤾉朝及文秀懸首城上於是李如松楊文先登蕭如薰麻貴劉承嗣繼之大城悉定北樓火起李如樟馳往搜獲寧夏巡撫關防并征西將軍印各一時哱氏尚擁蒼頭軍總督葉夢熊在靈州聞之亟令詰旦不滅哱氏者服尚方十七日晨承恩方馳南門謁監軍梅國楨出參將楊文執之李如松急提兵圍巴拜拜方與牛秉忠飯聞承恩擒秉忠趨出衆欲拒敵如松給箭令卸甲拜倉皇縊闔室自焚李如樟部卒何世恩從火中斬拜首生得拜中子承寵養子哱洪大土文德何應時陳雷白鸞陳繼武等總督葉夢熊巡撫朱正色御史梅國楨隨入城問慰宗室士庶寧夏平捷奏上御門受賀已箯輿致承恩獻俘十一月詔磔哱承恩哱承寵哱洪大土文德等俱駢斬長安市頒示天下及四裔君長下詔慰慶王復寧夏田租王妃方氏不屈死特賜褒異大賞寧夏功臣葉夢熊朱正色梅國楨各䕃世官武臣李如松功第一加宫保蕭如薰次之麻貴劉承嗣李如樟楊文牛秉忠等加恩有差如薰妻楊氏守平鹵有功制勑旌賞贈死事龔子敬都督僉事給事中曹大咸劾穆來輔隨府依違緹綺逮治遣戍邊魏學曾以原官致仕谷應泰曰巴拜以嘉靖中亡抵朔方屢立戰功萬厯中備位副將其子承恩襲爵乃拜雖請老而多蓄蒼頭軍聲言報國蓋不無異志焉方其矍鑠請纓挾其子從三千人而西也毋亦觀諸鎮之虛實結套部為腹心潜伏隂謀待時而動豈真有亷頗之壯志文淵之據鞍哉乃以不給壯馬侵尅月糧為党馨罪此特哱氏之權譎借為兵端者耳以故劉東𤾉之變則拜嗾之哱雲文秀之怨則拜隂中之揣拜之意不過恃套為長城緩則倚之為外援急則引之為內助夫是以立於有勝而無敗敢於倡亂而輕於為叛逆也若然則善勦者不當勦拜而當勦套不在挫套拜之鋒鋭而在隔套拜之聲援套絶則拜者孤雛腐鼠取之如寄者耳想其初拜套聲言聯為一家即可驗其情狀而東𤾉之恐喝則曰與套馳潼關卓哩克圗之入冦則曰畀以花馬池克力蓋之求援則能逺致莊克賴如是即拜之恃套相倚為命者也善乎葉夢熊為帥而五路分兵扼守寧夏拜不得出城套不敢渡河而哱氏之計窮蹙極矣逮至打正驚奔賀蘭逺遁拜雖游魂可坐而縛也尤有幸者文秀見殺于東𤾉東𤾉䝉誅于國柱許朝隕命于承恩始則虎狼之殘物以類聚繼而昆蟲之嚙還相為攻倘所謂天道是耶非耶比神宗受賀承恩俘馘雖師武諸臣協謀有力而葉夢熊聲請討賊自辦糗糧梅國楨仗劔從軍力保李氏蕭如薰之妻楊氏簮珥犒軍羣婦固守則尤卓犖者也明史紀事本末卷六十三
