body:
  text: 明史紀事本末卷五浙江提學僉事谷應泰編方國珍降元順帝至正八年浙東台州黃巖人方國珍起兵劫掠沿海州縣元兵屢討不克十三年十月時青田劉基為浙東行省都事建議謂方氏首亂宜捕而斬之執政多受國珍金者輒罪基擅作威福羈管于紹興竟受國珍降國珍雖受元官實擁兵自固不受元調發元亦以四方多故羈縻之不問國珍尋叛據溫台慶元等路十八年十二月太祖既下婺州遣典籖劉辰使方國珍招諭之國珍與其弟謀曰今元運將終羣雄並起惟江左號令嚴明所向無敵今又東下婺州恐難與爭鋒况與我為敵者東有張士誠南有陳友定莫若姑示順從藉為聲援以觀其變十九年春三月丁巳方國珍遣使因劉辰來奉書獻黃金五十斤白金百斤金織文綺百端願合力攻士誠許之以次子關為質太祖曰凡質疑也不疑何質厚賜關而遣之改關名為明完國珍復納溫台慶元三郡籍願輸金助軍守土如錢鏐故事事定即以獻二十一年三月戊寅方國珍遣使以金玉飾馬鞍獻先是太祖遣使以書諭國珍曰福基于至誠禍生于反覆隗囂公孫述可鑒也國珍惶懼至是遣其檢校燕敬來獻太祖曰吾方有事四方所需者文武才能所用者榖粟布帛其他珍玩非所好也却之二十四年九月乙酉方明善攻平陽元帥胡深擊敗之遂下瑞安先是溫州土豪周宗道以平陽來附明善率兵攻之宗道求援于深深擊明善敗之下瑞安進兵溫州明善懼與國珍謀嵗貢銀二萬兩充軍資太祖許之命深班師二十五年六月壬子參軍胡海攻樂清下之擒方國珍鎮撫周清等送建康九月元復以方國珍為淮南行省左丞相分省慶元二十六年九月元改方國珍為浙江行省左丞相國璋國瑛國珉及國珍子明善俱平章政事初國珍雖以三郡來獻實未納土特欲陽假借聲援以拒元及元屢加命國珍益驕橫遂據有瀕海諸郡縣不肯奉正朔時太祖方連兵張陳不暇往討纍遣博士夏煜楊憲往諭之國珍心持兩端太祖聞之笑曰姑置之待我克蘇州後欲奉正朔晚矣太祖吳元年元至正二十七年也九月甲戌命參政朱亮祖討方國珍初國珍懷詐反復云俟克杭州即納土及大兵克杭州猶自據如故乃纍假貢獻來覘虛實為叛服計又北通庫庫特穆爾南交陳友定圖為犄角太祖遺書數其十二過且徴貢糧二十萬石曰克杭有日矣公何負約如故張士誠與公接壤取公振落耳所不敢者以誰在耶吾旦暮下姑蘇奄至公境背城一戰亦丈夫矣不然去之入海亦一䇿也然自古未有老海上者公審思之國珍懼與其弟姪將佐謀郎中張本仁曰江左方圖張氏勝負未可知計不能越境而致于人劉席曰江左多步騎平地用耳奈吾海舟何丘楠曰皆非主福也惟智可以決事惟信可以守國惟直可以用兵昔者江淮之間豪傑並起人人莫不欲帝然分鼎足者漢與二吳耳漢人敢戰不怯尚死九江張吳區區如竇中鼠敗可知也江左法嚴而軍威諸將所過秋毫無犯所得府庫還封識之以奉其主此乃弔伐之心必有天下且業已并漢勢復兼張公經營浙東十餘年矣不能越三郡不以此時早決不可謂智自居錢鏐抑又背焉不可謂信我之不信彼徴師焉不可謂直莫若與也國珍不能用至是命亮祖率馬步舟師討之初台州為國珍弟國瑛竊據己丑亮祖駐師新昌遣部將嚴德攻關嶺山寨平之辛邜至天台守將湯盤以城降進攻台州國瑛以兵拒戰擊敗之嚴德戰死遂至台州國瑛聞亮祖至即欲遁去會國珍入慶元治兵為城守計使人謂國瑛堅守勿去國瑛始約束將士乘城拒守然士卒多懷懼亡去者亮祖等急攻之辛丑國瑛度力不能支以巨艦載妻子乘夜出興善門走黃巖亮祖入城撫定之十月進兵黃巖瑛復遁海上留其黨哈喇婁守黃巖哈喇婁即以城降亮祖分兵下仙居等縣國珍聞之氣沮癸丑命湯和為征南將軍吳禎為副將軍率常州長興宜興江淮諸軍討方國珍于慶元諭之曰爾等奉辭伐罪毋縱殺戮當如徐逹下姑蘇平定安集乃吾所願也十一月吳禎引舟師乘潮夜入曹娥江夷壩通道出其不意抵軍廄會降卒言國珍已遁入海禎勒兵追之湯和兵自紹興渡曹娥江進次餘姚降其知州李樞及上虞縣令沈煜遂進兵慶元城下攻其西門院判徐善等率父老迎降國珍乘海舟遁和率兵追敗之國珍率餘衆入海和分徇定海慈溪等縣得軍士三千人戰船六十艘馬二百餘匹銀六千九百餘錠糧三十五萬四千六百石朱亮祖自黃巖進兵溫州陳于城南七里國珍令其子明善引兵拒戰亮祖擊敗之破其太平寨追至城下餘兵潰奔入城亮祖遣部將湯克明攻西門徐秀攻東門柴虎將遊兵䇿應晡時克其城獲員外郎劉本善國瑛等遁去亮祖撫其民分兵徇瑞安守將同僉喻伯通降遂帥舟師會吳楨襲明善於樂清之盤嶼島夜三鼓克之大獲其戰艦士馬國珍既遁入海島己丑太祖復命廖永忠為征南副將軍率師自海道會湯和等兵討之其部將多來降諸郡縣相繼下國珍惶惑失措和等復遣人持書招之諭以朝廷威德及陳天命所在國珍不得已遣郎中承廣員外郎陳永乞降又遣其子明克明則從子明鞏等納省院及諸銀印銅印二十六銀一萬兩錢二千緡于和丙申朱亮祖兵至黃巖方國珍及其兄子明善率家來降于是國珍遣其子明完奉表謝罪太祖始怒其反復及覽表憐之表出其臣詹鼎所草詞辨而恭太祖讀表曰孰謂方氏無人耶賜書曰吾當以投誠為誠不以前過為過辛亥國珍及其弟國珉率部屬謁見湯和于軍門得士馬舟楫數萬計和送國珍等于京師太祖讓之曰公胡反復陰陽勞我戎師耶顧實公左右舞小智教公公不能自裁耳乃悉召其臣以丘楠為韶州同知又知草表出鼎手命官之其餘盡徙濠州浙東悉平後太祖即位厚遇國珍賜第京師宴位功臣次未幾授廣西行省左丞奉朝請一日侍宴坐不能興舁歸太祖官其二子曰令國珍見云國珍以善終谷應泰曰元至正八年方國珍以黃巖黔赤首弄潢池揭竿倡亂西據括蒼南兼甌越元兵屢討卒不能平以致五年之內太祖起濠城士誠起髙郵友諒起蘄黃莫不南面稱雄坐擁劇郡則國珍者雖聖王之驅除亦羣雄之首禍也然而國珍地小力少不足以張國餉匱援絶不足以待敵此惟識略過人真知天命若陳嬰以兵屬漢髙馮異以地歸光武則功垂刑馬名在雲臺豈不善始善終哉而國珍者市井之徒斗筲之器宜其無定見也夫國珍智昏擇木心懷首鼠懼明之侵軼則受撫于元以壯其虛聲懼元之窮追則納欵于明以資其外衛其效忠于陳友定也豈非河朔之劉琨西涼之張氏而侍子於明太祖也又豈非下江之王常吳越之錢俶正所謂狺牙搖尾荒忽無常毋論明室鼎興貽羞鬼蜮就令元兵晚振亦斬鯨鯢蓋首尾衡決無一而可者而彼終恃狡謀依違兩墮則以攝乎大國之間遷延歲月之命耳然究竟友諒凶強士誠給富無不先期殄滅而國珍以彈丸之地乃更支離後亡者非國珍之善守禦而太祖之善用兵也太祖之意以用兵如攻木先其堅者後其節目故先平吳漢後議國珍緩急之勢所不得緄也而中間允其納幣者一遣使招諭者再又且推還質子姑置後失蓋吳漢者門庭之寇赴之宜速而國珍者樊籠之鳥取之如寄毋亦米成山谷盡天水于目中豈真兵白頭鬚置隴蜀于度外也卒之六師既加竄奔海島計窮歸命傳送京師語云不為禍始又云無始亂國珍之竊據非分適足為新主資矣明史紀事本末卷五
