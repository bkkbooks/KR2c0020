body:
  text: 明史紀事本末卷四十七浙江提學僉事谷應泰編宸濠之叛武宗正德二年夏四月劉瑾受寧王宸濠重賂矯詔擅復護衛屯田寧藩舊在大寧今三衛地也初太祖諸子燕王善謀寧王善戰靖難兵起燕王以計挾寧王遷北平後以其地與朵顔三衛遂徙封江西天順間寧府不法革去護衛改為南昌左衛至是宸濠遣內官梁安輦金銀二萬通瑾朦朧奏請准改南昌左衛為護衛又准與南昌河泊所一處侵奪民利五年秋八月劉瑾伏誅兵部奏革寧王宸濠護衛仍為南昌左衛六年冬十月寧王宸濠葬母於西山青嵐乃先朝禁革舊穴也八年夏四月寧王宸濠建陽春書院僭號離宫宸濠懷不軌術士李自然等妄稱天命謂濠當為天子又招術士李日芳等謂城東南隅有天子氣遂建書院當之九年春三月復寧王宸濠護衛屯田先是陸完為江西按察司為宸濠所重常曰陸先生他日必為公卿完亦心附之至是完為兵部尚書濠喜曰全卿為司馬護衛可復得矣全卿完字也自完入內與王歲時問遺不絶王致書完欲復護衛完答書須以祖訓為言時伶人臧賢者有寵于上左右近習錢寧張鋭張雄輩皆隂結之以求固寵賢壻司鉞坐法充南昌衛軍宸濠因之以通于賢每手書寄賢字賢為良之至是乞護衛輦載金寶于賢家分饋諸權要大學士費宏知之宣言曰今寧王以金寶巨萬復護衛苟聽其所為吾江西無噍類矣陸完知宏必阻之乃密謀于錢寧等㑹三月十五廷試進士內閣與部院大臣皆在東閣讀卷完遂於十四日投覆寧王乞護衛疏十五日中官盧明以疏下閣密約楊廷和出下制許之而宏竟不與聞廷和與完懼宏發其狀㑹言官交章論護衛不可復乃謀去宏以宏私其弟費宷入翰林鄉人黃初及第譖之且曰乾清宫災下詔皆宏視草歸咎朝廷傳㫖令宏致仕宏南歸舟至清源濠黨陰遣人入舟中縱火行李皆為煨燼濠黨使人舟尾窺之見舟焚而餘資盡遂以是復濠濠乃已寧王宸濠自稱國主妄傳護衛為侍衛改令㫖為聖㫖夏六月寧王宸濠密令承奉劉吉等招劇盜楊清李甫王儒等百餘人入府號把勢八月寧王宸濠令撫臣以下朝服見撫臣俞諫不可時宸濠久畜異志㑹有上賜欲撫臣等朝服見諫不可又嘗去其左右為惡者濠深銜之冬十月寧王宸濠招鄱湖賊首楊子喬統賊徒揚清等肆行劫掠十年春二月寧王宸濠招舉人劉養正入府密謀濠聞養正有才名習兵法延至府講論宋太祖陳橋之變養正甚稱濠有撥亂之才密約待時舉事夏六月寧王宸濠忌都指揮戴宣擅捶殺之冬十月江西按察司副使胡世寧奏寧王宸濠無道罪狀下兵部移文寧府令鈐束其下時宸濠反跡已著人莫敢言世寧發憤上疏略曰寧王自復護衛以來騷擾閭閻鈐束官吏禮樂政令漸不出自朝廷臣恐江西之患不止羣盜也伏乞聖明廣集羣議簡命才節威望大臣兼任提督巡撫之職假以陳金彭澤之權銷隙寢邪於無形勑王自王其國仰遵祖訓勿撓有司以防未然疏上宸濠頗懼委過近屬以自解以河南左布政孫燧為都察院右副都御史巡撫江西先是俞諫以忤宸濠奪官閒住宸濠謀益橫朘削百姓輦珍寶結禁近以為奧援及結連各洞寨逋賊縱其流劫鎮巡藩臬以正自持者必百計去之畏禍者遂翕然依附燧知大變將作乃均征賦飭戎備實倉儲散鹽利諸凡摧剝黎萌者漸次削除偵姦黨置之法以剪其羽翼宸濠奏副使胡世寧離間親親妖言誹謗賄營內㫖逮之先是世寧已升福建按察使宸濠臨發毒之下血幾殆濠深銜世寧必欲置之死摘前疏語為謗上賂用事者中以危法逮捕之世寧既遷福建便道抵浙歸家濠屬其黨巡浙御史潘鵬發卒募取世寧欲甘心焉㑹李承勛為按察使匿世寧變姓名間道歸命京師得不死下錦衣獄世寧獄中三上書言江藩橫逆朝野皆聞微臣愚戅天日共鍳兩京言官陳啓充徐文華交章論救世寧繫再經冬訊鞫搒掠幾庾死十一月江西豕生象宸濠三司稱賀左布政使張嵿以義折羣議止之十一年春三月寧王宸濠以上東宫未立密遣萬鋭林華賄錢寧等稱長子宜入太廟司香為名迎取來京錢寧臧賢受厚賂隂助之夏五月宸濠欲拓府居擬大內左布政張嵿以非制拒之秋八月謫福建按察使胡世寧戍遼東瀋陽衛初世寧刑訊一年錢寧蕭敬張雄張鋭江彬等受宸濠重賄脅刑官必坐以誣告親王罪至死大理寺少卿胡瓚抗言曰濠謀賴世寧以發而置之極刑何以服天下衆直之及行撫按孫燧李潤奉勘委曲明世寧無辜得减死謫戍奪瓚等俸九月宸濠奪官池賄李士實左布政張嵿不可濠遣承奉劉吉饋以四果啓視之則棗梨薑芥也嵿呼吉曰我知之矣是欲我早離江西界也臣子受命于君行止豈人所能預濠聞之默然冬十月以王守仁為都察院右僉都御史巡撫南贛汀漳等處十二年春二月寧府典寶閻順內官陳宣劉良奏宸濠不法事濠遣承奉劉吉賄錢寧矯㫖發順等孝陵衛充軍濠疑承奉周儀實使之併家人六十餘人盡捶死三月宸濠令王春余欽等招募劇盜凌十一閔草四等五百餘人四集亡命同楊清等藏丁家山寺劫掠官軍民財商貨復厚結廣西土官狼兵并南贛汀漳洞蠻欲圖為應遣人往廣東收買皮帳製作皮甲及私製鎗刀盔甲并佛郎機銃兵器日夜造作不息夏五月宸濠忌布政使張嵿賄錢寧囑吏部升光祿卿以遠之秋七月以許逵為江西按察司副使宸濠以進貢方物為名遣徐紀趙隆盧孔章等赴京偵伺沿途伏健步快馬限十二日報知九月巡撫孫燧奏宜重九江兵備之權湖東分巡兼理兵備佞幸阻之不行冬十一月宸濠仇大學士費宏遣人焚毁其廬墓并攻城掠羣從兄弟殺之孫燧請兵擒捕下兵部議十二月命太監畢貞守江西貞遂附宸濠謀逆十三年春正月寧王宸濠誣奏清軍御史范輅賄近幸逮問除名輅與畢貞爭坐及辨朝王服色故被陷秋八月宸濠大集羣盜凌十一閔草四吳十三等四出劫掠有抗者陰使盜屠其家吳十三劫新建庫銀七千餘兩南昌知府鄭瓛置其窩主何順於理濠怒誣瓛事執送按察司監禁九月宸濠賄佞幸改中官畢貞鎮守浙江冬十月巡撫孫燧捕賊首吳十三等繫南康府獄濠恐泄謀陰令賊黨劫獄奪之十四年春二月寧王宸濠持重賄交通南京留守太監劉琅夏四月孫燧自劾乞罷不許時李士實劉養正王春劉吉萬鋭等日夜與宸濠謀恐事起以反為名欲伺晏駕後乘變起益遣奸黨盧孔章等分布水陸要道萬里傳報浹旬往返蹤跡大露先是孫燧托禦盜名城進賢南康瑞州又請勑湖東道分巡兼理兵備與饒相犄角九江當湖衝最要害請重兵備兼設南康寧州武寧瑞昌及湖廣興國通城便控制廣信橫降香山諸寨地險人悍設通判駐其地兼督六縣又恐宸濠一旦起劫兵器假討賊盡調衛城兵器於外嘗笑曰即賊起吾不滅賊賊必以吾處分故速滅也㑹江西大水凌十一吳十三閔草四等出沒鄱陽湖為冦燧與許逵自江外掩捕之夜大風雨不克濟三賊走匿宸濠林墓中竟不得濠恐乃致書陸完曰急去孫燧用梁辰湯沐來王守仁亦可切勿用吳廷舉時燧疏宸濠逆謀凡七上宸濠奸黨邀諸途皆不得達燧又以朝廷懿親不敢先發故自劾乞休不報五月遣太監賴義駙馬都尉崔元都御史顔頥夀戒飭宸濠時江彬錢寧有隙太監張忠等常欲借彬以傾寧㑹濠居父喪矯情飾禮復令南昌生徒保舉孝行挾孫燧并巡按御史王金奏其事燧等欲緩其逆謀具疏上之上見奏驚曰百官賢當升寧王賢欲何為且將置我何地耶張忠乃乘間密言曰朱寧臧賢交通寧王謀不軌陛下不知乎稱王孝譏陛下不孝也稱王早朝譏陛下不朝也上頷之東厰太監張鋭大學士楊廷和初亦黨濠為復護衛已而鋭知有反謀且知上入忠言乃與廷和謀欲復革去護衛以免後患於是御史蕭淮疏稱寧王不遵祖訓包藏禍心招納亡命反形已具疏入江彬張忠贊其說遂勑義等往革其護衛給事中徐之鸞御史沈灼各上疏宸濠不法事詔發兵大索宸濠偵卒于臧賢家時宸濠偵卒林華匿賢家家多復壁外鑰木厨開則長巷人無覺者華以是得脫歸不獲六月丙子寧王宸濠反都御史孫燧按察司副使許逵死之先是朝廷遣賴義崔元顔頥夀等行崔元過楊廷和詢之廷和曰宣德中有疑于趙府常令駙馬袁泰往竟得釋或此意也元等遂行而京師競傳以為且擒治寧王偵卒林華者即兼程逃歸以六月十三日至江西值濠生日宴鎮巡三司等官聞報大驚蓋舊日擒荆王時差太監蕭敬駙馬蔡震都御史戴珊過南昌寧王親見之遂以此必擒我不復記廷和所云趙府事也罷宴遂密召劉養正劉吉等謀之養正曰事急矣明早鎮巡三司官入謝宴可就擒之殺其不附已者因而舉事乃夜集賊首吳十三凌十一閔草四等飭兵器以候待旦急召致仕侍郎李士實入以謀反告之士實唯唯而已尋各官入謝拜畢左右帶甲露刃侍衛者數百人宸濠出立露臺大言曰太后有密㫖令我起兵入朝監國汝等知之乎都御史孫燧毅然曰密㫖安在濠曰不必多言我今往南京汝保駕否燧張目直視濠厲聲曰天無二日臣安有二君太祖法制在誰則敢違濠大怒命縛燧衆駭愕相顧失色按察司副使許逵大呼曰孫都御史朝廷大臣汝反賊敢擅殺耶顧燧語曰我欲先發不聽今制於人尚何言濠併縛之訊逵且何言逵曰惟有赤心耳豈從汝反且縛且罵賊捶折燧左臂并縛逵喝校尉火信等拽出惠民門外殺之逵且死罵曰今日賊殺我明日朝廷必殺賊時烈日中忽陰曀慘淡城中聞之無不流涕者遂執御史王金主事馬思聰金山右布政胡濓參政陳杲劉斐參議許效亷黃宏僉事顧鳯都指揮許清白昻并太監王宏俱械鎖下獄思聰黃宏不食死逆黨舉人劉養正至宸濠自出城迎之養正常言帝星明江漢間故屬意宸濠至是與李士實謀令參政季斆僉事潘鵬師䕫持檄諭降諸郡縣左布政梁宸亷使楊璋副使唐錦為所脅移咨府部𫝊檄逺近革正德年號指斥乘輿以李士實劉養正為左右丞相參政王綸為兵部尚書總督軍務大元帥分遣逆黨婁伯王春等四出收兵戊寅閔草四吳十三等奪船順流攻南康知府陳霖等遁走進攻九江兵備副使曹雷知府汪頴等亦遁城俱陷宸濠即令師䕫居守婁伯至進賢知縣劉源清誅之提督南贛軍務都御史王守仁移檄遠近暴露宸濠罪惡起兵討之先是守仁提督江西致仕侍郎李士實素與宸濠通一日守仁見宸濠舉宴士實亦在座宸濠因言上政事缺失外示愁嘆士實曰世豈無湯武耶守仁曰湯武亦須伊吕宸濠曰有湯武便有伊吕守仁曰有伊吕何患無夷齊於是守仁陰為之備㑹五月間福州三衛軍人進貴等作亂兵部尚書王瓊知宸濠且反謂主事應典曰進貴亂小事不足煩王守仁但假此便宜勑書在彼手中以待他變可也乃具題降勑令守仁查處福州亂軍故宸濠之叛江西守臣俱遇害被執惟守仁以往勘福建出六月初九日自贛起行十五日守仁至豐城知縣顧佖告濠反守仁易服濳至臨江幾為宸濠所及臨江知府戴德孺聞守仁至喜迎入城調度守仁曰臨江居大江之濵與省㑹近且當道路之衝莫若抵吉安為宜又以三䇿籌之曰宸濠若出上䇿直趨京師出其不意則宗社危矣若出中䇿趨南都則大江南北亦被其害但據江西省城則出下䇿勤王易為也及行至中途恐其速出乃為計佯奉朝廷密㫖先知寧藩反狀令兩廣湖廣都御史楊且秦金暗伏要害地方以俟寧藩兵至復取優人數輩厚賞以全其家令其至伏兵處所飛報竊發日期將公文縫置夾衣絮中臨發適捕李士實家屬至舟尾故令覘知之守仁乃佯怒令牽上岸處斬而陰縱之令其奔報宸濠邏獲優人果於祫衣絮中搜得公文不敢即發庚辰守仁飛報宸濠反王瓊宣言曰有王伯安在何患不久當有捷報耳丁亥守仁集兵糧傳檄四方諸郡縣知府伍文定等皆至議所向守仁曰兵家之道急衝其鋒攻其有備皆非計之得我故示以自守不出之形彼必他出然後尾而圖之先復省城以搗其巢穴俟彼還兵來援然後邀而擊之此全勝之䇿也宸濠果使人探守仁不出秋七月壬辰朔宸濠㑹李士實劉養正造僞檄指斥朝廷參政季斆同南昌教授趙承芳等賫僞檄榜諭吉安守仁執縛軍門固封上進疏略曰陛下在位十四年屢經變難民心騷動尚爾巡逰不已致使宗室謀動干戈冀竊大寶且今天下之覬覦豈特一寧王天下之奸雄豈特在宗室言念及此可為寒心昔漢武帝有輪臺之悔而天下向治唐德宗下奉天之詔而士民感泣伏望陛下痛自刻責易轍改絃罷奸回以動天下忠義之心絶遊幸以杜天下奸雄之望宸濠率兵出江西留其黨宜春郡王拱樤同內官萬鋭等守南昌自與拱栟李士實劉養正閔草四等六萬人號十萬以劉吉為監軍王綸為參贊指揮葛江為都督載其妃媵世子從總一百四十餘隊分五哨出鄱陽舳艫蔽江而下聲言直取南京太監畢貞守浙江許起兵應之戊戌宸濠趨安慶知府張文錦都指揮楊鋭指揮崔文令軍士鼓譟登城大罵之宸濠遂留攻安慶時九江南昌既陷遠近震駭三人慿孤城以忠義激士誓衆死守僉事潘鵬安慶人也宸濠令鵬遣家屬持書入城諭降崔文手斬之磔其尸投城下宸濠令鵬至城下說之文引弓欲射鵬鵬走免張文錦即鵬家盡誅之宸濠盡攻擊之術不能克時朝廷聞濠反乃收太監蕭敬秦用盧明都督錢寧優人臧賢尚書陸完等俱下獄籍其家後蕭敬罰二萬金得免秦用陸完謫戍邊餘死獄中癸卯王守仁率知府伍文定等起兵㑹于臨江樟樹鎮于是知府戴德孺引兵自臨江徐璉引兵自袁州邢珣引兵自贛州通判胡堯元童琦引兵自瑞州通判談儲推官王暐徐文英新淦知縣李美太和知縣李楫寧都知縣王天與萬安知縣王冕各以其兵至十八日己酉至豐城衆議所往或謂寧王經畫旬餘始出留備南昌必嚴攻之恐難猝拔今寧王攻安慶久不克兵疲意沮若以大兵逼之江中與安慶夾攻之必敗寧王敗南昌不攻自破矣守仁曰不然我師越南昌下與寧王持江上安慶之衆僅能自保必不能援我於中流而南昌兵議其後絶我糧道南康九江又合勢乘之腹背受敵非利也不若先攻南昌寧王久不克安慶精鋭皆出守禦必單弱我兵新集氣鋭南昌可克也寧王聞我攻南昌必解安慶圍還兵自救暨來我師已克南昌彼聞之自奪氣首尾牽制此成擒矣乃分其兵為十三哨哨三千人少者千五百人令伍文定等各攻一門以四哨為遊兵䇿應之諜報寧王别伏兵攻厰為城中聲援守仁遣知縣劉守緒夜從間道襲破之以撼城中十九日發兵以二十日昧爽各至汛地守仁下令曰一鼓附城再鼓登三鼓不登誅四鼓不登斬其隊將又先期為榜入諭城中居民令各閉户自守勿助亂勿恐畏逃匿遂舁攻具至城下梯絙而登城上雖設守禦聞風倒戈城門有不閉者兵遂入守仁乃入城撫定之時贛州奉新等兵皆降盜頗驍悍然多肆殺掠不遵約束民被殺傷者衆守仁執數人斬之衆稍定擒拱樤及萬鋭等十餘人宫中皆縱火自燒殺不盡者拘繫之散遣脅從府庫被宸濠取充軍資及兵士略取不盡者籍封之城中始安時宸濠憤安慶不下方自督兵填壕塹期在必克聞守仁帥兵攻南昌大恐李士實等勸宸濠勿還兵舍安慶徑取南京既即大位江西自服宸濠不從解安慶圍移兵泊阮子江先遣兵二萬還援江西宸濠自率大軍繼之二十二日諜報至江西守仁乃集衆議或謂寧王兵盛慿其憤怒悉衆而來我援兵未集勢不能支不若堅壁自守以待四方之援彼久頓堅城之下兵孤援絶將自潰矣守仁曰寧王兵力雖强然所至徒恃焚掠劫衆以威未嘗逢大敵與之旗鼓相當一鏖戰者彼所誘惑其下不過以事成封爵富貴為說今進取不能巢穴又覆沮喪退歸衆心已離我以鋭卒乘勝擊之彼將不戰自潰矣是日撫州知府陳槐亦帥兵至於是守仁大賑城中軍民慰諭諸宗室榜示宥釋脅從常受賊官爵能自逃歸投首者皆置不問二十三日諜報宸濠先鋒已至樵舍守仁乃遣諸將帥兵迎擊之令伍文定以正兵當其前余恩繼文定後邢珣帥兵繞出賊背徐璉戴德孺張兩翼分擊之諸將各受命出二十四日乙邜賊兵乘風鼓譟而前逼黃家渡氣驕甚伍文定余恩佯北致之賊爭進趨利前後不相及邢珣兵從後急擊橫貫其陳賊敗走文定恩還兵乘之徐璉戴德孺兵合勢夾擊賊不知所為遂大潰追奔十餘里擒斬二千餘級溺水死者萬計賊氣大沮退保八字腦是夜宸濠問舟所泊地其下對黃石磯南人謂黃王宸濠惡其音為王失機殺對者賊衆見兵敗稍稍散去是日建昌知府曾璵等帥兵至守仁謂九江南康不復則道終便且湖廣援兵不能達乃别遣知府陳槐帥兵四百合知府林緘兵攻九江知府曾璵帥兵四百合知府周朝佐兵攻南康宸濠大賞將士當先者千金被傷者百金使人盡發南康九江兵至丙辰并力合戰官兵敗死者數百人伍文定急斬先却者以殉身立炮銃間火焚其鬚鬢不移足士殊死鬭兵復振炮及宸濠舟賊遂大敗擒斬二千餘級溺水死者甚衆賊復退保樵舍聯舟為方陳盡出其金帛賞士伍文定等乃為火攻之具邢珣擊其左徐璉戴德孺擊其右余恩等分兵四伏期火發兵合丁巳宸濠朝羣臣執其不盡力者將斬之爭論未決官兵四集奮擊之火及宸濠副舟賊復大潰宸濠與諸妃嬪泣别妃嬪皆赴水死將士執宸濠及其世子郡王儀賔并僞丞相元帥等官李士實劉養正徐吉凃欽王綸熊瓊盧行羅璜丁瞶王春吳十三凌十一秦榮葛江劉勛何鏜王信吳國士火信等數百餘人被執脅從官太監王宏御史王金主事金山按察使楊源僉事王疇潘鵬參政陳杲布政司梁宸都指揮郟文馬驥白昻等擒斬賊黨三千餘級溺水死者約三萬棄其衣甲器仗財物與浮尸積聚橫亘若洲餘賊數百艘四散逃潰復遣兵分勦擊破之于樵舍又破之于吳城擒斬千餘級守仁所遣曾璵陳槐亦攻復九江南康二郡各于沿湖諸處擒斬千餘級將士執宸濠入江西軍民聚觀歡呼之聲震動天地宸濠見守仁呼曰王先生我欲盡削護衛請降為庶民可乎守仁曰有國法在遂俯首不言初宸濠謀反妃婁氏泣諌不聼及宸濠被擒于檻車中泣語人曰昔紂用婦人言而亡天下我以不用婦人言而亡其國今悔恨何及守仁為求婁妃尸葬之得宸濠交賄大小臣僚手籍悉焚置不問八月上下詔親征時王守仁擒宸濠捷書未至諸邊將在豹房者各獻擒濠之策上亦欲假親征南遊太監張永等見錢寧臧賢事敗又欲因此邀功于是上自稱奉天征討威武大將軍鎮國公邊將江彬許秦劉暉中貴張永張忠等俱稱將軍所下璽書改稱軍門檄上方出師駐蹕良鄉而守仁捷奏至且慮有沿途竊發欲自獻俘闕下疏略曰臣於告變之際選將集兵振揚威武先收省城虛其巢穴繼戰鄱湖擊其惰歸今宸濠已擒逆黨已獲從賊已掃閩廣赴調軍士已散地方驚擾之民已定竊惟宸濠擅作威福睥睨神器招納叛亡輦轂之動靜探無遺跡廣置奸細臣下之奏白百不一通發謀之始逆料大駕必將親征先于沿途伏有奸黨期為博浪荆軻之謀今逆不旋踵遂已成擒法宜解赴闕門式昭天討然欲付之部下各官誠恐濳布之徒乘隙竊發或虞意外臣死有餘憾矣蓋時事方艱賊雖擒亂未己也奏入上屢檄止之令以俘候車駕至大學士梁儲蔣冕屢請回鑾不聼九月上至南京王守仁發南昌將獻俘闕下張忠江彬等謂當縱之鄱湖俟上親與遇戰而後奏凱論功屢遣人至廣信止之守仁不得已乘夜過玉山械繫宸濠等取道由浙河以進張永已候於杭州守仁至杭謂永曰江西之民久遭濠毒今經大亂繼以旱災又供京邊軍餉困苦既極必逃衆山谷為亂昔助濠尚為脅從今將遂成土崩之勢然後興兵定亂不亦難乎永深然之乃徐曰吾之此出為羣小在君側調護左右以默輔聖躬非為掩功來也但皇上意將順而行猶可挽回萬一若逆其意徒激羣小之怒無救于天下大計矣于是守仁信其無他以濠付之乘夜渡浙江過越還江西太監張永復命先見上備言王守仁之忠并江彬等欲害之意初江彬張忠等謀欲奪功誣守仁初附宸濠及知其勢敗然後擒濠攘功張永知其謀語家人曰王都御史忠臣為國今欲以此害之他日朝廷有事何以教臣子之忠乃先見上備言其事彬等毁遂不入張忠又言守仁在杭竟不至南京陛下試召之必不來無君可知召之守仁即奔命至龍江將進見忠殊失意又從中阻之守仁乃綸巾野服入九華山張永聞之又力言于上曰王守仁忠臣今聞衆欲爭功欲棄其官入山為道士由是上益信之命守仁巡撫江西擢吉安知府伍文定為江西按察司贛州知府邢珣為江西布政司右參政十一月上在南京張忠許泰劉暉等復營內㫖領京邊軍討宸濠餘黨時守仁受命巡撫江西許泰等領京邊軍萬餘人在南昌勦捕餘賊給事中祝續御史章綸隨軍紀驗望風附㑹肆為飛語北軍旦暮呼守仁名嫚罵或衝道啓釁守仁略不為動務待以禮預遣官諭市人移家于鄉而以老羸應門始欲犒賞北軍泰等預禁之令勿受守仁給示內外述北軍離家苦楚居民當致主客禮每出遇北軍喪必停車問故厚與之櫬嗟嘆乃去久之北軍咸曰王都堂待我有禮我安得犯之㑹冬至時新經濠亂民間哭亡酬酒聲聞不絶北軍無不思家泣下求歸者忠泰自挾所長較射教場江西官軍射多不中忠泰乃强守仁守仁故不得已應之忠泰笑守仁乃三發三中每一中北軍在傍同聲踴躍呼應遠近忠泰不樂而罷且曰我軍皆附彼矣遂班師時江西已寧忠等搜求微隱羅織平民妄誅戮以為功而沒其貨財軍馬駐省城五閲月糜費浩煩江西騷然不勝其擾十二月宸濠等至南京上欲自以為功乃與諸近侍戎服整軍容出城數十里列俘于前為凱旋狀既入囚禁之十五年秋九月上以大將軍鈞帖令巡撫江西都御史王守仁重上捷書守仁節略前奏入江彬張忠等姓名於內上之疏入始議北旋冬十月上自南京班師還京十二月上至通州賜宸濠死燔其尸餘黨至京師磔誅之獨抑王守仁功未敘至嘉靖初始起為南京兵部尚書封新建伯谷應泰曰武宗慢棄神器王綱不守纍葉金甌視為中原之鹿于是羣邪睥睨蕭墻之內耽耽虎視人有風雲之想矣宸濠復護衛于正德二年舉兵于正德十四年十餘年之間碁布星羅賊黨幾遍海內當其始也覘螽斯龍種之衰妄冀千秋萬歲之約畜梁孝淮南之志要結伍被嚴助之歡輿服升朝儼然大寶稱戈喋血詎其本懷既而玉厯無疆妖謀漸泄羅絡彌嚴腹心愈廣其骨鯾不附者內則大學士費宏外則巡撫孫燧副使許逵數人已耳宫掖樹其私人六卿半其羽翼京省津梁飛騎立達荆蠻百越振臂能呼知義旗之莫舉料乘輿之必東設伏關輔之間陰謀博浪之事嗟乎飛鷹揚羽已上其韝遊魚鼓鬐已吞其餌武宗方且改號將軍貶名鎮國右挈江彬左倚忠永張皇國門有同兒戲豈不危哉所幸宸濠身居彭蠡之間結聚椎埋之客地利既失人謀不臧玉燭灰而復明皇輿昃而旋正是乃天意夫豈人事焉若王新建﨑嶇江介倡率羣僚亟攻南昌覆其巢穴迎戰鄱陽擊其惰歸柴桑捷而長鯨晝徙湓口圍而寶帳宵灰兵甫萬餘時才旬日天生李晟為國非為朕也大功甫立疑謗旋生角巾野服口不言功委蛇於羣閹之間調護于悍軍之日所憂在國釁而不在身危所爭在民心而不在已爵卒之上勳格而不行五等加而又奪然而陳湯之爵失而不泯其功魏徵之碑仆而詎損其直微彰柔剛龍蛇伸屈殆所謂浩然正氣日月爭光者與若夫孤城單旅牽制賊兵不使下留都者安慶知府張文錦武臣楊鋭崔升也聞難赴義先登摧敵佐成大功者知府伍文定及邢珣徐璉戴德孺也分剪支蔓收復降郡者知府陳槐曾璵也王瓊拔守仁于未有事之先未雨綢繆國之元臣張永一寺人耳片言感悟力為左右吕疆張承業之功何以加焉悲夫樊噲以吕戚而得免葅醢杜預賂朝貴而始遂功名功臣志士所遇抑又何窮與明史紀事本末卷四十七
