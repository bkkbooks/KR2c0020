body:
  text: 明史紀事本末卷三十一浙江提學僉事谷應泰編平浙閩盜英宗正統七年十二月麗水盜陳善恭慶元盜葉宗留合衆盜福建寶峰場銀冶命浙江福建有司捕治之十二年春二月葉宗留聚衆盜掘少陽坑數月計所獲微甚棄去九月率衆之雲山遍掘諸坑場無所得還慶元居數日往政和掘少亭坑亦不給用謂其徒曰以吾之衆即索金于市易耳何至自疲山谷間常苦不給也衆從之時已數百人遂掠政和縣及村落還慶元號召得千餘人遣召龍泉良葛山人葉七為教師訓練武藝由浦城劫建陽所過焚掠從者益衆遂掠建寧官民皆逃匿分衆截車盤嶺鉛山惴恐行旅斷絶十三年夏四月福建沙縣鄧茂七反自稱閩王命都督劉聚為總兵陳榮為副總兵陳詔劉德新為左右恭將僉都御史張楷監軍討之茂七江西建昌人初名鄧雲豪俠為衆所推殺人亡命入閩至寧化縣依豪民陳正景易名茂七聚衆集㑹常數百人逺近商販至皆依之漸恣橫頤指殺人先是御史柳華按閩檄各郡縣令村落各置隘門望樓編鄉民為什伍茂七與弟茂八皆編為長嘗佃人田例輸粟主家餽少物茂七令毋餽而田主自往受粟田主訟之不受縛乃下巡檢追攝之因殺弓兵數人聞於上官調官軍三百人與之格鬬殺傷略盡懼討遂刑白馬㰱血誓衆舉兵反游兵皆舉金鼓器械應之烏合至萬餘人自稱閩王與正景率黨劫上杭還攻汀州為推官王得仁所敗三戰正景被擒送京師斬之獨茂七黨盛不可制至是率其黨據杉關劫商旅遂攻光澤縣大掠順流下邵武官民悉逃匿至順昌據之賊去邵武官民始復入城順昌官民亦入保邵武時福建參政宋彰交趾人與中官多故舊侵漁萬計賄王振得為左布政使扺任將責償焉小民苦為所迫于是尤溪爐主蔣福成號集居民貧人無賴者悉歸之旬日有衆萬餘遂襲尤溪據之與茂七聲相聞將劫沙縣及延平延平上其事御史丁宣偕藩臬諸使至延平遣同知鄧洪等帥兵二千往沙縣勦之福成遂與茂七合官軍殱焉丁宣乃遣招諭令解散得免死茂七笑曰吾豈畏死求免者吾取延平據建寧塞二關𫝊檄南下入閩誰敢窺焉殺賫書使者據貢川及玉臺館締置里圖甲役遂據沙縣勢益猖獗御史張海始至延平遣都指揮張某率兵四千往勦之行二十里至雙溪口道隘賊僅二十餘人伏左右村店中俟兵過且盡都指揮後殿至賊伏猝起舉排柵塞道前驅不可反從兵不數十人賊遂搏都指揮并其從兵皆殪之前驅兵覺還禦之無及賊登山擁衆喊聲官軍大潰茂七進攻延平張海登城諭之有緋衣賊曰我曹苦富民魚肉有司不我直耳如朝廷宥我且立散乞免徭三年都指揮范真等戰於城外衆潰真與指揮彭璽等俱死御史上其事請兵討賊上乃召都御史張楷至靣諭以閩賊猖獗狀令偕都督劉聚陳榮等往討之九月張楷等師至南畿分遣劉得新率兵由江西道建昌㑹邵武楷率兵由浙入閩十一月指揮戴禮擊葉宗留斬之禮與都督陳榮亦戰死初張楷奉命討鄧茂七至廣信以葉宗留道梗留不敢進福建遣使促楷師浙江藩臬諸司請楷便宜移兵擊宗留江西御史韓雍亦言宗留近在咫尺門庭之冦皆國家事豈可畫疆而計耶楷不知所從指揮戴禮願往勦之楷乃命率兵五百往都督陳榮謂楷曰受朝命討賊今延平事急而鉛山不通大軍密邇二冦逗遛不進乃遣一步將往朝廷知之何所逃罪耶楷然之遣榮以二千人率禮等往禮先驅與賊遇于黃柏鋪麾兵擊之死傷相半宗留衣緋率衆前中流矢死官兵不知為宗留也賊退奔入山復擁葉希八為渠魁劫車盤嶺悉衆駐十三都欲回浦城㑹陳榮兵亦至併戴禮軍搜山至玉山十二都中伏榮禮皆死葉希八焚浦城還龍泉衆數萬人屯雲和麗水陶得二陳鑑胡俱率衆從之楷聞報方益兵進而劉得新已率江西兵敗茂七於建陽道始通楷遂間道入閩㑹劉得新等取道走建寧十二月守備處州監察御史朱瑛計擒賊黨周明松等尸於市時葉宗留黨周明松等四出剽掠金華武義崇安鉛山諸縣朝廷慮其與閩冦合命瑛及中官分守要地瑛榜諭脅從示以禍福降者甚衆以計生致明松等數人械于慶元諜報賊首黑靣大王領衆三萬來劫明松等中官大懼欲走瑛不為動立誅明松等尸于市賊聞之逡巡遁去鄧茂七遣别將陳敬德吳都總等由德化永春安溪冦泉州知府熊尚初逆戰於五陵坡兵敗被執不屈死之以建寧知府張瑛為福建右參政鄧茂七以二千餘人攻建寧瑛率建安典史鄭烈鄉兵吳保等合都指揮徐信分道乘霧襲斬五百餘拔其寨故有是命十四年春正月上以閩師久無成功命寧陽侯陳懋為征南將軍保定伯梁瑶平江伯陳豫為左右副總兵都督范雄董興為左右參將尚書金濓總督軍務太監曹吉祥王瑾監軍御史張海丁宣紀功率京營及江西浙江諸處大軍討之未至茂七等攻延平久餘賊至太平驛副使邵宏譽等率兵與賊戰射死百餘人軍士亡者倍之以捷聞初賊于近城五里許斷橋為守道阻不通劉得新既敗賊張楷乃遣使諭之降其黨黃琴等三十餘人令復業禁諸民不許復私讐建陽路既通沙縣賊首張繇孫至延平降又引從賊羅汝先等詣楷願殺賊贖罪且云賊敗後皆據險自衛必欲取之吾為公說令攻城公悉大軍擊之吾為內應可覆也許之賊首劉宗羅海郎七等俱茂七僞將掠財聚陳山寨黃琴等計擒之詣軍門械送京師楷遂益兵趨延平遇賊攻城擊殺千餘人賊衆稍却茂七等復移兵冦建寧參政張瑛與賊戰死之於是楷等還建寧賊遂退保陳山二月賊復下山攻延平蓋張繇孫羅汝先誘之出也楷以浙江軍伏後坪南京軍伏後洋江西軍伏沙溪之南而以福建軍素為賊所易者出城挑之賊乘浮橋竟進伏起炮作合擊大破之官軍乘勝進殺擒數十人茂七中流矢死乃斬其首函之馳露布以捷聞而寧陽侯陳懋等大兵亦繼至楷等至順昌諸處慰撫居民餘賊復擁茂七兄子鄧伯孫聚後洋或散走各分據山寨平江伯陳豫等分道捕之賊據九龍山楷遣兵二千出山後戒之曰明日賊必空寨攻我若疾入其寨據之比旦賊視營兵少果至溪上無筏而還山後兵已據其寨驚潰三月指揮王鉞捕賊於髙陽里獲女賊廖氏僞號女將軍廖氏甌寧人被掠至鄧伯孫所妖淫善幻尤驍捷兵敗歸母家獲之諸將各先後捕獲從賊首數多俱檻送邵武大軍至邵武皆斬之璽書至褒諭諸將以降賊黃琴為主簿羅汝先為縣丞賞其誘賊功也餘候班師論功令陳懋等留勦閩賊未盡者張楷還師討處州賊懋等乃立賞格能自擒殺來降者與斬敵同賊將張留孫者驍勇善戰茂七起事多倚之茂七死仍從鄧伯孫千户龔遂榮僞貽留孫書若素有約者佯使諜誤致之伯孫伯孫果疑留孫殺之由是賊黨人人自疑棄伯孫來降遂進兵沙縣破貢川掛口陳山諸寨執伯孫送京師斬之左都督劉聚兵至南平順昌甌寧擒餘黨六十三人斬首無算諸將先後擒斬招撫略盡八閩悉平懋等乃班師張楷劉聚等還師討處州冦先是葉希八等據雲和山中數月謂其黨曰山中出掠不便不若由朱湖盡掠府城乃結寨駐鮑村取貨于義烏掠人于松陽官軍雖衆不能越馮公嶺迫我矣衆從之遂掠處州守臣遣使從溫台告急於杭州御史命都指揮沈鱗參議耿定僉事王定帥兵四千至處州擊之諸守臣復遣使詣省告急御史盛琦黃英先後以聞朝廷命都指揮徐恭為總兵孫鏜陶瑾為左右參將工部尚書石璞督諸軍討之㑹沈鱗耿定王晟率千户楊清等擊賊麗水敗沒徐恭帥兵二千馳至處州亦守城不敢出賊攻處州聲言取金華時楷等兵尚未至葉希八分犯江西廣信境永豐知縣鄧顒死之時賊侵上饒顒奉張楷檄禦却之賊大至或勸其走不聽遂被執不屈罵賊死陳鑑胡破松陽龍泉屯金山岩分劫青田武義義烏東陽自號太平國王改泰定元年麗水縣丞丁寧以老人王世昌等人賊巢諭鑑胡降之進寧處州府同知世昌等授巡檢鑑胡至京錮錦衣獄有詔鑑胡擬死免其妻子民兵張祐王應參王金禮等亦殺賊千餘人獲皮甲八百上俱授巡檢責尚書石璞總兵徐恭玩冦五月張楷入浙至衢州僉事陶成往迎之陳危急狀時處州城中乏食諸將登陴而泣楷分兵水陸並進至蘭溪御史黃英林廷舉來㑹請速進兵至金華令軍中製竹笆數百面笆如牌製糊以紙畫獸形可禦賊鎗乃兼程進至處州界知府陸鍾等來迎至銅山寺駐師賊陽遣人求撫實覘之耳遂給榜示付之去時官兵陳于平地賊衆萬人出山索戰官兵分三陳賊攻中軍楷等令回趨馬軍射之死者三百餘人左右合擊死者又二百人持鎗者多為竹笆所制蓋鎗入竹隙急不得出悉被擒獲賊敗潰斬首六百餘級生擒百餘人初賊勢甚迫僉事陶成請招諭之乃從僕𨽻四五人徑抵賊巢諭以禍福言詞懇惻賊黨環動悚聽多率其黨降惟陶得二殺使者引餘黨入山中至是千户沈俊謂其部下多麗水鮑村人父子兄弟陷賊中者衆有何受等三人自言于陳前見其親屬今欲招撫請以此三人往可得也楷從之令齎榜入山反覆譬曉詞亦過狥楷至以老母百口與誓陶得二乃先出見楷優賞加賚令歸山中同賊首葉希八楊希陶秉倫率其黨十餘人來見楷納其降給帖令復業始知前黃柏鋪緋衣中流矢死者即葉宗留也明日受等三人又招得賊首余海四陳川十余卞等三百餘家出降亦許令復業六月上下璽書諭張楷相機勦撫之宜楷等奏報賊前後聽招撫復業者九千餘家男婦二萬餘人疏既上賊首陶得二等回山復疑懼擁衆如故欲以書招楷入楷亦復書諭之景帝景泰元年五月賊在慶元大社者又出掠麗水青田諸縣進攻武義武義無城郭副使陶成力禦之賊鋭甚麾下勸稍却以避其鋒成不可帥兵更進戰自辰至申俄而城中火起兵潰成䇿馬突陳死之成有威惠屢捍海寇有功至是死民思之不置未幾復得璽書諭楷等將已降賊令所司撫處廣布恩信戒官吏勿相激擾不聽撫者調兵勦滅楷復遣郡邑丞倅等官賫入山再招之陶得二等始聽招盡焚其寨出降餘黨因陶得二降悉解散復業所司隨在撫諭之楷等乃班師露布以聞楷還京㑹帝北狩舊經事大臣多陷沒廷議楷無功追論下于理議上以冦平功贖罪得放歸二年秋七月鎮守浙江福建侍郎孫原貞以處州盜平奏析麗水青田二縣置雲和宣平景寧三縣福建置永安壽寧二縣從之谷應泰曰浙東入閩道險而狹迤邐千里山勢崨嶫灌木蓊翳糾紛盤互不逞之徒往往跳穴其間內可以聚糗糧下可以伏弓弩急可以逺遁走緩可以縱剽掠以故浙閩多冦盜好作亂長吏不敢問將兵者難撲滅地險然也又况括蒼諸坑頗産貢金椎埋嗜利者因緣為奸趨之如騖聚衆益多以故慶元葉宗留以千餘人攻政和此亂之始也然其由浦城劫建陽則自浙犯閩攻上饒破永豐則自浙犯江而葉希八又焚浦城屯雲和麗水則自閩還犯浙矣其時閩地鄧茂七反寧化蔣福成反尤溪莫不據地稱王摧鋒陷敵擁衆萬餘轉戰數郡比之于浙為尤劇焉昔武帝之時東甌閩越治兵相攻遼濶阻深尚煩漢救而使其合兵連橫侵暴吏民咸陽雖逺可付之度外耶于是中丞張楷銜命督師劉聚陳榮分兵進討既而榮既敗沒賊又滋蔓宗留雖死明松復來希八未亡鑑胡更作何異淮裔煽亂徐戎並興甲午祠兵魯師欲潰乃始一侯二伯授鉞南征六將兩璫協謀東伐猶之赤眉敗禹更命馮異盧循摧毅還仗宋公雖望桑榆之收亦苦潢池之酷矣所幸者閩冦自閩浙冦自浙地雖旁掠勢不交通取虞取虢此成擒耳假令浙冦北下婺州東收廣信閩冦南驅光澤西薄建昌聨師有犄角之形事成有中分之約則八閩既困江浙亦搖而更待朱瑛橫格鉛山中官分守要地不已晚乎雖其後福成茂七先後並殱希八鑑胡同歸欵附東陵渠帥次第盡矣而獨參政宋彰者輸賂王振責償閭閻民苦誅求盜所自起五年之間村落為墟赤羽徴兵青芻轉餉土木之妖先萌內地奸閹柄政禍如是乎至于陶得二屢叛而貸死張楷捷奏而下獄蓋二以楷庇獲全楷以振黨受過刑賞失中亦云忒矣若夫孫原貞條奏浙增雲宣三邑閩置永壽二縣犬牙相錯馭險之規也但磴道素多槎丫羣盜易于伏莽黃門剃髮蝨乃不生馬援伐樹冦遂永絶原貞之䇿乃更不及此耶明史紀事本末卷三十一
