body:
  text: 明史紀事本末卷十一浙江提學僉事谷應泰編太祖平夏元順帝至正十五年春徐夀輝將明玉珍據成都玉珍隨州人世農家身長八尺目重瞳以信義為鄉黨所服初聞徐夀輝兵起集鄉兵屯于青山結柵自固未幾降于夀輝授元帥𨽻倪文俊麾下鎮沔陽與元將哈喇圗戰湖中飛矢中右目微眇十四年以兵千人槳斗船五十溯夔而上時青巾盜李喜喜聚兵苦蜀元義兵元帥楊漢以兵五千禦之屯平西右丞相旺扎勒圖鎮重慶置酒飲漢欲殺之漢覺脫身走順流下巫峽遇玉珍訟之且言重慶可取狀玉珍未決萬戶戴夀曰攻重慶事濟歸無損也從之遂進克其城旺扎勒圗遁父老迎入城玉珍禁侵掠市肆晏然降者相繼十八年旺扎勒圗自果州來攻重慶屯嘉定之大佛寺明玉珍使明三禦之明三黃陂人驍勇善戰玉珍弟畜之後復姓名曰萬勝又密遣猛士夜眼陳劫烏斗山寨搗嘉定皆下之惟大佛寺未下玉珍親濟師旬日城潰旺扎勒圖恭政趙資平章郎德格皆死之人稱三忠道出瀘州自訪元進士劉禎喜曰吾得一孔明也二十一年明玉珍稱隴蜀王初玉珍謀討陳友諒乃整兵守夔關不與通復立廟以祀徐夀輝至是遂自稱隴蜀王二十二年春三月明玉珍僣稱帝于蜀國號大夏改元天統倣周制設六卿又置翰林院承旨學士國子監等官賦稅十取其一開廷試置雅樂供郊祀之祭皆劉禎為也二十三年明玉珍遣萬勝等三道攻雲南梁王博囉走金馬山勝入城據之博囉復集衆來攻勝敗于關灘引還二十四年萬勝攻興元敗還鄒興克巴州二十五年九月夏主明玉珍以萬勝戴夀為左右丞相遣參政江儼來通好命都事孫養浩報之是年萬勝取興元二十六年春三月夏主明玉珍卒年三十六玉珍頗節儉好文學蜀人安之子升嗣升年始十嵗母彭氏同聽政改元開熙其都察院張文炳用事忌萬勝使玉珍義子明昭矯彭氏旨殺之勝夏驍將也兵無不一當百勝死夏以不競劉禎代為丞相吳友仁移檄興兵升命戴夀討之友仁曰不誅昭國必不安昭若朝誅吾當夕解夀乃奏誅昭友仁入朝謝罪不問九月己亥夏主明升遣使來聘使者自言其國東有瞿塘三峽之險北有劍關棧道之阻古人謂一夫守之百人莫過而西控成都沃壤千里財富利饒實天府之國太祖笑曰蜀人不以修德保民為本而恃山川之險誇其富饒此豈自天而降耶使者退太祖因語侍臣曰吾平日為事只要務實不尚浮偽此人不能稱述其主之善而但誇其國險固失奉使之職矣吾常遣使四方戒其謹于言語勿為誇大恐遺笑于人如蜀使者之謬妄當以為戒也遣參知政事蔡哲往報蜀哲挾畫工同往圗其山川險易以獻太祖覽而嘉之遂為取道伐蜀之張本太祖洪武元年冬十二月遣使以書諭夏主明升二年秋八月夏主明升遣使來貢王師平關陜蜀人震恐戴夀謂升曰大明天子遣將用兵所向無敵以王保保李思齊強盛竟莫能禦况吾蜀乎倘一旦有警計將安出吳友仁曰蜀地非中原比設有緩急據險可守為今之計莫若外假交好以緩敵內修武事以自強升從其言遣使修貢上賜璽書答之曰朕歷觀古有蜀者如公孫述李特王建孟知祥輩皆能乘機取進而善守之道未聞今足下必圗所以善守可也朕連年出師所向克捷皆諸將用命故能成功逺勞致禮益見厚意因使者還姑以此復冬十月壬戌遣平章楊璟諭明升奉國入覲升牽于羣議不能決璟將還復以書曉之曰古者同力度德同德度義無可度焉則為順圗足下自謂瞿塘劍關一夫負戈萬卒誰何此皆不逹時變相謬誤足下自度孰與劉備諸葛孔明然僅僅能自保足下疆場南不過播州北不過興元王師一至所為足下謀者各自為計足下奉老母安歸乎足下即沖幼當亦痛心老母順逆之圗度之而已升不能從三年夏五月大將軍徐逹既出安定走王保保乃遣左副將軍鄧愈招撫土畨而自帥所部攻興元以傅友德為前鋒自秦州南出一百八渡至略陽擒故元平章蔡琳遂入沔州分遣禆將金興旺等由鳯翔入連雲棧合攻興元興元守將劉思忠知院金慶祥迎降留金興旺張龍守之逹還軍西安秋七月蜀將吳友仁寇興元守將金興旺張龍出兵擊却之明日友仁復來攻興旺與戰面中流矢拔矢再戰斬首數百時城中守兵才三千友仁兵三萬興旺以衆寡不敵斂兵入城遣使間道走寶雞請援兵友仁圍城決濠填塹攻益急興旺嬰城拒守發巨炮擂石敵兵多死傷時徐逹在西安得報即帥師還屯益門鎮先遣傅友德領兵三千徑趨黑龍江夜襲木槽關攻斗山寨友德令軍中人持十炬燃于山上友仁軍望見大驚乘夜遁四年春正月丁亥上親祀上下神祗告伐明升命中山侯湯和為征西將軍江夏侯周德興為左副將軍德慶侯廖永忠為右副將軍滎陽侯楊璟都督僉事葉升等率京衛荆湘舟師由瞿塘趨重慶潁川侯傅友德為前將軍濟寧侯顧時為左副將軍都督僉事何文輝等率河南陜西步騎由秦隴趨成都上諭和等曰今天下大定四海奠安惟川蜀未平耳朕以明玉珍嘗遣使修好存事大之禮憫明升稚弱不忍加兵數遣賜開諭冀其覺悟升乃惑于羣議反以兵犯吾興元不可不討今命卿等率水陸大軍分道並進首尾攻之使彼疲于奔命勢當必克但師行之際在肅行伍嚴紀律以懷降附無肆殺掠昔王全斌之事可以為戒卿等慎之諸將陛辭上復密諭傅友德曰蜀人聞吾西伐必悉其精鋭東守瞿塘北阻金牛以拒我師彼謂地險吾兵難至若出其意外直搗階文門户既隳腹心自潰兵貴神速但患卿等不勇耳友德頓首受命仍命宋國公馮宗異往陜西修城池衛國公鄧愈往襄陽訓練軍馬運糧餉以給征蜀軍士二月江夏侯周德興指揮胡海等進兵取蜀之龍伏隘進奪覃垕溫陽關中山侯湯和率師克歸州李逢春烽火山寨分遣南雄侯趙庸宣寧侯曹良臣帥兵取桑植容美洞會周德興合攻茅岡覃垕寨克之三月平章楊璟進次瞿塘不利先是蜀人自謂瞿塘天險其平章莫仁夀守之以鐵索橫斷關口及聞王師臨境又遣左丞戴夀平章鄒興副樞飛天張等益兵為固守計夀等于鐵索外北倚羊角山南倚南城寨鑿兩岸壁引纜為飛橋三平以木板置炮石木竿鐵銃其上傍橋兩岸復置炮以拒王師至是璟師次夔州大溪口遣指揮韋權率兵出赤甲山以逼夔州指揮李某出白鹽山下逼夔府南岸以攻南城寨璟與都督僉事王簡出犬溪口進攻瞿塘扼江之衆璟戰不利赤甲白鹽之師亦退還歸州潁川侯傅友德受命馳至陜集諸道兵揚言出金牛而使人潛覘知青州果陽空虛階文雖有兵壘而守備單弱于是引兵趨陳倉選精鋭五千為前鋒攀援山谷晝夜兼行大軍繼之夏四月丙戌直抵階州蜀守將平章丁世真率衆來拒友德擊敗之生擒其將雙刀王等十八人世真遁去遂克階州進至文州距城三十里蜀人斷白龍江橋以阻我師友德督兵修橋以渡至五里關蜀平章丁世真復集兵據險都督同知汪興祖躍馬直前中飛石死友德怒奮兵急擊破之世真僅以數騎遁去遂拔文州庚寅上以湯和傅友德等伐蜀三月未得捷報命永嘉侯朱亮祖為右副將軍帥師助之丁酉傅友德下青州果陽留指揮潘忠守之進兵徇江油彰明二縣下之癸卯遂趨綿州友德選精鋭鼓行而前别遣都督僉事藍玉夜襲其壘蜀守將向大亨軍驚擾逹旦友德麾兵乘之俄大風起諸軍乘風縱擊蜀兵大敗遂克綿州龍驤衛指揮史鑑死之大亨走保漢州友德至漢州阻水不得渡乃命軍中造戰艦百餘艘時蜀人雖失階文猶恃漢水自固及聞我師造舟進取乃益震恐五月己卯戰艦成友德將進兵漢州欲以軍事逹湯和而山川懸隔適江水暴漲乃以木牌數千大書克階文綿州日月投漢江順流而下蜀守者見之為之解體初蜀人命丞相戴夀太尉吳友仁等悉衆守瞿塘以扼三峽之險及聞友德破階文搗江油夀等乃與友仁分瞿塘守兵還援漢州以保成都未至而友德舟師已逼漢州向大亨悉兵陳于城下友德選驍騎擊敗之既而夀等兵至友德下令諸將曰彼勞師逺來聞向大亨新敗必洶洶可一戰克也乃親帥師迎擊夀等大敗之六月壬午遂拔漢州夀與大亨走成都臨江侯陳德追擊又敗之獲其卒三千餘人馬三百匹友仁走古城友德乃以濟寧侯顧時守漢州自將擊古城又大敗其衆殺獲二千餘人并擒宣慰胡孔彰等獲馬騾五百餘匹友仁自古城遁還保寧時湯和兵發歸州進攻瞿塘關以江水暴漲不得進乃駐師大溪口欲俟水稍平上聞之恐其逗遛緩事而傅友德捷書適至乃詔和曰傅將軍率精鋭冒險深入克階文及青州果陽白水江之地兵既越險次于平川蜀人無險可恃正當水陸並進使彼首尾受敵疲于奔命平蜀之機正在今日朕前日所以語爾者獨不記憶乎何怯之甚也詔至廖永忠遂率所部先進和猶遲疑不決會得友德木牌于江流乃進兵自白鹽山伐木開道由紙牌坊溪趨夔州永忠兵先至舊夔州蜀平章鄒興副樞飛天張等出兵拒戰戊子永忠分軍為前後陳軍既交出後軍兩翼夾擊之興等大敗明日復併兵攻之擒其元帥龔興殺溺死者甚衆辛卯永忠進兵瞿塘關永忠以山峻水急而蜀人設鐵索飛橋橫據關口我舟不得上乃密遣壯士數百人舁小舟踰山度關出其上流人持糗糧帶水筒以禦飢渴山多草木令將士皆衣青蓑衣魚貫山巖石間蜀人不覺也度已至乃率精鋭出黑葉渡分為兩道夜五鼓以一軍攻其陸寨一軍攻其水寨攻水寨將士皆以鐵裹船頭置火器而前黎明蜀人盡鋭來拒永忠先破其陸寨既而將士舁舟出江者一時俱發上流揚旗鼓譟而下蜀人出不意大駭而下流之師亦擁舟急擊發火炮火筒夾攻大破之鄒興中火箭死遂焚其三橋斷其橫江索擒同僉蔣逹等八十餘人斬首千餘級溺死者無算飛天張鐵頭張等皆遁去永忠入夔州明日湯和兵始至永忠乃與分道帥舟師自夔州乘勝抵重慶沿江州縣望風奔附次銅鑼峽明升與右丞劉仁等大懼仁勸明升奔成都其母彭氏泣曰事勢如此縱往成都不過延命旦夕何益仁曰然則奈何彭氏曰大軍入蜀勢如破竹今城中軍民雖數萬皆膽破心怖豈能效力若驅之出戰死傷必多亦終不免也不如早降以免生靈于鋒鏑明升遂遣使詣永忠軍全城納欵永忠以湯和軍未至辭不受癸卯湯和至重慶會永忠以兵駐朝天門外是日明升面縛銜璧與母彭氏及其右丞劉仁等奉表詣軍門和受璧永忠解縛承制撫慰下令將士不得侵掠撫諭戴夀向大亨等家令其子弟持書往成都招諭遣指揮萬德送明升等并降表于京師朱亮祖兵亦至秋七月傅友德兵圍成都戴夀向大亨等出戰以象載甲士列于陳前友德命前鋒以火器衝之象却走夀兵躙藉死者甚多會湯和遣人報重慶之捷夀等亦得家書聞重慶已降而室家皆完乃籍府庫倉廩遣其子詣軍門納欵友德許之翼日庚申夀率其屬降友德整衆自東門入得士馬三萬分兵會朱亮祖徇州縣之未附者壬戌崇慶知州尹善清拒戰擊敗斬之判官王桂華率父老降夀大亨既降至夔峽皆鑿舟自沉死八月上遣使諭湯和等曰為將貴審機而重料敵今全蜀已下惟吳友仁尚據保寧偷旦久之命乘機而取之此破竹之勢無不克者將軍徘徊不進何也吾付將軍以大任而臨事往往逗撓如此何以總軍政寄國事乎和聞詔遣周德興會傅友德克其城執友仁送京師誅之蜀地悉平明升至京師廷臣上言宋乾德間孟昶降有叩頭伏罪禮上曰昶奢淫自恣升幼孽自臣下可免其伏地禮封升為歸義侯居第京師已而投升于髙麗命曹國公李文忠經理四川文忠以成都舊城卑隘增築新城髙壘深池規制略備時時傅友德駐兵保寧湯和駐兵重慶各遣人招輯畨漢人民及明氏潰亡士卒來歸者因籍其壯丁丙子置成都右中前後四衛分𨽻之復置保寧守禦千戶所調濠梁等衛官軍守之十二月辛卯賞平蜀將士傅友德廖永忠各白金二百五十兩彩縀二十表滎陽侯楊璟南雄侯趙庸永嘉侯朱亮祖不與賞上親製平西蜀文紀傅廖二將之功谷應泰曰聞之名山大川不封諸侯王公設險用守厥國而周都雒陽則曰南望三塗北望嶽鄙有德易以王無德易以亡蓋古者賢明之王在德不在險也夫中國之得地險者宜無過巴蜀棧道揭其北瀘水阻其西表岷峨之天闕帶二江之雙流勇夫重閉幾乎斗絶矣而自古及今敗亡相繼俘縶入臣罕有全者則蜀之地險固不足恃也方夫元運垂終羣雄並起明玉珍以隨州布衣結寨青山為徐夀輝之外臣倪文俊之守將及文俊見殺于友諒而遂奄有三巴盜竊名字比之劉宗下輦而自王公孫躍馬而稱帝功尤易易也玉珍不以此時北趨子午入叩關隴南下夷陵先窺漢沔而但固守夔門改元稱制偏隅自割坐待滅亡此䇿之最下者是則東之自守者無過士誠而西之自守者無過玉珍也方太祖之初逐鹿中原未遑外討答書通聘以待隗囂厚禮卑辭以驕李密而使者乃以張裔之口舌誇蠶叢之形勝井蛙坐大斯為過矣至于元都已沒秦晉悉平蜀道一隅勢如黑子乃始命鄒興莫仁夀等瞿塘阻水鐵鎖橫關丸泥墨守不已晚乎若夫太祖之伐蜀也以湯和等舟師入峽疾趨重慶此正兵也而傅友德一軍揚言發金牛潛師取階文者此竒兵也夫鄧艾縋入隂平則綿竹之師不摧而潰吳漢襲至廣都則城市之橋可燒而斷宜乎劉仁表詣軍門明升面縛銜璧而彭氏以為縱走成都不過延命旦夕也乃知桓溫既入李勢告亡全斌濟師孟昶不祀此張載勒銘于劍閣左思致誡于蜀都玉壘銅梁險無足據矣從此冉駹效順卭笮景從䈮醬出于番禺竹杖來于大夏版圗之盛固不必言獨是功紀傅廖文皆御製楊璟以無績而不敘小校以非義而輟賞勸懲斯在又非特平蜀之規耳若夫明升者封侯歸義居第京師要領克全母子相保雖劉禪樂魏身不生還而望帝歸魂死猶啼血嗚呼方西川僣號時其為寄生久矣明史紀事本末卷十一
