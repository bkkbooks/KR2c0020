body:
  text: 明史紀事本末卷五十五浙江提學僉事谷應泰編沿海倭亂太祖洪武二年夏四月時倭寇出沒海島中數侵掠蘇州崇明殺略居民劫奪貨財沿海之地皆患之太倉衛指揮僉事翁德帥官軍出海捕之遇于海門之上幫及其未陳麾兵衝擊之斬獲不可勝計生擒數百人得其兵器海艘命擢德指揮副使其官校賞綺幣白金有差仍命德領兵往捕未盡諸寇三年三月遣萊州同知趙秩持詔諭日本國王良懷令革心歸化日本古倭奴國在東海中綰波而宅自玄菟樂浪底于徐聞東管所通中國處無慮萬餘里國君居山城所統五畿七道三島為郡五百七十有三然皆依水附嶼大者不過中國一村落而已戶可七萬課丁八十八萬三千有竒自元帥討日本者沒于水不得志日本亦不復來貢至是帝遣使諭降之四年冬十月癸巳日本國王良懷遣其僧祖朝來進表箋貢馬方物并僧九人來朝又送至明州台州被掠男子七十餘人詔賜文綺答之十二月詔靖海侯吳楨籍方國珍所部溫台慶元三府軍士及蘭秀山無田糧之民嘗充船戶者凡十一萬一千七百餘人𨽻各衛為軍仍禁濵海民不得私出海時國珍餘黨多入海剽掠故也禎既至三郡每挾私意多引平民為兵瀕海大擾寧海知縣王士𢎞曰吾寧獲死罪不可誣良民為兵即上封事詞甚切上立罷之六年春正月德慶侯廖永忠上言今北邊遺孽逺遁萬里之外獨東南倭寇負禽獸之性時出剽掠擾瀕海之民陛下命造海舟剪捕此寇以奠生民德至盛也然臣竊觀倭彛竄伏海島因風之便以肆侵略來若奔狼去若驚鳥臣請令廣洋江陰橫海水軍四衛添造多櫓快船令將領之無事則沿海巡徼以備不虞倭來則大船薄之快船逐之彼欲為內寇不可得也上從之七年夏六月倭寇膠海靖海侯吳禎率沿海各衛兵捕至琉球大洋獲倭寇人船俘送京師十三年春正月胡惟庸謀叛約日本令伏兵貢艘中會事覺悉誅其卒而發僧使于陕西四川各寺中示後世不與通十七年春正月倭頻寇浙東命信國公湯和巡視海上築山東江南北浙東西海上五十九城咸置行都司以備倭為名二十年二月置兩浙防倭衛所夏四月戊子命江夏侯周德興往福建福興漳泉四郡視要害築海上十六城籍民為兵以防倭寇增置巡檢司四十有五分𨽻諸衛二十二年冬十二月倭寇寧海尋犯廣東二十七年春二月倭寇浙東命都督楊文劉德商皓巡視兩浙復命魏國公徐輝祖安陸侯吳傑往浙訓練海上軍士同楊文等防倭秋八月命吳傑同永定侯張全往廣東訓練海上軍士防倭冬十月倭寇金州三十一年春二月倭寇山東浙東成祖永樂元年日本王源道義遣使入貢賜冠服文綺給金印四年冬十月平江伯陳瑄督海運至遼東舟還值倭于沙門追擊至朝鮮境上焚其舟殺溺死者甚衆九年春正月丙戌命豐城侯李彬平江伯陳瑄等率浙江福建舟師勦捕海寇三月中軍都督劉江守遼東不謹斥堠海寇入寨殺邊軍上怒遣人斬江首既而宥之使圖後效夏五月倭寇浙東十四年夏五月敕遼東總兵都督劉江及緣海衛所備倭寇相機勦捕命都督同知蔡福等率兵萬人于山東沿海巡捕倭寇六月倭舟三十二艘泊靖海衛楊村島命福等合山東都司兵擊之十二月置遼東金州旅順口望海堝左眼右眼三手山西沙洲山頭爪牙山敵臺七所十五年春正月倭寇浙江松門金鄉平陽冬十月遣禮部員外郎吕淵等使日本先是帝命太監鄭和等齎賞諭諸海國日本首先歸附詔厚賚之封其鎮山賜勘合百道與之期期十年一貢無何捕倭將士寇數十俘獻京師俱日本人羣臣請誅之以正其罪上乃遣淵賜敕切責之十七年夏六月遼東總兵都督劉江大破倭寇于望海堝先是江巡視各島至金州衛金線島西北望海堝上其地特高廣可駐兵千餘詢諸土人云洪武初都督耿忠亦嘗于此築堡備倭離金州城七十餘里凡寇至必先經此實濵海咽喉之地上疏請用石壘堡置煙燉瞭望上從之一日瞭者言東南夜舉火有光江計寇將至亟遣馬步官軍赴堝上堡備之翼日倭寇二千餘乘海􅀈直逼堝下登岸魚貫行一賊貌醜惡揮兵率衆勢鋭甚江令犒師秣馬略不為意以都指揮徐剛伏兵于山下百戶江隆帥壯士潛燒賊船截其歸路乃與之約曰旗舉伏起鳴炮奮擊不用命者以軍法從事既而賊至堝下江被髮舉旗鳴炮伏盡起繼以兩翼並進賊衆大敗死者橫仆草莽餘衆奔櫻桃園空堡官軍追圍之將士奮勇請入堡勦殺江不許特開西壁以待其奔分兩翼夾擊之生擒數百斬首千餘間有脫走􅀈者又為隆等所縛無一人逸者凱還將士請曰將軍見敵意思安間惟飽士馬及臨陳作真武披髮狀逮賊入堡不殺而縱之何也江曰窮寇逺來必勞且飢我以逸飽待飢勞固治敵之道賊始魚貫而來為蛇陳故披髮作此狀以鎮服之所以愚士卒之耳目作士卒之鋭氣賊既入堡有死而已我師攻之彼必致死未必無傷寇出縱其生路即圍師必缺之意此固兵法顧諸君未察耳事聞上賜敕褒進封江廣寧伯子孫世襲將士賞賚有差先是元末瀕海盜起張士誠方國珍餘黨導倭寇出沒海上焚民居掠貨財北自遼海山東南抵閩浙東粵濵海之區無嵗不被其害至是為江所挫斂迹不敢大為寇然沿海稍稍侵盜亦不能竟絶英宗正統四年夏四月倭寇浙東先是倭得我勘合方物戎器滿載而東遇官兵矯云入貢我無備即肆殺掠貢即不如期守臣幸無事輒請俯順倭情已而備禦漸疏至是倭大皓入桃渚官庾民舍焚劫驅掠少壯發掘塜墓束嬰孩竿上沃以沸湯視其啼號拍手笑樂得孕婦卜度男女刳視中否為勝負飲酒積骸如陵於是朝廷下詔備倭命重師守要地增城堡謹斥堠合兵分畨屯海上寇盜稍息世宗嘉靖二年五月日本諸道爭貢大掠寧波沿海諸郡邑鄞人宋素卿者初奔日本正德六年與其國人源永壽來貢其從父澄識之告素卿附倭狀守臣以聞置不問至是其主源義植幼暗不能制命羣臣爭貢各強給符驗左京兆大夫內藝興遣僧宗設右京兆大夫髙貢遣僧瑞佐及宋素卿先後至寧波爭長不相下故事畨貨至市舶司閲貨及宴坐並以先後為序時瑞佐後而素卿狡賄市舶太監先閲佐貨宴又坐設上設不平遂與佐相讐殺太監又以素卿故陰助佐授之兵器而設衆強拒殺不已遂燬嘉賔堂劫東庫逐瑞佐及餘姚江佐奔紹興設追之城下令縛佐出不許乃去沿途殺掠至西霍山洋殺備倭都指揮劉錦千戶張鏜執指揮袁璡百戶劉恩又自育王嶺奔至小山浦殺百戶胡源浙中大震設負固據海嶴巡按御史歐珠鎮守太監梁瑶奏聞逮素卿下獄待訊倭自是有輕中國心矣給事中夏言上言倭患起于市舶遂罷之初太祖時雖絶日本而二市舶司不廢市舶故設太倉黃渡尋以近京師改設福建浙江廣東七年罷未幾復設蓋以遷有無之貨省戌守之費禁海賈抑姦商使利權在上也自市舶內臣出稍稍苦之然所當罷者市舶內臣非市舶也至是因言奏悉罷之市舶罷而利權在下姦豪外交內詗海上無寧日矣四年二月宋素卿伏誅初宗設遁海島不獲獨素卿及瑞佐下獄會朝鮮兵徼海者得其魁仲林望古多羅等三十三人國王李懌奏獻闕下于是發仲林等至浙責與素卿對簿備鞫遣貢先後及符驗真偽既悉有司以爰書上請乃論素卿死釋瑞佐還本國十八年國王源義植復以修貢請許之期以十年人無過百船無過三然諸夷嗜中國貨物人數恆不如約至者率遷延不去每失利云二十五年倭寇寧台自罷市船後凡番貨至輒主商家商率為姦利負其責多者萬金少不下數千索急則避去已而主貴官家而貴官家之負甚于商番人近島坐索其負久之不得乏食乃出沒海上為盜輒搆難有所殺傷貴官家患之欲其急去乃出危言撼當事者謂畨人泊近島殺掠人而不出一兵驅之備倭固當如是耶當事者果出師而先陰泄之以為得利他日貨至且復然如是者久之倭大恨言挾國主資而來不得直曷歸報必償取爾金寶以歸因盤據島中不去並海民生計困迫者糾引之失職衣冠士及不得志生儒亦皆與通為之鄉導時時寇沿海諸郡縣如汪五峰徐碧溪毛海峰之徒皆華人僣稱王號而其宗族妻子田廬皆在籍無恙莫敢誰何巡按浙江御史陳九德請置大臣兼巡浙福海道開軍門治兵捕討聼以軍法從事從之乃以朱紈為右副都御史巡撫浙江兼攝福興泉漳未至而泊寧波台州諸近島者已登岸攻掠諸郡邑無算官民廨舍焚燬至數百千區巡按御史裴紳劾防海副使沈瀚守土參議鄭世威因乞敕紈嚴禁泛海通番勾連主藏之徒從之紈乃下令禁海凡雙檣餘艎一切毁之違者斬乃日夜練兵甲嚴糾察數尋舶盜淵藪破誅之因上言去外盜易去中國盜難去中國羣盜易去中國衣冠盜難遂鐫暴貴官家渠魁數人姓名請戒諭之不報于是福建海道副使柯喬都司盧鏜捕獲通畨九十餘人以上紈立決之于演武場一時諸不便者大譁蓋是時通畨浙自寧波定陽閩自漳州月巷大率屬諸貴官家咸惴惴重足立相與詆誣不休諷御史周亮給事中葉鏜奏改紈為巡視未幾紈復上言長嶼諸處大俠林參等號稱刺逹總管勾連倭舟入港作亂更有巨姦擅造餘艎走賊島為鄉導躪海濵鞫論明確宜正典刑章下兵部侍郎詹榮覆奏中國待外裔不以向背責之以昭天地之量紈所論坐俱關重刑乞下都察院覆核從之于是御史周亮等劾紈注措乖方專殺啓釁因及福建防海副使柯喬都指揮使盧鏜黨紈擅殺宜置于理帝遂奪紈官命還籍聼理遣給事中杜汝禎往福建會巡按御史陳宗夔訊喬等併核紈事汝禎宗夔勘紈聼信姦回柯喬盧鏜擅殺無罪皆當死奏下兵部尚書丁汝夔如其議上帝從之命喬鏜繫福建按察司待決紈恚自殺士論惜之遂罷巡撫御史不復設三十年夏四月浙江巡按御史董威宿應參前後請寬海禁下兵部尚書趙錦覆議從之自是舶主土豪益自喜為姦日甚官司莫敢禁三十一年夏四月倭寇犯台州破黃巖大掠象山定海諸邑汪直者徽人也以事亡命走海上為舶主渠魁倭人愛服之倭勇而戅不甚别死生每戰輒赤體提三尺刀舞而前無能捍者其魁則皆浙閩人善設伏能以寡擊衆大羣數千人小羣數百人而推直為最徐海次之又有毛海峰彭老生不下十餘帥列近洋為民害至是登岸犯台州破黃巖四散象山定海諸處猖獗日甚知事武偉敗死浙東騷動秋七月廷議復設巡視重臣以都御史王忬提督軍務巡視浙江海道及興漳泉地方忬巡撫山東聞命即日至浙度所治軍府皆草創而浙人柔脆不任戰所受簡書輕不足督率吏士乃上疏請假事權誅賞得便宜且欲嚴內應之律寬損傷之條勦撫勿拘從之改巡視為巡撫忬乃任參將俞大猷湯克寬為心膂徴狼土諸兵及募溫台諸下邑桀黠少年分𨽻諸將布列瀕海各鎮堡嚴督防禦浙人恃以無恐云三十二年春三月王忬破倭於普陀諸山初忬亷知俞大猷湯克寬材勇既虛已任之而都指揮盧鏜坐前都御史朱紈事尹鳯坐贓纍俱繫獄忬知其能奏釋之以為别將亦募兵分帥之日犒撫激勵欲得其死力倭魁汪直等結寨海中普陀諸山時出近洋襲官軍忬偵知之乃夜遣俞大猷帥鋭兵先發而湯克寬以巨艘佐之徑趨其寨縱火焚之倭倉皇覓餘艎走官軍隨擊大破之斬首一百五十餘級生獲一百四十三人焚溺死者無算值颶風發兵亂汪直等乘間率衆逸去都指揮尹鳯復以閩兵邀擊於表頭北茭諸洋斬首百餘級生獲二百餘人先後以捷聞賜白金文綺有差夏四月汪直毛海等既潰散剽忽往來不可測溫台寧紹俱罹其患參將湯克寬率兵循海堧護城堡捕奔輳斬獲亦相當於是賊移舟而北犯蘇松郡二郡素沃饒賊至捆載而去有蕭顯者尤桀狡率徑倭四百餘屠上海之南滙川沙逼松江而軍餘衆圍嘉定太倉所過殘掠不可言王忬遣都指揮盧鏜倍道掩擊斬蕭顯餘衆復奔入浙俞大猷等邀殺殆盡先是吳浙間人習選愞而文武大吏復不能以軍法繩下遂至破昌國臨山霩􅛾乍浦青村柘林吳松江諸衛所圍海鹽平湖餘姚海寧上海太倉嘉定諸州縣忬不欲冒功有所隱沒隨擊走之計倭所得亦不償失前後俘斬共三千餘級東南賴之五月給事中賀涇奏留都根本重地海洋密邇鎮江京口乃江淮咽喉瓜埠儀真又漕運門戶請設總兵駐鎮江從之秋七月太平府同知陳璋敗倭於獨山斬首千餘餘衆浮海東遁冬十月倭冦太倉州攻城不克分掠鄰境有失舟倭三百人突至平湖海寧等縣自獨山之敗倭東遁江南稍寧惟崇明南泊失風者幾三百人不能去總兵湯克寬及僉事任環留兵守之環屬兵三百皆新募勵以必死不入與家人訣為書赴之而去親介胄臨陳士無敢不用命者環敝衣芒履與士雜行伍依草舍間嚙糒飲水同甘苦至是相守不下賊潛出沒環常夜追之出其前後宰夫佩恐有失衣環衣介馬而馳故賊不知所取環嘗匿溝中賊過之不知匿至明士始得之又遇矢石士以死捍環環被傷舁之至水濱梁已撤丈餘超而過追急宰夫留禦之死焉環求其首為流涕親酬之相拒數月不克克寬復督邳漳等兵擊之敗績失亡四百人官軍疫不能攻乃開壁東南陬倭遂潰圍出掠蘇松各州縣百餘人由華亭縣漴缺登岸流劫至木涇金山衛移舟寶山克寬引舟師迎擊及於髙家觜毁其舟斬七十三級生擒十四人倭别隊失風至興化殺千戶葉臣卿知府黃士𢎞指揮張棟擊殱之時沿海諸姦民乘勢流劫真倭不過十之二三三十三年三月倭自太倉潰圍出乃掠民舟入海趨江北大掠通州如臯海門諸州縣復焚掠鹽場有漂入青徐界者山東大震改王忬為右副都御史巡撫大同以徐州兵備副使李天寵代之忬在浙江薦盧鏜釋柯喬激勵諸將鄧城劉堂孫敖等爭奮逐北以死綏著節復廣為偵刺凡沿海大猾為倭內主者悉繫之按覆其家自是倭不復知中國虛實與所從向往而餘艎在海中者亦無以菽粟火藥通往往食盡自遁又行視諸郡邑未城者計冦緩急次第城之凡三十餘所杭州官吏以烽火不時發日集坊民登陴守多怨苦忬曰吾斥堠明無慮弗及奈何先敵受困耶令罷之一郡皆歡至是去以徐州兵備副使李天寵為僉都御史代忬忬去而浙復不寧矣初忬薦盧鏜為參將鎮閩閩人故忌鏜劾鏜凶險不可用罷之而沿海大猾且言忬令大猷搗巢非計欲搖動忬忬不為動已而南京各官復薦鏜乃用鏜為參將而以俞大猷為浙直總兵以南京兵部尚書張經總督浙福南畿軍務時朝議方徵狼土兵剿倭以經嘗總督兩廣有威惠為狼土所戴服故用之敕令節制天下之半便宜從事開府置幕自辟參佐經亦慷慨自負中外欣然謂倭冦不足平夏四月倭冦自海鹽趨嘉興參將盧鏜禦之稍却次日復戰於孟宗堰伏發殺官軍四百人溺死無算都司周應禎等死之賊乘勝入據石墩山分兵四掠攻嘉興府城副使陳宗夔帥兵禦却之焚其舟賊遁入乍浦與長沙灣冦合犯海寧諸縣既而東掠入海至崇明夜襲破其城知縣唐一岑死之倭自崇明進薄蘇州大掠六月倭自吳江掠嘉興都指揮夏光禦之背王江涇而陳倭鼓譟而前我兵大潰光急入舟中流矢溺死蘇州倭冦至嘉善轉掠松江出海總兵俞大猷擊敗之於吳松所擒七人斬二十三級八月倭冦自嘉興還屯採淘港柘林諸處進薄嘉定會募兵參將李逢時許國以山東民鎗手六千人至與賊遇於新涇橋逢時率麾下先進敗之賊退據羅店官軍追及之斬八十餘人許國恨逢時與同事不約已乃别從間道擊賊欲分逢時功追至採淘港乘勝深入伏起大潰溺水死者千人指揮劉勇等死之工部侍郎趙文華上言倭冦猖獗請禱祀東海以鎮之帝命往祀兼督察沿海軍務文華至浙凌轢官吏公私告擾益無寧日三十四年柘林倭奪舟犯乍浦海寧攻陷崇德轉掠塘棲新市橫塘雙林烏鎮菱湖諸鎮杭城數十里外流血成川巡撫李天寵束手無策惟募人縋城自燒附郭民居而已張經駐嘉興援兵亦不時至副使阮鶚僉事王詢竭力禦之僅免失陷致仕僉都御史張濓目擊時事痛之乃上言臣本杭人頃復家居五載頗知海冦始末始以海禁乍嚴遂致猖獗而督撫因循玩愒養成賊勢夫堂堂會城閉門旬日已有垂破之勢徒以意得志滿而去更無一兵一旅阻其去來城冦野心欲如溪壑能保其不復至哉臣恐賊退之後又復收拾傷殘首級虛張功次以欺陛下仍有從而庇之者則罰罪之典又移而為賞功之命矣臣寓父母之邦同舟共濟志惟切於報君嫌何避於出位敢以三策為陛下陳之一曰重軍法以作積弱之氣士惟力戰而後克敵亦惟畏法而後力戰今江南非無義勇也迎敵九死退走十生何怪其有退而無進哉軍法之行不在行陳而在平時誠得必死之士萬夫海冦百萬不足平矣一曰選民兵以收必勝之功夫江南衛所已成虛設地方有急輒假外兵糊口而來原非義勇掉臂而去莫可勾查臣愚以為莫若盡散調募之兵專責州縣立保伍更番較閲期於不擾一遇有警按籍而呼共保身家冦小至則率衆以攻之大至則堅壁以守之一曰復海市以散從賊之黨夫海市舊制原非創設向使瀕海之軍衛如故則市舶未為害也惟武備日弛不能制變而後海禁漸嚴倭冦乏食海冦由之以起惟軍民既練冦掠則懼遭斬獲交易則可保首領彼雖至愚必不以彼易此然後相機稍復海市之舊不惟散已聚之黨而瀕海窮民假此為生又足以收未潰之人心夏四月廣西田州土官婦瓦氏引狼土兵至蘇州總督張經分𨽻總兵俞大猷等殺賊時倭據川沙窪柘林為巢經冬涉春新倭日至地方甚恐聞狼兵至人心稍安賊分衆三千過金山衛俞大猷遣遊擊白泫及瓦氏兵邀之稍有斬獲趙文華至松江因謂狼兵可用厚犒之使擊賊至漕涇遇倭數百人戰不勝頭目鍾富黃維等十四人俱死失亡甚衆於是賊知狼兵不足畏復縱掠如故倭犯江北淮揚諸處前後由通州之餘東場海門之東夾港登岸流劫狼山利河諸鎮吕四餘西諸場復突入通州南門燒民屋二十餘間而去三丈浦倭賊分掠嘗熟江陰村鎮兵備任環督保靖土兵及知縣王秩統兵三千攻其巢破之賊奔江陰川沙窪駕舟出海官兵縱火焚其巢賊舟一至戚家墩遊擊白泫劉恩邀獲之江陰賊亦出江東遁五月張經破倭於王江涇逮經及巡撫都御史李天寵俱下詔獄論死初經至浙中用將佐何卿沈希儀輩名位已抗驕不為用而新拔士又慓猾不任兵所徴田州兵瓦氏山東鎗手俱不受律連戰敗衄望大損侍郎趙文華出視師頥指凌經經自以大臣位出文華上文華恚則連疏劾經謂其才足辦賊特以閩人避賊讐故縱賊耳帝大怒會臺諫亦有言者趣官校逮捕經時倭冦自柘林犯嘉興經遣參將盧鏜督狼土兵水陸攻之大敗賊於石塘灣賊北走平望俞大猷邀擊奔平望至王江涇永順宣慰官舍彭翼南攻其前保靖宣慰使彭藎臣躡其後遂大敗之斬首二千級溺死者稱是餘衆奔柘林縱火焚其巢駕舟二百餘艘出海遁自有倭患來此為戰功第一而文華論經之疏已上矣捷聞兵科言宜留經平倭以自贖不聼并李天寵湯克寬俱逮至京以縱冦論死文華既疏劾經奏以巡按御史胡宗憲為僉都御史代天寵巡撫而以周珫代經未幾復罷珫以南京戶部侍即楊宜為總督倭冦自海洋突犯蘇州南京都督周于德來援一戰而敗鎮撫蘇憲臣被殺賊中分其衆一由齊門撞馬頭而北轉掠滸墅關長洲五都地一由胥門木櫝而南轉掠吳縣橫鎮蔓延嘗熟江陰無錫之境出入太湖莫能禦者御史屠仲律上言宜守平陽港拒黃花澳據海門之險則不得犯溫台塞寧海關絶湖口灣遏三江之口則不得窺寧紹扼鱉子門則不得近杭州防吳淞江備劉家河則不得掩蘇松嘉興責江南守令以訓練土兵保全境內為殿最沿海沙民鹽徒及打生手宜收録併力禦賊詔從之川沙窪倭賊犯閘港周浦僉事董邦政遊擊周藩擊之遇賊驚潰藩被創死賊屯石塘橋流劫崑山石浦六月倭冦蘇常諸縣嘗熟知縣王秩江陰知縣錢錞及居鄉參政錢泮各督士民出禦力屈死之旋復冦蘇州民爭入城門不啓號呼震野乘陴者望之而嘆攀援上者又縋絶而下任環還自儀真曰奈何坐視之縱有覘諜我在無患也乃出辟門令男女以列進所活蓋數萬人復率解明道兵出城力戰賊退入太湖遣舟師邀之乃棄所獲逸去環以功進副使環復擊賊馬迹山圍逃倭嘉定民家投火爇之盡死既而環有親喪詔留之任事如故八月倭賊百餘自上虞爵溪所登岸犯會稽髙埠奪民居據之知府劉錫千戶徐子懿圍之賊潛縳木筏由東河夜渡潰圍而出居鄉御史錢鯨遭於蟶浦見殺賊自杭州西掠於潛昌化至嚴州淳安以浙兵迫急突入歙縣流劫至南陵趨太平操江兵扼之賊引而東犯江寧鎮指揮朱襄率勇士數百人禦之是時賊已至板橋襄等不知方袒裼縱酒突遇盡為所殱遂由安德鳯臺夾岡沿鄉搶掠趨秣陵關時應天府推官羅節卿指揮徐承宗率兵千人守關望風奔潰賊過關而去自南京出秣陵流劫溧水溧陽趨宜興無錫一晝夜奔一百八十里至滸墅關南直巡撫曹邦輔慮與柘林賊合且為大患乃親督兵備王崇古會集各部兵扼其東路四面蹙之隨地與戰親召僉事董邦政指揮樓宇以沙兵助勦一戰斬首十九級賊始却奔吳舍欲走太湖覺之追及於楊家橋盡殱其衆賊自紹興髙埠流劫杭嚴徽寧太平犯南都六七十人經行數千里殺傷無慮四五千人歷八十餘日始滅邦輔以捷聞歸功僉事邦政時趙文華聞冦且滅欲攘功急趨赴之比奏則邦輔己先之文華怒會柘林賊進據陶家港文華乃悉簡浙兵得四千人文華及胡宗憲親將之營於松江之磚橋約邦輔以直兵會勦浙兵分四道直兵三道東西並進賊悉鋭衝浙兵諸營皆潰損失軍士千餘人直兵亦陷賊伏中死者二百餘人賊勢大張文華恨邦輔至是乃以罪委之及僉事邦政詔下邦政總督逮問既而刑科給事中孫濬言後期之罪不在直兵今蘇松士民交稱邦輔實心任事而流劫留都之倭又為邦輔所滅功績顯然遽請罪斥文華非是兵科給事中夏栻亦言之上乃申飭文華秉公視師以圖大效已而邦政及指揮樓宇賞竟不及文華惡之也邦輔旋亦謫戌邉巡按直𨽻御史張雲路為論奏不報十一月止徵狼土諸兵土兵瓦氏等至浙驕悍不受約束所過殘掠百姓苦之於是總督楊宜力請止徵從之命兩廣督臣隨路掣止閏十一月給事中孫濬上言防倭諸臣既有巡撫督兵又有總督及都察重臣事權不一牽掣靡定迄無成功兵部覆奏諸臣職守督察主竭忠討冦實核布聞總督主徵集官兵指授方略巡撫主督理軍務措置糧餉總兵主設法教練身親戰陳至於有司責在保安地方固守城隍帝然之命行諸臣各遵敕諭施行十二月趙文華疏乞還京許之文華初奉命至浙適狼兵瓦氏等至知倭厚畜鋭意請戰文華惑之亟趨張經進戰不得則上書痛詆經被逮代經者周珫楊宜皆無逺略賊勢益熾及瓦氏戰敗攻陶宅餘倭復大衄始知賊未易圖有歸志至是川兵破周浦賊俞大猷復有海洋之捷文華遽言水陸成功請還然是時海洋回倭泊浦東川沙窪舊巢及嘉定髙橋皆倭據如故副使任環率永順保靖土兵勦新場倭冦時賊衆二千人皆伏不出而詐令人舉火於數里外若將引去者上舍彭翅先入嘗之不見一人於是頭目田災田豐等爭入伏發皆死之賊豕突去未幾復攻上海環以輕兵三百及之擊敗於五里橋習家墳又以兵援崑山而身間行抵太倉毛家葛隆諸屯賊方會集治攻具衝梯隊道肉薄而登環率死士飛刃砍之連碎其首矢石交下相殺傷甚衆又縋兵下突而前賊漸氣奪遂棄委走環既居憂哀毁又積苦兵間疾作卒三十五年春正月巡撫御史周如斗參總督楊宜提督曹邦輔輕率寡謀致川兵敗於東溝苗兵敗於新場東兵敗於四橋乞罷黜時上深以南冦為憂疑趙文華言餘冦將滅為不實屢問大學士嵩嵩曲為營解上意終不釋文華懼因言餘冦指日可滅督撫非人一敗塗地皆因吏部尚書李默恨臣前嵗劾其同鄉張經思為報復臣繼論曹邦輔則嗾給事夏栻孫濬媒孽臣及胡宗憲黨留邦輔浙直總督又不用宗憲而用王誥然則東南塗炭何時可解陛下宵旰何時可釋也默因得罪宜削籍為民邦輔亦被逮罷王誥以宗憲為兵部侍即兼僉都御史夏四月倭薄溫州同知黃釧馳檄出迎擊被執倭欲還之索千金為贖釧罵之不置倭怒磔殺之江北倭流劫至圌山山北等港無為州同知齊恩率舟師迎戰敗之斬首百餘級恩長子尚文次子嵩叔仲實弟寶榮姪慎寅友良大卿孫童俱在行間嵩年十八驍勇善射獨前追賊至安港恩等從之伏發恩及其家丁錢鳯等二十一人力戰皆死之獨嵩慎寅三人得脫賊遂乘勝至金山殺鎮江千户沈宗玉王世良於江中倭率衆數千自乍浦入欲犯杭州遊擊將軍宗禮帥兵九百禦之逆戰於皂角林分左右翼夾擊三戰三捷獲首功七十餘級賊首徐海等皆辟易稱為神兵會橋陷軍潰禮與鎮撫侯槐何衡義官霍貫道力戰俱陷陳死之禮驍勇敢戰所部箭手三千人皆壯士事聞贈恤有差總督胡宗憲奏遣生員蔣洲胡可願使倭寨傳諭渠魁令無犯順從之已而可願等還言倭渠欲通貢市宗憲以聞下兵部集議不可乃止倭圍巡撫阮鶚於桐鄉初鶚督學浙江開武林門納難民全活數萬人超擢巡撫方倭之冦嘉興也鶚議主勦而胡宗憲議主撫不相能倭自嘉興轉冦桐鄉氛益鋭去來實徐海麻葉領之陳東附焉東薩摩王弟書記也宗憲謀間之遣辨士説海海心動私語桐鄉守兵曰吾已欵督府矣城東門陳黨善備之是夕海道崇德而西東方急攻桐鄉宗憲説海縳麻葉因偽為麻葉書致東令圖海故逹海所東海中自疑始解圍去五月御史邵惟忠上言倭薄通州圍未解餘衆自狼山轉掠瀕江諸郡縣而瓜儀為留都門戶鎮常乃漕運咽喉不可視為緩圖宜大集兵敕諸臣戮力靖亂下兵部議請調河南睢陳及山東八衛陜西延綏兵及徐沛募兵敕遣才望大臣一人總督以為犄角保障留都帝然之已命兵部侍郎沈良才矣嚴嵩揣知上覺趙文華欺罔且見譴乃令文華自以其意請復視師嵩為言良才不勝任江南人引領俟文華至上乃止良才命文華以工部尚書兼右副都御史總督浙福直𨽻軍務文華既至浙假監督權凌脅百官搜括庫藏百萬計兩浙江淮閩廣所在徵兵集餉留漕粟除京帑給醝課迫富民脫凶惡浪授官職於是外冦未寧而內憂益甚六月倭入慈溪縣知縣柳東伯亡初王忬在浙計城各邑未城者慈溪士人獨持不可至是倭衆大至知縣不知所禦擕印組亡去殘殺民人無算而縉紳尤甚始悔失計東伯失守當坐死以無城可憑削籍為民省祭官杜槐與其父文明率兵追敗倭於王家團海道劉起宗委防餘姚慈溪定海未幾與賊遇於白沙一日三戰殺賊三十餘人斬其一帥槐被創墜馬死文明别將兵擊倭于演武場斬白睂倭帥一從七生擒二倭驚遁呼為杜將軍已而追至奉化楓樹嶺以兵少無繼陷陳死倭薄海鹽指揮徐行健程祿百戶方存仁逆戰死之八月海冦徐海伏誅初胡宗憲以簪珥遺徐海侍女翠翹緑珠令日夜説海縳陳東以報朝廷海且感而趙文華方治兵擊海宗憲佯曰彼且縳陳東何戰為海果賂薩摩王弟縳東以獻于是海勢日孤海自念數有功又信羅龍文誘約八月入謁督府于平湖海先期以數百人胄而入宗憲文華鶚坐堂上海等叩罪復謝宗憲宗憲下堂摩其頂曰朝廷且赦若慎勿再虞厚犒遣之海既出知官兵大集自疑宗憲使使諭之曰官兵防東黨爾毋恐海請居東沈莊陳東居西沈莊又令東詐為書遺其黨曰海約官兵夾勦汝矣東黨果疑相攻海令禆將辛五郎歸島宗憲密遣盧鏜計擒之文華調兵六千既集移營薄沈莊督之急宗憲猶心憐海不欲遽戰文華迫之宗憲乃下令與總兵俞大猷整師前進海知事變掘深塹自守柵數重官兵望之不敢入阮鶚檄趨之大猷乃從海鹽進攻東沈莊破之又追擊於梁莊會大風縱火諸軍鼓譟乘之賊大潰斬獲一千六百餘級海倉徨溺水死引出斬其首浙直海冦平海故杭之虎跑寺僧雄海上稱天差平海大將軍至是捷書上文華皆襲為已有帝命械繫首惡至京正法時浙東仙居浙西桐鄉二冦略平其分掠海門者把總張成敗之江北冦流入常鎮者總兵徐珏敗之蘇松寧紹相繼告捷兵部奏文華功帝從之降􅎁令文華還京論平倭功加文華少保宗憲右都御史各任一子錦衣千户餘升賞有差倭俘麻葉陳東等械繫至京禮兵部請獻俘從之羣臣俱賀時倭略平惟舟山賊據險結巢未下官兵環守之不能克諸狼土兵俱已遣歸而川貴兵六千人始至胡宗憲方留防春汛𨽻俞大猷經營舟山之賊會夜大雪大猷乃督兵四面攻之賊悉鋭出敵官軍競進賊敗歸乃以棕蓑捲火擲之賊四散潰出斬首一百四十餘級餘悉焚死三十六年冬十一月海冦汪直伏誅徐海等既死汪直復糾衆三千餘入寧波岑港大掠四境汪直徽人也宗憲亦徽人乃以金帛厚賂誘之云若降吾以若為都督置海上通互市乃迎直母與其子入杭厚撫之而奏遣生員蔣洲往諭與之盟直信之遂自奮言能肅清海波贖死命與其黨毛海峰葉碧川等從蔣洲來杭州洲至而直未至人疑其詐巡按周斯盛請罷貢罪洲於是逮洲獄洲乃陳諭倭始末及言直以誠來其未至必風阻耳已而直果乘巨舟遣頭目數十人隨來泊舟定海蓋初舟實為颶風所損也宗憲使人招直直願見洲洲方對理疑其觖望不遣遣千户夏正質其舟直素與正善不疑遂詣軍門請罪具言自效狀宗憲待以賓禮使指揮為其館主給輿夫出入復出蔬米酒肉供餽其舟人日費數百金且交質為信因具狀聞請赦之科臣王國禎力持不可疏入上謂直元凶不可赦宗憲乃密檄按察司收直等斬之論平倭功加宗憲太子太保餘皆遷賞然直雖就誅而三千人皆直死士無所歸益恚恨復大亂三十七年春二月倭犯潮州之鮀浦攻蓬州千戶所僉事萬仲分部水陸兵馬東西哨攻之臨敵而哨兵皆潰領哨千户魏嶽髙洪俱死尋犯福州巡撫阮鶚不能禦取庫銀數萬兩賂之以新造大舟六艘俾載而去夏四月倭掠台州臨海之三石鎮約數千人總督胡宗憲擊走之倭攻福清破之執知縣葉宗文舉人陳見率家僮禦賊不克與訓導塢中涵俱罵賊死五月自海口出港參將尹鳯引舟師擊之沈其舟七斬首六十餘級生擒七人餘衆遁去鳯追擊東洛外洋復敗之銃傷及溺水死者甚衆福興患少熄倭攻惠安知縣林咸乘城禦之攻五晝夜不克丁壯死者數百人倭亦失亡相當乃引去咸率兵擊倭鴨山乘勝追奔陷伏中死之倭分犯同安長樂漳泉諸處秋七月以浙江岑港海冦未平詔奪總兵俞大猷參將戚繼光職期一月蕩平命胡宗憲督之初宗憲遣毛海峰誘降汪直直至下獄海峰遂與倭目善妙等五百餘人燒船登岸列柵舟山阻岑港而守官軍四面圍之屢斬獲然海中數苦毒霧賊憑髙死鬭先登者多陷沒新倭復大至冬十月岑港倭移巢柯梅胡宗憲屢督兵討之不能克兵備副使谷嶠捍禦海上屢破倭制府以捷聞進山東參政三十八年春三月倭冦自象山河金纜井諸處焚舟登岸海道副使談綸與賊戰於馬岡敗之斬首七十級總督胡宗憲上言舟山殘孽移住柯梅即共焚巢夜徙力已窮蹙勢易成擒而總兵俞大猷參將黎鵬舉邀擊不力縱之南奔播害閩廣宜加重治上命逮大猷鵬舉至京訊治時人言籍籍謂倭之開洋也宗憲實陰遣之倭南行泊浯嶼焚掠君民由是福建人大譟謂宗憲嫁禍御史李瑚數其三大罪瑚與大猷俱福建人宗憲疑大猷漏言故委罪以自掩而大猷不善滑刺素不為嚴世蕃所喜故有是逮廷臣惜大猷才共假貸得三千金餽世蕃不死罷職發大同立功夏四月江北倭趨通州總兵鄧成禦之不利指揮張容被殺倭進據白浦鎮兵備副使劉景韶以遊擊丘升擊白浦于丁堰如臯海門三戰三捷賊謀犯揚州景韶復督升等以火攻其老營擊敗之焚死二百人賊逸入潘家莊盡鋭攻之先後斬首三百餘級初賊自南沙登岸犯通州至是勦絶廟灣倭合衆攻淮安參將曹克新禦之戰於姚家蕩自寅至申大敗之斬首四百七十級賊遁入姚莊縱火焚莊死者二百七十餘賊退入廟灣拒守劉景韶督兵擊倭於印莊斬首四十級賊西走次日復戰於新州賊遁入民莊我兵以火攻之凡再戰斬首二百六十級賊悉焚死無一人脫者時江北流倭悉殄惟廟灣據險固守不出五月江北兵攻倭於廟灣衝其巢斬首四千我兵死傷過當復退守之時賊營甚固巡撫李遂以我軍鼓戰而疲宜圍守之賊乏食且水陸斷其行道可收全勝通政唐順之以為玩冦乃自擐甲持矛麾兵以進屢挑戰賊終不出遂督兵入險賊盡鋭東西衝殺傷相當自是復稍稍出掠覔舟為走計矣順之知失計乃駕言經略三川沙倭南去踰月倭困廟灣既久劉景韶督卒填壕塹逼壘而陳令水兵載葦焚其舟復水陸進擊倭潛遁入舟官兵進據其巢追奔至瑕子港斬獲頗多餘倭無幾不復能戰乘風開洋而去福建新倭大至多齎攻具先攻福寧連江羅源流劫各鄉進攻福州不克移攻福安破之參將黎鵬舉以舟師擊倭於海中七星山屏風嶼斬首六十七級生擒六十八人時沿海長樂福清等境皆有倭舟廣東流倭往來詔安漳浦間浙江舟山倭移舟南來者尚屯浯嶼福州漳泉無地非倭矣舟山倭屯浯嶼經年至是乃開洋去其毛海峰者復移衆南嶴建屋而居永福倭移舟出梅花洋參將尹鳯擊敗之巡按樊獻科請趨胡宗憲應援未及行巡撫阮鶚往勦之倭稍創六月倭衆别部二十餘艘屯崇明三川沙總督胡宗憲檄總兵盧鏜帥師攻破之前後斬首百餘遁去宗憲以捷聞兼言唐順之贊畫功擢僉都御史秋七月三川沙倭突犯江北由海門縣七星港登岸流劫過金沙西亭將犯揚州參將丘升禦之戰於鄧家莊賊敗走仲家園復追至鍋團升輕騎先進賊覘無後繼盡鋭來衝升馬蹶被殺已而官軍大至賊遁八月倭自鄧家莊敗後沿海覓舟不得官軍尾之於劉家橋白駒沙諸處倭餒甚奔莊我兵圍之時劉顯兵至先登各營繼進縱火衝擊破其巢斬首二百餘賊奔白駒沙追擊又敗之于七灶莊花墩共斬首四百餘賊盡殄焉顯驍勇敢戰江北軍悉屬顯節制故有功三十九年春二月倭冦六千餘人流劫潮州等處時浙直倭患稍息而閩廣警報日至五月加胡宗憲兵部尚書兼右副都御史四十一年春三月泉州指揮歐陽深率兵擊倭破之生擒江一峰泉冦稍寧倭陷福建永寧衛大掠數日而去復攻永寧城破之大殺城中軍民焚燬幾盡冬十一月逮總督兵部尚書胡宗憲削籍從給事中陸鳯儀之言也獄具罷浙閩總督大臣設右僉都御史巡撫其地四十二年五月復逮胡宗憲詣京宗憲自殺是時大計京官復有言宗憲未盡法者有旨逮治宗憲至京自殺宗憲在浙中與趙文華同事文華選愞不敢前宗憲輒自臨陳戎服立矢石間督戰方倭圍杭時宗憲親登城臨視俯身堞外三司皆股栗懼為流矢所加宗憲恬然視之殱徐海汪直皆有功然稍稍事文華又握權太重勳臣總兵者由掖門通謁庭拜巡撫悉聼節制如三邊例宗憲才得展而禍機亦萌此矣上好玄修宗憲進白鹿稱賀大學士嵩比之會嵩敗被逮時歸安茅坤上書頌其寃冬十月倭犯福建其自浙之溫州來者合福建連江賊登岸攻陷壽寧政和寧德等縣自廣之南嶴來者合福清長樂賊攻陷玄鍾所蔓延及于龍巖松溪大田古田之境無非賊者初浙江參將戚繼光既連破賊于林墩等處閩之宿冦盡平繼光引兵還浙遇倭自福清東營嶴登岸麾兵擊之斬首百八十級遂行而倭至者日衆始犯邵武殺指揮齊天祥轉掠羅源連江殺遊擊倪祿遂攻玄鍾所城及寧德縣入之乘勝直抵興化府城不克乃合兵薄城下圍之且匝月巡撫遊震得以狀聞請調義烏兵以繼光統之起丁憂參政談綸與都督劉顯總兵俞大猷協力共濟上從之十一月劉顯率兵援興化顯大兵留江西勦廣冦所提八閩卒不及七百人且疲屢戰倭新至氛甚鋭顯知不敵乃去府城三十里隔一江按兵不進欲掩逗留之罪遣五卒齎文詣府約欲率兵赴城禦敵賊獲五卒殺之用其職銜偽為顯文克期入城約城中勿舉火作聲恐賊驚覺詐以五人為劉卒齎入至期賊陽稱顯兵入城人莫之疑賊既大入猝起格殺城中驚亂參政翁時器參將畢髙倉皇縋城走同知吳時亮被殺賊遂據城中三閲月殺掠焚燬顯卒乘亂攫之參政王鳯靈妻竟為顯掠去賊既飽欲始如平海衛欲掠舟泛海去十二月倭結巢﨑頭城與都指揮歐陽深相拒久之不出深望見兵少輕之直前挑戰伏發深與其下數百人皆戰死賊乘勝陷平海衛事聞罷巡撫遊得震逮參政翁時器參將畢髙劉顯坐觀望不救立功自贖倭引兵出海把總許潮光以輕舟抄之賊還屯平海衛副總兵戚繼光督浙兵至福建與劉顯俞大猷合擊倭於平海衛大破殱之斬首二千二百級墮崖溺水死者無算福州以南諸冦悉平四十三年春二月舊倭萬餘攻仙遊圍之三月戚繼光引兵馳赴之大戰城下賊敗趨同安繼光麾兵追至王倉坪斬首數百餘衆奔漳浦繼光督各哨兵入賊巢擒斬略盡閩冦悉平其得出者逸出境至廣東潮州俞大猷又截殺之幾無遺類初倭既自浙創歸嘗一犯淮揚吳越皆不利遂巢閩中首尾七八載所破城十餘掠子女財物數百萬官軍吏民戰及俘死者不下十餘萬雖時有勝負而轉漕軍食天下騷動至是倭患始息谷應泰曰島夷卉服首見禹貢秦漢以來罕被倭患蓋以其俗愛鮮華地多饒沃五州七道三島五百七十三郡率皆樂土環以大海君臣自保不愛慕中國也若乃海王充牣居民仰食雲帆所指有無懋遷則又彼此咸賴髙帝時士誠友定遺孽竄伏北遼南粵嵗被創殘已而通謀逆臣伏兵市舶帝乃閉關謝貢示弗復通然而創設市舶互市不絶計深逺也後世識慮迂拘放失舊典初開橫海旋棄珠崖民競刀錐吏鮮保障秦關夜析楚吏晨疆勇士蹈險貪夫忘生於是內地姦民勾引潛深海邦貴幸藏匿不可勝計矣貧民勢家黷貨負直窮彛困頓進退咨且逃生水國求食波臣邊吏戒心搜捕始急於是沿海不逞之徒陳涉力耕怨家日衆黃巢下第憤恚思兵稍稍收聚倭裔窺竊上國矣朱紈下車不畏強禦窮治黨與少所報聞夫廣漢索酤先求魏相李膺破柱不避黃門政求亂本雖得河源禍發朝堂竟悲虎尾紈死而朝貢與海逋交相賀也代臣畏禍海禁復弛浙東再亂王忬出督拔大猷於偏禆出盧鏜於獄中普陀一戰幾殱渠帥遊魂四潰旋掠江南而忬隨處邀擊頗多斬獲括乃代頗騎還易毅大功不終自古悲歎此閫外有遙制之憂中樞失內贊之力也嗣是天寵握兵乃棘門之兒戲文華祀海實天雄之誦經倭患愈劇張經再出經以功在銅柱因而偃蹇凌轢度亦自大匹夫耳然視事一月指揮羣帥王江涇之捷賊兵宵遁史稱其兵驕將悍或亦讒人之蜚語獄吏之深文也文華行譛檻車入國蓋左豐求賂盧植徵還張讓交通王允下獄自古未有小人同事而得剬制成功者胡宗憲曲意主撫因勦成功賄斬徐海誘擒汪直武安誘殺李廣誅降長致恨於封侯空悲寃於賜劒憲雖引刃應無顔見二賊於地下也憲才望頗隆氣節小貶側身嚴趙卵翼成功耿秉因竇憲勒勳杜預事朝貴甚謹封疆之吏固應折節乃爾耶倭冦披猖禍延三省任環效命留都俞大猷經營兩浙戚繼光驅馳閩海類皆大國干城足以滅此朝食而乃大戮亟行更張不一事權牽制流毒生民九閽無金城之任分宜少裴度之忠羣賢隕喪國事凌彛固其宜也中丞張濓家居省會身在圍城訟言時事涕淚交頥觀其疏中所稱殘難民之首以償縱冦之功而督撫可知移罰罪之典為賞功之命而管樞可知軍法不重人無死志客兵掉臂士無鬭心而卒伍可知嗚呼鄭監陳圖莫救當時之充耳然而睢陽劒在已成今日之爰書矣明史紀事本末卷五十五
