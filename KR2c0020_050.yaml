body:
  text: 明史紀事本末卷五十浙江提學僉事谷應泰編大禮議武宗正德十六年夏四月帝即位帝興獻王子憲宗純皇帝孫也憲宗生十皇子長孝宗敬皇帝次興獻王𢎞治七年甲寅興獻王之國安陸州正德二年秋八月帝生於興邸時黃河清慶雲見軫翼分已而獻王薨帝受敕嗣理國事至是年十有五矣武宗無子臨崩遺詔曰朕紹承祖宗丕業十有七年有孤先帝付託惟在繼統得人宗社生民有賴皇考孝宗敬皇帝親弟興獻王長子厚熜聰明仁孝德器夙成倫序當立遵奉祖訓兄終弟及之文告於宗廟請於慈夀皇太后與內外文武羣臣合謀同辭即日遣官迎取來京嗣皇帝位時三月丙寅也翼日丁卯遣司禮監太監韋霦夀寧侯張鶴齡駙馬都尉崔元大學士梁儲禮部尚書毛澄齎詔諭金符之安陸州戊寅霦等至興邸帝迎詔國門外至承運殿開讀已乃登座受符朝藩衛四月壬午帝辭興獻王園寢癸未發安陸辭帝母蔣妃嗚咽涕泗帝母曰吾兒此行荷負重任毋輕言帝曰謹受教比發安陸帝以藩衛官校不𨽻有司恐為沿途擾特命從官駱安等嚴勑之所過辭謝諸王供饋屏絶有司珍獻禁行殿毋過奢丁卯禮部員外郎楊應魁上禮儀狀請由東安門入居文華殿翼日百官三上箋勸進俟令旨俞允擇日即位大學士楊廷和命儀部郎中余才所擬也壬寅車駕至良鄉帝覽禮部狀謂長史袁宗皋曰遺詔以吾嗣皇帝位此狀云何癸卯至京師止城外廷和固請如禮部所具狀帝不許乃御行殿受箋由大明門入日中即位以明年為嘉靖元年凡正德間冒濫軍功將校夤緣監織𣙜稅諸弊政盡行釐革赦死雜犯以下末減有差丙午遣官往迎帝母興獻妃戊申命禮官集議崇祀興獻王典禮禮部尚書毛澄請於大學士楊廷和廷和出漢定陶王宋濮王事授之曰此篇為據異議者即奸諛當誅時有待對公車舉人張璁者為禮部侍郎王瓉同鄉士詣瓉言帝入繼大統非為人後與漢哀宋英不類瓉然之宣言於衆廷和謂瓉獨持異議令言官列瓉他失出為南京禮部侍郎而以侍讀學士汪俊代之尚書毛澄會公卿臺諫等官六十餘人上議漢成帝立定陶王為嗣而以楚王孫後定陶承其王祀師丹以為得禮今上入繼大統宜以益王子崇仁主後興國其崇號則襲宋英故事以孝宗為考興獻王及妃為皇叔父母祭告上箋稱姪署名而令崇仁主考興獻王叔益王帝覽曰父母可移易乎其再議於是廷和及蔣冕毛紀等復上言程頤濮議最得禮義之正皇上采而行之可為萬世法興獻祀事今雖以崇仁主異日仍以皇次子後興國而改崇仁為親藩天理人情庶兩無失尚書澄侍郎浚等六十餘人亦復上議如廷和言帝不聽仍命博考典禮以求至當已而廷和復上言舜不追崇瞽瞍漢世祖不追崇南頓君皇上取法二君斯聖德無纍澄等七十餘人又上議武宗皇帝以神器授之陛下有父道焉特以昭穆既同不可為世孝廟而上稱祖曽髙以次加稱豈容異議興獻王雖有罔極恩斷不可以稱孝廟者稱之也因録魏明帝詔文以上留中不報御史周宣進士屈儒侯廷訓亦各奏議如禮官指帝終不從六月敕修武宗實録仍命禮官集議追崇大禮七月觀政進士張璁上大禮疏曰朝議謂皇上入嗣大宗宜稱孝宗皇帝為皇考改稱興獻王為皇叔父王妃為皇叔母者不過拘執漢定陶王宋濮王故事耳夫漢哀宋英皆預立為皇嗣而養之於宫中是明為人後者也故師丹司馬光之論施於彼一時猶可今武宗皇帝已嗣孝宗十有六年比於崩殂而廷臣遵祖訓奉遺詔迎取皇上入繼大統遺詔直曰興獻王長子倫序當立初未嘗明著為孝宗後比之預立為嗣養之宫中者較然不同夫興獻王往矣稱之以皇叔父鬼神固不能無疑也今聖母之迎也稱皇叔母則當以君臣禮見恐子無臣母之義禮長子不得為人後况興獻王惟生皇上一人利天下而為人後恐子無自絶父母之義故皇上為繼統武宗而得尊崇其親則可謂嗣孝宗以自絶其親則不可或以大統不可絶為說者則將繼孝宗乎繼武宗乎夫統與嗣不同非必父死子立也漢文帝承惠帝之後則弟繼宣帝承昭帝之後則以兄孫繼若必強奪此父子之親建彼父子之號然後謂之繼統則古當有稱髙伯祖皇伯考者皆不得謂之統矣臣竊謂今日之禮宜别為興獻王立廟京師使得隆尊親之孝且使母以子貴尊與父同則興獻王不失其為父聖母不失其為母矣疏入上遣司禮監官送至內閣諭曰此議實遵祖訓據古禮爾曹何得悮朕楊廷和曰書生焉知國體復持入上熟覽之喜曰此論一出吾父子必終可完也是日帝御文華召廷和冕紀入諭曰至親莫若父母因授以手勑曰卿等所言俱有見苐朕罔極之恩無由報耳今尊父為興獻皇帝母興獻皇后祖母為康夀皇太后廷和退而上言曰皇上聖孝出於天性臣等雖愚夫豈不知禮謂所後者為父母而以其所生者為伯叔父母蓋不惟降其服而又異其名也臣等不敢阿諛順旨仍封還手勑於是給事中朱鳴陽史于光等御史王溱盧瓊等復奏興獻王尊號未䝉聖裁大小之臣皆疑陛下垂省張璁之說耳陛下以興獻王長子不得已入承大統難拘長子不得為人後之說璁乃謂統嗣不同豈得謂會通之宜乎又欲别廟興獻王於京師此大不可昔魯桓僖宫災孔子在陳聞火曰其桓僖乎以非正也如廟興獻王於京師在今日則有朱熹兩廟爭較之嫌在他日則有魯僖躋閔之失乞將張璁斥罰奏入俱命禮部議八月尚書毛澄等仍議給事中朱鳴陽御史王溱等皆欲皇上早從原議蓋有見於天理人情之公斷不容以私意為初政纍也御史盧瓊給事中史于光厯數張璁建議之偏若與仇者豈得已哉誠懼其上搖聖志下起羣疑宜將張璁戒諭不聽九月興獻王妃至通州先是禮部具議聖母至京宜由東安門入帝不從再議由大明左門入復不從帝斷議由中門入謁見太廟朝議譁然以婦人無謁廟禮太廟非婦人宜入張璁曰雖天子必有母也焉可由旁門入乎古者婦三日廟見孰謂無謁廟禮乎九廟之禮后與焉孰謂太廟非宜入乎上又命駕儀奉迎聖母禮部請用王妃儀仗迓之帝不從命錦衣衛以母后駕儀往又命所司製太后法服以待至是聖母至通州聞朝廷欲考孝宗恚曰安得以我子為人之子謂從官曰爾曹已極寵榮獻王尊稱胡猶未定因留通州不入帝聞之涕泗不止啓慈聖皇太后願避位奉母歸羣臣惶懼冬十月上諭內閣楊廷和蔣冕毛紀曰朕受祖宗鴻業為天下君長父興獻王獨生朕一人既不得承緒又不得徽稱朕於罔極之恩何由得安始終勞卿等委曲折中俾朕得申孝情廷和上言聖諭令臣等委曲折𠂻以申孝情切念大禮關係萬世綱常四方觀聽議之不可不詳必上順天理下合人情祖宗列聖之心安則皇上之心始安矣張璁乃復為或問一帙辨析統嗣之異及尊崇墓廟之說甚悉吏部主事彭澤録遺內閣及禮官勸改前議不從璁乃齎至左順門上之廷和令修撰楊維璁等阻之不得帝覽之留中不下廷和見勢不得已乃草勑下禮部曰聖母慈夀皇太后懿旨以朕纘承大統本生父興獻王宜稱興獻帝母宜稱興獻后憲廟貴妃邵氏稱皇太后仰承慈命不敢固違帝從之廷和意假母后示非廷議意也壬午興獻后至自通州由大明中門入帝迎於闕內朝議不謁太廟生見奉先奉慈二殿而已兵部主事霍韜見張璁言欲用亦上言禮官持議非是時同知馬時中國子監諸生何淵巡檢房濬各上言如璁議帝益為之心動矣甲午楊廷和以追崇禮成擬上慈夀皇后及武宗皇后尊號帝因遣司禮監諭廷和曰邵太后興獻帝后亦各擬上尊號廷和等上言不可宜俟明年大婚禮成慶宫闈正位上尊號巡撫雲南都御史何孟春上言以為興獻王不宜稱考廷和覽疏乃擢孟春吏部侍郎給事中熊浹上言皇上貴為天子聖父聖母以諸王禮處之安乎臣以為當稱帝后而祀興獻於别廟則大統之議所生之恩兼盡矣乃出為按察司僉事浹大學士費宏鄉人也宏慮廷和疑已故出之十二月除張璁南京刑部主事先是帝下大禮或問於禮部時楊一清家居遺書吏部尚書喬宇曰張生此論聖人不易恐終當從之宇不聽至是廷和銜璁授意吏部除為南京主事尚書石瑶語璁曰慎之大禮說終當行也廷和寄語曰子不應南官苐靜處之勿復為大禮說難我耳璁怏怏而去都御史林俊致仕家居廷和寓書於俊以定國是俊上疏曰孔子謂觀過知仁陛下大禮未協過於孝故耳司馬光有言秦漢而下入繼或尊崇其所生皆取譏當時貽笑後世陛下純德何忍襲之疏入留中廷和遂奏起林俊為工部尚書俊力辭不聽庚寅帝下御札諭加興獻帝后以皇字廷和等上言漢宣帝繼孝昭後追諡史皇孫王夫人曰悼考悼后而已光武上繼元帝巨鹿南頓君以上立廟章陵而已皆未嘗追尊今日興獻帝后之加較之前代尊稱已極若加皇字與慈夀孝廟並是忘所後而重本生任私恩而棄大義臣等不得辭其責願罷歸吏部尚書喬宇等奏曰皇者正統大義若加皇字於本生之親則與正統溷而無别揆之天理則不合驗之人心則不安非所以重宗廟正名分也上曰慈夀皇太后懿旨有諭今皇帝婚禮將行其興獻帝宜加與皇號母興獻皇太后朕不敢辭爾羣臣其承后命廷和等見不可爭乃俱求罷歸不報禮部尚書毛澄侍郎賈詠汪俊等上言若帝后之上有加則正統之親無别恐不可以告郊廟而布天下內閣大臣直言規諫宜賜諭旨帝不聽仍曰宜遵懿旨稱興獻皇帝興獻皇太后於是給事中朱鳴陽等御史程昌等編修陳沂等百餘人各上言加稱非是因請斥璁不聽世宗嘉靖元年春正月郊祀甫畢清寧宫小房災楊廷和蔣冕毛紀費宏上言火起風烈此殆天意况迫清寧後殿豈興獻帝后之加稱祖宗神靈容有未悅乎給事中鄧繼曽上言五行火主禮今日之禮名紊言逆陰極變災臣雖愚知為廢禮之應主事髙尚賢鄭佐相繼上言鬱攸之災不於他宫而於清寧之後不在他日而在郊祀之餘變豈虛生災有由召帝覽之心動乃從廷和等議稱孝宗為皇考慈夀皇太后為聖母興獻帝后為本生父母而皇字不復加矣巡撫湖廣都御史席書具疏曰邇者廷議大臣比之宋事竊謂英宗入嗣在衮衣臨御之日皇上入繼當宫車晏駕之後比而同之似或未安故皇上嗣纘大業非繼孝宗之統繼武宗之統也非繼武宗之統繼祖宗之統也以皇上承繼武宗仍為興獻王子别立廟祀張璁霍韜之議未為迂也禮本人情皇上尊為天子慈聖將臨設無尊稱於情難已故追所生曰帝后上慰慈闈今踰年改元尊號未上明詔未頒毋乃擬議之未定乎臣愚謂宜定號皇考興獻帝别立廟於大內每時祭太廟畢仍祭以天子之禮蓋别以廟祀則大統正而昭穆不紊隆以殊稱則至愛篤而本支不淪尊尊親親並行不悖至於慈聖應稱曰皇母某后不可以興獻字加之吏部員外郎方獻夫亦具疏曰陛下之繼二宗當繼統而不繼嗣興獻之異羣廟在稱帝而不稱宗繼統者天下之公三王之道也繼嗣者一人之私後世之事也興獻之得稱帝者以陛下為天子也不得稱宗者以實未嘗在位也請宣示朝臣改議布告天下稱孝宗曰皇伯稱興獻帝曰皇考别立廟祀之夫然後合於人情當乎名實二疏俱中沮不果上三月上孝宗太后尊號曰昭聖慈夀皇太后武宗皇后曰莊肅皇后聖祖母邵氏曰夀安皇太后本生父曰興獻帝母曰興國太后先是司禮監傳諭興獻帝册文朕宜稱子廷和等上言不可復傳諭宜稱孝子廷和等言冊文稱長子本生文情自明請勉行正禮從之遣官詣安陸上興獻帝尊號命司禮太監溫祥督禮儀成國公朱輔上册寶禮部侍郎賈詠題神主詠遵廷和指題其主曰興獻帝神主不稱考及叔亦不叙子名冬十一月夀安皇太后崩楊廷和定為哭臨一日喪服十三日而除文移兩京不以詔天下禮官請素服御西角門帝曰朕哀慕方切豈忍遽從所請十二月上夀安皇太后尊諡孝惠皇太后羣臣奏夀安皇太后服制已滿宜漸從吉典御奉天門視事久之乃允仍命不鳴鐘鼓不鳴鞭二年春二月太常卿汪舉上言安陸廟宜用十二籩豆如太廟儀從之禮部請置奉祀官又言樂舞末敢輕議帝命楊廷和集議之禮部侍郎賈詠會公侯九卿等上言正統本生義宜有間八佾既用於太廟安陸樂舞似當少殺以避二統之嫌帝曰仍用八佾於是何孟春及給事中張翀黃臣劉最御史唐僑儀秦武等南京給事中鄭慶雲各上言力爭不報冬十一月奉孝惠皇太后主於奉慈殿遣官告安陸廟南京刑部主事桂蕚日與張璁討論古禮其議符合至是上言大禮并獻席書方獻夫議草疏曰臣聞古者帝王事父孝故事天明事母孝故事地察未聞廢父子之倫而能事天地主百神者也今禮官以皇上與為人後而強附末世故事滅武宗之統奪興獻之宗夫孝宗有武宗為子矣可復為立後乎武宗以神器授皇上矣可不繼其統乎今舉朝之臣未聞有所規納者何也蓋自張璁建議論者指為干進故達禮之士不敢遽言其非切念皇上在興國太后之側慨興獻帝弗祀三年矣而臣子乃肆然自以為是可乎臣願皇上速發明詔循名考實稱孝宗曰皇伯考興獻帝曰皇考而别立廟於大內興國太后曰聖母武宗曰皇兄則天下之為父子君臣者定至於朝議之謬有不足辨者彼所執不過宋濮王議耳臣按宋臣范純仁告英宗曰陛下昨受仁宗詔親許為仁宗子至於封爵悉用皇子故事與入繼之主事體不同則宋臣之論亦自有别今皇上奉祖訓入繼大統果曽親承孝宗詔而為之子乎則皇上非為人後而為入繼之主明矣然則考興獻帝母興國太后可以質鬼神俟百世者也臣久欲上請乃者復得見席書方獻夫二臣之疏以為皇上必為之惕然更改有無待於臣之言者至今未奉宸斷豈皇上偶未詳覽耶抑二臣將上而中止耶臣故不敢愛死再申其說并録二臣疏以聞疏奏上曰此關係天理綱常仍會文武羣臣集議可否三年春正月楊廷和罷禮部尚書汪俊請曰公去誰與主者適主事侯廷訓據宗法為大禮辨遍示羣臣俊得之喜曰違斯議者當斬也於是吏部尚書喬宇率九卿上言必以孝宗為考而後大宗為不絶俊復會公侯卿佐及翰林臺諫官上言祖訓兄終弟及以同産言也皇上為武宗親弟自宜考孝宗母昭聖前後章奏惟張璁霍韜熊浹與桂蕚議同其他八十餘疏二百五十餘人皆如部議其當從違可知矣帝曰更參衆論議之給事中張翀等三十有二人御史鄭本公等三十有一人各抗章力論以為當從衆議上怒其朋言亂政俱奪俸修撰唐皋亦言陛下宜考所後以别正統隆所生以備尊稱帝謂皋模稜持兩可亦奪俸於是汪俊等更議於興獻帝興國太后止各加一字以備尊稱不報是時楚王榮誠以儀賔沈寶疏上代府長史李錫南京都察院經厯黃綰錦衣衛千戶聶能遷各上疏議其言與璁議合帝益心動乃命取督賑侍郎席書南京刑部主事桂蕚張璁詣京集議時霍韜居里中亦並召之興國太后千秋節命婦各上箋覿賀宴賚倍常是月晦日昭聖皇太后聖旦先期有旨命婦免入朝賀朱浙馬鳴衡上言暫免朝賀在尋常固可然當議禮紛更之時正人心匆惶之際忽傳報罷安得無疑竊謂此意若出太后其間必有因事拂抑之懷往時存歿之感若出自聖意則母子至情有隆無已豈可以聖旦嘉節而輟此盛禮哉疏入帝怒命逮訊侍即何孟論救不報已而陳逅李本刑部員外郎林惟聰各抗言馬鳴衡朱浙不知太后懿旨輒有論列原其本心以為議禮之初太后輒不受朝人將謂陛下之心有所偏主而奸讒之流或從而乘間獻媚其禍有不可言爾今乃下之詔獄加以嚴刑天下聞之將謂陛下以宫闈之故罪及言官本生正統之義不能無所軒輊而忠臣義士且將杜口結舌不敢復議天下事矣帝怒其煩擾併逮繫考訊大理卿鄭嶽論救不報三月奉興獻帝為本生皇考恭穆獻皇帝興國太后為本生母章聖皇太后初帝召張璁等都御史吳廷舉恐璁至不變初說請勑諸生及南京大臣及耆德舊臣各陳所見以備采擇璁蕚乃復上疏申明統嗣之辨璁且曰今之加稱不在皇與不皇實在考與不考若徒爭一皇字則執政必姑以此塞今日之議臣恐天下知義禮者仍必議之不已也帝嘉納之是日帝御平臺召冕紀宏諭加尊號及議建室冕對曰臣等願陛下為堯舜不願為漢哀帝曰堯舜之道孝弟而已矣冕等不能對乃命草詔加上尊號給事中張翀等御史朱實昌等交章力諫帝切責之勑禮部曰聖母昭聖慈夀皇太后特加尊號為昭聖康惠慈夀皇太后又勑曰本生父興獻帝本生母興國太后今加稱為本生皇考恭穆獻皇帝本生母章聖皇太后又曰朕本生父母已有尊稱仍於奉先殿側别立一室盡朕追慕之情禮部尚書汪俊上議曰皇上入奉大宗不得祭小宗為本生父立廟大內從古所無惟漢哀帝嘗為共王立廟京師師丹以為不可請於安陸廟增飾為獻皇帝百世不遷之廟俟他襲封興王子孫世世奉享陛下嵗時遣官祭祀亦足以伸至情矣上曰朕奉太廟豈敢間越與漢哀帝不同務協公論以伸至情吏部尚書喬宇等復奏曰皇上聖睿於宗法大小必洞然無疑故曰建室以避立廟之名也於奉先殿側以避大內之名也推此則專於大宗必降於小宗安陸祭祀無庸改議矣時湛若水石瑶張翀任洛汪舉等皆具奏不聽於是汪俊求去上切責罷之户部侍郎胡瓉等上言大禮已定席書督賑江淮實關民命不必徴取來京上從之併止璁等勿來時璁蕚已抵鳳陽矣見邸報勑加尊號乃復上疏極論兩考之非且曰臣知本生二字决非皇上之心所自裁定特出禮官之陰術皇上不察以為親之之辭也不知禮官正以此二字為外之之辭也必亟去二字繼統之義始明而人心信從矣疏入上命復召來京蔣冕言於帝前曰二人若來必撲殺之帝不問而遣人趨使速來遂降中旨以書為禮部尚書給事中安磐等上言大禮之失自霍韜張璁欲考本生而邪說始起自桂蕚進席書方獻夫之論而邪說益張乞寢書新命治蕚等奸罪張漢卿等亦上言書督賑乖方煮粥誤民致死生民數萬宜正國法以快人心南京給事中黃仁山等亦上言書巧詐邪佞私蓄議藁而不自進陰託桂蕚代奏干寵而璁蕚每造書所必在暮夜其為陰類憸人無疑乞加罷斥召還汪俊南道御史田麟等亦上言汪俊席書邪正相反進退失宜且祖制上卿俱推舉簡用今何取於書而出自內降耶乞同璁蕚併黜以避賢路俱不報禮部侍郎吳一鵬等會侯伯卿二翰林臺省力言建室之非且曰臣等遵祖訓本禮經守師丹程頤之論以悟主心姑停建室仍廟安陸嵗時遣官奉祭俟異日皇子衆多襲封興王世世承享帝曰朕承天命祇奉宗祀孝養聖母皇考陵園逺在安陸卿等安乎今黨同執奏敗父子之倫傷君臣之義欺朕冲年鮮忽綱常其奉先殿西室亟行修飾盡朕嵗時急切之情於是修撰吕柟編修鄒守益俱上疏爭之帝怒俱逮赴鎮撫司考訊給事中張翀章僑御史張鵬翰等交章論救不報已而獄具謫柟解州判官守益廣德州判官命內閣擬撰聖母昭聖皇太后與本生聖母章聖皇太后冊文帝遣司禮官傳諭欲於昭聖冊內稱嗣皇帝獻皇帝冊內稱孝長子章聖冊內加稱聖母自稱長子蔣冕等力言不可仍以原文封進帝覽之遂於獻皇帝冊內加一孝字章聖冊內欲去本生母三字冕等復上言此字惟宗廟祝文用之今稱長子已盡孝情又加此字有干正統且本生母三字係勑諭擬定亦難輕去仍封還御批乃依原文止稱長子章聖冊內加一聖字帝御奉天殿受賀布詔天下詔曰朕躬膺天命嗣承皇兄武宗毅皇帝大統祇奉宗祀惟我皇考孝宗敬皇帝神謨聖政是繼是行仰惟聖母昭聖慈夀皇太后擁翊之功莫罄名言本生父母興獻帝興國太后鞠育之恩罔殫報稱尊稱未極恆用歉然恭奉册寶加上聖母尊號曰昭聖康惠慈夀皇太后興國太后曰本生聖母章聖皇太后義專隆於正統禮兼盡夫至情是時張璁至東昌讀詔書嘆曰執政忍為此欺乎兩考並稱綱常紊矣蔣冕求罷歸帝曰朕方倚任共圖治理建室禮儀朕自裁定既而冕上言皇上恭詣仁夀宫加上尊號聖母昭聖皇太后遽有懿旨免命婦入賀其故非臣等所知又命書為禮部尚書璁蕚復取來京聖意所向中外不能無疑宜追寢前命不報冕遂移疾乞去帝從之御史王泮等疏留不報五月以奉先殿西室為觀德殿欲安獻皇帝主也禮部侍郎吳一鵬朱希周郎中江必東員外郎翁磐主事彭黯等上言獻皇帝主在安陸廟中神靈攸依奉先殿西室宜設神位以便時享如奉慈殿之儀不報遣司禮監太監賴義京山侯崔元侍郎吳一鵬之安陸改題神主奉上冊寶尊號曰本生皇考恭穆獻皇帝迎如京師一鵬等復上言厯考前代無自寢園迎入大內者况安陸乃啓封之地獻皇帝神主不宜輕動惟永祀安陸則本生之情盡而正統之義得不報霍韜將赴召復上言力辨二統之非而席書在鳳陽亦上大禮考議言諸臣講學不明固執私意且曰斯禮也廷臣耆舊自有知者不敢犯衆而璁蕚等感激不平力犯羣議舉朝疾之如仇甚可畏也臣途窮矣尚言此者九廟神靈使之言耳六月璁蕚至京復同上疏條七事極論兩考之非以伯孝宗而考興獻為正俱留中不下鴻臚寺少卿胡侍上言唐睿宗不當兄中宗宋太宗不當兄藝祖不當稱兄則不當稱伯明矣帝怒其狂率出侍為潞州判官初張璁桂蕚至京師廷臣欲捶擊之無一人與通璁蕚稱疾不出數日後退朝班恐有伺者出東華門走入武定侯郭勳家勳喜約為內助臺諫官交章攻擊以為當與席書並正其罪章十餘上俱報聞給事中張翀取羣臣彈章奏發刑部令擬璁等罪尚書趙鑑私語翀曰若得俞旨便撲殺之帝廉知之遂降中旨命桂蕚張璁為翰林學士方獻夫為侍講學士切責翀鑑罪之璁蕚獻夫各上疏辭不允吏部尚書喬宇上言蕚等偏執異說搖動人心願賜罷黜帝怒切責之宇遂求去從之修撰楊慎廷和子也率同官姚淶編修許成名崔桐簡討邊憲金皋等上言君子小人不並立正論邪說不並行臣等所執者程頤朱熹之緒也蕚等所言者冷褒假猶之餘也學術不同議論亦異臣等恥與蕚等同列上罷其俸給事中李學曽等御史吉棠等亦爭之俱下獄外補已而南京尚書楊旦顔頤夀沈冬魁李克嗣崔文奎及侍郎陳鳳梧都御史鄒文盛伍文定等復以為言俱切責之員外薛蕙著為人後解以駁璁蕚之議略曰禮立後者重大宗也適子不為後輕小宗也為人後者為之子言雖出公羊實與儀禮相表裏既為之子則當稱父矣而可仍曰伯叔父乎帝覽之怒逮繫詔獄已而釋之秋七月璁蕚既拜新命復列十三事以上一曰三代以前無立後之禮二曰祖訓亦無立後三曰孔子射於矍圃斥為人後者四曰武宗遺詔不言繼嗣五曰禮輕本生父母六曰祖訓姪稱天子為伯叔父七曰漢宣帝光武俱為其父立皇考廟八曰朱喜嘗論定陶事為壞禮九曰古者遷國載主十曰祖訓皇后治內外事無得干預十一曰皇上失行夀安皇太后三年喪十二曰新頒詔令决宜重改十三曰臺諫連名上疏勢有所迫皆條列禮官欺罔之罪疏入留中何孟春為論條辨帝切責之璁蕚復辭職不許乃就官帝采其議屢遣司禮監官至閣諭毛紀等去冊文本生字紀等力言不可亡何帝御平臺召紀等責之曰此禮當速改爾輩無君欲使朕亦無父乎紀等惶怖退召百官至左順門勑曰本生聖母章聖皇太后今更定尊號曰聖母章聖皇太后後四日恭上冊寶何孟春退草疏達旦語禮部侍郎朱希周曰此禮復更禮官尤當爭之於是希周率郎中余才江必東等上言皇上考孝宗母昭聖已越三年今更定之諭忽從中出則明詔為虛文不足取信於天下孟春與尚書秦金學士豐熙等及翰林寺部臺諫諸臣各上言力爭本生二字不宜削章十三上俱留中不報戊寅帝朝罷齊居文華殿金獻民徐文華倡言曰諸疏留中必改孝宗為伯考則太廟無考正統有間矣何孟春曰憲宗朝尚書姚夔率百官伏哭文華門爭慈懿皇太后葬禮憲宗聞之此國朝故事也楊慎曰國家養士百五十年仗節死義正在今日王元正張翀等遂遮留羣臣於金水橋南曰萬世瞻仰在此一舉今日有不力爭者共擊之何孟春金獻民徐文華復相號召於是秦金趙鑑趙璜俞琳朱希周劉玉王時中張潤汪舉潘希曽張九叙吳琪張瓉陳霑張縉蘇民余瓉張仲賢葛檜袁宗儒凡二十有三人賈詠豐熙張璧舒芬楊繼聰姚淶張衍慶許成名劉棟張潮崔桐葉桂章王三錫余承勳陸釴王相應良金皋林時王思凡二十人謝蕡毛玉曹懷張嵩王瑄張􅀈鄭一鵬黃重李錫趙漢陳時明鄭自璧裴紹宗韓楷黃臣胡炳凡十有六人余翺葉竒鄭本公楊樞劉頴祁杲杜民表楊瑞張英劉謙亨許中陳克宅談纘劉翀張録郭希愈蕭一中張恂倪宗嶽王璜沈教鍾卿密胡瓊張濂何鰲張曰韜藍田張鵬翰林有孚凡三十有九人余寬党承志劉天民馬理徐一鳴劉勳應大獻李舜臣馬冕彭澤張鵾洪伊凡十有二人黃待顯唐升賈繼之楊昌楊淮胡宗明栗登党以平何岩馬朝卿申良鄭漳顧可久婁志德徐嵩張庠髙圭安璽王尚志朱藻黃一道陳儒陳廷鸞髙登程旦尹嗣忠郭日休李録周詔戴亢繆宗周丘其仁祖琚張希尹金中夫丁律凡三十有六人余才汪必東張􅙆張懷翁磐李文中張澯張鏜豐坊仵瑜丁汝夔臧應奎凡十有二人陶滋賀縉姚汝皋劉淑相葛潮劉漳楊儀王德明汪溱黃加賔李春芳盧襄華鑰鄭曉劉一正郭持平余禎陳賞李可登劉從學凡二十人相世芳張峩詹潮胡璉范祿陳力張大輪葉應駿白轍許路戴欽張儉劉士竒祁勑趙廷松熊宇何鰲楊濂劉仕蕭樟顧鐸王國光汪嘉會殷承叙陸銓錢鐸方一蘭凡二十有七人趙儒葉寬張子𠂻汪登劉璣江珊金廷瑞范鏓龎淳伍餘福張鳳來張羽車純蔣珙鄭鎦凡十有五人毋德純蔣同仁王瑋劉道陳大綱鍾雲瑞王光濟張徽王天民鄭重杜鸞凡十有二人俱赴左順門跪伏有大呼髙皇帝孝宗皇帝者帝聞之命司禮監諭退不去金獻民曰輔臣尤宜力爭朱希周乃詣內閣告毛紀紀與石瑶遂赴左順門跪伏上復遣司禮太監諭之退羣臣仍伏不起自辰逮午帝怒命司禮監録諸姓名收繫諸為首者豐熙張翀余寬黃待顯陶滋相世芳毋德純等八人於獄楊慎王元正乃撼門大哭一時羣臣皆哭聲震闕廷上大怒遂命逮繫馬理等凡一百三十有四人於獄何孟春等二十有一人洪伊等六十有五人姑令待罪己卯上聖母章聖皇太后冊寶庚辰錦衣衛以在繫官上請初逮繫時有奔匿者至是悉追繫之併待罪者總二百有二十人上責之命拷訊豐熙等八人編伍其餘四品以上者俱奪俸五品以下者杖之於是編修王相等一百八十餘人各杖有差王相與王思裴紹宗毛玉胡瓊張曰韜楊淮張燦申良臧應奎牟瑜余禎安璽殷承叙等十有九人俱病創先後卒恭穆獻皇帝主至自安陸帝迎於闕內奉謁奉先奉慈二殿已乃奉於觀德殿上冊寶尊號曰皇考恭穆獻皇帝不復言本生是日復趣席書來京南京祭酒崔銑以災異陳言議禮一事或擯斥或下獄非聖朝美事上不悅令致仕而陳洸先為給事中言事忤旨出為按察司僉事至是上言曰陛下察幾致决毅然去本生二字有人心者咸謂始全父子之恩無不感泣乞罷喬宇夏良勝以息邪說復史道于桂曹嘉以作正氣帝悅復以洸為給事中逮繫修撰楊慎編修王元正給事中劉濟安磐張漢卿御史張原王時柯於詔獄復撲之謫楊慎王元正劉濟戌邊何孟春調南京工部毛紀罷南寧伯毛良上言楊廷和要定策功沮撓大禮使陛下失天倫之正廢追崇之典千户聶能遷百户陳紀教諭王價録事錢子威各論奏議禮差謬更正得宜俱留中不報八月席書至京以孝宗考名未正悉發諸議留中者命禮部集議鄭嶽徐文華仍力言孝宗祝享昭聖冊寶尊奉已久不宜輕改帝切責之胡世寧時居憂里中亦上言與璁等合帝嘉之九月改稱孝宗敬皇帝為皇伯考昭聖皇太后為皇伯母初集議時汪偉鄭嶽徐文華等猶與璁等力辨可否武定侯郭勳遽曰祖訓如是古禮如是璁等言當書曰人臣事君當將順其美於是書蕚璁及獻夫會公鶴齡侯勳鸞等六十有四人上言三代之法父死子繼兄終弟及人無二本孝宗伯也宜稱曰皇伯考昭聖伯母也宜稱曰皇伯母獻皇帝主别立禰室不入太廟尊尊親親兩不悖矣議上從之乃改稱孝宗為皇伯考昭聖為皇伯母祭告天地宗廟布詔天下安陸松陵帝既改名顯陵等諸陵矣及大禮既定百户隨全請改遷顯陵下工部議尚書趙璜等上言太祖不遷皇陵太宗不遷孝陵願以為法帝命禮臣會多官集議尚書席書等會公侯九卿諸廷臣上言乞治全罪帝曰先陵逺在安陸朕瞻仰哀切其再議之書與璁蕚等復上言舉大事當順人心今多官皆曰帝魄不可輕動地靈不可輕泄臣等敢不盡言帝乃罷議命顯陵祭如七陵十二月評事韋商臣上言臣以廷平庶獄為職臣自今年七月授官以來見以大禮伏闕觸犯聖怒大臣改任者何孟春一人編戍者學士豐熙等八人决杖死者編修王思等十有七人以忤使臣而逮繫者副使劉秉鑑知府羅玉等若而人以織造抗使臣逮繫者布政使馬卿知府查仲道等若而人以失儀下獄者御史葉竒主事蔡乾等五人以京堂官為所屬訐奏下獄者御史任洛副使任忠等二人此皆國家大獄上干天象下駭民俗所關甚巨者也臣不敢愛死惟陛下大奮明斷將諸臣録復其官及其子孫庶不失欽恤之意疏入調外巡撫江西都御史陳洪謨亦言之留中不報四年春三月詔修獻皇帝實録夏四月光祿寺丞何淵請立世室崇祀皇考於太廟帝命禮部集議尚書席書等上議王制天子七廟三昭三穆周以文武有大功德乃立世室與后稷廟皆百世不遷我太祖立四親廟德祖居北後改同堂異室議祧則以太祖擬文世室太宗擬武世室今獻皇帝以藩王追崇帝號何淵乃欲比之太祖太宗立世室於太廟甚無據不報張璁桂蕚俱言不可璁曰臣與廷臣抗論之初即曰當改為獻皇帝立廟京師又曰别立禰廟不干正統此非臣一人之私天下萬世之公議也今淵乃以獻皇帝為自出之帝比周文武不經甚矣上干九廟之威監下駭四海之人心臣不敢不為皇上言之昔漢哀帝尊定陶共王為共皇立廟京師比孝元帝至今非之今淵請入獻皇帝於太廟不知序於武宗之上與武宗之下與昔人謂孝子之心無窮分則有限得為而不為與不得為而為之均為不孝别立禰廟禮之得為者也此臣昧死勸皇上為之入於太廟禮之不得為者也此臣昧死勸皇上勿為席書會羣臣復上議爭之大學士費宏石瑶賈詠尚書廖紀秦金及九卿臺諫官各上疏力爭俱不報璁蕚乃謂書曰觀德殿規制未備宜聖心未慊也須别立廟不干太廟尊尊親親並行不悖書等遂上議宜於皇城內擇地别立禰廟不與太廟並列祭用次日尊尊親親庶為兩全從之六月作世廟初席書上廟議有曰親盡之期與孝廟同帝問其故書對曰我朝德祖比后稷太祖太宗比文武皆百世不遷懿祖以下隨世而祧獻皇帝與孝宗同世親盡同祧帝曰别廟不與祖宗序列他日奉祧藏於何所何以伸朕世享之情其再議之書上言宜藏主寢殿嵗暮出祭如太廟議帝曰皇考生朕一人入繼大統今特立廟世世不遷伸朕孝思乃命工部相地於太廟左環碧殿旁立廟前殿後寢一如太廟而微殺其制路由闕左門入已而命定廟名曰世廟禮科給事中楊言等上疏乞罷世室略曰祖宗身有天下大宗也君也獻皇帝舊為藩臣小宗也臣也以臣並君亂天下大分以小宗並大宗干天下大統無一可者不聽十二月席書上大禮集議帝命頒賜藩府及中外羣臣仍令各省刋布以傳五年夏六月獻皇帝實録成秋七月帝以觀德殿在奉慈殿後地勢迫隘欲改建於奉先殿左工部尚書趙璜言移觀德殿於奉先殿左必與奉慈殿對峙孝肅太皇太后獻皇帝之祖母孝惠皇太后又聖母也廟出其左恐神靈有所不安席書亦言世廟之建民勞踰年今甫告成力亦當節帝復諭大學士費宏等曰遷觀德殿與奉慈殿無預卿等勿蹈前日之誤宏等乃乞勑禮工二部卜日營度給事中張嵩衛道御史郭希愈陳察等各上言災異非常乞仍舊以寬民力不報丁丑世廟成帝自觀德殿奉獻皇帝主於世廟復自武英殿迎獻皇帝神位於觀德殿禮成羣臣表賀撰世廟樂章九月帝奉章聖皇太后謁見世廟先是帝諭輔臣曰聖母欲謁世廟卿謂何如費宏楊一清曰國初禮制皇后謁太廟永樂時改謁奉先殿無至太廟者帝以問璁蕚對曰唐開元禮有皇后廟見之儀國初皇后謁太廟內外命婦陪侍永樂止謁奉先皆當時禮官失考非祖制也皇太后中官宜先見太廟以補前禮之闕次謁世廟以成今禮之全宏一清曰璁蕚所引開元禮不可為法國初禮文未定二臣欲復廟見是彰祖宗之闕也不可席書劉龍曰髙皇帝凖古廟見禮為大婚冊后之制未及施行復定冊后止謁奉先殿璁蕚所引俱大婚禮今世廟告成是大祭禮不可附會章聖皇太后宜於奉主之後祗謁觀德殿則祖宗法守之益堅矣璁蕚曰周天子宗廟之祭王服衮冕而入立東序后服副禕而入立西序九獻各四拜是天子與后共承宗廟也皇上毅然舉行以復古禮未為不可因自具儀以上席書等不能難大學士石瑶上言祖宗家法凡后妃入宫未有無故復出者太廟尊嚴乃天子對越之所非時享祫祭亦未輕出入而况后妃乎漢唐之季事不師古女禍時作其患不可勝言可不慮哉帝怒切責之席書等乃上請聖母謁廟必得上同行以主斯禮從之禮部議祭世廟用太廟次日太常寺謂時享太廟及觀德殿先三日齊戒先二日視牲今祭用次日則齊戒視牲日各不同且嵗暮之際難於次日舉行禮部復請嵗暮權與太廟同日帝曰俱用同日次第舉行六年春正月諭修典禮全書張璁纂要略二卷以進上言此禮之失非今日自漢宋諸臣爭之故皇上之改改漢宋諸君也臣等之爭爭漢宋諸臣也昔唐有開元禮宋有開寶禮所載皆儀文制度而已今宜如通鑑凡例以年月日為綱事關大禮者必書備載聖裁乃輯為要略以獻帝命付史館纂述費宏等定議世廟樂舞止用文舞隨堂何淵上言世廟樂舞未備下禮部集議侍郎劉龍等議宜仍舊帝諭輔臣再議大學士楊一清賈詠翟鑾上言漢髙帝以武功定天下故奏武德文治舞惠文二帝不尚武功故止用文治昭德世廟止用文舞亦此意也不為缺典張璁獨上言王制有曰祭用生者皇上身為天子尊獻皇為天子父宜以天子禮樂祀之缺一不可且天子八佾為人六十有四諸侯六佾為人三十有六國朝太廟文武佾各八計百有二十八人王國宗廟文武佾各六計七十有二人獻皇在藩時固用七十有二人今乃六十有四可乎以天子父不得享天子禮樂何以式四方法萬世帝從之七年夏六月明倫大典成加張璁少傅兼太子太傅吏部尚書謹身殿大學士追奪議禮諸臣官勑曰大學士楊廷和謬主濮議尚書毛澄不能執經據禮蔣冕毛紀轉相附和林俊著論迎合喬宇為六卿之首乃與九卿等官交章妄執汪俊繼為禮部仍注邪議吏部郎中夏良勝脅持庶官望遂邪志何孟春以侍郎掌吏部鼓舞朝臣伏闕喧呼朕不欲已甚姑從輕處楊廷和為罪之魁以定策國老自居門生天子視朕法當僇市特寬宥削籍為民毛澄林俊俱已病故各奪其生前官職蔣冕毛紀喬宇江俊俱已致仕各奪職閒住何孟春情犯特重夏良勝釀禍獨深俱發原籍為民其餘兩京翰林科道部屬大小衙門各官附名入奏或被人代署而已不與聞者俱從寬不究其先已正法典或編戌為民者不問爾禮部揭示承天門下俾在外者咸自警省秋七月加上皇考聖母尊號皇考為恭睿淵仁寬穆純聖獻皇帝聖母為章聖慈仁皇太后詔告天下八年十月朔日食刑部員外郎邵經邦上言詩十月之交刺無良也意者陛下以議禮之故亟用張璁皇父專權致召天變則所議者不為公禮矣可守也亦可變也可成也亦可毁也疏入帝怒其疏末有引用茅焦語謫鎮海衛與楊慎等永逺不宥死戍所十五年冬十月更世廟為獻皇帝廟帝諭禮部尚書夏言曰朕思皇考廟名似大不安太宗百世不遷故名世室恐皇考亦敦讓太宗宜别擬議且世字來者或用作宗號今施於皇考徒擁虛名可會郭勳李時議之既而又諭曰皇考廟止稱獻皇帝廟庶别宗稱以見推尊之意於是夏言上言禮惟有功德者别立廟祀百世不遷名之曰世周之文武世室是也皇考獻皇帝雖篤生皇上比跡契稷而前有文皇既稱太宗義當尊讓後有聖帝必為世宗理宜虛俟今欽定獻皇帝廟庶幾明祀正而公議定帝從之命以所議付史館十二月九廟成獻皇帝廟止修時祀以避豐禰之嫌十七年五月議集明堂秋饗禮先是皇考獻皇帝止舉時祀不祀太廟於是揚州府同知致仕豐坊上言孝莫大於嚴父嚴父莫大於配天宜建明堂尊皇考為宗以配上帝又天下郡邑宜各立明堂嵗時祝拜君上以尊朝廷勿寄位釋宫褻體統下禮部坊熙子也尚書嚴嵩上言諸儒論禮不一臣惟明堂圜丘皆以事天地今大祀殿在圜丘之北正應古之方位明堂秋饗之禮即此可行不必更建至於侑饗之禮傳以為萬物成形於秋故秋祀明堂以父配之自漢武逮唐宋諸君莫不皆然主親親也至於錢公輔司馬光孫抃程朱諸賢所論主祖宗之功德今以功德則宜配文皇以親則宜配獻皇第揆以嚴父之旨以皇考而不得配陛下庸有所弗寧矣至於稱宗之禮則未有帝宗而不祔太廟者臣不敢妄議以負陛下惟聖明裁擇帝以示夏言言不敢議帝曰明堂秋饗宜於奉天殿行之其配享皇考稱宗不為過情何在為不宜也復命集議户部侍郎唐胄疏爭之曰三代之禮莫備於周郊祀后稷以配天宗祀文王於明堂以配帝未聞成王以嚴父之故廢文王配天之祭移於武王也皇上嗣統之初廷臣執為人後之說於是力正大倫者惟張孚敬席書諸臣及何淵有建廟之議陛下嘉答諸臣亦云朕奉天法祖豈敢有干太廟顧今日乃惑於豐坊耶臣謂明堂之禮誠不可廢惟當奉大宗配於禮為宜若獻皇帝得聖人為之子不待稱宗議配而專廟之享百世不遷矣疏入上大怒下胄錦衣獄出為民尚書嵩乃上言考秋饗成物之旨嚴父配天之文皇考侑饗允合周道帝嘉納之秋七月議祔皇考於太廟初帝因嚴嵩請既勑禮部議又諭嵩曰太宗靖難功與開創同當稱祖以别之嵩遂上議曰古者父子異昭穆兄弟同世次殷有四君一世而同廟不係父子故也晉則十一室而六世唐則十一室而九世宋真宗詔議太廟禮學士宋湜議以太祖太宗合祭同位其後禘祫圖又以太祖太宗同居昭位皆古事之可據者皇考親孝宗弟臣謂宜奉皇考於孝宗之廟我太祖即位仁祖雖自布衣必享天子之祀皇考顧獨闕焉聖心必有所不安又曰古禮宗無定數祖非有功者不得稱漢世稱祖者二髙祖世祖光武再造漢室故無二祖之嫌我文皇定鼎持危功莫大焉尊稱為祖聖見允冝嵩奏出羣臣翕然無異議時張孚敬死已六年矣九月辛巳奉太宗文皇帝為成祖皇考獻皇帝為睿宗癸未祔皇考於太廟辛邜大饗上帝於𤣥極殿奉睿宗配享二十年夏四月辛酉九廟災時久暘不雨是日初昏隂雨驟至大雷雹以風忽震火起仁廟烈風噓之須臾燬其主延及成祖主亦燬遂及太祖昭穆羣廟惟獻廟獨存二十四年秋七月太廟成布詔天下穆宗隆慶元年春三月禮科左給事中王治上言獻皇帝入廟稱宗在今日猶有當議者蓋獻皇雖貴為天子之父實未嘗南面臨天下而今乃與祖宗諸宗諸帝並列雖親為武宗之叔父然嘗北面武宗而今乃設位於武宗之右揆之古典終為未合故先帝於獻皇帝祔廟之後世廟之享猶不忘設是先帝之心亦自有不安者臣以為獻皇祔太廟千萬歲後不免遞遷若專祀世廟則億萬世不改惟陛下下廷臣議求至當以妥獻皇之靈以光先帝大孝章下所司格不行谷應泰曰孝宗仁聖麟趾不蕃武廟盤游前星失耀再世衰微古今至變也當是時重繼嗣者私恩重承統者大義而世宗以臣紹君以弟承兄敷天臣民誰忍孝宗之嗣一傳卒斬者既已斬焉則忠臣義士不能復續求其同氣之近者立之統在嗣亦在矣所以武宗遺詔不敢子視世廟也既已兄稱武廟因欲併考孝宗則孝以無孫反因得子於義為誣稱子逼武二統嫌孝於理亦礙况父子至親豈可隔世軼代妄相附屬比之定陶濮王生視寢膳死視斂含曽有鞠飬之恩蚤定父子之分者逈相判也既不考孝即考興獻天下有無父之人乎漢宣不皇其父未嘗不考皇孫光武不皇其父未嘗不考南頓既考興獻即當皇興獻天下有子為天子父為列侯者乎據稱兵逆父遂不敢皇猶之舜不王瞍禹不王鯀也興獻以肇𦙍啓聖儼然皇焉亦猶之周王王季周王文王也湯不王商癸而周王王季光武不王南頓而世宗王興獻踵事增華禮以義起孝子之至也所疑者考興獻則疑於無孝宗皇興獻則疑於躋武宗憑几彌留奉迓入繼不能得世宗而延其嗣反欲召興獻而亂其統此舉朝所以沸騰百官所以號泣也不知太廟者承統之地皇而不廟者有異稱宗者繼統之名皇而不宗者亦殊懿文太子亦得為康皇帝英宗斥郕王然亦稱景泰帝不入廟則地不逼不稱宗則名不嫌親近則尊親盡則祧辟之遙除之官追贈之號曲體罔極之私情無預朝廷之名器乃世宗尊為天子必欲使之不王其父興獻為天子父必欲與之共臣其子此則議禮諸臣之過也至於觀德殿足矣必欲遷近太廟與之同門獻皇帝足矣必欲削去興獻崇加徽號見太后於世廟著獻皇之實録折𠂻禮經毋乃不倫興國皇太后聖旦則宴賚有加昭聖皇太后千秋即傳免朝賀傳聞乖異存殁傷心卒之不加宗不入廟殺徽稱止遷葬則亦璁蕚有功於存統也若夫廷和等之伏闕呼號甚於牽𥚑折檻世宗之疾威杖戍竟同元祐黨人大禮未成大獄已起君臣交失君子譏焉而廷和戮及身後楊慎謫死貶所濮議諸臣旋蒙賜還興國之獄無復金雞此則世宗乏錫類之仁亦璁蕚諸人無休休之量也至於豐坊倡議嚴嵩附和嚴父之說興睿宗之號進孝宗幾疑通宫武廟嫌躋新鬼以明察始以豐禰終蓋豐坊固子政之劉歆分宜實議禮之林甫善作者不必善成惜乎不令張孚敬見也明史紀事本末卷五十
