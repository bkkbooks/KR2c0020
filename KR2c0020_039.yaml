body:
  text: 明史紀事本末卷三十九浙江提學僉事谷應泰編平藤峽盗憲宗成化元年春正月兩廣蠻冦亂以都督同知趙輔為征蠻將軍都督僉事和勇為游擊將軍擢浙江左叅政韓雍右僉都御史贊理軍務率兵討之太監盧康陳宣為監軍户部尚書薛逺督餉御史劉慶汪霖紀功廣西潯州之境萬山盤矗中有水曰潯江發源柳慶東遶至潯帶象州永安修仁荔浦平樂諸郡縣夾江諸山皆􅚱砑嶻嶪其最險惡地為大藤峽葢有孤藤渡峽磵如徒杠也南截潯水為府江自藤峽至府江約三百餘里地惟藤峽最髙登藤峽巔數目里皆歴歴目前軍旅之聚散徃來可顧盼盡也諸蠻以此為奥區桂平大宣鄉崇姜里為前庭象州東鄉武宣北鄉為後戸藤縣五屯障其左貴縣龍山據其右若兩臂然峽北巖峒以百計如仙人關九層崖其極險阸者峽以南有牛腸大岵諸村皆縁江立寨藤峽府江之間為力山力山之險倍藤峽焉又南則為府江週遭葢六百里其中多冥巖隩谷層磴絶壁入者手挽足移十步九折一失足則隕身數百仞下中産猺人藍胡侯盤四姓為渠魁力山又有獞人善傅毒藥弩矢中人無不立斃者雖四姓猺亦憚之景泰中猺渠侯大狗等倡亂嘯聚萬人修仁荔浦力山平樂皆應之攻墮郡縣出没山谷守吏不能制率以招撫縻之時朝廷方北患衛拉特未遑也天順中益縱恣詔能捕大狗者予千金爵一級竟不可得久之蔓延廣東髙亷雷之境所至殘燬兩廣守臣皆待罪至是兵部尚書王竑言峽賊為亂久矣其始皆由守臣以招撫為功譬之驕子愈恤愈啼非流血撻之啼不止浙江左叅政韓雍有文武才以討賊屬之可抒南顧憂而諸將中惟都督趙輔勇畧可任故有是命閫外之事一以屬雍制曰將士有功者得自署三司而下不用命者以軍法論朕不中制也夏六月韓雍至南京㑹諸將議進兵方畧皆曰廣東殘破盗所在屯聚宜分兵撲滅之令一軍由庾嶺入廣東而大軍出湖廣入廣西賊在廣東者驅之在廣西者困之如是乃可滅雍曰不然賊已流劫蔓出而所至與戰是煽禍也大藤峽賊之巢穴今以全師擣之旣至彼地南可以援髙亷雷東可以應南韶西可以取柳慶北可以繼陽峒諸路勢如常山之蛇動無不應舉無不克心腹旣潰諸處之賊假息遊䰟耳何煩于逐乎舍此不圖而分兵四出則賊愈奔突汙漫郡縣愈殘燬所謂救火而噓之也未見其濟諸將曰誠如公言乃以官軍三萬人兼程而進秋七月韓雍大軍至全州㑹陽峒西延苗賊為梗出偏師擊滅之斬失律指揮李英等四人軍中股栗九月大軍至桂林雍按圖籍與諸將議曰修仁荔浦藤峽之羽翼也不剪除此藤峽勢不孤乃以永順保靖及西江土兵十六萬人分五路進先破修仁窮追至力山大敗之生擒一千二百餘人斬首七千三百餘級冬十一月大軍至潯州雍延父老問計皆曰大藤天險重嵓宻箐三時瘴癘某等生長其地不能得其要領且賊聞大兵至為備益堅莫若屯兵圍之且戰且守可不戰自斃雍曰不然峽山遼逺紛披錯雜六百餘里安可圍也且屯兵日久將士懈弛睥睨衝突豈能悉防兵法曰寜我薄人又曰先人有奪人之心今我軍新破府江勇氣百倍賊聞震恐喪魄矣因而棄之可立破也乃以總兵歐信叅將孫騏髙瑞等帥六萬八千人為右軍自象州武宣分五道入攻其北以都指揮白全楊嶼張剛王屺等帥九萬二千人為左軍由桂林平南分八道入攻其南以叅將孫震指揮陳文章等守左江及龍山五屯防其奔軼雍與趙輔和勇營髙振嶺以督諸軍雍復令歐信曰山北旣破便可提兵深入夾攻桂州横石諸崖令夏正曰林峒沙田府江間道也宜越古眉雙髻諸山伏兵林峒扼其東奔諸將聽命十二月朔韓雍督諸將四面並進攻之别遣兵斷諸山口賊聞兵來置婦女積聚于桂州横石寺塘諸崖乃悉力出捍峽南排柵堅宻滚木礧石鏢鎗毒矢下如注官軍登山仰攻雍督戰益急敵小息雍覘其怠急擊之將士用團牌扒山虎壓二笆等噐魚貫以進皆殊死戰呼聲撼山峽若崩賊氣奪雍命縱火焚烈烟熖蔽天日晝晦賊大潰散盡破山南石門大信道袍屋厦諸舍老鼠塞嶺竹踏梁腦紫荆林峒沙田古營牛腸大岵大塞等塞賊屋廬藏積皆赭日暮雍命就營賊巢中衆栗栗視雍恬然整暇咸恃以安賊旣潰入横石諸崖雍飭兵窮追伐山通道行數日至其地賊上九層樓等山絶崖懸壁勢控霄漢林箐叢惡非人所處樹柵據之用千斤礧石大木轉而下聲若雷巖谷皆應弩矢雨注雍誘使大發而令人間道潛陟其巔覘賊發竭舉砲為應自卯至未賊發竭砲舉大駭雍督將士縁木扳蘿而升猨引蟻附漫山奮撃連數日夜鏖戰數百合發火箭焚其柵而夏正等亦自林峒來援與大兵合賊大驚潰生擒侯大狗等七百八十餘人斬首三千二百餘級磨崖石紀嵗月而還士人謂自國初但禁禦無出掠未有窮入巢穴破之者峽中有大藤如斗延亘兩崖諸蠻蟻度故曰大藤峽乃斬峽藤斷之易名斷藤峽分兵捕雷亷髙肇諸㓂先後平之先是大軍由修仁荔浦抵大藤峽道有儒生里老數十百人跪持香曰我輩苦賊久矣莫敢自㧞今幸遇天兵得自為良民願先三軍鋒雍大怒顧左右叱曰此皆賊耳縛斬之左右初疑雍何乃殺良民旣縛而袂中利刀出廼知間也悉斷頸散手足刳腸胃分掛箐棘中累累相屬賊大驚沮曰韓公天威也有新㑹丞陶魯𨽻麾下雍威嚴擬王公軍門設銅鼓數千儀節詳密三司長吏見長跪白事慴悚如小吏一日顧峒賊最强險難下者方設䇿魯時直膳侍左右謾謂曰丞揣我何意魯曰得非某賊耶雍曰然丞得徃否曰匪直能且易易耳雍怒曰賊鋭甚又搤阻自衛非大兵不可入部下文武數百千人熟視無可當吾寄者吾方欲身徃若安得易且使若食粟能之耳蕞爾邑不能理乃言撃賊若妄當笞魯不拜抗言曰謂魯解食粟不解擊賊者明公未悉魯也蔣琬龎統廢邑事矣後乃為蜀名臣公幸毋棄魯使得畢技當悉縛諸醜以獻雍異之改容曰若所將幾何而辦曰三百人曰何少曰魯猶以為多也兵貴精請擇雍曰任若自為之魯乃標式約曰有能力舉百鈞矢射二百步者來三軍之士十五萬人其比于式者得二百五十人曰未也請復下令募募數日足魯乃為别將自操練陣法椎牛酒犒甘苦共之士爭願為死率以先登大破賊斬首無算賊聞陶家軍駭慄遁避叩首乞為良民得毋死幸甚魯成子也雍又奏調逹官軍千餘專命偏將領之猺獞出入山林利用標鎗牌方諸短兵不能當騎射故逹軍所向輙克賊畏之旣平雍乃上言諸猺之性憚見官吏攝以流官終難靖亂有上隆州土知州岑鐸以罪在禁而事屬曖昧蠻戎之旅不必責以彛倫請復其職俾領藤峽開設州縣仍𨽻潯州又以各處廵檢俱係流官不諳民情不辨地理徃來遷轉難以責成而部下有功土人李昇等效有勤勞請量授土廵檢官秩彼皆感恩圖報必能保障一方又請移周冲廵檢司于勒馬移靖寜廵檢司于獻俘移思隆廵檢于碧灘東鄉龍山各宜添設又别類獞人國初曾充戎伍近用兵時遣千户李慶招之多肯效順請即本地開設千户所因其故俗即以李慶為之渠帥統之亦可羈縻獷悍藉以保障地方奏上上皆納之即斷藤峽設武靖州以岑鐸為知州屬潯州府班師論功擢雍左副都御史賜文綵幣六官一子錦衣鎮撫封趙輔武靖伯子孫世襲初出軍時趙輔知雍才軍事一聽雍而輔但用命戰故所向有功世宗嘉靖六年夏五月起新建伯王守仁以兵部尚書總制兩廣江西湖廣軍務先是成化中韓雍平斷藤峽民獲寜居者二十餘年正徳五年後遺孽漸熾峽南賊尤甚横江禦人總制都御史陳金謂諸蠻不過利魚鹽耳乃與約商船入峽者計船大小給魚鹽與之諸蠻就水濱受去如𣙜税然不得為梗蠻初獲利聽約道頗通金亦謂此法可久易峽名永通亡何諸蠻縁此益無忌大肆掠奪稍不愜即殺之因循猖獗遂負固大為㓂至是守仁至兩廣定田州盧蘇王受降而兩江父老遮道言斷藤峽及入寨賊倡亂狀守仁上疏請討從之七年春二月王守仁以湖廣兵至南寜而盧蘇王受初降亦願立功自贖守仁乃集諸守臣將帥議命湖廣僉事汪溱廣西副使翁素僉事呉天挺及叅將張經都指揮謝珮監湖廣土兵襲勦斷藤峽賊仍督分永順兵進勦牛鵬等寨保靖兵進勦六寺等寨期以四月初二各至信地先是峽賊聞軍門檄湖廣土兵至皆逃匿深險復聞以蘇受降罷兵又守仁駐南寜故為散遣諸兵狀㓂弛不為備湖廣兵皆偃旗卧鼓馳至與官軍突進四面夾攻之賊敗退保仙女大山據險結砦官軍攀木縁崖仰攻之初四日破賊寨初五日復攻破油􅀈石壁大陂等巢賊敗奔斷藤峽官軍追撃破之賊奔渡横石江覆溺死者六百餘人官軍自後急擊俘獲甚衆賊潰散初十日遍搜山峒無遺還兵至潯州守仁密檄諸將移兵勦仙臺等賊二十一日仍前分布各哨永順兵由磐石大黄石登岸進勦仙臺花相等處保靖兵由烏江口丹竹埠登岸進勦白竹古陶羅鳯等處期五月十三日抵巢各賊聞牛腸等寨破滅則大懼方據險設伏待之官軍驟進奮勇夾擊賊不支奔入永安力山乃分兵圍之賊復大潰奔諸路者多為防截恭將沈希儀等所擒于是斷藤之賊畧盡先是守仁因入寨賊去斷藤稍逺别遣布政使林富副總兵張佑監督土口盧蘇王受五千餘衆進勦入寨猺賊各兵乗夜銜枚襲之昧爽抵賊巢遂破石門天險賊始驚覺且戰且走日午賊結聚二千餘人來拒官軍奮擊之賊旣失險氣奪不能支遂大潰奔入重險官軍夜募死士俺其不備襲古蓬寨破之連克固安古鉢都者峒諸寨于是八寨之賊亦盡前後擒斬三千餘人兩江底定守仁乃班師疏薦林富為都御史廵撫其地論功褒賞有差十五年夏六月斷藤峽盗攻殺戍卒先是王守仁旣歸卒于道而武靖州知州岑邦佐不能鎮輯且墨賊賄多曲庇之故峽以北賊復漸肆猖獗其目侯勝海者居弩灘為亂指揮潘翰臣聽土目黄貴韋香言誘勝海殺之實貴香利勝海田廬也勝海弟公丁集衆噪城下殺人僉事鄔閲叅議孫繼武言于都御史潘旦請討之叅將沈希儀沮之曰滑賊未易取須春江漲以數千人從武宣順流下撲之乃可不聽閲繼武還潯州以千人徃撃賊先遁去斬一病夫而還遂言賊已歛跡請立堡戍旦從之希儀復言賊未大創兵威不振立堡難守旦不聽六月堡成閲令黄貴韋香以三百人戍之許擇取勝海田廬不禁諸猺大憤恚邦佐又隂黨之公丁遂集衆二千人夜㓂堡殺戍卒二百餘人貴香走免廵按御史諸演疏其事閲與繼武以啟釁罷去亡何旦亦去侍郎蔡經代之十七年春正月蔡經集諸司議發兵曰諸君度滅賊須兵幾何副總兵張經曰不過萬人蔡經曰太少沈希儀曰非八萬人不可蔡經曰太多副使翁萬逹曰二君言各有據襲而取之曰勦聲罪討之曰征由張君言勦也由沈君言征也然賊為備久矣勦之無功從沈君言便㑹朝議欲征安南事遂已公丁等益横時出殺掠潯人苦之冬侯公丁伏誅先是副使翁萬逹力請討公丁御史鄒堯臣亦贊之蔡經乃㑹安逺侯柳珣决計發兵以兵事屬萬逹萬逹亷得百户許雄素通賊狀劫之曰能擒公丁貸汝死不即論如法雄懼請効力自贖萬逹陽庇公丁謂讎家誣之耳乃捕係訐訟公丁者數人責其啟釁公丁果遣人自列萬逹陽許之又令雄假稱貸為賄公丁喜益信雄㑹萬逹廵他郡以事屬叅議田汝成汝成召雄申飭之雄乃詒公丁曰潯人久以爾為口實幸上之人不信今分守公新到何不自訴㓂堡事由他猺庶相信也公丁然之隨雄來見汝成復列寃狀汝成曰聞仇家誣汝已逮治之矣慰遣之乃密授意城中居民被賊害者家出毆公丁一市皆譁遂逮入係獄遣雄諭其黨曰㓂堡事公丁委罪諸猺須鞫實坐之若等誠謂公丁寃須罪人得釋之萬一事自公丁當共棄之勿以一公丁自取滅亡也諸猺競言事果由公丁聽論之不敢黨乃檻致公丁軍門磔誅之十八年春三月兵部侍郎蔡經平斷藤峽諸盗先是田汝成旣誅公丁乃言之督府謂首惡旣擒賊方震駭宜乗此時進兵討賊經許之㑹沈希儀病乃以副總兵張經將左軍副使翁萬逹監之南寜指揮王良輔朱昇凌浦柳浦周新孫文繡屬焉以都指揮髙乾將右軍副使梁廷振監之賓州指揮馬文傑王俊戚振呉國章屬焉副使蕭畹紀功叅政林士元及汝成督餉張經議欲以少兵勦之畧示威勿深入又欲舍紫荆諸處賊藪勿擊萬逹持不可謂少出兵墮損軍威諸猺恣肆久不大創之不足懾其心汝成亦如萬逹議萬逹又言之督府曰峽南亦劇賊但今兵力不能并及姑緩之以俟後經然之乃以二月兩軍齊發左軍則王良輔由牛渚灣越武靖攻紫荆姜老鼠諸巢朱昇由三等村渡蓼水攻石門黄泥嶺諸巢柳浦由白沙灣攻道袍梅嶺諸巢淩浦由白沙灣攻木昻梅嶺諸巢周維新由白沙灣攻藤冲緑水冲諸巢孫文繡由藤峽夾攻大坑巢共三萬五千人分六道進右軍則馬文傑由武宣攻碧灘緑水諸巢王俊等由武宣入山攻羅渌上峒戚振攻中峒呉國章攻下峒共一萬六千餘人分四道南北夾攻之賊大窘擁衆奔林峒而東王良輔邀擊之中斷復西奔諸軍合擊斬首千餘賊謂徃年據險結巢故被官兵撃破皆殱焉至是不復立砦惟漫走山谷間令官兵疲于追逐且曠日久多費糧饟必速退其東奔者入羅連山萬逹移兵攻之檄右軍抵長洲沿江繞出賊背賊于諸險隘伏械噐防禦甚多官兵皆以計發之追斬百餘級賊益窘㑹右軍迷失道愆期三日又土兵盧蘇受賊賂欽兵縱之漫匿諸山谷人言羅連山官兵古所未至者賊遁深入不復窮追云時平南縣有小田羅應古陶古思諸猺亦據險勿靖萬逹等移兵勦之三月班師招賊餘黨二百餘人降之江南胡姓諸猺歸順者亦千餘人藤峽盡平萬逹汝成獻議于督府凢七事曰編保甲以置新民立營堡以通江道設備禦以控上遊清狼田以正疆界改州治以建屯所處欵兵以慎邉防𣙜商税以資公費蔡經多採納疏行之捷聞諸將帥守臣皆陞賞有差谷應泰曰太藤當粤西潯州地其水則潯水府江環五百里其山則夾江峻嶺㟏岈峭削盤矗捫天髙瞰數百里下乃臨不測入邃谷矣其徑則引一綫歴千盤非手援足躡不得施歩而上也其中則前庭後户左障右屯一夫荷㦸千夫辟易也其前則牛腸大岵臨江壁立敵不敢仰關而攻也其後則仙人九層岩峒星列道里不可裹糧而窮也其産則密箐叢篁毒瘴惡霧非人所處也其噐則長矢勁弩淬毒傅藥人且應弦輙斃也披圖攷俗綜其大畧而大藤之勢葢不特蜀有鳥道蠶叢華有天門箭括已為之開立郡縣而流官土官交錯難治建置學校而猺獞獷悍淫殺性成通魚鹽以誘之則見利犬狺建營堡以備之而失勢獸駭辟之癭匏腫樗輸匠不能斵籧篨戚施官司不能材神臯之甌脱上天之驕子也然而俗編赤縣未可不臣地屬神州終難度外而嚴尤論狄古無上䇿賈讓治河僅行中計大軍不可久駐孤軍不可追險合圍防其軼出屯守更苦劫掠癬疥之疾能廢七尺之軀涓滴之流可盡江河之水王竑所以决戰韓雍所以肆伐也先渡潯水决其樊籬縱火大藤空其巢穴賊乃悉衆憑險歛兵拒戰而王師援木攀蘿楚歌四合猨牽蟻附漢幟先登磨石横崖之谷題銘九層之樓鋸藤絶絙奪其世險至于支離身首刳剔肝腸金鼓陳兵旌旗秉纛葢以天兵不易至重險不易得扼吭拊背急撃勿失宣暢皇靈顯彰天殛取威定亂在是役也然猶武備中弛苞孽復盛二十年而有新建之師又十年而有蔡經之捷賊勢稍殊兵形亦異類皆窮追深入耀甲横戈葢孔明巴蜀率用嚴刑張詠益州輙行捕斬亂國重典有自來矣然而興利除弊勿擾其俗仁漸義摩久革其故蠻戎猶有人性長吏者又何可以馬上治之也與明史紀事本末卷三十九
