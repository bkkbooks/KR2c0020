body:
  text: 明史紀事本末卷四十九浙江提學僉事谷應泰編江彬奸佞錢寧附武宗正德七年冬十月內㫖欲調邉兵入衛京師大學士李東陽等及府部科道力諫不聽時幸豎有獻密計者言京軍不習戰陳欲調宣府官軍入衛京師而以京軍充數戍邉每歲春秋更調如班操例上遣司禮監谷大用至閣議東陽力持以為不可大用謂上有先入之言不可破姑試之以俟再議東陽曰某等職在論思今日曲從即有後患百死何贖乃上疏曰宣府京師北門切近漠北朝廷屯宿重兵分地防守尚恐不給每年河南等處邉軍輪班備禦近因流盜猖獗動調官軍乃一時權冝甚非得已蓋京軍官軍各有分地無故而動一不便也京軍備邉不習戰陳恐傷國威二不便也京軍出京駭人耳目聞之各處未免驚疑三不便也京軍在外恃勢怙淫將官護短而不可禁邉方受害而不敢言四不便也邉軍在內狎恩恃愛傲睨軍民蔑視官府小則怠緩大則違法治之則或不能堪縱之則愈不可制五不便也逺違妻子棄捐墳墓或風俗之不相冝或糗糧之不相續六不便也糧草之外必須行糧布花之外必須賞賚糜費無紀七不便也往來交替日無寧息倉卒之際或變起於道途厭倦之餘或患生於肘腋八不便也示京營之空虛見中國之單弱九不便也西北諸邉見報聲息唇齒之地正須䇿應脫有疏失咎將誰歸十不便也疏上翌日竟降內㫖行之召大同遊擊江彬等入京師彬宣府人驍勇狡險時從宣府副總兵張俊征流賊于山東惟殺掠良民以邀賞班師入京賂錢寧引入豹房得見上彬機警善迎人意上喜留侍左右升左都督冒國姓為義兒時時在上前講說兵事因請盡調遼東宣府大同延綏四鎮精兵入京操練時許泰劉暉等皆有寵於上號外四家而彬尤甚邉卒縱橫驕悍都人苦之上嘗于西內練兵令彬等率兵入習營陳校騎射或時為角抵之戲上戎服臨之銃炮之聲不絶禁中千户周麒常叱之彬竟陷麒死于是左右皆畏彬八年冬十月以錢寧掌錦衣衛事賜姓朱寧鎮安人太監錢能鎮守雲南寧幼鬻能家能死事劉瑾因得見上上甚悅之嘗醉枕寧卧百官候朝至晡莫得帝起居但伺寧寧內侍帝外招權納賄諸大臣造謁恐後小拂意即中害內侍武臣率重資投寧求鎮守總兵都察院經歷錢岌至拜寧為父密伺廷臣忤寧者彈斥之是時內臣張鋭掌東厰威勢與寧埒中外號曰厰衛九年春二月帝始微行黃花鎮等處近幸朱寧張鋭張雄等日導上遊畋微行不可諫止十年秋七月浙江左布政方永良劾朱寧鬻鈔害民不報時寧黷貨無厭以鈔二萬發浙江易銀三萬餘兩良永上言四方羣盜甫息瘡痍未瘳邉塞多虞浙東西雨雹為災嗷嗷千里臣茍隱忍不為陛下言之則已斂之財必入朱寧之手而民心傷民心傷則邦本搖陛下寧不為之寒心乎臣惟朱寧竊寵以來陛下之賜與無算四方之餽遺不資篋笥之中必不少此乃苛斂無已負恩實深伏乞陛下割偏私之愛下之詔獄明正典刑仍急行浙江巡按監察御史將已斂鈔銀盡給還民民怨可慰臣死且甘心倘不以臣言為然置之不問日復一日尾大不掉必蠧軍食民肆無厭之求有出於尋常所不料者陛下悔之晚矣疏入寧頗懼乃委過下人遣衛卒追所發鈔而以價銀還之民時寧怙寵藉威舉朝屏息獨永良訟言攻之憾之不置尋永良上疏乞致仕從之十一年春正月上御豹房與江彬等同卧起彬泰暉皆賜姓朱彬等與都督錢寧中貴張忠盧明秦用蕭敬優人臧賢表裏擅權為奸諸司章疏多阻格不上然諸寵皆出彬下彬時導上出宫禁遊獵近郊羣臣諫不聽八月大學士楊一清上疏乞休略言宫府異體用舍違冝官帑空虛浮費冗食不能革民力困弊徴求苛斂不能除讒言可以惑聖聽匹夫得以搖國本禁庭雜介胄之夫京師無藩翰之託地震天鳴日食星變旱乾水溢報無虛日靦顔在位將安用之疏入忤朱寧致仕歸十二年夏六月中㫖革彭澤職為民先是彭澤經略哈密納幣土番頗失國體既召回掌都察院事常與言官論及朱寧輒忿曰吾恨不手創此賊兵部尚書王瓊數憾澤因以語寧且曰吾為公致彼來公自察之遂招澤相過匿寧屏後故以言激之澤復大罵寧由是深銜之至是瓊劾澤擅命納幣土番致啓邉釁奏上寧營內㫖除名八月上出關遊獵先是江彬等屢導上出宫遊戲近郊彬並騎鎧胄幾不可辨因數數言宣府樂至是遂出居庸關至宣府臨塞下巡關御史張欽上疏諫不報彬為上營鎮國府第于宣府輦豹房珍玩女御其中時時入民家益索婦女以進帝樂之忘歸九月上幸大同獵陽和諸城上時獨乘一馬鹵簿侍從皆不及二十七日方獵天雨氷雹軍士有死者是夜又有星隕之異明日駕赴大同北寇數萬騎犯陽和掠應州上命諸將擊之引去十月南京吏科給事中孫懋上疏言都督江彬以梟雄之資懷憸邪之志自緣進用以來專事從諛導非或遊獵馳驅或聲色貨利凡可以蠱惑聖心者無所不至去年導陛下幸南海子幸功德寺又幸昌平等處流聞四方驚駭人聽今又導陛下出居庸關既臨宣府又過大同以致寇騎深入應州使當日各鎮之兵未集强寇之衆沓來幾何不蹈土木之轍哉是彬在一日國之安危未可知也不報上還京封江彬平鹵伯許泰安邉伯冒應州功也典膳李恭具疏請回鑾指切江彬罪擬朝賀上之彬聞逮恭拷斃于獄給事石天柱刺血上疏御史葉忠言尤深切俱不省十三年春正月上郊祀畢復出關游幸太皇太后王氏崩乃還京江彬為營卒報怨遣百户朱英執人于平谷御史董相杖而繫之且欲奏聞彬遽譖於上降相徐州判官夏四月上以太后將祔葬親詣天夀山祭告六陵遂幸黃花鎮密雲等處遊獵六月寧夏塞有警上復議北征自稱威武大將軍太師鎮國公朱夀巡邉以江彬為威武副將軍扈行令內閣草敕大學士楊廷和梁儲蔣冕毛紀上疏力諫且云萬一宗藩中援祖訓指此為言陛下何以應之又或以朝無正臣內有奸邪為名陛下之左右與臣等何以自解不聽廷和遂稱疾不出上御左順門召梁儲面趨令草制儲對曰他可將順此制斷不可草上大怒挺劍起曰不草制齒此劍儲免冠伏地泣諫曰臣逆命有罪願就死草制則以臣名君臣死不敢奉命良久上擲劍去乃自稱之不復草制彬亦罷副將軍命禮部尚書李遜學等廷議建儲居守時錢寧意在寧藩世子江彬意别有屬梁儲厲聲曰皇上春秋鼎盛建儲未易輕言萬一有他吾輩伏斧鑕矣邪謀豈可聽狥兵部尚書王瓊吏部侍即王鴻儒亦力言不可議遂寢七月上北巡出居庸關先是上既還京輒思宣府樂稱曰家裏至是復歷宣府至大同大同巡撫都御史胡瓉乞回鑾瓉以沙漠之地不冝久留而扈從邉將恃江彬等怙寵大為邉地害上疏極論且引漢袁盎諫文帝為言不報十月上自偏頭關渡河幸榆林彬索金璧裘馬數十萬令邉吏獻虎豹犬馬南京禮部右侍郎楊廉兵部尚書喬宇上疏諫止不報十四年二月上自榆林還京二月上自稱總督軍務威武大將軍太師鎮國公朱夀制下南巡上欲登岱宗歷徐揚至南京臨蘇浙浮江漢祠武當遍觀中原時寧王宸濠久畜異謀制下人情洶洶翰林修撰舒芬等約羣臣上疏乞留俱會關下吏部尚書陸完迎謂曰主上聞直諫輒引刀為刎狀完意蓋以阻言者也于是翰林修撰舒芬等疏先入兵部郎中黃鞏員外陸震聨疏入吏部郎中夏良勝禮部郎中范潮太常博士陳允川疏繼入醫士徐鏊以醫諫吏部郎中張衍慶禮部郎中姜龍兵部郎中孫鳯陸俸等率部寮合疏入工部郎中林大輅等大理寺正周叙等行人司副余廷瓉等亦合疏先後入上大怒召江彬示之以彬言下黃鞏陸震夏良勝萬潮陳九川徐鏊錦衣獄命舒芬張衍慶姜龍孫鳯陸俸等百有七人跪午門外五日林大輅周叙余廷瓉等二十餘人俱下獄明日黃鞏等六人亦跪五日時舒芬疏最切直而鞏以事出江彬故獨劾之芬疏略曰陛下之出以鎮國公為名號茍所至親王地據勛臣之禮以待陛下將朝之乎抑受其朝乎萬一循名責實求此悖謬之端則左右寵幸之人無死所矣陛下大婚十有五年而聖嗣未育故凡一切危亡之迹大臣知之而不言小臣言之而不盡其志非恭順蓋聽陛下之自壞也尚有痛哭泣血不忍為陛下言者江右有親王之變大臣懷馮道之心以祿位為故物以朝寧為市㕓以陛下為奕棋以革除年間事為故事特左右寵幸者知術短淺不能以此言告陛下耳使陛下得聞此言雖禁門之外亦警蹕而出安肯輕䙝而漫游哉鞏疏略曰陛下臨御以來祖宗紀綱法度一壞於逆瑾再壞于佞幸又再壞于邉帥之手至是將蕩然無餘矣天下知有權臣而不知有陛下寧忤陛下而不敢忤權臣陛下勿知也亂本已生禍變將起竊恐陛下知之晚矣因陳六事一曰崇正學二曰通言路三曰正名號四曰戒游幸五曰去小人六曰建儲二陸震見其疏稿同署名以進于是京師連日隂霾晝晦禁中水自溢髙橋四尺許橋下七鐵柱齊折如斬時三月二十五日也金吾衛指揮張英者肉袒挾兩囊土數升當蹕道哭諫不允即拔刀自刎血流滿地侍衛人縛送詔獄問英囊土何為曰恐汚帝廷灑土掩血耳殞命獄中是日內㫖舒芬等百有七人俱廷杖三十疏首謫外任餘奪秩半年黃鞏等六人俱廷杖五十徐鏊戍邉鞏震良勝潮俱削籍林大輅周叙余廷瓉廷杖五十降三級外補餘杖四十降二級外補死杖下者員外陸震主事劉校何遵評事林公黼行人司副余廷瓉行人詹軾劉槩孟陽李紹賢李惠王翰劉平甫李翰臣刑部照磨劉珏十餘人車駕竟不出彬等亦知朝廷有人稍畏憚之六月寧王宸濠反初錢寧受濠賄左右之太監張鋭思傾寧力言濠不法事鋭言先入寧不知也見帝且盛稱濠賢帝不應寧懼乃馳報濠而委罪臧賢賢謫戍邉中道使校尉僞為盜掩殺之帝亦執寧下之獄彬等欲邀功贊上親征㑹王守仁已擒宸濠以俘獻上詔止之九月上戎服至南京令百官皆戎服迎各官竟朝服往上不問十五年春正月朔上受朝賀于南京時江彬率邉卒數萬扈從恃恩無人臣禮公卿而下側足事之魏國公徐鵬舉設宴招彬不啓中道門又不設座中堂彬大怒問故對以髙皇帝曽幸其第遂為故事彬不得已就宴六月江彬遣兵官索南京各城門鎖鑰兵部尚書喬宇危言止之宇為南京兵部務持法守正亦多材略每事稍裁抑彬人倚以為重彬亦頗憚之一日彬遣使索城門鑰城中大駭督府使問宇宇曰守備者所以謹非常城門鑰有祖宗法制在雖天子詔不能得督府以宇言拒之乃止彬每矯制日有所求宇承制必請面覆始行彬計少沮時上駐蹕南京久居舊邸不入大內復欲往幸蘇浙湖湘間宇倡九卿臺諫三上章伏闕請回鑾上召彬議彬怒欲重譴其黨勸之曰往歲京師已甚何可再也彬意乃解請慰諭百官各歸治事七月扈從大學士梁儲蔣冕跪伏行宫門外泣諫請從百官奏回鑾自未至酉上遺中官取奏入且諭之起對曰臣未奉㫖不敢起乃令中官復出傳㫖不日即還儲等出閏八月上至鎮江十月上自南京班師十六年春正月上還京江彬益驕橫其所部邉卒桀驁不可制二月十四日丙寅上以疾崩于豹房皇太后張氏與大學士楊廷和等定議奉遺詔迎取興獻王長子嗣皇帝位初上寢疾彬猶改團營為威武團練自提督軍馬中外慮彬旦夕反帝崩彬偶不在左右皇太后召廷和等議恐彬為亂祕不發喪以上命召彬入彬不知帝崩并其子入俱收之皇太后下制暴彬罪惡厚賞彬所部諸邉卒散遣歸鎮執其黨數人下詔錦衣獄論罪磔於市籍其家金七十匱銀二千二百匱金銀珠玉珍寶首飾不可勝計隱匿奏疏百餘本世宗即位正彬黨罪惡謫戍及論死者數十人并誅錢寧太監竄逐者亦數十人谷應泰曰江彬以邉卒入侍稔惡十年顛越乘輿幾危社稷然跡其所為非有他謀特崛强鷙悍庸材耳方彬之起家塞上睥睨宫闈此何異祿山之侍𤣥宗乎且其外握邉兵內交近侍錢寧張忠皆其羽翼辟之莽乃依恭卓復結讓庭凑內附守澄沙陀通好令孜區區之天下一物亡商二憾覆晉武宗存則挾天子以令諸侯武宗崩即矯遺命以擅大寶不待智者而决矣而乃招致邉軍入演大內君臣戎服凶器為娛繼遂厭心萬乘屏足九重誘導以離宫之歡恣情于馳騁之樂摶蒼鹿扼𤣥熊樂如是足矣即其殄滅善類斥譴正人血飛犴狴逐半朝堂亦猶之猛虎在檻咆哮欲出饑鷹在韝忿揚思飛初非有剪除異已之心質劫公卿之志也夫彬本武人而武宗所喜在戎服言兵彬生沙磧而武宗所喜在游巡天下順其志則相與揚戈躍馬拂其意則相與嚴威峻法同聲相應同道相謀書曰豫有亂臣十人同心同德非徒聖主彼亦誠然逮其震主之威已立赤族之禍將成雖有中庸亦必巧營三窟計成百足乃至武宗彌留之際彬猶晏然歸卧私第命一介之吏奉尺一之詔召之而即至同車疾驅父子駢首何其愚與夫曹爽釋兵歸天子求老私第商鞅刑太子傅孝公崩欲自亡入魏自古以來器小而位髙威重則身危奸邪前敗禍患後隨瀕死而不之悟者也然豫以為武宗之世逆瑾之變十常侍甘露之黨也河北山東江西四川之冦黃巾黃巢之亂也置鐇宸濠之變七國八王之孽也江彬之奸董卓祿山之釁也然而隂曀甫合旭日旋升大厦欲傾漂搖不入者則以搆禍諸人類皆乳臭茫茫草澤更無英雄至于在內如六給事十三御史編修舒芬等百有七人在外如楊一清王守仁林俊彭澤莫不慟哭斬奸呼號阻駕枕戈流涕投袂登舟觀于水溢宫門橋柱七折上天告譴似為言官兼之明星夜隕特勸回鑾吳楚颶風盡飽魚腹此非諸君子格天之功抑或祖宗在天之祐與傳曰善人國之紀也詩云人之云亡邦國殄瘁斯之謂與明史紀事本末卷四十九
