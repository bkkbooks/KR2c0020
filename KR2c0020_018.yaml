body:
  text: 明史紀事本末卷十八浙江提學僉事谷應泰編壬午殉難文皇發北平僧道衍送之郊跪而宻啟曰臣有所託上曰何為衍曰南有方孝孺者素有學行武成之日必不䧏附請勿殺之殺之則天下讀書種子絶矣文皇首肯之及師次金川門大内火建文帝遜去即召用孝孺不肯屈偪之孝孺衰經號慟闕下為鎮撫伍雲等執以獻成祖待以不死不屈繫之獄使其徒廖鏞廖銘説之叱曰小子從予幾年所矣猶不知義之是非成祖欲草即位詔皆舉孝孺乃召出獄斬衰入見悲慟徹殿陛文皇諭曰我法周公輔成王耳孝孺曰成王安在文皇曰伊自焚死孝孺曰何不立成王之子文皇曰國賴長君孝孺曰何不立成王之弟文皇䧏榻勞曰此朕家事耳先生毋過勞苦左右援筆札又曰詔天下非先生不可孝孺大批數字擲筆於地且哭且罵曰死即死耳詔不可草文皇大聲曰汝安能遽死即死獨不顧九族乎孝孺曰便十族奈我何聲愈厲文皇大怒令以刀抉其口兩旁至兩耳復錮之獄大収其朋友門生每収一人輒示孝孺孝孺不一顧乃盡殺之然後出孝孺磔之聚寶門外孝孺慷慨就戮為絶命詞曰天䧏亂離兮孰知其由奸臣得計兮謀國用猶忠臣發憤兮血淚交流以此殉君兮抑又何求嗚呼庶不我尤時年四十六復詔収其妻鄭氏妻與諸子皆先經死悉燔削方氏墓初籍十族每逮至輒以示孝孺孝孺執不從乃及母族林彦清等妻族鄭原吉等九族既戮亦皆不從乃及朋友門生廖鏞林嘉猷等為一族並坐然後詔磔于市坐死者八百七十三人謫戍絶徼死者不可勝計孝孺季弟方孝友就戮時孝孺目之淚下孝友口占一詩曰阿兄何必淚澘澘取義成仁在此間華表柱頭千載後旅魂依舊到家山士論壯之以為不愧孝孺之弟孝孺又有二女年俱未笄被逮過淮相與連𬒮投橋水死兵部尚書鐵鉉被執至京陛見背立廷中正言不屈令一顧不可得割其耳鼻竟不肯顧爇其肉納鉉口中令啖之問曰甘否鉉厲聲曰忠臣孝子肉有何不甘遂寸磔之至死猶喃喃罵不絶文皇乃令舁大鑊至納油數斛熬之投鉉屍頃刻成煤炭導其屍使朝上轉展向外終不可得文皇大怒令内侍用鐵棒十餘夾持之使北面笑曰爾今亦朝我耶語未畢油沸蹙濺起丈餘諸内侍手糜爛棄棒走屍仍反背如故文皇大驚詫命葬之鉉年三十有七父仲名年八十三母薛氏並海南安置子福安年十二發河池編伍康安鞍轡局充匠尋皆戮死妻楊氏并二女發教坊司楊氏病死二女終不受辱乆之鉉同官以聞文皇曰渠竟不屈耶乃赦出皆適士人户部侍郎卓敬被執責以不迎乗輿之罪曰爾前日裁抑諸王今復不臣我耶敬曰先帝若依敬言殿下豈得至此文皇怒欲殺之而憐其才且繫獄命中人諷以管仲魏徴事敬涕泣不可文皇感其至誠猶未忍殺而姚廣孝力言飬虎遺患意遂決敬臨刑從容嘆曰變起宗親畧無經畫敬死有餘罪神色自若經宿面如生誅三族沒其家圖書數卷而已文皇雅聞敬名既死猶惜之曰國家養士三十餘年不負其君者唯卓敬耳禮部尚書陳廸受建文帝命督軍儲於外過家不入聞變即赴京師文皇登極召廸責問廸抗聲指斥并收其子鳯山丹山等六人同磔於市将刑鳯山呼曰父累我廸叱勿言謾罵不已命割鳯山等鼻舌食廸廸唾益指斥遂凌遲死宗戚被戍者一百八十餘人廸既死衣帶中得詩云三受天皇顧命新山河帶礪此絲綸千秋公論明於日照徹區區不二心又有五噫歌皆悲烈云刑部尚書暴昭被執抗罵不屈文皇大怒先去其齒次㫁手足罵聲猶不絶至㫁頸乃死左僉都御史景清建文中以左都御史改北平叅議徃察燕邸動静王嘗宴之清言論明爽大被稱賞尋召還舊任及燕師入清知帝出亾也猶思興復詭自歸附乃詣見文皇文皇喜曰吾故人也厚遇之仍其官清自是恒伏利劔於衣袵中委蛇侍朝人疑焉八月望日早朝清緋衣入先是靈臺奏文曲犯帝座急色赤及是見清獨衣緋疑之朝畢出御門清奮躍而前将犯駕文皇急命左右収之得所佩劔清知志不得遂乃起植立嫚罵抉其齒且挾且罵含血直噀御袍乃命剝其皮草櫝之械繫長安門碎磔其骨肉是夕精英迭見後駕過長安門索忽㫁所械皮趨前數歩為犯駕狀上大驚乃命燒之已而上晝寢夢清仗劒追繞御座覺曰清猶為厲耶命赤其族籍其鄉轉相扳染謂之𤓰蔓抄村里為墟有青州教諭劉固者建文元年以母老乞歸清為御史移書招固因依清同居京師金川門䧟固弟國勸兄出降固曰固受朝廷厚恩以老母在未能即死矧降耶後清遇害連及固遂與弟國母袁氏同日受刑於聚寳門外固子超年十五有膂力臨刑仰天一呼網索俱㫁因奪劊子刀連殺十餘人事聞詔磔之右副都御史練子寜名安以字行被臨安衞指揮劉傑縛至闕語不遜文皇大怒命㫁其舌曰吾欲效周公輔成王耳子寜手探舌血大書地上成王安在四字文皇益怒命磔之宗族棄市者一百五十一人又九族親家之親被抄沒戍逺方者又數百人越數年吉水錢習禮以練氏姻族未及逮既官中朝恒為鄉人所持以告學士楊榮榮乗間以聞文皇曰使子寧尚在朕固當用之况習禮耶兵部尚書齊泰聞建文帝遜去追至廣徳欲徃他郡起兵興復被執見文皇不屈死之從兄弟敬宗宰皆死叔時永陽彦等謫戍児甫六歲給配赦還太常卿黄子澄初執李景隆於朝請誅之不聼江淮連敗拊膺慟哭曰大事去矣誤薦景隆萬死不足贖建文帝宻使子澄召兵不及責問不屈族其家一子走易姓名田經遇赦家湖廣吏部尚書張紞遜國後自經死侍郎毛太燕兵起數上封事條方畧紞死太亦死禮部侍郎黄觀字瀾伯奉命徴兵上江諸郡奮不顧家且行且募至安慶聞金川失守痛哭謂人曰吾妻素有志節必不辱遂招魂葬之江上明日家人報至云家已被収夫人并二女給配象奴夫人翁氏持釵釧佯使出市酒餚急携二女同家屬十餘人投通濟門淮清橋下死觀復痛哭至李陽河聞建文帝已遜位知事不可為乃朝服東向再拜自投羅刹磯湍激處舟人急鈎之僅得珠絲粽帽以獻命束芻象觀帽之而剉於市籍其家并連姻黨百餘人謫戍蘇州知府姚善合鎮常嘉松四郡守練兵勤王未及戰文皇即位索黄子澄甚急子澄匿善所約共航海舉兵善謝曰公可去善不可去公朝臣可四徃號召圖興復善職守土義當與城存亾子澄遂去善為麾下許千户縛獻文皇詰善曰若一郡守乃敢舉兵抗我耶善厲聲曰臣各為其主耳語多不遜遂磔之善友黄鉞者仕為給事中與善相期許國鉞以親䘮家居聞善被執鉞遂閉目三四日求死或傳善款伏已得宥鉞復瞪目曰吾知善决無二心且少俟之脱善果不死吾将下報希直希直方孝孺字也乃稍稍食已而善就刑報至鉞登翏川橋西向再拜祀而哭之曰吾與君同受國恩國有難義同許身今君與希直同死吾忍背義獨生乎祀畢紿家人歸祭具遂從容整衣冠奮身入水死時家人俱竄伏有友楊福日夜泣橋側求鉞屍不得更數日屍忽自出立水中成禮葬之翰林修譔王叔英奉詔募兵行至廣徳聞建文帝遜位大慟㑹齊泰來奔叔英曰泰二心矣令執之泰告之故乃相抱慟哭與泰圖後舉已知事不可為沐浴衣冠書絶命辭藏衣間詞曰人生穹壌間忠孝貴克全嗟余事君父自省多過愆有志未及竟竒疾忽見纏肥甘空在案對之不能嚥意在造化神有命歸九泉嘗念夷與齊餓死首陽顛周粟豈不佳所見良獨偏髙蹤邈難繼偶爾無足傳千秋史官筆慎勿稱希賢又題其案曰生既乆矣未有補於當時死亦徒然庻無慚於後世遂自縊於𤣥妙觀銀杏樹下夫人金氏亦自經死二女俱赴井死翰林王艮初聞北平兵起輙憂憤不食及渡淮與妻子訣曰吾不可復生矣安能顧若等哉北師入城胡靖解縉吳溥為艮鄉人皆集溥舎縉陳説大義靖亦憤激慷慨艮獨流涕不言溥曰三子受知最深事在頃刻若溥去就固可從容也隨别去溥子與弼尚幼嘆曰胡叔能仗義大是佳事溥曰不然獨王叔死耳語未竟隔墻聞靖呼曰外閙甚可㸔豬溥顧與弼曰一豬不忍寜自忍乎須臾艮舎哭聲動已伏鴆死矣初洪武中禮部廷試艮最優太祖以艮貌不揚易靖第一艮次之至是艮死靖改名廣降於燕浙江按察使王良聞燕師入京慟哭誓以必死㑹命使召之良執使者下獄詰旦縛出期戮以狥道中忽遇衆譟起而奪使者去良還坐堂上悉收諸司印携歸廨舎嗟嘆乆之妻問故良曰吾分應死顧思所以處汝未決耳妻笑曰吾何難君為男子乃為婦人謀乎遂命妾饋食抱其子歔欷於厠置子池傍自投水死良起而殮之即列薪於户閉其家人毋得出令妾抱幼子托鄉人之客於杭者遂舉火抱印闔室焚兵部郎中譚翼金川䧟赴火死妻鄒氏子謹自縊御史曽鳯韶請從建文帝出亾帝麾使去鳯韶泣曰臣頃即以死報陛下文皇後以原官召不至尋加侍郎亦不至乃刺血書憤詞於襟上曰予生廬陵忠節之鄉素負立朝骨鯁之腸讀書而登進士第仕宦而至繡衣郎既一死之得宜可以含笑於地下而不愧吾文天祥屬妻李氏子公望曰吾死勿易衣殮遂自殺李氏亦自經死衡府紀善周是修為人卓犖有大志嘗曰忠臣不為得失計故言無不直貞女不為生死累故行無不果乃輯自古今忠節事為觀感錄當金川失守宫中自焚是修留書别友人付以後事具衣冠為贊繫衣帶上入應天府學拜先師畢自經死初是修與楊士竒解縉胡廣金幼孜黄淮胡儼約同死義惟是修不負其言後楊士竒為作𫝊語其子轅曰當時吾亦同死誰為爾父作𫝊聞者笑之監察御史魏冕力請建文帝誅徐増夀及宫中火起或謂冕宜急迎附冕厲聲曰使吾改臣節明君亦不用也奈何徒自汚遂自殺陳瑛請追罪詔誅其族同邑鄒朴建文初仕周府諌王邪謀錮獄上嘉其忠召至京授御史歸省聞冕死亦不食死時稱永豐雙烈刑科給事中葉福守金川門兵入死之大理寺丞鄒瑾與甥魏冕同毆徐増夀於朝請誅之京師䧟自殺詔誅其族凡男婦四百四十八人户科給事中陳繼之被執責問不屈磔於市大理寺丞劉端約刑部郎中王髙同棄官去跡露被執召問練安方孝孺何如人端曰忠臣也文皇曰汝逃忠乎端曰存身以圖報耳命與髙俱劓其鼻文皇笑曰作如此面目還成人否端詈曰我猶有面目即死可見皇祖文皇怒立捶殺之戍其家駙馬都尉梅殷擁重兵淮上文皇既即位廹公主公主髙皇后長女大長公主也公主嚙指血作書招殷中使至殷得書慟哭詢建文帝所在中使曰去矣殷曰君亾與亾君存與存吾姑忍俟之乃還京見文皇文皇曰駙馬勞苦殷曰勞而無功徒自愧耳文皇銜之乆之殷不能平時見詞色文皇嘗夜遣小中官潛入殷第察之殷愈怒永樂二年冬都御史陳瑛言殷招納亾命私匿番人與女秀才劉氏朋邪詛咒幾得罪明年冬早朝都督譚深指揮趙曦令人擠殷死笪橋下誣殷自投水死都督許成發其事文皇罪深曦二人對曰此上命也奈何殺臣文皇大怒立命力士持金瑵落二人齒斬之謚殷榮定公主牽文皇衣大哭問駙馬安在文皇笑曰為公主踪跡賊毋自苦公主謹䕶二子乃官其子順昌為中府都督景福為指揮旗手衛僉事時駙馬都尉耿璿炳文子也尚孝康帝長公主與弟都督瓛俱論死谷府長史劉璟誠意伯劉基仲子也自少静朴峻厲博通經書䆒兵畧嘗同兄璉侍父入朝太祖竒之曰阿璉明秀阿璟凝重伯温有子矣授谷王長史之國宣府建文初燕師起璟隨谷王還朝獻十六䇿不能用以病辭歸文皇登極璟卧家不起上欲用之罪以逃叛親王逮繫之臨别姻戚舉餞戒之曰皇上神武何止唐文皇先生忠良允為魏徴可也璟瞪目曰爾謂我學魏徴耶吾死生之分决矣至京授以官不受對上語猶稱殿下遂大忤㫖下獄一夕辮髪自經死漳州府學教授陳思賢聞即位詔至慟哭曰明倫之義正在今日遂堅卧不出迎率其徒伍性原陳應宗林珏鄒君黙曽廷瑞吕賢集明倫堂為舊君位哭臨如禮郡人執送京師思賢與六生皆死之叅軍㫁事髙巍洪武十七年旌孝行巍嘗上書燕王曰臣竊自負既為孝子當為忠臣死忠死孝臣願也京城破縊死驛舎又有髙不危者同時死義弟宣戍南海衞太常寺少卿盧原質少從方孝孺游後文皇召見不屈死之族其家教授劉政聞孝孺死痛哭不食斃刑部右侍郎胡子昭坐方黨受戮臨刑詩曰兩間正氣歸泉壤一㸃丹心在帝鄉弟僉事子義聞子昭死辟世丹稜蜀獻王聞而憐之令為僧子義以親遺體辭有子二人數歲子義曰吾兄無後天不絶吾姓二子當免於難竟棄去莫知所終右副都御史茅大方聞燕王兵起遺詩淮南守将梅殷曰幽燕消息近如何聞道将軍志不磨縱有火龍翻地軸莫教鐵騎過天河關中事業蕭丞相塞上功勛馬伏波老我不才無補報西風一度一悲歌文皇登極大方逮至責問不屈與其子順童道夀文生同日棄市二孫添生歸生死獄中妻張氏發教坊病死命棄其屍僉都御史司中召見不屈命以鐵帚刷其膚肉至盡而死姻婭同死者八十餘監察御史鄭公智坐方黨召見不屈死之戍其族大理寺少卿胡閠字松友日夜與齊黄宻謀設法防禦又請誅徐増夀遜國後文皇召方孝孺草詔繼召閏及髙翔皆衰絰至哭聲徹殿陛文皇召閏先入諭令更服閏曰死即死服不可更文皇以族誅恐之閏不屈命力士以𤓰落其齒齒盡罵聲不絶文皇大怒縊殺之以灰蠡水浸脱其皮剝之實以草懸武功坊子𫝊慶同日論死𫝊福方六歲戍雲南抄提全家二百十七人女郡奴年四歲其母王氏縛就刑郡奴自懐中墮地一卒提入功臣家付㸑下婢収之稍長識大義髪至寸即自截去日以灰汚面秃垢二十餘年功臣不以人畜之洪熈初赦諸死事者苖裔郡奴得同女軰行丐歸鄱陽貧無所依鄉人憐之曰此忠臣女也争饋遺不絶郡奴所受免死而已年五十六終尚處子也鄉人謚曰忠𦙍貞姑監察御史髙翔在建文時戮力戎事激發忠義文皇聞翔名召之翔持䘮服入見大哭語不遜乃命殺之沒産誅族諸給髙氏産者皆加税曰令世世罵翔也親戚悉戍邉又發其先墓雜犬馬骨焚灰揚之而以其地為漏澤院刑部尚書侯泰督餉至淮安聞京師失守泰行至髙郵被執下錦衣衞泰不屈死之妻曽氏配象奴弟敬祖子玘皆論死籍其家左拾遺戴徳彛被執責問不屈死之徳彛死時有兄俱從京師嫂項氏家居聞變度禍且赤族令盡室逃并藏徳彛二子於山間毁戴族譜獨身留家及收者至一無所得械項氏焚炙遍體焦爛竟無一言戴族遂全户部侍郎郭任不屈死之子經亦坐死少子金山保戍廣西三女給配户部侍郎盧逈不屈縛就刑長謳而死聞者悲之袁州太守楊任與黄子澄謀求舊君以圖大舉事泄被執至京磔於市子禮益坐死藉産族誅親戚荘毅衍等百餘家皆逺戍禮部侍郎黄魁不屈死之御史連楹立金川門下自馬首數文皇詞色不屈命收之引頸受刃白氣冲天尸僵立不仆太常少卿廖昇聞茹瑺使燕軍還見燕王起兵痛哭與家人訣自縊死監察御史王度奉敕勞軍徐州比還鳯陽失守方孝孺與度書誓死社稷壬午秋坐黨戍賀縣千戸所以語不遜論死誅其族監察御史董鏞㑹諸御史中有氣節者于鏞所相誓以死後被執論死女發教坊姻族死戍者二百三十人監察御史甘霖被執抗言求死從容就戮子孫相戒不復求仕御史林英劾李景隆誤國謫知瑞安賜還同王叔英募兵廣徳力屈自經妻宋氏繫獄亦自經死監察御史丁志方燕兵偪京城謂妻韓氏曰師至城必克吾惟一死報國汝其携幼子潛歸撫之以延丁氏後及兵入被執不屈死之晉府長史龍鐔被執不屈死之有收其遺骨得所自書贊云捐生固殞弗事二主别父與兄忍慟肝腑盡忠為臣盡孝為子二端于我歸于一所宗人府經歴宋徴嘗上疏請削罪宗屬籍數言李景隆失律懐二心被執責問不屈遂磔之誅其族徽州知府黄希范聞金川門失守素服不治事坐與長史程通善嘗共上防禦策論死籍其家遼府長史程通上防禦燕兵數千言衞士紀綱者方幸遼王通輙辱之文皇即位綱乘間言通有封事指斥遂械通論死家人戍遼簿錄其家得遺書數百卷而已賓州知州蔡運有善政遜國後論死百姓憐而思之燕山衛卒儲福建文末攜母妻逃文皇即位錄戍卒入衞福在錄中挈妻母行仰天哭曰吾雖一介賤卒義不為叛逆之人在舟中日泣不輟竟不食而死母韓妻范為營地葬之范年二十有姿色居貧奉姑甚謹毎哭其夫則走山谷中大號不欲聞之姑也官有聞其寡者欲委禽焉既而聞其事曰節孝婦也我何忍犯之皆以夀終中書舎人何申奉使至四川至峽口聞金川不守慟哭吐血不數日死北平按察僉事湯宗上言按察使陳瑛宻受王府金錢有異謀逮瑛謫廣西遜國後瑛召還窮治建文諸臣宗論死盧振當燕兵起時與徐輝祖攻守力為多後逮至京不屈榜振名數其罪殺之誅其族牛景先聞金川失守變姓名出走已而治齊黄黨逮景先妻妾發教坊司振景先俱不知何許人監察御史巨敬被執不屈死之誅其族户科給事中韓永遜國後杜門不出召入見欲復其官曰吾王蠋耳何以官為不屈死國子監博士黄彦清在駙馬都尉梅殷軍中私謚建文帝論死并逮從子貴池典史金蘭等繫獄僉都御史程本立出為江西副使未及行值北師渡江本立悲憤自縊死詔奪其恩典籍其家止敝衣數襲而已給事中龔泰北兵渡江奉命廵城泰與妻傅氏訣曰國事至此我自分必死爾苐携幼稺歸否則俱溺井無辱俄宫中火起泰馳赴為兵校所執見文皇金川門以非奸籍得釋自投城下死四川都司斷事方法為方孝孺所取士文皇即位諸司皆表賀法不肯署名尋被逮舟過安慶投江死指揮張安被執道亾隠于樂清以樵為業人莫知其姓氏自山採樵歸聞京師陷卓侍郎被殺呼天號哭曰國既就簒我不願為其民遂棄柴投水死工部侍郎張安國當燕兵偪京師與妻賈氏曰大事去矣無能為也余職非司馬既不能率師應敵又不能屈膝事人奈何賈氏曰盍隠諸安國曰然乃與其妻乘舟入太湖忽聞人説京師陷皇帝自焚安國大慟與妻曰食人之祿而存身於新主之世耻莫大焉乃鑿其舟以沈知府葉仲惠以修髙帝實錄指斥燕師為逆黨論死籍其家刑部主事徐子權聞練子寜死慟哭賦詩有翹首謝京國飛魂返故鄉之句自經死神䇿衞經歴周璿建文時言事擢僉都御史遜國後逮至京不屈死妻王氏子蠻兒繫獄御史謝昇建文時給兵餉有功後不屈死父旺子咬住戍金齒妻韓氏四女發教坊司松江同知周繼瑜募戰勇入援文皇即位械至京不屈磔於市徽州府知府陳彦囬奉命募義勇至京師赴援被擒不屈而死妻屠氏為奴給事中張彦方改樂平知縣勤王詔下彦方糾義起兵一邑響應或阻之彦方大哭曰君父在水火吾可自緩乎遂率所部抵江口遇燕游兵執至樂平梟其首暴屍譙樓時暑月經旬顔靣如生無一蠅集父老竊葬縣治之清白堂後東平吏目鄭華亦不食死東湖樵夫不知何許人樵浙東臨海東湖上日負柴入市口不二價建文壬午秋詔至臨海湖上人相率縣庭聽詔或歸語樵夫曰新皇帝登極樵夫愕然曰皇帝安在答曰燒宫自焚樵夫大哭遂投湖中死谷應泰曰聞之川澤納汙瑾瑜匿瑕王者之大度也以故什方舊怨漢帝首封射鉤小嫌齊侯不問况吠尭者主未必桀而詈我者節重於許乎若乃文皇之正位金陵也宜發哀痛之言為謝過之舉其能從我游者固且厚糈以寵范陽尊官以禮魏徴矣若或天命雖改執志彌堅亦復放還山林聽其自適逄萌之掛冠東都伯况之杜門廣武狂奴故態何相迫乎而文皇甫入清宫即加羅織始而募懸賞格繼且窮治黨與一士秉貞則袒免並及一人厲操則里落為墟雖温舒之同時五族張儉之禍及萬家不足比也乃若受戮之最慘者方孝孺之黨坐死者八百七十人鄒瑾之案誅戮者四百四十人練子寜之獄棄市者一百五十人陳廸之黨杖戍者一百八十人司中之繫姻婭從死者八十餘人胡閏之獄全家抄提者二百十七人董鏞之逮姻族死戍者二百三十人以及卓敬黄觀齊泰黄子澄魏冕王度盧元質之徒多者三族少者一族也又若赴義之最烈者鐵鉉之屍還反背景清之死猶犯駕就義之最潔者教授之明倫慟哭樵夫之自投東湖若此之儔則又未易更僕數也嗟乎暴秦之法罪止三族强漢之律不過五宗故歩闡之門皆盡機雲之種無遺世謂天道好還而人命至重遂可滅絶至此乎又况孔融覆巢之女郭淮從坐之妻古者但有刑誅從無玷染而或分𨽻教坊給配象奴潘氏承恩于織室才人下降于厮養此忠臣義士尤所為植髪衝冠椎胸而雪涕者也抑予聞之蕩隂之戰血惟嵇紹靖康之禍死僅侍郎而建文諸臣三千同周武之心五百盡田横之客蹈死如歸奮臂不顧者盖亦有所致此也方髙皇英武在上其養育者率多直節不事委蛇而文皇刑威劫人其搜捕者易于抵觸難于感化雖人心之不附亦相激而使然也至於宋朝忠厚不殺大僚孫皓凶殘恒加燒鋸臣以禮使士不可辱嗚呼成祖之作法涼矣明史紀事本末卷十八
