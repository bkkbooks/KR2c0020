body:
  text: 明史紀事本末卷六十九浙江提學僉事谷應泰編平奢安熹宗天啓元年九月四川永寧宣撫使奢崇明叛奢氏猓玀種也洪武中歸附命為宣撫司世守其土數傳至奢崇周無子奢崇明以族人得立崇明性陰鷙佯為恭順凡有徵調罔不應命人漸狎之子奢寅有逆志負韰倮招納亡命時以邊事急徵四方兵崇明遂上疏請提兵三萬赴援遣其將樊龍樊虎以兵至重慶四川巡撫徐可求㸃核汰其老弱發餉餉復弗繼龍等遂鼓衆反龍走馬舞槊直刺可求可求死遂一擁而上道臣孫好古駱日升李繼周知府章文炳同知王世科熊嗣先推官王三宅知縣段髙選總兵黃守魁王守忠參將萬金王登爵等皆死之原任鞏昌同知董盡倫聞變帥衆入城殺賊遇伏死募兵科臣明時舉臺臣李達通判王天運俱負傷踰牆遁時土兵數千列江岸城內炮震城外應之賊遂據重慶分兵一扼夔州水口一踞綦江遵義一踞瀘州一截川西棧道全蜀震動奢崇明陷遵義時遵義道臣李仙品參將萬金督兵援遼俱赴重慶城中守備空虛奢崇明同其子寅帥衆奄至遵義署府通判袁任先期委城遁賊乘勢焚劫納溪瀘州江安等城興文永川長寧榮昌隆昌壁山皆空賊攻合州江津知州翁登彥知縣周禮嘉悉力捍禦破走之陷興文知縣張振德不屈率妻子赴火死石砫宣撫司掌印女官秦良玉勤王秦氏世為宣撫司良玉兄秦邦屏邦翰援遼力戰死弟秦民屏重傷突圍出得歸時藺賊厚遺秦氏求其助良玉斬使留銀率所部精兵萬餘同弟民屏姪秦翼明等捲甲疾趨潛度重慶營于南坪關扼賊歸路遣兵夜襲兩河燒其船以阻賊泛舟東下自率大兵沿江而上水陸並進又留兵一千多張旗幟護守忠州等地方以為犄角之勢移文夔州設兵防瞿塘為上下聲援十月賊逼成都時瀘叙諸郡邑瓦解柙木龍泉諸隘口俱失賊乘勢向成都指揮冉世洪雷安世瞿英周邦太張愷帥衆拒之邦太先至資陽遇賊不戰降冉世洪等至九泉賊駐兵山上據髙臨下衆寡不敵我兵陷陳世洪安世英俱死之張愷走免賊兵進薄城下懸旌僭號四面夾攻城內僅有鎮逺營七百人調到松潘茂州龍安兵一千五百餘人御史薛敷政左布政使朱燮元登陴而守初燮元方以輯瑞就道蜀王出國門與百姓遮留之燮元慷慨自誓賊薄城燮元使土司坤汝常乘賊指揮常恭等火炮助之賊稍卻斬賊先鋒一人次日賊數千人障革裹竹牌進矢石不得近燮元命架七星炮火箭火磚衝擊之殺數百人至暮賊擁鉤梯數千攀城欲上燮元戒士卒第放炮礌石亡譁遲明賊積尸陵城下時冬濠水涸賊帥降民持篾束薪載濠土壘如山上架蓬蓽形類行屋以避銃石伏弩仰射城中垂簾蔽矢石燮元夜縋壯士持芻塗膏殺守者縱火火舉山隤賊大阻燮元又遣人決都江堰水至濠濠滿賊乃治橋得少息因緝獲城中與賊通者二百人懸其首陴上賊又于城四面立望樓髙與城等燮元曰賊設瞭望必四出剽掠其中虛遂命死士五百人突出擊之賊果無備斬其三將燒樓而還當是時諸道援兵相繼至十二月二十四日復安嶽縣二十八日復樂至縣與賊戰于倒流鎮石橋永清鋪俱有斬獲各路兵或轉戰得至城下或潰敗去秦良玉兵三千亦至然賊兵亦日益增無退意賊圍城八十餘日嵗且盡城中人伏臘不祭王正不賀賊城外日發諸人塜墓城上望見皆泣㑹有俘民脫歸者言賊旦夕須旱船一決勝負二年春正月賊數千自林中大噪而出視之有物如舟髙丈許長五百尺樓數重簟茀左右板如平地一人披髮仗劒上載羽旗中數百人各挾機弩毒矢牛數百頭運石轂行旁翼兩雲樓如左右廣俯視城中老幼婦女皆哭燮元曰此吕公車也破之非駁石不可駁石者巨木為杆柱置軸柱間轉索運杆千鈞之石飛擊如彈丸賊舟不得近燮元復募敢死士以大炮擊牛中其當軛者牛駴返走乘勢縱擊敗之然城中亦力竭矣禆將劉養鯤言有諸生范祖文鄒尉陷賊中遣孔之談來約賊將羅乾象欲自拔效用燮元即遣之談復往至則與乾象俱來燮元方卧戍樓呼與飲乾象衷甲佩刀燮元不之疑就榻呼同卧酣寢達旦乾象感激誓以死報許之縋而出後賊營舉動纎悉無不知者乾象之力也踰數日又使牙將周斯盛詐降質其來設伏待之崇明果自至甫懸一人上松潘守兵不知大噪崇明走伏起獲其從騎數人崇明跳身免乃謀逺遁燮元偵知造水牌數百面投錦江順流而下令有司沉舟斬筏斷橋梁嚴兵以待賊夜半果逸乾象等內變賊營四面火起崇明父子拔營走乾象等皆來歸成都圍凡百有二日而解賊渡瀘歸重慶事聞以燮元為巡撫三月羅乾象復江安四月官兵復新都初奢賊據新都繕城積粟為守計因克安嶽攻保寧聲言直取潼關人心震動安綿副使劉芬謙湖廣監軍楊述程合兵攻之兵至牛頭鎮賊以騎數千步萬人來援秦良玉談大孝等夾擊敗之遂復新都賊退入蘭州復遵義府時有湄潭叛民王倫引賊焚掠湄潭為川貴險要都司陳一龍追至水西境降之諸軍進駐遵義時惟重慶尚為賊巢五月諸軍進逼崇慶初奢崇明父子據瀘汭倚樊龍為聲援龍盤踞重慶已九閲月重慶古渝州地也三面臨江春水泛漲一望瀰漫不可渡其出入必經之要道惟佛圖關至二郎關一路賊自通逺門城濠至二郎關連營十有七宿精兵數萬監軍副使丘志充楊述程總兵杜文煥帥兵進攻之再戰幾入其壘翌日文煥帥參將楊克順等直抵賊營石砫宣撫官秦民屏率部兵繞出其後賊驚敗遂連復佛圖二郎二關殺賊三千餘人積尸深溝兩岸俱平乘勝進逼重慶二十七日以計擒賊首樊龍張彤何若海等三十一人遂克之六月川師復瀘州七月遵義復陷貴州水西土目安邦彥叛邦彥安堯臣别枝也安堯臣冒隴姓并隴地受撫得襲兄彊臣世職堯臣死妻奢社輝子安位幼邦彥挾之反時四十八馬頭與頭目安邦俊魯連安若山陳其愚陳萬典等蜂起和之都司楊明廷以三千人敗沒于畢節參將尹啓易等自烏撒奔回霑益炎方松林皆不守平彞衛亦為賊黨李賢所破賊圍普安安南雲南都司李天常帥兵四千救之賊將羅應奎僞降誘至疊水鋪伏發全軍皆沒於是交水曲靖武定尋甸嵩明之間騷然苦兵矣賊分遣王倫石勝俸下甕安襲偏沅以斷我軍倫等楊應龍餘孽也洪邊土司宋萬化糾苗仲九股據龍里邦彥自統蜀賊苗仲數萬進圍貴州自二月初九日薄城下造雲梯製滚廂築墩臺百計攻城撫臣李橒按臣史永安悉力禦之賊沿山營四面伏路把截以斷城中出入盡掘環城墳墓殺掠甚慘置木柵壘户牆鳥雀不能飛渡鎮將張彥芳將兵二萬赴援隔龍里不得進貴州總兵楊愈懋推官郭象儀與賊戰于江門白杵營死之安邦彥破烏撒衛指揮管良相死之先是水西未叛良相與李橒曰奢氏反安必繼之黔中無兵餉猝然有變計將安出宜招兵萬人積二年榖用許成名將之以觀其變橒以力不能止後良相以祖母病乞假去泣而曰烏撒孤城且與安效良相仇水西有難禍必首及良相隻身無子願以死報國乞圖長䇿保此一方橒亦泣良相去甫一月而難起烏撒首被賊破良相自縊死巡撫都御史王三善進兵平越時平越所陳兵止萬餘人副總兵徐時逢參將范仲仁不相能仲仁先進遇賊于瓮城河戰不利時逢擁兵不救遂大敗諸將馬一龍白自强等殱焉各處聲援俱絶貴陽圍益困城東隅有山岡與城齊賊踞其上作廂樓官兵設計燒之火三晝夜不絶城中糧久乏將士病不能戰巡按史永安上疏詆王三善大聲疾呼十一月三善大㑹將士議曰省城不能待矣外援不至吾輩死法死敵等死耳尚何俟耶命道臣何天麟督兵七千從清水江進為右部道臣楊世賞督兵萬人從都勻進為左部三善自將二萬與道臣向日升從中路進當賊鋒十二月抵新添銜枚疾走二日進母猪洞三日次新安是夜賊報至營中驚擾議退兵三善曰退即虀粉以死捍之按兵不動卒無賊四日命劉超為前部抵龍頭營三善以身尾之相去不二里聞銃聲衆股栗欲止三善曰前驅當賊必無退者吾當為後徑遂策馬而前未一里劉超捷音至超兵遇先却超下馬斬二人持刀斷賊一標賊首阿成驍勇善戰超與部兵張良俊直前斬其首賊遂披靡適大兵至大呼齊進奪龍里賊衆復大集大戰却之五日住龍里城衆議去省㑹不逺賊必重兵堵截宜少休息三善曰我兵猝至賊無備不能持久急擊之勿失六日遂策馬先進衆隨之賊覘者亦知新撫自將意有數十萬兵至相顧駭愕安邦彥紿其衆曰吾當增兵來助遂遁去賊相率退屯龍洞我師奪髙寨七里沖乘勝進兵畢節鋪賊步騎如雲孫元謨將所製木發貢七門齊發賊死無算楊明楷率烏羅兵如牆而進賊大敗其渠安邦俊被銃死棄輜重器械山積遂乘勝抵㑹城撫臣李橒按臣史永安學臣劉𤣥錫死守者幾十月旦夕城且陷忽見賊兵奔潰如蟻喊聲雷震俄頃五騎衝鋒至城下云新撫至矣軍民大悅慶更生是時三善同將卒披氊單騎冒矢石以二萬人破賊十萬橒等迎入城三善曰賊兵不逺軍心未定我大帥也不可即安遂營于南門外坡上大雪次日移營宅溪賊聞逺遁陸廣河外三善遣使諭奢社輝母子縛安邦彥降不報越數日左右兩部兵至又十日而楚粵蜀之兵亦至三善怒其後期且憂乏食欲謝遣之將校皆曰數千里赴援不可却也三善念衆多倉儲空虛欲因糧于敵又諸軍視賊過易十二月三十日前鋒楊明楷率兵渡河札營三十里外一軍屯陸廣向大方奢社輝一屯鴨池向安邦彥巢穴三年春正月賊復糾藺賊與雲南安效良等帥衆數萬并力攻陸廣楊明楷奮勇接戰䝉兵先潰衆遂亂溺水死者數千明楷陷賊中賊乘勝赴鴨池我兵退屯威清三善收兵入城土司苗仲見我軍不利復肆劫掠自龍里至瓮城尸橫四十餘里夏四月川師復遵義時賊首尤朝柄楊維新鄭應顯據遵義副將秦衍祚侯良柱督兵二千攻之誘戰于九接灘以銃斃其渠􅝘賽復追敗賊于南城外羅鋼渡遂克之賊安鑾帥妻子部衆降安鑾為奢寅右臂監軍道趙邦清密遣賊黨了相喻文富招之鑾心動顧以妾石氏子安在嵩在符國禎營未敢發十四日官兵抵羅付大河口擊奢寅敗之鑾見寅敗乃密約副總兵侯良柱助兵挾取妻子良柱分遣羅安良進陶公灘以牽賊自帥親兵七百人同鑾部兵夜經三寨抵賊巢銃炮震天賊倉卒不知我兵多少符國禎先走鑾率妻子及部兵數千自拔來歸川師復永寧先是川撫朱燮元㑹衆議曰我之久不得志于賊者我以分賊以合也於是列營納溪陽為進取而陰令大兵㑹長寧首攻麻唐坎觀音菴青山崖天蓬洞等處乘霧奪險而入與石砫兵㑹進攻永寧遇賊于土地坎奢寅親率兵搏戰我兵奮勇擊敗之追至老君營涼傘鋪盡燒賊營寅身被二鎗樊虎亦創死復敗賊于橫山八甲青岡坪等處直抵城下一鼓拔之生擒周邦泰等降賊二萬踰城溺水死者無計奢崇明父子列營江岸上官兵隔水而壘降者日至賊復遁安邦彥知我兵潰扇誘苗仲糾合逆黨宋萬化等復欲犯貴州使其黨何中尉據龍里李阿二督四十八莊兵圍青巖斷我糧道宋萬化督洪邊兵苗仲為左翼吳楚漢結八姑蕩平八莊苗仲為右翼自統水西兵約共犯㑹城王三善遣遊擊祁繼祖統盧吉兆左世選兵下龍里一鼓破蓮花堡連燒上中下三牌賊寨百五十處何中尉敗逃深箐龍里路通遣參將王建中劉志敏宋迪屈朝先等救青巖斬首三百餘級王元佐等兵繼進焚賊寨四十八莊李阿二中神鎗逃歸水西定畨路通諜報賊方糾八姑蕩洪邊二路兵進犯㑹城三善夜遣王建中祁繼祖等兵一萬五千進勦八姑蕩焚生寨二百餘處斬首五百級窮追渡河溺死者無算焚其積聚數萬賊糧絶謀遂寢宋萬化遣人詐降覘動靜三善佯許之而調監軍楊世賞督劉志敏祁繼祖等捲甲赴之賊倉皇出戰遂被擒并其妻子及僞軍師劉洪祖等萬化驍勇善戰邦彥倚之至是奪氣四路既通秦民屏兵至平越復還守龍里諸苗叛者相繼降三善給黃旗使各竪寨中邦彥望見之不敢復出但于鴨池陸廣諸要路掘坑塹修補水西屯兵為自守計五月川兵發永寧進追奢崇明連克紅崖天台二寨賊數千人迎降遂安撫紅潦四十八寨時總兵盧世卿禽僞御史汪澤逺僞參謀文道南副將秦翼明禽僞監軍夏奇雲僞給事中孔聞過等并僞印十餘鎧仗如山又獲安兵田進忠云奢賊計窮將美女黃金降水西借兵安邦彥遣兵十六七營已過河到獅子山目把曾仲英領兵六營尚駐赤水河謀分兵一由鎮雄兵三營乘永寧之後一由普安入新寨攻永寧之前十三日羅乾象督兵破藺州焚其九鳯樓掃其巢奢賊狼狽走雲南六佐縣營長安應龍合霑益賊首補鮓為亂圍羅平巡撫閔洪學攻羅平克之移兵覆其巢俘其妻子應龍逃普安復入烏撒已安效良乞降責其縛補鮓應龍以誘之效良縛應龍以獻水西藺賊合兵窺遵永時藺賊奢崇明奢寅戰屢敗窮蹙投水西安邦彥復助兵合謀一窺遵義一窺永寧官兵合長納兩路敗之於芝麻塘賊遁入青山六月貴州總兵魯欽等三路進兵直入賊巢擒土司何中尉等進營紅崖紅崖者天台水腳婁石牛酸草等七囤素稱天險官兵未有至者總兵張彥芳擊賊于羊耳亦敗之追至鴨池河奪其戰象斬首二百七十餘七月大兵戰勝深入大埧洪紅鳥岡賊所借鳥藝等部苗望風奔潰三善按轡直入大方降者千計救出田景猷劉志敏楊明楷等奢社輝安位焚大方老巢竄火灼堡安邦彥逃入織金川兵入龍場陳獲奢崇明妻安氏及奢崇輝蔡金貴李廷王承恩張尚極等安位母子遣漢把劉光祚赴鎮逺乞降總督楊述中許之授賊黨袁紹等狀令擒奢寅父子自贖遣之回巢紹等至省羈留未發而撫按㑹議亦勒限安位母子縛解安邦彥奢寅然後請㫖治罪大抵三善以元凶未窮當用勦為撫而述中一意主撫議遂不合三善駐大方日久邦彥日夜聚兵自益令其黨陳其愚詐降其愚者目把中大猾也三善輕信之多與參贊軍務由是邦彥纎悉盡知四年春正月王三善自大方還貴州陳其愚相繼隨行忽傳其愚山後遇賊三善勒馬回視其愚故縱轡衝三善墮地三善知有變將帥印付家人囑令護持先去即抽襪中小刀自刎頸皮已破其愚下馬奪其刀玀鬼諸苗蜂擁而至三善罵賊不屈賊割其首去副將秦民屏亦死之秦佐明祚明突圍出賊勢復張事聞總督楊述中回籍聽勘既而監軍御史傳宗龍獲陳其愚誅之其愚狡凶多計數邦彥倚為耳目至是伏誅秋七月總理魯欽劉超克巖頭寨破平茶乘勝深入至織金敗績五年春雲南巡撫閔洪學復霑益水西藺烏霑三逆合兵數萬窺霑益敗走之四川烏撒土目安效良水西賊安邦彥肺腑之親也其順逆惟水西是視水藺相繼叛滇撫閔洪學以兵力不繼羈縻之令其擒賊自贖效良亦佯為恭順擒安應龍以獻而所遺獻功之人領文還中途被劫效良又見黔師出陸廣滇師入霑益隱然有撫背扼吭之勢水烏益成騎虎矣至是遂乘截黔之餘焰南向入滇合藺水烏霑安南諸部三十九營直抵霑益衆十倍于我副總兵袁善宣撫使沙源等督率將士奮勇血戰對壘城下者五日夜屢出奇兵破走之六年春水西苗老虎阿引等殺賊酋奢寅來降苗老虎隨侍奢寅有年著巴乃寅騎引馬卒李老松乃寅看茶卒與寅同居聶舌埧上寅妻在箐林山上相去二三里奢崇明居克仲埧相距三百餘里寅子阿甫年七嵗一女嫁芒部時水西約二月三路興兵一攻雲南一攻遵義奢寅專攻永寧寅素性凶淫附過彞人妻女有姿色者强奸之富于財者勒索其鏹不遂輒死以此部下多往鎮雄芒部逃生其麾下人阿引等故嘗受撫臣朱燮元金錢令圖寅與總兵李維新歃血密謀舉事寅微覺縳阿引拷掠之以利刃穿其左足一晝夜阿引至死不承乃釋之阿引因勾合苗老虎李明山等同謀適奢寅與其下痛飲酣歌登牀而寢老虎佯與寅蓋絮見寅睡方鼾持刀砍其胸寅大呼李明山復助砍身死腸出明山刀折僞總兵等闌入苗老虎走直往箐中擒寅妻妻已聞變逃矣賊黨追苗老虎等甚急至一碗水遇官兵乃降二月安邦彥率衆數萬渡江與我兵大戰數日總理魯欽力禦之抵暮賊兵益衆而我兵因數月無餉乘夜皆潰魯欽自剄死賊燒劫麻姑孫官堡苗仲復助逆貴州三十里之外樵蘇不行城中大震巡撫王瑊巡按傅宗龍先遣王國禎等攻河沙壩玀鬼盡俘之廣順定番青巖白納一帶苗蠻為之奪氣繼遣張雲鵬逆邦彥于趙官堡小戰二日大戰二日所殺傷者甚衆水內水外之賊奔走潰歸道路復通總督朱燮元以父喪歸加偏沅巡撫閔夢得總督從中調度控制五省夏黔兵攻勻哈長田一帶諸苗黔中四面苗仲而最狡悍者無如勻哈安邦彥初叛圍龍里新添皆籍其衆至是數出沒劫掠清平新添地方餉道為梗平越知府㑹同都司張雲鵬率兵攻擺沙大寨擺沙居寨之中距平越百餘里乘夜由間道掩襲破之賊遁入箐其中米積如山次日搜百里大山移營牛場箐保文鸞攻甕嶽等寨復攻都勻城西南仲賊八路㑹兵入箐各有斬獲復攻江時户西髙平養古數十寨斬首二千餘級掃蕩二百餘里七年秦參將楊明輝奉命宣諭安位令擒獻首惡為安邦彥所殺愍帝崇禎元年秋九月詔起朱燮元仍總督貴湖雲川廣五省軍務二年夏六月初大方東倚播北倚藺相為犄角後播藺既平賊惟恃烏撒為援而畢節為四裔交通處先是王三善由貴陽陸廣入大方陸廣至大方百七十里皆玀鬼巢窟前可衝我後可包我左右可衝擊我三善卒以失地利陷天啓間燮元建議滇兵出霑益遏安效良應援而别布天生橋尋甸等以絶其走蜀兵臨畢節扼其交通四裔之路而别出龍場巖後以奪其險黔兵由普定渡思臘河徑趨彥巢而陸廣鴨池搗其虛粵西出泗城分兵策應然後帥大軍由遵義鼓行而前尋以憂去未及用總督閔夢得繼之亦以貴州抵大方路險而賊惟恃畢節一路外通用兵宜從永寧始自永寧而普市而摩泥而赤水百五十里皆坦途赤水有城郭可憑而守宜結營于此漸進漸逼四十里為白巖六十里為層臺又六十里為畢節畢節至大方不及六十里賊必併力來禦須以重兵扼之斷其四走之路然後遵義貴陽尅期並進亦不果用至是燮元再涖黔乃激滇兵下烏撒蜀兵出永寧畢節扼各路要害而親帥大軍駐陸廣逼大方八月奢崇明號大梁王安邦彥號四裔大長老歹費小阿烏繼阿鮮怯等各號元帥悉力趨永寧先犯赤水諜知之燮元授意守將許成名佯北誘賊深入度賊已抵永寧分遣林兆鼎從三坌入王國禎從陸廣入劉養鯤從遵義入邦彥分兵四應力不支羅乾象復以奇兵繞出其背急擊之賊大驚潰崇明邦彥等皆被創漢兵斬其首獻燮元不欲窮兵乃移檄安位赦其罪許其歸附而位豎子不能自決其羣下復謀合潰兵拒我燮元乃大㑹諸將曰水西多山險叢箐篁蠻烟僰雨莫辨晝夜深入難出以此多敗當與諸君扼其要害四面迭攻漸次蕩除使賊乏糧將自斃於是焚䝉翳剔巖穴截溪流發徑卒馳騁百餘里或斬樵牧或焚積聚暮還歸屯賊益不能測凡百餘日所得首功萬餘級生口數萬每得嚮導輒發窖粟就食而賊饑甚劉養鯤遣其客入大方燒其宫室懸榜而出安位大恐乞降與約四事一貶爵一削水外六目之地歸朝廷一獻殺王巡撫者首一開畢節等驛路安位皆受命遂率土目納欵燮元為奏請詔許之乃條陳便宜九事不設郡縣置軍衛不易其俗土漢相安便一地益墾闢聚落日煩經界既正土目不得以民不耕地漸侵軼便二黔地瘠仰給于外今自食其土省轉輸之勞便三國用方匱出太府金幣勞諸將不足以爵酬之爵輕不若以地於國無損便四既許世其土各自立家經久逺永為折衝便五大小相維輕重相制無事易以安有事易以定便六訓農治兵耀武河上使賊日備我便七從兵民便願耕者給之且耕且戍衛所自實無勾軍之纍便八軍耕抵餉民耕輸糧以屯課耕不拘其籍以耕聚人不世其伍使各樂其業便九上可其奏九年朱燮元遣兵誅擺金兩江巴香狼壩火烘五洞叛苗悉平之水西勢益孤又通上下六衛并清平偏鎮四衛道路凡一千六百餘里設亭障置游徼以便往來滇中沐氏土舍普名聲亂燮元奉命移兵討平之名聲伏誅十年水西安位死無嗣族屬爭立朝議欲乘其弊郡縣之燮元上書諫乃止燮元遂傳檄土目諭以威德諸部爭納土獻重器燮元召將吏議以為衆建土司使其勢少力分則易制各欲保土地傳子孫則不敢為逆乃上奏曰臣按西南之境皆荒服也楊氏反播奢氏反藺安氏反水西而滇之定畨彈丸小州為長官司者十有七二三百年未聞有反者非他司好逆而定畨忠順也蓋地大者跋扈之資而勢弱者保世之策也今臣分水西之壤授諸渠長及有功漢人咸俾世守凡其俗虐政苛斂一切除之使參用漢法可為長久計制曰可西南遂底定焉谷應泰曰天啓中奢崇明以猓玀種據重慶安邦彥以水西酋反貴州蓋苗俗叛服不常乃其天性而兩家者又倚為唇齒時通姻婭所謂同功一體之人也乃謀亂之初則奢先而安繼窮追之日則奢敗而安亡覆轍相尋合若符契小醜墜宗于人何尤焉以豫觀奢崇明陰鷙有謀其子寅招納亡命一舉而全蜀震動剽鋭莫當宜非邦彥所敢望也然而邦彥之師尚堪持久而崇明之衆旋即挫衄又往往降于水西投于安部者則以安之地大而力盛也奢酋竊發止蜀道一隅而安酋轉戰西通巴𤏡南壓滇黔又合烏霑安南諸部落綿亘長驅動搖數省此之不戢真江楚之深憂也以故恢蕩之功亦以平安為首平奢次之平奢者秦良玉之夜襲兩河杜文煥之佛圖奪壘盧元卿之紅崖積仗其功不可泯也平安者王三善之奮斬十萬秦衍祚侯良柱之夜拔三寨張雲鵬之八路進兵許成名之三方深入其功更不可泯也乃崇明邦彥同時陳殱奢寅淫橫內自相圖既平五洞叛徭又開清平四衛新設亭障增置游徼者凡一千六百餘里雖漢之樓船十道西通冉駹其盛不能及也然其時發蹤指示出奇無窮多由于督臣朱燮元之方略論者以固守成都蕩滅羣妖招降安位為燮元功不世出而不知善後撫綏分裂其地使南人不復反者皆燮元之長算也善乎燮元之疏曰今分水西之壤授諸渠長及有功漢臣咸俾世守蓋地大者跋扈之資而勢弱者保世之策也昔主父偃令宗室得分王子弟而藩服益削則知衆建土司而少其力者其真馭逺之良規歟明史紀事本末卷六十九
