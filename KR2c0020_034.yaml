body:
  text: 明史紀事本末卷三十四浙江提學僉事谷應泰編河決之患英宗正綂十三年秋七月河決滎陽經曹濮衝張秋潰沙灣東堤奪濟汶入海尋東過開封城西南經陳留自亳入渦口又經䝉城至淮逺界入淮命工部尚書石璞治之弗就尋復以侍郎王永和代璞舊黄河在開封城北四十里洪武二十四年河決原武東經開封城北五里又南行至項城經潁州潁上縣東至夀州正陽鎮全入于淮而元㑹通河遂淤永樂九年尚書宋禮濬㑹通河開新河自汶上縣袁家口左徙二十里至夀張之沙灣接舊河九閲月而績成侍郎金純從汴城金龍口下達塌塢口經二洪南入淮漕事定為罷海運至是又決滎陽過開封城西南而城北之新河又淤自是汴城在河北矣隋唐以前河與淮分自入海宋中葉以後河合于淮以趨海然前代河決不過壞民田廬至明則妨漕矣故視古尤急十四年春三月工部右侍郎王永和奏治河事宜先是沙灣之役永和以冬寒遽停工又以決自河南敕彼共事上切責之至是言黒陽山西灣已通水従泰通寺資運河東昌則置分水閘設三空泄水入大清河歸於海八栁樹工猶未可用沙灣堤宜時啟分水二空㵼上流庶可亡後患従之景帝景泰三年春二月河決沙隄灣命左都御史王文巡視河道四年冬十月以左諭徳徐有貞為右僉都御史遣治張秋決河先是河溢滎陽自開封城北經曹濮以入運河至兖州沙灣之東隄大洪口而決濟汶諸水皆從之入海㑹通河遂淤漕運艱阻工部尚書石璞侍郎王永和都御史王文相繼治之凡七年皆績弗成乃集廷臣議于文淵閣舉可治水者以有貞名上乃進有貞都察院右僉都御史治之河以決故涸而有貞至方冬月水暴漲公私之艘畢達治河卒踰數萬人悉與之期而遣之乃乗輕航究河源遂踰濟汶至衛沚循大河道濮范還上疏曰臣聞平水土要在知天時地利人事而已葢河自雍而豫出險之平水勢既肆又由豫而兖土益疎水益肆沙灣之東所謂大洪口者適當其衝于是決而奪濟汶入海之路以去諸水從之而洩隄潰渠淤澇則溢旱則涸此漕途所由阻然欲驟湮則潰者益潰淤者益淤今請先疏上流水勢平乃治決決止乃濬淤多為之方以時節宣俾無溢涸必如是而後有成上從之七年夏四月僉都御史徐有貞治河功成先是有貞疏上既報可乃鳩工而前所遣卒亦依期至乃為渠以疏之中置閘以節宣之渠起金隄張秋之首西南行九里至濮陽濼又九里至博陵坡又六里至夀張沙河又八里至東西影塘又十有五里至白嶺灣又三里至李􅕞由李􅕞而上又二十里至蓮花池又三十里至大瀦潭乃踰范暨濮又上而西凡數百里經澶淵以接河沁有貞曰河沁之水過則害微則利乃節其過而導其微用平水勢既成渠名廣濟閘名通源渠有分合而閘有上平凡河流之旁出而不順者則堰之堰有九長各萬丈九堰既設水遂不東衝沙灣而更北出濟漕渠阿西鄄東曹南鄆北出沮洳而資灌溉者為田百數十萬頃凡堰楗以水門繚以虹隄堰之崇三十餘尺其厚什之長百之門之廣三十六丈厚倍之隄之厚如門崇如堰長倍之架濤截流柵木絡竹實之石而鍵以鐵葢合五行用平水性而導汶泗之源出諸山滙澶濮之流納諸澤又濬漕渠由沙灣北至臨清凡二百四十里南至濟寧凡三百一十里復建閘于東昌之龍灣魏灣者八積水過丈則開而洩之皆道古河以入于海用平水道初議者欲棄渠勿治而由河沁及海以漕又欲出京軍疏河有貞因奏蠲瀕河民馬牧庸役専力河防以省軍費紓民力工部請如有貞言不中制以是得有功葢三年而告成是役也聚而間役者四萬五千人分而常役者萬三千人用木大小十萬竹倍之鐵斤十有二萬錠三千絙八百釡二千八百麻百萬觔荆倍之藁秸又倍之而用石若土不可筭然用糧于官僅五萬石功成進副都御史初有貞方鳩功有言沮者上使中使問之有貞示以二壺一壺之竅一一壺之竅五注水二壺五竅先涸中使還報上上惟有貞之所為有貞常欲築一決口下木石則若無者心怪之聞僧居山中有道有貞往卟焉僧無所答徐曰聖人無欲有貞沈思竟日悟曰僧言龍有欲也此其下有龍穴吾聞之龍惜珠吾有以制之矣鐵能融珠乃鎔鐵數萬金沸而下之龍一夕徙而決口塞孝宗𢎞治二年夏五月河決開封入淮復決黄陵岡入海三年夏四月河決原武命户部左侍郎白昂往治之河決支流為三其一決封丘金龍口漫于祥符長垣下曹濮衝張秋長堤一出中牟下尉氏一汜溢于蘭陽儀封考城歸徳以至于宿瀰漫四出不由故道禾盡沒民溺死者衆議者奏遷河南藩省以避其害左布政使徐恪力陳不可乃止命昂往治之昂舉南京兵部郎中婁性協治乃築陽武長堤以防張秋引中牟之決以入淮浚宿州古睢河以達泗自小河西抵歸徳飲馬池中徑符離橋而南皆浚而深廣之又疏月河十餘以殺其勢塞決口三十六由河入汴汴入睢睢入泗泗入淮以達于海水患稍息昂又以河南入淮非正道恐不能容乃復自魚臺歴徳州至吳橋修古河隄又自東平北至興濟鑿小河十二道引水入大清河及古黄河以入海河口各作石堰相水盈縮以時啓閉葢東北分治而東南主疏云五年秋七月張秋河決命工部侍郎陳政督治之時河溢沛梁之東蘭陽鄆城諸縣皆被其患復決楊家金龍等口東注潰黄陵岡下張秋隄入漕河與汶水合而北行張秋隄乃遣政往政尋卒六年春正月命浙江左布政司劉大夏為右僉都御史督治張秋決河七年春二月河復決張秋命平江伯陳鋭太監李興協同都御史劉大夏督治之先是大夏既受命循河上下千餘里相度形勢乃集山東河南二省守臣議之上言河流湍悍張秋乃下流襟喉未可輒治治于上流分道南行復築長隄以禦横波且防大名山東之患候其循軌而後決河可塞也疏上報可工方興而張秋東隄復決九十餘丈奪運河水盡東流由東阿舊鹽河以入于海決口濶至九十餘丈訛言沸騰謂河不可治宜復元海運或謂陸輓雖勞無虞乃復命銳等協治之河南巡撫都御史徐恪上言臣按地志黄河舊在汴城北四十里東經虞城下達濟寧洪武二十四年決武原縣黒洋山東經汴城北五里又南至項城入淮而故道遂淤正統十三年決于張秋之沙灣東流入海又決滎澤縣東經汴城歴睢陽自亳入淮景泰七年始塞沙灣之決而張秋運道復完以後河勢南趨而汴城之新河又淤𢎞治二年以來漸徙而北又決金龍口諸處直趨張秋横衝㑹通河長奔入海而汴南之新河又淤百餘年間遷徙數四千里之内散逸瀰漫乃者上厪聖衷特命都御史劉大夏經理而伏流横溢功力未竟議者以黄陵岡之塞口不合張秋之䕶隄復壞遂謂河不可治至有為海運之說者得毋以噎而廢食哉夫黄陵岡口不可塞者非終不可塞也顧以修築隄防之功多疏濬分殺之功少故湍悍之勢不可遽囬今自滎澤縣孫家渡口舊河東經朱仙鎮下至項城縣南頓猶有涓涓之流計其淤淺僅二百餘年若疏而濬之使之由泗入淮以殺上流之勢又以黄陵岡賈魯舊河南經曹縣梁進口下通歸徳丁家道口且可以分水勢今梁進口以南則滔滔無阻以北則淤塞將平計其功力之施僅八十餘里若疏而濬之使之由徐入淮以殺下流之勢水勢既殺則決口可塞運道可完毋求近功毋惜小費毋以小僨敗輒阻幸而成功則萬世之利也命下部議行之山東按察司副使楊茂仁上言官多則民擾治河既委劉大夏又命李興陳鋭事權分而財力匱且水隂也其應為宫闈為四彛宜戒飭后戚防禦邊患疏上興等切齒之誣茂仁為妖言逮繋獄科道交章論救乃謫同知茂仁守陳子也夏四月塞張秋隄更名安平鎮先是劉大夏發民丁數萬於上流西岸鑿月河三里許屬之舊河使漕通不與河爭道乃浚孫家渡口别開新河一道導水南行由中牟至潁州東入于淮又浚祥符四府營縣淤河由陳留至歸徳分為二道一由宿遷小河口一由亳州渦河㑹于淮又于黄陵岡南浚賈魯舊河四十里由曹縣出徐州支流既分水勢漸殺乃築西長隄起河南胙城經滑長垣東明曹單諸縣盡徐州長三百六十里五旬而事竣費輕功重逾于徐有貞云璽書褒賞入為户部右侍郎始河自清河隙入淮大夏治之自宿遷小河入淮則北三百里矣已又北三百里至徐州小浮橋入淮九月加山東㕘政張縉秩為通政使代劉大夏理河道初大夏治決河委縉調度及成功遂陞為通政司右通政時衝決之餘溝防不治縉相其緩急以漸修濬無所遺又于決口之東砌石岸數里以固舊防又新築南旺東隄樹柳其上每嵗夏秋水溢挽卒得分行無阻至今便之武宗正徳四年河決曹單趨沛出飛雲橋命工部侍郎崔巖往治巖發丁夫四萬餘人塞垂成漲潰代以右侍郎李鏜四月弗成盜起而罷七年秋九月以右都御史劉愷總理河道愷築大隄起魏家灣亘八十餘里至雙堌集都御史趙璜又隄三十里續之曹單以寧世宗嘉靖七年春正月鑿新漕不成先是河決曹單城武陽家口梁靖口吳士舉莊衝雞鳴臺沛北皆為巨浸東溢逾漕入昭陽湖沙泥聚壅運道大阻刑部尚書胡世寧上言運道之塞河流致之也請先述治河之説河自經汴以來南分二道其一出滎澤經中牟陳頴至夀州入淮其一出祥符經陳留睢亳至懐逺入淮其東南一道自歸徳宿虹出宿遷其北分新舊五道一自長垣曹鄆出陽糓一自曹州雙河口出魚臺塌塲一自儀封出徐州小浮橋一出沛縣飛雲橋一出徐沛之間境山之北溜溝此六者皆入漕渠而南滙于淮而今且湮塞矣止存沛縣一河勢合岸狹不得不溢所以豐沛徐州漫為巨浸溢入沛北之昭陽以致運道壅淤然壅淤既乆勢必復決決而東南有山限隔其禍小決而東北前宋澶州之決郡縣數十皆灌禍不可言矣故今治河當因故道而分其勢也其陽穀魚臺二道勢近東北不可復開而汴西滎澤孫家渡至夀州一道決宜常濬以分上流之勢自汴東南原出懐逺宿遷小浮橋溜溝四道宜擇其便利者開濬一道以分下流之勢或恐豐沛漫流乆而北徙欲修城武以南廢隄至于沛縣之北廟道口以塞新決而防其北流此亦一計也至于運道臣與李承勛同行擬議莫若于昭陽湖左滕沛魚臺之中地名獨山新安社諸處别開一河南接留城北接沙口濶五六丈以通二舟之交來冬氷結船止更加濬濶以為運道此其上䇿也至是河道都御史盛應期上言宜于昭陽湖左别開新渠北起姜家口南至留城一百四十餘里以通漕舟其說與世寧合工部尚書童瑞覆議從之乃集民夫萬人分標開鑿已而其地居河上流土皆沙淤功弗就應期日夜止宿水次益卒數萬治之百姓滋怨言者謂糜財用勞民力功必不可成上怒奪應期官歸田里而新渠之議寢焉以侍郎潘希曽往代踰年豐沛單三縣隄成十三年初飛雲橋之水北徙魚臺穀亭舟行閘面豐沛以北稍逺水患乆之復決趙皮寨穀亭流絶而廟道口復淤議者欲引沁鑿衛置敖倉衛輝由渦經汴達陽武陸輓之始由衛北運言人人殊時治河者工部侍即劉天和専修復故道未幾河忽自夏邑太丘等集衝數隙轉東北流經蕭縣出小浮橋下濟二洪趙皮寨尋塞葢河勢南徙十九年河決㫿州野鷄岡經渦入淮二洪大涸上命兵部左侍郎王以旂督理以旂役丁夫七萬開李景髙支河一道引水出徐濟洪八月而成糧運無阻上恱加以旂秩尋復淤是時河益南徙頗便漕然五河䝉城臨淮諸州邑鳯泗之北祖陵在焉議者以為憂三十一年秋八月河決房村至曲頭集凡決四處淤四十餘里都御史曽鈞役丁夫五萬六千有竒濬之三閱月而成三十七年河北徙新集淤而為陸二百五十餘里視故道髙三丈有奇河分流弱離為十一河南山東徐邳皆苦之四十四年秋七月河盡北徙決沛之飛雲橋横截逆流東行踰漕入昭陽湖泛濫而東平地水丈餘散漫徐促沙河至二洪浩𣺌無際而河變極矣初漕渠左視昭暘湖其地沮洳去河不數十里識者危之嘉靖初盛應期督漕議鑿渠湖左以避河患朝廷從之鳩工未半為異議所阻至是漕湮以吏部侍郎朱衡出督濬鑿衡與僉都御史潘季馴尋應期所開故道以為運道之利無逾于此疏請鑿之開新河自南陽達留城百四十一里濬舊河自留城達境五十三里役丁夫九萬餘人八閲月而成而水始南趨秦溝穆宗隆慶元年春正月開廣秦溝以通運道先是河決沛縣議者請復故道乃議新集郭貫樓諸處上源尚書朱衡言古之治河惟欲避害今之治河兼欲資利河流出境山之北則閘河淤出徐州之南則二洪涸惟出自境山至徐州小浮橋四十餘里間乃兩利而無害自黄河横流碣山郭貫樓支河皆已淤塞改從華山分為南北二支南出秦溝正在境山以南五里許此誠運河之利也惟北出沛西及飛雲橋逆上魚臺為患甚大陛下不忍沛魚之民横罹昏墊欲開故道臣考之地形㕘之輿論其不可者有五自新集至兩河口背平原髙阜無尺寸故道可因郭貫樓至龍溝一帶頗有河形又係新淤無可駐足其不可一也河流由新集則商虞夏邑受之由郭貫樓則蕭碭受之今改復故道則魚沛之禍復移蕭碭其不可二也黄河西注華山勢若建瓴欲從中鑿渠挽水南向必當築壩為力甚難其不可三也曠日持乆役夫三十萬騷動三省其不可四也工費數百萬司農告匱其不可五也臣以為上源之議可罷惟廣開秦溝使下流通行修築長堤以防奔潰上從之乃鑿舊渠深廣之引鮎魚諸泉薛沙諸河其中注灞三河口疏舊河築馬家橋隄道之出飛雲橋者使盡入秦溝自留至赤龍潭又五十三里凡為閘八減水閘二十為壩十有二隄三萬五千二百八十丈石隄三十里已而鑿王家口𨗳薛河入赤山湖鑿黄浦導沙河入獨山湖凡為支河八旱則資以濟漕潦則洩之昭𤾉湖運道盡通是名夏鎮河工成加衡太子少保于是河専由秦溝入洪而河南北諸支河悉并流秦溝三年秋七月河水溢自清河抵淮安城西淤者三十餘里決方信二壩出海平地水深丈餘寳應湖隄崩壞山東莒郯諸處水溢從沂河直河入邳州人民溺焉四年秋九月河決邳州自睢寧白浪淺至宿遷小河口淤百八十里溺死漕卒千人失米二十餘萬石總督河道侍郎翁大立言邇来黄河之患不在河南山東豐沛而専在徐邳故欲先開泇河以逺河勢開蕭縣河以殺河流者正謂浮沙壅聚河面増髙為異日慮耳今秋水洊至横溢為災臣以為權宜之計在棄故道而就新衝經乆之䇿在開泇河以避洪水疏下部五年河決雙溝先是河漲徐州上下茶城至吕梁兩厓東山不得下又不得決至是乃自雙溝而下北決油房曹家青羊諸口南決闗家曲頭集馬家淺閻家張擺渡王家房家白糧淺諸口凡十一支流既散幹流遂微乃淤自匙頭灣八十里而河變又極矣趙孔昭翁大立前後治之無功議者欲棄幹河而行舟于曲頭集大枝間冬初水落則幹已平沙而枝復阻淺又議棄黄河運而膠河泇河海運紛沓莫可歸一于是即家起都御史潘季馴治之季馴之治水惟求復故道而已乃上言老河故道自新集歴趙家圏出小浮橋安流無患後因河南水患别開一道出小河口本河漸被沙淺嘉靖間河北徙故道遂成陸地臣奉命由夏鎮歴豐沛至崔家口由崔家口歴河南歸徳虞城夏邑商丘諸縣至新集則見黄河大勢已直趨潘家口矣父老言去此十餘里自丁家道口以下二百二十里舊河形迹見在可開臣即自潘家口歴丁家道口馬牧集韓家道口司家道口牛黄堌趙家圏至蕭縣一帶皆有河形中間淤平者四分之一河底皆滂沙見水即可衝刷臣以為莫若修而復之河之復其利有五從潘家口出小浮橋則新集迤東河道俱為平陸曹單豐沛永無昏墊一利也河身深廣毎嵗免泛溢之患虞夏豐沛得以安居二利也河從南行去㑹通河甚逺閘渠無虞三利也來流既深建瓴之勢導滌自易則徐州以下河身亦因而深刷四利也小浮橋來流既逺則秦溝可免復衝而茶城永無淤塞之患五利也既報可乃役丁夫五萬開匙頭灣塞十一口大疏八十里故道漸復已而以漕舟壞季馴閒住六年春河決邳州運道阻總河侍郎翁大立復議開泇河以逺其勢潘季馴言泇與黄河相首尾今河南決淮揚北決豐沛漕渠不相屬泇處中將焉用之已而以漕舟壞季馴被劾歸給事中雒遵言治河有效無如工部尚書朱衡者乃詔衡與總河都御史萬恭覆視則泇口限嶺阻石竟報罷而一意事徐邳河衡上言茶城以北防黄河之決而入茶城以南防黄河之決而出故自茶城至邳州宿遷髙築兩隄宿遷至清河盡塞決口葢防黄河之出則正河必淤昨嵗徐邳之患是也自茶城秦溝口至豐沛曹單以接縷水舊隄葢防黄河之入則正河必淤往年曹沛之患是也二處告竣沛縣窰子頭至秦溝口應築隄禦之命萬恭總理其事役丁夫五萬有奇分工畫地而築之夏四月兩隄成北隄起磨臍溝迄邳州之直河南隄起離林鋪迄宿遷之小河口各延袤三百七十里運艘束于河流睢邳之間可以稼建舖立舍設軍民守之如河南山東黄河例河乃安運道嘉隆之間治河者以衡恭季馴為能神宗萬厯五年秋八月河決崔鎮淮決髙家堰横流四溢連年不治詔復以潘季馴為右都御史總理河漕時有議當疏海口者季馴言海口不能以人力疏治而可以水勢衝決計莫如築髙家堰塞崔鎮東河淮正流使並趨入海上可其奏季馴為之三年而髙家堰成一夕黄浦涸得龍首以獻其大専車時以比龍首渠云十五年冬十月命工科給事中韋居敬相度黄河議修治之䇿時黄河漫流自開封封丘偃師及東明長垣多衝決大學士申時行言失今不治河將北徙上流不下徐淮則運道可憂故有是命已而督河楊一魁議因決濟運導沁入衛居敬言衛輝城卑于河恐一決有衝潰之患沁水多沙善淤入漕未便不如堅築決口開河身加浚衛河民得灌田尤為完計上從之十六年春三月禮科給事中王士性上言黄河自徐而下河身髙而束以隄行隄與徐州城平委全力於淮而淮不任黄水乗運河如建瓴淮安髙寳興鹽諸生民託之一丸泥決則盡化魚鱉而議者如蟻穴漏巵補救無寧嵗總不如復故道為一勞永逸之計也河故道由桃源三義鎮達葉家衝與淮合在清河縣北别有濟運一河在縣南葢支河耳河强奪支河直趨縣南而自棄北流之道乆且斷河形固在也自桃源至瓦子灘九十里地下不耕無廬墓之碍至開河費視諸説稍倍而河道一復為利無窮章下所司韋居敬言故道難復不行復議開訾家營支河尋諸決口皆塞淤者復疏夏六月總理河道潘季馴上言河水濁而强汶泗清而弱交處則茶城也每至秋黄水發入淮淤停而淤勢也黄水減漕水從之沙隨水流河道自通縱有淺阻不過旬日往者立石洪内華二閘遇水發即閉之以遏其横黄水落則啓之以出泉水但建閘易守閘難貢使之馳行勢要之開放急不能待而運道阻矣乞禁啓閉之法報可十七年河決雙溝單家口于是専議築趙皮寨至李景髙口遥隄築將軍廟至塔山長隄築羊山至土山横隄河防幸無事十九年秋九月泗州大水淮水泛溢髙于城溺人無筭浸及祖陵總督河道潘季馴上言水性不可拂河防不可弛地形不可强治理不可鑿人欲棄舊以為新而臣謂故道必不可失人欲支分以殺勢而臣謂濁流必不可分霖霪水漲乆當自消時季馴凡四治河河皆治季馴之議以為河性湍悍善徙者水漫而沙壅也法莫若以隄束水以水攻沙循河故道束而湍之使水疾沙刷無留行而又近為縷隄縷隄之外復為遥隄故水益淺逺不至旁決二十三年夏四月命工科給事中張企程勘淮泗工先是邳州髙郵寳應大雨水湖決壞隄泗州水浸祖陵巡按御史牛應元言治河在闢清口浮沙次疏草灣下流達伍港灌口廣其途入海次開周家橋達芒稻河入江而鮑王諸口決為巨浸難以施工或分其水築黄堌戎口之壩疏符離集㫿水之淺濬宿遷小河入黄之口故有是命已而企程覆奏隆慶末髙寳淮揚告急當事狃于目前清口既淤又髙築堰隄張福以束之障全淮以角黄舉七十二溪之水滙于泗者僅口數丈出之出之十一瀦之十九河身日髙安得不倒溢以灌泗乎今髙家堰費鉅未可議廢且并髙寳淮揚亦不可少周家橋北去髙堰五十里其支河接革子湖若浚三十餘里一自金家河入芒稻河注之江一自子嬰溝入廣洋湖注之海則淮水泄矣武家墩南距髙堰十五里偪永濟河引水自窰灣閘出口直達涇河自昭陽湖入海則淮之下流有歸此急救祖陵之議也九月總督漕運禇鐵議導淮總理河道楊一魁議先分黄次導淮御史牛應元議合行之又為祖陵計黄堌口決當制小林口淤當挑歸仁隄當培上從之括帑五十萬役夫二十萬分黄導淮自黄江嘴導河分趨五港灌口徑入海以殺黄勢毋盡入淮導淮則自清口闢積沙數十里又于髙堰旁若周家橋武家墩稍引淮支流入于湖為預浚入江入海路以泄之祖陵水漸退而水患息二十四年九月戊戌河工成總理河道楊一魁總督漕運褚鐵等賞賚有差二十五年春正月壬寅河決黄堌口總督漕運尚書褚鐵言黄口宜塞否則全河南徙害將立見三月濬小浮橋沂河口小河口工成自河南徙徐邳復見清泗議者謂全河水微妨運決口不塞恐下囓歸仁為二陵患獨總河尚書楊一魁謂黄堌口深淵難塞議浚小浮沂泗築小河口工成果利運尋乆旱運河澀而河又決義安東壩一魁議濬黄堌口及上歸灣活嘴以受黄水救小浮橋泗上之涸因繪河圖上言黄河自古為患近自分黄道淮工成鳳泗淮揚免昏墊之災又自黄堌一決全河南徙兖豫徐邳得免河患而其餘波出於義安者又導之入小浮橋足以濟二洪之涸則今日之河既有合于決隄放水之議矣而議者猶曰運道有淺澀之虞祖陵有意外之患地方有淹沒之苦不知國家運道原不資于河全河初出亳夀之郊以不治治之故嵗無治河之費其後全河漸決入運因遂資其灌輸五十餘年久假不歸又日築垣而居之涓滴不容外洩于是濁沙日澱河身日髙上遏汶泗則鎮口受淤魚滕被侵下壅清淮則退而内瀦盱泗為魚以至瀕河沒溺嵗運飄流甚至浸及祖陵而當事者猥以運道所資勢不能却之他徙臣奉明命改絃易轍首開武墩經河次疏具壩固莊又挑小浮橋小河口沂河口故道幸小浮橋股引之水孛吉口未斷之流已足濟運矣以汶泗沂兖之水建閘節宣運道自在固不必殫力決塞以回全河葢決河所經有山西阜子諸坡湖以為之滙有小河白洋固朱等河溝以為之委祖陵雄據上㳺崇岡疊嶂諒無可慮即歸仁一隄見為險要亦非水衝萬一失守亦不過下浸桃清由洪澤諸湖以下清口勢不能逆流倒灌上及旴泗也至南流泛濫雖不免為下邑民生之害碣山水道當衝南流北流俱不得免必須遷城以避河患其以涸口被災者惟有蕭宿靈睢往者全河未徙之時豐沛魚滕徐邳不被淹沒乎近庚寅癸巳之秋徐邳二州不幾為魚鼈乎較之今日孰重孰輕故臣始終自信以為止就已成之功稍終未完之緒則自不至為運道之虞亦不能為陵寢生民之患抑臣又有説焉禹之導河析二渠播九河隨水之所向不與爭利今河南山東江北州縣碁列星布在在隄防水不及汴梁矣則恐決張秋不及張秋矣又恐淤鎮口不及鎮口矣又恐淹宿州凡禹之所空以與水者今皆為我所占無容水之地固宜其有衝決也今若空碣山一邑之地北導李吉口下濁河南存徐溪口下符離中存盤岔河下小浮橋三河並存南北相去五十里任水游蕩以不治治之量蠲一邑千金之賦嵗省修河萬金之費此亦一時之省事萬世之良圖也二十六年春三月工部給事中楊應文請開泇河泇河在滕嶧沂沐下流南通淮海隆慶以来翁大立數議未決舒應龍嘗鑿韓莊中輟時河決黄堌口請終其功報可夏六月以工部侍郎兼右僉都御史劉東星總理河道漕運東星循行河隄謂阻漕治在標決河治在本兩利而並存之議開趙渠葢商城虞城以下至于徐州元賈魯故道也嘉靖末北徙潘季馴議開之計費四百萬而止及河決單縣黄堌口稍通成渠惟曲里館至三仙臺四十里如故東星因欲浚之又自三仙臺至泗州小浮橋開支河又濬漕河起徐邳至宿費可十萬緡二十九年秋九月河決蕭家口先是開封歸徳大水商城䝉城等處河衝蕭家口百餘丈全河南徙淮泗賈舟不及去置于沙上總督河漕工部尚書劉東星卒于濟寧東星浚趙渠開泇河工未竟而卒十一月河南道御史髙舉言膠萊海運嘉靖間山東副使王憲議開膠萊河河之南口起麻灣北口至海滄相距三百三十里其地河形至今尚在兩口皆貯潮水不假濬者二百餘里濬者一百三十里但其下多石水㣲細使極力開鑿止三十里逺耳如河成我江漕由淮安清江浦歴新壩馬家濠而來計良便國初罷海運者以馬家濠未通舟出大洋故也馬家濠通舟行小海中自不險從麻灣海滄二口徑抵天津直沽至是舉循其議上格于守臣而止三十一年春正月山東巡撫黄克纉言開王家口為䝉牆上流上流既達則下流不宜旁泄宜塞從之夏四月總理河道侍郎曽如春卒如春治河力主開黄家口領六十萬金竭智畢慮既開新河雖深廣其南反淺隘故水不行所決河廣八十餘丈而新河僅三十丈不任受或告如春曰若河流既回勢如雷霆藉其自然之勢衝之何患淺者之不深如春遂令放水河流濁下皆泥沙流勢稍緩下已淤半矣一夕水漲衝魚臺單縣豐沛間如春聞之驚悸暴卒以工部右侍郎李化龍總理河道三十二年春正月總理河道侍郎李化龍請開泇河曰河自開封歸徳而下合運入海其路有三由蘭陽出茶城向徐邳名濁河為中路由曹單豐沛出飛雲橋向徐溝名銀河為北路由潘家口入宿遷出小河口名符離河為南路南路近陵北路近運惟中路既逺于陵亦濟于運前督臣排羣議興兹役竟以資用乏絶不得竣事然自堅城以至鎮口河形宛然故為今計惟守行隄開泇河為便上從之秋八月河決蘇家莊淹豐沛黄水逆流灌濟寧魚臺單縣而魚臺尤甚九月壬申分水河成三十三年秋七月壬午吕梁河澁給事中宋一韓論前總督李化龍泇河之誤不報三十四年夏四月癸亥河工成自朱旺口至小浮橋袤百七十里河歸故道役五十萬人費八十萬金五閲月而竣愍帝崇禎六年夏五月運河淺阻降總理河道尚書朱光祚一級七年冬十一月漕運總督楊一鵬議濬泇河從之八年秋九月逮總理河道尚書劉榮嗣初榮嗣以駱馬湖阻運自宿遷至徳州開河注之既鑿黄水朝暮遷徙不可以舟給事中曹景㕘劾之被逮九年夏四月泇河重濬成十五年秋九月李自成圍開封河決城陷先是開封城北十里枕黄河至是賊圍城乆人相食壬午夜河決開封之朱家寨溢城北越數日水大至灌城周王恭楞走磁州以巡按御史王漢舟迎之也巡撫髙名衡推官黄澍等俱北渡吏卒倉猝各奔避士民湮溺死者數千萬人城俱圯賊屯髙地獨全開封古都㑹富庶甲于中原竟成臣浸水大半入濁入泗入淮與故河分流邳亳皆災谷應泰曰河自龍門下浮束于萬山南至豫州地平勢怒而河無安流矣故河之決必在河南而既決之後不南侵全淮即北衝齊魯侵全淮者潰散于潁亳徐宿而害在田廬民業衝齊魯者横激于曹濮單鄆而患兼在堤防運道然淮近而身大決入淮者患小而治速漕逺而身小決入漕者患大而治難也洪武初河決原武自潁夀入淮正統十三年秋河決滎陽入漕潰沙灣入海景泰三年春河又決沙灣𢎞治二年夏河決開封入淮三年夏河決原武支流三一自封丘下衝張秋一出中牟尉氏一溢蘭陽及歸徳瀰漫至宿五年秋河決張秋七年春河又決張秋世宗十九年河決睢州野鷄崗四十四年河決沛之飛雲橋神宗五年河決崔鎮二十五年河決黄堌口懐宗十五年河決汴城大抵決口必在開封南北百里而被害之地淮三漕七後乃駸駸數病漕河焉葢合大河以歸一淮物不能兩大況水又泥淖多滓驅二凟之水行閼遏之途其必潰也明甚而兖州卑下齊魯瀕海黄河所向并牽漕河諸水盡瀉入海故河決之勢陸則病水水則病涸發則病水去則病涸齊魯病水漕河病涸一隅病水全河病涸而説者謂河既欲自豫決兖入漕達海何不盡浚豫兖諸決地聴河北流過濟寧下臨清出直沽漕與河合漕不病竭淮與河分淮不病溢䇿至便也不知淮河浩瀚千里一瀉猶不能洩怒時思沸湧漕水千步百折委紆盤曲河豈能按轡徐行乎若必廢漕制以伸河體取咽喉之地為尾閭之衝必無幸矣故治河之道古無上䇿史冊所載不過三說曰疏曰浚曰塞塞在上流堙谷截流是也疏在下流分支灑澤是也浚在河身築堤固岸使之安行是也疏近上䇿神禹北播九河賈讓北放渤海棄地遷民費以鉅萬効已難言之近世以來浚塞兼施徐有貞謂水平後可治決決止乃可濬淤此先塞繼浚之法也故力築張秋金堤堅塞決口而徐濬漕河之淤水道乃平劉大夏言河道不治乃修築隄防之功多疏濬分殺之功少此先浚後塞之法也故力浚賈魯河孫家渡殺水入淮又浚淤河出宿遷亳州入淮後築長堤起豫達徐衝決遂止他如潘季馴之不失故道不分濁流楊一魁之首開武墩次疏具壩皆良䇿也夫殷都帶河囂耿屢遷武帝刑牲宣瓠時決終明之世河患時警未嘗一嵗沮運者浚塞之力也九河故道已不能修漕河一綫勢不能廢然則塞浚之功與河終始尚其借鑒于兹明史紀事本末卷三十四
