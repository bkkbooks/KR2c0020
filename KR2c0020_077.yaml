body:
  text: 明史紀事本末卷七十七浙江提學僉事谷應泰編張獻忠之亂崇禎元年延安饑谷府民王嘉運作亂延安人張獻忠從之獻忠陰謀多智賊中號八大王其部最強旁掠延安諸郡邑四年張獻忠率衆二千人就撫于三邊總督洪承疇五年獻忠復叛隨賊首髙迎祥紫金梁等轉寇山西諸郡縣七年羣賊轉寇河南張獻忠犯信陽鄧州遁入應山洪承疇率諸將逐賊于河南獻忠西奔商雒遁盩鄠間與延安賊李自成陷澄城寇平涼邠州旋與羣賊出潼關寇嵩汝八年正月諸賊盡集宛雒張獻忠東走掠廬鳳安慶三月與老回回西走商州復至秦州十一月獻忠與羣賊自潼關出犯閿鄉靈寶東行庚申總兵祖寬大破獻忠于姑家廟十二月獻忠合諸賊圍廬州分道陷巢縣含山遂陷和州沿江下犯江浦九年正月張獻忠合羣賊圍滁州總理盧象升大敗之賊竄河南十年羣盜久擾河南無可掠悉入楚寇蘄黃間官軍敗獻忠于黃岡獻忠復入江北東掠至儀真揚州告急獻忠尋西走入楚十一年正月總兵左良玉陳洪範大破賊于鄖西張獻忠請降初獻忠自良涿噪而為盜洪範捕獲獻忠異其貌而釋之以是懷舊恩乞降于洪範請率所部殺賊自效總理熊文燦承制撫之獻忠請置家口于鄖西文燦為請于朝詔貸其罪立功自贖獻忠乃率部曲數千居白沙界山獻忠狡而多計羣盜每以為的其降也自言能制鄖襄荆承數百里內外無一賊文燦每曲狥其請益驕不奉法屢檄從征不應獻忠又求襄陽一郡以屯其軍文燦議餉二萬人獻忠乞餉十萬人文燦遷延不能應十月獻忠聲言寄家口于榖城入據守之分屯羣盜于四郊十一月羅汝才亦就撫文燦安其衆于房竹間與民錯壤而處遙與獻忠為聲援奪民禾而食不奉縣官法鄖楚偏沅諸撫咸以為憂文燦剛而愎又新有功而驕皆不聽鄖襄人惴惴恐禍至無日矣十二年五月張獻忠叛于榖城初賊首髙迎祥既誅李自成困川西羣盜失勢獻忠連敗精鋭俱盡始乞撫以緩誅初無降意及據榖城潛勾諸賊為犄角遂復思叛去舉人王秉貞為之謀主至是遂殺榖城知縣阮之鈿以叛羅汝才九營並起應之獻忠脅御史林鳴球上書求封于襄陽鳴球不從遂殺之七月熊文燦檄諸將進兵榖城獻忠焚榖城西走與羅汝才合左良玉追賊于房縣西賊設伏羅睺山良玉兵度隘入伏中賊四合圍之突圍戰敗績一軍盡沒良玉失其符印僅收殘兵數百走回房縣事聞文燦良玉供革職殺賊自贖九月大學士楊嗣昌督師討賊十月至襄陽逮熊文燦論死十三年二月平賊將軍左良玉大破張獻忠于太平縣之瑪瑙山斬首萬級獻忠精鋭俱盡止驍騎千餘自隨遁走興歸山中尋自鹽井竄興房界上左良玉屯興安平利諸山連營百里諸軍憚山險圍而不攻賊伏深箐中重賄山氓市鹽芻米酪山中人安之反為賊耳目陰輸兵情于賊獻忠得以休夏收散亡養夷傷羣盜往往歸之兵復振時羅汝才過天星七股賊盡入蜀六月獻忠自興房走白羊山入巫山隘聞川兵躡之益入深谷中掩息旗鼓轉入而西不知所往都司曹進功率兵入山偵賊不見一人而還七月獻忠既西羅汝才屢為官軍所敗勢孤率黨走合于獻忠共謀渡川西諸將賀人龍李國奇張應元汪雲鳳張奏凱等㑹師擊之應元雲鳳營于䕫之土地嶺待賀人龍兵三檄不至初督師嗣昌以左良玉跋扈難制而人龍屢破賊有功請以人龍代良玉佩將印既而以良玉瑪瑙山捷度未可動復奏留良玉佩印如故别加人龍總鎮銜須後命人龍初聞大將之拜踴躍動三軍既報寢乃怏怏良玉知其故意亦恨當獻忠之遁伏興歸也千餘殘寇可盡乃良玉以奪印懷慚人龍復以歸印觖望遂逡巡不復深入致獻忠復熾皆嗣昌失兩帥之心玩寇故也人龍屯開縣每以餉乏為辭頓兵不進癸亥人龍兵噪而西歸己巳官軍敗績于土地嶺時張應元汪雲鳳所將楚兵五千皆新募未經行陳待人龍兵久不至獻忠知官軍無後繼悉鋭來攻應元雲鳳簡鋭千人摶戰晨至日中未決賊分兵繞後山而下突入營中守營新兵皆譁賊乘之前後合圍二將連兵死戰應元中流矢奮擊突圍出賊方渡巴霧河應元馳赴河上然炮擊殺一賊帥衣緋者賊不得渡雲鳳苦戰久得脫渴飲水斗餘臥血凝臆而卒兵多潰亡九月獻忠汝才陷大昌庚寅屯䕫城山背賊行營輜重婦女甚衆而諸軍多觀望不前但尾賊後所至關隘防兵多逺遁賊長驅直過二賊合兵趨達州謀西渡丙午賊渡河遂入巴西督師嗣昌命監軍萬元吉監諸軍西行尾擊賊十月壬戌獻忠汝才陷劍州甲子過劍閣趨廣元直走陽平關從間道别出百丈山將入漢中總兵趙光逺守陽平甚嚴賀人龍李國奇復整兵而東賊乃踰昭化走西川丙寅川兵追賊于劍州敗績賊擒四將以去官軍轉戰于綿州逐北至城下賊渡綿河而西十一月庚戌督師監軍元吉大饗將士于保寧以諸軍進止不一立大帥以統之以總兵猛如虎為正總統張應元為副總統癸未發保寧趨綿州諸將分屯要害元吉督諸軍自間道趨射洪扼蓬溪以待之癸卯賊屯安嶽知大兵且至宵遁走內江乙巳猛如虎至安嶽選驍騎逐賊元吉與應元屯于安嶽城下以遏賊歸路十二月己酉賊走瀘州賀人龍等以兵躡之辛亥賊陷瀘州瀘州三隅皆陡絶臨江止立石站一路可北走賊既走絶地元吉謀以大兵自南搗其老營伏兵旁塞險要蹙賊北竄永州逆而擊之可以盡殲也乙卯元吉兵至立石站賊營先移渡南溪官軍隔水追之不及癸亥賊越成都走漢川德陽復至綿河十四年正月丁丑獻忠汝才入巴州己卯走達州甲申賊渡違河而東往新開焚燬驛道人烟斷絶者七百里初賊南竄元吉欲從間道出梓潼扼歸路以待賊嗣昌檄諸軍躡賊急追不得距賊逺令他逸諸將皆盡向瀘州賊折而東返歸路盡空不可復遏賀人龍頓兵廣元不進己丑猛如虎率諸將及賊于開縣日暮雨作諸將咸以人馬乏請詰朝戰參將劉士傑曰自瀘州逐賊馳騖四旬僅而及之惟敵是求今遇賊不戰縱敵失賊誰執其咎乎請為諸君先揮戈而進如虎亦率親兵從之士傑奮勇前摶賊陳連勝之獻忠憑髙而望見後軍無繼左軍皆前却不進因以精鋭繞谷中出官軍後馳而下左軍先潰士傑及游擊郭關如虎子猛先捷皆戰死前軍已覆如虎突戰潰圍出馬仗軍符盡失賊東走巫山大昌監軍元吉赴開縣收召殘兵祭陳亡諸將哀動三軍嗣昌在雲陽聞開縣失利始悔不用諸將扼歸路之謀矣初賊之西渡違河也嗣昌策其必入秦令左良玉自興歸趣漢中及賊東走嗣昌復檄良玉自夷䕫進𠞰使者憚行中道返命曰平賊已入漢中矣既慮其言不售也更使人紿良玉曰賊向漢中矣良玉不至嗣昌之使十九返良玉曰向依督師令瑪瑙山安得功乎遂撤興房兵趨漢中賊下䕫門無一人攔截者賊既度巫山晝夜疾走興房山中二月獻忠汝才走當陽鄖撫袁繼咸悉兵扼賊于房竹賊走宣城偵襄陽無備簡二十騎持符僞為官兵己酉夜至城下守者驗符信啓關賊既入即揮刀大呼殺門者城中先伏賊百餘俱起應之縱火光燭天賊大隊疾馳至城中大亂門洞開庚戌昧爽賊盡入城知府王承曽突圍走兵備副使張克儉推官酈曰廣死之賊焚襄王府執襄王獻忠據坐王宫坐王堂下勸之以巵酒曰吾欲斷楊嗣昌頭而嗣昌逺在蜀今當借王頭使嗣昌以陷藩伏法王其努力盡此一杯酒因縛王殺之投尸火中福清王常澄逃免潛遣人索王尸已燼僅拾顱骨數寸以歸賊殺宫眷并貴陽王常法盡掠宫女發銀十五萬以賑飢民襄陽守兵數千軍資器械山積盡為賊有初左良玉屢破賊掠其輜重盡蓄之許州為獻忠襲取良玉在鄖厝家口資蓄于襄陽至是復盡為獻忠有良玉聞之同鄖撫袁繼咸發兵馳援已不及癸丑賊渡江破樊城己未陷當陽郟縣乙丑陷光州新野三月丙子督師大學士楊嗣昌自縊于軍時李自成已陷河南福王遇害嗣昌以連失二郡喪兩親藩度不免遂自盡監軍元吉部署行營命猛如虎駐蘄黃防獻忠東逞上以襄陽失陷左良玉違制避賊削職戴罪平賊逮鄖撫袁繼咸入京四月獻忠焚掠襄陽既空聞左兵漸逼以兵三萬犯應山知縣章日輝擊却之北至隨州掠汝寧縣難民逸歸見獻忠面帶刀瘢二箭創一方令羣盜備乾糒為半月糧往攻固始陷光州漸逼麻城革左諸賊在皖桐聞獻忠東來自潛太至麻城勾合之將謀渡江巡撫宋一鶴擒賊諜焚其舟庚午獻忠汝才合兵陷隨州知州徐世淳死之合户被殺吏民屠僇不遺血流成溝澮六月左良玉敗獻忠于南陽之西山獻忠西走與汝才合兵攻南陽晝夜穴城知府顔日愈力拒之賊去陷信陽獲左兵旗幟令羣盜襲以入泌陽陷之癸亥走隨州七月丁丑獻忠圍鄖陽鄖兵禦之多殺傷己卯獻忠宵遁總兵黃得功戲下兵叛西走投獻忠獻忠陷鄖西羅汝才忤于獻忠北走合自成左良玉敗之于鄧州再敗之于浙川辛卯鄖兵與獻忠戰敗績獻忠以所擒鄖兵人斷一手縱歸以辱官軍督師丁啓睿與左良玉俱屯南陽頓兵不進獻忠既拔鄖西馬騾器甲搶獲甚盛羣盜蟻附之衆至數十萬獻忠屢勝而驕八月東掠信陽左良玉營多降將家在鄖襄多被獻忠殺掠人思致死于賊良玉乃自南陽引兵逆擊獻忠于信陽斬其首將沙賊大破之奪其馬萬餘降衆數萬獻忠負重創易服夜遁竄入山中良玉軍聲大振降附日衆遣諸將分道窮搜獻忠戊午獻忠收餘衆數千反走向鄖陽驟遇官軍不戰而潰棄馬騾二千尚有衆二千趨南陽負創不能馳保其婦豎日行三十里部曲日逃十六七僅隨數百人辛未良玉自鄖北發獻忠已過南陽追之不及監軍御史汪承詔劾將士觀望縱賊羅汝才既北合李自成自成踞河雒有衆五十萬獻忠衆散且盡九月因汝才以奔自成初獻忠與自成並起延西以狡詐相雄長自陷襄陽嗣昌縊死自以威名逺出自成右及敗來歸僅從數百騎自成方強欲屈之獻忠不為下自成怒欲殺之汝才知之陰選良馬五百騎資獻忠令他徙獻忠乃盡夜東馳與回革諸賊合入霍山扼險拒守督師啓濬以兵赴商城旋北行討李賊獻忠得逸山中十月張獻忠合六營賊復出攻舒城十五年二月乙卯張獻忠陷亳州亳州官吏先已棄城走賊按兵入城三月獻忠合回革諸賊復攻舒城四月壬寅舒城陷時舒城無令參將孔庭訓以兵千人同編修胡守恆率民共守七閲月廷訓降于賊勾賊攻城守恆倡舒人死守賊以洞車穴城穿者數處守恆督軍民補塞之賊射書脅降守恆燔其書于城上越三日城陷賊執守恆創其腹被數十創以死獻忠屯舒城改曰得勝州令降將孔廷訓攻霍山河南賊袁時中以兵㑹獻忠乙巳獻忠合諸賊陷六安五月甲戌張獻忠襲破廬州先是獻忠遣英霍遊民陽為貿易者潛入廬州城適督學御史以較士至郡獻忠遣賊數百負書卷衣青襟雜諸生應試者旅寓城中甲戌夜漏三下獻忠捲甲疾馳入郡城中賊縱火應之城陷學使者及備兵副使蔡如蘅俱走知府鄭履祥死之廬州城池髙深賊屢攻不能克至是一夕而陷獻忠斂兵退屯巢湖略含山巢縣六月辛亥獻忠襲陷廬江焚僇一空還兵舒城八月辛丑獻忠分三軍一軍上六安一軍趨廬州一軍往廬江三河掠雙橋巨舟二百艘復大治舟艦于巢湖習水師因大㑹羣賊合水陸五十六營集于皖口壬子獻忠復陷六安將州民盡斷一臂男左女右總兵黃得功劉良佐兵救六安營于夾山嶺再戰敗績得功歸定逺獻忠再陷六安挫得功良佐兵謀渡江入南京遂僭號改元刻僞寶選自宫男子僞署總兵以下官九月黃得功復以大兵逐之己卯賊悉走潛山命賊將一堵墻為殿營于山上步騎九十哨分營為四前阻大溝後枕山險為持久計得功良佐捲甲疾趨夜半緣山後譟而升賊驚起失措且前阻大溝不能成列官軍奮擊賊踰崖跳澗四潰追奔六十里斬首萬餘獻忠潰圍走一堵墻伏林中焚殺之填尸溢溪壑臭達百里奪馬騾數萬賊腹心謀士婦豎俱盡十月丙午劉良佐再破獻忠于安慶奪馬騾五千救回難民萬餘獻忠引兵西走蘄水十一月獻忠西入楚劉良佐旋師淮安黃得功旋師定逺十二月獻忠復東去陷桐城屠之初獻忠西遁諸軍俱𠞰袁時中于潁故獻忠乘虛突出丙戌陷無為州遂陷黃梅壬辰陷太湖十六年正月辛酉張獻忠以二百人夜襲陷蘄州明日令薦紳孝廉文學各冠帶自東門入西門出盡斬之遂屠蘄州留婦女毁城稍不力即被殺執守道仁和許文岐獻忠曽販杭州識文岐頗禮之文岐陰謀圖賊乃被殺時楚兵盡隨良玉東下蘄黃一帶惟土兵三百人守蘄水獻忠乘虛充斥三月丁酉陷蘄水屠之甲寅左良玉引兵自池口西上屯安慶丙辰獻忠自蘄水疾馳至黃州乘大霧攻城黎明城陷執副使樊維城欲降之罵賊不屈賊刺之洞胸死獻忠據府自稱西王麻城諸生周文江倡亂迎降獻忠獻忠大喜僞授文江知州賊尋陷羅田五月總兵方國安率兵七千扼蘄州獻忠西向武昌武昌武備積弛闖獻交窺江漢時議募兵守城而庫藏空絀楚王有積金百萬三司長史貸金數十萬以贍軍王不應大學士賀逢聖家居倡義捐資募兵僉謂宜募土著適承天德安潰兵俱下楚王盡募之為軍鋒以長史徐學顔領之號楚府兵獻忠沿江而上悉師破漢陽臨江欲渡武昌大震議撤江上兵嬰城守參將崔文榮曰守城不如守江守江不如守漢磨盤煤炭諸洲淺不過馬腹縱之飛渡而嬰城坐困非策也議者不從賊果從煤炭洲而渡直逼城下文榮禦之小有斬獲賊攻武勝門文榮率諸軍拒之多殺傷壬戌楚府新募兵為賊內應開門迎賊文榮躍馬持矛大呼殺賊三人賊攢矛刺之洞腋死大學士賀逢聖與文榮俱守武勝門城陷歸家衣冠北向再拜以巨舟載其家出墩子湖至中流鑿舟全家溺者十二人逢聖尸沉百七十日不壞十一月壬子始出葬長史徐學顔與賊格鬭斷左臂右手持刀不仆賊支解之楚宗多從賊者賊執楚王盡取宫中積金百餘萬輦載數百車不盡楚人以是咸憾王之愚也賊以箯興籠王沉之西湖屠僇士民數萬投尸于江尚餘數萬人縱之出城以鐵騎圍而蹙之江中浮尸蔽江而下武昌魚幾不可食其遺民數百多刖斷手足鑿毁目鼻無一全形者獻忠遂據楚王府僭稱武昌曰京城僞設六部五府鑄西王之寶開科取士殿試取三十人為進士授郡縣官初李自成兵臨漢陽不克聞獻忠取之自成怒榜示逺近曰有能擒獻忠以獻者賞千金及聞取武昌復遣人賀之曰老回回已降曹革左皆被殺行將及汝矣獻忠得書而懼多賫金寶報使于自成自成留其使獻忠恨之六月丙戌諭平賊將軍左良玉專𠞰張獻忠毋老師糜餉七月辛亥方國安合左營副將徐懋德馬士秀等步騎二萬從蘄州而上夜擊賊于大冶斬首千級前鋒既勝左鎮諸軍並進獻忠聞之戊午以四賊帥守武昌為浮橋于金口悉衆西渡屯舟師于湖中謀向嶽八月丙寅方國安等進兵黃州斬僞知府癸亥諸將進次陽邏堡距武昌三舍監紀知縣吳敏師聮絡蘄黃四十八寨義勇數萬人與師㑹總兵常安國以舟師先進轉戰金沙州奪賊舟百艘賊騎反走焚城下諸舟嬰城自保安國等退屯漢口丙寅諸軍齊壓武昌而軍賊出戰大敗退入官軍逐之遂入城賊開門西走諸將縱兵屠僇萬計遂復漢陽并諸屬縣張獻忠陷咸寧蒲圻距嶽州二百里沅撫李乾德總兵孔希貴以兵二萬守城陵磯盡移嶽州居民他避令軍士詐為居民開門迎賊賊入城伏發賊盡殲留四賊賊割一耳貫箭縱回以辱賊獻忠怒益兵進攻乾德虛立營壘道傍林中植旗幟伏大炮積薪其上賊以火攻之延燒積薪炮大發殺賊數百賊益怒水陸並進乾德飾戰艦中流向賊營度矢石可及即止不進賊連弩射良久乾德度賊矢炮且盡水陸奮擊大敗之三戰三捷獻忠乃悉衆二十萬圍嶽州百道俱攻力屈城陷乾德希貴俱走長沙戊辰賊前鋒至湘隂湘隂民俱空城走獻忠分軍為二一軍下長沙一軍上荆州獻忠欲北渡卜于洞庭湖神不吉三卜神終不許庚辰獻忠斂舟湘潭數千艘將北渡忽大風起覆舟百餘溺死數千人因復還嶽州盡殺所掠婦女投尸江中焚其舟火延四十里江水夜明如晝遂陸行向長沙甲申至城下長沙人民先已走李乾德奉吉王惠王走衡州丙戌長沙陷總兵尹先民何一德降賊巡撫王聚奎單騎走江夏推官蔡道憲死之先是武昌陷聚奎南奔長沙道憲請還屯嶽州謂嶽與長沙唇齒也併力守嶽則長沙可保而衡永無虞聚奎屯嶽數日仍南徙驅萬人入長沙所過如泥慘甚于賊尋遁入湘潭及賊至城下呼推官曰吾軍中皆知爾名可速降毋自苦也道憲挽強弩射之獻忠怒攻三日夜而城陷執道憲百計誘降不屈磔之健卒林國俊等九人追侍道憲不去賊勸道憲降時國俊曰如吾主可降亦去矣不至今日賊云爾主不降爾亦不得生國俊曰若我輩願生亦去矣不至今日賊併殺之內四卒奮然曰願且延旦夕葬主骸而後受創賊義而許之于是四卒解衣裹骸葬之南郭畢四卒自經死獻忠既陷長沙設立僞官大書僞榜馳檄逺近降賊將先民一德願效前驅進取江西獻忠悅僞封世襲伯庚寅賊襲陷衡州桂王及吉惠二王走永州九月獻忠拆桂王府殿材至長沙搆造宫殿遣兵南追三王至永州巡按湖南御史劉熙祚督水師禦之遣兵護三王南行入廣西而自入永州死守奸人內應開門迎賊熙祚被賊執賊欲脅降之不屈囚之永陽驛中閉目絶食題絶命詞于壁賊再三諭降之臨以白創熙祚大罵不已遂遇害于是全楚皆陷戊戌官軍入嶽州初獻忠陷嶽州置僞官守之悉率羣賊南略地官軍進復之僞官俱伏誅獻忠屯衡州復分軍為三一軍往永州一軍入廣西全州一軍犯江西袁州獻忠陷長沙開科取士丙辰賊前鋒至袁州獻忠至萍鄉知縣棄城走萍鄉士民牛酒逺迎賊路相屬戊子賊陷萍鄉盡焚公廨屋廬空其城獻忠歸長沙分兵狥佼縣分宜十月甲子賊陷萬載于是瑞安臨江新喻分宜之人俱空獻忠遣别將趨連州南贑兵備副使王孫蘭駐韶州兵不滿百聞之遽自經知府踰城遁韶民盡逃袁州迎降于賊賊陷袁州左良玉以副總兵吳學禮援袁州次于分宜甲戌進圍袁州僞將丘仰寰拒守都司髙山奮身先登斬賊二千四百奪馬六百擒斬丘仰寰遂復袁州時江西袁州吉安臨江人民多徙山谷官兵淫殺獻俘三郡民所在屯結以拒官軍江西巡撫郭都賢檄撤兵回九江招土著戍三郡官兵既撤賊自長沙突至吉安丁丑備兵副使嶽虞巒方閲軍于郊俄報賊至皆潰虞巒走戊寅吉安陷諸縣同日而陷賊設僞官改吉安為親安府廬陵為順民縣賊將張其在發僞檄馳下袁州兵民皆傾城先竄賊復入袁州獻忠在長沙增兵為九營四營皆老卒五營皆新附左良玉令馬進忠諸將馳兵赴袁州馬士秀以步兵上臨湘嶽州令惠登相規復襄陽劉洪起規復南陽乙酉獻忠遣賊將馬賜下臨湘取米及釜方國安遣兵進扼于蒲圻十一月壬辰江督吕大器兵復吉安癸巳獻忠遣四賊將下嶽州沿江設伏藏輕舟于㲼港以巨艦載輜重順流下副將王世泰楊文富以兵三千邀擊之賊逆流陽走以誘官軍官軍爭利泝流上盡奪其資入舟舟重不能速行賊輕舟四出圍之夾岸賊兵邀擊官軍殺溺無算方國安等諸將合兵救之僅奪回文富世泰喪師二千舟二百艘嶽州軍民空城走賊疾趨復陷之壬寅詔承天太監何志孔勞良玉軍以恢楚有功加良玉少師蔭一子吏士各升秩大賚各軍詔良玉移鎮武昌良玉令馬士秀趨長沙搗賊後令馬進忠等趨袁吉迎擊其前甲寅馬士秀等復臨湘賊奔嶽州諸將追至嶽州賊將混天龍步騎數千拒南岸以輕舟數十順流下邀官軍士秀三分其軍以殿後者交射南岸賊乘風直上繞賊舟後反擊之賊大敗盡奪其舟南岸賊疾入城士秀麾諸軍登岸四面乘城鱗次入賊突門復走長沙斬首四千餘級遂復嶽州乙卯馬進忠等進兵分宜賊盡竄袁州丙辰進趨袁州賊開門西走諸軍逐之三十里復袁州盡誅諸僞官斬首三千級奪賊馬二百弓矢數萬十二月張獻忠遣兵陷建昌義陷撫州南豐獻忠遣人通好于老回回時老回回為李自成據荆州獻忠與修舊好合兵李自成既入關獻忠益橫荆嶽間丁亥獻忠前鋒艾四轉戰至蒲圻馬進忠禦之再戰敗績十七年正月張獻忠自嶽陽渡江虛設僞官于江南大隊俱往江北遂棄長沙造浮橋于三江口以一軍過荆州盡棄舟楫步騎數十萬入䕫州二月方國安馬進忠復長沙左良玉遣兵追賊于沙陽六月張獻忠陷涪州瀘州蜀王告急請濟師于南都左良玉兵屯德安獻忠順流陷佛圖關遂圍重慶悉力拒守四日而陷瑞王闔宫被難舊撫陳士奇死之賊屠重慶取丁壯萬餘刳耳鼻斷一手驅狥各州縣兵至不下以此為令但能殺王府官吏封府庫以待則秋毫無犯由是所至官民自亂無不破竹下者八月張獻忠進陷成都蜀王闔宫被難巡撫龍文光暨道府各官皆死之獻忠大索全蜀紳士至成都皆殺之既而懸榜試士諸生逺近爭赴獻忠以兵圍之擊殺數千人咸挾筆握策以死蜀中士類俱盡復大殺蜀民全蜀數千里蕭條絶無人跡時中原多故諸將無暇西顧獻忠遂奄有兩川李自成敗益發兵攻漢中陷之獻忠逡巡自守不敢出未幾獻忠以病死于蜀中谷應泰曰昔者周書越人閔不畏死三輔縱橫持斧而出以至鄭苦萑苻之警楚定僕區之法草竊奸宄自古患之矣然未有自秦寇晉豫由豫入楚蜀轉掠江右旋犯粵西二十餘年之間取肝益膳流血成渠里落蕭條宗社顛覆若張獻忠之甚者也考獻忠與李自成因飢煽亂並起延安孫恩甫叛盧循即興仙芝既起黃巢來附同惡相濟若連矢然天禍人國以有此孽耳其時掩捕渠魁賑恤餘黨用張京兆之鳴鼓兼汲長孺之發粟平定安集一長吏事也奈何燎原莫撲滋蔓難圖嘯聚為羣旁抄郡邑楊大作而湖湘悉陷黃巾起而山左不平使天子有西顧之憂蒼生有喋血之患者揆厥亂源誰執其咎哉然而獻忠無他技巧止以陰謀多智暴豪嗜殺可乘之敝正自不少耳方夫賊師屢挫其弱可擒賊氣方張其驕可掩賊黨內攜其釁可間也假令良玉太平之捷精鋭俱盡得功潛山之捷尸填溝壑便當乘勝追奔不令逸去即子儀克新店而收東京懷光克河陽而滅朝義故曰其弱可擒也又若襄陽初陷獻忠橫恣六安再下獻忠改元若能轉敗為功出彼不意即元濟氣盛而李訴夜襲淮蔡潁川甫陷而長源規取范陽故曰其驕可掩也又若南陽之敗自成蓄謀以圖漢陽之取自成懸金以購若能用諜出奇兩虎自鬭即吕布交疏于袁術慶緒授首于思明故曰其釁可間也乃諸臣計不出此而天與不取地險坐失逺棄漢川近防江夏才屯石站已渡南溪以至萬元吉才同崔浩不竟其用李乾德孔希貴智埒淮陰勢絀而走賀逢聖蔡道憲忠比睢陽力盡而死比至嵗月遷延四分五裂師老財匱而天下之大勢去矣然豫以元和討賊全倚裴度建興恢復獨任武侯而楊嗣昌者白面書生不嫺將略寇氛剽鋭即非郗曇之移疾大藩蹂躪便同孟昶之仰藥雖復引義自裁亦云無愧而應元士傑尚昧發蹤如虎人龍終乖駕馭譬之次律陳濤之敗中軍石頭之䘐為法取惡亦所不得辭也論者又以獻猶據蜀闖則犯闕按法行誅薄乎減等而不知獻亂以來材賦絀于吳楚士馬斃于荆襄民命塗于中野夫是以瓦解土崩一蹶而壞譬猶人之死也獻縶其手而後闖刺其心獻揕其胸而後闖扼其吭則獻之與闖厥罪惟均也窮奇檮杌又可以九品差次乎哉明史紀事本末卷七十七
