body:
  text: 明史紀事本末卷三十三浙江提學僉事谷應泰編景帝登極守禦英宗正統十四年秋八月上北狩太后召百官入集闕下諭曰皇帝率六軍親征已命郕王臨百官然庶務乆曠今特敕郕王總其事羣臣其悉啓王聴令辛未太后詔立皇長子見深為皇太子時年二嵗命郕王輔之詔天下曰邇者冦賊肆虐毒害生靈皇帝懼憂宗社不遑寧處躬率六師問罪師徒不戒被留王庭神器不可無主兹于皇庶子三人選賢與長立見深為皇太子正位東宫仍命郕王為輔代總國政撫安萬姓布告天下咸使聞知癸酉郕王臨午門言官大臣次第宣讀彈劾王振啓章言振傾危宗社請滅族以安人心若不奉詔羣臣死不敢退因哭聲徹中外王起入内使將闔門衆隨擁入有令㫖籍沒振遣指揮馬順往衆曰順振黨也宜遣都御史陳鎰時太監金英𫝊㫖令百官退衆欲捽毆英英脱身入馬順從旁叱百官去給事中王竑憤起捽順首曰馬順往時助振惡今日至此尚不知懼衆爭毆之或就脱順鞾捶撃躧踏立斃順衆又索振黨内使毛王二人英捽令出亦擊殺之曳三屍陳東安門軍士猶爭撃不已逾時執振姪錦衣衛指揮王山反接跪于廷衆唾罵之于是衆競喧嘩班行雜亂無復朝儀百官既毆殺順益恟懼不自安王亦屢起欲退還宫兵部侍郎于謙直前攬王衣曰殿下止振罪首不籍無以泄衆憤且羣臣心為社稷耳無他王從之降令㫖奬諭百官歸􅊩事馬順罪應死勿論衆拜謝出是日事起倉卒賴謙鎮定謙排衆翌王入袍袖為裂既出吏部尚書王直者篤老臣執謙手而歎曰朝廷正藉公耳今日雖百王直何能為丙子移王座入奉天門左受朝陳鎰奉令㫖籍振并其黨彭徳清等家振第宅數處壯麗擬宸居器服珍玩尚方不及玉盤徑尺者十面珊瑚髙者七八尺金銀十餘庫馬萬餘匹皆沒官臠山于市族屬無少長皆斬振暨山弟林等皆從駕死于兵太后命以于謙為兵部尚書二十三日額森擁上至大同城下索金幣約賂至即歸上都督郭登閉門不納上𫝊㫖曰朕與登有姻㜕何外朕若此登遣人𫝊奏曰臣奉命守城不敢擅啟閉隨侍校尉袁彬以頭觸門大呼于是廣寧伯劉安給事中孫祥知府霍宣同出見獻蟒龍袍上以賜巴延特穆爾及額森弟達都哈雅王上曰秋稼未收軍士久飢可令刈以入城又曰額森聲言歸我情偽難測且嚴為備從騎叩城下索犒軍資并内官郭敬等金銀共萬餘兩來迎駕既獻復不應初額森來索賂郭登曰此紿我耳莫若以計伐其謀劫營奪駕入城此為上䇿乃謀以壯士七十餘人餉之食令奮前執其弓刀因擁上還召壯士與之盟激以忠義約事成髙爵厚祿士皆奮躍用命已書券給之㑹有沮者既淹久冦覺驚擾而去時登練兵振武誓以死守大同將士咸感奮屢出奇挫敵故以孤城得全額森擁上道宣府總兵楊洪閉城門不出事聞逮洪繋詔獄上出塞過猫兒莊九十海子歴蘇武廟李陵碑二十八日至黒松林額森營在焉上始入額森營額森拜稽首侍坐設宴令妻妾出上夀歌舞為樂仍奉上居巴延特穆爾營去額森營十餘里巴延特穆爾與其妻見上亦如額森禮額森屢欲謀害㑹夜大雷雨震死額森所乗馬謀乃沮且加禮焉袁彬侍左右頗知書性警敏又有和敏者先隨使臣吳良羈留在北至是亦與彬同侍又有衛沙狐狸者亦隨上至漠北供薪水勞苦備至二十九日太后遣太監金英𫝊㫖皇太子幼冲郕王宜早正大位以安國家時議者以時方多故人心危疑思得長君以弭禍亂于是文武羣臣交章勸進王再辭讓衆請遵太后命允之遂擇日行禮九月戊寅朔上在迤北額森遣使來言欲送上還京師使還以金百兩銀二百兩綵幣二百匹賜額森癸未郕王即皇帝位遥尊上為太上皇詔赦天下改明年為景泰元年額森復遣使致書辭悖慢兵部尚書于謙見帝泣言曰冦賊不道勢將長驅深入不可不預為計邇者各營精鋭盡遣隨征軍資器械十不存一宜急遣官分設召募官舍餘丁義勇起集附近民夫更替沿河漕運官軍令其悉𨽻神機等營操練聴用仍令工部齊集物料内外局厰晝夜併工成造攻戰器具京師九門宜用都督孫鏜衛穎等給領兵士出城守䕶列營操練以振軍威選給事中御史如王竑等分出巡視勿致疎虞徙郭外居民于城内隨地安插毋為冦掠通州壩上倉糧不可捐棄以資冦令在官者悉詣闗支准為月糧之數庶幾兩得帝嘉納之以兵部郎中羅通給事中孫祥並為副都御史分守居庸紫荆等闗以薛瑄為大理寺丞分守北門命侍講徐珵楊鼎檢討王詢等行監察御史事分鎮河南山東等處要地撫安軍民令各處招募民壯就令本地官司率領操練遇警調用起楊洪石亨于詔獄命洪仍守宣府亨總京師兵馬亨有威望方面鉅軀鬚垂至膝先協守萬全坐不救乗輿械繋詔獄至是以于謙言赦出之使總京營兵馬贖罪十月額森以送上皇還京為名與其汗托克托布哈冦紫荆闗京師戒嚴先是太監喜寧故韃靼也土黙特之敗降于額森盡以中國虚實告之為彼嚮道奉上皇入冦七日至大同城下守臣郭登曰賴天地祖宗之靈國有君矣額森知有備不攻去九日至廣昌破紫荆闗殺指揮韓清等都御史孫祥走死朝野洶洶人無固志赦交阯敗績論死成山侯王通為都督陞鴻臚寺卿楊善為副都御史協守京城太監興安問王通計將安出通以挑築京師外城濠為對興安鄙之侍講徐珵方有時名亦鋭意功業大監金英召徐珵問計珵曰驗之星象厯數天命已去請幸南京英叱之令人扶出明日于謙上疏抗言京師天下根本宗廟社稷陵寢百官萬姓帑藏倉儲咸在若一動則大勢盡去宋南渡之事可鑒也珵妄言當斬太監金英宣言于衆曰死則君臣同死有以遷都為言者上命必誅之乃出榜告諭固守之議始決謙聞冦迫闗思各處芻粟數萬計恐為敵資急遣使焚之然後奏聞或請姑待報謙曰冦在目前若少緩彼將據之適以齎盗糧耳獨不見宋牟駝崗事乎衆皆是之己卯額森長驅至京城西北闗外命石亨等軍于城北兵部尚書于謙督其軍都督孫鏜軍于城西刑部侍郎江淵㕘其軍皆背城而陣以交阯舊將王通為都督與御史楊善守城時衆論戰守不一主將石亨欲盡閉九門堅壁以避賊鋒謙曰不可賊張甚矣而我又先弱是愈張也乃率先士卒躬擐甲胄出營徳勝門以示必死泣以忠義諭三軍人人感奮勇氣百倍尚寶司丞夏瑄陳四䇿一謂冦多騎長于野戰短于攻城且堅壁勿戰使之氣沮然後出奇設伏諸道奮撃一謂冦深入宜令死士夜襲其營設伏内地以待追者一謂冦既舉國入犯邊無所禦宜分邊兵内外夾攻彼將自潰一謂我軍依城為營退有所歸宜以三隊為法前隊戰退令中隊悉斬以殉不斬者同罪使士知畏法詔趨行之喜寧嗾額森遣使來議和索大臣出迎駕衆莫敢出乃以通政㕘議王復為禮部侍郎中書舍人趙榮為鴻臚寺卿出朝上皇于土城廟額森巴延特穆爾擐甲持弓矢侍上皇復等見上皇進書敕上皇視漢字書額森視番字敕額森曰爾皆小官急令王直胡濙于謙石亨來上皇諭復榮曰彼無善意汝等宜急去二人辭歸冦益四出剽掠焚三陵殿寢祭器逼宣武門南逾盧溝橋散掠下邑攻城益急石亨折弓厲聲曰宰臣不出計莫能支矣大學士陳循等疏請敕宣府遼東總兵楊洪曹義各選勁騎與官軍夾撃又請㫖募斬額森者賞萬金封國公復偽作喜寧與太監興安書云約誘額森入冦欲乗其孤軍取之書為額森邏卒所獲額森頗疑喜寧既而宣府遼東兵至軍大振時諸軍二十二萬列城下冦見大軍盛而嚴不敢輕犯以數騎來嘗謙設伏空屋遣騎誘之遂以萬騎來薄伏發敗之石亨出安定門與其從子彪持巨斧突入中堅所向披靡敵却而西亨追戰城西復却而南彪率精兵千人誘冦至彰義門冦見彪兵少逼之亨率衆乗之冦敗走神機營都督范廣以飛鎗火箭殺傷甚衆都督孫鏜禦冦西直門失利諸將不相援鏜急叩門求入給事中程信監軍西城言鏜小失利即開門納鏜賊益張人心益危乃閉城趨鏜戰冦逼城鏜兵走死地亦附城戰信與都督王通都御史楊善城上鼓譟鎗砲佐鏜毛福夀髙禮往援禮中流矢石亨兵亦至乃引退于是額森知我有備氣稍沮于謙使諜諜知上皇移駕逺命石亨等夜舉火大砲撃其營死者萬人額森以上皇北遁托克托布哈聞之遂不敢入闗亦遁額森出居庸闗巴延特穆爾奉上皇出紫荆闗諸將分兵躡其後石亨與從子彪復破冦于清風店孫鏜楊洪范廣逐冦至固安又捷奪回人口萬餘時冦騎散掠各郡不過百餘騎驅人畜以自衛望之若萬衆然猶殺官軍數百人洪子俊幾為所獲上皇出紫荆闗連日雨雪乗馬踏雪而行上下艱難遇險則袁彬執控和敏亦隨之既入冦營額森來見宰馬拔刀割肉燎以進云勿憂終當送還食訖辭去托克托布哈遣使来獻馬議和朝廷却之胡濙王直曰托克托布哈額森君臣素不睦宜受其獻以間之從其言使人入見賜衣服酒饌金帛協守大同都督郭登議率所部并糾集義勇從雁門入援先以蠟書馳奏大畧謂戎馬南驅三闗失險留連内地為患非輕欲悉起各處官軍民壯入䕶内廷京兵撃于内臣兵擊于外使賊有腹背受敵之虞首尾不救之患且曰忠臣切已敢忘報國之心成敗在天不負為臣之節以賊退優詔褒答之時我師屢衂邊陲無完地大同兵士戰沒之餘城門晝閉人心土崩有愛登者泣謂之曰事已至此奈何登曰天若祚國必無他憂若敵勢莫遏吾與此城誓相存亡當不使諸君獨死也大同孤危登氣益壯弔死問傷親為痛恤晝夜籌慮修城繕兵以圖後舉尋京師圍解登上疏言冦騎雖回離邊不逺𫝊報有云黄河已凍且向延綏青草復生再侵京闕事雖未信備必先修乞推誠待下側席求賢明理克欲以成聖學親賢逺佞以收人望既又𫝊額森將復犯京師登以京兵新選不可輕戰又疏曰今日之計可以養鋭不可浪戰可以用智不可鬬勇兵法知彼知己可守則守其淶水易州真定保定一帶皆堅壁清野京兵分據犄角安營以逸待勞以主待客勿求僥倖務在萬全此謂不戰而屈人兵善之善者也命都指揮董寛率兵督河間瀋陽等衛緝捕盜賊時降人安置畿内者乗時並起為盜十一月以寇退京城解嚴降詔撫安天下楊洪等班師還京論功封楊洪昌平侯石亨武清侯加于謙少保總督軍務謙固辭不許有頌謙功者輒謝曰四郊多壘卿大夫之恥今但不城下盟何功也學士陳循疏言守居庸副都御史羅通曉暢軍事宜召還守宣府總兵楊洪及子俊皆善戰宜留之京師于謙曰宣府京師之藩籬居庸京師之門户邊備既虚萬一額森乗虚據宣府為巢窟京師能安枕乎兵科給事中葉盛亦上言今日之事邊闗為急往者馬營獨石不棄則六師何以䧟土黙特紫荆白羊不破則冦騎何以薄都城即此而觀邊闗不固則京城雖守不過僅保九門其如寢陵何其如郊社壇壝何其如四郊生靈荼毒何宜急令固守為便先是土黙特既敗邊城多陷宣府孤危既而復召宣府總兵入衛京師人心益懼或欲遂棄宣府紛然就道都御史羅亨信不可仗劍坐當門拒之下令曰敢有出城者必斬衆始定城中老稚歡呼曰吾屬生矣因設䇿捍禦督將士誓死守冦知有備不敢攻至是上從于謙葉盛言乃以左都督朱謙佩印鎮宣府紀廣楊俊副之僉都王竑鎮居庸上皇北至小黄河蘇武廟巴延特穆爾妻額特埒阿勒哈令侍女設帳迎駕宰羊遞杯進膳尋值聖節額森上夀進蟒衣貂裘筵宴和敏袁彬常宿御寢傍天寒甚每夜上皇令彬以兩脇温足一日晨起謂敏曰汝知乎汝夜手壓我胸我俟汝醒乃下手因言光武與子陵共卧事敏頓首上皇夜出帳房仰觀天象指示二人曰天意有在我終當歸也上皇使和敏致意巴延妻令勸巴延送還朝妻曰我婦人何能為然官人洗濯我侍巾脱亦當進一言巴延嘗因獵得一雉并酒一卣來獻敏時時設喻慰上皇勿憂或成疾時額森聲言欲送上皇還衆遂多主和于謙獨排衆議曰社稷為重君為輕遣人申戒各邊將毋墮賊計命尚書石璞鎮守宣府都御史沈固鎮守大同都督王通守天夀山僉都御史王竑城昌平都御史鄒來學提督京都軍務平江伯陳豫守臨清副都御史羅通守山西景帝景泰元年春正月上皇書至索大臣來迎命公卿集議廷臣因奏請遣官使北賀節進冬衣上謂必能識太上皇帝者始可行羣臣懼謝罪事遂寢大同總兵郭登敗冦于栲栳山冦入大同境登率兵躡之行七十里至水頭日暮休兵夜二鼓有報云東西沙窩賊營十二皆自朔州掠囬登召諸將問計或言賊衆我寡莫若全軍而還登曰我軍去城百里一思退避人馬疲倦賊以鐵騎來追即欲自全得乎按劒起曰敢言退者斬徑薄賊營天漸明賊以數百騎迎戰登奮勇先登諸軍繼進呼聲震山谷登射中二人手刃一人遂大破其衆追奔四十餘里至栲栳山斬首二百餘奪還人馬器械萬計進封定襄伯食祿千一百石與世券是役也登以八百騎破冦數千為一時戰功第一登為將智勇善撫士卒紀律嚴明料敵制勝動合機宜在大同與賊相拒一年大小數十戰未曽挫衂常恨馬少步卒追賊不及乃以己意設為夾地龍飛天網鑿為深塹覆以土木人馬通行如履實地賊入圍中令人發機自相擊撞頃刻十餘里皆陷又用砲石擊賊一發五十餘步人馬死者數十賊𫝊以為神云時額森分調各部擾邊朱謙敗之于宣府杜忠敗之于偏頭闗王翺敗之于遼東馬昂敗之于甘州修城堡簡精鋭各邊皆有備石亨佩大將軍印巡邊石彪楊俊亦間出中國勢遂振閏正月叛人小田兒伏誅小田兒為額森鄉導雜使中來瞷虚實于謙授計侍郎王禕就大同道誅之二月叛臣喜寧伏誅寧懐二心教額森擾邊且不欲送上皇還上皇深惡之寧又忌袁彬誘彬出營將殺之上皇急救之乃免彬與上皇謀遣寧𫝊命入京令軍士髙磐與俱宻書繫磐髀間令至宣府與總兵等官計擒之既至宣府㕘將楊俊出與寧飲城下磐抱寧大呼俊縱兵遂縳寧送京誅之額森聞寧誅與賽堪王等分道入犯三月額森賽堪王冦大同陽和大同王冦偏頭闗達爾布哈王冦亂柴溝特爾格布哈王冦大同八里店特爾格平章冦天城托克托布哈王冦野狐嶺并萬全夏四月甲戌戸部尚書金濂等議冦騎犯邊大軍失利遺有馬營獨石龍門鵰鶚等處芻糧宜令督儲侍郎劉璉提督軍務副都御史羅通及宣府總兵朱謙逰撃楊能㑹計徙運宣府從之都督楊俊請大舉出塞大同宣府列營堅守為正兵獨石偏頭乗間設伏為奇兵悉發京營與諸鎮兵出塞逐北而犁其王庭可以得志于謙曰報仇雪恥臣等職也顧興兵舉事係社稷安危即如俊所言萬一我軍出塞賊以偏師綴我而别遣部落間道乗虚入冦是自撤藩籬非萬全計臣愚未見其可上從謙議大同㕘將許貴請遣使腆幣以欵冦兵而徐為討伐計于謙曰前者固非不遣使都指揮季鐸指揮岳謙遣而冦騎已至闗口通政王復少卿趙榮遣而不獲徴太上一信其狡焉侮我而齕我何似而可言和況額森不共戴天仇也理固不可和萬一和而彼遂肆無厭之求從之則坐弊不從則生變勢亦不可和貴介胄之臣而委靡退怯法當誅是時上任謙方専疏既入于是邊將人人言戰守額森不得挾重相恫喝抱空名不義之質始謀歸太上矣諜報額森逼總兵朱謙于闗子口明日復報追石亨于雁門闗烽火連屬衆皆恐請大發兵援之于謙策額森大隊尚逺塞必張疑兵以脅我乃上方畧授石亨使皆堅壁而令各營秣馬厲士若將大舉者仍遣延綏總兵帥騎渡河于保徳州設伏截殺從之已而賊果不至于謙以畿輔諸州郡兵力单甚乃皆宿兵奏遣都指揮陳旺石端王信王竑等分屯涿鹿真定保定易州諸處而以右都督楊俊帥焉久之皆屹然重鎮五月乙已巡撫山西都御史朱鑑奏額森分道入冦請令闗隘守將畫地救援冦犯河曲保徳岢嵐宜令偏頭闗䇿應犯寧化靜樂忻州定襄太原清源交城文水宜令山西䇿應犯五臺繁峙崞縣宜令雁門闗䇿應其石州寧鄉宜令汾州守備分兵協守從之武清侯石亨奏冦騎六萬圍代州官軍出戰有斬獲又分營雁門闗一路恐侵京師下廷臣議黃花鎮鞍口外衛西北邊境内䕶陵寢京師宜益兵守備從之仍令兵部稽在京軍馬數以聞冦騎犯宣府總兵都督朱謙等率兵力戰却之官軍陣亡者百四十人都督江福等兵應援不利殺傷百餘人兵部言通事馬雲馬青先奉使迤北許額森細樂伎女又許與中國結婚皆出自指揮吳良致開邊釁請寘諸法詔下錦衣衛鞫之立京團營操法初太宗以北伐故宿重兵燕中㑹承平久不能無老弱公侯中貴人往往役占土黙特之難精鋭畧盡雖有五軍神機三千諸營然不相統一每遇調遣號令紛更兵將不相識于謙上言兵冗不練遇敵輒敗額四十餘萬非盡可用者徒費大家米于是即諸營選馬步驍悍者十五萬分為十營每營各以都督領之五千人為一小營營以都指揮領之團操以備警急是為團營而以謙總督列侯石亨楊洪栁溥為總兵太監曹吉祥劉永誠等監之餘步騎仍歸三大營曰老營自是兵將相識每出征即令原管都督領之故號令歸一洪亨皆老將宿猾而亨尤貪縱謙威令嚴宻目視指屈口奏悉合機宜亨等雖為大帥進止賞罰一由謙相顧頫首而已戮左都督楊俊俊楊洪子也恃勇桀驁不可馴先備獨石馬營等土黙特之變棄城逃歸馬營龍門等入城皆不守既而命為㕘將帥兵巡哨懐來等處復輒調永寧守備官軍于懐來將永寧城西門砌塞于謙劾其方命専權擅作威福詔宥不問俊又以私怒都指揮陶忠杖撻死父洪懼禍奏取俊還京隨營操練既至謙併劾其獨石棄城喪師辱國及懐來私仇捶死邊將之罪謂非誅俊無以懲戒將來兵科給事中葉盛等亦劾之于是逮繋法司議罪斬于市阿拉遣使貢馬請和邊臣留之懐來以聞是時韃靼政事額森専之兵最多托克托布哈雖為汗而兵少知院阿拉兵又少君臣鼎立外親内忌其合兵南侵利多歸額森而弊則均受及額森欲和恥屈意隂使阿拉等來言于是禮部㑹議請遣太常少卿許彬錦衣都指揮同知馬政譯來使情偽彬等言額森果欲議和罷兵且奉還上皇奏至帝問尚書學士陳循曰額森可和耶循曰遣而備之上曰然乃降璽書厚賜阿拉數額森挾詐義不可從即阿拉必欲和好待衛喇特諸部落北歸議和未晩不然朕不惜戰也六月吏部尚書王直等言額森遣使請上皇還京葢上下神祇隂誘其衷使之悔悟伏望皇上許其自新遣使臣前去審察誠偽如果至誠特賜俯納奉迎上皇以歸不復事天臨民陛下但當盡崇奉之禮庶天倫厚而天眷益隆上曰卿言甚當然此大位非我所欲葢天地祖宗宗室文武羣臣之所為也自大兄䝉塵朕累遣内外官員齎金帛迎請額森挾詐不肯聴若又使人往恐假以送駕為名羈留我使率衆來犯京畿愈加蒼生之患卿等更加詳之勿遺後患上皇駕至大同先是額森入冦聲言選戰馬奉上皇南歸是日至大同定襄伯郭登設計于城月門裏具朝服以候潛令人伏城上俟上皇入即下城閘板既及門冦覺之遂擁上皇退去武清侯石亨言雁門闗一帯山口雖已築塞賊猶漫山徑過須斷其半山可行之處京城四面宜築墩臺以便瞭望署都督僉事劉鑑言京師與懐來止隔一山請自懐來築烟墩直至京師土城遇事舉火以報從之秋七月額森屢以和議不成復俾其知樞宻院阿拉為書遣㕘政旺扎勒托歡等五人至京師請和禮部議尚書胡濙等奏奉迎上皇帝不允次日帝御文華殿召文武羣臣諭曰朝廷因通和壞事欲與冦絶而卿等屢以為言何也吏部尚書王直對曰上皇䝉塵理宜迎復乞必遣使勿使有他日悔帝不懌曰我非貪此位而卿等强樹焉今復作紛紜何衆不知所對于謙從容曰大位已定孰敢他議答使者冀以舒邊患得為備耳帝意始釋曰從汝從汝言已即退羣臣出文華門太監興安𫝊呼曰孰堪使者有文天祥富弼乎衆未答王直面赤厲聲曰是何言臣等惟皇上使誰敢勿行者安語塞入復時李實任禮科都給事中帝命興安𫝊㫖欲遣之對曰實不才然朝廷多事安敢辭興安入復命遂以李實為禮部右侍郎充正使羅綺為大理寺少卿充副使馬顯授指揮使為通事上御左順門召實等面諭曰爾等見托克托布哈額森立言有體上遺書托克托布哈汗其辭曰我國家與汗自祖宗来和好往來意甚厚往年奸臣減使臣賞遂失大義遮留朕兄今各邊奏報言汗尚留塞上殺掠人民朕欲命將出師念彼此人民上天赤子汗殺朕之人朕亦殺汗之人與自殺何異朕不敢恃中國之大人民之衆輕于戰鬬恐逆天也近得阿拉使奏言已將各路軍馬約束回營是有畏天之意深合朕心特遣使齎書幣送達汗其益體朕意副天心復降璽書諭額森及阿拉並遺汗額森阿拉白金文綺時閣臣及撫部諸臣承上意止言息兵講和不及迎復上皇意實等遂偕旺扎勒托歡行以十七日至額森營地名實巴爾圖既見額森讀璽書畢乃引見上皇上皇居巴延特穆爾營所居氊義帳服食飲皆羶酪牛車一乗為移營之具左右惟校尉袁彬暨和敏侍實等見上皇泣上皇亦泣上皇曰朕非為逰畋而出所以陷此者王振也因問太后皇上皇后俱無恙又問二三大臣上皇曰曽將有衣服否實等對曰往使至皆不得見天顔故此行但擬通問未将有也實等乃私以所有糗餌常服獻上皇曰此亦細故但與我圖大事額先欲歸我卿歸報朝廷善圖之儻得歸願為黔首守祖宗陵墓足矣言已俱泣下實等因問上居此亦思舊所享錦衣玉食否又問何以寵王振至此致亡國上皇曰朕不能燭姦然振未敗時羣臣無肯言者今日皆歸罪于我日暮實等歸宿額森營酌酒相待額森巴延貂裘胡帽其妻珠琲覆面垂肩盌酪盂肉更互彈琵琶吹笅兒按拍歌勸酒額森曰南朝我之世仇今天使皇帝入我國我不敢慢南朝若獲我肯留至今日乎又言皇上在此吾輩無所用之每遣使南朝令來迎竟不至何也實等反覆譬曉欲奉迎上皇意額森曰南朝遣汝通問非奉迎也若歸亟遣大臣來實等遂辭歸上皇出三書授實其一上皇太后其一達于上其一諭羣臣巴延特穆爾約實速來成和好且指額森幼子曰此與朝廷議姻者實不敢對實未至京㑹托克托布哈亦遣使丕勒瑪哈穆特請和右都御史楊善慨然請行人皆危善善曰上皇在沙漠此為臣者效命之秋也中書舍人趙榮亦請往乃遣善榮及指揮王息千戸湯𦙍勣同丕勒瑪哈穆特往道遇實實告以故善曰得之矣即敕書所無可權以集事也實既還朝具述額森情及上皇起居狀諸文武大臣合疏言李實出塞道中行北騎聞欲議和皆舉首加額及見額森殊喜言迎使夕來大駕朝發實又具道額森悔過宜迎復上曰額森詐楊善已去第以迎復意書敕付額森使還大臣言額森非詐也臣等詢李實詳矣彼使來和當遣使答今請迎復乃不與偕是輕迎駕重講和也不迎駕歸何以和為帝令再議李實言額森約臣迎駕毋出八月五日臣言須得㫖不敢擅為期額森言期必不可失遂令渠長偕羅綺往大同調還擾邊人馬臣還過懐來宣府見軍民始敢出郊芻牧誠非空言伏望陛下俯從羣請脱有虞詐亦可塞之若過所期更欲使臣亦不敢往帝竟付迎復于敕書而已不遣使曰待楊善歸監察御史畢鑾復言羣臣之情切矣陛下必待善歸夫中國所恃者信義也不迎不義失期非信就令彼詐我備在也翰林邢讓亦以為言帝曰上皇朕兄豈有不迎彼情叵測正欲探之情誠而迎又何暮焉楊善既出境額森使所善田民者為館伴來迎且有所探飲帳中謂善曰我亦中國人被留于此前者土木之役六師抑何弱也善曰當是時六師之勁悉南征而中貴人振欲邀太上幸故里止扈從一不為偹故潰雖然彼幸而勝未見為福今者南征之士悉歸可二十萬又募中外材官技擊得三十萬悉教以神鎗火砲藥弩射命中百步之外洞人馬復穿七札又用言者計沿邊要害皆隠金椎三尺所值蹄立穿刺客林立夜度營幕若猿猱而皆已矣置之無用矣問何以言無用曰和議成方且歡飲若兄弟而又何用也其人悉以語額森二十九日至額森營值其出獵八月初二日丁卯與額森相見額森問減馬價故善曰往時外使不過三十人今多至三千餘人即稚子亡弗賚者金帛器服絡繹載道而豈得言薄額森曰然則奈何留我使予我帛時剪裂幅不足者善曰帛有剪裂不足者通事為之也事露而誅矣即所進馬有劣弱而貂皮敝豈太師意耶至使臣所從人為奸盜他所或遇害中國留之何用額森又問市釡事善言此小民市易朝廷豈知善因歴述累朝恩遇之厚不可忘且言天道好生今縱兵殺掠上干天怒反覆辨論數千百言額森喜額森問上皇還更臨御否善言天位已定不得再易額森問古堯舜事如何善言堯讓位于舜今日兄讓位于弟額森悦服平章昻吉爾問善欲迎復來何操善言若操賄來迎後人以爾貪賄歸上皇今無所操而歸書之史冊後世皆稱述額森然其言曰史中好為書也巴延特穆爾請留使臣遣使欲南朝更請上皇臨御額森曰曩令遣大臣來迎大臣至矣不可無信引善見上皇明日額森設宴餞上皇于其營善侍額森與妻妾以次起為夀酒中令善坐上皇亦曰從太師言坐善曰雖草野不敢失君臣禮額森顧羨曰中國有禮罷酒送上皇出明日宴使臣又明日巴延特穆爾設宴餞上皇又明日亦宴使臣又明日癸酉上皇駕行額森與渠帥送車駕可半日許下馬解弓箭戰裾以進諸渠帥羅拜哭而去巴延特穆爾獨送上皇至野狐嶺進酒帳房既畢屏人語和敏曰我額森順天意敬事皇帝一年矣皇帝此來為天下也歸時還當作皇帝即我主人有緩急我可得告愬衆皆道傍送駕進牛羊善口呼皇帝行矣巴延特穆爾再送駕出野狐嶺口上皇攬轡慰藉而與之别巴延特穆爾大哭歸仍命渠帥率五百騎送至京師既别去行數里復有追騎至上皇失色既至乃其平章昂克出獵得一獐馳使來獻受之乃去駕入闗丁丑上皇至宣府南城上遣太常少卿許彬奉迎工部尚書髙穀給事中劉福等言奉迎上皇禮不宜薄禮部連日㑹議未定壬午上皇至宣府癸未千户龔遂榮投書于髙穀所穀袖入𫝊示文武大臣王直胡濙謂禮失而求諸野欲以上聞中止給事中葉盛程信于太上疏言諸大臣持一帖羣立午門傍聚觀議論藉藉乞宣問之書言上皇之出以宗社故非遊獵也都人聞上皇且還無不喜躍迎復禮宜厚上亦當避位懇辭然後復位否則貽譏後世上詰諸大臣已而知書出穀所上曰朕未嘗塞言路穀大臣胡不告朕為匿名書耶遂榮恐累穀乃發憤自白陳循王文見之恚甚請治其罪下錦衣衛獄然上不深罪也尋釋之己卯上皇至懐來將抵居庸禮部始得㫖羣臣同禮部議迎復儀注兵部總戎議防變方畧百官集㑹議所都御史王文忽厲聲曰孰以為來耶黠冦不索金帛必索土地耳衆素畏文相顧莫敢言給事中葉盛等造禮部問時胡濙已具儀注送内閣矣畧謂天寶之亂𤣥宗幸蜀肅宗即位靈武尊𤣥宗為太上皇帝肅宗收復兩京迎還上皇至咸陽備法駕望顔樓上皇在宫南樓肅宗著紫袍望樓上拜舞樓下上皇降樓撫肅宗而泣辭黄袍自為肅宗著之肅宗伏地頓首固辭上皇曰天下人心皆歸于汝使朕得保餘齡汝之孝也肅宗乃受今備法駕安定門外誠為太簡帝曰慮墮狡冦計故簡其禮大兄入城朕知尊親遂備法駕候安定門外庚辰上皇至唐家嶺遣使回京詔諭避位免羣臣迎丙戌百官迎上皇于安定門上皇自東安門入上迎拜上皇答拜各述授受意遜讓良久乃送上皇至南宫羣臣就見而退大赦天下命保定伯梁瑶征苗冦以河間等降丁從征先是永樂間塞北部落來降者多安置河間東昌等處生養蕃息强悍不可制方額森入冦乗機騷動至是大發兵征兩廣湖貴苗冦兵部尚書于謙奏遣之其有名號者厚賞犒随軍有功則官之已而更遣其妻子往自是肘腋無他患二年秋九月額森遣使求通好固邀我使往報上從言官議詔絶之三年夏四月命都督同知孫安鎮守獨石馬營以兵科都給事中葉盛為山西右㕘政協贊軍務先是楊洪鎮獨石馬營等八城已已失守殘毁未復議者欲棄之于謙曰棄之則不但宣府懐來難守京師不免動揺乃薦安授以方畧仍命盛贊其軍務盛至列利害八條以進次第行之率兵度龍門闗且戰且守八城完復如舊盛又請帑金五千兩買牛犢簡戍卒不任戰者俾事耕稼嵗課餘糧于官凡軍中買馬修器勞功恤孤諸費皆取之盛在獨石五年軍民賴之邊境得安時土黙特北狩浙閩三楚貴竹盜賊蠭起前後命將將兵皆出謙獨運號令明審動合機宜雖宿舊勲臣少不中程律即請㫖切責不貸片紙行萬里電燿霆擊靡不惴惴効力毋敢飾虚辭以抵者以故天下咸服謙而歸上能用人谷應泰曰英宗北狩戰士兵甲死亡畧盡邊闗守隘望風奔潰揺足之間黃河以北非國家有矣幸而遷都議格鐘簴不驚然而君父叩闗臣子拒敵彼出有名我負不義狐疑既生上下瓦解講使亟行責問無已長安必不可守英宗必不能歸徒使有貞之輩操星象而笑其後也嗟乎南遷不行然後國存和議不行然後君存兩議俱息君國皆存而少保之禍不得旋踵矣當夫北兵四合守禦單寒虎穴故君已置度外圍城新主亦危孤注身先矢石義激三軍家置環寺之薪人守州兵之哭傲如石亨怯如孫鏜懦如王通無不斬將搴旗緣城血戰追奔逐北所向披靡此一役也軍聲復振君臣固守陵闕磐石矣然而遣使入朝動請迎駕懸師剽掠輒托回鑾彼直我曲彼壯我老額森者方且挾此奇貨羈制中原以戰不敗以和可成輸幣不還進而割地割地不歸誘之稱臣中原生靈自此無安枕矣而乃兄終弟及父子之情既割社稷為重君臣之義亦輕至則龍衣糗食敬輸槖饘之忱歸亦别院閒宫不過漢家之老然則挾天子者挾一匹夫耳邀利之心懈而好義之心萌郭登之言決而楊善之説行英皇自此生入玉門矣昔太公置鼎漢祖分羹徽欽被執宋髙哀請一則新豐雞犬還老闕庭一則淚灑氷天終于輿櫬葢相如碎璧而璧存賈胡藏珠而珠去擁空名者視同虚器居必爭者勢難瓦全也夫昭王沈漢穆滿難歸楚懐入秦頃襄不反彼此得失危不間髪故漢髙分羹之語乃孝子之變聲郭登有君之謝實忠臣之苦節英宗不感生還反疑予敵謙死東曹登貶南都忠臣義士所以仰天椎心而泣血也景帝外倚少保内信興安狡冦危城不動聲色當時朝右豈乏汪黄建炎踐祚亦有宗李相提而論景誠英主而乃戀戀神器則又未聞乎大道者也明史紀事本末卷三十三
