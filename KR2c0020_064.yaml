body:
  text: 明史紀事本末卷六十四浙江提學僉事谷應泰編平楊應龍神宗萬厯十七年四川播州宣慰司使楊應龍反按播州夜郎且蘭地漢屬牂牁郡唐貞觀初分牂牁北界置郎州領六縣已改播州乾符三年南詔寇陷太原楊端應募決策馳白錦出竒兵定之授武略將軍值唐亂留據長子孫歷宋附屬稱臣大觀中楊文貴納土置遵義軍元世祖授楊邦憲宣慰使賜子漢英名賽音布哈封播國公國初楊鑑內附改播州宣慰司使𨽻四川其域廣袤千里介川湖貴竹間西北塹山為關東南附江為池䝉茸鑱削居然奧區領黃平草塘二安撫真播白泥餘慶重安容山六長官司統田張袁盧談羅吳七姓世為目把嘉靖初楊相寵庶子煦欲奪嫡嫡妻張與子烈擁兵逐相走水西客死水西宣慰安萬銓挾奏索水烟天旺地聽還葬烈即應龍父也自烈仇殺長官相攻剽垂十年總督侍郎馮嶽討平之應龍生而雄猜尤阻兵嗜殺隆慶六年襲職以從征喇麻諸畨九絲膩乃楊柳溝等多郤敵先登斬獲無算先後賜金幣萬厯十二年進大木六十本助工上特給大紅飛魚服加職級應龍窺蜀兵弱每征討止調土司而蜀將或從借給漸驕蹇輕縱法所居僣飾龍鳯擅用閹寺嬖小妻田雌鳯疑嫡妻張姦淫出之已飲田氏兄所乘醉封刃取張并其母首屠其家應龍在州專酷殺樹威益結關外生苗為翼肆行劫掠於是妻叔張時照與所部何恩宋世臣等上飛文告龍反巡撫貴州葉夢熊疏請發兵勦之而蜀中士大夫率謂蜀三面鄰播屬裔以十百數皆其彈壓且兵驍勇數赴征調有功剪除未為長策以故蜀撫按並主撫朝議行西省會勘應龍願赴蜀不赴黔二十年十二月逮楊應龍詣重慶對簿繫論法當斬請以二萬金贖御史張鶴鳴方駁問會倭大入朝鮮羽檄徴天下兵應龍因訴辨願自將五千兵征倭報效詔可釋之兵已啓行尋報罷巡撫都御史王繼光至嚴提勘結遂抗不復出而張時照等復詣奏闕下王繼光乃一意主勦二十一年春正月撫臣王繼光馳至重慶與總兵劉承嗣恭將郭成等議分三軍各道並進時軍至婁山等關屯白石口應龍佯令其黨穆照等約降因統苗兵據關衝殺都司王之翰軍覆殺傷大半會繼光論罷即撤兵委棄輜重略盡黔師協勦亦無功以談希思為四川巡撫與總兵劉承嗣會同貴州撫鎮相機征勦時王繼光既罷御史薛繼茂乃旋主撫應龍亦上書自白御史吳禮嘉劾郭成等失律令戴罪立功尋劉承嗣以疾乞骸骨兩省議久不決應龍遣其黨攜金入京行間執原奏何恩詣綦江縣二十二年三月以兵部侍郎邢玠總督貴州車駕郎中張國璽主事劉一相贊畫軍前二十三年春正月總督邢玠乘傳至蜀察永寧酉陽暨馬千斛皆應龍姻媾而黃平白泥諸司久為仇讐計先剪其枝黨以檄曉譬應龍大略稱引哱劉事謂龍來當待以不死不者國家懸萬金購而頭若早為計吾不而欺也會水西宣慰安疆臣請父國亨恤典兵部尚書石星手札示疆臣趨應龍就吏得貫罪疆臣亦奉札至播招龍當是時七姓惟恐龍出得除罪而四方亡命竄匿其間又幸龍反因以為利院道文移輒從中阻四月重慶太守王士琦奉總督邢玠檄詣綦江縣趨應龍安穩聽勘士琦屬綦江令前往宣諭應龍使弟兆龍至安穩治郵傳儲糧郊迎叩頭致餔資餼牽如禮曰應龍久縛渠魁待罪松坎所不敢至安穩者以安穩多奏民伏兵伺殺往有明鑑誠恐中計故不敢出使君幸枉車騎臨貺松坎敬布腹心綦江令具言太守太守曰松坎亦曩奏勘地也即以五月八日單騎往松坎應龍果面縛道旁泣請死罪膝行前席叩頭流血請治公館執罪人及罰金獻廷中得自比安國亨國亨者曩亦被訐懼罪不出界故應龍引之太守為請總督乃遣贊畫張國璽劉一相及道府詣安穩應龍囚服蒲服郊迎縛獻黃元阿羔阿苗等十二人案驗抵應龍斬以其族得論贖輸四萬金助採木仍革職子朝棟以土舍受事次子可棟羈府追贖黃元等梟斬重慶市總督以聞是時倭氛未靖大司馬欲緩應龍專事東方天子亦以應龍向有積勞可其奏總督議設撫彛同知治松坎從之論功加邢玠右都御史還朝以重慶太守王士琦為川東兵備使彈治之應龍再及寬政益怙終不悛而次子可棟尋死重慶則心益痛促取尸棺以勘報未完不肻發趣其完贖大言曰吾子活銀即至矣擁兵驅千餘僧招魂而去分遣土目置闕據險僣立巡警搜戮軍民劫掠屯堡殆無虛日厚撫諸苗用以摧鋒名硬手州人稍殷厚者沒其家以養苗由是諸苗人願為之出死力矣二十四年七月楊應龍肆逆劈餘慶土吏毛承雲棺磔其尸已又掠大阡都壩焚劫餘慶草堂二司遍及興隆偏鎮都勻各衛遣弟兆龍引兵圍黃平戮重安司長官張熹家勢復大熾二十五年三月楊應龍流劫江津縣及南川十二月楊應龍臨合江索其讐袁子升縋城下臠割之石砫宣撫司土舍馬千駟入播先是千駟母覃與應龍私覃寵千駟謀奪長子千乘爵於是聘應龍次女為聲援二十六年十一月兵備副使王士琦調征倭楊應龍益統苗兵大掠貴州洪頭高坪新村諸屯已又侵湖廣四十八屯阻塞驛站詗原奏讐民宋世臣父鑾及羅承恩等挈家匿偏橋衛城襲執指揮陳天寵等大索城中得鑾承恩及子女慘戮以殉令諸苗對父奸女面夫淫妻或裸體坐木叢射笑樂或燒蛇從隂入腹人蛇俱斃又掘墳墓焚尸灰飛蔽天巡撫四川都御史談希思請于合江綦江各置遊擊一員合江募兵千二百人扼岡門綦江募兵二千人扼安穩二十七年二月貴州巡撫江東之令都司楊國柱指揮李廷棟部兵三千勦楊應龍龍遣子朝棟弟兆龍何漢良等迎敵于飛練堡我師奪三百落賊佯走天邦囤誘我師殱之楊國柱罵賊不屈與經歷潘汝資等俱死於是江東之坐浪戰罷以郭子章代之起前都御史李化龍兼兵部侍郎節制川湖貴三省兵事决意進勦調東征諸將南征劉綎督川兵先發麻貴陳璘董一元相繼回兵五月總督馳至蜀即請設標兵益調募浙閩滇粵將士檄總兵萬鏊自松潘移重慶并調集鎮雄永寧各漢土兵設防六月楊應龍乘我師未集大勒兵犯綦江分屯趕水猫兒岡婁國等以偏師一犯南川一犯江津其子朝棟守沙溪緝麻山防永寧宣撫與貴州十七日遊擊張良賢遇賊舊東溪頗有斬獲二十一日應龍督苗兵圍綦江城數匝遊擊房嘉寵誤爇火磚反傷城上兵賊乘勢登城嘉寵帥師巷戰蜀兵爭譟走水上嘉寵乃殺其妻與良賢赴敵死應龍因劫令縱囚焚掠出綦江庫犒師依倉就食盡取資財子女去老弱者殺之投尸蔽江而下水為赤退屯三溪以綦江之三溪毋渡南川之東鄉壩立石為播界號宣慰官莊聲言江津合江皆播故土總督郭子章日夜徴調漢土各兵守渝城分戍南川合江瀘州軍聲漸振賊遷延不進初賊本無意竟反徒以安忍猖狂既覆我師飛練則騎虎勢不終下益結九股生苗及紅黑腳等苗負險弄兵然猶冀我如往事曲宥未敢鼓行深入止言爭界給葬并索奸民而總督因我援師未集蜀人畏賊如虎時時移文詰責示無遽絶意計以緩賊賊果具文求撫不復西向總督亦謬為好語縻之止駐會城調度示賊無張皇已上聞破綦江追褫兩省撫臣談希思江東之各為民緹綺逮兵偹使王貽德賜劍懸賞嚴㫖進勦總督益調各路兵專俟大舉十月命總督李化龍駐重慶調度川貴湖廣兵總兵劉綎兵亦至綎素有威名其家丁良馬皆可决勝然夙與應龍昵人皆疑之於是總督延入卧內輸心腹且以危言激之引其父顯九絲功為比綎大慟願誓死報效總督乃騰書于朝遂委綎專制而總督治軍益有次第十一月楊應龍屯官壩聲窺蜀已遂焚東坡爛橋楚黔路梗黃平龍泉所在告急賊復據偏橋出掠興隆鎮逺總督議置徑兵萬餘據要害通楚黔道黔帥童元鎮擁兵銅仁不前革職立功以李應祥代命僉都御史江鐸巡撫偏沅監總兵陳璘之師三十八年春正月楊應龍勒兵數萬五道並出攻龍泉司守偹楊維忠擁兵二千以勢不敵先期托臺謁走思南鸚鵡溪土官安民志率步卒五百拒守死之吏目劉玉鑾偕妻子並死于賊副總兵陳良玭託守偏橋不之援石砫宣撫司馬千乘軍鄧坎賊乘夜掩襲我軍堅壁詰旦奮擊連破金竹青岡觜虎跳關等七寨酉陽宣撫司冉御龍進攻官壩斬關直上復擒斬三百有竒初賊既下龍泉方移兵攻婺州聞敗撤兵遁徴兵大集延寧四鎮河南山東天津滇浙粵西兵至者踵背相屬各土司亦用命總督李化龍分兵八路川師分四路總兵劉綎從綦江入以恭將麻鎮等𨽻參政張文耀監之總兵馬孔英從南川入以恭將周國柱宣撫冉御龍等𨽻僉事徐仲佳監之總兵吳廣從合江入以遊擊徐世威等𨽻參議劉一相監之副將曹希彬受吳廣節制從永寧入以參將吳文傑宣撫奢世績等𨽻恭議史旌賢監之而中軍率標下遊兵䇿應黔師分三路總兵童元鎮統土知府瀧澄知州岑紹勳等由烏江參將朱鶴齡受元鎮節制統宣慰安疆臣等由沙溪總兵李應祥統宣慰彭元瑞等由興隆恭議張存意按察司楊寅秋監之湖廣偏橋一路分兩翼總兵陳璘統宣慰彭養正等由泥副總兵陳良玭受璘節制統宣撫單宜等由龍泉副使胡桂芳參議魏養䝉監之以偏橋江外為四牌江內為七牌五司遺種及九股惡苗盤據故也其黔撫郭子章駐貴陽楚撫支可大移沅州部署既定大會文武于重慶登壇誓師二月十二日分道並發每路兵約三萬人官兵三之土司七之苗見驚曰今畨真天兵與昔不同總督諭諸將以抵婁山等關為期移鎮重慶節制且曰關外且戰且招降多不可勝誅也關內疾戰勿受降師不可久老賊詐不可信也先是蜀玉壘山忽裂僉謂昔年平九絲地數動殆播平前兆云十五日劉綎進入綦江連戰破三峒綦江自東溪入播並峻嶺茂箐楠木山羊簡臺三峒素號竒險賊首穆照等盤據綎力戰克之三月楊朝棟統苗兵數萬分道迎敵鋒甚鋭我師夾擊綎身自陷陳苗大驚曰劉大刀至矣棟潰圍走幾為我獲初綦江諸苗自分屠城慘戮罪不赦又應龍憚綎威名冀首挫其鋒屬朝棟悉徑兵間道相角曰爾破綦江馳南川盡焚積聚餘無能為也及朝棟僅以身免賊膽落益為守禦計諸軍分道並捷南川則酉陽石砫二司先登初八日遂克桑木關烏江則壩陽永順兵先登十一日遂克烏江關翌日克河渡關陳璘及副將陳寅擊四牌賊各披靡遂奪天都三百落諸囤賊連敗乃乘隙出竒兵突犯烏江詐稱水西瀧澄會哨誘永順兵斷橋淹死我師無算恭將楊顯守備陳雲龍阮王竒白明逵指揮楊續芝等死之事間逮總兵童元鎮下于理時有飛語水西佐賊者總督檄詰水西不自安會賊殺其頭目澄大眼二十六日賊託田氏修好賄澄澄戮其使擊斬僞將楊惟棟等安疆臣亦執賊二十餘人以示不背二十九日劉綎戰九盤入婁山關關為賊前門萬峯插天中通一線我師從間道攀藤魚貫毁栅入四月朔屯白石應龍身率各苗决死戰隂令楊珠等抄後山奪關四面合圍都司王芬中流矢死劉綎親勒騎衝堅以遊擊周敦吉守備周以德分兩翼夾擊敗之追奔至養馬城與南川永寧路合連破龍爪海雲險囤壓海龍囤而壘海龍囤賊所倚天險飛鳥騰猿不能踰者時偏沅巡撫都御史江鐸已抵任視師陳將軍璘帥師急攻以十三日破青蛇囤安疆臣亦以十六日奪落濛關至大水田焚桃溪莊賊見勢急父子相抱哭上囤死守每路投降文緩我師總督檄賊詭降即斬使焚書毋為所紿虞綎與應龍舊檄無通賊綎械其人自明而吳廣以朔三日入崖門關營水牛塘與賊力戰三日却之賊詭令婦人于囤上拜表痛哭云田氏且降復詐為應龍仰藥死報廣廣輕信按兵不動已覘知田氏詐降緩攻而所云應龍死乃川兵攻囤以火炮擊死所謂楊珠也珠驍勇善戰既死賊痛如失左右手廣覺詐益厲兵協攻燒二關奪三山絶賊樵汲八路兵大集海龍囤下五月十八日始築長圍更畨迭攻自是賊坐困窮崖知兵在頸矣會總督李化龍聞父喪詔以縗墨視師化龍跣而草檄益治軍念賊囤前陡絶勢難飛越令馬孔英率徑兵壁其間餘併力攻後囤時天苦雨將士馳淖中苦戰六月四日天忽開朗五日劉綎身先士卒進克土城應龍益迫夜散數千金募死士拒戰諸苗皆駭散無應者起提刀自巡壘就四面火光燭天傍徨長歎泣語妻子曰吾不能復顧若矣詰朝我師遂登囤破大城入應龍倉皇同愛妾二闔室縊且自焚吳廣獲其子朝棟及妾田雌鳯急覔尸出焰中廣中火毒失聲幾絶頃而蘇計出師至滅賊百十有四日八路共斬級二萬餘生獲朝棟兆龍等百餘人播賊平總督露布以聞劉將軍綎為軍功冠十二月獻俘闕下銼楊應龍尸磔楊朝棟兆龍等于市分播地為二屬蜀者曰遵義屬黔者曰平越谷應泰曰楊應龍播州土司官也其地屬漢牂牁郡唐乾符中楊端應募長子孫焉厯宋元皆授世官明室因之應龍生而雄猜尤阻兵嗜殺然其賔叛不一荒忽無常亦土司之風類然也應龍之初從征喇麻進貢大木亦嘗效忠順膺賞賚矣乃以嬖小妻田雌鳯屠妻張氏之家而何恩宋世臣連章告變黃牛白泥諸司久為仇讐于凡七姓諸豪咸喜龍之得罪不欲其就徴對簿而五司遺種九股頑苗及輕剽好作亂之徒又鼓動其間同惡相濟龍雖狼子野心亦所謂生長蠻鄉無與為善者也所幸援兵大集調度多方督臣李化龍發蹤之才總戎劉綎軍功之冠于時八路分兵四月告捷卒之應龍戮尸朝棟棄市威震遐荒功業爛焉然而重慶之會登壇誓師海龍之圍尅期並到兵法曰兵貴有謀又曰以多算勝固先定其規模非漫嘗于一擊也若應龍者倔强偏陲不知漢大宗嗣蕩滅取世戮笑尤足為憑險負固之戒悲夫明史紀事本末卷六十四
