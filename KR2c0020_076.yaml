body:
  text: 明史紀事本末卷七十六浙江提學僉事谷應泰編鄭芝龍受撫熹宗天啓七年六月海冦鄭芝龍等犯閩山銅山中左等處芝龍泉州南安縣石井巡司人也芝龍父紹祖為泉州庫吏蔡善繼為泉州太守府治後衙與庫隔一街相望芝龍時十嵗戲投石子誤中善繼額善繼擒治之見其姿容秀麗笑曰法當責而封遂釋之不數年芝龍與其弟芝虎流入海島顔振泉黨中為盜後振泉死衆盜無所統欲推擇一人為長不能定因共禱于天貯米一斛以劒插米中使各當劒拜拜而劒躍動者天所授也次至芝龍再拜劒躍出於地衆咸異之推為魁縱橫海上官兵莫能抗始議招撫以蔡善繼嘗有恩於芝龍因量移泉州道以書招之芝龍感恩為約降及善繼受降之日坐㦸門令芝龍兄弟囚首自縛請命芝龍素德善繼屈意下之而芝虎一軍皆譁竟叛去六年春遂據海島截商粟閩中大饑望海米不至于是求食者多往投之七月劫商民船勢浸大其黨謀攻廣東海豐嵌頭村以為穴芝龍乃入閩泊于漳浦之白鎮時六年十二月也巡撫朱一馮遣都司洪先春率舟師擊之而以把總許心素陳文廉為䇿應鏖戰一日勝負未決㑹海潮夜生心素文廉船漂泊失道賊暗度上山詐為鄉兵出先春後先春腹背受敵遂大敗身被數刃然芝龍故有求撫之意欲微達于我兵乃舍先春不追獲盧遊擊不殺又自舊鎮進至中左所督帥俞咨皋戰敗縱之走中左人開城門求不殺芝龍約束麾下竟不侵擾警報至泉州知府王猷知其詳乃曰芝龍之勢如此而不追不殺不焚掠似有歸罪之萌今勦難猝滅撫或可行不若遣人往諭退舟海外仍許立功贖罪有功之日優以爵秩興泉道鄧良知徔之遣人諭意愍帝崇禎元年春正月工科給事顏繼祖劾福建總兵俞咨皋下獄初巡撫朱欽相招撫海寇楊六楊七等鄭芝龍求返內地楊六紿其金不為通遂流劫海上繼祖上言海盜鄭芝龍生長于泉聚徒數萬劫富施貧民不畏官而畏盜總兵俞咨皋招撫之議實飽賊囊舊撫朱欽相聽其收海盜楊六楊七以為用夫撫冦之後必散于原籍而咨皋招之海即置之海今日受撫明日為冦昨嵗中左所之變楊六楊七杳然無踪咨皋始縮舌無辭故閩帥不可不去也疏入逮咨皋下于理三月禁漳泉人販海芝龍縱掠福建浙江海上六月兵部議招海盜鄭芝龍九月鄭芝龍降于巡撫熊文燦工科給事顏繼祖言芝龍既降當責其報效徔之二年春二月海盜李魁奇伏誅魁奇本鄭芝龍同黨芝龍忌之擊斬粵中夏四月廣東副總兵陳廷對約鄭芝龍勦盜芝龍戰不利歸閩不數日寇大至犯中左所近港芝龍又敗寇夜薄中左所四年春正月上召廷臣及各省監司于平臺問福建布政使吳𤾉陸之祺海寇備御若何𤾉曰海寇與陸冦不同故權撫之但官兵狃撫為安賊又因撫益恣致數年未息上曰前撫李魁奇何又殺之𤾉曰魁奇非鄭芝龍比即撫終不為我用今鍾斌雖撫亦反側不可保也上問實計安在祺曰海上官兵肯出死力有司團練鄉兵多設火器以守為戰勦之不難上問巡撫熊文燦𤾉曰文燦才膽俱優但視賊太易故前有吉了之敗祺曰鍾斌與鄭芝龍勢不兩立七月間斌擾福州撫臣計誘往泉州前聞撫臣同芝龍討賊僇其兄賊遁去問廣東布政使陸問禮對曰廣東海冦俱自福建至舟大而多火器兵船難近但守海門勿令登陸則不為害五年冬十一月海盜劉香老犯福建小埕遊擊鄭芝龍擊走之六年夏六月海盜劉香老犯長樂七年夏四月海盜劉香老犯海豐十二月總督兩廣熊文燦奏道將信賊自陷時文燦令守道洪雲蒸巡道康承祖參將夏之本張一傑往謝道山招劉香老被執上以賊渠受撫自當聽其輸誠豈有登舟往撫之理弛備長冦尚稱未知督臣節制何事命巡按御史確核以聞已令文燦戴罪自效八年夏四月福建遊擊鄭芝龍合粵兵擊劉香老于田尾逺洋香老脅兵備道洪雲蒸出船止兵雲蒸大呼曰我矢死報國亟擊勿失遂遇害香老勢蹙自焚溺死康承祖夏之木張一傑脫歸八月香老家屬六十餘人部屬千餘人至黃華降于溫處參軍十三年秋八月加福建參將鄭芝龍署總兵芝龍既俘劉香老海氛頗息又以海利交通朝貴寢以大顯十六年冬十一月設南贛兵三千以副總兵鄭鴻逵統之十七年春正月前兵科都給事中曾應遴薦副總兵鄭鴻逵緩急可用詔益南贛兵二千命鴻逵鎮守踰年鴻逵以舟師守鎮江我清兵南下潰歸鄭芝龍降谷應泰曰海上亡賴奸民多相聚為盜自擅不討之日久矣蓋以魚鹽蜃蛤商舶往來剽掠其間者纍千金利則乘潮上下不利則嘯聚島中儼然以夜郎扶餘自大東南邊徼益騷然苦之矣泉州人鄭芝龍管庫之子也年未弱冠為海冦顏振泉所掠振泉愛芝龍狀貌因有寵泉死衆推為魁然而龍特饒智數桀黠喜持兩端其他無絶殊者方其侵暴外洋也輸金于楊六緩追于洪先春黃巾未破于曹公赤眉約降于光武其持兩端者一也及其受撫內地也私鬬則勇于魁奇公戰則怯于廷對殺陳餘于泜水縱匡術于石頭其持兩端者二也又若擁兵閩越援立外藩定䇿功髙闔門橫玉而乃陰懷首鼠百計沮軍滹沱既未合兵東吳豈能遽下居異人為奇貨以澶淵為孤注其持兩端者三也又若關門既下釋甲入臣居第京師招搖海上曾無麟閣之功但比遼東之豕隗囂侍子而身返于外延之在臺而子更舉兵其持兩端者四也夫奉先之天在于去就輕脫故依建陽則背建陽依董卓則背董卓牢之之敗在于天性反覆故附道子則反道子附元顯則反元顯今芝龍以盜賊之雄挾遨遊之智而鷹眼不化狼心已成身在樊籠之中志存江湖之上一旦緩急可得信乎然豫又怪崇禎之初芝龍既撫鋭意行金織皮丹珀來自賈胡眀珠文犀至皆兼兩是以薦剡頻上爵秩屢貤坐論海王奄有數郡人但知元龜象齒都自淮來而不知寶玉大弓原從魯竊若能卻盜泉之水則不至奪君子之器矣說在孔子之對康子也眀史紀事本末卷七十六
