body:
  text: 明史紀事本末卷六十二浙江提學僉事谷應泰編援朝鮮神宗萬厯二十年五月倭酋平秀吉冦朝鮮平秀吉者薩摩州人僕也始以魚販卧樹下有山城州倭渠名信長居關白職位出獵遇吉欲殺之吉善辨信長收令養馬名曰木下人信長賜與田地於是為信長畫策遂奪二十餘州會信長為其恭謀阿竒支刺殺吉乃統信長兵誅阿竒支遂居關白之位因號關白以誘劫降六十六州朝鮮釜山與日本對馬島相望時有倭戶往來互市通婚姻時朝鮮王李昖湎於酒弛備吉乃分遣其渠行長清正等率舟師數百艘逼釜山鎮五月潜渡臨津分陷豐德諸郡時朝鮮承平久怯不諳戰皆望風潰朝鮮王倉卒棄王京令次子暉攝國事奔平壤已復走義州願內屬倭遂渡大同江繞出平壤界是時倭已入王京毁墳墓劫王子陪臣剽府庫蕩然一空八道幾盡沒旦暮且渡鴨緑請援之使絡繹於路廷議以朝鮮屬國為我藩籬必爭之地遣行人薛潘諭其王以匡復大義揚言大兵十萬已擐甲至賊抵平壤朝鮮君臣勢益急出避愛州七月遊擊史儒等師至平壤不諳地利且霖雨馬奔逸不止儒戰死副總兵祖承訓統兵三千餘渡鴨緑江援之僅以身免報至朝議震動以宋應昌為經略員外劉黃裳主事袁黃贊畫軍前八月倭入豐德等郡我兵稍集而行長等頗習兵詐謂不敢與中國抗以緩我師兵部尚書石星亦謂諸將未得利計無所出議遣人探之嘉興人沈惟敬應募惟敬者市中無賴也是時平秀吉次對馬島據王京分其將行長等各發兵守要害為聲援惟敬至平壤行長令牙將以肩輿迎之時平秀吉廢山城君自號大閣王惟敬至執禮甚卑行長跪曰天朝幸按兵不動我亦不久當還當以大同江為界平壤以西盡歸朝鮮耳惟敬既還奏廷議以倭多變詐未可信我師利速戰乃趣應昌等統兵進擊而石星頗惑之以惟敬緩急可任題假遊擊赴軍前且請金行間八月布衣程鵬舉請發暹羅兵自海道搗其巢穴時以為竒䇿又朝議調播州楊應龍援朝鮮十二月以李如松為東征提督上憫東征將士寒苦特發冏金十萬犒慰且重懸賞格先是宋應昌抵山海關士馬芻糧徴調未集而大將軍李如松甫平西夏亦未至軍因謬借惟敬縻倭西向前所羽檄徴兵七萬餘至者半乃置三軍以副將李如柏將左張世爵將右楊元將中軍趨遼陽至是如松始至軍而惟敬歸自倭稱行長願退平壤迤西以大同江為界如松大會將吏叱惟敬憸邪當斬參軍李應試請間曰籍惟敬紿倭封而隂襲之竒計也應昌如松以為然乃置惟敬標營二十五日誓師東渡如松將諸鎮士馬四萬餘東由石門度鳯凰山馬皆汗血臨鴨緑江天水一色望朝鮮萬峯出沒雲海監軍劉黃裳慷慨誓曰此汝曹封侯地也二十一年正月平壤大捷初沈惟敬三入平壤約以正月七日李提督齎封典過肅寧館至是初四日我師抵肅寧行長遣牙將二十人來迎如松檄遊擊李寧生縛之倭猝起格鬭僅獲三人餘走還告行長行長問惟敬曰此必通事兩誤耳行長令親信小西飛禪守藤隨惟敬謁如松如松加撫遣歸六日抵平壤行長竚風月樓候瞻龍節倭俱花衣夾道迎候如松分布將士整營入城諸將逡巡未入形已露倭悉登陴拒守如松度地形東南並臨江西枕山陡立惟迤北牡丹臺髙聳最要三倭列拒馬地炮以待遣南兵試其鋒佯退是夜倭襲李如柏營擊却之如松因部勒諸將諭無割級攻圍止缺東面屬游擊吳惟忠攻牡丹峯隂取西南以倭易麗兵令祖承訓等詭麗裝潜伏八日黎明鼓行抵城下攻其東南倭炮矢如雨軍稍却如松手斬先退者以徇募死士援梯鈎而上殺數人不退倭悉力拒守倭方輕南面為麗兵承訓等乃卸裝露明甲倭急分兵拒堵如松已督楊元等從小西門先登李如柏等亦從大西門入火藥並發毒烟蔽空方戰時吳惟忠中鉛洞胸猶奮呼督戰而如松坐騎斃於炮易馬馳墮塹鼻出火麾兵愈進我師無不一當百前隊貿首後徑已踵突舞於堞倭退保風月樓夜半行長堤兵渡大同江遁還龍山是役凡得級千二百八十五餘死於火及從城東跳溺無算裨將李寧查大受等率精兵三千潜伏江東僻路獲級三百六十二生擒三倭乘勝追襲十九日李如柏進復開城得倭級百六十五朝鮮郡縣如黃海平安京畿江源四道並復平歸平壤惟咸鏡道為清正拒守聞開城破亦奔王京王京為朝鮮都會咸鏡忠清為之犄角頗據天險而援師既連勝有輕敵心二十七日去王京七十里朝鮮人以倭棄王京遁告如松信之將輕騎趨碧蹄館去王京三十里馳至大石橋馬蹶傷額幾斃倭猝至圍之數里將士殊死戰自己至午弇中矢且盡金甲酋前摶李將軍甚急裨將李有升以身蔽如松刃數倭竟中鈎墮為倭支解李如柏李寧乃益遮夾擊李如梅箭中金甲倭墜馬會楊元援兵至砍重圍入遂潰而我精鋭亦多喪失過橋者盡死天且雨近王京平地俱陷畦氷解泥深騎不得騁倭背山面水連珠布營城中廣樹飛樓鳥銃自穴中出應時斃我師乃退駐開城三月經略宋應昌檄劉綖陳璘水陸濟師上益發帑金二十萬住軍興時諜者言王京倭二十萬且聲言關白揚帆入犯李如松分留李寧等駐開城楊元等軍平壤扼大同江接餉道李如柏等軍寶山諸處為聲援查大受等軍臨津而將鋭卒東西䇿應聞倭將平秀嘉據龍山倉粟數十萬從間道縱火盡焚之倭乏食東師議欵初我師捷平壤鋒甚鋭轉戰開城勢如破竹及碧蹄之敗久頓師絶域氣益索經略宋應昌急圖成功於是惟敬之欵始用而倭芻糧並燼行長亦懲平壤之敗有歸志因而封貢之議起經略既得請於朝赦不窮追且得倭報惟敬書乃益令游擊周𢎞謨同惟敬往諭倭獻王京返王子如約縱歸倭果於四月十八日棄王京遁如松及應昌整衆入城所餘米四萬餘芻豆稱是如松以兵臨漢江尾倭後欲乘惰歸擊之而倭步步為營用分番迭休法以退别將劉綎帥兵五千趨尚州鳥嶺鳥嶺廣亘七十餘里懸崖鑱削中通一道如線灌木叢雜騎不得成列倭尚拒險而别將查大受祖承訓等由間道踰槐山出鳥嶺後倭大驚前移釡山浦築居屯種為久戍計我師乃張疑兵分遣劉綎祖承訓等屯大丘忠州檄調全羅水兵龜船分布釡山海口時倭已棄王京漢江以南千有餘里朝鮮故土奄然還定兵科給事中侯慶逺謂我與倭何讐為屬國勤數道之師力爭平壤收王京挈兩都授之存亡興滅義聲振海外矣全師而歸所獲實多上乃諭朝鮮王還都王京整兵自守我各鎮兵久疲海外以次撤歸應昌復疏稱釜山雖瀕南海猶朝鮮境有如倭覘我罷兵突入再犯朝鮮不支前功盡棄考輿圖朝鮮幅員東西二千里南北四千里從西北長白山發脈南跨全羅界向西南止日本對馬島偏在東南與釜山對倭船止扺釜山鎮不能越全羅至西海蓋全羅地界直吐正南迤西與中國對峙而東保薊遼與日本隔絶不通海道者以有朝鮮也關白之圖朝鮮意實在中國我救朝鮮非止為屬國也朝鮮固則東保薊遼京師鞏於泰山矣今日撥兵協守為第一䇿即議撤宜少需時日俟倭盡歸量留防戍部覆南兵暫留分布朝鮮量簡精兵三千善後餘盡撤如前議六月沈惟敬歸自釜山同倭使小西飛禪守藤來請欵而倭隨犯咸安晉州逼全羅聲復江漢以南以王京漢江為界李如松計全羅沃饒南原府尤其咽喉乃命李平胡查大受鎮南原祖承訓李寧移南陽劉綎移陜州已倭果分犯我師並有斬獲兵科給事中張輔之謂倭聚釜山原佯退誘我撤兵圖漸逞無故請貢非人情今猝犯晉州情形已露宜節制征勦遼東都御史趙耀亦報欵貢不可輕受七月倭從釜山移西生浦送回王子陪臣時我師久暴露聞撤勢難久羈宋應昌乃請戍全羅慶尚議留劉綎川兵五千吳惟忠駱尚志南兵二千六百合薊遼共萬六千人聽劉綎分布慶尚之大丘而兵部尚書石星一意主欵謂留兵轉餉非䇿應昌師老無成功亦願弛責然䇿倭多詐恐兵撤變生己而命沈惟敬復入倭營促謝表急圖竣役乃并撤吳惟忠等兵止留綎兵防守諭朝鮮世子臨海君琿居全慶督師以顧養謙督遼左九月兵部主事曽偉芳言倭欵亦去不欵亦去欵亦來不欵亦來蓋關白大衆已還行長留待知我兵未撤不能以一矢相加遺欲歸報關白捲土重來則風帆不利正苦冬寒故曰欵亦去不欵亦去沈惟敬前倭營講購咸安晉州隨陷而欲恃欵兾來年不攻則速之欵者速之來耳故曰欵亦來不欵亦來為今日計宜令朝鮮自為守弔死問孤練兵積粟以圖自强章下部十月總督顧養謙力主撤兵許之因疏請封貢上命九卿科道會議時御史楊紹程奏臣考之太祖時屢却倭貢慮至深逺永樂間或一朝貢漸不如約自是稔窺內地頻入冦掠至嘉靖晚年而東土受禍更烈豈非封貢為厲階耶今關白謬為恭謹奉表請封之後我能閉關拒絶乎中國之釁必自此始矣且關白弒主篡國正天討之所必加彼國之人方欲食其肉而寢處其皮特劫於威而未敢動耳我中國以禮義統禦百蠻而顧令此篡逆之輩叨天朝之名號耶宜急止封議勑朝鮮練兵以守之我兵撤還境上以待之關白可計日而敗也是時廷臣禮部郎中何喬逺科道趙完璧王德完逯中立徐觀瀾顧龍陳維芝唐一鵬等交章止封而薊遼都御史韓取善亦疏倭情未定請罷封貢兵部尚書石星恐不能羈縻關白甚張皇終主封貢不已二十二年八月總督顧養謙奏講貢之說貢道宜定寧波關白宜封為日本王請擇才力武臣為使諭行長部倭盡歸與封貢如約九月朝鮮國王李昖疏請許貢保國上乃切責羣臣阻撓封貢追褫御史郭實等詔小西飛入朝時改總督侍即孫礦新受事倭使抵京石星優遇如王公小西飛等殊揚揚過闕不下既集多官面譯要以三事一勒倭盡歸巢一既封不與貢一誓無犯朝鮮倭俱聽從以聞上復諭於左闕語加周復大略如樞部意十二月封議定命臨淮侯李宗城充正使以都指揮楊方亨副之同沈惟敬往日本時禮部議日本舊有王未知存亡關白或另擬二字或即以所居島封之行長以下量授指揮銜上竟准日本王號給金印行長授都督僉事適諜報熊川島倭船三十六號業起行歸石星遂謂封事必可成矣二十三年春正月遼東都御史李化龍疏倭六可疑五可慮謂倭不識漢字恐中間兩相欺紿請從禮部量封秀吉順化王罷遣沈惟敬增募水兵而清正素不服關白與行長不相能可用魯連諭燕將計間之時封使已發竟不從二十四年春正月先是東封之使久懷觀望至是始抵釜山而沈惟敬詭云演禮同行長先渡海私奉秀吉蟒玉翼善冠及地圖武經又驅壯馬三百南戈崖騎從隂獻秀吉取阿里馬女與倭合李宗城紈褲子經行之營所在索貨無厭次對馬島太守儀智夜飾美女二三人更番納行帷中宗城安之倭酋數請渡海不允儀智妻行長女也宗城聞其美併欲淫之智怒不許適謝周梓姪隆與宗城爭道宗城欲殺之隆誅其左右以倭將行刺宗城懼棄璽書夜遁比明失路自縊於樹追者解之遂奔慶州副使楊方亨聞於朝上震怒逮問宗城議戰守會方亨復揭倭情無變正使自為奸人誤耳上以方亨充使加惟敬神機營銜副之廷臣交章請罷封上切責下御史曹學程於理立限渡海於是惟敬益舞智揣摩玩大司馬股掌矣三月工部郎中嶽元聲參石星力主封事有三辱四耻五恨五難疏入謫為民九月楊方亨沈惟敬奉册如日本平秀吉齊沐三日郊迎節使受封行五拜三叩頭山呼禮禮畢欵使者備至朝鮮王議遣光海君致賀己而聽嬖臣李德馨言使州判奉白土紬為賀秀吉怒語惟敬曰若不思二子三大臣三都八道悉遵天朝約付還今以卑官微物來賀辱小邦耶辱天朝耶惟敬慰諭之秀吉曰今留石曼子兵於彼候天子處分然後撤還翼日具貨物數百種奉貢遣使齎表文二通隨册使渡海至朝鮮廷議遣使於朝鮮取表文進驗其一謝恩其一乞天子處分朝鮮廷議以為飾說云二十五年春正月石星請自往朝鮮諭兩國就盟罷兵不許二月再議東征時封事已壞而楊方亨詭報去年從釜山渡海倭於大版受封即回和泉州然倭責朝鮮三子不往謝禮又微仍留釜山如故謝表後時不發方亨徒手歸至是沈惟敬始投表文案驗潦草前折用豐臣圖書不奉正朔無人臣禮而寬奠副總兵馬楝報清正等擁二百艘屯機張營方亨始直吐本末委罪惟敬并石星前後手書進呈御覽上大怒命逮石星惟敬按問以兵部尚書邢玠總督薊遼改麻貴為備倭大將軍經理朝鮮僉都御史楊鎬駐天津申警備楊汝南丁應泰贊畫軍前五月邢玠至遼行長建樓清正布種島倭窖水索朝鮮地圖玠遂决意用兵麻貴望鴨緑東發所統兵僅萬七千人請濟師玠以朝鮮兵惟間水戰乃疏請募兵川浙併調薊遼宣大山陝兵及福建吳淞水兵劉綎督川漢兵六千七百聽勦貴密報候宣大兵到乘倭未備竟掩釜山則行長擒清正走玠以為竒計乃檄楊元屯南原吳惟忠屯忠州大學士張位請屯田開城平壤以資軍興朝鮮恐中國吞併以嶢崅為辭議遂寢六月倭數千艘先後渡海分泊釜山加德安骨安窟放丸如雨殱朝鮮郡守安𢎞國已復往來竹島漸逼梁山熊川沈惟敬率營兵二百出入釜山經略邢玠陽為慰藉檄楊元襲執之縛至貴營惟敬執而倭嚮導始絶七月倭奪梁山三浪遂入慶州侵間山夜襲恭山島統制元均風靡遂失間山要害間山島在朝鮮西海口右障南原為全羅外藩一失守則沿海無備天津登萊皆可揚帆而至而我水兵三千甫抵旅順間山破經略檄守王京西之漢江大同江扼倭西下兼防運道八月清正圍南原乘夜猝攻守將楊元聞倭至驚起帳中乘城跣足而遁遼人衛楊元西奔時全州有陳愚衷忠州有吳惟忠各扼要而全州去南原僅百里相犄角南原告急愚𠂻懦不發兵聞已破州民爭棄城走麻貴急遣游擊牛伯英赴援與愚𠂻合兵屯公州倭遂犯全羅逼王京王京為朝鮮八道之中東隘為鳥嶺忠州西隘為南原全州道相通自二城失東西皆倭我兵單弱因退守王京依險漢江麻貴請於玠欲棄王京退守鴨緑江海防使蕭應宫以為不可自平壤兼程趨王京止之麻貴發兵守稷山朝鮮亦調都體察使李元翼由鳥嶺出忠清道遮賊鋒玠既身赴王京人心始定玠召參軍李應試問計應試請問朝廷主畫云何玠曰陽戰隂和陽勦隂撫政府八字密畫無泄也應試曰然則易耳倭叛以處分絶望其不敢殺楊元猶望處分也直使人諭之曰沈惟敬不死則退矣因請使李大諫於行長馮仲纓於清正玠從之下石星於法司併沈惟敬俱坐大辟九月倭至漢江楊鎬遣張貞明持惟敬手書往責其動兵有乖靜俟處分之實行長正成亦尤清正輕舉乃退屯井邑離王京六百里清正亦屯退慶尚離王京四百里貞明反至中途為人所刺死麻貴遂報青山稷山大捷蕭應宫具揭上曰倭以惟敬手書而退青山稷山並未接戰何得言功玠鎬怒遂劾應宫恇怯不親解惟敬並逮十一月總督邢玠徴兵大集上發帑金犒軍併賜玠尚方劍而以御史陳效監其軍玠大會諸將分三協左李如梅右李芳春中高策並以副總兵分將經理楊鎬同麻貴率左右協自忠州鳥嶺向東安趨慶州專攻清正使李大諫通行長約勿往援復遣中協屯宜城東援慶州西扼全羅以餘兵㑹朝鮮合營由天安全州南原而下大張旗幟詐攻順天等處以牽制行長東援十二月會慶州麻貴遣黃應𤾉賄清正約和而率大兵奄至其營時倭屯尉山尉山之南島山俱不甚高而城皆依山險中一江通釜寨其陸路由彥陽通釜山貴欲專攻尉山恐釜倭由彥陽來援令中協高重吳惟忠等扼梁山左協董正誼等赴南原張疑兵又遣右協盧繼忠兵二千屯西江口防水路援二十三日乃進攻尉山游擊拜扎以輕騎誘倭入伏獲級四百餘倭盡奔島山於前連築三寨翼日游擊茅國器統浙兵先登連破之獲級六百六十一倭堅壁不出方力攻山寨時禆將陳寅身先士卒冒彈矢勇呼而上砍栅兩重清正白袍躍馬督倭拒守至其第三栅垂拔楊鎬遽令國器竊割倭級戰稍解國器復以李如梅未至不便首功遂鳴金收軍詰朝如梅至攻之不拔島山視尉山高石城新築堅甚我師仰攻多損傷諸將乃議曰倭艱水道餉難繼苐坐困之清正可不戰縛也鎬等以為然分兵圍十日夜倭用炮者從隙發多命中彈皆碎鐵為之中多叠傷然倭亦饑甚瞰我師稍怠僞約降緩攻而兾行長來援行長亦慮我襲釜營不敢輕進乃選鋭卒三千虛張幟蔽江上朝鮮將李德馨訛報海上倭船揚帆而來鎬不及下令䇿馬西奔諸軍無統御皆潰清正縱兵逐北我兵死者萬餘游擊盧繼忠三千人殱焉鎬貴奔星州撤兵還王京會同邢玠露布言尉山大捷諸營上簿書士卒亡者二萬鎬大怒駁正止稱百餘人贊畫丁應太聞尉山之敗慚惋詣鎬問後計鎬示以內閣張位沈一貫手書并所票未下㫖揚揚功伐應太怒驗進退情實首論位一貫交結邊臣扶同欺蔽鎬附勢煽禍飾罪張功及麻貴李如梅按律悉當斬并鎬駁改陳亡兵馬卷册封進上覽之震怒欲付法輔臣趙志臯力救乃罷鎬聽勘因遣給事中徐觀瀾查勘東征軍務上怒張位以其密揭薦鎬削籍為民以天津巡撫萬世德代楊鎬經理遼左二十六年春正月總督邢玠以前役乏水兵無功乃益募江南水兵精講海運為持久計二月都督陳璘以廣兵劉綎以川兵鄧子龍以浙直兵先後至邢玠分兵三協為水陸四路路置大將中路李如梅東路麻貴西路劉綎水路陳璘各守信地相機行勦時倭盤據朝鮮七年沒海千餘里亦分三窟東路則清正據尉山自去冬攻圍益增築西生機張在在屯兵而恃釜山為根本西路則行長據粟林曳橋建寨數重憑順天城與南海營相望負山襟水最據扼塞中路則石曼子據泗洲北恃晉江南通大海為東西聲援薩摩州兵剽悍稱徑敵而行長水師番休濟餉往來如駛尤倭繫重玠懲島山之失特於三路外置水兵一路約日並進尋報遼陽警李如松敗沒詔李如梅還赴之中路以董一元代九月東征將士分道進兵劉綎進逼行長營使吳宗道約行長為好會行長許以五十人往綎喜分布諸將四面設伏令部將詐為綎而綎詐為卒執壺觴侍令軍中曰視吾出帳即放炮圍倭盡殱之翼日行長果率五十騎來僞綎罄折迎於帳外及席行長顧執壺觴者曰此人殊有福綎驚愕置壺觴出司旗鼓者遽傳炮行長騰躍上馬從騎一字鴈列風剪電掣旋轉格殺游擊王之翰急率黔苗兵來援倭已奪路而去明日行長遣人謝宴綎亦遣官謝謂昨登席放炮敬客禮也誤生疑心行長唯唯遣使遺綎以巾幗綎進攻城奪其橋斬首九十二陳璘舟師協堵擊毁倭船百餘行長潜山千餘騎扼之綎不利退璘亦棄舟走麻貴至尉山據險割其糧稻頗有斬獲倭僞退誘之貴入其空壘伏兵起旗幟蔽空遂敗董一元進取晉州乘勝渡江南連燬永春昆陽二寨倭退保泗州老營鏖戰下之游擊盧得功殁於陳前逼新寨寨三面臨江一面通陸引海為濠海艘泊寨下千計築金海固城為左右翼中通東陽倉十月董一元遣步兵游擊茅國器彭信古葉邦榮前攻城騎兵游擊郝三聘馬呈文師道立柴登科繼之游擊藍方威攻其東北水門自辰至未彭信古用火橫擊寨門碎城垜數處步兵競前拔栅忽營中橫破火藥發烟漲天倭乘勢衝殺固城援倭亦至郝三聘馬呈文率騎兵先走遂大潰奔還晉州勘科徐觀瀾奏四路喪敗㫖下部斬馬呈文郝三聘以狥一元等各帶罪立功初上見丁應太疏謂御極二十六年未見忠直如此人者書其名於御屏沈一貫一會玉熙宫宦侍演東征劇熒惑聖聽上為之霽顔復召一貫入閣福建都御史金學曽報平秀吉七月九日死各倭俱有歸意十一月十七夜清正發舟先走麻貴遂入島山酉浦劉綎攻奪曳橋獲級百六十石曼子引舟師救行長陳璘統蒼唬船邀擊之得級二百二十四副將鄧子龍朝鮮統制使李舜衝鋒沒於陳子龍驍將也諸倭揚帆盡歸經略萬世德自六月受命不敢前比聞倭退兼程馳至會同邢玠奏捷督學御史李堯民知之因告廟獻俘上言諸臣欺誤狀上艴然扺疏於几而罷丁應太亦再疏賂倭賣國上念將士久勞苦仍發冏金十萬兩犒師特諭優叙勘科徐觀瀾抗疏論沈一貫蕭太亨邢玠萬世德黨和賣國疏至京戶部侍郎張養䝉尼之不得上時觀瀾方駐遼造册身歷釜山尉山忠州星州南原稷山查獲各處敗狀據實入册大亨危之一貫簡觀瀾前疏有抱病語票准回籍調理改命給事中楊應文代完勘事二十七年四月征倭告捷上御門受俘梟磔平秀政平正成傳首九邊總督邢玠劾贊畫主事丁應太落職七月給事中楊應文勘報東征功次四路擒斬首陳璘次劉綎又次麻貴而董一元始破三寨終掃諸巢功亦難泯晉邢玠太子太保䕃一子錦衣世襲萬世德升右副都御史廕一子入監陳璘劉綎各加都督同知麻貴右都督董一元復職再叙稷尉功賜茅國器陳寅彭友德等金楊鎬以原官叙用御史陳效病死廕一子錦衣棄師楊元通倭沈惟敬先後棄市谷應泰曰關白本薩摩州人倭部之稍黠者耳非有竒才異能武勇絶藝特以李昖縱酒朝鮮備弛遂狡焉啓疆思有吞噬之舉方其陷王京劫世子剽府庫毁墳墓八道盡沒進窺鴨緑勢岌岌矣而請援之使絡繹於路救邢救衛春秋之義也况乎勢拱神京地牽關海薊遼之外藩東江之咽噎一或失守重險撤焉非如應龍之反播州猓玀之陷西川荒徼弄兵有傷國體而已然豫以援之之法有三命武健之將選精鋭之師出其不意急擊勿失如陳湯甘延夀之於康居䇿之上也其或因糧於敵分兵斷道坐而困之窮蹙自斃如趙充國之於金城䇿之次也又或始則震以兵威繼則結以恩義開誠布信堅明約束如諸葛武侯之於孟獲䇿之又次也乃勦既不足以樹威而撫又不能以著信臨事周張首尾衡决不可謂非行間之乏謀而中樞之失算矣方李如松平壤大捷李如柏進拓開城四道復平三倭生縶廓清之功可旦夕俟而乃碧蹄輕進兵氣破傷功虧一簣良足悼也又若麻貴尉山之捷三協度師勢相犄角砍栅拔寨鋒鋭莫當而割級之令解散軍威僉都之肉豈足食乎况於沈惟敬以市井而銜皇命李宗城以淫貪而充正使以至風月候節之紿壺觴好會之詐邢玠飛捷之書楊鎬冒功之舉罔上行私損威失重煌煌天朝舉動如此毋怪荒裔之不賔也向非關白貫惡病亡諸倭揚帆解散則七年之間喪師十餘萬糜金數千鎰善後之䇿茫無津涯律之國憲其何以辭而乃貪天之功幸邀爵賞衣緋橫玉任子贈官不亦恧乎乃馬棟丁應太之疏能直伸於關白未死之前而李堯民之章反見扺於關白已死之後者蓋以用兵之初神宗怒白甚鋭怒則望其速濟故必欲核其真用兵之久神宗憂白漸深憂則幸其成功故不欲明其僞卒之忠言者落職欺君者封爵而所遭逢異矣明史紀事本末卷六十二
