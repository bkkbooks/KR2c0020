body:
  text: 明史紀事本末卷二十浙江提學僉事谷應泰編設立三衛成祖永樂元年三月改北平行都司為大寧都司徙保定以大寧故地界三衛大寧故烏梁海地也在烏龍江南漁陽塞北春秋時為山戎秦時為遼西北境漢為奚所據後魏韓庫莫奚服屬契丹唐為奚契丹元為大寧路洪武中元兵遁沙漠屢侵之乞降髙皇帝割錦義建利諸州𨽻遼東而於古㑹州大寧地北設北平行都司領興營等二十餘衛所十四年封皇子權於大寧為寧王時宋國公馮勝征納克楚據大寧塞列戍控制遂築大寧寬河㑹州富峪四城卒破降納克楚二十二年封烏梁海為三衛處降人而以阿克必實哷勒等為三衛指揮使同知自大寧前抵喜峰近宣府曰朵顔自錦義歷廣寧渡遼河至白雲山為泰寧自黃泥窪逾瀋陽鐵嶺至開原曰福餘惟朵顔最强其貢路入自喜峰口而市則在遼東防其變也後竟叛去附於元燕王起兵從劉家口徑趨大寧不數日奄至寧王猝出不意降燕王乃移王與其軍內地盡拔降騎還北平從戰有功遂以三衛地畀烏梁海使仍為三衛其官都督至指揮千百戶有差約以為外藩居則偵保警則捍衛嵗給牛具種布帛酒食良厚此棄大寧設三衛之始也三衛自遼瀋扺宣府幾三千里大寧既棄天壽山與異域為鄰而宣府遼東斷左右臂乃調營州左屯衛於順義右屯衛於薊州中屯衛於平谷前屯衛於香河後屯衛於三河衛設左右中前後五所仍𨽻大寧都司復設東勝中前後三所千戶於懷仁等處守備然諸部落已列我門庭矣亡何三衛復判附阿嚕台終明之世泰寧福餘常與東合而朵顔常與西合為中國膏肓之患則皆三衛為之鄉導也二十年秋七月上親征阿嚕台旋師討烏梁海大破之永樂初福餘衛請鬻馬令於廣寧開原互市尋三衛為布尼雅實哩所脅掠我邉卒上遣使諭之納馬贖罪然時附阿嚕台出沒塞下至是上北征旋師召諭諸將曰阿嚕台敢為悖逆以烏梁海為之羽翼也當分兵剪之遂簡步騎數萬分五道往而身率鄭亨薛祿等將大軍邀其西師次竒拉爾河烏梁海驅衆數萬西奔陷澤中上麾騎兵前擊之斬級數百遂自相蹂藉死無算上乘髙瞭望見其衆復聚遂張左右翼嚴陳夾攻命吏士持神機弩伏深林戒寇至乃發頃寇騎突而左左師馳之走林中中伏驚潰死傷略盡追奔三十餘里蕩其巢而還自是三衛稍創宣宗宣德三年九月烏梁海犯大寧上親征出喜峰口至寬河大破之宣德初諾延衛指揮哈喇哈遜等朝貢不至武進伯朱榮鎮遼東請掩擊之上不許至是上親歷諸關塞駐驆石門驛守將奏烏梁海萬衆盜邊已入大寧經㑹州將及寬河諸將請益徴兵上曰孽寇無能為也但謂吾邊無備故來若知朕在此當驚駭走矣今出喜峰口路隘且險單騎可行若候諸軍並進恐緩事機朕以鐵騎三千先進出其不意擒之必矣或言三千未必足用上曰兵在精不在多三千足辦擒賊遂决䇿親征簡士三千人人二騎持十日糧夜銜枚出喜峰口馳四十里昧爽至寬河距其營二十里寇望見以為乘障卒遂悉衆前上麾鐵騎分兩翼進夾攻之上親射其前鋒殪三人飛矢雨集神機銃叠發寇不能當大潰走上以數百騎直前寇望見黃龍旗知上親在也大驚悉下馬羅拜請降皆生縛之斬其渠駐蹕寬河分命諸將窮搜窟穴忠勇王金忠故韃靼名王子也及其甥都督巴爾台請自效上許之或密言忠往不反矣上不聽忠與巴爾台果大克獲歸上飲以金爵遂輟賜顧謂侍臣王者宜推誠待人漢用金日磾庸不足法耶遂班師五年徙開平衛於獨石洪武初李文忠克元上都設開平衛守之置驛八東曰凉亭泥河賽峰黃崖四驛接大寧古北口西曰桓州威鹵明安隰寧四驛接獨石永樂間大寧既棄而開平勢孤難守至是遂城獨石徙開平衛於此棄地蓋三百里自是盡失龍岡灤河之險邊陲斗絶益騷然矣九年夏四月衛喇特托歡攻阿嚕台殺之因通烏梁海先是詔蠲三衛罪豫自新以泰寧衛印沒于寇更給烏梁海遂駐牧遼東塞英宗正統二年十二月福餘等衛阿嚕台等以五百騎掠葭州獨石守將楊洪遮擊西凉亭生擒百戶齊竒哩等奪所掠命集烏梁海貢使僇之市進拱都指揮同知初正統元年福餘衛失印更給如泰寧例而托歡遣使通烏梁海潛伺屢諭不悛至是復諭都指揮安春等縛首惡以獻四年夏六月福餘衛都指揮登多爾等數言賞薄互市失利非永樂時比上因使者還勑曰文皇帝以爾通阿嚕台嵗徴馬三千匹贖罪爾俯首聽命朕實爾寬而妄意無厭是速敗也其亟圖改已而以通衛喇特罷其部落貢獻九月烏梁海犯邊右參將楊洪追擊于白塔兒三岔口值烏梁海五百騎擊敗之射死十二人擒三人六年冬十月左參將黃直巡邊至閔安山值烏梁海三百餘騎擊敗之福餘衛托和齊斡罕等假射獵屢犯邊至是被擒磔於市尋復以遊騎犯密雲扒頭崖塞射傷戍卒又掠牛心山七年冬十月烏梁海千騎自氊帽山犯廣寧前屯等衛守將曹義擒其將博迪㑹三衛來朝僇示之九年秋七月烏梁海入寇命成國公朱勇等率諸軍二十萬分道出塞擊之朱勇同太監錢僧保由中路出喜峰口興安伯徐亨同太監曹吉祥由南路出劉家口左都督馬諒同太監劉永誠由北路出界嶺口都督劉懷同太監但住由西北路出古北口踰灤河渡栁河經大小興州過神樹破福餘于全寧復破泰寧諾延于虎頭山出所掠萬計而都督楊洪出黑山俘斬安出部各論功加秩三衛從是寢衰然怨中國益刺骨因糾諾延入寇為之鄉導矣十二年春正月都御史王翺同總兵曹義巡邊扺廣寧烏梁海伏騎林中義擊敗之時衛喇特額森亦東侵三衛乃遣使敕諭之毋為衛喇特誘十四年三月福餘泰寧共潛結額森入寇諾延獨扼險不從額森至不能入大掠二衛人畜去其秋旋與額森合土默特北狩命都御史鄒來學經略京東并設參將總兵罷諾延三衛互市景帝景泰六年諾延諸衛來朝乞耕地及犁鏵種糧詔豫糧三十石未幾寇獨石先是既罷三衛互市景泰二年復議豫貢然三衛常竄名衛喇特使中窺我遇北使厚不無心望且結婚漠北挾為重稍侵軼盡沒遼河東西三岔河北故地薊遼多事自此始四年兵部尚書于謙言三衛使叠至頗為衛喇特間宜令邊臣嚴備因條上防禦事詔自是使至伴二三人入京餘不得輒入關已而泰寧衛都督僉事達爾罕特穆爾乞大寧廢城及甲盾謙持不可帝重絶三衛歡遣譯者語大寧城逼近塞不便馳獵又炎暑多生疫其甲楯須寇至乃給謀遂沮至是寇邊參將葉盛督兵破走之憲宗成化元年春二月保喇為三衛請賞不許自景秦末三衛多與保喇通貢使浮額隨保喇使者走雲中朝廷羈縻不問至是保喇為請賞勑諭四方貢使賞有成額三衛曩朝貢從東路喜峰口今諾延都督多羅干等擅易貢道希混賞朝廷照例分别又何誅焉尋復䦨入邊遣都督季鐸往諭至泰寧還兵部以奉使無狀請逮治詔貸之十二月泰寧衛都督劉玉烏呼訥特穆爾等請市牛及農具塞下并乞賜蠎上諭蠎衣勿與他聽與民交易諾延衛烏延特穆爾因請職事兵部覆未有成勞例無升授不許二年十二月衛喇特遣使貢馬挾三衛從喜峰口入詔待以三衛禮敕其渠阿實特穆爾無糾諾延妄更貢道十四年秋七月三衛部落各請從便道入貢并求開市時太監汪直方與兵部侍郎馬文升爭遼東撫勦異同故三衛乘間挾我也詔邊吏以朝廷恩義諭之孝宗𢎞治二年兵部尚書馬文升請修邊備先是自天順後保喇潛通三衛屢入塞中國羈縻不絶誘致之亦不敢大為寇至是文升奏往嵗三衛盜漠北馬經大同宣府報敵老營今兩鎮經年不報疑彼此相通乞于團營選馬步三千赴永平三千赴密雲防禦及㑹兩鎮巡操從之十一年冬諾延入寇先是邊軍燒荒出塞遇寇騎掩殺之邊釁遂起馬文升檄守臣分據要害相機勦殺仍請璽書切責三衛頭目從之十七年秋七月諾延道小王子入寇大同上御暖閣召大學士劉健等議出兵李東陽言諾延通潮河川古北口距京師一日而近宜固根本無逺出師自疲上深然之時諾延部落益蕃屢侵盜而諸部獨和坦以旺扎勒特穆爾裔種最貴和坦次子巴爾斯驍勇敢深入結婚小王子為中國患滋甚武宗正德四年冬泰寧衛滿滿率部落二萬餘欲附居塞下避北敵令居故鎮安堡戒無旁嚙其後和坦部屢挾增貢詔暫增一年不為額和坦部堅請不從乃益勾小王子與合謀十年夏四月諾延巴爾斯自鮎魚關毁垣入馬蘭谷殺參將陳乾命都督桂勇討之巡撫順天都御史王倬謀曰敵知吾兵屯西必東入乃命指揮葉鳯伏山下敵果入伏發敗之巴爾斯遣托克托等來請貢且獻馬贖殺陳乾罪兵部尚書王瓊持議必以巴爾斯償乾乃罷兵豫貢巴爾斯輒謾言呼托克托等去竟豫巴爾斯貢班師亡何復入寇參將魏祥全軍歿終正德世不能討世宗嘉靖十一年十二月諾延三衛寇邊先是諾延都督和坦長子格爾博羅早死其次巴爾斯謀奪嫡不得巴爾斯尋亦死格爾博囉子格勒埓台貢馬請嗣兵部令轉譯部落方許貢格勒埒台乃寇漁陽諸小關堡率殘破至是巡撫都御史王大用欲厚創諾延城其霧靈山不果㑹阿多哈喇齊頻入建昌喜峰口恣殺掠格勒埓台又請升秩御史連疏詆大用請以毛伯溫代大用既去諸衛益盜邊邊人皆廢耕牧而諾延諸部目益橫二十年秋七月格勒埒台求增貢衛三百人不許請二百人亦不許時剽掠塞下聲言結小王子入寇㑹諳達自雲中深入太原邊吏恐謬曰山海關諸邊無警亦諾延諸衛功也詔補前貢失期者衛二百人二十三年諾延侵薊州塞先是薊鎮總兵郤永出塞襲諾延别部李家莊斬四十餘級李家莊零騎居近獨石不通大部慣盜馬狡而善射敵追輒走險亦頗為我捍邊是役藉怨轉與敵合而遼東塞亦以諾延故頻邊警二十六年冬十月諾延益結海西諸部出投遼東西塞無何格勒埒台死子伊克襲故事三衛以貢時身受職至格勒埒台父子始遣人代請而伊克剽悍踰于父益誘諳達大入塞二十九年九月始置薊遼總督以薊州保定遼東三鎮𨽻焉改孫禬為兵部侍郎總督薊遼未幾以何棟代之初諳達逼都城數言遼陽軍遼陽軍者諳達所呼諾延也至是始設薊遼總督以兵戍之然諾延部時時犯塞咸寧侯仇鸞知伊克實首禍欲發兵掩之何棟曰諾延很敵也縱有反覆為患尚小若剪除諾延漠北窺隙必且慿為巢穴是毁藩籬延寇以自近也上從棟言已而棟設計擒叛人哈扎爾陳通事傳首九邊二十六年三月土默特達喇蘇始收三衛導入薊州長林口踰建昌營灤河掠永平諸邑三十八年二月薊州塞警自練兵議起鎮兵减什之二而春防視秋防又殺什之五以故最單弱巴圖爾錫凌阿擁數萬騎以諾延伊克為鄉導入寇總督侍郎王忬所遣偵諜皆被殺遂薄塞下忬疏請援兵大學士嚴嵩謂抒挾寇為重欲坐縻金錢不報敵騎渡灤水由潘家口入大掠薊忬遣總兵馬芳等以輕兵八千夜馳出其後牽之遂不敢深入三日引去忬兵尾而擊之頗有斬獲詔逮忬及總兵歐陽安俱論死六月改宣大總督揚博于薊遼博聞命馳至鎮區畫戰守以諾延諸衛每外通不為我用乃約諸帥同時舉烽燧揚旄纛自居庸至山海關彌漫千餘里旌旗蔽空駁石震山谷如是者三幕北大駭以為邊兵頓增益終嵗不敢近塞三十九年三月伊克復糾巴圖爾錫凌阿等犯一片石參將佟登禦郤之四十年冬十月伊克紏東西數萬騎潰墻子嶺而入大掠通州總督侍郎楊選逮論死穆宗隆慶元年九月諾延董呼哩紏諾延數萬騎入界嶺口援師四集引還失道墜崖死者甚衆董呼哩亦格勒埒台子也時伊克出義院口邊軍以火鎗擊之斃而子長昻與呼哩頡頏二年夏四月以侍郎談綸為總督拜戚繼光大將軍專理練兵綸上言今之策邊防者皆曰乘障夫薊昌見卒不滿十萬而老弱且半散布于二千里之間畫地而守彼以十萬衆攻我一軍欲不破不可得也故臣以為禦敵莫如游兵燕趙之士自邊警以來鋭氣盡矣非募吳越習戰卒萬二千人雜教之必無成功此萬二千人者臣與戚繼光召可立至用之可立效散之歸農可使無後憂而時方虞其有他是尚疑臣與繼光不可信安能勝敵夫我兵素未一當敵戰而勝彼不心服再破之乃終身創矣繼光亦上言邊鎮之卒壯者役于私門老弱僅以充伍有火器而不能用棄土著而不能練弓矢之力不强于賊而與賊共之且不知兵法長以衛短短以救長之數教練之法實用則不美觀美觀則不實用今皆虛名耳其實無有也臣又聞薊之地有三平易交衛內地之形也險易相半近邊之形也山谷深隘林薄蓊翳邊外之形也敵入平原利于車在近邊利于騎在邊外利于步三者迭用乃可制勝今邊兵惟習馬耳未間山戰谷戰林戰之道惟浙兵能之臣發迹浙江思用浙人願陛下更豫臣浙江殺手三千鳥銃手三千更于西北召募得馬軍五枝步兵十枝聽臣統練方今朝議紛呶易于改絃而臣擁重兵易生嫌二請設監軍科道官一人以督臣使臣無掣肘虞疏上俱報可綸繼光浚隍增陴邊備甚設而時諳達亦奉欵迄隆慶三衛修職謹邊鄙稍息長昻襲職為都督神宗萬厯元年董呼哩索賞喜峰口啓釁總兵戚繼光猝勒兵青山圍之呼哩以身免尋縛首惡獻豫欵治改喜峰口守備為參將彈壓之三年二月總兵戚繼光追逐長昻墜馬幾獲之跳而免馳去生縛其叔察克圖羈董家口昻納馬鑽刀盟乃釋之已察克圖復叛合董呼哩縱掠六年三月泰寧衛蘇巴爾噶犯遼東總兵李成梁直搗劈山大創之長昻勒賞阻諸部入貢遣弟莽吉爾率精騎窺喜峰西掠前屯薄山海一片石十一年五月泰寧衛巴延巴圖紏衆呼達等大舉攻鎮寧堡巴延故蘇巴爾噶子也先是蘇巴爾噶入鎮彞堡李成梁遣裨將李平胡逆之射蘇巴爾噶中脅墜馬蒼頭李有名斬之至是報仇入犯成梁出兵黑山佯為北伐而夜遣李得全馳入鎮寧為內應旦日親自搏戰李寧以刀擊呼達傷額復貫矢中膊大哭失聲遁既而巴延復偕長昻董呼哩三萬騎犯廣寧殺掠吏士一百二十有竒李平胡跳擊之㑹大風揚沙晝晦頃之雷雨大作水深數尺走出塞時三衛屬部八十餘種而昻與董呼哩兵最强然部落不踰萬十二年春董呼哩犯前屯錦義備禦祖承訓擊敗之總兵李成梁追奔太康大定堡多斬獲八月長昻入下莊總兵楊四畏副總兵徐從義擊郤之追至老鴉嶺而還已復紏赫巴匝爾等數萬騎以打牲為名圖盜邊㑹上視山陵昻往來紅螺川射獵調部落東西馳甚恣也然亦以犯邊罷賞頗窘十三年夏四月巴延巴圖復入塞遊擊周思孝逐之走遼河河深不能猝渡李成梁追襲之從丁字浦堡出布陳為一二字一字衝鋒二字繼進巴延望見兵至跳騎挑戰成梁馳之巡撫李松趨二字陳鼓行而前大敗之斬首八百級得名王徹辰保喇等十三人六月董呼哩率其屬三百餘叩關脫帽請甚哀言犯遼皆東西部落同姓名者非其罪願得奉撫賞長昻以李成梁聲搗穴一夜數徙帳亦哀請欵及已得撫則愈驕十四年春正月呼達巴延等復紏土默特犯前屯李成梁選輕騎出塞繞其後而自率兵當之夾擊大敗走九月巴延巴圖復入塞攻鎮彛堡邊軍禦之三晝夜不解甲復大敗去巴延痛哭曰阿父怨終不可報矣十八年春正月長昻部落入貢奪賞㑹同館大譁欲殺禮部尚書于慎行主事張我績諭解之爾長昻遣弟章圖布濟克來詗盟石門遊擊陳愚聞紿執通事張五烈等僇之長昻同弟莽吉爾犯董家口二十二年冬十二月巴延復入塞總兵董一元伏精騎鎮武堡俟其深入士卒從中起循墻而進搏戰大敗之巴延中流矢死哨騎生得伏諜朗達爾罕等七人朗達爾罕長昻心膂也昻願革二年舊賞請贖上幸許昻自是稍戢二十四年冬十月福餘衛巴雅爾挾賞羅文峪拒郤之尋以千騎突青山口連犯扒頭崖三道嶺並失利去二十九年冬十月巴雅爾妻唐塔斯阿布該叩關求欵命給半賞十二月長昻求欵命復諾延諸衛馬市木市于寧前已而章圖布濟克修石門郗掠車厰莊總兵尤繼先出塞至紅草溝擊斬八十有竒昻與莽吉爾代叩關三十四年冬十一月布濟克挾賞葦子谷長昻莽吉爾復勾西部本衛喇實等萬騎犯山海關總兵姜顯謨擊之時督稅太監髙淮在遼東聞警倉卒調兵自衛及長昻退稱斬獲功未幾長昻圍獵墜馬死子賚雲丹踵昻轍同莽吉爾糾阿克展等挾賞擦崖子關三十六年冬十一月賚雲丹入建昌河流口大掠而去復紏察罕圖台吉等入寇連山驛總兵杜松出中左所長嶺山夜至哈琉圖襲拱兔營大斬獲然諸部益閧因入大勝堡總督侍郎王象乾諭諸部各聽撫專勦拉拜拉拜勢孤乃屬西部雅克布哈台吉請欵四十年十一月莽吉爾賚雲丹乘邊軍燒荒入圄山堡縱掠曹莊寧逺參將李應撰失亡官軍九十人四十一年春三月諾延衛頭目托里福餘衛頭目和碩齊各授指揮僉事賜敕四月綽哈宰桑諾木圖等以三萬騎屯玉文谷陷七臺殺千總佟修鳯等邊軍失亡五百人賔匝雅瑪爾丹諾延連犯掛甲嶺麻郎谷四十三年夏六月遼東邊將率兵出獵曹莊莽吉爾乘機入犯殺掠五十餘人喪卒二百二十餘人十二月杜松擊和爾齊于栁門敗之四十六年夏四月瑪爾丹及男鄂博台吉等睥睨石塘間而馬蘭亦報莽吉爾聲犯桃林界嶺薊鎮戒嚴未幾石塘遊擊朱萬良調援遼瑪爾丹母子益恣以萬騎攻白馬關及髙家堡頃之尋盟蓋自隆慶來長昻稱梟桀雄塞上垂四十年而土默特部落如罕多綽哈宰桑諾木圖輩東西揚動邊吏疲于奔命至瑪爾丹以一婦躑躅曹石間竟不可制然亦自此漸微弱不能自立矣明史紀事本末卷二十
