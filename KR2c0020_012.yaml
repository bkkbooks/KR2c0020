body:
  text: 明史紀事本末卷十二浙江提學僉事谷應泰編太祖平滇太祖洪武五年春正月癸丑遣翰林院待制王褘齎詔諭雲南雲南古滇池地南控交趾北接土蕃西擁渚甸東以曲靖為門戶與蜀黔錯壤麗江松潘烏蠻霑益如犬牙然戰國時楚威王使將軍莊蹻將兵循江上略巴蜀黔中西至滇池以兵威定屬楚歸報會秦擊楚巴黔道塞遂以其衆王滇變服從其俗以長之漢武帝元狩元年彩雲見南方遣使跡之起于洱河因置雲南郡諭滇王入朝宣帝遣王褒求金馬碧雞之神蜀漢建興三年諸葛亮南征雍闓斬之封其渠龍祐那為部長賜姓張氏漸去山林徙居平地建城邑務農桑諸部于是始有姓氏隋開皇中為史萬嵗所破唐武德貞觀間張氏弱遜位䝉氏號南詔天寶七年閣羅鳯反敗節度使鮮于仲通西洱河後段氏有其地段氏之先武威郡人改國號大理宋太祖立王全斌下四川請取大理鍳唐之禍以玉斧畫大渡河曰此外非吾有也由是雲南不被兵段氏得長世焉元世祖自臨洮過大渡河經山谷二千里至金沙江乘革囊以濟獲段興智滅其國乃以其子呼圖出為雲南王填之仍録段氏子姓守其王呼圗死封其子松山為梁王至正時巴咱爾斡爾密嗣位明玉珍一攻之不克至是上既平夏乃遣使往諭之六年冬十二月詔使王褘被殺于雲南褘初至雲南見元梁王君臣諭以奉版圗歸職方梁王不省館于别室數日又曰子將命逺來非為身謀朝廷以雲南百萬生聚不欲殱于鋒刃曽不聞元綱解紐陳友諒據荆湖張士誠據吳㑹陳友定據閩關明玉珍據巴蜀天兵下征不四五年悉膏斧鉞惟爾元君北走以死庫庫特穆爾之屬或降或竄曽無用武之地當是時先服者賞後至者誅乃今自料勇悍強獷孰與陳張土地甲兵孰與中國天之所廢誰能興之不然皇上遣一將軍將龍驤百萬會戰昆明池爾猶魚逰釡中不亡何待梁君臣相顧駭服頗有降意改館禕厚待之會元太子自立于沙漠遣使托克托自西畨徴糧雲南謀連兵拒我托克托覘知梁王有二心欲迫殺朝使以固其意梁王持兩可不决匿禕民間托克托聞之誚梁王曰國家顛覆不能救反欲附他人耶欲躍馬去梁王不得已出禕與托克托相見托克托欲屈禕禕罵曰天命訖汝元我朝實代之爝火餘燼尚欲與日月爭光乎我將命使臣豈為爾屈顧梁王曰爾朝殺我大兵夕至矣竟被害瘞地藏寺北禕有王佐才上嘗語曰吾固知浙東有二儒卿與宋濂耳學問之博卿不如濂才思之雄濂不如卿後子紳走雲南求遺骸贈翰林學士諡文節七年秋八月遣元威順王子巴拜齎詔往諭雲南八年秋九月命湖廣行省參政吳雲使雲南上諭雲曰今天下混一四方賔服獨雲南一隅未奉正朔朕欲以兵取之恐勞師費財重傷吾民卿能為朕作陸賈乎雲對曰雲南恃其險逺故阻聲教臣奉陛下威德曉以禍福彼必順附若冥頑不從興師未晚遂遣雲行時元梁王使其臣鐵知院等二十餘人使漠北為徐逹所獲送京師上釋之命與雲偕行至雲南之沙糖口鐵知院等謀曰吾屬奉使不逹被執而還罪必不免于是共逼雲易服詐為元使更制書以紿梁王雲不從鐵知院等知不可奪遂殺之十四年秋九月壬午命潁川侯傅友德為征南將軍永昌侯藍玉西平侯沐英為副將軍帥師征雲南列侯曹震王弼金朝興都督郭英張銓等皆從上諭之曰雲南自昔為西南彜至漢置吏臣屬中國今元之遺孽巴咱爾斡爾密等自恃險逺輒害使臣在所必討爾等行師之際當知其山川形勢以窺進取朕嘗覽輿圗咨詢于衆得其扼塞取之之計當自永寧先遣驍將别率一軍以向烏撒大軍繼自辰沅以入普定分據要害乃進兵曲靖曲靖雲南之噤喉彼必併力于此以抗我師審察形勢出竒制勝正在于此既下曲靖三將軍以一人提兵向烏撒應永寧之師大軍直搗雲南彼此牽制使疲于奔命破之必矣雲南既克宜分兵徑趨大理先聲已振勢將瓦解其餘部落可遣人招諭不煩兵而下也師行上餞于龍江旌旗蔽江而上丁未傅友德師至湖廣分遣都督郭英胡海洋陳桓等帥兵五萬由四川永寧趨烏撒友德等率大兵由辰沅趨貴州十二月辛酉傅友德率藍玉沐英等進攻普定克之羅鬼苖蠻犵狫望風降至普安復攻下之乃留兵戍守進兵曲靖元梁王巴咱爾斡爾密聞明師下普定遣司徒平章逹爾瑪將精兵十餘萬屯曲靖以拒我師右副將軍沐英謂傅友德曰彼謂我師疲于深入未有虞心若倍道疾趨出其不意破之必矣上所謂出竒取勝者此也友德是之遂進師丙寅未至曲靖數里忽大霧四塞衝霧而行阻水則已臨白石江矣頃之霧霽逹爾瑪望見大驚倉皇失措友德即欲濟師英曰我軍逺來形勢既露固利速戰然亟濟恐為所扼乃整師臨流勢若欲渡逹爾瑪悉精鋭扼水英别遣數十人從下流潜渡出其後鳴金鼓樹旗幟逹爾瑪急撤衆禦之陳動英乃拔劍督師濟江以猛而善泅者先之長刀䝉盾破其前軍敵氣索退數里而陳我師畢濟友德麾兵進薄之矢石甫發呼聲動天地戰數合英縱鐵騎搗其中堅敵衆披靡遂大敗生擒逹爾瑪橫尸十餘里俘其衆二萬友德悉撫而縱之使各歸業蠻人見歸者皆喜慰軍聲益振遂平曲靖留兵鎮其地友德分遣藍玉沐英率師趨雲南而自以衆數萬向烏撒為郭英等聲援壬申元梁王巴咱爾斡爾密聞逹爾瑪敗棄城走入羅佐山其右丞魯爾自曲靖馳歸謂曰事急矣將奈何于是巴咱爾斡爾密挈妻子與左丞逹丹魯爾俱入普寧州忽納寨焚其龍衣驅妻子俱赴滇池死癸酉藍玉沐英等師至雲南之板橋元右丞觀音保出降明日駐兵金馬山故梁王閹監額森特穆爾以金寶來獻諸父老焚香出迎玉等整衆入城秋毫無犯收梁王金印并宫府符信圗籍撫定其民自九月朔出師迄下雲南僅百餘日藍玉别遣曹震王弼金朝興等率兵二萬分道進取臨安諸路皆下之沐英分兵趨烏撒㑹友德先是都督郭英等出永寧路多險阻諸將欲深入英曰破敵貴先聲攻取必自近始舍近趨逺非䇿之上也遂以兵攻赤水河去河二十里為營時久雨水暴漲英曰賊恃水漲不意吾濟下令諸軍斬木造筏夜半濟河比曉敵始覺遂大驚潰生擒阿客指蠻雲南諸郡邑皆震至是友德自曲靖帥師循格孤山而南直搗烏撒元右丞實保收兵屯赤水河拒郭英等友德大軍至實保遁友德下令城烏撒版築方具實保引諸蠻復大集友德據高岡嚴陳待之諸將請戰友德故勿許士爭奮思致死友德度其可用下令曰我軍深入有進無退彼既遁而復來心必不一併力與戰破之必矣若使彼據險自固未易克也遂進戰師既陳芒部土酋帥衆來援實保合勢迎戰我師趨之戰數十合渠長多中槊墜馬死者我師益奮蠻衆大潰斬首三千級獲馬六百匹實卜率餘衆遁遂城烏撒得七星關以通畢節又進至可渡河于是東川烏䝉芒部諸蠻震聾皆望風降附十五年春正月辛巳朔元威楚路平章閻鼐瑪岱參政埓克矩布哈等詣曹震營降壬午元曲靖宣慰司行省樞密院同知克埒克傅慰高仁廉訪司副使博囉呼察及中慶武定徴江三路嵩盟晉寧昆陽安寧新興路南建水七州昆明富民宜良南甸河陽陽宗六縣逹嚕噶齊扎木等官皆詣藍玉沐英營降丁亥置貴州都指揮使司命平凉侯費聚汝南侯梅思祖署司事甲午遣使諭傅友德等曰比得報知雲南己克然區畫布置尚煩計慮前已置貴州都指揮使司然去雲南尚逺今必置都司于雲南以統諸軍既有土有民又必置布政使司及府州縣治之其烏撒烏䝉東昌芒部建昌之地更宜約束渠長留兵守禦禁民勿挾兵刃至于靄翠輩不盡服之雖有雲南亦難守也金朝興兵略澄江臨安沅江尋甸楚雄洱海俱下之革宣慰司立臨安府及各府十四衛置雲南都指揮司以都督謝熊馮誠署司事二月置雲南布政司改中慶路為雲南府命汝南侯梅思祖平章潘原明署司事以張紞等為參政參議等官閏二月靄翠至京賜衣帽及鈔遣還藍玉沐英等進兵攻大理大理城倚㸃蒼山西臨洱海為固土目段世聞明師且至聚衆扼下關以守下關者南詔皮羅閣所築龍尾關是也號為險要玉等至品甸遣定逺侯王弼以兵由洱水東趨上關為犄角勢自率衆抵下關造攻具夜半遣都督胡海洋出石門間道渡河繞出㸃蒼山後攀木援崖而上立旗幟昧爽大軍抵關下望之踴躍歡譟敵衆驚亂英身先士卒䇿馬渡河水沒馬腹將士隨之莫敢後遂斬關而入山上軍望見亦下攻之敵腹背受敵大潰拔其城段世就擒乃分兵取寉慶略麗江破石門關下金齒于是車里摩㱔和泥平緬等處相率降雲南悉平三月藍玉遣兵攻拔三營萬户寨更定雲南所屬府五十二州六十三縣五十四傅友德遣使以故元威順王之子巴拜及梁王家屬三百一十八人送京師并奏云雲南自元世祖至今百有餘年屢經兵燹圗籍不存兵數無從稽考但當以今要害量宜設衛戍守其賦稅則故元司徒平章達爾瑪等言元末田土多為豪右隱占今循元舊制歲用不足已督布政司覆諸衛所以給軍食恐有不足宜以今年所徴糧并故官院寺入官田與土官供輸鹽商中納戍兵屯田所入并給之上悉可其奏未幾置雲南鹽課司以益軍費夏四月烏撒東用芒部復畔傅友德移檄沐英合兵進討西堡蠻賊寇普定貴州衛指揮同知顧成擊敗之六月置大渡河守禦千户所傅友德調從征千户吳中領兵守之造舟以渡往來上復遣使諭安陸侯吳復平凉侯費聚合征南三將軍攻烏撒烏䝉東川芒部磐石關索嶺諸蠻秋七月沐英自大理還軍滇池會傅友德兵進攻烏撒大敗其衆斬首三萬級獲馬牛羊萬計餘衆遁去復遣兵捕擊悉平之乃以烏撒烏䝉芒部三府地近四川奏𨽻四川布政司八月乙巳遣使諭傅友德沐英曰得報知永昌侯駐兵建昌大軍七月二十八日己擊破烏撒次第搜捕林箐諸蠻然此地山高道隘慎勿輕動人自七星關來者又曰芒部烏撒蠻至夜舉火挈家入靄翠符至可諭靄翠之民縛送軍前其關索嶺非古道古道又在西北可以大軍蹂之開此道以接普定即芒部渠長可盡獲將軍其熟圗之已復遣使諭曰雲南士卒既艱食不宜分屯止于赤水畢節七星關各置一衛黑張之南瓦店之北中置一衛如此分守則雲南道路往無礙矣靄翠之地必用十萬衆乃可定也凡此者朕所見大概耳萬里之外豈能周知將軍便宜自處置九月傅友德沐英等分兵攻未服諸蠻以指揮馮誠守雲南諸蠻見大軍出謂城守虛弱遂相煽叛土官楊苴尤傑黠紿其下曰總兵領大軍歸矣雲南城可圗也遂糾衆至二十萬會于城下合三十六營兵攻城時城中乏食士卒多病倉猝聞寇至頗以為憂誠與指揮謝熊以孤軍嬰城拒守備樓櫓戰具多置強弓弩于城上賊至輒射之多應弦而斃伺賊少怠出竒兵擊之賊不能攻遂圍城為久困計時沐英駐師烏撒聞之選精騎萬餘來援至曲靖先遣人潜入城報知為賊所得紿之曰總兵官領大軍三十萬至矣賊相顧駭愕拔營夜遁去至安寧羅次邵甸普寧大祺江川等處據險樹柵欲圗再舉英至與馮誠等合兵剿捕之斬首六萬餘級生擒四千餘人諸部復定誠國用子也十六年春二月傅友德等遣人送故元雲南右丞觀音保參政綽滿布哈及渠長段世等一百六十人至京各賜其家衣服以觀音保為金齒指揮使賜姓名李觀時友德等平䝉化府鄧川州破佛光寨過金沙江攻北勝府擒其平章髙生復平麗江府平津等州蠻民降者數十萬戶三月甲辰上以雲南平命耿炳文往諭傅友德藍玉等班師而副將軍沐英以數萬衆留填之雲南麓川之外有國曰緬車里之外有國曰八百媳婦皆請內附上復置大理指揮使司命周能為指揮統兵守之五月命六安侯王志安慶侯仇成鳯翔侯張龍督兵往雲南尋甸等處繕城池立屯堡安輯其人民十七年三月征南將軍傅友德左副將軍藍玉班師友德平雲南上前後下璽書數十懸斷萬里外委曲皆中友德奉行不敢失因土俗定租賦興學校瘞戰骨廣屯田逺邇畏悅以是遂大定夏四月壬午論平雲南功進封傅友德潁國公列侯藍玉仇成王弼子孫世及陳桓普定侯胡海東川侯郭英武定侯張翼寉慶侯將校遞升有差秋八月壬申平緬宣慰使思倫發遣使獻方物上元所授宣慰司印平緬在西南彛稍逺自大理越金齒至其地有城郭宫室其人皆樓居地産象馬官民皆髠髮如僧出入則乘象自前代未嘗通中國元始遣使招諭遂入貢至是大兵下金齒與平緬壤地相接思倫發聞之懼故遣使朝貢冬十月乙酉景川侯曹震奏言四川至建昌驛道所經大渡河往來之人多死于瘴癘臣問諸父老自眉州峨眉至建昌有古驛道平易可行無瘴毒之患而年久蔽塞已令四川軍士乘閒暇時開通其道以溫江至建昌各驛馬移置峨眉新驛為便詔從之十八年春正月東蘭州韋富亂沐英討平之英在滇仞方物定貢額視民數均力役雲南民賴以安分兵剪廣西維摩餘孽通四川糧道上喜曰英能如是吾無南顧憂矣冬十二月思倫發率衆寇景東馮誠擊之失利千戶王升死之十九年春二月雲南臻洞西浦擺金擺榜諸蠻叛命傅友德率師討之友德復移兵討平越蠻瑪哈伊瑪等平之秋九月庚申沐英奏雲南地廣宜置屯田令軍士開耕以備儲畜詔從之二十年夏五月庚申敕諭沐英等勿遣使往平緬但葺壘金齒楚雄品甸及瀾滄江中諸道固守待之英自楚雄至景東每百里置一營率兵屯種以備蠻寇已復命景川侯曹震選四川精兵駐雲南尋甸普定侯陳桓靖寧侯葉升總制雲南諸軍駐定邊姚安畢節曲靖越州諸處立營屯種候征討二十一年春正月思倫發入寇結寨于摩沙勒沐英遣都指揮寧正擊破之斬首一千五百級三月思倫發悉其衆號三十萬戰象百餘復寇定邊欲報摩沙勒之役勢甚猖獗沐英選驍騎三萬晝夜兼行凡十五日抵賊營隔壘而陳遣都督馮誠先出輕騎三百挑之賊以萬人驅象三十餘逆戰雲南前衛指揮張因率騎卒五十餘人為前鋒其渠帥跨巨象直前我軍注矢連發矢中象左膝及脅象仆地渠長中矢走追射殺之諸軍譟而前殺賊數百人獲一象而還英喜曰賊不足平也乃下令軍中置火銃神機箭三行列陳中俟象進則前行銃箭俱發不退則次行繼之又不退則三行繼之詰旦分軍為三隊命馮誠領其前寧正領其左都指揮湯昭領其右將士皆鼓勇而進賊悉衆出營結陳以待其渠帥把事招綱等皆乘象象披甲皆負戰樓若欄楯懸竹筒于兩旁置短㮶其中以備擊刺陳既交羣象突而前我軍擊之矢石俱發聲震山谷象皆股栗走指揮張因千户張榮祖率騎士乘之直搗其柵遂縱火焚其寨烟熖漲天還復以兵邀擊之殺傷甚衆賊黨有昔刺者亦驍勇復率衆殊死戰我左師小却英登高望之命左右取帥之首來左帥遙見一人拔刀飛騎而下率衆更進英督戰益急三軍大呼而鏖不移時賊衆大敗斬首三千級俘萬餘人生獲象三十有七餘皆被矢如蝟死渠帥刁斯郎理各中百餘矢斃象背上餘賊潰英帥師追襲之賊連日不得食死者相枕藉思倫發遁去夏六月東川蠻叛命傅友德為征南將軍沐英陳桓為左右副將軍曹震葉升為左右恭將率馬步諸軍討之八月壬寅沐英遣都督寧正從傅友德討東川九月越州土目阿資叛阿資故囉囉種苦麻部土師南征沐英駐兵其地之湯池山諭降之至是叛傅友德等將兵討之道過平彛以其山勢峭險密邇阿資遂遷其山民往居早上村留神䇿衛千戶劉成等駐兵立柵其上後以為平彛千戶所阿資等復帥衆寇普安燒府治大掠友德進擊之斬其渠滿已青二十二年春正月阿資退屯普安倚崖壁為寨傅友德以精兵蹙之蠻衆皆緣壁攀崖墜死者不可勝數生擒一千三百餘人阿資遁還越州沐英遣寧正從友德擊阿資于越州大敗之斬其黨火頭弄宗等五十餘人初阿資之遁也揚言曰國家有萬軍之勇而我地有萬山之險豈能盡滅我輩英乃請置越州馬隆二衛扼其衝要分兵追捕之阿資窮蹙降甲午曹震葉升領兵分討東川叛蠻悉平之冬十一月思倫發遣把事招綱等來言叛逆之謀皆其下刁厮郎理為之以象馬白金入貢願輸貢賦百彛遂平二十四年冬十二月沐英以阿資畔服不常請徙越州衛于陸凉鎮之阿資復畔平羌將軍何福督兵討之至越州阿資援絶降福扼險置寧越堡二十五年夏六月丁卯西平侯沐英卒于雲南雲南二十郡左右分畫界以大江東北曰金沙西南曰蘭滄俱入海幅貟萬里英鎮雲南簡官僚修惠政剔姦蠧興學校治水利墾田一百一萬二千畝軍食嬴足恩威並著教化大行雲南遂為樂土嘗入朝賜宴奉天殿賫黃金綵幣陛辭上撫之曰使我髙枕無南顧憂者爾也既卒追封黔寧昭靖王命其子春襲封西平侯填雲南二十八年春正月置雲南按察司秋九月平緬諸蠻刁幹孟叛逐宣慰使思倫發奔訴京師命西平侯沐春為征南大將軍都督何福徐凱為左右副將軍率雲南四川兵討之冬十二月乙巳遣思倫發還雲南駐怒江上命沐春令刁幹孟歸而主母為不臣三十一年春二月刁幹孟請入貢夏五月西平侯沐春進兵擊平緬先以兵送思倫發于金齒使人諭刁幹孟不從乃遣左軍都督何福瞿能等將兵五千往討之福等躋髙良公山直搗南甸大破之殺其渠刁名孟斬獲甚衆還兵擊景罕寨寨乘髙據險堅守不下官軍糧械俱盡賊勢益盛福使告急于春春率五百騎往救之乘夜至怒江詰旦徑渡令騎馳躙寨下揚塵以警之賊乘髙望見塵起蔽天不意大軍卒至驚懼遂率衆降春乘勝復擊崆峒寨賊夜潰走刁幹孟乃遣人乞降帝以其反覆不之許尋春病卒何福討擒刁幹孟思倫發始得還平緬悉定谷應泰曰梁王以故元宗室裂土滇南國亡君死偷視蠻陲此其勢非同天水之坐大隴西子陽之稱尊白帝也大義自裁誓不反顧則北地劉諶猶能狥漢烏孫公主義不忘隋瘞王禕于北寺斬吳雲于沙塘死從余闕生愧危公討非得已節斯烈矣若以大命既去新主有歸天子北門已棄中原于敝屣孤臣天末難填滄海于丸泥則子嬰軹道詎是亡秦劉禪長安無須思蜀稱臣歸命納土入朝頡利冡留灞上突利老死并州我其臣僕之悲亦明哲保身之智也而乃猶豫兩端徘徊去就旌旗舳艫蔽江西上乃始開閫平章斂兵曲靖不知烏撒之師分出永寧普定之兵專攻曲靖大軍直搗雲南偏師還赴大理堂陛有聚米之形將帥成破竹之勢釡中遊魂久己在太祖握中矣倉皇聞敗六宫出走龍衣焚于寶殿闔門驅死滇池鼠輩乃爾何因倔強如是耶或以魯連帝秦願蹈東海田橫入朝道刎客舍之志與而太祖之下雲南也運籌萬里料敵如神山川險厄俱似躬行進退指揮不爽尺寸史稱漢祖止于百敗不折敵畏唐宗不過身先諸將方其雄略瞪乎後矣若夫曲靖之戰沐英決䇿冒霧疾驅兵臨白石寧我薄人毋人薄我此先軫所以克也張幟展角潜出敵背此陳餘所以擒也臨江結陳退不能止此苻融所以死也甲高熊耳之山馬飲昆明之水路踰萬里時才百日耿弇功震祝阿李靖風行突厥潁川黔寧何多讓焉雖其後竊發時聞不煩左顧而軍若驚颷彼同敗葉遙傳仁貴咋舌稱神爭識令公望塵羅拜沐氏父子所以威行萬里也夫武帝用事西南彛夜郎卭笮遂成荒服唐復陷入吐蕃宋乃割于西夏元極兵威始分桐葉而黔寧永鎮三百年來不獨貝金象齒來自殊方抑且金馬碧雞入恭侍從豈非春風所及鷹眼能慈泮水之林鶚音速化猗與盛哉明史紀事本末卷十二
