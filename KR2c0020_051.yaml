body:
  text: 明史紀事本末卷五十一浙江提學僉事谷應泰編更定祀典世宗嘉靖九年二月給事中夏言請更郊祀洪武初中書省臣李善長等進郊社宗廟議分祭天地於南北郊冬至則祀昊天上帝於圜丘以大明夜明星太歲從夏至則祀地於方澤以五嶽五鎮四海四瀆從德祖而下四代各為廟廟南向以四時孟月及歲除凡五享孟春特祭於各廟孟夏孟秋孟冬歲除則合祭於高祖廟祀社稷以春秋二仲月上戊日太祖從之行之十年水旱不時多災異太祖曰天地猶父母也泥其文而情不安不可謂禮乃以冬至合祀天地於奉天殿列朝仍之至是給事中夏言上言古者祀天於圜丘祭地於方澤是故兆於南郊就陽之義瘞於北郊即隂之象凡以順天地之性審隂陽之位也豈有崇樹棟宇擬之人道者哉至於一祖二宗之配享諸壇之從事不於二至而於孟春稽之古禮俱當有辨因引程朱之論以駁合祀之不經疏入上方以大禮恚羣臣將大有更易得之甚悅賜言四品服織幣以旌其忠夏四月廷臣集議郊祀典禮先是夏言疏見納詹事霍韜嫉之上言分郊為紊朝政亂祖制帝置不問韜復為書遺言甚言祖宗定制不可變周禮為王莽偽書宋儒議論皆為夢語東西郊之説起自是而九廟亦可更矣言飛章并其書上之帝怒下韜獄於是中允廖道南上疏雜引周禮漢志唐六典諸書以明我朝郊廟之禮皆所當議其略曰我太祖高皇帝初年建圜丘鍾山之陽方丘鍾山之隂分祀天地至十年感齋居隂雨之應覽京房災異之説始命即舊址為壇行合祀夫前之分祀酌萬世帝王之道禮本太始者也後之合祀感一時災異之應禮緣人情者也太宗遷都當時未有建白以復古制者禮樂百年而後興詎不信哉至於宗廟之制國初立四親廟德祖居中懿熙仁祖次分尤右昭穆有定位禘祫有定時視商周七廟九廟其揆一也九年十月改建太廟乃比漢人同堂異室之制時享歲祫則設纍朝衣冠於神座而祀之於是始以功臣配享矣恐非古先聖王尊尊親親之道也周禮大宗伯兆日於東郊兆月於西郊我聖祖亦有朝日夕月之禮有其舉之莫敢廢也且今之大祀殿正倣古明堂之制宜法聖祖初制兆圜丘於南郊以祀天兆方丘於北郊以祀地尊聖祖配享以法周人尊后稷之意而又宗祀太祖太宗於大祀殿以法周人宗祀文王於明堂之禮兆大明於東郊兆夜明於西郊以法周人朝日夕月之禮增太廟大禘之祭正太祖南向之位移功臣於兩廡庶尊尊有殺親親有等而古典復疏入下禮臣議贊善蔡昻修撰倫以訓姚淶祭酒許詔學士張潮編修歐陽德給事中陳侃趙廷瑞御史陳講談纘皆以合祀為宜而淶言猶切夏言復疏申明祀享之議曰周人以后稷配天於郊以文王配帝於明堂欲尊文王而不敢以配天者避稷也今宜奉太祖配天於圜丘所以尊太祖奉太宗配上帝於大祀殿所以尊太宗於是復會羣臣集議右都御史汪鋐編修程文德給事中孫應奎御史李循義等八十二人皆主分祀大學士張璁董玘聞淵等八十四人亦主分祀而謂成憲不可輕改時詘不可更作尚書李瓉編修王教給事中魏良弼御史傅炯行人秦鰲柯喬等二十六人亦主分祀而欲以山川壇為方丘尚書方獻夫李承勳詹事霍韜魏校編修徐階郎中李默王道二百六人皆主合祀而不以分祀為非英國公張崙等一百九十八人無所可否帝命再議於是張璁雜引五經及諸史言郊祀者條析合祀之非明分祀之是名曰郊祀考議上之又疏言太祖太宗分配未當帝然其郊議疏言不報尚書方獻夫詹事霍韜亦上言前主合祀非是帝不問尋復韜職五月初建四郊羣臣議上帝曰分祀良是乃命建圜丘於南郊其北為皇穹宇建方丘於北郊其南為皇祗室作朝日壇於東郊夕月壇於西郊秋七月罷姚廣孝配享太廟移祀於大興隆寺從禮部尚書李時之請也罷列代帝王南郊從祀及南京廟祭命立帝王廟於京師初立文華殿聖師之祭奉皇帝伏羲氏神農氏軒轅氏帝師陶唐氏有虞氏王師夏禹王商湯王周文王武王南向左先聖周公右先師孔子東西向凡歲春秋開講先期一日皇帝皮辨服拜跪行奠禮冬十月正孔子祀典易木主及釐正從祀諸賢洪武初司業宋濓上孔子廟堂議略曰世之言禮者皆出於孔子不以禮祀孔子褻祀也古者主人西向几筵在西也漢章帝幸魯祠孔子帝西向再拜開元禮先聖東向先師南向三獻官西向猶古意也今襲開元二十七年之制遷神南面非神道尚右之意矣古者木主棲神天子諸侯廟皆有主大夫束帛士結茅為菆無像設之事今因開元八年之制摶土而肖像焉失神而明之之義矣古者灌鬯焫蕭求神於隂陽也今用熏薌代之非簡乎古者郊廟祭饗皆設庭燎示嚴敬也今以秉炬當之非瀆乎古之道有德者使教焉死則以為樂祖祭於瞽宗謂之先師若漢禮有高堂生樂有制氏詩有毛氏書有伏生也凡始立學者必釋奠於先聖先師非其師弗學非其學弗祭開元禮國學祀先聖孔子以顔子等七十二賢配諸州惟配顔子今以荀况之言性惡揚雄之事王莽王弼之宗老莊賈逹之忽細行杜預之建短喪馬融之附世家亦厠其中吾不知其何説也古者立學以明倫子雖齊聖不先父食今回參伋坐饗堂上而其父列食於廡間吾不知其何説也古者士見師以菜為贄故始入學者必釋菜以禮其先師其學官時祭皆釋奠今專用春秋非矣釋奠有樂無聲釋菜無樂是二釋之輕重以樂之有無也今襲用漢魏律所制大成樂乃先儒所謂亂世之音可乎古者釋奠釋菜名義雖存而儀注皆不可考開元禮倣佛儀禮饋食篇節文為詳所謂三獻獻後各飲福即尸酢主人主婦及賔之義也今憚其煩惟初獻得行之可乎他如廟制之非宜冕服之無章器用雜乎雅俗升降昧乎左右更僕不可盡昔者建安熊氏欲以伏羲為道統之宗神農黃帝堯舜禹湯文武次而列焉臯陶伊尹太公周公暨稷契夷益傳説箕子皆天子公卿之師式宜秩祀天子之學若孔子實兼祖述憲章之任其為通祀則自天子下逹茍如其言則道統益尊三皇不淪於醫師太公不辱於武夫矣昔周立四代之學學有先聖虞庠以舜夏學以禹殷學以湯東膠以文王復取當時左右贊成其德業者為之先師以配享焉此天子立學之法也上不喜謫濓安遠知縣不果用天順間林鶚知蘇州時蘇學廟像嵗久剝落或欲加以修飾鶚曰塑像非古也我太祖於太學易以木主彼未壞者猶當毁之幸遇其壞易以木主有何不可或以毁聖像疑之鄂曰此土耳豈聖賢耶孔子生佛教未入中國之前烏識所謂像哉於是併易從祀諸賢皆為木主然其他郡縣如故也至是上因纂祀典議成諭大學士張璁凡雲雨風雷之祀以及先聖先師祀典俱當以次纂入璁曰奏孔子祀典自唐宋以來未有得其正者臣謹採今昔儒臣議上聖明垂覽以為百世永遵之典一諡號漢平帝元年初追諡孔子曰褒成宣聖公唐玄宗追諡為文宣王元武宗加大成至聖文宣王宋姚燧曰孔子卒哀公誄之子貢以為非禮平帝始封諡蓋新莽以文其姦也國初大學士吳沉孔子封王辨曰後世之禮有甚似而實非者春秋列國僣王則黜之夫子人臣也生非王爵死而諡之可乎書曰天降下民作之君作之師師也者君之所不得而臣者也故曰詔於天子無北面所以尊師也彼以王爵之貴而隆於稱師者習俗之見也布政夏寅曰唐玄宗開元既尊老子為玄元皇帝尊大公為武成王則追諡孔子不得而缺豈可以李林甫不學無術之謬制為萬世程乎祭酒丘濬曰自漢平帝追諡孔子為宣尼公至開元加以文文者經天緯地者也若夫宣之為言諡法之美不過聖善周聞而已何足為聖人輕重哉又曰自古諡號未聞有喻言者大成之言出於孟子成者樂之一終也加此於至聖文宣王之上於聖德無謂也一章服唐玄宗開元間詔追諡文宣王仍出王者衮冕之服以衣之宋真宗祥符間加先聖冕服桓圭一從上公之禮冕九旒服九章徽宗崇寧間始詔冕用十二旒衮服九章金世宗大定間大成殿聖像冠十二旒服十二章朱熹曰宣聖之設像非古也洪武間創南京太學止用神主不設像今國子監有設像者仍元之舊也丘濬曰塑像之設自佛教入中國始李元瓘言顔子立侍則像在唐前已有之矣嗚呼姚燧有言北史敢有造泥人銅人者門誅則泥人固非祀聖人法也後世化其道而為之長短豐瘠郡異縣殊非神而明之之道也一籩豆樂舞唐開元間詔祀先聖樂用九宫舞用八佾宋徽宗大觀間賜禮器一副內籩十幂全豆十蓋全國朝成化十三年用禮部尚書周洪謨議詔增六佾為八佾加籩豆為十二祭酒章懋及夏寅皆非之以為十二籩豆八佾惟太學可行天子所自祭也郡縣皆行之祭禮僣矣夫孔子不觀魯僣王之禮寧自蹈非禮之祀哉一配享唐貞觀間始詔顔回配享曾參孔伋俱宋咸淳間配享孟軻元豐間配享宋洪邁曰自唐以來以顔淵至子夏為十哲坐祀廟堂上其後升顔子配享則進曾子於堂居子夏次然顔子之父路曾子之父點乃在廡下從祀之列子雖齊聖不先父食其何以安熊禾曰宜别設一室以齊國公叔梁紇居中南面把國公顔無由萊蕪侯曾點泗水侯孔鯉邾國公孟孫氏侑食西嚮𢎞治時謝鐸程敏政俱是之敏政又以程子之父珦朱子之父松請珦不附王安石新法松不附秦檜和議其歷官行已足述也一從祀程敏政疏曰唐貞觀三十一年始以左丘明等二十七人從祀孔子廟庭而并及馬融等臣考歷代正史馬融初應鄧隲之召為祕書歷官南郡太守以貪濁免髠徙朔方又為梁冀草奏殺李固作西第頌美之劉向初以獻賦進喜誦神仙方術嘗上言黃金可成鑄作不驗下吏當死所著洪範五行傳流為隂陽術家之小技賈逵以獻頌為郎附會圖讖致通顯不修小節蓋左道亂正之人也王弼何晏倡清談所注易專祖老莊而范寧追究晉室之亂以為王何之罪深於桀紂何休則止有春秋解詁一書黜周王魯又注風角等書班之於孝經論語蓋異端邪説之流也戴聖為九江守多不法何武劾之而免及為博士毁武於朝子賔客為盜繫獄武平心決之得不死則又造武謝王肅仕魏封蘭陵侯乃以女適司馬昭又為司馬師畫䇿計文欽毋丘儉濟其惡杜預守襄陽數饋遺洛中貴要伐吳因斫癭之議盡殺江陵人以吏則不亷以將則不義凡此諸人皆當罷黜而議者謂能守其遺經轉相授受臣竊以為不然夫守其遺經若左丘明公羊高榖梁赤之於春秋伏勝孔安國之於書毛萇之於詩高堂生之於儀禮后蒼之於禮記杜子春之於周禮可以當之融等不過訓詁釋章句而已至於鄭衆盧植鄭玄服虔范寧五人雖若無過然所行未能窺聖門所著未能明聖學也臣愚乞罷戴聖等八人祀鄭衆等五人祀於鄉后蒼在漢初説禮數萬言號后氏曲臺禮禮記賴以傳乞加封爵與左丘明等至孔子弟子見於家語者顔回而下六十六人而司馬遷史記所載多公伯寮秦冉顔何三人文翁成都廟所盡多蘧瑗林放申棖三人臣考宋邢昺論語注疏申棖孔子弟子在家語作申續史記作申黨其實一也今朝廷從祀申棖封文登侯在東廡申黨封淄川侯在西廡甚無謂且公伯寮乃聖門之蟊螣而孔子稱瑗為夫子家語史記林放俱不在弟子之列秦冉顔何疑亦字畫相近之誤臣愚以為申棖申黨位號宜存其一公伯寮等五人宜罷其祀而瑗放者各祀於其鄉又洪武三十九年行人司副楊砥請黜揚雄進董仲舒高皇帝納其言行之然荀况揚雄實相伯仲而况以性為惡以禮為偽以子思孟子為亂天下宜并况黜之其尚可議者則隋之王通宋之胡瑗也先儒以通為僣經而瑗亦少論著程子曰王通隱德君子也其粹處殆非荀楊所及朱子小學書亦偹載瑗事以為自秦漢以來師道之立未有過瑗者亦宜加封爵使得從祀學官臣按敏政所奏率多正論可採而𢎞治初禮官沮格不行同時謝鐸請祀楊時罷吳澄舉人桂蕚亦請祀蔡元定以為律吕大衍諸書俱有功於性理又授其子皇極範數此亦衆論之公也臣又按歐陽修所著本論有翊道之功蘇軾曰自漢以來道術不出孔子五百餘年而得韓愈愈之後三百餘年而得歐陽子夫韓愈既以從祀歐陽修豈可缺哉疏入上命禮部會翰林諸臣議編修徐階上言天子王祀孔子承襲已久一日不王衆人愚昧將妄加臆度以為陛下奪孔子王爵易惑難曉且天子像祀孔子衮冕章服顒然王度苟去王號勢必撤毁臣聞愛其人者杖履猶加珍惜况先聖之遺像乎國家廟祀孔子宫墻之制下天子一等樂舞籩豆與天子同今八佾十籩蓋猶諸侯之禮苟去王號將復司寇之舊彛宫殺樂以應禮文恐妨太祖之初制矣帝覽疏不懌出階為延平府推官帝乃自著正孔子祀典説頒賜羣臣璁復為孔子祀典或問上之上嘉焉衆議乃定於是改大成至聖文宣王為至聖先師孔子其配享四子仍稱復聖宗聖述聖亞聖從祀弟子稱先賢左丘明以下稱先儒俱罷公侯伯爵撤像題主祀之申棖申黨二人存棖去黨罷公伯寮秦冉顔何荀况戴聖劉向賈逵馬融何休王肅王弼杜預吳澄十三人林放蘧瑗鄭玄盧植鄭衆服虔范寧祀於其鄉進后蒼王通胡瑗歐陽修又以行人薛侃議併進陸九淵從祀而别祀啓聖公叔梁紇以顔無繇曾點孔鯉孟孫氏程珦朱松蔡元定從祀焉改稱大成殿為先師廟十二月已酉初有事於南郊先是上命製圓丘祀器金爐玉爵錦幕圭璧及鐘磬賁鼓諸樂器既成陳於文華殿召大學士張璁閲視是日帝親祀於圜丘奉太祖西向配各騂犢一用璧三獻九奏樂舞用八佾從祀四大明夜各騂牛一恆星五曜羣星及雲雨風雷師各牛一羊一豕一明日布詔天下頒恩錫於庶官布寬恤於小民大學士張璁言頃者生員李時揚疏請舉祀郊祇之禮以祈聖嗣夫古后稷之生祈於禖孔子之生亦禱於尼山大雅既醉之詩曰公尸嘉告曰君子萬年未錫祚胤曰釐爾女士從以孫子夫公尸之告皆祖考之錫福也臣願當兹慎選淑女之時以廣求嗣續之誠告於太廟世廟以祈祖考之祜慰聖母之心上嘉其請擇十二月二十四日行禮夏言充祈嗣醮壇監禮使十年春正月乙未特享太廟正太祖南向位初太祖立四親廟德懿熙仁同宫異廟各南向孟春特享於羣廟三時各祭於德祖廟序用昭穆後改建太廟同堂異室亦各南向四孟及嵗除俱各祭於中室仍序昭穆如初罷特享禮至英宗升祔九室悉偹憲宗將祔用禮官儀祧懿祖孝宗祔祧熙祖武宗祔祧仁祖獨德祖不祧時享則太祖太宗以下俱東西向至是帝諭張孚敬曰朕欲自今春享奉太祖居中太宗而下各居一室行特享禮三時仍聚羣廟於太祖之室昭穆相向行時祫禮季冬中旬並享太廟親王功臣配食兩廡以存太祖當代之制歲暮節祭行於奉先殿世廟止行四時之享歲暮祭於崇先殿庶祭義明而萬世可行也邪論勿惑即會李時議上或咨夏言以助之孚敬唯唯如諭議聞帝從之乃命祠官於廟中設帟如九廟狀奉太祖南向羣宗遞遷就室各南向特享之始退德祖於祧殿不復預時享矣祈榖於大祀殿初帝以孟春上辛行祈榖於大祀殿祭皇天上帝用騂犢一蒼玉一三獻九奏樂舞八佾奉太祖太宗配享夏言建議二郊奉太祖配祈榖奉太宗配張孚敬以為不可留中不下言又疏請帝謂羣臣違君悖禮切責之乃命祈榖太祖太宗並配二郊專奉太祖焉已而驚蟄始祈榖命議禘祭大雩秋報諸禮帝既正太祖位向欲復古禘祭乃命輔臣及禮官集議已而兼問大雩秋報諸禮命五品官亦與議焉侍讀學士夏言上言惟天子有禘故立始祖之廟則有世系可考者十世猶將立之然則又以何者為始祖自出之帝而祀之始祖之廟乎我祖宗之有天下以德祖為始祖百有六十餘年尊享太廟之祭今又定為大祫統羣廟之主矣然則王禘之祭又可復尊祖德乎身為始祖而又為始祖之自出恐無是禮也三代而下必欲如夏商之禘黃帝帝嚳則無所考若強求其人如李唐之祖聃又非孝子慈孫之所忍為也臣愚以為宜設先祖虛位而以太祖配享蓋太祖始有天下實始祖也疏入帝深然之時中允廖道南上言皇姓為顓頊之後宜禘顓頊太學士孚敬曰言虛位者失之幻言顓頊者失之誣惟禘德祖為當李承勛等皆以為然夏言復抗疏折其非是已而帝竟從言議定以丙辛年孟夏行大禘禮於太廟凡祭先一日令中書官書神牌於太廟曰皇初始帝神南向太祖配位西向帝又欲於奉天殿行秋報禮中陛行大雩禮夏言言秋報宜於大祀殿奉文皇帝配大雩宜於郊兆傍為壇孟夏後雩祭帝謂孟春上辛既行祥榖禮若春夏雨暘以時則雩祭代攝否則躬祀秋報禮姑寢不舉二月庚辰初朝日是日春分初行朝日禮於東郊太牢一用玉禮三獻樂七奏舞八佾三月建大神殿於南郊初南郊撤屋為壇祭之奉上帝神牌圜丘上配以太祖既祭而神牌莫知所藏帝命建大神殿以藏之帝又念舊存齋宫在圜丘北是踞視圜丘也欲改建於丘之東南夏言言向者大神殿之建乃陛下竭誠事天此制為可若更起齋宫圜丘之傍似於古人掃地之意未為允協且秦漢以來並無營室者質誠尊天不自封樹以明謙恭之意故惟大次之設為合古典陛下前日考據精詳豈今偶未之思耶伏望齋宫寢建以仰答太靈帝報可遂建土榖祗先蠶壇於西苑初議皇后親蠶於北郊自夏言首發之至是帝召張孚敬李時詣西苑相地建土榖壇乃併建先蠶壇於神壽宫側而毁北郊蠶室焉五月壬子初有事於北郊是日夏至帝祀地于方澤用騂牛一黃琮一三獻九奏樂舞八佾太祖西向配騂牛一從祀四壇五嶽及基運翊聖神烈山為一五鎮及天夀紀德山為一四海四瀆為二各太牢一八月癸未初夕月祭于西郊如朝日祭東郊十一年夏四月初營九廟帝御文華殿東室召大學士李時翟鑾禮部尚書夏言議復古七廟制其太廟寢祧俱存舊弗撤惟度地分建羣廟不決而退廖道南疏請建九廟併獻大祀禮成感雪賦及御札曾及其名者三帝悅下禮臣議夏言上言昔唐虞五廟夏后因之殷周皆七廟而祭法王制與劉歆宗説又各不同朱熹古今廟制引王制天子七廟外為都宫內敘昭穆漢不考古諸帝異廟異地不合都宫不敘昭穆明帝遵儉自抑遺命勿别為廟遂有同堂異室之制魏晉唐宋皆然我太祖初立四親廟始為近古後改建太廟又用明帝之制皇上大釐祀典於廟制不能無疑形諸翰札召論者屢矣苐太廟南近宫墻東邇世廟西阻前廟地勢有限垣外隙地不盈數十丈若依古制列六廟即盡闢其地猶不能容欲稍減規制則太廟嵬然而羣廟湫隘於義未安即使廟成皇上冠冕佩玉循紆曲之途遍列羣廟而奠獻之日亦不足矣議者謂羣廟可攝皇上仁孝誠敬可終歲舉祭止對越太祖而不一至羣廟乎丘濬謂宜間日祭一廟自十四日而遍此蓋無據而強為之説也馬端臨曰後世失禮豈獨廟制漢儒以來講究非不詳明而卒不能復古者以昭穆難定故也蓋昭穆必父子繼世而後可兄弟相及則紊矣故東都以來同堂異室未可盡非也帝曰朕於天地百神祀典俱已釐正獨太廟之禮未能復古可乎今太廟堂寢俱有定制不必更移其昭穆廟次即會官相度地勢奏聞於是言惶懼謝罪請先詣太廟旁量定地勢審度方位以聞帝從之乃撤故廟改建新宫太祖居中昭穆各三廟成祖廟在六廟之上諸廟合為都宫廟各有殿殿後有寢藏主太廟寢後别有祧寢藏祧主太廟門殿皆南向羣廟門東西相向內門殿寢皆南向十三年三月帝視大學釋奠先師帝以孔子改稱先師服皮辨服謁拜用特牲奠帛行釋奠禮樂三奏文舞八佾從祀及啓聖分奠用酒脯已視學進諸生橫經布講仍諭令敦本尚實勿徒事辭章六月南京太廟災夏言上言京師宗廟行將復古而南京太廟遽罹回祿陛下建德之意聖祖啓後之靈不可不默會於昭昭之表也帝喜令亟起新廟南京太廟不復建遺址築周垣焉時祀并入南京奉先殿蓋失鎬洛遺意矣十四年二月初建九廟先是夏言請定七廟額謂陛下復古廟制正太祖南向位則太廟之名實符周典太宗功德隆赫特建百世不遷之廟宜曰文祖世室在三昭上仁宗宣宗各為昭穆第一廟英宗憲宗為昭穆第二廟孝宗武宗為昭穆第三廟則萬世不刋之制也帝從之十五年二月纂修祀儀成自天地日月神祗帝王社稷及禘祫先師先農諸祀悉為分類成書首冠祀壇圖制及宸諭詩歌中書禮儀禮器樂舞樂章末附諸王表箋羣臣疏頌於是侍讀學士廖道南撰禋頌九章以獻五月建慈慶慈寧宫黜禁中佛像時帝欲除去禁中釋殿以其地奉建慈慶慈寧二宫命廷臣議僉以為可帝即命撤之召李時夏言入視大善殿見金範佛像不下千百俱命銷毁其几案懸鍍金函藏貯尚多佛骨佛牙諸物言退上疏力請焚瘞帝從之於是禁中邪穢迸斥殆盡六月敕祀薑嫄后稷於武功十一月詔天下臣民得祀始祖夏言據程頥議為請也十二月九廟成詔天下帝乃定五年一禘祀皇初祖於太廟以太祖配每立春特享祖宗於羣廟三時合享於太廟季冬大祫於太廟皇考獻皇帝止舉時祀十七年秋九月奉太宗文皇帝為成祖皇考獻皇帝為睿宗配上帝詳大禮議十一月薦大號於天改昊天上帝稱皇天上帝二十年夏四月辛酉九廟災詳大禮議二十四年夏六月撤元世祖廟祀及其侑饗木黎華等五人從給事中陳裴議也秋七月太廟成復同堂異室之制穆宗隆慶元年禮官言先農之祭即祈榖遺意今二祀並行於仲春不無煩數宜罷祈榖於先農壇行事大享禮亦宜罷詔可惟四郊如舊谷應泰曰漢制近古然禮制缺焉唐祖李聃宋祀靈應禮官式微愈彰誣褻明初宋濓諸臣講禮戎行頗多釐正高祖喜簡易不見採擇豈禮樂必百年後興歟後世謹守故府學士大夫莫敢辨難世宗自大禮議慨然有更定制作之思而諸臣紛紛言祀事矣嘉靖九年二月議郊社禮冬十月議孔子禮十一月有事南郊十年春正月享太廟議祧禮二月祈榖議禘行朝日禮建土榖先蠶壇五月有事北郊八月行夕月禮十三年四月視太學行釋奠禮十四年二月建九廟十七年五月議明堂秋饗禮九月祔獻皇帝加睿宗配祀上帝嗚呼盛哉至尊莫大於天地至親莫大於祖宗教天下莫大於孔子養天下莫大於土榖尊天地故有郊社郊壇於南社壇於北本其氣也日月風雷山海嶽瀆隨焉從其類也配以太祖明受命也秋復饗於玄極殿報其功也秋則配於太宗告成功也晚易睿宗昵於私已親祖宗故有太廟太廟七太祖三昭三穆也文世室一别祀成祖不敢祧也立春特享三時合享勤時祭也季冬大祫萃渙也五年一禘設皇初祖主配於太祖追本報逺也德祖祧矣禘宜用德祖焉虛設皇初祖位泥古而誣者也黜德祖若羣帝然嫌高帝已教天下故祀孔子孔子加封自漢平帝始也王拜於帝僣已稱先師禮也廟祀設像自唐開元始也其褻已甚易木主禮也八佾十二豆籩自宋徽宗始也祭用生祿太學仍之郡國減等禮也帝釋奠舞六佾謬已從祀四聖七十二賢矣曽點顔路退食廡下子先父食改附啓聖禮也刪申黨黜公伯寮等十三人改蘧瑗等七人進后蒼等五人考證班班勿僣勿黷禮也養天下故祀土榖祈榖於太祀殿用人道也配以太祖太宗有天下之主也遷蠶室於西苑申內禁也土榖壇亦遷焉非其類已帝採稽典聞精思禋祀進退羣心斟酌美偹庶幾一代之典亦十世可知之故也明史紀事本末卷五十一
