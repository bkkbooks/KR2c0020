body:
  text: 明史紀事本末卷二十三浙江提學僉事谷應泰編平山東盗成祖永樂十八年三月山東蒲臺縣妖婦唐賽兒作亂賽兒縣民林三妻少好佛誦經自稱佛母詭言能知前後成敗事又云能剪紙為人馬相戰鬬往來益都諸城安州莒州即墨壽光諸州縣煽誘愚民于是奸人董彦杲等各率衆從之擁衆五百餘人據益都卸石棚寨為出沒青州衛指揮髙鳯領兵捕之賊夜乘間擊官兵潰散鳯等皆䧟都布按三司以聞遣人馳驛招撫之直𨽻沂州衛亦奏莒州賊董彦杲等聚衆二千餘人以紅白旗為號大行刧殺莒州千戸孫恭等往招撫不服殺其從者勢甚猖獗上敕安逺侯栁升分兵勦之栁升兵至益都圍賊于卸石棚寨賊遣人乞降詐云寨中食盡且無水升以東門舊有汲道即往據之夜二鼓賊襲官軍營都指揮劉忠力戰死黎明栁升始覺分兵追捕獲賊黨劉俊等男婦百餘人而賽兒等竟遁時賊黨賔鴻等攻安丘知縣張璵縣丞馬撝集民夫八百餘人以死拒戰賊不能攻復帥莒州即墨之衆合萬餘人併力攻之聲言屠城于是都指揮衛青備倭海上聞安丘圍急率千騎晝夜兼行奮擊敗之賊收餘衆再戰城中人亦鼓譟出擊賔鴻遁去殺賊二千餘人生擒四十餘人皆斬之時城中已不支使青至稍遲即陷賊矣既而栁升至青迎謁升怒其專制捽出之青不為屈是日鰲山衛指揮王貴亦以兵一百五十人擊敗賊衆于諸城盡殺之山東悉平行在刑部尚書呉中等劾奏栁升奉命征勦不即就道敕諭以賊憑髙無水且乏資糧當坐困之勿圖近功升賊臨境不設備至賊夜斫營殺傷軍士時都指揮劉忠與升夾攻忠身先軍士幾破賊壘升忌其成功更不救援致忠力盡而斃賊遂得乘間遁去升遣指揮馬貴等追之所過騷擾升亦不問及備倭都指揮衛青聞賊圍安丘急躬率所部兵晝夜兼行遂敗賊衆後三日升始至反忌青功故行摧擊人臣不忠莫此為甚請治其罪上曰朕毎命將遣師必丁寧告戒俾圖萬全今升方命失機媢功忌能罪不可宥遂下升于獄上以唐賽兒久不獲慮削髪為尼或混處女道士中遂命法司凡北京山東境内尼及道姑逮至京詰之七月以段民為山東左叅政是時大索唐賽兒甚急盡逮山東北京尼既又盡逮天下出家婦女先後幾萬人段民撫定綏輯曲為解釋人情始安初唐賽兒夫死賽兒祭墓囘經山麓見石罅露石匣角發之得妖書寶劒遂通曉諸術劒亦神物惟賽兒能用之因削髮為尼以其教施里閈間悉騐細民翕然從之欲衣食財物隨所須以術運致初亦無大志乃妖徒轉盛至數萬官捕之急賽兒遂反殺傷軍兵甚衆三司皆不以蚤發繫獄既而捕得之將伏法怡然不懼裸而縳之臨刑刃不能入不得已復下獄三木被體鐵鈕繫足俄皆自解脱竟遯去不知所終三司郡縣將校等官皆以失㓂伏誅谷應泰曰自古盗賊之起也莫不好為妖瞀惑亂陳勝以篝狐張角以斗米而號則天公地公霧則三里五里何其恠也予以為男誠有之有亦宜然史稱琊邪吕母聚黨數千人殺海曲宰入海中為盗而同時平原女子遲昭平亦聚數千人屯河阻中以是知婦女之輕剽好作亂大扺不少概見也成祖時有蒲臺唐賽兒者自號佛母能刻楮為人馬相戰鬬衆益信之于是莒即墨諸奸民遂蠭起而賊黨董彦杲賔鴻等亦掠兵應之幸所據不過數州轉戰不過旬月衛青王貴兩軍急擊旗靡轍亂魚爛而亡矣然則賽兒妖術果安在耶豈王凝之鬼兵相助而大道竟不可信耶抑費長房役使鬼物而遂為羣鬼所殺耶是皆不可知而獨是栁升以通侯之尊授鉞出師驛騷供億逍遥河上乃更切責衛青忌嫉有功假令大敵在前將校不和王師可一戰而潰也雖然成祖之用兵也南定金陵北征沙漠地拓三獠威行萬里而賽兒以一愚婦人躑躅其間乃欲結娘子之軍乘夫人之城譬之薄石擊柱多見其不知量矣然而予以賽兒之亂則黷武之所致也秦風尚首功而小戎亦談車戰河北甚藩鎮而女子亦通劒器牝雞之晨或亦怒蛙之式乎至于賽兒遁去而燕齊諸尼并天下奉佛婦女逮者幾萬人猶之石閔戮羯部多髯髙鼻者并誅袁紹斬宦官面不生鬚者亦殺玉石俱焚勢固然也尤可異者賽兒蹤跡杳不可問豈軍中張燕羣號冲飛河上孫恩相傳水化妖耶人耶吾弗知之矣明史紀事本末卷二十三
