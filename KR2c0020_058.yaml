body:
  text: 明史紀事本末巻五十八浙江提學僉事谷應泰編議復河套英宗天順六年春正月瑪拉噶等入河套是時保喇稍衰其大部瑪拉噶阿勒楚爾少師孟克與保喇相仇殺而立托蘇以為汗托蘇故小王子從兄也於是瑪拉噶阿勒楚爾博勒呼三部始入河套然以争水草不相下不能深入為冦時遣人貢馬頗通諾延諸衛擾塞下河套周圍三面阻黄河土肥饒可耕桑宻邇陜西榆林堡東至山西偏頭關西至寧夏鎮東西可二千里南至邊墻北至黄河逺者八九百里近者二三百里卽周之朔方秦之河南地漢之定襄郡赫連勃勃趙元昊之所據以為國者也唐三受降城在河套北黄河之外元東勝州在受降城之東國初諸部遁河外居漠北延緩無事正統以後王驥等兵次甘肅申明號令河套以寧然間亦渡河繼而守將都督王順始築榆林城創沿邊一帶營堡墩臺累増至二十四所嵗調延安綏徳慶陽三衛官軍分戍而河南峽西客兵助之列營積糧以遏要衝景泰初犯延慶不敢深入至是阿勒楚爾掠邉人以為嚮導因知河套所在不時出沒遂為邉境門庭之害憲宗成化元年冬十月瑪拉噶冦陜西都御史項忠及彰武伯楊信禦之遁去二年春三月延綏紀功兵部即中楊琚奏河套冦屢為邊患近有百戸朱長年七十餘自幼熟遊河套親與臣言套内地廣田腴亦有鹽池海子葭州等民多墩外種食正統間有寧夏副總兵黄鑑奏欲偏頭關東勝關黄河西岸地名一顆樹起至榆溝蘇黙圗六鎮沙河海子山火石腦兒鹻石海子回回墓紅鹽池百眼井甜水井黄河溝至寧夏黒山嘴馬營等處共立十三城堡七十三墩臺東西七百餘里實與偏頭關寧夏相接惟隔一黄河耳當時議者以為地土平漫難據已之後總兵官石亨又奏欲將延綏一帶營堡移徙直道實為萬世防邊之長策也帝曰楊琚所奏移堡防邊具有証據其言有理兵部即㑹官議處以聞六月大學士李賢等奏河套與延綏接境原非敵人巢穴今瑪拉噶居處其中出沒不常茍欲安邊必須大舉而後可乞令兵部㑹官博議進兵搜勦務在盡絶其總制將官與凡出兵事宜俱預處請畫又秋禾方熟彼必入掠而延綏鄜慶環縣一帶宜推選武將一人統歩騎精兵萬人守禦庶幾有備無患於是兵部尚書王復同孫繼宗等集議以大同總兵楊信舊鎮延綏稔知地利宜召還京面受成算其陜西寧夏延綏甘凉大同宣府鎮廵諸官亦宜𠡠令整飭兵備候期調發帝允所擬遂召信還以修武伯沈煜代之乃勑陜西廵撫項忠太監裴當總兵楊信恊謀征勦河套三年春正月瑪拉噶乞通貢制曰無約而請和者謀也其令各邉謹備之瑪拉噶不得貢渡河東侵大同廷議楊信兵少不足制之於是以撫寧伯朱永為大將軍率京兵徃都督劉聚鮑政副之㑹瑪拉噶再上書求貢許之二月瑪拉噶入大同界帝命原調大同宣府偏頭關等處搜勦河套官軍仍留各城守禦四年春二月竒木嘉色稜殺阿勒楚爾併其衆而結元孽瑪勒圖入河套六年博勒呼等據河套邉人大擾乃勑都御史王越總關中軍務議搜河套復東勝越等奏言河套水草甘肥易於駐劄腹裏之地道路曠逺難於守禦陝西博勒呼竒木嘉色稜等糾率醜類居套分掠出入數年雖嘗阻於我師然未經挫衂終不肻退近日據我河曲擾我延綏寧夏深入我平鞏固原近又覘我大同逼我萬全乞命廷臣共議得一爵位崇重威望素著者統制諸軍徃圖大舉朝廷從其議以武定侯趙輔充總兵官總制各路軍馬搜河套尋以疾還遂不復舉七年春二月朱永以河套冦未退議戰守二策事下兵部白圭等以馬方瘦損供餉不敷勢難進勦請命諸將慎為守禦以圖萬全帝從之命吏部右侍郎葉盛行視河套時議増兵設險或請大舉驅之出河外沿河築城堡抵東勝徙民耕守其中盛徃上言搜河套復東勝未可輕議唯増兵守險可為逺圖帝從之九年秋九月瑪勒圖與博勒呼並冦韋州總督王越偵知其老弱盡行巢於紅鹽池可取也乃與總兵許寧逰擊周玉等率輕騎晝夜馳三百餘里襲擊之擒斬三百餘級獲雜畜噐械甚衆盡燒其廬帳而還自據河套以來無歲不深入殺掠人畜至數千百萬邉將擁兵莫敢誰何徼所遺老弱及殺平民以上功冒陞賞三遣大將朱永趙輔劉聚出師亦多效邊將故習以是益横内地且危廷臣日議搜套聚兵八萬糜資儲無筭而師竟不出至是㨗賊内失其孥相與悲泣渡河北去患少弭孝宗𢎞治八年北部復擁衆入河套住牧十三年冬十二月和碩入河套和碩等渡河而東焦家坪娘娘灘羊圏子等處為衝其要在偏頭關三受降城受降城者唐所築禦冦於河外者也中城南直朔方西城南直靈武東城南直榆林相距各四百餘里花馬池要地成化前患在河西據套而河東為其衝花馬池居其中都御史徐廷璋楊一清王瓊新獲城效力甚堅花馬池西至興武營一百二十里又西至横城堡一百四十里一漫沙漠冦路拆墻頗易入靈韋掠環慶犯平固則清水營鐵柱泉小鹽池一帶為㨗徑自大廣武渡河而下至靈韋亦易武宗正徳元年春正月總制三邉楊一清上言受降據三面之險當千里之蔽正統以来舍受降而衛東勝已失一面之險又輟東勝以就延綏則以一面之地遮千餘里之衝遂使河套沃壤為冦甌脱巢穴其中而盡失外險反備南河此陜西邊患所以相尋而莫之觧也兹欲復守東勝因河為固東接大同西接寜夏使河套千里之地歸我耕牧開屯田數百里用省内運則陜西猶可息肩也又上六事其一修築定邊營迤東邊墻其二修復寧逺基邊迤西北堡其三増設花馬池及興武營衛所其四防禦靈州上逹其五整飭韋州官軍其六増修黑山鎮逺關墩臺多中機宜帝可其奏刻期奏績以忤劉瑾乞休工亦罷僅築四十餘里屹然巨嶂也初𢎞治末朝廷清明諸大臣協和盡心體國為經久計以故議復河套會孝宗崩瑾既專政一清復得罪去遂無敢言及河套者我邊日減敵日進矣嘉靖元年套騎二萬自井兒堡撒墻入固原平凉涇州殺指揮揚洪千户劉瑞先是正徳間小王子三子長阿爾婁次阿珠次䝉古勒章太師額布勒殺阿爾婁遯入河西西海之有冦自額布勒始也阿爾婁二子長伯竒次克們皆幼阿珠稱小王子未幾死衆立伯竒稱伊克汗伊克汗大營五浩沁察哈爾曰昭阿爾曰布勒噶爾曰克實克騰曰巴哩巴可五萬人伯竒居中屯牧五營環之又東有喀提哈哈額特三部喀提部營三其渠莽果王哈哈部營三其渠孟克保喇額特部營一其渠昆都徳哷三部共六萬人居沙漠東偏與諾延為鄰西有永寔卜阿爾托蘇䝉古勒章三部永寔卜部營十曰阿克蘇曰哈喇沁曰薩納勒曰保喇曰達爾罕曰實保沁曰巴勒鄂特曰鴻和爾丹曰納木珍曰哈爾布奈曼故屬額布勒額布勒遁西海去遂分散無㡬惟哈喇一營僅全阿爾托蘇部營七故亦屬額布勒後從濟農合為四營曰博果斯曰烏遜曰鄂噶薩納曰達蘭可七萬䝉古勒章部營八故屬和碩後從諳達合為六營曰多羅曰圗們輝和爾曰烏紳曰巴約曰烏嚕曰圖古勒三部衆可四萬濟農諳達皆出入河套阿珠子也諸種中獨強時冦延寜宣大南有哈喇沁海蘭二部哈喇沁部營一渠巴達喇喀納衆可三萬海蘭部營一渠寔喇台吉衆可二萬居宣府大同寨外北有烏梁海營一故小王子北部也因隙叛去至今相攻又西為衛喇特可五萬人世與土魯番為讐諸部雖逐水草遷徙不定然營皆有分地不相亂十二月冦固原環衛間殺傷以萬計十七年冬十一月廵按山西御史何賛疏言河套為吉囊所據外連西海内搆大同宜急勦除其䇿有二一曰計以破之二曰勢以走之而其要在於久任撫臣以責成效興復屯法以裕邉儲議寢不行二十四年春正月廵按山西御史陳豪疏言北冦三犯山西殺傷百萬此不可以常冦目之計費帑金六百萬而戰守無尺寸功諸臣建議動稱屯守不知賊衆内侵不由諸隘口皆猿攀絶壁蟻附懸崖邉垣又何足恃况諸鎮烽卒皆媒冦日為生計多囊針刀遇偵者賂求不殺彼此譯語互為和同待其深入然後舉燧發礟降堠轉走葢不止一日一處為爾且邇來之冦類多我民亡命為彼向導故連歲非時倐至冒險深入如履故途乞下延臣集議萬全之䇿期於必戰盡復套地庶可弭其其内擾之患而邉境無虞矣章下兵部議行二十五年秋八月套騎三萬餘入犯延安府至三原涇陽殺掠人畜無筭總督三邉侍即曾銑請復河套條為八議一曰定廟謨二曰立綱紀三曰審機宜四曰選將材五曰任賢能六曰足芻餉七曰明賞罰八曰修長技計萬餘言指據明悉下兵部議行冬十二月總督曽銑廵撫謝蘭張問行等奏延綏宻與套冦為隣自定邉營至黄甫川連年入冦率由是道所當急為修繕分地定工次第修舉起自安邉營東至龍州堡計長四百四十餘里為中段自雙山堡而東至黄甫川計長五百九十餘里為下段歲修一段期以三年竣事乞發帑銀如宣大山西故事疏下部議銑復言套賊不除中國之禍未可量也今日之計宜用練兵六萬人益以山東鎗手二千多備矢石毎當秋夏之交携五十日之餉水陸並進乘其無備直搗巢穴材官騶發礟火雷擊則彼不能支歲歲為之毎出益勵彼勢必折將遯而出套之恐後矣俟其逺出然後因祖宗之故疆并河為塞修築墩隍建置衛所處分戍卒講求屯政以省全陜之轉輸壯中國之形勢此中興之大烈也願陛下斷自聖心亟定大計夫臣方議築邉又議復套者以築邉不過數十年計耳復套則驅斥兇殘臨河作陣乃國家萬年久逺之計唯陛下裁之疏下兵部議行謂築邉復套兩俱不易相較則復套又難夫欲率數萬之衆賫五十日之糧深入險逺艱阻之域以驅數十年盤據之兵談何容易故不若修墻築邉為計完而成功可期也但延綏一帶地勢延漫土雜沙鹻居民隔逺最為荒凉若欲一千五百里之地而責成於三年之功恐未易集縱使能成亦難為守宜仍行銑等計議以聞帝曰冦據河套為中國患久矣連歲關隘横被荼毒朕宵旰念之而邉臣無分主憂者今銑能倡復套之謀甚見壯猷本兵乃久之始覆迄無定見何也其令銑更與諸邉臣悉心圖議務求長筭若邉境千里沙漠與宣大地異但可就要害修築兵部其發銀三十萬兩與銑聼其修邉餉兵造器便宜調度支川備明年防禦計二十六年夏五月總督曽銑出塞襲套部勝之初春時銑督兵出塞掩撃敗還不以聞至是復襲之冦覺銑搜選鋭卒督之戰馘斬二十六人生擒一人托克托和斃於矢石者甚衆獲馬牛駝槖九百有五十械器八百五十三以㨗聞敵移帳漸北間以輕騎出掠銑復督諸軍驅之遂逺遁不敢近塞銑旣以㨗聞更列上諸臣功罪帝以套冦連年深入如蹈無人之境大損國威銑能率兵出塞擒斬有功命増俸賜白金紵幣有差十一月總督曽銑㑹同陜西廵撫謝蘭延綏廵撫楊守謙寧夏廵撫王邦瑞及三鎮總兵議復套方畧乃條列十八事曰恢復河套修築邊墻選擇將材選練士卒買補馬驘進兵機宜轉運糧餉申明賞罰兼備舟車多置火器招降用間審度時勢防守河套營田儲蓄及明職守息訛言寛文法處孽畜又上營陣八圖曰立營總圖及遇敵駐戰選鋒車戰騎兵迎戰歩兵摶戰行營進攻變營長驅獲功收兵各圖帝覧而嘉之奏下兵部尚書王以旂㑹廷臣集議言曽銑先後章疏俱可施行帝曰冦據河套為國家患朕軫宵旴有年念無任事之臣今銑前後所上方畧卿等旣已詳酌即㑹同多官協忠抒謀以圖廊清其定䇿以聞二十七年春正月大學士夏言罷初河套之議言力主之嚴嵩積憾言且欲躐其首輔於是因災異疏陳缺失謂曽銑開邉啟釁誤國大計所致夏言表裏雷同淆亂國事當罪遂罷言逮銑詣京出兵部尚書王以旂總督軍務廷臣議罪凡與議復套者悉奪俸并罰言官廷杖有差於是復套事宜悉為停止㑹諳達蹈氷踰河入套將謀犯延寧聲勢甚張廵撫延綏楊守謙以聞嵩激上怒謂諳達合衆入套皆曽銑開邉啟釁所致於是兵部侍即萬鎮等叅曽銑㒺上貪功之罪甘肅總兵咸寧侯仇鸞初被銑劾奏逮京亦上疏訐銑嵩主之棄銑市銑有機畧初為御史廵按遼東㑹遼陽廣寧撫順兵變銑宻運方畧悉捕首惡誅之全遼大定時論以為才比視西師乃倡復套議夏言好邉功遂力主持之時敵勢方熾而我兵積弱銑疏下部議久之未覆上亦危疑之宻以訊嚴嵩嵩素與言不相能欲因是陷言銑銑竟論死家無餘貲妻子狼狽逺徙後九月復冦宣府上曰冦以言銑收河套故報復至此遂并斬言天下並寃之自言銑死竟無一人議復河套者谷應泰曰邉備所爭者二地勢坦衍敵騎四入列守不足追哨難及蘇子所謂大梁四戰之衝汪立信所謂長江隨處可入是也地或險阨山谷林薄寒嶢不畊沙鹵乏水耿弇第言五溪水險縋糧而食馬文升言西域道旱因雪為泉是也若河套三面憑河荷戈守禦險踰長城地又肥饒耕桑自給然則河套屯守歲省租税數十萬障塞之卒亦十餘萬東距偏頭西抵寧夏二千里中晝乏旌旗夜罕鼓柝矣周城朔方漢開河西有自來也邉備久虚縱敵深入畜牧既久樂不思去伏蒿之雉不復畏鷹噍穴之鼠不復畏貓而邉將又坐視養癰莫敢深入憲宗時楊琚請建一十三城堡七十四墩臺李文逹又以中筦力賛乃三帥授劍或輿疾徵還或遷延不出惟王越深入紅鹽池焚其廬帳刼其器甲賊䘮失妻孥相顧慟哭而大師不繼虎牢一關卒為楚有河西數郡折為秦臣武宗時楊一清又請力圖受降旋以璫瑾去位夫仁願且爭險於黄河之外而扼受降今人乃歛兵於河套之内僅守延綏開門延冦角勝堂奥三方被敵秦晉騷然世宗之世延安涇陽皆供蹂􅏳矣曽銑毅然請行願以數萬之衆持五十日之糧水陸星馳矢礟電發燔燒積聚驅掠馬牛徃來出沒歲無寜晷食道既窮項王亦欲踐鴻溝之約將士思歸關羽不能救荆州之潰世宗屢降璽書特頒文綺展圖嘉歎刻期廓清而夏言又力主銑議樞臣俱先後奏行辟之充國旣有孝宣復煩魏相魏尚已逢文帝更遇馮唐君臣將相千載一時而乃急殺大臣以當星變先誅渠帥以謝兵端道濟誅而長城自壊得臣死而晉毒已亡予所惜者反禍為福難于轉石化成為敗疾又轉圜九重廟算倐智倐愚幕府平章忽功忽罪匣中之劍竟斬曹彬拜將之壇并收相國世宗之英察何如也明史紀事本末卷五十八
