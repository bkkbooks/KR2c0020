body:
  text: 明史紀事本末卷五十九浙江提學僉事谷應泰編庚戌之變嘉靖二十九年夏六月諳達冦大同境潰墻入悉精兵伏溝壑中而以老弱百騎往來為餌偵騎信之報總兵張逹逹素以果鋭敢入至大將意輕之合兵兵未合而遽率麾下馳擊之伏發圍逹數匝馬蹶遂見殺副帥林椿聞逹被圍不介馬而馳救逹不克亦死之逹椿皆驍勇善戰諳達得二將首輒引去事聞逮總督侍郎郭宗臯巡撫都御史陳耀下獄耀杖死宗臯謫戍遼左贈達左都督椿都督同知賜祀立祠春秋祀之八月諳達入薊州塞初張逹敗沒乃起復翁萬逹代郭宗臯總督趙錦代陳耀巡撫以仇鸞為宣大總兵萬逹家居未至命侍即蘇佑攝其事佑抵鎮即上疏請益兵食未報而諳達狼台吉復擁衆窺大同初仇鸞坐廢居京師邸以賄嚴世蕃得總兵宣大至是惶懼無䇿厮養時義侯榮者說鸞曰主勿憂吾為主解之乃為鸞持重賂賂諳達令移冦他塞勿犯大同諳達受貨幣遺之箭纛以為信而與之盟遂東去諜者復白敵中語欲冦宣府東遼左西兵部尚書丁汝䕫謂帝厭警報不悉以聞但申飭薊州撫鎮使嚴備己而警報漸甚乃發諸邉兵萬二千騎京營兵二萬四千騎分布宣薊諸關隘邉兵取符驗期會未即至而京兵悉市井傭保子識者知其必敗秋八月乙亥諳達帥部下至古北口以數千騎攻墻都御史王汝孝悉衆出火炮矢石下攻之諳達乃佯督兵綴薊師而别遣精騎從間道黃榆溝潰墻出師後京兵大驚潰爭棄甲及馬竄山林林莽中冦遂大殺掠懷柔順義吏士無算長驅入內地巡按順天御史王忬聞報度兵弱無能禦者夜草疏言敵兵慓悍若風雨而古北口距京師僅七舍漫衍無衛戍瞭望神京陵寢萬一蕩搖事係非小請速集廷臣議戰守策而身出駐通州召吏民給仗聼約束收漕舟艤潞河西勿使為敵用甫畢而夜半敵兵果至營河東二十里孤山汝口諸處忬復為疏縋城使使來京師請援京師震恐急集諸營兵城守少壯者已悉出邉堠敗喪僅餘四五萬人而老弱半之又半役總兵提督太監家不令歸伍倉卒從武庫索甲仗武庫閹又援例需價不時發久之不能軍丁汝䕫乃以聞帝大驚詔吏部左侍即王邦瑞定西侯蔣傅提督九門文武大臣各十三人守一門又别遣都御史商大節督科道官募民間材力者蒼頭義軍垂四萬及坊甲保伍分置諸門睥睨間集天下應武試者千餘人分從諸大臣䇿應檄召諸鎮兵勤王時冦騎逼通州數日前阻水未能渡王忬日夜乘城守不能支連告急詔遣都御史王儀往援己卯咸寧侯仇鸞得勤王檄以大同兵二萬入援先是冦既東行時義侯榮謂鸞曰賊騎東公宜自請入可以為功而上結於天子鸞悅即佯奏臣偵賊東犯薊鎮誠恐京師震驚請以便宜應援或隨賊搏戰或徑趨居庸為防守帝壯之詔留駐居庸關聞警入援而諳達果由薊鎮攻古北口入犯京師帝益信鸞詔入援鸞與副總兵徐珏逰擊張騰等率兵馳至陳通州河西帝大喜時保定都御史楊守謙以五千騎至延綏副將朱楫以三千騎至人心稍安己而河間宣府山西遼陽諸將各以兵先後至凡七鎮五萬餘人帝內視稍彊各賜璽書褒奬豫金帛令躡賊而拜咸寧侯仇鸞為大將軍諸道兵悉屬焉賜襲衣玉帶上尊及千金又賜封記文曰朕所重唯卿一人得密啓奏進以楊守謙為兵部左侍即總督各路戎務衛京師都督陸炳提督皇城諸門譏察不虞都御史商大節督巡五城防內釁太子太保禮部尚書徐階奏釋故參將戴綸歐陽安等繫令從軍自效分遣京營諸將營於城內外各巷陌間京營兵素未見敵驅之出不敢前城外及近地居民擁入連日夜不絶多被血淋漓至者都督陸炳請出太倉米減直濟流徙老弱俱報可時變起倉卒諸務未備勤王師各輕騎馳至未賫糗糧制下犒師牛酒諸費皆不知所出户部文移往復二三百軍士始得數餅餌開庾發粟則囊釡甑皆無所需故士卒饑疲都督陸炳言戶部臣失預計軍興糧餽不支士多餒死帝怒奪尚書李士翺以下諸官職戴罪辦事諳達兵自白河東渡潞水西北行大掠村落居民焚燒廬舍火日夜不絶郊民扶傷集門下門閉不得入號痛之聲徹于西內帝命啓而納之是日諳達掠婦女大飲演武堂上逰騎往返六門外仇鸞率勤王諸兵不敢擊時時遣義榮與之通許貢市以自安辛亥至東直門執御廄內八人以去不殺縛之見諳達踞坐氊帳中謂曰若歸見天子好為我致書自解送歸見帝啓書多嫚語求入貢壬午帝召大學士嚴嵩李本尚書徐階對於西苑出書示之曰何以應之嵩曰此禮部事階曰事雖在臣唯上主之帝曰正宜商議階曰冦駐兵近郊而我戰守之䇿一無所有宜權許以欵苐恐將來要求無厭耳帝曰茍利社稷皮幣珠玉皆非所愛階曰止於皮幣珠玉則可萬一有不能從將奈何帝竦然曰卿可謂逺慮階因請以計欵之言其書皆漢文難信且無臨城脅貢之禮可令退出大邊外别遣使齎番文因大同守臣為奏事乃可從往返間四方援兵計皆可至我之戰守有備矣帝曰卿言是命出集廷臣議日午羣臣畢集階出諳達書言欲以三千人入貢許之則緩兵否則益兵破京師羣臣相顧莫敢發因陳筆劄令各書所見奏請上裁國子司業趙貞吉抗言曰此不必問問則奸邪之臣必有以和說進者萬一許貢則彼必入城三千之衆恐烏蠻驛中莫之容也且彼肆深入內外夾攻何以禦之不幾震驚宫闕乎不務驅遂而畏其恐喝迫而許之何異城下盟檢討毛起謂時事孔棘宜暫許之邀使出塞而後拒之貞吉力叱起羣臣俱難之奏入乃止是夕火光燭天德勝安定門北人居皆燬上在西內大震懼聞中官稍稍道貞吉語乃馳使召入對給筆扎命疏所欲言貞吉上言陛下宜御奉天門下詔罪已追奬故都督周尚文之功以勵邊帥釋給事沈束於獄以開言路輕損軍之令重賞功之格飭文武百司共為城守遣官宣諭諸營兵使力戰且士不力戰以主將多冒首功今誠得首功一即豫金百捐金不十萬賊且盡矣帝壯之擢貞吉為左春坊左諭德兼河南道監察御史稱詔齎五萬金宣諭行營將士通政使樊深條禦冦七事中言仇鸞未聞一戰非士不用命即主將養冦要功乞密遣近侍詰狀書奏上大怒黜為民癸未冦由鞏華城犯諸陵轉掠西山良鄉以西保定皆震時帝久不視朝吏部尚書夏邦謨疏言人情洶洶非上躬御正朝廷見廷臣不足以塞天下望振威武許之是日文武大臣具服待命闕下晡時帝始出御奉天殿降𠡠切責諸大臣還宫羣臣就午門跪聽宣敕皆惴栗計有處分逮散門且下鍵矣乃敕遣官校逮繫駐守通州都御史王儀巡撫薊遼都御史王汝孝及薊州總兵羅希韓詣京即訊己而儀至下獄以畏懼不戰削籍去汝孝以道梗不及逮初儀至通州命營兵屯戍城外而身閉閣卧城中㑹仇鸞引兵至敵少却鸞兵往掠食諸村落儀發兵捕執下獄死者十數人鸞兵大譁欲甘心儀時巡厫御史上其狀帝恐故逮治之尋以巡按御史王忬為僉都御史代儀守通州甲午執兵部尚書丁汝䕫及左侍即楊守謙下詔獄初冦逼通州汝䕫聞警束手無措遣募哨敵虛實者出城不十數里道遇扶傷者輒奔還妄言見敵某所城中輒震己而言不信汝䕫不加罰復募他卒偵之如故城中數震而成國公朱希忠理京營兵多役占行伍不足恐兵少見且獲罪乃東西調掣為掩飾計士疲不得息多出恚語而莫曉誰調爭詈汝䕫欲魚肉之語稍聞禁中時宣府延綏遼陽山西援兵悉集廩餉不能給兵饑怨望仇鸞大同軍尤無律往往推髻劫掠村落中時被逋獲或自詭為遼陽軍遼陽軍者諾延諸部也先是有傳賊中語遼陽實導我來者故京師訛言遼陽軍叛而鸞方被寵遇雖獲大同行掠者有司不敢置之理必以聞帝謂大同軍首入援行掠亦出饑疲令付鸞自處鸞復置不聞汝䕫不得已乃下令勿捕大同軍大同軍益無忌民苦之甚于賊大同軍既自詭為遼陽民間不知遂謂汝䕫山東人以鄉曲故庇遼陽叛軍及冦薄城下汝䕫益惶急恐喪師令諸將勿輕戰諸軍故恇怯不敢戰皆誘言汝䕫禁不發民間益歸罪汝䕫而鸞機譎謀于大學士嵩嵩謂敗于邊可隱敗于郊不可隱飽將自去惟堅壁為上䇿鸞數稱率兵往擊賊賊實在城下顧逺屯郊坰外不敢近城中莫知鸞擊與否鸞得死賊首六級奪馬十餘詐謂戰得之守謙被命屯城下又以兵少故不敢一擊賊帝聞之益謂鸞逺出禦敵而守謙畏懦不出師與汝䕫并切責之諸中貴園墅在城外又多所殘毁爭泣訴帝前謂守謙汝䕫二于賊帝時從髙望城外火已心恚諸治兵者聞是益奮怒不誅一大臣亡以懲乃捕汝䕫下詔獄就廷訊使使自軍前逮守謙入下法司議罪以聞命王邦瑞攝兵部艾希淳代將守謙兵于是刑部侍郎彭黯左都御史屠喬大理寺少卿沈良才等論汝䕫守謙罪當斬而爰書冗長録不速竟帝坐齊宫趣獄具不得謂黯等比周將有所規免俱逮繫獄各廷杖有差汝䕫守謙俱棄市流其妻三千里外子戍鐵嶺衛謫左諭德趙貞吉荔蒲縣典史初貞吉廷議罷盛氣謁嚴嵩于西苑直房嵩不見貞吉怒叱門者通政趙文華趨入顧曰公休矣天下事當徐議之貞吉怒曰權門犬何知天下事嵩聞大恨乃佯薦貞吉出城賫銀勞軍方北騎充斥徵發旁午户工二部官皆得罪犒銀不時發諸軍分屯城外貞吉僦民車致銀仇鸞所鸞不受敵騎已稍逺貞吉計無所出賫敕巡城外遍給諸營而還復命嵩謂貞吉狂誕追論其申理周尚文沈束非是下獄杖九十有是謫己卯諳逹引而西前後所掠男女裸畜金帛財物既滿志捆載去欲西奪白羊口出塞而留餘衆京師外以為疑兵諸道兵悉屬大將軍凡十餘萬騎相視莫敢前發一矢諳逹至白羊口守將厄險禦不得出稍棄牛羊婦女等復擁衆東南行至昌平北猝與鸞兵遇鸞出不意倉卒幾不能軍敵縱騎蹂陳而入殺傷千餘人幾獲鸞以禆將戴綸徐仁力救僅以身免乃更取平民首上之自以為功冦騎遂長驅至天夀山總兵趙國忠列陳紅門前不敢入奪道循潮河川由古北口故道出京師解嚴九月辛卯朔諳逹悉衆出塞疲甚又顧戀輜重不能軍諸將故怯兼白羊之敗愈不敢逼徐尾其後至石匣城及張家古北等口外而還其前後禦敵有功者大同遊擊王祿戰懷來斬十七級獲馬十二匹山西遊擊戰昌平奪還男婦二百四十二人都督仇鸞戰海店生擒四人既而鸞報功八十餘級以捷聞帝優詔慰鸞加太保賜金幣遣户部侍郎駱顆賑撫被冦諸郡縣掩骼埋胔慰集瘡痍罷京營提督太監髙忠成國公朱希忠遂安伯陳鏸改十二團營為三大營曰五軍曰神樞曰神機總三營曰戎政府以咸寧侯仇鸞入理之為製印章重其任以王邦瑞協理戎政為鸞副邦瑞奏用兵部主事二人給事中御史各一人議論多牾鸞主事申燧復持法不為屈疏京營弊政乞釐革之鸞怒密陷燧出補外乃言京營用給事中御史不便皆革之置薊遼總督大臣以薊州保定遼東三鎮𨽻焉改孫禬為兵部侍郎總督薊遼未幾以何棟代之冬十月募諸道兵入衛京師山東山西河南諸府嵗集京師練備秋防秋後復散去以是為常如踐更卒例復選各邊鎮鋭卒入衛京師以京營將分練邊兵從咸寧侯鸞之請也兵部覆言二鎮京師之門户禦寇者不于門户而與之格鬬于堂奧之間鮮不危矣帝不聽第免二鎮卒不預徵于是各邊共選六萬八千餘人班上京師與京營兵雜練之塞上有警邊將不得徵集而京師在邊者不任邊責恣意朘削自營人人自危矣仇鸞請駐師宣大間整飭兵甲俟冬月大舉以紓華夏之氣乃班師入衛以備秋防帝嘉之命兵部㑹官集議兵部左侍郎史道户部尚書孫應奎工部尚書胡松等上議曰諳達犯順深入郊圻震驚陵寢荼毒元元罪在不赦皇上深懷大計欲興問罪之師而復有敵愾禦侮如鸞者身任其事臣等僉謀俱如鸞議即今整齊士馬臣道等之職預儲軍餉臣應奎等之職利精器械臣松等之職帝悅從之十一月仇鸞請易置三輔重臣以大同總兵徐珏駐易州以徐仁代守大同而宣府薊鎮總兵李鳳鳴成勳互易其地帝命兵部從之于是王邦瑞上言豫奪者朝廷之大權命將者天子之重柄祖宗時總兵正副官著兵部㑹同府部大臣集議每上一人恭候裁定所以慎重防杜其漸示臣下不敢專也今鸞坐名擬在更易四將則九邊握兵柄者有不目屬心向妄生覬覦者乎皇上聖明推心賢帥何所不可臣愚以為國家典制關係非輕聖人舉動萬世作則臣待罪本兵不敢不言帝曰戎政初修忠賢是托况朕有密咨非鸞專權爾兵部若隨事效忠用無不當不待更易矧勞朕心耶一籌未發而攻毁之謀國之忠固若是乎復諭廷臣曰昔吾太祖兵柄多委任諸大將未有作謗者邦瑞以敵退未受加擢故為是言是翟鵬之怨上也夫破格舉事而盡忠者乃不能容倘敵再至其效汝䕫之誤國乎邦瑞聞諭莫知所措仇鸞帥諸鎮兵出宣大聲言搗巢歷久不擊乃稍出近塞夜襲敵營斬老弱數級而還鸞自劾無功上不問乃復請廣集兵糧以明年大舉北征命户部遣使盡括南都及各省布政司貯積且督歷年逋賦時鸞恃寵作威福所上疏既自內批行之不下兵部議王邦瑞屢疏辨之鸞擠之遂落職去禮部尚書徐階極言北征事難以成功且後患有不可測議乃稍寢谷應泰曰明制內立京營外列邊戍邊卒屯守要害蕃衛神京京營羽翼王室填撫中夏有事不相徵調無事不忘訓習制甚周也嘉靖時坐營大帥半出勳臣敖以耳貴括讀奢書兼以勃鞮制閫魚朝觀軍戎伍貔貅入侯門之厮養羽林組練參中貴之蒼頭遊手市􅣃不操寸刃厠身兵籍濫食數丁于是京營一制幾同贅旒矣庚戌之事主邊兵者仇鸞主京兵者丁汝䕫也逆鸞私盟諳達賄路避兵鄭牛私犒用伐秦謀晉馬入陳故假虞道韋弦荀息果如是乎汝䕫選懦素不知兵驟聞邊警悉遣禁卒倉皇就道莫知適從而敵騎已蹂躪內地王師外潰于潼關烽火內達于甘泉矣然後索虎旅于空營求兵仗于武庫楚軍不戰皆化蟲沙晉國先聲愈搖風鶴𫝊檄召募命曰義軍編列市人驅之城堡京營至此尚可問乎至於邊軍雲集九門敵騎長驅都下便當四面合擊隻輪不反而乃懷光便橋屯兵不進宏淵靈璧搖扇清凉楚兵皆屬冠軍邯鄲全恃晉鄙長㦸不施長鎩不刺邊軍亦復至此國家武備真無可恃矣乃始親御午門召問百官時無樊噲僅有終生急散陳平之金親叩亞夫之壘宋義堅不渡河魏將虛名救趙惟有亟斬丁公先除元振奈何守謙無兵而使戰仇鸞不戰而陳俘賞加元惡戮出無名當時諳達實無志中國縱掠而歸不然幸則奉天梁州變且晉愍宋欽矣前車既覆後軫方遒汝䕫出京兵以防邊仇鸞召邊卒以實京揚水之卒圻父以卒召當誅涇陽之兵德宗又以未雨失算殛罪酬功國是全非焦頭曲突人謀兩誤嗟乎已無澶淵之賀尚思衛霍之功上表出師鸞欲誰欺乎百官明知其詐謬為陳請以逭上譴蓋世宗所惡者直言而不必其忠所喜者殺戮而不必其當朝有直言則損其明朝有殺戮則損其武究之嵩本賄敗當褫鸞已家居失職必欲强豫將相之位成其亂賊之名身誅族滅為世指笑吾故曰嚴嵩仇鸞亦無死道其死也世宗殺之也明史紀事本末卷五十九
