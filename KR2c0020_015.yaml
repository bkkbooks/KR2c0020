body:
  text: 明史紀事本末卷十五浙江提學僉事谷應泰編削奪諸藩太祖洪武三十一年閏五月建文帝即位詔改明年為建文元年帝太祖之孫懿文太子之子也生十年而懿文卒髙祖年六十有五矣御東角門對羣臣泣翰林學士劉三吾進曰皇孫世適富於春秋正位儲極四海繫心皇上無過憂髙皇曰善九月庚寅立為皇太孫時諸王以叔父之尊多不遜一日太孫坐東角門召侍讀太常卿黃子澄告之曰諸叔各擁重兵何以制之子澄以漢平七國事為對太孫喜曰吾獲是謀無慮矣初太祖建都金陵去邊塞六七千里元裔時出沒塞下捕殺吏卒以故命並邊諸王得專制國中擁三護衛重兵遣將徴諸路兵必關白親王乃發洪武九年五星紊度日月相刑訓導葉居升應詔陳言極論分封太侈略曰日者君之象也月者臣之象也五星者卿士庶人之象也臣愚不知星術姑以所聞於經傳并托前世已行之得失者論之詩曰彼月而食則維其常今日刑於月猶之可也而日月相刑則月敢抗於日者臣敢抗於君矣傳曰都城過百雉國之害也國家懲宋元孤立宗室不競之弊秦晉燕齊梁楚吳閩諸國各盡其地而封之都城宫室之制廣狹大小亞於天子之都賜之以甲兵衛士之盛臣恐數世之後尾大不掉然後削之地而奪之權則起其怨如漢之七國晉之諸王否則恃險爭衡否則擁衆入朝甚則緣間而起防之無及也今議者曰諸王皆天子親子也皆皇太子親國也何不托漢晉之事以觀之乎孝景皇帝漢髙帝之孫也七國之王皆景帝之同宗父兄弟子孫也當時一削其地則搆兵西向晉之諸王皆武帝之親子孫也易世之後迭相擁兵以危皇室遂成四裔雲擾之患由此言之分封踰制禍患立生援古證今昭昭然矣昔賈誼勸漢文帝早分諸國之地空之以待諸王子孫謂力少則易使以義國小則無邪心願及諸王未國之先節其都邑之制減其衛兵限其疆里亦以待封諸王之子孫此制一定然後諸王有聖賢之德行者入為輔相其餘世為藩輔可以與國同休世世無窮矣太祖怒繫死獄中後無敢言者至是太祖崩遺詔曰朕受皇天之命膺大任於世三十有一年憂危積心日勤不怠專志有益於民奈何起自寒微無古人之博智好善惡惡不及多矣今年七十有一筋力衰微朝夕危懼慮恐不終今得萬物自然之理其奚哀念之有皇太孫允炇仁明孝友天下歸心宜登大位中外文武臣僚同心輔佑以福吾民葬祭之儀一如漢文帝勿異布告天下使知朕意孝陵山俱因其故勿改諸王臨國中無得至京王國所在文武吏士聽朝廷節制惟護衛官軍聽王諸不在令中者推此令從事辛邜皇太孫即皇帝位葬孝陵援遺詔止諸王會葬詔下諸王不恱謂此齊尚書疏間也六月戶部侍郎卓敬密奏裁抑宗藩疏入不報於是燕周齊湘代岷諸王頗相煽動有流言聞於朝帝患之謀諸齊泰泰與黃子澄首建削奪議乃以事屬泰子澄一日罷朝召子澄曰先生憶昔東角門之言乎對曰不敢忘子澄退與齊泰謀之泰曰燕握重兵且素有大志當先削之子澄曰不然燕預備久卒難圖宜先取周剪燕手足即燕可圖矣乃命曹國公李景隆調兵猝至河南圍之執周王及其世子妃嬪送京師削爵為庶人遷之雲南冬十一月代王居藩有貪虐狀方孝孺請以德化道之帝遣之入蜀使與蜀王居時蜀王素以賢聞故也十二月前軍都督府斷事髙巍上書論時政曰我髙皇帝上法三代之公下洗嬴秦之陋封建諸王凡以護中國屏四裔為聖子神孫計至逺也夫何地大兵強易以生亂今諸藩驕逸違制不削則廢法削之則傷恩賈誼曰欲天下之治安莫若衆建諸侯而少其力臣愚謂今宜師其意勿施朝錯削奪之策效主父偃推恩之令西北諸王子弟分封於東南東南諸王子弟分封於西北小其地大其城以分其力如此則藩王之權不削自弱矣臣又願陛下益隆親親之禮嵗時伏臘使問不絶賢如河間東平者下詔褒賞不法如淮南濟北者始犯則容再犯則赦三犯而不改則告廟削地而廢處之寧有不服順者哉上嘉之然不能用建文元年春二月令親王不得節制文武吏士更定官制夏四月人告岷王梗不法事削其護衛誅其導惡指揮宗麟廢為庶人又以湘王柏偽造鈔及擅殺人降敕切責仍遣使以兵迫執之湘王曰吾聞前代大臣下吏多自引決身髙皇帝子南面為王豈能辱僕𨽻手求生活乎遂闔宫自焚死又以人告齊王槫陰事詔至京廢為庶人拘繫之幽代王桂於大同廢為庶人未幾靖難兵起谷應泰曰聞之周南始化二公分陜及其東遷晉鄭焉依以故衆建諸侯分王子弟屏藩天室拱衛京師勢綦重也髙皇帝大寶既定剪桐論封燕王居北平代王居代郡寧王居大寧碁布星羅屹然玄社揣其深謀不特維城之磐石抑亦北門之鎖鑰耳惟是并州警備多蓄重兵馬邑防秋得專節制鄭京城實危莊公晉曲沃實弒孝侯大都耦國禍之本也又況奏晉四府湘岷六藩莫不帝制自為偃蹇坐大藉神明之胄挾肺腑之尊揚水以粼粼而興周道以親親而弱變所從來非無故矣況乎沖齡御極主少國疑強宗亂家視同赧獻斯時賈生抱哭即召吳楚之兵主父設謀便啓晉陽之甲將使三家盡分公室餘地悉入廩延正所謂養虎貽患畜􅏴必潰者也故論者以建文之失在於削諸藩而豫則以諸藩者削亦反不削亦反論者又以建文之失在於削強藩而豫則以不削強藩者燕王最強最先反寧王次強必次反母怪齊泰黃子澄輩拊膺厝火握手閣門次第芟除計安宗社然而忠則竭矣算亦稍拙焉考其時周王岷王都被掩捕齊藩代藩並皆幽廢寧邸護衛見削湘王闔宫自焚數月之內大獄屢興案驗未明葛藟不芘必有托蒼天以報仇生皇家而勿願者況又中涓入燕逮繫官屬幾於十王並戮七國行誅釁起兵端非無口實矣以豫論之方太祖小祥之時正諸藩遣子之日宜於大內置百孫院因而留之仍擇名臣傅之禮義四小侯就學於漢即長安君入質於秦也而又分命洪武舊勳以撫綏為名開閫通州分屯河濟倣亞夫之堅壁立辛毗於軍門仍賜溫綸躬行德化梁王罪狀咸悉燒除吳王不臣錫之几杖則天潢諸嗣逆節雖萌反形猶戢而稍俟諸子弟年各冠婚即以尺一之詔分裂其地國小則永無邪心內割則未遑外事天下亂絲可徐理而解也獨奈何葉居升之奏被譴於髙皇而方孝孺之謀不行於嗣主比齊黃輩分道徴兵直出無策而石頭被詔激變蘇峻江陵蒙討逼反桓玄謀之不臧誰執其咎哉逮至燕兵南下建業合闈而谷橞獻門安楹首附周齊列藩以次復爵同惡相保理固然也獨是蜀王之賢無與興廢之謀超然評論之外雖河間之書集博士而畢讀東平之樹望咸陽而俱靡何以加焉明史紀事本末卷十五
