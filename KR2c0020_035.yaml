body:
  text: 明史紀事本末卷三十五浙江提學僉事谷應泰編南宫復辟景帝景泰元年八月丙戌上皇至自迤北入居南宫羣臣朝見而退大赦天下冬十月命靖逺伯王驥守備南宫十一月上皇在南宫萬壽聖節禮部尚書胡濙請羣臣朝賀不許既又請明年正旦百官朝上皇于延安門亦不許荆王瞻缸表請朝上皇有詔止之三年五月甲戌廢上皇長子皇太子見深為沂王出就沂邸立皇子見濟為皇太子先是上欲易儲語太監金英曰七月初二日東宫生日也英頓首對曰東宫生日是十一月初二日上默然至是上意既定恐文武大臣不從乃分賜內閣諸學士金五十兩銀倍之陳循王文等遂以太子為可易時有廣西潯州守備都指揮黃􅎫者思明土知府􅒿庶兄也􅒿老子鈞襲知府􅎫欲謀奪之與其子矯軍門令徴兵思明率驍悍數千人夜馳入􅒿家支解􅒿父子納甕中瘞後圃􅒿僕福童潛走憲司訴􅎫父子殺􅒿父子狀總兵武毅知之疏聞于朝􅎫懼乃謀為逃死計遣千戶袁洪走京師上疏請易太子上大喜曰萬里外有此忠臣亟下廷臣集議且令釋􅎫罪豫官都督尚書胡侍郎薛琦鄒幹會廷議王直于謙相顧眙愕久之司禮監太監興安厲聲曰此事不可已即以為不可者勿署名無得首鼠持兩端羣臣皆唯唯署議於是禮部尚書胡濙等上言陛下膺明命中興邦家統緒之傳宜歸聖子黃􅎫奏是詔從之王直得所賜金扣案頓足曰此何等事吾輩愧死矣秋七月殺太監阮浪王堯時浪侍上皇南宫浪門下內豎王堯者往監盧溝橋浪以上皇所賜鍍金繡袋及束刀貽之堯偶飲錦衣衛指揮盧忠家解衣蹴踘忠見刀袋非常製命妻進酒醉之解其袋刀入告變謂南宫謀復皇儲遺刀求外應上怒殺浪堯猶欲窮治不已忠屏人詣卜者同寅筮之寅以大義叱之曰是大凶兆死不足贖忠懼乃佯狂學士商輅與司禮監太監王誠言盧忠狂言不可信壞大體傷至性所關不小事得寢後英宗復辟忠果伏誅寅山西安邑人少瞽性聰敏學京房易占斷多竒中四方爭傳之正統中客遊大同上皇既北狩隂遣使諭鎮守太監裴富富私問寅寅筮得乾之初九附奏曰大吉可以賀矣龍君象也四初之應也龍潛躍必以秋應以壬午浹嵗而更龍變化之物也庚者更也庚午中秋車駕其還乎還則必幽勿用故也或躍應焉或之者疑之也計七八年當必復辟午火德之王也丁者壬之合也其嵗丁丑月壬寅日壬午乎自今嵗數更九躍則必飛九者乾之用也南面子衝午也其君位乎故曰大吉額森欲奉上皇南還朝廷率以為詐寅力言于石亨亨與于謙協議奉迎而歸及後復辟其言皆驗四年春正月吏部尚書何文淵罷時言官劾文淵貪縱下獄文淵自言易儲有功詔書所云天佑下民作之君父有天下傳之子已所屬對也乃令致仕十一月皇太子見濟卒五年夏四月御史鍾同上疏請復儲先是同嘗因待漏與儀制郎中章綸論易儲事繼之以泣至是遂上疏言宗社之本在儲位宜復不宜緩聞者韙之五月下禮部儀制郎中章綸御史鍾同于獄綸上修德弭災十四事又曰太上皇帝君臨天下十四年陛下嘗親受册封為臣子是天下之父也陛下宜率羣臣每月朔望及嵗時節且朝見于廷安門以極尊崇之道而又復皇后于中宫以正天下之母儀復皇儲于東宫以定天下之大本疏上下錦衣獄鞫訊體無完膚御史鍾同先有言故併逮之以進士楊集為六安州知州集上書于謙曰姦人黃􅎫進易儲之説以迎合上意本逃死之計耳公等國家柱石乃戀官僚之賞而不思所以善後乎脫章綸鍾同死獄下而公坐享崇髙如清議何謙以示王文文曰書生不知朝廷法度然有膽當進一級處之進士選知州始此謫給事中徐正戍鐵嶺衛正密請召見便殿屏左右言今日臣民有望上皇復位者有望廢太子沂王嗣位者陛下不可不慮宜出沂王于沂州增髙南城數尺伐去城邊髙樹宫門之鎖亦宜灌鐵以備非常上怒謫戍御史髙平亦言城南多樹事叵測遂盡伐之時盛暑上皇嘗倚樹憩息及樹伐得其故大懼復辟後正平皆伏誅南京大理少卿廖莊上言宜篤親親之誼時朝見上皇于南宫上皇諸子皇上之猶子也亦宜令親近儒臣以待皇嗣之生使天下曉然知皇上公天下之心不報六年八月杖大理寺少卿廖莊禮部郎中章綸御史鍾同于闕同死杖下綸仍詔獄謫莊定羌驛丞先是莊上疏忤旨至是赴京陛見上念及命杖之英宗天順元年春正月壬午武清侯石亨副都御史徐有貞等迎上皇復位先是景帝不豫以儲位未定中外憂懼兵部尚書于謙日與廷臣疏請立東宫蓋謂復憲宗也中外藉藉謂大學士王文與太監王誠謀白太后迎取襄王世子十有一日都御史蕭維楨同百官問安于左順門外太監興安自內出曰若皆朝廷大臣不能為社稷計徒問安耶即日維楨集御史議曰今日興安之言若皆逹其意否衆曰皇儲一立無他慮矣衆還道作封事草會稿于朝衆謂上皇子宜復立惟王文意他有所屬陳循知文意獨不言李賢以問蕭鎡鎡曰既退不可再文遂對衆言曰今只請立東宫安知朝廷之意在誰維楨因舉筆曰我更一字乃更早建元良為早擇笑曰吾帶亦欲更也疏進有候十七日御朝之旨時武清侯石亨知景帝疾必不起念請復立東宫不知請太上皇復位可得功賞遂與都督張軏太監曹吉祥以南城復辟謀叩太常卿許彬彬曰此社稷功也彬老矣無能為矣盍圖之徐元玉元玉徐有貞字也初名珵以已已倡南遷議朝廷薄之後更名有貞亨軏從其言遂往來有貞家有貞亦時時詣亨人莫知也是月十四日夜會有貞宅有貞曰太上皇帝昔者出狩非以遊畋為國家耳况天下無離心今天子置不問乃紛紛外求何為也如公所謀南城亦知之乎亨軏曰一日前已密達之有貞曰俟得審報乃可亨軏去至十六日既暮復會有貞曰得報矣計將安出有貞乃升屋覽步乾象亟下曰事在今夕不可失遂相與密語人不聞而是時會有邊吏報警有貞曰宜乘此以備非常為名納兵入大內誰不可者亨軏然之計定倉皇出有貞焚香祝天與家人訣曰事成社稷之利不成門戶之禍歸人不歸鬼矣遂與亨軏往會吉祥及王驥楊善陳汝言收諸門鑰夜四鼓開長安門納兵千人宿衛士驚愕不知所為兵既入有貞仍鎖門取鑰投水竇中曰萬一內外夾攻事去矣亨軏亦惟有貞處分莫知所為時天色晦冥亨惶惑叩有貞曰事當濟否有貞大言曰時至矣勿退率衆薄南宫門錮不可啓扣之不應俄聞城中隱隱開門聲有貞命衆取巨木懸之數十人舉之撞門又令勇士踰垣入與外兵合毁垣垣壞門啓亨軏等入見上皇燭下獨出呼亨軏曰爾等何為衆俯伏合辭云請陛下登位呼兵士舉輿至兵士驚懼不能舉有貞等助挽之掖上皇登輿以行忽天色明霽星月皎然上皇顧問有貞等為誰各自陳官職姓名入大內門者呵止之上皇曰吾太上皇也門者不敢禦衆掖升奉天殿武士以瓜擊有貞上皇叱之乃止時黼座尚在殿隅衆推之使中遂升座鳴鐘鼓啓諸門是日百官入候景帝視朝既入見南城暨殿上呼譟聲尚不知故有貞號于衆曰上皇復辟矣趣入賀百官震駴乃就班賀上皇宣諭之衆始定景帝聞鐘鼓聲大驚問左右曰于謙耶既知為上皇連聲曰好好明日上皇臨朝謂諸臣曰弟昨日食粥頗無恙詔逮少保于謙王文學士陳循蕭鎡商輅尚書俞士悅江淵都督范廣太監王誠舒良王勤張玉下獄命副都御史徐有貞以本官兼翰林院學士直內閣典機務尋晉兵部尚書兼職如故出前禮部郎中章綸于獄擢禮部侍郎上以綸建議復儲出之獄喜嘆良久遂有是擢丁亥殺少保兵部尚書于謙于市先是己巳城下之役石亨功不如謙而得侯爵心愧之乃推謙功詔豫一子千户謙固辭且曰縱臣欲為子求官自當乞恩于君父何必假手于石亨亨聞恚甚亨從子彪貪暴謙奏出之大同亨益銜之徐有貞者常因謙求祭酒景帝召謙辟左右諭之曰有貞雖有才然姦邪謙頓首退有貞不知亦恨謙方上之復辟也有貞嗾言官以迎立外藩議劾王文且誣謙下獄所司勘之無驗金牌符檄見在禁中有貞曰雖無顯迹意有之法司蕭維楨等阿亨輩乃以意欲二字成獄文憤怒目如炬辨不已謙顧笑曰辨生耶無庸彼不論事有無直死我耳獄具上猶豫未忍曰于謙曽有功有貞直前曰不殺于謙今日之事無名上意乃決遂與王文及太監舒良王誠張永王勤斬東市妻子戍邊徼謙有再造功上北狩廷臣間主和謙輒曰社稷為重君為輕以故額森抱空質上得還然謙禍機亦萌此矣景帝嘗賜謙甲第謙頓首曰去病豎子尚知此意臣獨何人而敢叨此不許乃置上前後所賜璽書袍鎧弓劔冠帶之屬于堂而加封識嵗時一謹視謙以國家多事寓直房不歸家謙與中貴曹吉祥等共兵事氣陵之故小人無不憾謙者謙既死籍其家無餘資蕭然僅書籍耳而正室鎖鑰甚固則皆上賜也謙死之日隂霾翳天行路嗟嘆吉祥麾下指揮朵耳者以觴酬地而慟吉祥恚朴之明日復酬慟如故天下無不寃之都督范廣勇而知義為謙所任亨惡之并斬廣論迎復功封武清侯石亨為忠國公都督張軏為太平侯張輗為文安侯都御史楊善為興濟伯石彪封定逺伯充大同副總兵以袁彬為錦衣衛指揮僉事奪大同總兵郭登定襄伯以為南京都督僉事召廖莊子定羌驛賜還官贈故御史鍾同大理左寺丞諡恭愍廕其子入太學二月乙未朔皇太后誥諭廢景泰帝仍為郕王歸西宫廢皇后汪氏仍為郕王妃欽天監奏革除景泰年號上曰朕心有所不忍可仍舊書之郕王薨祭葬禮悉如親王諡曰戾妃嬪唐氏等賜帛自盡以殉葬命汪妃出居舊王府先是景帝即位立妃為皇后后無子有二女次妃杭氏生見濟景帝廢立時后泣諫以為不可景帝竟立見濟而以杭氏為皇后以后諫故幽之宫中至是上以郕王薨欲令妃殉葬大學士李賢曰汪妃雖立為后即遭廢棄與兩女度日若令隨去情所不堪况幼女無依尤可矜憫上惻然曰卿言是朕以為弟婦少不宜存內初不計其母子之命而皇太子雅知妃不欲廢立意事之甚恭遂得出舊府太子又時時護持之悉得挾資屬外二女育宫中如故由是母子得全三月封直內閣兵部尚書徐有貞為武功伯兼華蓋殿大學士掌文淵閣事初于謙之獄中外咸側目有貞而有貞意殊自得請于石亨曰願得冠側注而從兄後石亨為言之上上曰為我語有貞但僇力不患不封也居旬日亨復言上乃下詔封之歲支祿一千一百石子孫世錦衣指揮使賜貂蟬冠玉帶旬月之間恩賜赫奕與石亨張軏埒夏四月復立元子見深為皇太子襄王瞻墡來朝先是土木之變王兩上疏慰安皇太后乞命皇太子居攝天位急發府庫募勇敢之士務圖迎復仍乞訓諭郕王盡心輔政疏上景帝已立八日矣至是得疏宫中上覽之感嘆手敕取王入朝禮待甚隆王辭歸上送至午門王伏地不起上曰叔父欲何言王頓首曰萬方望治如飢渴願皇上省刑薄斂上拱手謝曰敬受教六月逮徐有貞下獄曹吉祥石亨憾有貞嗾諸閹巧詆數為險語觸上上殊不為動錦衣官門達復劾其阿比排陷石亨詔執鞫之降廣東恭政既有以飛章謗國是者其語復多侵亨吉祥于是復訴上謂有貞實主使逮歸置獄窮逹煆鍊無所得摘其誥詞纘禹神功語為所自草大不敬無人臣禮當死以雷震奉天門宥為黔首謫戍雲南金齒有貞去而曹石日益專橫矣谷應泰曰土木之變司徒不戒車駕蒙塵九廟震驚百官茇舍國無長君不幾青城五國乎郕王膺統喪君有君天誘其衷擁駕還國當是時新君有捉髮之迎故主效止郊之哭弟兄握手且喜且悲夫蘇李相違河梁戀别聲椒偶值異國班荆矧在同氣又何能已棠棣之詩所為作也弟又北面稽首恭上璽紱兄且自陳失德不敢復事宗廟以臣避君弟不先兄景能辭位史著美談實則大寶已登南向讓三西向讓再抑又何傷焉至于菟裘營室吾將老焉千秋之後願屬梁王舍賢與子如上皇何廢不復興如天下何而乃初聞返蹕不欲郊迎旋入南宫復止朝賀勢且駸駸焉登臺授兵矣不幾貪天之位應憎寡兄實逼處此繼乃授旨廷臣廢深立濟忘餘祭傳札之言貽德昭憂死之漸君子謂郕王末路自同盜國奪門之釁身實召焉若上皇者亦宜追悔前愆不預國事夫平王東遷春秋貶之降為王風英宗身受祖宗重器輕信宵小被縶北庭幸而脫還亦已得罪祖宗矣辟之閫外之吏棄師而歸封疆之吏委城而走髙帝之法尚當引繩批根况在至尊短垣而自踰之乎即至景帝賓天羣臣力請英宗亦宜開諭至誠明豫慚德嗣王可輔大統有人玄宗出奔靈武即位道君北狩康搆稱尊父子兄弟之間豈不克全無憾者與而乃暮夜倉皇驅車踐位逼景帝于彌留假閹辨于翊戴奪門二字英皇不得正始景皇不得正終授受之祭弟兄交失而况升遐日月史無明文燭影斧聲不無疑案以至革除帝號加戮于謙夫景受國有名非少帝昌邑之比而謙功在社稷豈産祿舞陽之徒乎觀其軫念煢婺撫恩弱息豆箕瓜蔓之涕又何淫淫也始知曹石所謀不臧小人貽誤人國刻薄寡恩如是哉獨惜于謙者百折不回于社稷無君之日不能出一言于東宫易位之辰處人骨月自古其難漢留唐鄴所由擅美千載也明史紀事本末卷三十五
