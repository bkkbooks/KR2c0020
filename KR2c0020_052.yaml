body:
  text: 明史紀事本末卷五十二浙江提學僉事谷應泰編世宗崇道教嘉靖元年春三月簿録大能仁寺妖僧齊瑞竹財資及玄明宫佛像毁括金屑一千餘悉給商以償宿逋齊瑞竹正德間賜玉璽書金印賞賚無算至是從工部侍郎趙璜言也禮部郎中屠塤發檄遍查京師諸淫祠悉拆毁之七月帝漸興寺觀崇奉諸教汪珊疏言十漸其三言議復諸不經淫寺觀非初罷之意章下所司二年夏四月暖殿太監崔文以禱祀誘帝乾清諸處各建醮連日夜不絶又命內監十餘人習經教于宫中賞賚不資大學士楊廷和九卿喬字等疏請斥逺僧道停罷齋醮給事中周琅張嵩張汝安盤等交章劾文乞置重典俱不報閏四月停齋祀時給事中鄭一鵬上言臣巡光祿見正德十六年以來宫中自常膳外少有所取邇者禱祀繁興制用漸廣乾清坤寧諸宫各建齋醮西天西畨漢經諸厰至於五花宫西暖閣東次閣亦各有之或連日夜或間日一舉或一日再舉經筵俱虛設而無所用矣傷太平之業失天下之望莫此為甚臣謂挾此術者必皆魏彬張鋭之餘黨曩以欺先帝使生民塗炭海內虛耗先帝已誤陛下豈容再誤陛下急誅之遠之可也伏願改西天厰為寶訓厰以貯祖宗御製諸書西畨厰為古訓厰以貯五經子史諸書漢經厰為聽納厰以貯諸臣奏疏選內臣謹畏者司其管鑰陛下經筵之暇遊息其中則壽何以不若堯舜治何以不若唐虞哉帝曰天時飢饉齋祀暫且停止五年以道士邵元節為真人吳尚禮為左至靈七年春正月大學士楊一清等言宫寢之中非祀天之所每日拜祝恐勞且褻請已之報聞十年十一月遣行人召大學士張孚敬還朝建祈嗣醮欽安殿以禮部尚書夏言充醮壇監禮使侍郎湛若水顧鼎臣充迎嗣導引宫文武大臣遞日進香上親行初終兩日禮十一年冬十月編修楊名上修省疏斥汪鋐郭勛之姦乞罷工作禱祀上怒收繫械訊瀕死謫戍十三年五月上御重華殿召大學士張孚敬武定侯郭勛等五人入觀祀天青爵作紀樂同遊詩十四年夏四月大興隆寺災御史諸演請順天心絶異端敕禮部尚書夏言覆奏改僧録司于大隆善寺僧徒還俗者聽併移姚廣孝神位廣孝神位帝更定祀典撤太廟配享移入興隆寺者也十五年春正月加致一真人邵元節道號賜玉帶冠服元節興安人仙源范文泰見而竒之授以龍圖龜範之祕嘉靖初徴入京召對便殿首以真教主靜之説進帝嘉納之已為禱雪輒應命為致一真人領金籙醮事給玉金銀象印各一會帝有事南郊召元節分獻風雷靈雨壇頂置奉天殿班二品并封其師為真人敕建真人府都城西落成命夏言作記刻之庭歲給祿一百石遣緹騎四十人充掃除役贈田三十頃蠲其租徭至是寵待益隆夏四月詔求紅黃玉以禮神十月除禁中佛殿建慈慶慈寧宫時帝欲除去釋殿召武定侯郭勛大學士李時禮部尚書夏言入視大服千善殿有金鑄象神鬼淫褻之狀又金函玉匣藏貯佛首佛牙之類及支離傀儡凡萬三千餘斤言退上疏力請瘞之中野不得瀆留宫禁帝日朕思此類智者以為邪穢而不欲觀愚民無知必以竒異奉之雖瘞中野必有竊發以惑民者其燬之通衢永除之于是禁中邪穢迸斥殆盡十一月大修金籙醮于立極殿七日夜以謝儲祥以大臣為上香監禮迎嗣引導等使如舊十二月以皇嗣生録致一真人邵元節禱祀功加授禮部尚書給一品服俸賜白金文綺寶冠法服貂裘授其徒邵啓為等祿秩有差先是上命中使即貴溪山中建仙源宫既成元節乞暫還山已而帝遣錦衣千戶孫經往趨起之舟至潞河命中使迎入賜彩蟒衣併闡教輔國玉印時帝以祈嗣設醮旦夕有雲氣見于圻壇上大悅越三日皇子生遂有是命十七年命建金籙大齋於內皇壇白鶴繞壇卿雲捧日賞賚天師張彥頨有加嘉靖初彥頨入賀上賜問以清心寡欲對加封正一嗣教真人賜金冠玉帶蟒衣銀幣遂留京邸既而請還山上遣行人持詔召之稱卿不名宅燬為作治給事中黃臣諫曰昔者欒巴郭憲噀酒止火彥頨宅燬陛下又安用治之上不從彥頨尋卒詔如列侯例賜恤典天師永緒上所命名也十八年八月致一真人邵元節死時上躬視顯陵元節留京師一日晨起召其徒語之曰我殆將逝矣安得走行在一見皇帝言未既卒帝駐蹕裕州聞之慟手詔敕行在禮部贈諡命中官錦衣護其喪喪還敕有司營葬恤典如伯爵例以方士陶典真為神霄保國宣教高士典真一名仲文黃岡人少為縣掾喜神仙方術嘗授符術羅田萬玉山而邵元節微時亦往來仲文家嘉靖初仲文授遼東庫大使秩滿至京師時元節貴幸比老欲請骸骨未有間會宫中黑眚見元節治之無驗遂薦仲文代已試宫中稍能絶妖帝寵異之至是扈駕南巡至衛輝白晝有旋風繞駕不散帝以問仲文對曰當火遣仲文禳之仲文曰火終不免可謹護聖躬耳是夜行宫果災宫中死者無算錦衣陸炳排闥入負帝出竟無恙明日敕行在吏部授仲文是職給誥印許携其家于官九月上諭輔臣曰朕欲命東宫監國朕靜攝一二年然後親政太僕卿楊最上言聖諭至此不過信方士調攝耳夫堯舜性之湯武身之非不知修養可以成仙以不易得也不易得所以不學豈堯舜之世無仙人堯舜之智不知學哉孔子謂老子猶龍即仙也孔子非不不知老子之為仙不可學也不可學豈易得哉臣聞皇上之諭始則驚而駭繼則感而悲犬馬之誠惟望端拱穆清恭默思道不邇聲色保復元陽不期仙而自仙不期壽而自壽黃白之術金丹之藥皆足以傷元氣不可信也帝覽之大怒逮繫鎮撫司考訊久之死獄中十九年春正月上疾不朝拜天玄極殿二月建宫祈禳三日八月萬壽聖節建三晝夜醮告天玄極殿郭勛以方士段朝用見曰能化物為金銀因以所化銀器進上大悅曰殆天授也因授朝用紫府宣忠髙士薦其器于太廟加勛祿米百石十一月進陶仲文為忠孝秉一真人領道教事尋加少保禮部尚書又加少傅食一品俸二十年春正月逮繫御史楊爵下詔獄爵上言曰君人者奉天安民而使之各得其所也今飢民顛連無告委命溝壑而土木之工十年不止又重委部臣遠建雷壇以一方士之故朘民膏血民何以得其所哉執左道以惑衆聖主所必誅今異言異服列于廷苑金紫赤紱賞及方術保傳之位坐而論道非極天下之選不足以當此貴而畀之迂怪之徒名器之濫至此極矣陛下以天縱之聖為上天元子若遠宗帝道近守祖法則和氣致祥罔有天災山川鬼神亦莫不寧安用此邪佞之術列諸法禁之地而藉之以為福哉古人有言君聖則臣直若震之以天威加之以危禍如往年楊最言出而身即死近日羅洪先等以言罷黜國體治道所損實多臣恐忠藎杜口則讒諛交進安危休戚無由以見而堂陛之近遠于萬里矣疏入帝大怒命鎮撫司長繫之二十二年春二月段朝用下獄論死初朝用以黃白術結郭勛干進久之技窮勛有罪繫獄脅索勛賂捶死勛家厮役張瀾復上疏瀆奏帝怒收送法司論死宫婢楊金英等謀弒伏誅帝曰朕非賴天地鴻恩遏除宫變焉有今兹朕晨起至醮朝天宫七日醮之日白鶴四十餘翔空中羣臣賀二十三年冬十月大同邊卒獲叛人王三上曰叛惡就擒固義勇之效力實神鬼有以默戮之加秉一真人禮部尚書陶仲文為少師餘如故前此大臣無兼總三孤如仲文者二十四年三月建祈年醮朝天宮秋八月永和王知燠獻白鹿上壽遂告鹿瑞于太廟是時上重箕仙箕下亦命有司掩􅟆骼出故御史楊爵給事中周怡工部郎中劉魁詔獄皆從之爵怡魁甫出三日吏部尚書熊浹諫止箕仙復逮獄如故浹乞休命錦衣衛遣校尉送原籍為民二十五年秋七月久雨上曰鹿瑞龜祥洊呈去歲今朕辰日近醴泉復出承華雖聖賢不恃以怠也而不可不敬謝其自二十五日至八月望舉謝停封貢事毋慢八月加封陶仲文伯爵仲文特進光祿大夫柱國兼支大學士俸任一子尚寶司丞二十九年夏四月加封陶仲文恭誠伯先是春不雨上以問仲文仲文曰疑有寃獄時楊武知縣王濓以罪坐絞子䇿走京師誣巡撫胡纘宗私隙故入人罪述纘宗迎駕詩有穆王八駿飛雲殿湘竹英皇淚不磨為詛咒上怒逮訊久不決至是因仲文言釋之是夜漏下四鼓大雨明日傳旨封仲文賜誥歲祿一千二百石三十年夏五月復事鎮鹵法壇先是帝從陶仲文請設立符鎮鹵法壇嚴事之曰褫鹵魄勿窺我邊圉至是帝以馬市成諳達欵塞欲撤之忽報鹵有異謀帝諭羣臣曰朕于十九日欲撤鎮鹵法壇二十日即有警報玄威所至亦不可忘遂益敬事之冬十月邊吏獲叛人哈舟兒陳通事禮部上言二逆就擒實賴玄貺所至宜告謝雷霆洪應壇行獻俘禮從之三十一年二月太上道君誕辰建醮永壽宫九日三月詔修太和山玄帝宫三十三年秋七月命駙馬都尉塢景和安平伯方承裕吏部尚書李默禮部尚書王用賓左都督陸炳吏部左侍郎程文德禮部左侍郎閔如霖吏部右侍郎郭朴吳山並直西內撰玄文景和以不諳玄理辭免俄以金幣賜玄修諸臣猶及景和景和自疏無功辭願洗心滌慮效馬革裹尸之報帝怒曰景和故出不詳語當擬怨訕律乃革爵安置崑山時諸臣覬撰玄營進景和獨不屑直贊夏四月舉祀高玄大興止封停刑工部尚書趙文華乞歸以病請上方修玄禁奏疏尤諱言疾疏入觸上怒罷三十五年夏四月丁巳命翰林院侍讀嚴訥修撰李春芳並為翰林學士右春坊右中允董份直西內撰玄自是詞臣多舍本職往往求供奉希進用九月廢徽王載埨為庶人王善伺上意上宫中有需王輒先時獻道者南陽梁高輔年八十餘手甲長數寸善導引王厚遇之進之上拜散人高輔謹有所賜豫皆辭王使人求謝不能應王故煉女癸服之上亦需此高輔馳求王不與而王方自恣興土木詐稱張世德自走南京市美女事聞奪爵幽鳯陽王聞之自殺是嵗上睿皇帝道號三天金闕無上玉堂都仙法主玄元道德哲慧聖尊開真仁化大帝獻皇后號三天金闕無上玉堂總仙法主玄元道德哲慧聖母天后孝烈皇后號九天金闕玉堂輔聖天后掌仙妙化元君上自號靈霄上清統雷元陽妙一飛玄真君後加號九天𢎞教普濟生靈掌隂陽功過大道思仁紫極仙翁一陽真人元虗玄應開化伏魔忠孝帝君再號太上大羅天仙紫極長生聖智昭靈統三元證應玉虗總掌五雷大真人玄都境萬壽帝君三十六年冬十月玄嶽諸山獻紫芝已而總督胡宗憲巡撫阮鶚御史路楷等相繼上者不可勝計三十七年夏四月總督胡宗憲獻白鹿五月復獻白鹿于齊雲山帝曰一歲二瑞天眷也命告謝玄極殿太廟以宗憲忠敬升一級百官表賀秋七月禮部類進四方獻芝凡千八百六十有四詔更求廣徑尺以上者三十八年六月以陶世恩為太常寺丞世恩以蔭歷尚寶少卿為言官所列奪官至是仲文乞復子原職帝命改為太常寺寺丞兼道録司右演法是時仲文請假還里帝下璽書褒諭之遣錦衣千戶一人護歸仍賜白金彩繒以示眷懷令有司歲時存問三十九年二月浙江總督胡宗憲上汪直獄上曰玄祐也命告玄極殿而論宗憲功有差已而宗憲獻芝草五白龜二上悅賜金帛金彩鶴衣一襲禮部請謝玄告廟許之不數日白龜亡上曰天降靈物朕固疑處塵寰不久也十一月秉一真人陶仲文死仲文習祈禳術得幸賜坐稱為師然亦小心憚帝威嚴不敢他有所干列爵五等死諡榮康惠肅以伯禮葬隆慶初奪爵籍其家四十年二月分遣御史王大任薑警奚鳯等往天下訪求仙術異人及符篆祕方諸書十一月禮部奏四方進芝凡七百六十九本命採五色盈尺者淮王獻白雁二賜金幣帝曰天降祥羽其告廟四十一年三月萬壽宫成宫災于四十年十一月不三月而告成宫中有壽源萬春太玄仙禧諸殿極其宏麗上悅加大學士徐階等秩有差夏四月癸酉方士鄠縣王金進五色龜靈芝授太醫院御醫命成國公朱希忠告廟表賀壬寅大學士嚴嵩免初方士藍道行以箕幸上故有所問密封使中官至箕所焚之不能答則咎中官穢中官乃合方士啓示而後焚之每答具如旨上問今天下何以不治對曰賢不竟用不肖不退耳則問其賢否對曰賢如徐階楊博不肖如嵩上心動會御史鄒應龍劾之詳嚴嵩用事上曰人惡嚴嵩久矣朕以其贊玄壽君特優眷乃縱逆子負朕其令致仕已而上思嵩贊玄功意忽忽不樂諭徐階欲傳位退居西內導祈長生階諫上曰必皆仰奉上命闡玄修仙乃可有再言嵩者併鄒應龍斬之嵩知上意密賂左右發道行怙權及矯稱玉詔諸不法事竟以妖言律論死秋七月內苑獻嘉禾一莖三穗者兩穗者三十有一羣臣賀十二月辛酉井露降顯陵松上守備太監張方奉祀都督僉事蔣華等以進上悅告郊廟四十二年夏四月嚴嵩上祈鶴文檢及法祕嵩罷歸至南昌延道士藍田玉等為上醮鐵柱宫玉因以所藏名鶴符驗法書附奏嵩玉皆賞賚有差秋八月御苑龜生邜者五巡撫湖廣都御史徐南金獻白鵲言出自景陵羣臣表賀四十三年三月妖人李應乾等伏誅應乾居河南之濟源一目微眇兩手涅日月字懷衛間不逞者多附之隂鑄印章數百太白旗數十付徒衆為符驗約四月八日起兵時山東宣大真順諸處妖人尤衆互相煽結而吕某者潛入京以白社法惑衆隂結無賴千餘人其黨有以偽告身二帙辟穀藥餌一裹首告大學士徐階者緝獲鞫實奏聞應乾匿山西久之乃獲俱伏誅五月乙卯桃夜降于御幄左右云其空墮上喜修迎恩典五日丙辰桃復降是夜白生二子上益喜謝玄告廟頃之壽鹿亦生二子羣臣表賀上以奇祥三錫手詔答之四十四年春正月帝不豫帝注意玄修先是王大任奉命陜西湖廣招至方外士王金等能合內養諸藥薑警奉命江西廣東亦得能通符法者還復命俱授翰林侍講警不自安乞還里大任仍在朝不為翰林所齒上雖修玄西內而權網總攬夜分至五鼓猶覽決章奏自王金等以修鍊幸與陶仲文子世恩希求恩澤乃偽造五色靈龜靈芝以為天降瑞徴又與陶倣劉文彬申世文高守中偽造諸品仙方養老新書及以金石藥進御其方詭祕不可辨性燥熱非神農本草所載帝服稍稍火發不能愈然倣竟得遷太醫院使世恩太常寺卿金太醫院御醫文彬太常寺博士三月方士熊顯趙添壽各進法書數十册帝令留覽賜冠帶銀幣遣還添壽又進法祕乞留覽虛觀祈咒五月方士胡大順藍田玉等伏誅初有藍道行者以方術見帝帝頗信之已而事敗下獄死胡大順者故陶仲文徒也亦以事敗斥去希復進用乃偽造萬壽金書一帙詭稱吕祖以箕授者用黑鉛取白名先天玉粉丸命其黨何廷玉齎至京時嚴世蕃已敗乃資以賄因道行徒藍田玉通內侍趙楹獻之帝曰既云箕書扶箕者何在田玉等遽謂帝念之也遂與羅萬象者詐偽旨徵大順至京更名胡以寧薦于帝具奏求圖書及建宫地及至則大順也帝惡之時宫中屢有氛孽田玉等遂以為藍道行下獄故至此欲以動帝帝頗惑之以問徐階階力言大順小人不畏法紀而田玉尤甚且宫孽已久恐非道行下獄所致帝悟階又言田玉乃嚴世蕃黨妄進白鉛其意叵測至妄傳密旨罪惡尤重帝乃命收大順等下訊獄具帝猶欲寬之復問階階曰聖旨至重若聽詐傳他日夜半出片紙有所指揮將若之何于是併楹論死八月御几及褥各得藥丸一躬謝太極殿告宫廟冬十月户部主事海瑞上言陛下即位初年敬一針心冠履辨分除孔廟之像立敬聖之祠瘞斥元世祖於國門之外宦官外戚悉奪其權天下欣欣謂煥然更始無何而鋭精未久妄念牽之謬謂長生可得一意修玄土木興作二十餘年不視朝政法紀弛矣數行推廣事例名器濫矣二王不相見人以為薄于父子以猜疑誹謗戮辱臣下人以為薄于君臣樂西苑而不返大內人以為薄于夫婦今愚民之言曰嘉者家也靖者盡也謂民窮財盡靡有孑遺也然而內外臣工修齋建醮相率進香天桃天藥相率表賀陛下誤為之羣臣誤順之臣愚謂陛下之誤多矣大端在玄修夫玄修所以求長生也堯舜禹湯文武之為君聖之至也未能久世不終下之方外士亦未見有歷漢唐宋至今存者陛下師事陶仲文仲文則既死矣仲文不能長生而陛下獨何求之至謂天賜仙桃藥丸怪妄尤甚臣聞伏羲御宇龍馬圖河大禹隨山神龜書洛天不愛道猶日月星辰昭布森列焉可誣也宋真宗獲天書乾裕山孫奭諫曰天何言豈有書也桃必採乃得藥必搗乃成兹無因而至有脛行耶云天賜之有手授耶然則玄修之無益可知矣陛下玄修多年靡有一獲左右姦人揣逆聖意投桃設藥以謾長生理之所無斷可見已陛下誠翻然悟悔日旦視朝與輔宰九卿侍從言官講求天下利害洗數十年君道之誤置身堯舜禹湯文武之域使諸臣亦洗心數十年阿君之恥置身臯夔伊傅周召之列內之宦官宫妾外之蔭恩敘勞多有無事而官者上之內厨內庫下之寶物貨賄多有無事而積者諸臣必有為陛下言者矣諸臣言之陛下行之在一節省間耳官之侵漁將之怯懦吏之為姦諸臣必有為陛下言者矣諸臣言之陛下行之在一振作間耳陛下為此非勞也民熙物洽薰為泰和陛下性中真藥也道與天通命由我立陛下性中真壽也此理之所有可旋至立故乃縣思服食不終之餌鑿想遙興輕舉之方切切然散爵祿竦精神求之終身而不得大臣持祿外為諛小臣畏罪面為順君道不正臣職不明此天下第一事也疏上帝大怒命逮繫瑞下鎮撫交城王表相得白兔于藐姑射山撰頌以獻賜金衮四十五年春正月上久病不痊諭大學士徐階欲幸承天拜顯陵取藥服氣階奏止之是年冬帝崩于乾清宫詔曰朕奉宗廟四十五年享國長久纍朝未有一念惓惓惟敬天勤民是務祗緣多病過求長生遂至姦人注惑自今建言得罪諸臣存者召用沒者恤録見監者即釋復職穆宗踐阼釋戶部主事海瑞于獄中逮方士王金陶倣申世恩劉文彬高守中陶世恩下詔獄論死谷應泰曰宋臣李沆之言曰人主當知四方艱難不則土木禱祠次第並作而伊尹之訓太甲亦曰酣歌恆舞時謂巫風此皆豫大之良規嗣王之炯戒矣世宗起自藩服入纘大統纍葉升平兵革衰息毋亦富貴吾所已極所不知者壽耳以故因壽考而慕長生緣長生而兾翀舉惟備福于箕疇乃希心于方外也爰考初政即設齋宫及其末年猶餌丹藥蓋遊仙之志久而彌篤未有若斯之甚者也方其前星未耀玄鳥方來瑶筐誕祥高禖有應世宗信之欣然以天神可降焉于是命道士邵元節為致一真人金銀象印陪祀南郊風雨靈壇職司祕籙而且祠神紅玉分咨詔使享天青爵召視重華雖黃帝憑五城以授神人漢武寵文成以延方士未為過也繼又召真人張彥頨設金籙大齋則有白鶴降庭卿雲捧日去天尺五幾于呼吸可通矣然元節身死玉棺不來彥頨宅火噀酒不滅而世宗之意兾遇其真復召陶仲文者拜為神仙高士徐市既去更用盧生混康以還復徴靈素即蓬萊之想愈殷祈年之觀益麗矣乃若旋風四繞則行宫果災疑獄初平即春霖早霈以至白鹿一雙獻于浙地紫芝千本貢自荆州又且雲氣降于祈壇綏桃來于御幄比之建章宫中芝房露掌玉津園裏幡節樓臺以今凖古史不勝書宜世宗之甘心于此也雖其後段朝用下獄被戮胡大順藍田玉等以次伏誅不過少翁牛腹致疑辛平玉杯得譴耳而仲文死後更訪異人羈縻弗絶一至此乎更可駭者世宗清虛學道不御萬幾姦嵩擅權二十餘載二世居深宫而趙高柄國徽宗稱道君而蔡京專政隂行蠱惑吾無責焉至于周琅鄭一鵬等諫之于前楊爵海瑞等爭之于後而永嘉再相同遊撰詩貴溪典禮充壇監醮豈王旦附會祥符寇凖依阿乾祐為國大臣淟涊宜爾耶然而世宗初御括燬佛金燒除佛骨海內喁喁想聞聖學而乃于佛則絀于道則崇崔伯深不事胡神更奉天師孔祭酒詆訶佛法心存道黨較長潔短即二氏何擇也究之金石燥烈鼎湖既有龍升王陶論死雲中不乏雞犬語云服食求神仙多為藥所誤又云君以此始必以此終吁可慨也夫明史紀事本末卷五十二
