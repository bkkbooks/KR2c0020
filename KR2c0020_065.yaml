body:
  text: 明史紀事本末卷六十五浙江提學僉事谷應泰編礦稅之弊神宗萬厯二年二月太監張誠等求領真定木稅工部執論不許七年七月給事中顧九思王道成請撤浙直織造內臣上以示大學士張居正居正曰地方多一事則有一事之擾寬一分則受一分之惠災地疲民不堪催督撤之便上從之十一月命浙直織造添織之萬三千張居正言添織之費不下四五十萬金在庫藏則竭在小民則疲浙直水災䝉恩蠲濟方撤織監又復加𣲖非聖意所以愛養元元也上命減其半八年九月太監王效稱缺歲額銀硃等料戶部尚書張學奏登極一詔盡損不急之務宜量停罷上從之十年四月順天府尹張國彥請豁房稅不報十一年正月戶部請停買金珠不報十二年六月四川巡撫雒遵奏採木之害八月房山人史錦請開礦命下撫按十四年四月南京工部尚書隂武卿乞減免織造燒造瓷器停解花梨杉楠不聽九月戶部侍郎張國彥言蘇杭之織造江西之瓷器公主之廣求珠寶得無與漢文百金之費相類乎不聽十六年十一月遣內臣禱祠五臺山還奏言紫荆關外廣昌靈邑可定礦砂作銀冶奸民張守清擅其利一日上視朝畢召大學士申時行等于皇極殿語及之時行等請敕部行撫按查問禁戢上是之命逮守清伏法閉塞礦洞十八年九月易州民周言請開礦玉田豐潤民復以請部未報上遣文書官至閣速之輔臣因言開礦之害御史邵以仁亦力言其不可二十四年六月府軍前衛副千戶仲春請開礦助大工從之命戶部錦衣衛各一同仲春開採給事中程紹工楊應文言嘉靖二十五年七月命採礦自十月至三十六年委官四十餘防兵千一百八十人約費三萬餘金得礦銀二萬八千五百得不償失不聽七月錦衣衛百户陸松鴻臚寺隨堂官許龍順天府教授馮時行經歷趙鳯等各言開礦助大工從之户部尚書楊俊民言真保薊易永平開礦恐妨天夀山龍脉上謂距陵逺且皇祖嘗開之不聽命戶部即中戴紹科錦衣僉書楊宗吾開礦汝南八月詹事府録事曾長慶錦衣衛百戶吳應騏請山西夏邑開礦府軍後衛指揮王中允請青沂等開礦從之招礦盜開採仍編富民為礦頭從太監王虎請也錦衣衛百户汪文通言沂州礦指揮郝承爵言費縣礦指揮劉鑑言棲霞招逺等礦指揮馬清言文登縣礦千戶趙良將言沂水䝉隂臨朐礦命太監陳增同府軍指揮曾守約開採九月巡撫山西魏允貞請停開礦不報太監王虎論保定巡撫李盛春阻撓開採下㫖切責十一月戶部郎中戴紹科進礦砂銀自後進者踵至十二月遣太監張忠往山西曹金往兩浙趙欽往陜西各開礦輔臣沈一貫言留守中衛王一清請稅煤炭為民害不報先是奸人王君錫奏開易州礦㫖下戶部議尚書林材執奏且上言山冶之害小則爭掠大則嘯聚盜之囮冦之藪也遂幡然從之逐君錫令勿濳住生奸計至是新建張位秉政以為利出于天地之自然可益國無病民採之便上遂從其言二十五年春正月御史况上進給事中楊應文言建昌採木之害人夫渡瀘觸瘴死者被野吏胥假公行私毒流百姓不報戶科程紹言開礦事變多端疏凡五上俱不報二月給督徴天津等處店租內官關防三月浙江巡按王業宏言礦稅不便者六乞停罷不報四月刑部侍郎吕坤言洮蘭之絨山西之紬浙直之段絹積于無用若服有定期歲用千匹而江南山陝之人心收礦稅無利勒民間納銀民不能支括庫銀代豈開礦之初意哉誠敕各省使臣嚴禁散砂不許借解而各省之人心收自趙承勛造四千之說而皇店開朝廷有內官之遣而事權重且馮保八店為屋幾何而歲四千金不奪市民將安取乎誠撤各店之內官而畿內之人心收不報九月太監陳增劾福山知縣韋國賢阻撓開採逮下獄巡撫萬象春奪俸山西巡撫魏允貞奏言巨璫出領礦稅為民鑿齒窫窬而礦為尤甚璫亦反噬以激上怒允貞又上書言朝廷得失譏切宰臣不能輔導致使刑餘之人播惡上切責之二十六年六月命內監李敬採珠廣東七月神武衛千户朱仁等奏湖口船稅可萬餘金鴻臚寺主簿田應璧言兩淮沒官餘鹽命內監李道督稅湖口魯保經理淮鹽俱許節制有司户科給事包見捷上言開礦之害陛下謂徒取諸山澤在礦使實奪取之閭閻捶擊入山者十二載虎狼出柙者半天下科臣趙完璧郝敬道臣許聞造姚思仁交章言之不報奪保定巡撫李盛春等俸以天津店稅銀解進遲延故罰八月太常寺少卿傅好禮言近郊假官抽稅不報越三日好禮伏文華門求面對上怒降廣昌典史大理寺卿吳定疏救削籍而假官二十八人下鎮撫司惜薪司柴炭歲兵工二部二十餘萬至是求益給事賈維春言歲進物料上用什之二三餘盡入溪壑今復求益不已豈真為國家計盈縮哉不報九月益都知縣吳宗堯奏礦務太監陳增罔上營私益都有鉛砂無銀礦增強之入銀業非法矣又强採者代納稍緩逮及吏民陛下所得十一而增私橐十九山東巡撫尹應元恭增罪狀二十餘條忤㫖奪俸宗堯下鎮撫司削籍十月雲南大理採石二十七年春正月分遣御馬監高宷𣙜京口供用庫官暨祿𣙜儀真二月百戶張宗仁請復浙江市舶命太監劉成𣙜稅浙江千户陳保請𣙜珠命內監李鳯採珠廣州兼徴市舶司稅課設福建市舶司命御馬監高寀兼礦務命內監楊榮開採雲南陳奉徴荆州店稅陳增徴山東店稅孫隆帶徴蘇杭等處稅課魯坤帶徴河南孫朝帶徴山西時奸辨馮綱等望風言利皆朝奏夕遣湖口稅監李道參南康知府吳寶秀星子知縣吳一元僨侵國稅命緹騎逮下理寶秀至任才十六日初任大理亷平有聲至是忤道被逮妻陳氏自縊檻車旁內監丘乘雲徴稅四川兼礦務梁永徴稅陝西各以原奏千戶翟應泰樂綱等往御馬監潘相督理江西瓷厰前珠池太監李敬兼廣東礦稅輔臣沈一貫言中使衙門皆創設並無舊緒可因大抵中使一員其從可百人分遣官不下十人此十人各須百人則千人矣此千人每家十口為率則萬人矣萬人日給千金歲須四十餘萬及得才數萬徒斂怨耳今分遣二十處歲糜八百萬聖思偶未之及也乞盡撤之不報尋諸省皆併稅于礦使三月內監王忠徴稅密雲張煜徴稅盧溝橋太監陳增馬堂爭稅命堂稅臨清增稅東昌命錦衣衛千戶韋夢麒同御馬監奉御陳奉徴收湖廣等處店稅徴銀六萬有竒上以湖廣荆州原有辛效忠店房曾經遼藩竊據後張居正私意革免命撫按奏明巡撫支可大奏湖楚內錯江湖故稱澤國物産非有縑纁綺繡之竒也厥貢非有璆琳琅玕之珍也比歲採木重役焚林竭澤十室九空舊有各項稅課如荆州遼府張居正店房已經沒入變價解京盡屬民間之業今僅于沙市徴收稅銀及各府原設有稅課司有門攤商稅有茶鹽油布雜稅內以給解京濟邊之用外以充宗藩吉凶之資大之供官軍俸錢科舉兵餉之需小之作紙劄公費工食衣糧之數紀載甚明今若併前項收入內帑則百用乏絶矣若迫于用詘復議加𣲖則下民怨咨矣此猶以在官言之也至其在民行貨有稅矣而算及舟車居貨有稅矣而算及廬舍米麥菽粟饔飱也而稅雞豚肉食也而稅耕牛騾驢一畜産也而稅搜刮于十五郡之中遍及于一百十六州縣之內一歲之中驛遞錢糧動益千計雖欲不擾地方不可得矣楚故獷悍又以橫政驅之有莫知其所底止者不報戶科給事包見捷疏論礦店滋蔓又疏論臨清稅使擾民必致生變又疏遼左阽危礦市為患尤烈一月三疏指數內使切直時論韙之謫貴州布政司都事未幾臨清百姓變毆稅使馬堂幾死見捷言若左劵歙縣監生吳養晦投稅監魯保言大父守禮逋鹽課工十五萬乞追入給占産從之左春坊左庶子葉向高請罷礦使不報大學士趙志臯病篤特疏請停礦稅不報四月河南礦監魯坤言礦砂嬴縮不一請均𣲖官民從之十月南京守備大監郝隆劉朝用採寧國池州等礦戶科給事李應䇿姚文蔚以播警乞停中官礦稅不報八月錦衣衛總旗申敏奏湖廣興國州礦洞丹砂命陳奉開採逮荆州府推官華鈺黃州府經歷車任重降荆州知府李商耕黃州知府趙文煒荆門知州高則巽各一級以稅監陳奉誣劾也初奉由武昌抵荆州商民鼓譟者數千人飛磚擊石勢莫可禦道府諸臣身犯其衝殫力防護獨華鈺以公事至夷陵奉疑之又惡其禁革差官冠帶阻截司役書算故受誣尤烈又稅課襄陽商人聚徒鼓譟知府李商耕治其參隨開鎮荆門增設稅課而荆門故非巨鎮往來商船頗少誣知州高則巽阻撓俱降調雲南稅監李榮虐諸生見詬榮劾巡撫陳用賔命下諸生于理九月户部進大珠龍涎香十月驍騎衛百户請徴湖廣郡縣積貯羡銀又興國州人漆有光報徐鼎等掘古墓得黃金巨萬命陳奉同撫按查解十二月命應天府取帘屏龍旗龍簾諸上供物府丞徐申上疏言費將巨萬弊不可言必不得已請增爐鼓鑄以濟急報可武功衛百户韓應桂奏土民夏國瑚報湖廣京山具有真礦鉛砂大青等物是時興國麻城開採止得鉛砂得不償失即陳奉亦經營勞瘁苦于奉行巡撫支可大疏恭應桂欺罔請置法上免其罪撤回雲南道御史葉永盛奏差璫播虐請誅首禍不報二十八年春正月武昌漢陽民千餘集撫按門陳稅監陳奉之毒撫按不敢理民情益憤貴州巡按宋興祖請停採木專力討播逮西安府同知宋言稅監梁永劾其激衆倡亂也二月己卯命太監暨祿兼徴鳯陽安慶徽廬常鎮稅前止徴應天太平寧國淮揚至是從羽林千戶王承德金吾百戶王鎮請也南京守備太監邢隆稅沿江洲田辛巳內監魯坤開彰德衛輝懷慶開封等礦洞以武驤衛百戶張欽請也戊子錦衣衛百戶王體仁奏徴長江船稅從之三月戊申四川貢扇不至左布政使程正誼等五人俱降調庚戌兩淮鹽務少監魯保參稅監陳增委官程守訓假武英殿中書舍人恣虐不報廣洋衛鎮撫戴君恩奏廣東遺鹽及名馬天鵝絨鎮伏西錦珠寶皆土産上即命徴收總督戴耀極言之不聽四月甲申雲南礦稅寶井內監楊榮參雲南知府蔡如川趙州知州甘學書等乙酉珠池市舶稅務內監李鳯激變新會縣因恭鄉官吳應鴻等命逮治鳯陽巡撫李三才請停礦稅曰自礦稅繁興萬民失業陛下為斯民主不惟不衣之且併其衣而奪之不惟不食之且併其食而奪之征𣙜之使急于星火搜括之令密如牛毛今日某礦得銀若干明日又加銀若干今日某處稅若干明日又加稅若干今日某官阻撓礦稅拏解明日某官怠玩礦稅罷職上下相爭惟利是聞如臣境內抽稅徐州則陳增儀真則暨祿理鹽揚州則魯保蘆政沿江則邢隆千里之區中使四布加以無賴亡命附翼虎狼如中書程守訓尤為無忌假㫖詐財動以萬數昨運同陶允明自楚來云彼中內使沿途掘墳得財方止聖心安乎不安乎且一人之心千萬人之心也皇上愛珠玉人亦愛溫飽皇上愛萬世人亦戀妻孥奈何皇上欲黃金髙于北斗而不使百姓有糠粃升斗之儲皇上欲為子孫千萬年而不使百姓有一朝一夕試觀往籍朝廷有如此政令天下有如此景象而不亂者哉不報辛未三才復奏數月以來章奏但繫礦稅即束髙閣臣前疏非泛常國脉民命之所關天心祖德之所在也人主能為萬姓之主然後奔走禦侮若休戚不關威力是憑劫奪之己耳斬刈之己耳孤人之子寡人之妻拆人之産掘人之墓即在敵國讐人猶所不忍况吾袵席之赤子哉窮困無聊遂生窺竊如徐州趙古元之類是己夫天下非小弱也草澤之人至廣且衆也欲為古元者何限獨以朝廷處置得宜欲乘之而無釁故俯首降心從教從令耳今乃驅之使亂臣懼萬姓不肻為朝廷屈也南京守備太監下廬州問六安州礦有無狀知府具地圖上言六安有礦髙皇帝恐人盜採有傷皇陵來脉故六安衛特重巡山之任不敢妄議開取詔止之六月戊戌礦監趙欽劾富平知縣王正志逮訊七月稅監王虎劾通州同知邵光庭香河知縣焦光卿降調戊申稅監陳奉訐江防恭政沈孟化蘄州知州鄭夢楨降調戊午巡按御史王立賢奏稅監陳奉貪暴激變不報時陳奉道承天之金花灘勒居民黃金拷及婦人并拘鍾祥知縣鄒堯弼遠近大震八月把總韓應龍奏四川成都龍安産鹽茶重慶馬湖産名木命內監邱乘雲往徴十二月辛丑湖廣稅監陳奉遣荆州衛王指揮開礦穀城不獲責貸主簿脅庫金若干邑人大懼羣擊之指揮走免餘俱溺江中二十九年二月天津稅監馬堂進大西洋利瑪竇方物禮部言大西洋不載會典真僞不可知且所貢天主女圖既屬不經而囊有神仙骨等物夫仙則飛升安得有骨韓愈謂凶穢之餘不宜令入宫禁宜量給冠帶令還勿潜住京師不報己丑武昌兵備馮應京參陳奉大逆十罪逮至京下司理削籍奉欲開礦青山棗陽知縣王之翰以近顯陵拒之因誣及襄陽通判邸宅推官何棟如俱削籍逮下獄之翰尋斃三月武昌民變逐陳奉奉列兵殺二人匿楚府中命甲騎三百餘射死數人傷二十餘人奉踰月不敢出衆藝奉左右六人投之江奉自焚公署門事聞謫知府王禹聲知縣鄒堯弼為民沈一貫論陳奉激變不報四月督理直𨽻儀真等稅御馬監暨祿言臣徴廬鳯徽安遺稅并沿江船稅各撫按皆云重叠不敷題請寬處臣未敢憑二項共二十萬金今徵不滿萬始信撫按為可據而原奏人無憑也乞軫念民瘼以實徴解上毋拘原奏人揣摩之數上從之時𣙜使竒暴獨暨祿請寬恤凡五上六月己巳太監孫隆採稅浙直駐蘇州激變市人殺其恭隨黃建節等數人撫按詰亂民有葛成獨引服不及其餘下獄論死直𨽻巡按御史劉曰梧行部徽州見程守訓竪坊曰特㫖下書咸有一德即收之守訓訐奏曰梧短不報七月陝西撫按奏歲貢羊絨四千匹奉命改織盤陵又降柘黃暗花二則每匹長五丈八尺日織一寸七分半年得匹豈能如額乞悉改織不報九月起禮部尚書沈鯉大學士入閣辦事鯉陛見具疏望上以言致治又極陳礦稅之害尋值長至節上使太監陳矩晏之語及開礦事鯉言泄山川靈氣傷陵脉關係聖躬與聖子神孫不細上頷之禮部侍郎郭正域疏言世宗朝罷內臣鎮守及珠池貢物擾驛遞濫奏帶開銀場者按問譴戍不貸備在寶録寶訓幸罷諸中使以杜亂萌不報十月以內監魯保司兩淮鹽政兼浙直織造請專勑與關防禮部侍郎郭正域持不可往白內閣朱賡曰勑去矣勑中多勸戒語正域曰今文武臣奉敕者孰無勸戒能一一奉行否何望于閹退而具疏力爭關防得無給三十年二月己卯上偶不豫急召輔臣沈一貫入諭以勉輔太子併及罷礦稅起廢釋禁諸事翌日上安諸事遂寢停稅諭已出上悔急令追之太監田義諫曰諭已頒行不可反汗上怒幾欲手刃義義不為動一貫恐亟繳前諭義唾之始吏部尚書李戴左都御史溫純約即日奉行且頒天下刑部謂弛獄須再請亡何而㫖格矣饒州景德鎮民變稅監潘相舍人激之相誣劾通判陳竒逮下獄三月雲南稅監楊榮肆虐激變滇人不勝憤火厰房殺委官張安民撫按以聞上怒持其章不下大學士沈鯉揭言定亂宜速久且生變又具列榮罪狀得毋株及五月戊辰太監劉成徴稅蘇松常鎮激變江西稅監潘相掠諸生及輔國將軍謀託各宗大閧抉門入相走免誣劾上饒知縣李鴻報怨鴻除名禮部侍郎馮琦上言礦稅之害滇以張安民故火厰房矣粵以李鳯釀禍欲剸刃其腹矣陝以委官迫死縣令民洶洶不安矣兩淮激變地方劫燬官舍錢糧矣遼左以余東翥故碎尸抄家矣土崩瓦解亂在旦夕皇上能無動心乎不報應天大風拔富家樹成穴魯保誣以盜礦府尹徐申力白富家寃而盛言帝京王氣不可鑿保不能奪九月楊州富民吳時修獻銀十四萬兩詔授其子弟各中書舍人三十一年九月雲南稅監楊榮責麗江土官木增退地聽開採巡按御史宋興祖上言麗江古荒服也木氏世知府守石門以絶西域守鐵橋以斷土畨不宜自撤其藩貽誤封疆不報三十二年三月都御史溫造言礦稅毒虐乞逮廣東稅使李鳯撤陝西稅使梁永雲南稅使楊榮不報八月丙午武驤百戶陳起鳯請採大木以覬利除名盡逐其黨時大雨都城崩壞戶部尚書趙世卿言蒼生糜爛已極天心示警可畏礦稅貂璫掘墳墓奸子女皇上嘗曰朕心仁愛自有停止之日今將索元元于枯魚之肆矣不報九月戊申翰林簡討蔡毅中上皇明祖訓節略內關礦稅者為注疏二十二卷不報三十三年春正月壬辰廣東撫按戴耀林秉漢奏稅監李鳯憾潮州推官姚會嘉遮辱于廣州不報二月丙午巡按廣西楊芳國言稅監沈永夀以土産金銀鉛錫𣲖有司包解永康思恩等州原無礦洞亦𣲖多金宜免不報八月禮部侍郎馮琦上言礦使出而天下苦更甚于兵稅使出而天下苦更甚于礦皇上欲通商而彼專欲困商皇上欲愛民而彼必欲害民皇上戒以勿信撥置而撥置愈多皇上責以不報繹騷而繹騷更甚皇上之心但欲裕國不欲病民羣小之心必自瘠民方能肥己疏留中十二月壬寅詔罷採礦以稅務歸有司釋礦稅在獄承天諸生沈機等十二人三十四年春正月癸巳逮咸陽知縣宋時隆下獄時命停礦稅監梁永堅執咸陽潼關委官不宜罷益樹黨布虐巡撫顧其志捕惡黨置之法永大恨之永又檄時隆取絨氊千五百時隆不豫遂誣時隆劫稅閣臣揭沮不報二月己未南京內官監丞徐夀僞造印牒稱中㫖徴南工部杉枋三千部報詳詐窮下守備太監劉朝用訊之三月己巳朔大學士沈鯉朱賡言秦人恨梁永甚宜撤不報乙亥江西礦務太監潘相以停稅移景德鎮請專陶從之丁丑仍以江西湖口稅務歸稅監李道己卯雲南礦務太監楊榮被殺榮久于滇恣行威福杖斃數千人榜掠指揮樊髙明等盡捕六衛官人人自危指揮賀世勳韓光大遂倡衆焚其署徒黨輜重皆燼事聞上怒不食曰榮不足惜何紀綱頓至此罪其首事罷中使不遣以稅課歸四川稅使丘乘雲世勳下獄死光大戍邊五月巡撫鳯陽李三才言恩詔中格流傳二說一新政原非聖意故旋開旋閉一沈一貫恐沈鯉朱賡妨位恥事不出已計傾左右致善事不終上怒奪俸三月一貫奏辨不問三十五年七月壬辰撤陝西稅監梁永還京初巡按陝西御史王基洪劾稅監梁永陳兵殺傷吏民巡撫顧其志奏至平甚上疑之梁永遂訐奏咸陽知縣滿朝薦承御史意伏兵渭南劫貢上怒命逮朝薦廷臣論救不聽時緹騎止灞上宗室士民毋慮數萬人圍永署朝薦間道就檻車藍田知縣王邦才亦發奸剔蠧與永相左并為永誣逮至是中㫖撤永還十一月巡撫福建徐學聚户科給事中江灝劾稅監髙宷不法不報初宷肆虐閩中舊撫袁一驥捕其爪牙置之法宷造樓船艅艎治戎器招集亡命徴集百貨將出與諸畨市閩人集其門詬之宷所殺傷百餘人焚民居無算一驥力輯之乃定已又招紅畨入市殺僇商漁漸窺內地故學聚奏之二十六年五月甲寅遼東稅監髙淮激變錦州淮恃寵恣橫吏民小拂意父子老弱係纍相屬干道徴稅私賦倍之每開市奪其善馬駑者强勒堡軍以重價購償自疏調度兵將詡其功伐總督蹇達劾奏內臣不得豫政典兵不報至是索賄錦州軍户軍户殺其使激衆千人圍之淮倉皇逃入山海關吏部左侍即楊時喬戎政尚書李化龍力言遼東重困危在旦夕皆髙淮擾民激變以資禍患上命撤淮還京四十一年六月初廣東珠池自萬厯三十二年停採至是金吾右衛指揮倪英上章請開刑科給事中郭尚賔論開採之害不報四十二年二月命各省稅課减三分之一四十三年八月命內官吕貴暫提督浙江織造江西稅監潘相檄催福建廣東稅課閣臣言之不聽九月丁丑江西湖口稅廨火大學士吳道南請罷湖口商稅不報四十四年四月丙午雷火焚通州稅監張煜樓居御史金汝諧以聞請罷稅使不報八月萬夀節加稅監河南湖廣江西潘相通灣張煜天津馬堂四川邱乘雲南京劉朝用歲祿賜吕貴飛魚服四十七年五月吏部候選儒士蔣定國奏採山西夏縣等礦疏不由通政司通政使姚思仁紏之時遼東三路敗兵餉告急歙人曹致亷等奏乞同內監搜江南富家借餉數百萬思仁復疏爭之四十八年七月上崩遺詔罷一切礦稅并新增織造燒造等項建言廢棄及礦稅詿誤諸臣酌量起用奉皇太子令㫖盡行停止稅監張煜馬堂胡濵潘相丘乘雲等撤還京谷應泰曰聞之銀鏤金品列之禹貢草人璣貝載在周禮國有常經非可以無藝征之也况王者藏富于閭閻天子不下求金車良以多欲者仁義難施黷貨者亂源斯伏有天下者不可以不致謹也神宗奕葉升平邊圉封貢海內乂安家給人足而乃苞桑之憂不繫于慮日中之昃弗虞于懷逺賢士大夫親宦官宫妾女謁苞苴隂性吝嗇孶孶所談利之所萌耳逮至萬厯二十四年張位主謀仲春建䇿而礦稅始起于是命張忠往山西曹金往兩浙趙欽往陜西陳增駐山東高寀領福建楊榮辦雲南丘乘雲駐四川李敬攝廣東郝隆劉朝用采池州陳奉領湖廣魯坤開彰德衛輝大璫雜出諸道紛然而民生其間富者編為礦頭貧者驅之墾采繹騷凋敝若草菅然又不特此也礦務之外天津有店租廣州有珠𣙜兩淮有餘鹽京口有供用浙江有市舶成都有鹽茶重慶有名木湖口長江有船稅荆州有店稅又有門攤商稅油布雜稅莫不設璫分職橫肆誅求有司得罪立繫檻車百姓奉行若驅駝馬雖漢室牢盆桑孔乘傳熙豐手實雞豚悉空曾未若斯之酷也至乃國法恣睢人懷痛憤反爾之誡覆舟之禍亦間有之以故髙淮激變遼東梁永激變陝西陳奉激變江夏李鳯激變新會孫隆激變蘇州楊榮激變雲南劉成激變常鎮潘相激變江西當斯時也瓦解土崩而散其不亡者幸耳而深宫不省疏入留中其始因礦稅而設璫者繼則璫熒然託命言礦稅其始因璫媚而迎合在礦稅者繼則璫肥而交結在宫闈植根深固未易卒拔故也善乎侍即馮琦之疏曰皇上之心但欲裕國不欲病民羣小之心必自瘠民方能肥己逮至三十三年而稅歸有司礦使停罷輪臺之悔不亦晚乎然且兩載以還稅監不革七年之後為池復開比之衛武飲酒之悔秦穆臨河之誓矣何習與性成也明史紀事本末卷六十五
