body:
  text: 明史紀事本末卷四十八浙江提學僉事谷應泰編平南贑盜武宗正德六年夏四月江西盜起命右都御史陳金總制軍務右副都御史俞諌提督軍務討之先是江西諸郡盜賊蜂起贑賊犯新淦執參政趙士賢靖安賊胡雷二等據越王嶺瑪瑙寨華林賊陳福一破瑞州既而撫州東鄉饒州桃源洞等處賊亦作亂金等奏調廣西田州東蘭等處狼兵合征之七年春正月南贑巡撫都御史周南率兵攻破大帽等山寨盡平之大帽山交界江閩廣三省賊首張畨璮李四仔鍾聰劉條黃鏞等聚徒數千流劫攻陷建寧寧化石城萬安諸縣南分遣江西兵從安逺入攻破巢穴七廣東兵從程鄉入攻破巢穴九福建兵從武平入攻破巢穴八擒番璮等悉斬之俘獲賊屬奪回良善甚衆二月江西按察司副使周憲率兵討廬山左湖盆塘賊敗之擒斬數百人四月周憲移軍攻華林賊于仙女寨拔之進克雞公嶺先後擒斬千餘人進薄華林絶其出道賊益窘五月周憲攻華林賊及其子幹俱死之先是陳金檄周憲等分兵三路討華林賊憲率兵進㑹諜者言賊饑疲憲信之遂檄兵夾攻其二路失期不至憲與賊戰獨深入山谷峻險賊慿高發擂石下如雨兵敗憲被執刀中憲首血流滿面左髀復中鎗不能行大罵賊不絶口賊怒支解之子幹見父被執躍馬直前中流矢力戰墮崖死賊勢復振事聞贈憲官諡忠愍旌其子六月南昌知府李承勳㑹同按察使王秩督兵進攻華林賊勳招降賊帥黃竒置麾下有智略任用之人謂勳宜防不測勳益親信令宿帳中竒感奮誓以死報勳乃令竒入賊寨說其黨多來降者與約期令俟報至期承勳令土酋岑猛選精兵五百人夜與俱至山下勳令黃竒密入寨誘所與約降者來既見復縱之去令為內應勳乃與猛帥五百人夜銜枚登山歷重險上黃竒與數人前導至壘賊方鼾睡直夜者擊三更竒拔柵率衆入五百人奮刀砍之內應降賊亦合勢夾攻賊倉卒不知所為求甲仗皆不得斬首三千餘級餘衆奔出壘乘夜逃匿山谷候曉搜諸山又斬獲千餘人華林賊遂平於是移兵擊靖安瑪瑙寨賊盡俘之都御史陳金奏江西華林賊已勦平桃源賊王浩八願撫加金太子少保餘論功行賞有差冬十月命右都御史陶琰總督諸軍務事初廷議以河北江西諸寇未平故復勑琰總理軍務事至則劉六已滅王浩八聽撫琰慮浩八譎詐難信乃奏設兵備及簡拔郡寮有才者分處要害八年春正月桃源賊王浩八等復作亂率五洞蠻兵與東鄉賊分劫州縣命操江副都御史俞諌提督軍務同總兵劉暉率狼兵進勦夏四月江西兵備副使胡世寧約王賽一內應引兵征東鄉劇賊樂庚二陳邦四等盡擒之東鄉故賊巢世寧撫禦反側務立信義樂庚二陳邦四怙亂復叛悉擒馘王賽一效順有功奏原其死既而修城濠遷縣治經武賑飢百姓晏然五月江西恭政吳廷舉單騎入桃源諭劇賊王浩八等計擒賊渠以出桃源賊用兵歷年征討費以萬計而賊益熾廷舉欲用竒謀取勝免胄單騎入賊巢諭令解散為賊所留耀武劫威廷舉略不為動久之因得以識其左右有謀勇者陰結之使執其渠因奉廷舉歸俞諌率狼兵大敗桃源賊于裴源初諫因吳廷舉被執移兵桃源進勦知府李承勳曰賊乏食必掠裴源積粟請贑兵及南昌兵自嶽陽分兩翼伏裴源待之賊果入裴源大敗遁去桃源賊棄巢奔突四出踰饒信縱掠徽衢諸州縣初賊聞狼兵至頗懼欲降按察司王秩欲受之已有約議者以賊反覆不可信欲乘兵威撲滅取降者殺之賊復大亂棄巢奔突四出劫掠徽衢等處民被其害六月總督浙江軍務都御史陶琰巡撫應天都御史王縝㑹總制江西都御史俞諫夾攻桃源賊王浩八于徽衢平之初琰慮桃源賊聽撫難信預為之防至是果突入境督兵㑹勦餘黨悉平總制俞諫奏江西賊平請建東鄉萬年二縣分治地方撫安人民從之十二月俞諫調兵征建昌賊徐九齡等平之建昌賊為患數年勢逼益府官軍不能討至是諌命師悉擒以還九年三月總制軍務俞諌檄兵備胡世寧等㑹兵勦臨川四寨宿盜盡平之十月升南昌知府李承勳浙江按察使太監黎安欲奪承勳功誣陷之大理卿燕忠即訊廣信得直十二年二月巡撫南贛都御史王守仁檄四省兵備官選募民兵操練初陳金討桃源華林諸賊多所招撫未大示懲創又民間父兄被殺者不得報讐時相詬訾諸凶不自安轉徙嘯聚不數年仍起為盜又南贛地多山險易為巢穴南安橫水桶岡諸寨有賊首謝志山藍天鳯漳州浰頭等寨有賊首池大鬢等於是福建江西湖廣廣東之界方千里皆亂兵部尚書王瓊知守仁才特薦用之守仁至以前者多調狼逹土軍糜費踰萬乃使四省兵備官於各屬弩手打手機快中選驍勇有膽力者縣千人少或八九百選最者優廪餼署為將領其兵備原額官軍汰老弱三分之一各縣賢能官統之專守城隘所募精兵隨各兵備官屯札别選官分隊統習之於是各縣屯戍既足防守而兵備召募者又可應變出竒盜賊漸知所畏三月王守仁調三省兵攻信豐龍南流賊連敗之賊突至信豐守仁令乘險設伏厚集以待之乃潜令兵往徑道夾攻賊奔潰象湖山拒守又潜兵搗其巢穴大敗之賊復潰入流恩山岡等巢尋遁去五月王守仁調兵攻何塘洞山寨賊酋張師富等及長富村等處二十餘巢平之其脅從餘黨悉願携帶家口出官聽撫守仁委官安插復業四千餘人復檄知府李斆調兵擒賊帥陳能平其巢穴秋七月王守仁請提督軍務許之初守仁上疏論狼兵所過不減于盜轉輸之苦重困于民乃請便宜行事期于成功不限以時兵衆既練號令既明事無掣肘可以相機勦滅衆迂其議屢不報尚書王瓊慨然曰朝廷有此等人不與以柄又將誰用因守仁疏覆議即奉㫖改提督南贑汀漳等處軍務冬十月王守仁討汀州左溪賊藍天鳯等平之天鳯等與贑南下新穩下等洞賊雷文聰高文暉等盤據千里守仁集從事議曰諸巢為患雖同事勢各異以湖廣言之則桶岡諸巢為賊之咽㗋而橫水左溪諸巢為之腹心以江西言之則橫水左溪諸巢為賊之腹心而桶岡諸巢為之羽翼今不先去腹心之患而欲與湖廣夾攻桶岡進兵兩寇之間腹背受敵非吾利也況賊但聞吾檄湖廣夾攻桶岡橫水左溪必觀望未備出其不意可以得志橫水左溪既破移兵桶岡勢如破竹矣乃遣都指揮許清率兵自南康新溪入知府邢珣率兵自上猶縣石人坑入知縣王天與率兵自上猶縣白面峪入皆㑹橫水指揮郟文率兵自大庾縣義安入知府唐淳率兵自大庾縣聶都入知府季斆率兵自大庾縣穩下入縣丞舒富率兵自上猶縣金坑入皆㑹左溪知府伍文定知縣張戢各率兵從上猶南康分入以遏奔軼守仁親率兵千餘自南康進搗橫水與諸軍㑹分布既定乃以初七日分道並進守仁至橫水謝志山等倉卒據險拒之守仁未至賊巢三十里駐兵夜募鄉兵善登山者四百人各執一旗賫銃炮由間道攀崖上險分布近賊巢左右極高山頂伏覘賊度我兵至險舉炮火應又預遣人夜率壯士緣崖上險奪發其滚木礧石十二日守仁率兵進至十八面隘賊方憑險迎敵忽聞近巢諸山頂炮聲如雷烟焰漲天守仁麾兵進逼之賊大驚失措謂官兵已盡得其巢穴遂棄險走我兵乘勝驟進指揮謝杲馬廷瑞兵由間道先入焚賊巢賊退無所歸大奔潰遂破橫水大巢邢珣王天與等各破數巢皆㑹于橫水郟文唐淳等各破數寨皆㑹于左溪㑹天霧雨休兵已諜知諸潰賊收集餘衆據險立柵然倉卒無資糧守仁乃下令各營皆分兵為竒正二哨一前攻一後繼用土人為鄉導自是諸營各分道破餘巢伍文定張戢亦連破數巢入㑹左溪賊悉平十一月王守仁㑹兵攻桶岡初守仁乘橫水左溪之勝遣人諭以禍福於是桶岡賊鍾景納欵降守仁使夜入賊巢諭之期以初一日使人于鎖匙籠出降賊方恐見使至皆喜而橫水左溪賊持不可遲疑未決守仁遣使於鎖匙籠促降而别遣邢珣率兵入茶坑伍文定率兵入西山界唐淳帥兵入十八磊張戢帥兵入葫蘆洞俱冒雨入藍廷鳯方於鎖匙籠聚議忽聞諸兵已入險皆震愕急奔入內隘阻水為陳邢珣麾兵渡水前擊張戢衝其右伍文定又自張戢右懸崖繞出賊旁賊敗走舒富王天與亦由鎖匙籠入賊悉衆奔十八磊唐淳嚴陳迎擊之賊又敗㑹日暮扼險相持明日諸軍合勢併擊邢珣先破桶岡大巢諸軍奮勇並進俘斬甚衆湖廣兵亦至賊餘衆遁入山谷守仁遣諸將分道捕之於是橫水左溪桶岡之賊略盡賊首藍廷鳯蕭貴模等皆斬獲無遺守仁出師凡兩月平賊巢八十四處遂議于橫水等處建城設安逺縣治控禦三省捷聞擢守仁右副都御史十三年春正月王守仁討浰頭賊平之先是守仁征橫水桶岡等賊慮浰頭賊乘虛出擾乃使人賞以銀布諭降之惟賊首池大鬢不從守仁計兵力未暇羈縻之勿深問有金巢等率衆降守仁厚撫之令從征及橫水破大鬢懼遣其弟池仲安率老弱二百詣守仁亦降即願從征立功實覘虛實為內應也守仁知之令從别哨逺其歸路隂使人分召近浰頭諸縣被賊害者詢之得其情各授方略遣之歸令密集兵衆候平桶岡報師期及桶岡平大鬢益懼守仁遣使至浰頭賜諸賊牛酒見賊嚴為備詭語使者曰龍川新民鄭志髙盧珂欲讐殺掩襲故備非虞官兵也守仁佯信其言怒盧鄭移檄臨川廉二人擅兵狀且令大鬢除道候還兵討之大鬢假使來謝無勞官兵當自防禦之盧珂鄭志髙陳英者龍川已招新民也仍領舊部三千餘衆時諸縣民皆為大鬢所脅三人者獨抗賊賊讐之守仁還兵三人來告變言大鬢反狀時池仲安方領兵在守仁所守仁乃佯怒三人收縛將斬之曰大鬢方遣弟領兵報效安得有此仲安遂叩首辨列三人罪惡守仁佯信之械繫珂等置之獄守仁密使人至獄中諭以意令三人無恐且遣使歸集衆以候十二月二十日守仁還至贑張樂大享將士下令橫水桶岡既平浰頭歸順境內無虞矣民久勞苦冝休兵為樂遂散兵使歸農乃遣仲安歸報其兄以盧珂被繫故遣使令大鬢勿撤僃以防珂黨掩襲大鬢意乃大安守仁别購仲安所親說仲安令自來投訴云官意良厚何可不親一往謝況使盧珂等言無所入大鬢信之謂其下曰欲伸先屈贑州伎倆須自往觀之遂帥其徒四十餘人自詣贑守仁先已檄諸郡縣及龍川等勒兵候報至是探知大鬢就道亟遣使發諸路兵候浰頭然道經賊巢始達則使别賫一檄為捕盧珂黨與者佯示賊賊果問見檄遂不為意大鬢至贑謁守仁見軍門無用兵形又覘知珂等繫獄意益安歸報其黨謂事無他守仁乃夜釋珂等使間道歸發兵而令諸官屬以次設牛酒日宴犒大鬢等緩其歸久之度珂已至家諸郡縣兵當大集守仁乃設犒于庭先伏甲士引大鬢等入悉擒之出珂狀訊之皆服遂悉置獄而趣諸路同抵賊巢守仁率親兵由龍南縣冷水徑直搗下浰大巢諸路兵皆令入三浰賊弛備既久驟聞官兵四集驚懼乃分投出禦而悉其精鋭千餘據險設伏於龍子嶺官軍為三衝犄角進指揮余恩首擊賊戰良久賊敗王受等追之伏發被扼適推官危夀兵至鼓譟前衝之千户孟俊率兵繞其後賊大潰遂克三浰大巢餘賊精鋭尚八百人聚九連山山四面險絶惟一面得上賊設礧石滚木拒之官兵不敢近守仁乃令官兵衣賊衣抵暮詐為賊敗奔者上山賊見之果相招呼官兵乃得渡險遂扼其路賊覺急禦則大衆已䦨入矣賊不支乃退走潰出官兵先四路設伏待之擒斬略盡餘徒二百人慟哭請降守仁納之相視諸險隘以和平地方控扼三省奏設縣治下部議從之遂班師捷聞賜璽書褒賞餘功賞賚有差南贑自此無警矣谷應泰曰正德濁亂羣盜蜂起而江西之盜有五大帽山者號贑賊仙女寨雞公嶺者號華林賊瑪瑙寨越王嶺者號靖安賊王浩八為桃源賊樂庚二陳邦四為東鄉賊自江西副使周憲戰死華林總督陶琰再撫浩八而二賊稱最劇矣至巡撫周南平贑賊知府李承勳平華林靖安參政胡世寧吳廷舉平桃源東鄉當是時陳金俞諌實管節鉞承勳廷舉功最出竒經營九載至正德十一年而南贑賊黨略平皇靈未暢苞蘖旋萌於是江西之賊復有四藍天鳯等為左溪賊謝志山等為橫水賊鍾景等為桶岡賊池大鬢等為浰頭賊新建以廷推舊望簡荷新銜規畫山川廣行間諜親破賊巢者八十餘增設縣治者二特設南贑提督軍門者一自正德十二年受命至十三年而江西賊悉平矣夫諸臣平賊遲而變隨新建平賊速而賊定蓋江西南臨百粵北枕大江東連閩嶠西接荆蠻地延千里址交五省又有崇山峻嶺鳥道叢篁車騎不得長驅米芻不得時給王師直指則鳥遁深林振旅還朝即鼠謀竊發揆其形勢則决地之翼不能離巢徑丈之鱗終難失水然而尉陀有七郡之計任囂效坐大之志庾嶺以南舉足非國家有也當四賊再發浰頭逺在汀州桶岡實處楚境左溪橫水連亘其中彼且視狡兔之窟成率然之形漢天子有神靈豈能從天而下乎而當時議者動思言撫此何異招麋鹿于金鑣呼亡猿于朱檻有躑躅倘徉去之惟恐不速耳撫不就而用勦徴調狼達兼招苖峒劫掠性成罕知王制引入內地恃為長城賊甫獸駭我已鴟張賊茍帖耳求生則我已受之恐後矣羈縻勿絶豈久安長治之道也哉新建悉罷客兵自募鄉勇養兵數月觀釁旬時德裕築籌邊之樓文淵畫聚米之勢猶慮賊兵四出牽制我師僞撫浰頭佯委桶岡使皆懷疑觀望徘徊之間鼓行而進直搗中堅竒兵雲擾鐵騎颷馳橫水覆巢左溪失險矣桶岡既斷右臂王師已入門庭兼兩寨逋逃自相駭觸乘其破膽一鼓遂登兵法所謂出其不意者也浰頭愚狡新建玩弄股掌賊首池大鬢等皆千里誘致縛之樽爼渠魁已在檻車天兵已薄賊險而彼且鼾寢晏然鼓角一鳴千山聲動賊於斯時登陴授兵則一木不支倉皇出逸則四面楚歌相顧解甲慟哭請降武侯五月渡瀘而南人不復反矣夫江介嶺表限在天南拊背扼吭專支閫外楊僕樓船馬援銅柱比之新建何以稱焉明史紀事本末卷四十八
