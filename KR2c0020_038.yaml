body:
  text: 明史紀事本末卷三十八浙江提學僉事谷應泰編平鄖陽盜憲宗成化元年夏四月荆襄盜劉千斤反荆襄之上游為鄖陽鄖古麋國春秋時為楚附庸地多山元至正間流賊作亂終元世竟不能制明初命鄧愈以大兵勦除之空其地禁流民不得入然地界湖廣河南陜西三省間又多曠土山谷厄塞林箐䝉密中有草木可採掘食正統二年嵗饑民徙入不可禁聚既多無所禀約束中巧黠者自相雄長稍能驅役之漢中守臣以聞且言不即誅恐有後患上曰小民為饑寒所迫奈何遽用兵誅之命御史金敬往撫輯敬至謫數人戍餘陽聽撫而大奸皆潜伏不出尋復縱勢益滋蔓有錦衣千户楊英者奉使河南䇿其必反上疏言流逋之衆宜選良吏賑恤其饑漸圖所以散遣之辭甚諄切不報三省長吏又多諉非已境因循不治至是千斤遂倡亂千斤名通河南西華人有膂力縣治門有石獅重千斤通手舉之人因號為劉千斤正統中潜往襄陽房縣與僧尹天峯謀亂成化元年有石龍號石和尚紏合馮子龍數百人四散剽掠通令男聰約子龍舉事乃於大石厰立黃旗聚衆據海溪寺稱王僞號漢建元德勝僞署將軍元帥以石和尚為謀主劉長子苗龍苗虎為羽翼衆至數萬劫襄鄧境時王恕方以副都出撫懸榜曉諭而未受分討之命賊狃為故常不肻散恕聞於朝曰民可撫也而奸民好亂者非兵不威五月命撫寧伯朱永為總兵官兵部尚書白圭提督軍務太監唐慎林貴監軍合湖廣總兵李震討劉千斤副都御史王恕㑹三師並進搗其巢二年春二月擢鎮守荆襄王信為都指揮同知劉千斤之亂荆襄震驚信度房陵險要自率數十騎往據之調集民兵不滿千人賊四千餘人突至圍攻之援絶信多張旗舉火日夜不息歷四旬間以死士出城五六里舉火炮賊以為援兵也驚潰信追擊大利三月提督荆襄軍務兵部尚書白圭奏言賊首劉千斤在襄陽房縣豆沙河諸處萬山之中分作七屯臣等議欲分兵四路一從南漳一從安逺一從房縣一從穀城犄角並進尅期㑹勦上報曰兵不可遙制悉如卿所議行五月兵部尚書白圭及湖廣總兵都督李震帥師討荆襄賊平之先是圭至南陽與撫寧伯朱永由南漳入遇賊誘之臨城擊破之永適有疾留鎮圭與唐慎李震湖廣巡撫王儉進兵潭頭坪林貴鮑政自安逺進兵馬良坪喜信王信自房縣進兵浪口河王恕率都指揮劉清等亦自穀城進兵洞庭廟賊見勢逼千斤走壽陽欲出陜西苗龍走大布欲出逺安即調兵往壽陽截其奔軼千斤退保大市與龍合都指揮田廣進至鴈坪擊賊敗之追及於古口山明日廣與諸軍皆㑹進攻賊陳斬其子劉聰僞都司苗虎一百餘人乘勝進兵賊退入巢穴山險復雨淖圭身先士卒至格兜賊憑險為拒時諸路兵㑹已二日攻之不能下士卒聞圭來倍奮勇圭乃命劉清將兵千餘由間道出賊後焚其營而自以大軍臨之圭與震儉攻其右王信擊其左鮑政衝其中賊數萬餘迎戰顧其營火遂驚走蹂躡死者無算擊斬萬人生擒劉千斤獻俘京師與苗龍等四十人皆磔於市男子十嵗以上者斬之惟劉長子石和尚遁去深入岩險㑹永病愈更帥兵搜餘黨六月石和尚集衆千餘焚劫四川大昌縣殺䕫州通判王禎命分兵討之冬十月提督湖廣軍務白圭誘執賊首石和尚時石和尚劉長子聚衆巫山圭遣參將喜信鮑政都指揮白玉隨賊向往勦之賊計窮食盡乞降圭遣指揮張英誘之劉長子遂縳石和尚送至喜信營受之長子詣信營乞食信餉之俾居近營既而并誘執劉千斤妻連氏及其僞職常通王靖張石英等六百餘人事聞上命搜捕餘黨賊平諸將忌張英功譛於朱永謂英多獲賊賄以事捶殺之遂班師十一月磔石和尚劉長子於市叙平荆襄功進撫寧伯朱永為侯李震興寧伯白圭進太子少保四年春三月改戶部右侍郎楊璿為右副都御史撫治荆襄南陽流民六年冬十月荆襄賊李鬍子聚衆反先是賊平諸郡邑控制戍守皆未設㑹嵗大旱流民入山者九十萬人李鬍子新鄭人劉千斤餘黨也千斤敗與其黨王彪走免紏合餘黨小王洪石歪膞往來南漳內鄉渭南間復倡流民為亂僞稱太平王立一條蛇坐山虎等號官軍屢捕不獲荆襄南陽為之騷然十一月命都御史項忠總督河南湖廣荆襄軍務討李鬍子七年春正月右都御史項忠至襄陽以見卒寡弱請調永順等土兵從之諸將請速進忠曰流民逃聚山谷陷盜中不能自脫耳乃駐兵分布險要遣人持榜招諭有能去賊自歸者禁勿殺於是民多携老弱來歸王彪引數十人覘軍且阻歸者出不意擒之兵部尚書白圭言賊黨困饑寒出於迫脅宜勑項忠相度機勢計撫綏長䇿不必調永順保靖土兵以滋騷動忠奏曰賊據險在萬山中復有流民從之患將不測臣奉詔㫖開諭生路流民携扶老幼出山日夜不絶計四十餘萬今若中止土兵恐民聞之仍懷疑懼且王彪雖授首而渠魁李鬍子尚竄伏設復再聚重調為難上報曰土兵已到嚴約不得擾民其流民在山眷戀生業不至為非者用心設法撫安之十一月荆襄南陽流賊平進總督軍務項忠右都御史𠡠留撫治忠之用兵荆豫也遣人持榜入山招諭負險不服即縱兵勦不赦李鬍子勢孤潜伏山寨忠遣副使余洵都指揮李振率兵追捕遇鬍子於竹山縣盡死拒敵為官軍所擒小王洪尚有衆五百屯於鈞州龍潭亦破擒之凡遣還鄉者四十萬人俘斬二千人編戍者萬餘人時流民有自洪武以來家業延子孫未嘗為惡者兵入盡草剃之死者枕藉山谷其戍湖貴者又多道死棄尸江滸議者謂忠此役實多濫殺既樹平荆襄碑或亦呼為墮淚以嘲忠云十二月都御史項忠獻荆襄俘李鬍子一百二十九人刑部尚書陸瑜等㑹奏坐罪有差八年夏四月給事中梁璟疏劾都御史項忠偏聽檢討張寬御史劉潔總兵李震縱殺要功上曰荆襄流民為患中外皆以為慮今及蕩平即議其後非所以激勸天下也兵部尚書白圭又言忠所上荆陽功次文冊與震前後不同請勘上亦不聽五月都御史項忠乞致仕慰留之召還院先是有星孛於天田言者謂荆襄殺戮所致忠再疏自列因乞骸骨上溫㫖答之十二年春二月命都御史原傑經略鄖陽撫定流民自成化初年陜西至荆襄唐鄧之間皆長山大谷綿亘千里所至流逋藏聚為梗劉千斤之亂因之至李鬍子復亂流民無慮百萬都御史項忠奉命捕逐之死者不可勝計祭酒周洪謨乃著流民說略曰昔因修天下地理志見東晋時廬松之民流至荆州乃僑置松滋縣於荆江之南陜西雍州之民流聚襄陽乃僑置南雍州於襄西之側其後松滋遂𨽻於荆州南雍遂併於襄陽垂今千載寧謐如故此前代處置荆襄流民者甚得其道若今聽其近諸縣者附籍逺諸縣者設州縣以撫之置官吏編里甲寬徭役使安生業則流民皆齊民矣都御史李賓深然其說至是流民復集如前賓乃援洪謨說疏上之上可焉命傑往蒞其事秋七月北城兵馬吏目文㑹疏言荆襄自古用武之地宣德間有流民鄒百川楊繼保匿聚為非正統中民胡忠等開墾荒田始入版籍編成里甲成化年來劉千斤石和尚李鬍子相繼作亂大臣處置失宜終未安輯今河南嵗歉民饑入山就食勢不可止能保無後日之患經條上三事曰荆襄土地肥饒皆可耕種逺年入籍流民可給還田土所附籍者領田土力耕量存恤之其願回籍者聽曰流民潜處出沒不常乞選良有司為之撫綏軍衛官為之守禦則流民自安曰荆襄上流為吳楚要害道路多通必於總隘之處加設府衛州縣立為保甲通貨賄以足其衣食立學校以厚其風俗則其民自趨於善矣上大是之命都御史原傑採其言用之九月都御史原傑奏言信陽固始等州縣南抵蘄黃西接荆襄東連鳯陽霍丘山勢綿亘河流四逹盜易出沒且鳯陽陳州近皆被災流民載道盜入霍丘劫帑藏執縣官民庶騷動誠宜思患預防今請於汝寧所屬信陽等一十三州縣令二司巡守官選壯丁備器械馬匹委任二官督之緝捕盜賊又信陽軍民雜處奸盜尤衆請調守備南陽河南都指揮官俾得專禦盜賊禁治銀洞又商城縣南接六安州二百餘里四野曠漫而金剛臺巡檢司乃在縣北今請遷置縣馬頭山詔悉如所言行之十一月開設湖廣鄖陽府即其地設湖廣行都司衛所及縣時都御史原傑遍置諸郡縣深山窮谷無不親至至則宣朝廷德意問民疾苦諸父老皆欣然原附版籍為良民於是大㑹湖廣河南陜西撫按藩臬之臣籍流民得十一萬三千餘戶遣歸故土者一萬六千餘戶其願留者九萬六千餘戶許各自占曠土官為計丁力限給之令開墾為永業以供賦役置郡縣統之於是湖廣割竹山地分置竹溪縣割鄖津地分置鄖西縣河南割南陽汝州唐縣地分置桐柏南召伊陽三縣陜西析商縣地為商南山陽二縣而以商縣為商州使流寓土著者參錯以居又即鄖縣城置鄖陽府以統鄖及竹山竹溪鄖西上津六縣且立行都司衛於鄖陽以保障控禦之經畫既定乃上其事因薦鄧州知州吳逺為鄖陽知府諸州縣皆選鄰境良能吏習知其事者為之又以地界三省無統紀薦御史吳道宏才望請代己任得兼制三省撫治八郡居鄖陽上遂擢道宏為大理少卿代傑撫治馳璽書賜傑召還以為南京兵部尚書傑勞苦成疾南還竟卒於驛舍荆襄之民聞之無不流泣者尋以撫治鄖陽大理少卿吳道宏為右僉都御史開府鄖陽著為令谷應泰曰鄖陽斗絶西北錯處陜蜀南下則光信南陽豫州之域漢北楚山又皆蜿蜒亘屬下抵鳯陽廬霍地遍千里壤接數省河流四達復嶺萬里麋羅之故國鬻熊之邉陲也終元之世嘯聚不散髙皇削平竟虛其地禁民勿入夫亦周終徙洛漢不復豐惡其淵藪遂作丘墟然而鄖處萬山林篁叢密地既紆回利堪樵給流民生長莫𨽻版圖家占土田不知租稅此亦桃源之於武陵五丁之於蜀道矣流聚既多遂生雄長天水泥丸之志尉陀坐大之形劉通以膂力號劉千斤石龍以妖䜟號石和尚憲宗之世潜號改元唐鄧荆襄騷然不靖白圭以大司馬出督五道俱進敗之南漳懸軍深入焚其中營千斤獻俘闕下而臨陳斬獲者萬有餘人蹂亂走死者不可勝算兵威懲創於斯烈矣既而劉長子又有餘黨復聚巫山圭發師掩捕連營入討食盡援窮誘殺渠帥獲縛者復六百餘人而上猶命縱兵誅勦必無噍類示不臣之炯鍳明天威之莫犯也既而李鬍子又以餘黨搆亂荆襄項忠主勦尤力遍召土兵進營竹房陳俘二千編戍滿萬乃史稱其草剃良民枕藉山谷戍多道死尸棄江干項羽盡屠外黃晋楚遂築京觀不是過也然而流民入山就食雲集如前大臣悔禍始議更張洪謨著流民之說文㑹有三事之陳原傑乃披榛履險宣布慰問於是山東之民扶杖聽詔河北之老流涕觀軍入籍者十一萬三千願留者九萬六千餘戶各占曠土並輸賦役割地三省設置六縣而鄖陽巍然重鎮矣鄭國成渠秦溉萬頃受降河外唐築三城國寶慢藏利器誨盜非惟棄險實啓戎心故一介之吏賢於十萬之師耰鉏之民勝於組練之甲然後知飲至凱旋稱俘獻廟當時䖍劉我赤子抑又何多也原傑﨑嶇布置竟以勞卒萊公雷竹叔子峴碑視死人如刈以為己功者吾又以傑為百世如生也明史紀事本末卷三十八
