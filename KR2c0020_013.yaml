body:
  text: 明史紀事本末卷十三浙江提學僉事谷應泰編胡藍之獄太祖洪武二年冬十月上欲以楊憲為丞相問劉基基素與憲厚以為不可上怪之基曰憲有相才無相器夫宰相者持心如水以義理為權衡而已不與焉者也今憲不然能無敗乎上曰汪廣洋何如基曰此褊淺上曰胡惟庸何如基曰小犢耳將僨轅而破犁上曰吾之相無踰于先生基曰臣非不自知臣疾惡太深又不耐繁劇為之且負大恩天下何患無才願明主悉心求之如目前諸人臣誠未見其可也六年秋七月以胡惟庸為中書左丞相八年夏四月誠意伯劉基卒初上既相胡惟庸基大戚曰使吾言不驗蒼生之福也言而驗者其如蒼生何因憂憤增疾基嘗為上陳甌閩事蓋甌閩之間有隙地曰淡洋其南抵閩界曰三魁為鹺盜藪方氏所由亂基奏于其地立巡檢司以控扼之其姦民弗便也相率挾逃戍之卒以叛而大豪復陰持其窔基使子璉上書奏之而不先白中書省惟庸故銜基使刑部尚書吳雲劾之以淡洋踞山海有王氣欲圖為墓地民勿與則建立司之䇿以窘其人致激變疏入上下有司惟庸請加以重辟又欲逮基子璉獄上皆不問而苐令移文使基知基乃馳入朝見上不敢辨惟引咎自責而已亦不敢言歸俄有疾惟庸覘上念基怠乃陽為好者以正月朔挾醫來視疾基飲之覺有物積胸中如拳石間以白上上不省也又三月寖劇使使問之知不能起驛舟護歸青田亡何竟卒十三年春正月左丞相胡惟庸謀不軌伏誅自楊憲汪廣洋既敗惟庸總中書政専生殺黜陟以恣威福內外諸司封事入奏惟庸先取視之有病已者輒匿不聞由是奔競之徒趨其門下魏國公徐逹深嫉其姦邪常從容言于上惟庸銜之達有閽者福壽惟庸陰誘致為已用為福壽所發惟庸故起家寧國令時太師李善長秉政惟庸餽遺善長黃金二百兩遂得召入為太常卿纍遷中書參政遂與善長深相結以兄女妻善長從子祐貪賄弄權益無所忌一日其定遠舊宅井中忽出竹笋出水髙數尺諛者爭言為丞相瑞應又言其祖父三世塜上夜有光燭天于是惟庸稍自負有邪謀矣會惟庸家人為姦利事道關榜辱關吏吏奏之帝怒殺家人惟庸謝不知帝又究故誠意伯死狀惟庸懼且見發乃計曰主上草菅勳舊臣何有我死等耳寧先發毋為人束手寂寂而是時吉安侯陸仲亨平涼侯費聚者常犯法帝切責之二人懼惟庸陰以權利脅誘之二人素戅勇又見惟庸用事因與往來久之益密惟庸與御史大夫陳寧坐省中閲天下軍馬籍令都督毛驤取衛士劉遇寶及亡命魏文進等為心膂曰吾有用爾也太僕寺丞李存義善長之弟惟庸之壻父也以親故往來惟庸家惟庸令存義陰説善長以邪謀惟庸又使指揮林賢下海招倭軍約期來會又遣元臣封績致書稱臣于元請兵為外應皆未發會惟庸子乘馬奔入挽輅中馬死惟庸殺挽輅者上怒命償其死惟庸逆謀益急而是時日本貢使適私見惟庸惟庸約其王令以舟載精兵千人偽為貢者及期會府中力士掩執帝度可取取之不可則掠庫物泛海就日本有成約正月戊戌惟庸因詭言第中井出醴泉邀帝臨幸帝許之駕出西華門內使雲奇衝蹕道勒馬銜言狀氣方勃舌駃不能達意太祖怒其不敬左右撾捶亂下雲奇右臂將折垂斃猶指賊臣第弗為痛縮上悟乃登城望其第藏兵復壁間刀槊林立即發羽林掩捕考掠具狀磔于市并其黨御史大夫陳寧中丞凃節等皆伏誅僚屬黨與凡萬五千人株連甚衆羣臣請誅李善長陸仲亨等上曰朕初起兵時李善長來謁軍門曰有天有日矣是時朕年二十七善長年四十一所言多合吾意遂命掌書記贊計畫功成爵以上公以女與其子陸仲亨年十七父母兄弟俱亡恐為亂兵所掠持一升麥藏于草間朕見之呼曰來遂從朕既長以功封侯此皆吾初起時股肱心膂吾不忍罪之其勿問癸卯詔罷中書省升六部官秩倣古六卿之制改大都督府為中左右前後五軍都督府祖訓云自古三公論道六卿分職不聞設立丞相自秦始制丞相不旋踵而亡漢唐宋雖有賢相然其中多小人專權亂政今罷丞相設五府六部都察院通政司大理寺等衙門分理天下庶務事皆朝廷總之十二月致仕學士承旨宋濓以孫慎坐胡惟庸黨被刑藉其家械濓至京上怒欲誅之皇后諫曰民間延一師尚始終不忘恭敬宋先生親教太子諸王豈忍殺之且宋先生家居寧知朝廷事耶上意解濓得發茂州安置行至夔州以疾卒十四年春二月有訴浦江鄭氏交通胡惟庸者時四方仇怨相告訐凡指為胡黨率相收坐重獄鄭氏素以孝義聞兄弟六人吏捕之急諸兄爭欲行其弟鄭湜曰弟在乃使諸兄罹刑辟耶獨詣吏請行仲兄濓先有事京師暨弟至迎謂曰吾家長當任罪弟無與焉湜曰兄老吾往辨之萬一不直弟當伏辜二人爭入獄上聞俱召至廷勞勉之謂近臣曰有人如此而肯從人為非耶即宥之擢湜為福建布政司參議二十三年夏五月乙卯太師李善長自縊虞部郎中王國用上書訟寃略曰人情之愛其子必甚于愛其兄弟之子善長于胡惟庸姪之親耳于陛下則子之親也使善長佐惟庸成事亦不過勳臣第一而已矣太師國公男尚主女納妃而已矣且善長豈不知天命之不可幸求當元之季欲為此者何限莫不世絶宫汚不保首領此善長之所熟見也人年邁精神意慮鼓舞倦矣偷安苟容則善長有之曽謂有血氣之強暴感動其中也哉且善長子事陛下托骨肉無纎芥之嫌凡為此者必有深仇急變大不得己而後父子之間或至相挾以求脫禍未有平居晏然都無形迹而忽起此謀者此理之所必無也若謂天象告變大臣當災則殺人以應天象夫豈上天之意哉今不幸已失刑而臣懇惻為陛下明之猶願陛下作戒于將來也天下孰不曰功如李善長又何如哉臣恐四方之解體也不報國用疏解縉代草也命刑部以肅清逆黨事播告天下韓國公李善長列侯胡美唐勝宗陸仲亨費聚已故侯顧時陳德華雲龍王志楊璟朱亮祖梅思祖陸聚金朝興黃彬薛顯都督毛驤陳萬亮耿忠於琥凡二十人二十五年秋八月丙子靖寧侯葉升坐交通胡惟庸伏誅太祖洪武十一年秋八月命西平侯沐英為征西將軍率都督藍玉等統兵征西畨玉開平王常遇春婦弟也長身頳面有勇略從遇春麾下每戰先登陷陳所當無前遇春素稱于上上亦以遇春故寵異之纍功至都督僉事至是同英討西番擒其渠癭脖子斬獲以千計獲馬二萬餘匹牛羊十餘萬還封永昌侯十四年秋九月命永昌侯藍玉以征南副將軍同潁川侯傅友德討雲南轉戰平之事見太祖平滇二十年春正月命永昌侯藍玉為右副將軍同宋國公馮勝襲金山納克楚降之併降其衆十餘萬勝以詿誤召還即軍中拜玉為大將軍事見故元遺兵二十一年夏四月大將軍藍玉襲捕魚兒海獲元主次子地保努后妃公主百三十餘人吳王多爾濟等將相宫校三十人男女七萬馬駝五萬上大悅下璽書褒玉比之衛青李靖秋七月戊寅大將軍藍玉遣人送元主次子地保努及后妃公主等至京既而有言玉私元主妃事上大怒曰玉無禮如此豈大將軍所為哉元主妃聞之惶懼自盡玉還朝上切責之戒以率德改行十二月壬戌封永昌侯藍玉為涼國公先是擬封玉梁國公至是改封涼鐫其過于劵二十三年春正月西番蠻人復叛命涼國公藍玉率都指揮瞿能往大渡河邀擊之玉討平嵓川雜道克散毛洞擒土目刺惹等萬餘人置大水田千户所進平施南忠建二宣撫司叛蠻還增歲祿賜黃金文綺尋詔還鄉二十四年冬十月命涼國公藍玉往陜西訓練軍士二十五年夏四月涼國公藍玉捕逃冦祁者孫遂略西番罕東之地玉兵入罕東遣都督宋晟徇阿真州番衆皆遠遁而會蜀故降將伊埓特穆爾反建昌使玉移師討之至則禆將瞿能已大破其衆伊埓特穆爾走柏興玉以計誘縛其父子送京師斬之盡降其餘黨便宜請增設諸衛且請籍民為兵上報設諸衛而不許籍民遂班師二十六年春正月乙酉涼國公藍玉謀不軌伏誅初胡惟庸之畔有稱玉與其謀者上以其功大宥不問後諸老將多沒乃擢為大將總兵征伐甚稱上意嘗措置陜西邊事至蘭川墜馬微傷手詔慰勞之比於中山開平二王然玉素不學性復很愎見上待之厚又自恃功伐專恣橫暴畜莊奴假子數千人出入乘勢漁獵嘗占東昌民田民訟之御史按問玉執御史捶而逐之先是北征還私其珍寶駝馬無算渡喜峰關吏以夜不即納玉大怒縱兵毁關而入上聞之不樂併詰責其私元主妃玉慢不省嘗見上命坐或侍宴飲玉動止傲慢無人臣禮及總兵在外擅升降將校黥刺軍士甚至違詔出師恣作威福以脅制其下至是征西還意圖升爵及命為太傅玉攘袂大言曰我固不當為太師也恆怏怏不樂居宋潁二公下間奏事上不從玉懼退語所親曰上疑我矣乃謀反當是時寉慶侯張翼普定侯陳桓景川侯曹震舳艫侯朱壽東莞伯何榮都督黃恪吏部尚書詹徽侍郎傅友文及諸武臣嘗為玉部將者玉乃遣親信召之晨夜會私宅謀議集士卒及諸家奴伏甲將為變約束已定為錦衣衛指揮蔣瓛所告命羣臣訊狀具實磔于市夷三族徹侯功臣文武大吏以至偏禆將卒坐黨論死者可二萬人蔓衍過于胡惟庸三月辛酉會寧侯張溫都督蕭用瀋陽侯察罕坐藍玉黨伏誅九月詔胡黨藍黨除已捕在官者外其未發不究谷應泰曰昔者太公賜履南至穆陵鬻熊論封奄有江漢以故土田圭瓚勒之景鐘而彤弓盧矢銘之太常用以分王功臣永保厥世甚盛典也乃髙帝刑馬綰豨伏鑕闔閭誓國伍胥屬鏤遺介推于綿上試文種于地下弓藏鳥盡良足悲矣明太祖力戰中原躬擐甲胄櫛風沐雨賴茅土之爪牙枕戈臥鼓藉苴林之虓虎洪武三年大告武成論功行賞公爵者十人侯爵者二十八人鐵劵丹書誓諸白水河帶山礪爰及苖裔主非無勞之賜臣亦非無功之奉也獨奈何惟庸復壁藏兵藍玉家奴裹甲張敖不軌逼漢祖于柏人宣武稱兵追黃鬚于姑孰遂乃爵除五等禍及三宗然而推其始初胡以傾邪升鼎耳藍以寵利居成功不學無術器小任重宜其及也乃論者以光武保全功臣所封不過大縣數四所加不過特進朝請故君臣之恩始終不替鹿鳴天保若魚水焉然豫考太祖之分封也至尊貴者無過韓國食祿四千石魏國食祿五千石未嘗裂土自王也至任用者出師則本于廟算還軍則歸之禁旅亦未嘗得專征伐也凡此內安外攘勢若犬牙強幹弱枝何難控禦而乃以一人跋扈遂疑尾大之圖倉卒啓機傅會難明之事株連者四萬失侯者二十周內深文亦云慘矣夫淮陰陽夏就令關通彭越欒布罪無相及而况皂𨽻之後漸乃式微酎金之舉以次削除寧有朝登盟府夕繫檻車口血未乾爰書遂擬以致善長自縊景濓道亡蕭何三木而就徵望之仰藥而自殺豈尚功之典不設于齊侯而議功之條不載于周禮耶雖然髙帝晚年甘露慶雲屢書于册而醴泉之詐興貶爵削封播告于外而伏甲之謀起是則胡藍之釁抑亦鳳德之衰也至若徐中山之忠志無疵李岐陽之好學飭行湯信公之聽命唯謹沐西平之居貴不驕並皆攀龍鱗而有功履虎尾而不嘻嗚呼與畢散之徒爭烈矣明史紀事本末卷十三
