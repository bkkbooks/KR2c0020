body:
  text: 明史紀事本末卷二十一浙江提學僉事谷應泰編親征漠北成祖永樂元年春二月遣使賫璽書往諭韃靼國汗果勒齊賜金綺四并敕太師右丞相瑪勒哈扎爾太傅右丞相伊遜台太保樞密知院阿嚕台等以遣使往來意各賜文綺二未幾犯遼東塞十月寇永平是時果勒齊非元種其臣不肯下已而果勒齊與阿嚕台擊衛拉特瑪哈穆特戰大敗瑪哈穆特阿嚕台皆遣人入貢閏十一月阿嚕台寇灰溝村黃甫川三年春正月阿嚕台部落綽和爾來歸且告果勒齊聞烏梁海內附遂相猜防數遣人伺塞下令謹備之四年春三月以書諭果勒齊汗不報時諸部不服果勒齊阿嚕台執而殺之遂迎立䝉古族布尼雅實哩以阿嚕台為太師始與中國不通衛喇特瑪哈穆特與阿嚕台勢不相一遂各相讐殺六年春三月遣鴻臚寺丞劉特穆爾布哈以織金文綺持璽書諭布尼雅實哩不報都督僉事吳允誠子達蘭柴秉誠子必里克請出塞自效從之允誠初名巴圖特穆爾秉誠初名婁圖爾罕皆降人也七年夏四月遣都督指揮金塔布岱給事中郭驥以綵幣齎書諭布尼雅實哩并賜阿嚕台瑪勒哈札爾托和齊阿實克特穆爾等綵幣竟殺驥五月封衛喇特瑪哈穆時為順寧王秋七月以淇國公丘福為大將軍武城侯王聰為左副將軍同安侯火真為右副將軍靖安侯王忠安平侯李逺為左右參將帥師北征陛辭上密授以方略且戒之曰毋失機毋輕犯毋為所紿一舉未捷俟再舉爾等慎之八月丘福出塞率千餘騎先至臚胊河南遇游兵與戰敗之福遂乘勝渡河又獲間我者尚書一人福飲之間問布尼雅實哩今安在尚書詐言布尼雅實哩聞王師來北遁去此未逺可三十里福大喜曰當疾馳擒之時諸軍未集諸將皆恐李逺曰將軍輕信諜者孤軍深入進必不利莫若結營自固以待我軍畢至王聰亦力言不可福不聽先馳馬揮士卒行諸將不得已與之俱行大衆掩至圍之李逺王聰率五百騎突陳聰戰死丘福及火真王忠李逺竝被執死全軍皆沒事聞上大怒以書諭皇太子曰比遣丘福北征以其久在兵間必能任事何意福違棄朕言孤軍輕進安平侯等泣諫不從遂皆陷沒若不早舉殄滅之邊患未巳今選將練兵來春朕决意親征冬十月詔戶部尚書夏原吉議北征糧運上曰近工部所造武剛車足可輸運然道逺人力為難朕欲以所運糧沿途築城貯之量留兵守以候大軍之發於是原吉議用武剛車三萬輛約運糧二十萬石踵大軍行每十日程築一城斟酌貯糧以候軍還上然之八年春正月以皇長孫留守北京命夏原吉兼掌行在六部及都察院事輔之丁未車駕發北京親征學士胡廣庶子楊榮諭德金幼孜從三月出塞次凌霄峰登絶頂望漠北萬里蕭條顧廣等曰元盛時此皆民居也至清水原其地水鹹苦不可飲人馬皆渴明日營西北二里有泉湧出甚甘冽軍中賴以不困上取親嘗之賜名神應泉四月次長清塞地極北夜望北斗已在南矣師次庫楞海其水周圍千餘里鄂諾臚胊凡七河水注其中五月丁卯朔入臚胊河哨馬略黃峽遇寇騎得箭一矢馬四匹而還甲戌指揮琨台略玉華峯擒一騎譯之始知寇在烏爾瑚薩勒扎大兵遂渡飲馬河乙亥以清逺侯王友駐兵河上留金幼孜營中上以輕騎前進人齎二十日糧以方賔胡廣隨戊寅至烏爾瑚薩勒扎布尼雅實哩先遁夜倍道追之己卯至幹難河元太祖始興之地也布尼雅實哩率衆拒戰上麾前鋒迎擊一鼓敗之布尼雅實哩棄輜重以七騎渡河遁去六月班師至飛雲壑阿嚕台復來戰上率精騎衝陳大呼奮擊阿嚕台墮馬復上我師乘之追奔百餘里斬其名王以下百數十人阿嚕台携家屬逺遁時熱甚乏水軍士飢渴遂收兵還營己酉車駕發廣漠時殘騎尚出沒尾我上命伏兵河曲佯以數人載輜重誘之上按精兵千餘最後發寇望見大兵渡河貪所載物競趨而至伏發倉皇走上率兵扼之奔渡河馬陷入泥淖生擒數十人遂無敢窺我後師次擒狐山上令勒銘曰瀚海為鐔天山為鍔一掃風塵永清沙漠次清流泉又勒銘曰於鑠六師禁暴止侮山髙水清永彰我武㑹軍士乏食上合各所儲供御糧鈔散給之下令軍中糧鈔多者許借貸還京倍酬其直軍中賴之上在師中每日暮猶未食中官具進膳上曰軍士未食朕何忍先飽七月還次開平宴勞將士上曰朕自出塞久素食非乏肉也念士卒艱食朕食肉豈能甘味故寧已之車駕還至北京九年冬十二月阿嚕台遣使來納欵且請得部署女直吐蕃諸部上以問左右多請許之黃淮獨不可曰此屬分則易制合則難圖矣上顧左右曰黃淮如立髙岡無逺不見諸人處平地所見惟目前耳乃不許阿嚕台之請十年秋九月衛喇特順寧王瑪哈穆特滅布尼雅實哩立其族達勒巴瑪哈穆特實専政十一年秋七月上巡北京敕阿嚕台無以丘福事懷慮比之漢呼韓邪唐阿史那社爾賜金錦諭意先是阿嚕台為衛喇特攻敗窮蹙以其妻孥部落奔竄而南保息塞外于是遣使奉表稱臣貢駝馬上言瑪哈穆特滅布尼雅實哩之罪請討之上曰阿嚕台勢窮來歸非其本心然天地覆育豈有所擇納其貢使封為和寧王賜金帛仍居漠北衛喇特瑪哈穆特怨阿嚕台朝貢不至十二年春二月詔親征衛喇特以安逺侯栁升武安侯鄭亨將中軍寧陽侯陳懋豐城侯李彬領左右哨成山侯王通都督談清領左右掖都督劉江朱榮為前鋒三月車駕發北京皇太孫從上謂侍臣曰朕長孫聰明英睿勇智過人今肅清沙漠使躬歷行陳見將士勞苦征伐不易又謂胡廣楊榮金幼孜曰每日營中閒暇爾等即以經史於長孫前講說文事武備不可偏廢夏四月駐蹕興和大閲五軍盡出塞五月師次楊林城上閲武之暇皇太孫侍語及創業守成之難六月三日甲辰師至薩勒且爾之地前鋒劉江遇敵三峽口擊走之上度其必大至嚴陳以待乙巳獲諜知瑪哈穆特距此百里兼程赴之戊申發蒼崖峽次和拉和實衮達勒巴瑪哈穆特太平博囉掃境以三萬人來戰頓山巔不敢發上遣鐵騎挑之敵奮而下安逺侯升以神機炮斃其騎數百上率鐵騎乘之遂敗却武安侯亨追擊中流矢退寧陽侯懋成山侯通率兵薄其右掖不動豐城侯彬都督青攻其左敵殊死戰都指揮滿都死上遙見率鐵騎馳擊呼聲動天地瑪哈穆特不能支大軍乘之遂大潰走追至圖喇河生擒數十人瑪哈穆特乘夜北遁時衛喇特雖大創去然殺傷亦略相當夜二鼓上還帳中遂下令班師壬子師出三峽口餘衆復聚山上數百人據海子諸軍以火銃擊之遁去還至飲馬河阿嚕台遣頭目索珠等來朝言阿嚕台有疾不能至上遣使賜之米百石驢百匹羊百牽别賜其部屬米五千石慰撫甚厚是役也內侍李謙恃勇引皇太孫於九龍口臨戰幾危上大驚急追回大營謙懼罪自經死師次黑山峪頒詔天下己亥駐蹕沙河皇太子遣兵部尚書金忠等迎表至八月上還北京十三年冬十月衛喇特瑪哈穆特遣使貢馬謝罪衛喇特使者言瑪哈穆特慮阿嚕台與中國和好將為已害擬率衆至鄂諾河北俟冬襲阿嚕台敕鎮守寧夏寧陽侯陳懋防邊大同開平遼東皆如之十四年春三月阿嚕台遣使奏戰敗衛喇特獻所俘人馬特使宴勞彩幣秋九月衛喇特順寧王瑪哈穆特賢義王太平使臣觀音努布哈來朝辭還賜鈔為道里費遣使齎璽書同往諭以順逆福禍之道賜綵幣十五年秋八月衛喇特順寧王瑪哈穆特死以其子托歡襲順寧王十九年冬十月阿嚕台叛數寇邊初阿嚕台為衛喇特所攻窮蹙南竄久之生聚蕃富遂桀驁每朝使至輒嫚侮或拘留苦之時時部落出沒塞下為寇上嘗諭其使還語阿嚕台竟不悛至是大舉圍興和都指揮王祥戰死上遂議親征十二月上命大臣集議戶部尚書夏原吉等共議宜且休飬兵民嚴敕邊將備禦未奏㑹上召兵部尚書方賔賔言今糧儲不足未可興師遂召原吉問邊儲多寡對曰僅給將士備禦之用不足以給大軍且言頻年師出無功戎馬資儲十喪八九灾眚間作內外俱疲况聖躬少安尚須調護勿煩六師上不懌令原吉往視開平糧儲既而刑部尚書吳中入對與方賔同上益怒賔懼自縊命錦衣官耴原吉還至則方啓厫理儲錦衣促之原吉曰姑俟畢此不然恐有侵盜死吾安之不以纍公及至上問親征得失具對如初上令同中繫于掖庭獄時禮部尚書吕震數乘間言賔與中原吉皆憸邪誣罔上信之命戮賔尸將殺原吉召楊榮問原吉平昔所為榮力言其無他怒稍釋置不問二十年春二月命英國公張輔等議北征餽運輔等議分前後運前運隨大軍行後運繼之前運總督官三人隆平侯張信尚書李慶侍郎李昶車運騾運各分官領之領車運者二十六人泰寧侯陳愈都御史王彰等領驢運者二十五人鎮逺侯顧興祖尚書趙羾等後運總督官二人保定侯孟謨遂安伯陳英等各率騎兵千人步兵五千人護行凡前後運用驢三十四萬車一十七萬七千五百七十三輛挽車民夫二十三萬五千一百四十六人運糧凡三十七萬石並出塞分貯三月丁丑親征阿嚕台戊寅車駕發北京辛巳師次雞鳴山阿嚕台聞上親征遂夜遁諸將請追之上曰彼非有他計譬諸狼貪一得所欲急走追之徒勞少俟草青馬肥道開平踰應昌出其不意直扺窟穴破之未晚四月辛丑師次龍門戍卒言阿嚕台倉卒遁去遺馬二千餘匹於洗馬嶺敕宣府指揮王禮盡收入城五月辛酉師次獨石端午賜隨征文武羣臣宴乙丑師度偏嶺命將士獵於道旁山下丁卯大閲諸將戊辰觀士卒射有一卒三發皆中賜牛羊銀鈔上親製平戎曲俾將士歌之辛未師發隰寧西凉亭西凉亭者故元往來巡游之所上望其頽垣遺址樹木鬱然謂侍臣曰元氏創此將遺子孫為不朽之圖豈計有今日書云常厥德保厥位厥德靡常九有以亡况一亭乎因下令禁軍士斬伐樹木癸酉次閔安下令軍中樵牧不得出長圍外時營陳大營居中營外分駐五軍建左右哨掖以總之步卒居內騎卒居外神機營在騎卒之外神機營外有長圍周二十里癸未師發威鹵鎮次行州命戶部以山西河南山東所運糧六萬餘石儲于山海六月癸巳師次威逺川開平來報阿嚕台進攻萬全諸將請分兵還擊之上曰此詐也彼方慮吾搗巢故為牽制之術疾驅之果遁去七月己未師次殺虎原前鋒都督朱榮等獲阿嚕台部屬送御營備言阿嚕台聞大軍發所部日憂懼有散去者其母及妻皆罵曰大明皇帝何負爾而必欲為逆阿魯台盡棄其馬駝牛羊輜重於庫楞海與其家屬北走矣上曰獸窮則走然或挾詭謀示弱誤我不可不備前哨繼獲其部曲亦言悉衆夜遁乃召都督朱榮吳成等還發兵盡收所棄牛羊駝馬焚其輜重命旋師簡精兵還擊烏梁海大破之事見設立三衛詢降騎言竒拉爾河東北深谷有賊千餘人令寧陽侯懋以騎兵五千追之懋率精騎伏隘中以羸兵輜重誘之方接戰發伏大潰走斬獲過半八月以班師遣書諭皇太子頒詔天下九月上入居庸關次龍虎臺饗隨征將校京師文武大臣迎見上乘法駕入京城十二月阿嚕台殺其主布尼雅實哩自稱汗二十一年夏四月衛喇特托歡攻阿嚕台敗之秋七月諜報阿嚕台將犯邊上曰去秋親征彼意吾不能復出當亟馳塞外待之命安逺侯栁升遂安伯陳英將中軍武安侯鄭亨成國公朱勇英國公張輔成山侯王通將左右軍寧陽侯陳懋將前鋒從征阿嚕台八月壬子宴大營五軍諸將因大閲癸丑發京師命大學士楊榮兼軍中機務丙寅發宣府次沙嶺賜諸將內廄馬戊辰次萬全九月師次沙城知院阿實克特穆爾古納台等率其妻子來降言今夏阿嚕台為衛喇特所敗部屬潰散無所屬今聞大軍復出必疾走逺避豈復萌南向之意上命賜之酒俱授正千戶冬十月師次上莊堡先鋒陳懋知寇在飲馬河北為衛喇特所敗追至宿嵬山口遇韃靼王子額森圖罕率妻子部屬來歸懋引入見上喜謂羣臣曰逺人來歸宜有以旌異之乃封為忠勇王賜姓名金忠以其甥巴台為都督其部屬徹伯爾等七人皆為都指揮賜冠帶織金襲衣上曰昔唐突厥頡利入朝太宗言胡越一家有矜大自得之意朕所不取唯天下之人皆遂其生邊境無患兵甲不用斯朕志也遣書諭皇太子以額森圖罕納欵之故遂下詔班師發萬全十一月次懷來甲申還京師二十二年春正月阿嚕台寇大同初忠勇王金忠來歸屢言阿嚕台弒主殘民數為邊患請討之願為前鋒自效上曰卿意甚善但師出須有名文帝嘗言漢過不先姑待之至是大同守將奏阿嚕台侵塞遂大閲議北征命安逺侯栁升將中軍遂安伯陳英副之英國公張輔領左掖成國公朱勇副之成山侯王通領右掖興安伯徐亨副之武安伯鄭亨領左哨保定侯孟瑛副之陽武侯薛祿領右哨新寧伯談忠副之寧陽侯陳懋忠勇王金忠為前鋒從征阿嚕台夏四月戊申詔命皇太子監國發京師大學士楊榮金幼孜從庚午師次隰寧忠勇王金忠所部指揮同知巴爾圖等獲諜者言阿嚕台去秋聞朝廷出兵挾其屬遁及冬大雪丈餘人畜多死部曲離散比聞大軍且至復遁往達蘭納穆爾河趨荒漠以避遂命諸將速進以獲諜功升巴爾圖為都指揮僉事五月己卯次開平遣中官伯勒格齎敕往諭阿嚕台部落曰王師之來止罪阿嚕台一人頭目以下輸誠來朝者優與恩賚命栁升率軍士拾道中遺骸為叢冢瘞之上親為文祭焉六月戊午進次玉沙泉上以達蘭納穆爾河已近令諸將各嚴兵以俟己未命陳懋金忠率師前進戒之曰兩軍相當彼投戈下馬者皆良民勿殺如其來敵先以神機銃攻之長弓徑弩繼其後遇阿嚕台亦生擒以來庚申懋等遣人奏言臣等已到達蘭納穆爾河彌望惟荒塵野草車轍馬跡亦多漫滅其遁已久上遣張輔王通等分兵山谷大索仍命陳懋金忠前行覘賊車駕進駐河上以俟張輔等相繼引兵還奏臣等分索山谷周圍三百餘里一人一騎之迹無睹者癸亥陳懋金忠亦還奏引兵抵白邙山無所遇以糧盡故還張輔奏願假臣一月糧率騎深入罪人必得上曰今出塞已久人馬俱勞北地早寒一日有風雪之變歸途尚逺不可不慮卿等且休矣朕更思之甲子召輔等諭旋師時軍士乏食楊榮請供御之嬴盡給之令軍中有餘者貸不足入塞官倍償之衆賴以濟上悅秋七月庚辰清水源道旁有石崖數十丈命大學士楊榮金幼孜刻石紀功曰使萬世後知朕親征過此也丁亥次翠微岡上御幄殿慿几而坐大學士楊榮金幼孜侍上顧內侍海壽問曰計程何日至北京對曰其八月中矣上頷之既而諭楊榮曰東宫涉歷年久政務已熟還京後軍國事悉付之朕惟優游暮年享安和之福戊子上次雙流濼遣禮部尚書吕震齎書諭皇太子并詔告天下己丒次蒼崖上不豫下令大營五軍將士嚴部伍謹哨瞭庚寅次榆木川上大漸召英國公張輔受遺命傳立皇太子辛卯上崩明史紀事本末卷二十一
