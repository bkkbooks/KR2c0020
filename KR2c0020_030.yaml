body:
  text: 明史紀事本末卷三十浙江提學僉事谷應泰編麓川之役英宗正統二年冬十月雲南麓川宣慰司思任叛侵南甸州洪武中麓川思倫發內附授麓川宣慰按思倫所居本麓川地與𬗟接境皆在金沙江之南在元為平𬗟宣慰司思倫不言麓川蓋已據𬗟為己有洪武中大兵下雲南改平𬗟為麓川平𬗟軍民宣慰司麓川之名始見至二十九年平𬗟入貢更立宣慰司不相混一未幾思倫叛黔國公沐英討平之其後失官改孟養宣慰使以刁氏代之正統初宣慰使刁賔玉弱不能輯諸夷思倫發次子思任者狡獪踰父兄差發金銀不以時納朝廷稍優容之會𬗟甸危思任侵有其地遂欲盡復父所失故地於是擁衆叛於麓川先是侵孟定灣甸大殺掠雲南總兵黔國公沐晟以聞至是復侵南甸州土官刁貢罕地命沐晟遣官齎金牌信符諭還所侵地思任不奉詔三年冬十二月思任侵掠騰衝南甸略取孟養地刁賔玉奔永昌死無嗣思任屠騰衝據潞江仍自稱曰法法滇王號也中國遂訛為思任發云事聞上遣刑部主事楊寧往諭之不服四年春正月命鎮守雲南黔國公沐晟左都督方政右都督沐昻率師討思任發太監吳誠曹吉祥監軍兵至金齒思任發遣其將𬗟簡斷江立柵而守師不得渡初思任未叛時刁賔玉嘗遣詣晟晟兒畜之至是晟遣指揮車琳等諭之降思任佯許諾晟信之無渡江意刑部主事楊寧曰不可兵未加稱降此詐也懼有後悔晟不從檄寧督餉金齒賊將𬗟簡數挑戰政怒造舟六十艘欲渡江晟不可政不勝憤夜獨率其麾下渡擊𬗟簡走之破賊柵賊奔景罕寨指揮唐清擊敗之指揮髙逺等又追敗之髙黎貢山下共斬三千餘級乘勝深入逼思任上江上江賊重地也逺攻疲甚求援於晟晟怒其違即制渡江不遣久之以少兵往至夾象石不進政渡江追至空泥知晟不力援已賊伏兵四起出象陳衝擊乃遣其子瑛還曰若急歸吾死分也遂策馬突陳死軍殱焉晟聞敗適春暮慮瘴發遂焚江上積聚倉卒奔還永昌至楚雄上遣使者責狀仍以四萬五千人助之晟懼罪暴卒思任發犯景東孟定殺大侯知州刁奉漢等破孟賴諸寨降孟達等長官司五月以沐昻為左都督征南將軍右都督吳亮為副將軍馬翔張榮為左右參將進討思任發昻上潞江之捷升賞有差五年春二月沐昻討麓川軍抵隴把去賊巢甚近右參將都督僉事張榮先令都指揮盧鉞擊賊大敗榮棄符驗軍器遁昻等不能救師還敕責沐昻等留昻鎮守右都督吳亮左參將馬翔俱逮下理秋七月思任發屯孟羅大掠據者章硬寨沐昻率都指揮方瑛栁英等進克之賊宵遁威逺川土知州刁蓋罕戰威江亦敗之已而思任發遣流目陶孟忙怕等入貢禮部議減其饗賚上曰彼來雖緩我師而朕不逆詐遂賚而不宴賜敕諭之六年春正月命定西伯蔣貴為征蠻將軍總兵計麓川思任發以太監曹吉祥監督軍務兵部尚書王驥提督軍務侍郎徐晞督軍餉初雲南總兵沐晟等議麓川險逺攻之非十二萬人不可宜徵兵湖廣川貴各委善戰指揮分三道灣甸芒布騰衝刻期並進上下廷議英國公張輔等言分兵勢孤彼或扼險邀我非萬全計宜擇大臣往雲南専征會思任發遣使謝刑部侍郎何文淵上言麓川之在南陲彈丸耳疆里不過數百人民不滿萬餘宜寬其天討官軍于金齒且耕且守舜德格苗不勞征伐而稽首來王矣大學士楊士竒主其説張輔謂思任發世職六十餘年屢抗王師釋此不誅恐木邦車里八百緬甸等覘視窺覬示弱小彛非策上從之遂命貴驥先赴雲南復以副總兵李安參將宫聚領川貴兵副總兵劉聚參將冉保領南京湖廣兵大發兵十五萬轉餉半天下驥薦太僕寺少卿李蕢郎中侯璡楊寧主事蔣琳等為參謀陛辭上賜驥貴等金兜鍪細鎧弓矢蟒衣以行侍讀劉球上疏言麓川荒逺偏隅即叛服不足為中國輕重而托歡額森併吞諸部侵擾邊境議者釋豺狼攻犬豕舍門庭之近圗邊徼之逺非計之得也請罷麓川兵専備西北不報蓋王振専政欲示威荒服也十一月定西伯蔣貴兵部尚書王驥等討麓川大破之思任發遁去先是思任發率衆三萬至大侯州欲攻景東威逺兵部郎中侯璡都指揮馬讓盧鉞擊之驥等遂進至金齒鎮康守陶孟刁門俸乞降令右參將冉保以五千人入據之因其衆破昔刺寨移攻孟通王驥誓師分三道進取參將冉保自緬甸趨孟定會木邦車里之師驥同蔣貴中路至騰衝內官曹吉祥副總兵劉聚等自下江夾象石合攻徑扺上江上江者賊寨所在也攻二日不下會天大風驥命縱火焚柵大破之拔上江寨賊千餘猶迎戰官軍奮長戈蹴之賊將刁放戛父子俱沒刁招漢闔家自焚生擒刁門項先後斬五萬級上江平賊散走大兵由夾象石下江通髙黎貢山道至騰衝留副總兵李安戍之王驥等取道南甸至羅卜思莊令指揮江洪等以八千人抵木籠山思任發乘險以二萬人列七營相救副總兵劉聚參將宫聚分攻之不下驥貴同奉御監蕭保自中路進左右夾攻敗之斬數百餘級乘勝至馬鞍山破其象陳死者十餘萬麓川大震十二月王驥等直搗巢穴山周三十里深堅塹廣其東南依江壁立以三千人探之賊象陳伏泥溝突起敗之賊又自永毛摩尼寨至馬鞍山伺我後令都指揮方瑛以六千人攻拔之瑛方政子也而右參將冉保從東路合木邦車里大侯之兵先後斬三千三百九十餘級于是進攻麓川積薪焚其柵思任發挈妻子間道渡江走𬗟甸焚溺數萬驥等班師敘平麓川功進封蔣貴定西侯王驥靖逺伯以郎中侯璡楊寧為侍郎餘升賞有差七年冬十月復命定西侯蔣貴靖逺伯王驥征麓川𬗟甸先是思任發既敗走緬大軍還復出為冦上謂驥曰卿為朕再行遂起兵如前復命驥等往討之八年春二月定西候蔣貴靖逺伯王驥軍至金齒遣諭𬗟甸送思任發軍前𬗟人佯諾不遣驥曰𬗟甸黨賊不可不討也乃至騰衝分為五營與蔣貴及都督沐昂分道並進木邦宣慰使統兵萬餘駐于蠻江滸覘我軍容驥責以忠義賜牛酒遂感悅初為𬗟人擁衆大至蔣貴率兵蔽江而下焚其舟數百艘大戰一晝夜賊潰思任發復遁去俘其妻子班師蔣貴起自行伍屢立顯功與士卒同甘苦凡出征衣糧器械不役一人臨陳身先士卒敵皆披靡必手擊殺數十人不知書然貴為大將拱手聽人指揮無傲色故所向成功九年春二月王驥合木邦等諸部進兵𬗟甸纍捷𬗟人用大金縷船載思任發至江上覘我復匿之欲以麓川豫木邦孟飬戛里豫𬗟甸始獻思任發詭以思任子思機發致仇為解驥等乃縱兵搗思機發寨俘其妻子及從賊九十餘人象十一事聞上詔驥還京然思機發尚竊據孟養負固不服十年冬十二月雲南千户王政奉敕幣諭𬗟甸宣慰男卜剌浪馬哈省索思任發未即遣適晝晦二日術者曰天兵至矣卜剌浪馬哈省懼以思任發及妻孥部屬三十二人付政思任發不食垂死政遂斬首函獻京師十三年春三月初思機發復據孟養地為亂屢諭不從復命靖逺伯王驥提督軍務都督宫聚為總兵張軏田禮為左右副總兵方瑛張鋭為左右參將率南京雲南湖廣四川貴州土漢軍十三萬討之以孟養舊宣慰刁孟賔為嚮道又敕木邦𬗟甸南甸于崖隴川宣慰使刁蓋發等各輸兵餉命户部右侍郎焦宏督餉雲南十月師抵金沙江賊柵西岸以拒驥造浮梁以渡攻破之乘勝進至孟養賊斂衆據鬼哭山及芒崖山等寨皆攻拔之斬獲無算貴州都指揮使洛宣九溪衛指揮使翟亨皆戰死思機竟失所在或謂死於亂兵也王師踰孟養至孟那孟養在金沙江西去麓川千餘里諸部皆震怖曰自古漢人無渡金沙江者今王師至此真天威也驥還兵部落復擁思任子思祿為亂攻銀起莽敗之復據孟養地驥等慮師老度賊不可滅乃與思祿約許以土目得部勒諸彛居孟養如故復與立石金沙江為界誓曰石爛江枯爾乃得渡思祿亦懼聽命乃班師以捷聞詔增驥祿賜鐵劵子孫世襲伯爵谷應泰曰麓川地接平𬗟雖彈丸黑子然固皇輿以內地也洪武初思氏失官刁氏逐思據有平𬗟至正統時刁又衰弱思氏復振賔玉走死思任坐大且爭衡上國矣蠻彛自相攻殺趙奢所謂兩鼠鬭穴天子不必問也天使亟行誚讓數四而尉陀箕踞初無降意子陽不省乃更治兵倔強如是而討逆之旗不見於金齒問罪之旅不戰於昆池尚謂國有人乎且宣帝即位已棄交趾新君踐祚又廢麓川雲貴二廣土彛環強動以百計溪蠻苗洞列處內地耕牧成羣麓川不逞既有徵矣異類襲是迹而動誅戮子弟憂患長老甚者屠掠郡國并吞諸部再復數年䈮醬不見於番禺卭杖不來於大夏使斷牂牁之北地盡越雋之東矣爾時而欲用兵敗固不測勝亦大創且髙帝定雲南思氏竊發沐英以三萬騎破其三十萬衆思然後俯首歸命既而刁氏又叛沐春疾驅力戰擒斬諸刁納其故主其諭傅友德曰雲南雖平尚煩區置翠靄諸地不盡服從雖有雲南亦難守也蓋小懲大戒柔逺之良規一勞永逸王師之勝算故殷興夏緒必克鬼方蜀出中原先渡瀘水控逺與綏邇不同功討二與貪功不同道也西楊主議舜德格苗劉球上書不稱荒服或亦朝多濁亂內憂羣小北敵陸梁外憂方大文子不願楚敗山濤方懼吳亡大臣之用心固如是耶若乃長駕逺馭則亦公孫𢎞之罷朔方淮南安之諌閩越者也蔣貴王驥初下麓川三路分進斬首三千思任竄𬗟僅以身遁再攻平𬗟五營並進焚其援舟思任父子又竄孟養然而𬗟人內懼傳首京師勒石金沙誓臣石爛此亦勳著燕然功髙銅柱豈僅唐蒙夜郎相如卭笮者乎然史稱其起兵十五萬轉餉半天下冒躐五等橫被冕玉嗟乎陳湯貪黷曹翰凶殘武臣之故態而屯守之説不行飛挽之繁不給此則其智遜金城而功比二師者已明史紀事本末卷三十
