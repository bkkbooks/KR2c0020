body:
  text: 明史紀事本末卷三十二浙江提學僉事谷應泰編土黙特之變癸亥正統八年夏四月衛喇特太師順寧王托歡死子額森嗣自托歡殺阿嚕台併吞諸部勢浸强盛至額森益横屢犯塞北邉境自此多事十二年春正月巡撫宣大僉都御史羅亨信上言衛喇特額森専候釁端圖入冦宜預于直北要害增置城衛土城備之不然恐貽大患奏聞兵部尚書鄺埜畏王振不敢主議時㕘將石亨欲以大同四州七縣之民三丁籍一兵乂有勅令軍餘盡撥屯種量畆起科亨信奏言衛喇特方驕邉民疲甚兼以邉地鹻薄若如所言是絶衣食而逼其竄也且當今事勢正宜布恩信以結人心茍絶其衣食未有得其心者詔從之十四年春二月額森遣使二千餘人進馬詐稱三千人王振怒其詐减去馬價使回報遂失和好先是額森遣人入貢通事輩利其賄告以中國虚實額森求結婚通事私許之朝廷不知也至是貢馬曰此聘禮也答詔無許姻意額森益媿忿謀㓂大同夏六月丙辰夜雷電大震風雨驟作謹身殿火起延奉天華葢二殿奉天諸門皆燬自王振擅權灾異叠見振畧不警畏狠恣愈甚且諱言天變時浙江紹興山移于平地官不敢聞又地動白毛遍生奏入不省陜西二處山崩壓沒人家數十户山移有聲三日不絶移三里不敢詳奏黄河改往東流于海渰沒人家千餘户又振宅新起未踰時一火而盡南京宫殿火是夜大雨殿基上荆棘二尺髙始下詔赦天下秋七月額森圖犯邉其勢甚張侍講徐珵語其友劉溥曰禍不逺矣亟命妻子南歸皆重遷有難色珵怒曰爾不急去不欲作中國婦耶乃行八日額森大舉入冦兵鋒鋭甚大同兵失利塞外城堡所至䧟沒邉報日至乃遣駙馬都尉井源等四將各率兵萬人出禦之源等既行太監王振勸上親征命下二日即行事出倉卒舉朝震駭命太師英國公張輔太師成國公朱勇率師以從户部尚書王佐兵部尚書鄺埜學士曹鼐張益等扈從吏部尚書王直及大小羣臣伏闕懇留不允十七日命太監金英輔郕王居守每旦于闕左門西靣受羣臣謁見遂偕王振并官軍五十餘萬人至龍虎臺駐營方一鼓衆軍訛相驚亂皆以為不祥明日出居庸闗過懐來至宣府連日風雨人情洶洶聲息愈急隨駕諸臣連上章留振怒悉令掠陣未至大同兵士已乏糧僵屍滿路冦亦佯避誘師深入八月戊申朔至大同振又欲進兵北行鄺埜請回鑾振矯㫖令與王佐隨老營埜乗馬蹀躞而前墜地㡬殆王佐竟日跪伏草中請還欽天監正彭徳清斥振曰象緯示警不可復前若有踈虞䧟乗輿于草莽誰執其咎學士曹鼐曰臣子固不足惜主上係天下安危豈可輕進振怒曰倘有此亦天命也于是井源等報敗踵至㑹暮復有黒雲如繖罩營雷雨大作王振惡之㑹前軍西寧侯朱瑛武進伯朱冕全軍覆沒鎮守大同中官郭敬宻言于振勢决不可行振始有還意明日班師大同總兵郭登告學士曹鼐等車駕入宜從紫荆闗庶保無虞王振不聴振蔚州人因欲邀駕幸其第既又恐損其禾稼行四十里復轉而東還至狼山追騎且及十三日庚申遣朱勇等率三萬騎禦之勇無謀進軍鷂兒嶺敵于山兩翼邀阻夾攻殺掠殆盡是日駕至土黙特日尚未晡去懐來僅二十里衆欲入保懐來以王振輜重千餘兩未至留待之鄺埜再上章請車駕疾驅入闗而嚴兵為殿不報又詣行殿力請振怒曰腐儒安知兵事再妄言必死埜曰我為社稷生靈何得以死懼我振愈怒叱左右扶出遂駐土黙特旁無水泉又當敵衝十四日辛酉欲行敵已逼不敢動人馬不飲水已二日飢渇之甚掘井深二丈不得水其南十五里有河已為額森所據額森分道自土木傍麻谷口入守口都指揮郭懋拒戰終夜敵益増時楊洪總兵在宣府或勸洪急以兵衝敵圍駕可突出竟閉城不出十五日壬戌敵遣使持書來以和為言遂召曹鼐草勅與和遣二通事與北使偕去振急𫝊令移營踰塹而行迴旋之間行伍已亂南行未三四里敵復四面攻圍兵士争先奔逸勢不能止鐵騎蹂陣而入奮長刀以砍大軍大呼解甲投刀者不殺衆裸袒相蹈藉死蔽野塞川宦侍虎賁矢被體如蝟上與親兵乗馬突圍不得出被擁以去英國公張輔尚書鄺埜王佐學士曹鼐張益而下數百人皆死從臣得脱者蕭惟禎楊善等數人軍士脱者踰山墜谷連日飢餓僅得達闗騾馬二十餘萬并衣甲器械輜重盡為額森所得太監喜寧降于額森盡以中國虚實告之初師既敗上乃下馬盤膝面南坐惟喜寧隨侍有一胡索衣甲不與欲加害其兄來曰此非凡人舉動自别擁出雷家站見額森之弟賽堪王上問曰子其額森乎其巴延特穆爾乎賽堪王乎大同王乎聞其語大驚馳見額森曰部下獲一人甚異得非大明天子乎額森乃召使中國二人問是否二人見大驚曰是也額森喜曰我常告天求大元一統天下今果有此勝問衆何以為計其中一人名乃公大言曰天以仇賜我不如殺之巴延特穆爾大怒呼額森為諾延諾延者華言大人也安用此人在傍摧其靣曰去因力言兩軍交戰人馬必中刀箭或踐傷壓死今大明皇帝獨不踐壓中刀箭而問諾延問我等無驚恐怨怒我等乆受大明皇帝厚恩賞雖天有怒推而棄之地下而未嘗死之我等何反天諾延若遣使告中國迎反天子諾延不有萬世好男子名乎衆皆曰者胡語云者然辭也于是額森以上送巴延特穆爾營令䕶之時惟校尉袁彬侍命彬遣前使臣梁貴持手書示懐來守臣言被留狀且索金帛城閉不可入縋之上守臣遣人送至京以是夜三更從西長安門入報十七日百官集闕下頗聞敗報私告語驚懼出朝見敗卒裹創纍纍至訊之皆不知上所在是日皇太后遣使賫重寳文綺載以八騎皇后錢氏盡括宫中物佐之詣額森營請還車駕不報谷應泰曰古者天子有道守在四裔及其季也保境固圉毋生戎心是故馬邑之誘加罪王恢郅支之誅靳封延夀葢以勤兵逺畧輕開邉釁非細故也况乃撑犁之帳甫逼闗門而黄屋之尊自為鎻鑰晉明帝深窺姑孰趙武靈突入咸陽誰實謀國而乃身試不測之淵輕入虎狼之穴哉若夫英宗踐祚王振擅權額森桀黠狡焉啓疆其時如羅亨信之議備土城石亨之撥軍屯種則先事之防也王直之伏闕懇留鄺埜之堅請回鑾王佐之草間跪伏則臨事之救也而王振威福自擅從来日乆鋭意親征有進無退豈真楚國聨師滅此朝食驃姚報漢無以家為者乎乃從来嚬笑竊弄者必須假禦侮以固主恩而勢焰炙手者易于倖邉功以邀富貴此振之所以據鞍顧盼走死地如騖耳至于千金之子坐不垂堂十室之邑可以免難而英宗是時勸駕之言易入斷鞅之議不行者毋亦文皇自征衛喇特狃于易與而宣宗自將待邉又所親見者耶以故追戎濟上専目魯公北伐令支羣推小白然而天時人事則有異焉方其天變見于上地變見於下南宫荆棘北殿塵灰比于梅福之金鐵皆飛宗周之三川告亡此何景也至龍臺而一軍皆亂出居庸而連宵風雨薄大同而殭屍滿路比于苻堅之犬嘷宫門管子之鼙鼓皆濁此何兆也逮夫井源敗衂踵至朱冕全軍覆沒而振始還屯左次定議班師嗚呼晚矣蕩隂之血酷于染衣平陽之辱㡬于執葢徒使師武臣封尸俱死諸大夫茇舍無從楚三户之衆見懐王以何期鋭司徒之妻嘆吾君之不免幸而共和行政叔武入守適來諾延之怒不用乃公之謀則貨匪居秦璧還入趙矣不然而皇太后遣賫重寳錢皇后盡括宫中幣與地同盡人與幣俱往徽欽之禍復見于兹雪窖冰天魂終漠北矣然予嘗論之冦凖饒學術可以戰而真宗受盟王振少方畧不可以戰而英宗驟舉是則澶淵之㑹以重發而䘮功土黙特之變又以輕為而至敗耳彼王振倡謀喜寧反噬雖一死沙塲一膏斧鑕而罪浮罄竹報不蔽辜宜乎靖康誅童貫而賈生之書必欲縳中行説而笞其背也明史紀事本末卷三十二
