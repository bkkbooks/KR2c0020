body:
  text: 明史紀事本末卷四十四浙江提學僉事谷應泰編寘鐇之叛武宗正德五年夏四月慶府安化王寘鐇反寘鐇者慶靖王曽孫也祖秩炵靖王第四子永樂十九年封安化王𢎞治五年寘鐇嗣王是時劉瑾擅權毒流天下寘鐇素有逆謀與寧夏衛生員孫景文孟彬往來甚宻覡王九兒降鸚鵡神妄言禍福每見寘鐇輙呼老天子寘鐇葢懷不軌會瑾遣大理寺少卿周東度田寧夏倍益頃畆徴馬屯租甚急敲扑慘酷諸成將衛卒皆憤怨景文謂寘鐇曰殿下欲圖大事此其時矣寘鐇遂令景文家寘酒邀諸武弁素所被辱丁廣楊泰等飲景文以言激衆怒且謂寘鐇多竒徴可輔欲盡殺諸守臣刼衆舉事衆方怨聞景文言皆忻然從之曰即事不就死無恨遂㰱血盟定計衆散去景文以報寘鐇寘鐇令人往平鹵欽定四庫全書明史紀事本末卷四十四浙江提學僉事谷應泰編寘鐇之叛武宗正德五年夏四月慶府安化王寘鐇反寘鐇者慶靖王曽孫也祖秩炵靖王第四子永樂十九年封安化王𢎞治五年寘鐇嗣王是時劉瑾擅權毒流天下寘鐇素有逆謀與寧夏衛生員孫景文孟彬往來甚宻覡王九兒降鸚鵡神妄言禍福每見寘鐇輙呼老天子寘鐇葢懷不軌會瑾遣大理寺少卿周東度田寧夏倍益頃畆徴馬屯租甚急敲扑慘酷諸成將衛卒皆憤怨景文謂寘鐇曰殿下欲圖大事此其時矣寘鐇遂令景文家寘酒邀諸武弁素所被辱丁廣楊泰等飲景文以言激衆怒且謂寘鐇多竒徴可輔欲盡殺諸守臣刼衆舉事衆方怨聞景文言皆忻然從之曰即事不就死無恨遂㰱血盟定計衆散去景文以報寘鐇寘鐇令人往平鹵城説戍將及素所厚張欽等十餘人皆從之各集衆待時有邉警總兵姜漢命周昂簡鋭卒為牙兵得由居敬等六十人昂領之初五日寘鐇遂置酒召都指揮何錦周昂指揮丁廣謀反錦昻者故常托景文貸寘鐇金納級陞都指揮德寘鐇深寘鐇大會廵撫安惟學總兵姜漢少卿周東鎮守太監李増鄧廣漢等惟學東辭不往副總兵楊英以聞警帥兵出亦不至錦等詐言塞下警急呼壯士由居敬備邉執兵械跨馬呼譟儀賓韓廷璋等伏兵府序下錦等趨安化府推門入序中伏兵起殺漢等遂走行臺殺惟學及都指揮楊忠又殺周東縳侯叅議放獄囚焚官府刼庫藏奪河舟大索慶諸王將軍金幣萬計名逆黨平鹵城千戸徐欽引兵入城偽造印章旗牌又令景文為檄數劉瑾諸罪狀張綵劉璣曹雄毛倫文臣武將内外交結謀不軌今特舉義兵清除君側凡我同心並宜響應𫝊布邉鎮以錦為討賊大將軍昻廣左右副將軍景文為軍師欽先鋒將軍魏鎮等七人都䕶朱霞等十一人總管闗中大震陜西守臣將寘鐇等刋印劉瑾激變罪惡告示榜文封奏瑾匿不以間總兵曹雄等聞變率兵沿河堵截遣廣武營指揮僉事孫隆將大小二壩積垜捲掃柴草盡皆焚燬楊英率黄正等發靈州順流而下鐇遣魏鎮等至廣武營散賞孫隆用弓箭神鎗拒却之曹雄親帥兵至靈州初寧夏游擊將軍仇鉞聞邉警帥兵出玉泉營寘鐇反遣人招仇鉞令以其兵來會佯許之帥衆還鎮鐇奪其軍单騎歸私第京師訛言鉞已從賊又興武營守備保勛故與賊聮姻亦遂疑勛為外應朝議用勛為叅將鉞為副總兵令率兵討賊於是勛上疏言臣母及妻子俱在賊中臣義不顧家恨不飛渡黄河食賊肉以謝朝廷鉞亦稱病臥隂納游兵壯士俟保勛等兵至從中起為内應俄而總兵曹雄亦遣人持書約鉞鉞蒼頭書童者沒河潛入城具言保勛楊英韓斌時源各率兵屯河上廣武營都指揮孫隆焚兩壩埽捲河舟盡泊東岸矣鉞喜嗾人謂賊宜急守渡口防决河灌城遏東岸兵勿使渡河何錦果率都指揮鄭卿等三千人出覘渡口留昻守城時四月二十三日也寘鐇出城祭祀社稷旗纛等神使人呼鉞陪祭鉞復稱病不出昻自來問疾鉞陽呻吟臥伏諸蒼頭陶斌來得俟昻入用鐵骨朶擊殺之割其首級鉞即披甲伏劔跨馬出門呼諸壯士楊真等從者百餘人直趨安化府執朱霞孫景文等十一人殺之擒寘鐇及其子台溍儀賓謝廷槐韓廷璋并黨李蕃張會通等詐𫝊鐇令召錦還而别遣古興兒宻告鄭卿令反正錦方帥兵還卿等即以所部兵擊殺胡璽魏鎮等十餘人聲言城中事定以携衆心又往河口執劉鉞姜永殺之衆大潰何錦丁廣張欽楊泰正脱身走追擒之賀蘭山外并獲申居敬等曹雄楊英各先後至寧夏鐇起兵凡十八日而敗上聞寘鐇反頒詔天下慰安人心詔内有宥充軍罰米官員停徴糧草等件出内閣草中又欲取回各處差出官校劉瑾有難色以李東陽言從之五月命涇陽伯神英充總兵太監張永總督軍務太監陸誾管領神鎗起前右都御史楊一清為提督率中外兵討寘鐇時朝内不知四月二十三日事故出師神英等統京營兵合陜西諸鎮兵馬分道進勦瑾矯詔改戸部侍郎陳震為兵部侍郎兼僉都御史討寘鐇暫行總制事震附瑾由光禄卿陞戸部侍郎瑾倚之為腹心會寘鐇反衆推楊一清提督軍務瑾屈於公論不得已從之然度一清必辭故遣震彌縫其間兾其成功將柄用之已而聞寘鐇已就擒楊一清上疏乞將京軍取回以安反側上詔涇陽伯神英以兵還命張永及一清仍往寧夏綏安地方時道路相𫝊總督率京營兵將屠寧夏一清慮激變遣百戸韋成賫牌曉諭寧夏官舍軍民大賊已擒地方無事天子遣二王重臣來撫定爾軰又出示朝廷止誅首惡不究脇從有功者許録用各部官員不許聽人誣陷敢有流造訛言者治以軍法侍郎陳震械寘鐇送京師楊一清以事干宗室處置少疎恐生他變又各犯有原謀脇從情罪不一一槩解京將無可活者故馳往止之時已渡河乃収繫靈州以待一清會太監張永檄鎮守撫按督同王司司公審分别首謀共謀隨從等時鎮廵逮至千餘人一清出者凡百餘申居敬徐欽程保等止逮其身繫家屬俟正犯誅後徙其妻子奏聞下法司議從之一清又謂永曰恩威當並行不悖大變之後堂陛凌替不復知上下之分維時造偽命偽符手刃大臣者戕殺主將奪其家者遺姦尚存無以善後乃宻諭鎮廵捕指揮馮經等奏上伏誅八月太監張永回京楊一清仍總制陜西三邉軍務削慶府䕶衛寘鐇錦廣等械至京皆伏誅論功封仇鉞為咸寧伯谷應泰曰正德二年四月慶府寘鐇反十四年六月寧府宸濠反逆同罪均固已然古者天子居重馭輕先奠根本分建宗子次固維城無事則修職稱貢率土歸王有事則環甲荷戈用紓國難是以家裕苞桑國鞏磐石計深逺也劉瑾威刼大臣權傾萬乗帶刃畜何羅之謀術士進蒯通之論二世之禍直湏時耳寘鐇聲罪發難志清君側夫産禄在而興居之兵非叛武瞾簒而敬業之兵亦正惜其溺志巫覡擅殺命卿狼狽稱戈既無觀變之智徘徊河上初無撥亂之心所以身膏斧鑕而秦人莫之哀也不然扶蘇受沙丘之詔而吞聲自裁湘岳得臺城之命而環甲不進强枝固本又何以稱焉雖然寘鐇一狂悖豎子也天誘其𠂻狡焉思逞天殆借鐇為逆璫授首資乎寘鐇不反則張楊夜半之謀不合寧夏不亂則武宗腹心之愛不割張父趙母社稷之憂詎有艾歟觀楊一清道聞鐇擒而急反京兵緩誅惡黨豈非狡童游魂應時剪滅而璫毒方深人心易震内憂未靖外寧非福豹房之計得行而後戰勝之賀乃在廟堂也然則寧夏之功不在寧夏在於楊一清乗寘鐇以誅城社之奸南昌之㨗不在南昌在於王守仁滅宸濠以寒覬覦之膽嗚呼皆可謂大臣者矣明史紀事本末卷四十四
