body:
  text: 明史紀事本末卷七十八浙江提學僉事谷應泰編李自成之亂懷宗崇禎元年延安大饑不沾泥楊六郎王嘉運等率衆掠富家粟有司捕之急遂掲竿為盜米脂人李自成性狡黠善走能騎射家貧為驛書往投焉已而㕘政洪承疇擊賊破之不沾泥等相次俘獲自成走匿山澤間得免二年冬十月都城警詔天下勤王山西巡撫耿如把入援兵潰于涿鹿叛走秦晉間山谷李自成出與之合旬日間衆至萬餘推髙迎祥為首稱闖王轉寇山西河南賊中稱自成為闖將已而官軍擊迎祥斬之羣盜推自成為主七年總督洪承疇率總兵曹文詔等先後𠞰諸賊斬獲甚衆羣賊悉奔入商雒興平大山中衆潰散李自成與張獻忠奔盩鄠間六月總督陳奇瑜圍李自成于漢中車箱峽㑹連雨四十日賊馬乏芻死者過半弓矢俱脫賊大窘自成乃自縛乞降奇瑜許之各給免死票回籍自是復縱横不可制矣秋七月李自成陷澄城圍郃陽聞洪承疇兵至解圍去轉寇平涼邠州八月李自成陷真寧殺知縣趙躋昌洪承疇兵至賊棄金帛餌官兵竟西遁屯乾州招之不聽十月總兵左光先擊李自成于髙陵富平間斬首四百餘級自成佯求撫于監軍道劉三顧真寧知縣王家永遽信之出城招諭失其印三顧逆其詐即入堡自守賊走涇原八年羣賊盡集宛雒李自成獨留秦平其衆七八萬總督洪承疇邀擊連敗之秦中郡縣俱堅壁清野賊飢疲東西分竄退屯興平武功諸梁計窮乞撫以緩兵陰遣諸賊攻掠山谷堡塞捜掘巨室窖藏芻糧盡為賊有賊既得食復連營走漢中為西兵所挫東走邠寧環慶其衆漸散㑹承疇以寧夏兵變旋師邊鎮自成得收餘燼復振突出潼闗守將艾萬年等兵俱潰九年春正月李自成出河南攻固始左良玉遇自成于閿鄉相持六日總兵陳永福援之敗之于朱仙鎮自成走登封密縣三月李自成誘别部賊入河南當官兵而自帥麾下奔漢南循南山險阨遵商雒而行復出陜西官軍敗績于羅家山失亡士馬無筭自成自鄜州至延綏夏四月李自成欲往綏徳渡河入山西定邊副將張天機力戰却之賊沿河犯朝邑將圍綏徳延綏總兵俞翀霄引兵逐賊陷賊伏中翀霄被執綏延精卒盡覆賊分陷米脂延安綏徳賊本延安人至是再入延安衣錦繡晝遊衒其親戚故從亂者益衆十年春正月官軍敗績于寶雞李自成寇涇陽三原西安大震賊勢益熾冬十月丁酉李自成同過天星九股陷寧羌分三道入西川自成自七盤闗度朝天閣戊戌至廣元壬寅陷昭化癸卯過劍閣甲辰陷劍州乙巳陷梓潼黎雅㕘將羅尚文大敗賊于廣元斬首千級賊自梓潼分為三一走潼川一趨綿州一入江油遂陷青川彰明盤亭諸縣圍綿州庚戌賊漸逼成都土寇蟻附之巡撫王維章次保寧畏賊不敢出丙辰賊焚郫縣詔革維章職以傅宗龍巡撫四川十一年二月李自成陷瀘溪陜寇盡聚川西總督洪承疇檄川中諸道兵嚴守要害賊因乏食承疇以川師誘之陜兵設伏于梓潼自成率羣賊逐川兵川兵走伏發賊大敗斬首千餘幾殲之自成率殘衆數千走溪南孑身入楚依張獻忠不許至竹溪獻忠謀殺之自成獨乗騾日行六百里走商雒至淅川老回回營臥疾半年餘老回回授以數百人仍出剽掠其同自成入川諸賊仍出階文向陜西十二年九月秦兵大破李自成于函谷自成衆散畧盡其部下相繼俱降自成竄漢南秦兵蹙之于北左良玉阨武闗以南自成窮蹙不得他逸食且盡自經者數四養子李雙喜救之自成因令軍中盡殺所掠婦女以五十騎衝圍而南初諸將困自成崤函諸山中斷其要害合圍甚密將坐斃之督師大學士楊嗣昌曰圍師必缺不若空武闗一路設伏商雒鄖均以待之可一擊而盡也自成乗隙突走諸將不能禦遂自武闗逃入鄖陽息馬深山中時河南大饑飢民所在為盜自成乃自鄖均走伊雒飢民從者數萬勢復大振十二月自成圍永寧雲梯肉薄攻城陷之焚殺一空殺萬安王采􅀈連破四十八寨土賊一斗榖等羣盜響應遂陷宜陽衆至數十萬把縣諸生李巖為之謀主賊每以剽掠所獲散濟飢民故所至咸歸附之其勢益盛十四年春正月李自成圍河南府福王募死士逆戰斬獲頗多賊引退賊以大砲環攻城城守嚴不動及昏而退總兵王紹禹兵有馳而呼于城上者外亦呼而應之紹禹兵即執副使王𦙍昌于城上紹禹馳解之諸軍曰賊已在城下即總鎮其如我何揮刀殺守陴者數人守陴者皆驚墜堞賊緣堞而上叛兵迎之賊遂入賊焚福王府福王及世子俱縋城走士民被殺數十萬執副使王𦙍昌已下各官皆不死惟一典史不屈見殺河南方大饑通判白尚文墜城死其屍為飢民所食頃刻盡自成發藩邸及巨室米數萬石金錢數十萬賑飢民先是自成聞福藩最富為謀已久適陜西叛兵數百逃至河南巡撫招至城中禦寇事聞詔逮其首惡數人解京正法叛兵大懼乃陰勾自成襲河南為内應故一夕而陷丁酉自成跡福王所在執之并執前兵部尚書吕維祺維祺遇王於西闗謂王曰名義甚重毋自辱王見自成免怖泥首乞命自成責數其失遂遇害賊置酒大㑹以王為俎襍鹿肉食之號福禄酒維祺罵賊不屈死世子逸走遇亂兵刦之裸而奔于懐慶是時羣盜輻輳自成自稱闖王雄諸賊變聞上震怒逮總兵王紹禹磔之籍其家二月李自成捜掘河南富室窖藏席捲子女玉帛捆載入山以書辦邵時昌為總理官令守河南府巡撫李仙風偵賊已去引兵至城下時昌閉門拒守尋開門迎官軍仙風收時昌斬之戊午自成合羣盜圍開封開封城為宋汴京金完顔亮益加増築土堅厚五丈賊以洞車數百障壯士多具犁鋤斧钁環𫝊城鑿而穴之七晝夜不息鑿之深者四丈有奇巡按髙名衡率司道官嬰城固守賊兵砲及城中殺傷相繼軍餉告匱周王恭枵出庫金五十萬買米麥日夜飯屑麥餉守陴者復懸金募死士能擊死一賊者予五十金兵民踴躍共擊賊斃者甚衆賊懼退數舍李仙風督諸將髙謙等馳至開封陳永福逼城而戰一日三捷賊退開封解嚴仙風與髙名衡互相訐奏詔逮仙風仙風聞之自縊遂以髙名衡巡撫河南壬辰李自成陷歸徳四月甲子進陜督丁啓睿兵部尚書代楊嗣昌督師討賊時嗣昌討賊無功飲藥死啓睿督秦師至潼闗左良玉自襄陽進擊李自成至南陽自成北出屯於盧氏永寧寶封舉人牛金星向有罪當戍邊降于賊自成以其女為妻金星薦卜者宋獻䇿善河洛數獻䇿長不滿三尺見自成獻圖讖云十八孩兒當主神器自成大喜拜軍師五月乙亥賀人龍破李自成於靈峽山中髙名衡屯開封保武總督楊文岳屯禹州左良玉屯南陽張獻忠羅汝才漸北向思合於自成猛如虎進阨徳安黄州疽發背退屯承大癸巳赦兵部尚書傅宗龍出之獄以右侍郎都御史督陜西兵討賊羅汝才不合於張獻忠七月自内鄉淅川走鄧州與自成合營時自成有衆五十萬復得汝才軍衆益熾九月張獻忠衆散于南陽以數百騎奔自成自成將殺之汝才以五百騎資獻忠獻忠東奔合回革丁丑陜督傅宗龍率兵四萬次新蔡與保督楊文岳之兵㑹賀人龍李國奇將秦兵虎大威將保定兵共結浮橋渡河合兵趨項城戊寅兩軍畢渡走龍口是日自成汝才亦結浮橋于上流將趨汝寧覘官軍至盡伏精銳松林中陽驅諸賊自浮橋西渡人龍使候騎覘賊還報曰賊渡河向汝矣己卯宗龍文岳兩軍並進次孟家莊諸將以士馬俱疲請詰朝戰諸軍遂弛馬甲散行墟落以求芻牧賊覘之突起林中搏官軍人龍斂兵不戰國奇迎戰不勝兩軍俱潰人龍大威北奔國奇從之賊以步兵攻二督營以火礟擊却之日暮賊引去保定兵宵潰文岳夜奔項城宗龍獨立營當賊壘壬午飛檄人龍國竒以兵還救二帥不應以兵走陳州宗龍穿塹築壕以拒賊賊亦穿壕二重以困之宗龍兵食盡乃殺馬騾以享軍馬騾復盡殺賊取其屍分噉之辛卯營中火器弓矢俱盡宗龍簡卒尚有六千夜漏二下潛勒軍突賊營潰圍出諸軍星散宗龍徒步率散卒且戰且走壬辰至項城賊追之被執至城下賊呼於門曰我秦督官軍也請啓門納秦督宗龍大呼曰我秦督也不幸墮賊手左右皆賊耳毋為所紿賊唾宗龍宗龍罵曰我大臣也殺則殺耳豈能為賊詐城以緩死賊抽刅擊宗龍中腦而仆復厲聲罵賊斲其耳鼻死城下人龍國竒俱歸陝賊獲衣甲器械無筭遂陷項城屠之分兵屠商水扶溝所在土寇蠭起騷動詔復宗龍兵部尚書太子太保戊戌督師丁啓睿自商城北發檄左良玉兵共擊李自成楊文岳招集散亡於陳州兵稍集自成汝才合兵陷葉縣殺守將劉國能初國能與自成汝才同為賊結兄弟十二年左良玉大敗國能於陳州國能率衆萬人降汝才恨之誓殺國能至是聞國能在葉乗勝拔其城執國能責其負約殺之詔贈國能左都督賊移兵陷泌陽十月張獻忠糾回革左諸賊自霍太北行㑹李自成河南諸土寇以兵畢赴自成衆逾百萬左良玉兵至臨潁臨潁為賊守良玉攻破屠之盡獲賊所掠自成怒合兵攻良玉良玉退保郾城自成汝才圍之良玉悉兵拒守敗陷襄城十一月陜西巡撫汪喬年率馬步三萬總兵鄭家棟牛成虎賀人龍將之趨河南先是喬年于陜西發李自成先塜得小蛇即斬蛇以狥誓師兼程進兵以輕騎萬餘抵郟縣時襄城新破喬年遲疑不敢進襄城貢士張永祺率邑人出迎官軍屯於城下自成聞之解郾城之圍來迎戰喬年安營未定有二將先逃官軍大潰賊乗之一軍盡覆喬年以數百人入城居守五日襄城復陷喬年自刎未殊被執見殺自成深恨諸生遂劓刖百九十人又購永祺永祺匿免屠其族人九家殺守將李萬慶萬慶乃降將射塌天也自成再破秦師獲馬二萬降秦兵數萬威鎮河雒乗勝圍南陽數日城陷總兵猛如虎死之唐王遇害楊文岳屯把縣丁啓睿屯汝寧太監劉元斌率京軍救河南聞南陽陷乃擁婦女北去俄上命御史清軍元斌倉皇悉沈之于河十二月李自成連陷洧川許州長葛鄢陵鄢陵知縣劉振之力詘衣冠北向再拜自剄死自成汝才合兵陷禹州徽王遇害復圍開封巡撫髙名衡總兵陳永福等竭力守禦周王貯庫金于城頭禽一賊者予百金斬一首者五十金戰歿者䘏其家五十金傷者以輕重為差殺賊甚衆永福射中自成左目自成屯朱仙鎮内鄉鎮平唐縣新野俱降于賊鄧州知州劉振世死焉十五年春正月李自成攻開封益急洞車附城鑿城塼土而空之廣數尺實以火藥燃之一烘而裂曰小放窟城縱横數丈實火藥燃之一發震天曰大放癸未賊以精騎數千布圍于外執汴人畚土穴城為大窟十餘輦火藥數萬斤百炬齊燃賊擐甲持矛望城崩將擁入賊穴城畚其土礫於外累累成阜火藥一發崩天甎缶皆飛鳴外嚮賊之布圍于外者人馬成血糜城之未穿者堅如石猶尋丈賊駭解圍去南陷西華起孫傅庭兵部侍郎總督陜西兵𠞰寇三月庚午李自成羅汝才合羣盜八十萬圍陳州兵備副使闗永傑率士民死守賊周圍四十里更番進攻永傑力竭城陷戰死城上鄉紳崔必之舉人王受爵等咸手刅數賊被執罵賊死賊怒屠陳州辛卯陷睢州陷大康遂圍歸徳府歸徳無兵民自為守乙未賊鱗次穴城城陷賊乗勝陷寧陵考城夏四月孫傅庭檄召諸將于西安聽令固原總兵鄭家棟臨洮總兵牛成虎援𠞰總兵賀人龍各以兵來㑹傅庭大集諸將縛賀人龍坐之旗下而數之曰爾奉命入川討寇開縣譟歸猛帥以孤軍失利獻賊出柙職爾之由爾為大帥遇寇先潰致秦督秦撫委命賊手一死不足塞責也因命斬之諸將莫不動色因以人龍兵分隷諸將刻期進討人龍米脂人初以諸生効用佐督撫討賊屢殺賊有功總全陜兵叛將劇賊多歸之人龍推誠以待往往得其死力襄城之役朝廷疑人龍與賊通密勅傅廷殺之賊聞人龍死酌酒相慶曰賀風子死取闗中如拾芥矣癸亥李自成羅汝才合羣賊復攻開封先是賊再攻不克士馬多殺傷羣賊畏葸日逃亡數千賊乃申約圍而不攻以坐困之五月李自成分兵陷開亳六月命侯恂以兵部侍郎總督援𠞰官兵討賊與孫傅庭協力援開封七月賊圍開封久守臣告急詔援𠞰總兵許定國以山西兵渡河援之定國兵潰于覃懐己巳督師援𠞰諸軍潰于河上時督師丁啓睿保督楊文岳合左良玉虎大威楊徳政方國安諸軍次于開封朱仙鎮與賊壘相望啓睿督諸軍進戰良玉曰賊鋒方銳未可擊也啓睿曰汴圍已急豈能持久必擊之諸將咸懼請詰朝戰良玉以其兵南走襄陽諸軍相次而走督師營亂啓睿文岳聮騎奔汝寧賊渡河逐之追奔四百里喪馬騾七千兵數萬俱降賊啓睿􅎁書印劍俱失事聞詔逮啓睿下獄文岳革職聽勘八月開封久困食盡人相食周王先後捐庫金一百二十餘萬復捐嵗禄萬石以養兵國廪空虚宫人咸有飢色詔山東總兵劉澤清援開封澤清以朱家寨距城八里提兵五千渡河為營列水環之達于大堤築甬道以運糧則救援可濟遂往立營賊攻之三日諸兵不至澤清引兵去時羅汝才營亦食盡謀他徙自成乃分糧以餽之約破開封以東隅屬之汝才汝才乃留不去開封城北十里枕黄河巡撫髙名衡推官黄澍等城守且不支恃引河水環濠以自固更決隄灌賊可潰也李自成遣兵攻陷歸徳推官王世琰死之九月河決開封賊先營髙處然移營不及亦沉其卒萬人河流直衝入城勢如山岳自北門入穿東南門出流入渦水水驟長二丈士民溺死數十萬巡撫髙名衡陳永福咸乗小舟至城頭周王府第已沒從後山逸出西城樓率宫眷及諸王露棲城上雨中七日督師侯恂以舟迎王庚寅總兵卜從善以水師至開封城上推官黄澍從王乗城夜渡達隄口諸軍列營朱家寨賊乗髙據筏以矢石擊汴人之北渡者城中遺民尚餘數萬賊浮舟入城盡掠以去河北諸軍以大礟擊沉其前鋒奪回子女五千人舊河故道清淺不盈尺歸徳隔斷在河北邳亳以下皆被其災汴梁佳麗甲中州大隄之上絃管紛咽羣盜心艷之前後三攻汴士馬死者無筭賊積恨矢必拔久懷灌城之謀顧以子女珍寶山積不忍棄之水族憤其城久不下河大決百姓生齒盡屬波臣斷垣矗水上數堞隠見而已黄澍以守禦功詔授御史回革左諸賊北合于李自成孫傅庭率兵至南陽李自成羅汝才西行逆之傅庭設三覆以待牛成虎將前軍左勷將左鄭嘉棟將右髙傑將中軍成虎陽北以誘賊賊奔逐入伏中成虎還兵而鬭髙傑董學禮突起翼之左勷鄭嘉棟左右横擊斬首千餘級賊潰東走追之賊盡棄甲仗軍資于地官軍爭取之無復步伍賊覘官軍囂反兵乗之左軍先潰諸軍繼之喪材官將校七十有八人賊倍獲其所喪焉冬十月李自成復陷南陽屠之回兵屯開封北孫傅庭以兵敗上書自劾詔傅庭圖功自贖自成汝才合兵趨汝寧十一月孫傅庭治兵于登封收斬逃帥進兵汝寧賊游兵窺懐慶欲北渡劉澤清禦卻之閏十一月己酉李自成合諸賊圍汝寧監軍孔貞㑹以川兵屯城東楊文岳以保定兵屯城西賊兵進攻相距一晝夜川兵潰保定兵不支庚戌賊四面環攻戴扉以障矢石雲梯如墻而立城上矢石俱下賊死傷衆而攻不休一鼔百道並登執文岳及分巡僉事王世琮于城頭文岳世琮厲聲罵賊賊怒縛文岳等以大砲擊之洞胸糜骨以死世琮初授河南推官屢却賊射矢貫耳不動號王鐵耳賊屠士民數萬燔燒邸舍無遺丁巳拔營走確山向襄陽掠崇王由樻及世子諸王妃嬪以行左良玉自朱仙鎮南潰久屯襄陽諸降卒附之有衆二十萬其餼于官者僅二萬五千餘俱因糧村落襄人不聊生十二月李自成羅汝才合兵四十萬由唐縣而西良玉結營襄陽近郊大造戰艦于樊將避賊入郢襄人怨其淫掠縱火焚之良玉怒掠荆襄巨估舟載軍資婦女其中而身率諸軍營樊城髙阜賊勢既盛襄民咸焚香牛酒以迎戊辰賊以數萬騎至樊城良玉乗髙飛礟擊殺賊千餘騎賊從間道至白馬渡臨江欲渡良玉移營拒之賊不得渡良玉拔營而南賊亦不敢逼自成切齒于良玉每戰必力良玉懼不敢復與爭鋒故恒避之鄖撫王永祚跳城走己巳襄陽陷賊分兵陷夷陵宜城荆門向荆州良玉全師出漢口遂下武昌次于金沙洲賊逼荆州甲戌偏沅巡撫陳睿謨棄荆州奉惠王走湘潭自成遣賊將馬守應據夷陵以犯豐賀一龍趨徳安窺黄麻辛巳自成至荆州士民開門迎之賊入荆州荆州諸縣土寇蠭起十六年春正月李自成圍承天知府開門迎賊巡撫宋一鶴時守城下城巷戰將士勸之走一鶴不聽揮刃擊殺賊數人死鍾祥知縣蕭漢有賢聲賊戒其部曰殺賢令者死無赦乃幽之寺中戒諸僧曰令若死當屠爾寺僧謹視之漢曰吾盡吾道不礙汝法遂自經賊改承天府曰揚武州遂犯顯陵巡按李振聲守陵迎降賊賊列之上班振聲自以與賊同姓肩輿出入營中揚揚自得自成坐陵殿大㑹羣賊欽天監博士楊永裕亦降于自成自稱天文禮樂兵法地理俱該洽請賊發顯陵忽大聲起山谷若雷震賊懼而止分兵陷潛江京山諸縣遣賊將攻徳安乙巳陷雲夢丙午陷孝感丁未自成汝才至黄陂知縣懐印走賊設偽令黄陂士民殺偽官賊怒反兵攻黄陂屠之夷城垣為平地戊申陷景陵賊别將陷徳安自成馳檄黄州指斥乗輿偽托仁義以誘逺近黄州守將王允成棄城順流而下掠江上客舟大擾江南北方國安諸將退屯漢口賊大隊逼漢陽左良玉自金沙渚東下九江遂至于蕪湖初自成流刼秦晉楚豫攻剽半天下然志樂狗盜所至焚蕩屠夷既而連陷荆襄鄢郢席捲河南有衆百萬始侈然以為天下莫與爭思據有城邑擅名號矣羣賊俱奉其號令推自成為奉天倡義文武大元帥號汝才曰代天撫民徳威大將軍自成據襄陽號曰襄京其餘所陷郡縣俱改易名號修襄王宫殿設官分職武官有權將軍等九品文官有太師六政府諸品封崇王由樻為襄陽伯邵陵王在城保寧王紹圯肅寧王術授俱降賊改封伯偽吏政府侍郎喻上猷薦列荆州紳士賊下檄徴之江陵舉人陳萬策李開先在所薦中偽檄下萬策自經開先觸墻死楊永裕又勸進牛金星不可乃止二月庚午李自成遣賊陷麻城城空無人賊回屯徳安自成分兵為四老回回守承天羅汝才守襄陽革裏眼往黄州自將其一癸未自成攻郟縣知縣李貞率士民堅守一晝夜殺傷甚衆賊百道環攻一鼓而拔縱兵大殺李貞大聲叱賊曰驅百姓死守者知縣耳妄殺何為罵賊不已自成怒褫其衣倒懸于樹貞大呼曰髙皇帝有靈我必訴之上帝以殺賊賊斷其舌剮之母喬氏及妻俱死三月乙未灃州土賊勾李自成陷常徳常徳富強甲湖南生齒百萬積粟支十年巡撫陳睿謨遇賊于郟先奔士民無固志賊遂陷之自是辰岳諸府相繼俱陷而雲貴路梗矣丁酉命大學士吳甡出督師給五萬金旌功以大理評事萬元吉為職方員外郎仍充督師軍前贊畫兵部尚書張國維請隨輔臣躬率六軍討賊優詔答之癸卯李自成襲殺革裏眼左金王并其衆甲寅左良玉引兵自池口西上屯安慶傳制襄承失守明法具在左良玉憫其久勞行間責令圖功自贖方國安陳可立革職充為事官殺賊夏四月李自成殺羅汝才并其衆降將惠登相王光恩在鄖陽陰使人招汝才所部多犇降之自成怒攻鄖陽登相光恩屢敗之自成遂築長圍以困鄖丁酉陷保康知縣石惟壇死之辛丑自成遣賊將以兵十萬至禹州守將楊芬張朗先期具禮迎賊賊設偽官之任甲申下詔厲將士討賊告諭天下五月河南所在擒斬偽官李自成在襄陽所造宫殿皆傾塌遂屯移鄧州益兵攻鄖陽王光恩禦之賊屢戰不利孫傅庭復遣髙傑以兵援鄖陽擊賊敗之賊退屯襄陽拘鐵工晝夜造鐵鈎釘各萬餘謀向潼闗踰越山險戊申上諭輔臣甡奉命督師討賊自當星馳受事乃三月以來遷延不進將出都門籌畫不固若在行間何以制勝還宜在閣佐理不必督師詔趨孫傅庭作速𠞰寇丙辰李自成攻袁時中殺之并其衆巡撫河南秦所式上言中州大勢闖曹蹂躪五郡八十餘城盡為瓦礫及革左諸賊由宛汝跨江漢旬日陷數名郡此流寇之大畧也自永城以至靈閿自宛汝以抵河㟁方千里之内皆土賊大者數萬小者數千棲山結寨日事焚掠此土賊之大畧也辨賊必須兵舊撫餘兵不及二千陳永福餘兵不及四千合卜從善三千人亦不滿萬此主兵之大畧也用兵必裕餉河南五郡淪沒河北強半蒿萊額賦五十萬昨年完不及二十萬撫鎮闕餉五月有餘此糧餉之大畧也轉餉必須民自經寇十餘載人烟幾斷守城修河轉運至于稚子荷旗老婦鳴柝此民生之大畧也撫民必須官按除目則有人稽地方則無官或年餘不赴或土團寄命此官吏之大畧也敗壞已極惟願皇上速發内帑亟練精銳佐以土寨開荒選牧庶有濟乎時上召保定巡撫徐標入對標曰臣自江淮來數千里見城陷處固蕩然一空即有完城僅餘四壁蓬蒿滿路雞犬無音曽未遇一耕者土地人民如今有幾皇上亦何以致治乎上欷歔泣下標又上言屯田及車戰諸策上善之是月給事中吳甘來上言諸撫臣借名䕶藩實棄城走乞􅎁諭各藩并覈王永祚等棄城之罪上不問六月丁丑立賞格購李自成萬金爵通侯購張獻忠五千金官極品世襲錦衣指揮餘各有差進孫傅庭兵部尚書總制應鳳江皖豫楚川黔剿寇軍務仍總制三邊鑄督師七省之印李自成大造戰艦于荆襄遣老回回攻常徳自成謀自王于荆其親信大帥二十九人分守所陷郡邑自成自隨騎兵五營營精騎二千步兵十四哨哨精卒三千劉宗敏總步白旺總騎每屯以騎兵一營外圍巡徼晝夜更番餘營以次休息警候嚴密人不得逃逸逸者追獲必磔之營兵不許多攜輜重兵各攜妻孥生子棄之不令舉男子十五以上四十以下咸掠為養子為奴隸故每破一邑衆輒増數萬每一精兵則蓄役人二十餘其䭾載馬騾不與焉衆實五六萬且百萬也雖拔城邑不聽屋居寢處布幕彌望若穹廬其甲縫緜帛數十重有至百者輕而韌矢鏃鉛丸不能入每戰一騎兵必二三馬數易騎終日馳驟而馬不疲嚴寒則掠茵薦布地以籍馬足或刳人腹為馬槽實以芻椒飼之飲馬則牽人貫耳流血雜水中馬習見之遇人則嘶鳴思飲噉焉行兵倐忽雖左右不知所往雞再鳴並起蓐食鞴馬以俟百萬之衆惟自成馬首是瞻席卷而趨遇大川則囊土壅上流雖淮泗諸水亂流而渡百萬合營不攜糧隨掠而食飽則棄餘有斷食斷鹽數月者臨陣鐵騎三重反顧則殺之戰不勝馬兵陽北官軍乗之步兵拒戰馬兵繞而合圍無不勝矣以牛金星為謀主日講經一章史一通每有謀畫集衆計之自成不言可否陰用其長者人多不測也其攻城分畫夜為三畨以鐵騎布圍歩兵肉薄向城人戴鐵胄䝉鐵衣攜椎斧鑿城得一甎甓即還易人以進穴城可容一人則一人匿之畚土以出以次相繼遂穿空旁側迤四五步留一土柱巨絙繫之去城十百丈牽絙倒柱而城崩矣望風降者不焚殺守一二日殺十三四或五六日不下則必屠矣殺人數萬聚屍為燎名曰打亮城將陷以兵周布濠外縋城者殺之故城陷必無噍類掠馬騾為上功次軍仗次幣帛衣服次珍寶其金銀恒散棄之或以代鉛置礟中屠城則夷其城垣令後莫與為守立投順牌四凡破城四向負牌至村落䧏者即負牌過别村否則加兵牌所至日蹙千里性慘酷斷耳剔目截指折足剖心鐻體日以為常談笑對之其兄從秦軍來自成獲而殺之性又澹泊食無兼味一妻一妾皆老嫗不蓄奴僕無子以李雙喜為養子嗜殺更酷于自成自成在襄陽以搆殿鑄錢皆不成斬一謀士令術士問紫姑卜之不吉因立李雙喜為太子改名洪基以厭之鑄洪基年為錢又不成七月聞秦督兵將至留毛賊守襄陽家口自成率精銳往河南庚子督師孫傅庭發兵潼闗分道進討以總兵牛成虎副將盧光祖為前鋒㑹河南總兵卜從善陳永福合兵洛陽之下池寨檄左良玉以兵自九江赴汝寧夾擊賊大營移宛向雒詔薊遼總兵白廣恩四川總兵秦翼明入衞土漢官兵陜西三鎮兵俱隨督師進討傅庭以副總兵髙傑將降丁為中軍命秦翼明出商雒為犄角總兵王定官撫民率綏夏二鎮兵為後勁八月辛未傅庭師次閿鄉自成盡發荆襄諸賊俱㑹于河南步賊沿河列守自汜水至滎澤伐竹木結筏人佩三葫蘆將渡河先驅千餘賊北渡總兵劉𢎞起以兵逐之復渡南岸丁丑牛成虎率諸將前驅遇賊于洛陽擊破之再敗之河岸追奔至汝州成虎以孤軍無繼退屯澠池九月己亥傅庭次汝州偽都尉四天王李養純率所部來降知賊并兵守寶豐傅庭進軍寶豐合圍賊堅守不下壬寅自成以輕兵來援戰于城東白廣恩髙傑盧光祖分兵逆戰却之癸卯復以精騎數千直攻官軍諸將復擊走之傅庭曰寶豐不即下而賊救大至則腹背受敵矣親督諸軍悉力攻城拔之斬偽州牧陳可新等數千級遂以大兵搗唐縣時賊家口盡在唐縣賊發精騎來援官軍已入城盡殺賊家口賊滿營痛哭誓殺官兵壬寅傅庭自朱仙鎮而南大兩六日糧車日行三十里又道淖未至士馬俱飢或勸傅庭旋師就運傅庭曰軍已行即還亦飢奚濟乎要當破一縣就食耳甲辰傅庭破郟縣縣俱窮民集騾羊二百餘頃刻分臠食盡不足給己酉命河北山西就近餉傅庭軍自成將步騎萬餘逆戰官軍前鋒擊斷自成坐纛進逐之賊披靡賊營逃亡者相屬時傅庭前鋒盡收革左故部皆致死于賊而髙傑統諸降賊備悉賊中曲折自成遣其弟一隻虎逆戰三戰三北自成奔襄城諸軍進逼之自成累敗而懼挑土築墻自守已食匱賊有飢色初自成在河南以河雒荆襄四戰之地且荒蕪赤地千里闗中其故鄉也士馬強甲天下據之可以霸乃謀西向憚潼闗天險將從淅川間道入陜如不能則從楚豫下淮安金陵可襲而有也既至陝州屢敗盡發河上屯守諸賊以迎官軍驅所掠難民為前鋒以誘敵官軍屢勝輕敵日馳逐數百里河南所在皆荒諸軍既深入饋餉不繼丙子自成書巨牌行至官軍刻期㑹戰時襄洛豪傑並起各保塞以逐賊大者萬人少者數千若毛顯文劉𢎞起沈萬登皆起布衣為將領潛山宋正竒集鄉兵數萬扼險隘賊不敢下承天方國安以兵復承天老回回屯夷陵官軍擊敗之諸縣多恢復大雨連旬傅庭軍乏食壬子兵譟于汝州降盜李際遇陰通賊癸丑賊率精騎大至傅庭問計于諸將髙傑請戰白廣恩曰我師困宜駐師分據要害步步為營以薄賊易耳傅庭恐賊遁曰將軍何怯獨不如髙將軍耶廣恩不懌引所部八千人先去賊前鋒名三堵墻一紅一白一黒各七千二百人來薄官軍接戰陷賊伏中賊乗之官軍大敗陷泥淖死者數千人髙傑立嶺上望曰不可支矣麾衆退諸軍盡西走賊驅大隊疾追一日馳走四百里至于孟津官軍死亡四萬餘人盡喪其軍資數萬傅庭與傑收散亡數千騎渡垣曲走河北初賊驅難民誘官兵斬獲皆良民也傅庭不知其詐奏賊聞臣名皆驚潰臣誓肅清楚豫不以一賊遺君父識者憂之至是果敗賊别將克汝州殺僇過當戊子自成向潼闗白廣恩擊破之孫傅庭亦回軍潼闗衆尚四萬十月辛酉朔副總兵沈萬登復汝寧萬登汝寧大俠也聚鄉勇萬餘人李自成偽授威武大將軍不受鳳督馬士英承制授副總兵是日偽將軍馬尚志􅊩任萬登潛遣諜入城因擁衆入誅尚志并諸偽官壬戌一隻虎陷閿鄉即自成弟李過也疾走至潼闗獲督師大纛丙寅賊以纛紿守闗者乗間突入潼闗陷李自成間道縁山崖出潼闗後夾攻官軍大潰賊既入闗西行一隻虎陷華陰傅庭及白廣恩退屯渭南賊合衆數十萬陷渭南傅庭沒于陣知縣楊暄被執不屈死賊屠渭南陷華州戊辰陷商州商雒道黄世清不屈死之賊屠商州乙丑陷臨潼闗中人心所在瓦解陝西廵撫馮師孔知寇棘急入西安收保俄賊至辛未師孔督兵出戰陣陷被執不屈死之西安陷按察使黄炯自盡長安知縣吳從義指揮崔爾達俱投井死秦府長史章世炯自經死紳士死者甚衆右都御史三原焦源溥罵賊磔死磁州道副使祝萬齡至學宫拜先聖從容自經死禮部主事南居業罵賊死宣撫焦源清㕘政田時震俱不受偽職死御史王道純大罵賊不屈死解元席増光舉人朱誼泉俱投井死山東監軍僉事王徴七日不食死都司吏丘從周罵賊死餘吏民皆相率降于賊總兵白廣恩逃而追獲降之初自成剽掠十餘年既席捲楚豫始有大志然地四通皆戰塲所得郡縣官軍旋復之至是既入秦百二河山遂不可制自成據秦王府偽授秦王存樞權將軍世子妃劉氏曰國破家亡願求一死自成遣歸外家秦藩富甲天下擁貲千萬賊之犯秦也户部尚書倪元璐奏曰天下諸藩無如秦晉山險用武國也宜諭兩藩能任殺賊不妨假之以大將之權如不知兵宜悉輸所有與其齎盜何如享軍賊平之後益封兩藩各一子如親王亦足以報之兩王獨不鑒十一宗之禍乎賢王忠而熟于計必知所處矣書上不報至西安陷秦藩府庫盡為賊有賊分兵狥諸縣皆陷蒲城知縣朱一統抱印投井死初自成在楚議所向牛金星請先取河北直擣京師楊承裕欲先據留都斷漕運獨顧君恩曰否否先據留都勢居下流難濟大事其策失之緩直搗京師萬一不勝退無所歸其策失之急不如先取闗中為元帥桑梓之邦且秦都百二河山已得天下三分之二建國立業然後旁畧三邊資其兵力攻取山西後向京師進退有餘方為全策賊從其計先是賊好殺掠牛金星勸以不殺遂嚴戢其下民間稍安堵輒相誑惑人無鬭志自成遂改西安府為長安榜掠巨室助餉辛未進白廣恩盪寇將軍𠞰賊時上信廣恩尚未知其降賊也李自成分兵畧鄜延中部知縣華堞知城小不支先令妻妾自縊一妾年少遣之其妾亦垂泣投繯華堞遂經死官兵進𠞰汝寧一路偽官土寇俱盡河南稍寧庚寅上始聞潼闗失守以兵部侍郎余應桂總督陜西三邊收拾邊兵相機𠞰寇應桂聞命飲泣陛辭曰不益兵餉雖去何濟上黙然發帑金五萬給軍應桂遷延河上不進十一月總兵王定髙傑自渭南敗各帥所部奔延安自成命賊將田斌守西安自往塞上甲午髙傑聞賊至以兵渡河而東入山西王定奔榆林自成陷延安大㑹羣賊戎馬萬匹旌旗數十里於米脂祭墓以五百騎按行鳳翔守將誘而殲之自成怒親攻鳳翔陷之屠其城壬寅李自成發金數萬招榆林諸將以大寇繼之備兵副使都任及故總兵王世顯侯世禄侯拱極尤世威惠顯等斂各堡精銳入鎮城大集將士謂之曰若等守乎降乎各言效死無二遂推世威為長主號令繕甲兵賊遣偽官說三日不聽賊怒乙未賊四面環攻城上強弩疊射賊死屍山積更發大砲擊之賊稍却丙午賊攻寧夏鎮兵逆戰三勝之殺賊精銳數千自成歸西安益發賊往寧夏闗中諸賊聞寧夏之敗數萬東奔商雒出潼闗復散入河南壬子自成復往攻寧夏丁巳李自成陷榆林榆林被圍諸將力戰殺賊賊死者萬人賊攻益力逾旬不克賊以衝車環城穴之城崩數十丈賊擁入城遂陷副使都任闔室自經死總兵尤世威縱火焚其家百口揮刀突戰死諸將各率所部巷戰殺賊千計賊大至殺傷殆盡無一降者闔城婦女俱自盡諸將死事者數百人榆林為天下勁兵處頻年餉絶軍士飢困而殫義殉城志不少挫闔城男子婦女無一人屈節辱身者榆林既屠賊搗寧夏寧夏總兵官撫民迎降三邊俱沒賊無後顧長驅而東矣自成攻慶陽城中堅守四日力不支城陷備兵副使段復興董琬鄉紳太常少卿麻禧死之屠慶陽執韓王時賊遣偽王往闗東靈閿諸路大張偽榜移檄河南郡縣河南西境賊皆設偽官官兵守懐慶府十二月李自成遣賊入漢中不克髙傑在絳州聞李自成將東渡分道東走戊辰至蒲州李自成前鋒渡河入山西巡撫蔡懋徳先屯平陽至是以嵗暮還太原庚辰賊至河津陷平陽知府張嶙然走太原吏民皆降賊殺西河王等三百人髙傑聞平陽陷擁兵東下澤州山西郡縣聞賊至望風迎款賊遣偽牌徧行山西其辭甚悖李自成遣賊陷甘州先是鳳翔蘭州開門迎賊賊渡河莊浪涼州二衞俱降遂圍甘州乗夜雪登城巡撫甘肅林日瑞總兵郭天吉同知藍臺等並死之殺甘民四萬七千餘人西寧衞尚堅守不下至明年二月詐降殺偽官賀錦等十七年春正月李自成稱王于西安僭國號大順改元永昌自成久覬尊號懼張獻忠老回回相結為患既入秦通好獻忠獻忠厚幣遜詞以報之自成喜遂僭號牛金星為丞相更定六政府尚書等偽官三月乙巳李自成自山西抵京師環攻九門丁未京城陷帝后崩丙辰遼東總兵平西伯吳三桂聞京師陷帝后殉難遂縞素發哀乞師于我大清討賊薄山海闗傳檄逺近李自成聞之大驚脅三桂父襄作書招三桂令舊將唐通遺三桂書勸降且言東宫無恙三桂不答上書其父畧曰父既不能為忠臣桂亦安能為孝子桂與父訣請自今日雖寘父鼎俎旁以誘三桂不顧也書至自成益懼三桂頓兵山海闗以忠義激將吏規取京師唐通不能禦三桂殺賊騎殆盡初三桂諭其下曰吾不忠不孝何顔立天地間欲自刎其下俱曰將軍何至此吾輩當死戰遂大破賊己巳京城外徧張吳三桂檄共約士民縞素復仇一時都人皆密製素幘庚午李自成率兵六萬東行劉宗敏李過等從之挾太子永王定王吳襄自隨太子二王𤣥幘緑衣各一兵抱之馬上都人擁觀多隕涕甲戌李自成向永平丁丑吳三桂大破賊于闗門賊初破京師精銳不過萬數所至虚聲脇下未常經大敵既飽掠思歸聞邊兵勁無不寒心自成知成敗決于一戰益驅賊連營並進三桂悉銳出戰無不一當百奮擊殺賊數千人賊亦賈勇疊進自成挾太子登髙岡立馬觀戰賊衆三面圍三桂兵三桂兵東西馳突賊散而復合我大清兵至繞出三桂右所向披靡莫當自成策馬走諸賊遂大潰自蹂踐死者數萬人諸軍分道乗之殺其大帥五人奪輜重無筭自成以數千騎急走永平戊寅自成遣使赴軍中議和三桂曰歸我太子二王速離京城使鍾簴如故而後罷兵自成請旋師如三桂言求和三桂許之自成拔營而西己卯三桂追賊于永平又破之賊奔竄還京師毁京城外民居數萬間并夷牛馬墻稍遲者殺之凡數萬人三桂兵壓城自成合兵一十八營以拒戰三桂進攻之連拔其八寨斬首二萬自成殺吳襄首以髙竿懸城上盡殺襄家三十八口三桂披髪墜鞍哭于地三軍感憤怒拔刀砍地誓殺賊丙戌李自成自稱帝即位于武英殿偽磁侯劉宗敏扶創出平立不拜曰爾故我等夷也偽官皆拜宗敏不得已再拜而退丁亥昧爽李自成出齊化門西走先運薪木積宫内縱火發砲擊毁諸宫殿又燒九門雉樓火光燭天先是三桂知賊將西走設疑兵于西山密取酒罌數千實以石灰夜埋齊化門道上上覆浮土賊萬馬並馳而出踐罌皆穿馬足驚踣後騎相壓奔石灰迷目不可眎疑兵逺譟以驚之賊陣大亂三桂望城中火作知賊走繞城而西追奔三十里賊馬騾俱重載日行數十里追兵至盡棄其輜重婦女自盧溝至固安百里盔甲衣服盈路賊兵散去者又數萬三桂徐收所棄已逾數百萬賊既得脫西走三桂復率大兵追賊至保定賊還兵而鬬奮撃破之又追破之于定州北奪其婦女二千獲輜重無筭招降潰賊萬餘人自成屯真定既屢敗憤極復勒精騎擊三桂三桂兵張兩翼以進擊斬其大將三人首萬級自成大敗還真定益發兵攻三桂三桂接戰自晨至晡未決三桂分兵疊戰自成漸引却自成中流矢墜馬掖而騎馳還營即拔營西走度故闗入山西三桂以兵逐之及闗而止遂還軍京師李自成自井陘西行至平陽分兵守山西諸隘益發闗中兵西攻漢中陷之李自成復遣兵出潼闗攻掠河南又遣降賊叛將馬科至四川畧保寧一路吳三桂追賊入山西時西部復攻臨洮甘肅以牽之自成數戰不勝遂棄山西走西安我大清兵西伐李自成合賊數十萬悉銳迎戰鐵騎衝堅而入賊披靡斬首數萬劉宗敏田見秀等俱死賊衆大潰棄西安走商雒丙子自成棄陜以兵出潼闗分軍為八營三道俱下南畧地至襄郟我大清兵既定三秦下河南入楚取荆襄李自成南奔辰州將合張獻忠獻忠已入蜀遂留屯黔陽部賊亡大半然尚擁衆十餘萬乏食遣賊將四出抄掠黔陽四境雞犬皆盡川湖何騰蛟進攻之自成營于羅公山倚險築塹為久屯計勢彌蹙食盡逃者益衆自成自將輕騎抄掠何騰蛟伏兵邀之大敗殺傷幾盡自成以數十騎突走村落中求食邨民皆築堡自守合圍伐鼓共擊之自成麾左右格鬬皆陷于淖衆撃之人馬俱斃邨民不知為自成也截其首獻騰蛟驗之左矑傷鏃始知為自成李過聞自成死勒兵隨赴僅奪其屍滅一邨而還結草為首以衮冕𦵏之羅公山下賊諸將奉李過為首改名李繡渡湖入險山中後改名李赤心羣盜俱散亡谷應泰曰國以民為本民以食為天故曰積貯者天下之大命也史稱闗中大祲而三輔寇盜縱横周官荒政十二而興大役以業貧民至若青徐嵗饑樊崇以起長垣嵗㓙仙芝作亂蓋揭竿之變往往由于請磬之匱也況乃汰郵驛減冗卒使亡賴奸人無所得衣食則益煽而為亂走死地如騖耳崇禎之初銳意恭儉東南織文西北游徼並行裁罷而李自成以驛胥失職值飢民不沾泥等倡亂延安因往從之又與耿如把潰兵相合旬月之間衆至萬餘推為闖將蓋潰兵得飢民則嚮道既精飢民得潰兵則壁壘益厚又況延綏地連邊鎮俗嫺弓馬民多獷悍秦長西陲雄制列國唐起靈武終復兩京揆之自成起事雖屬毛賊實則勁旅也此時明察之官剽銳之將便當厚集衆師一鼓擒滅比之唐周上書馬元車裂宋賢謀亂鷹揚捕斬斯為得之而乃養􅏴坐大馴致蔓延此豈非計之失耶雖然自成之起延安也自秦入豫由蜀躪楚轉寇闗東僭號襄鄧十餘年之間曹文詔敗之于商雒陳竒瑜敗之于漢中左光先敗之于富平左良玉扼之于武闗賀人龍破之于靈陜孫傅庭敗之于襄城亦未嘗不自縛乞降投繯引決而究至狼犇豕突死灰復燃者則以號令乖方韜鈐不飭中朝無良平之謀而行間無李郭之將也乃者車箱峽之困自成解甲矣而更給票免死興平武功之捷自成計阻矣而乃緩兵待撫崤函合圍之舉自成坐斃矣而云圍師必缺又且得臣之猛按劍行誅節度之師同日奔潰以至嗣昌仰藥于前傅庭陣亡于後而天下事不可為矣自成乃更北攻寧夏畧定三邊東搗居庸長驅京邑洎乎祿山陷都惟事聲色黄巢入簒大掠貲財突令言于宜春坐朱泚于北闕遂使銅駝榛莽鍾簴灰銷自古潢池之禍未有若斯之酷者也嗟乎彼自成者非有殊才絶力不過狡黠善騎射耳而謀主牛金星顧君恩輩則井窺之智也孽黨劉宗敏白旺等則瘈犬之猛也奈何千丈之隄潰于蟻穴天府之險踣于困獸哉以予論之假令貨賄屏絶則將必盡材文法便宜則權不中制而又有武侯以興復自任晉公以討賊自効者即寇雖鴟張不難一舉而撲滅之也然則顛覆之禍固當責之廟筭歟明史紀事本末卷七十八
