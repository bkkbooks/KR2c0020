body:
  text: 明史紀事本末卷十浙江提學僉事谷應泰編故元遺兵太祖洪武三年春正月癸巳上以王巴拜為西北邊患命右丞相信國公徐達為征北大將軍浙江行省平章李文忠為左副將軍都督馮勝為右副將軍御史大夫鄧愈為左副將軍湯和為右副將軍往征沙漠上問諸將曰元主遲留塞外王巴拜近以孤軍犯我蘭州其志欲僥幸尺寸之利不滅不已卿等出師當何先諸將皆曰巴拜之冦邊者以元主之猶在也若以師直取元主則巴拜失勢可不戰而降上曰王巴拜方以兵臨邊今舍彼而取元主是忘近而趨逺失緩急之宜非計之善吾意欲分兵二道一令大將軍自潼關出西安搗定西以取王巴拜一令左副將軍出居庸入沙漠以追元主使彼此自救不暇應援元主逺居沙漠不意吾師之至如狐豚之遇猛虎取之必矣事有一舉而兩得者此是也諸將皆曰善遂受命而行二月北平守禦華雲龍克雲州獲元平章呼嚕固岱右丞噶海等大同指揮金朝興克東勝州獲元平章荆麟等大同都督同知汪興祖克武州朔州獲元知院馬廣等夏四月大將軍徐達率師出安定初達師至平西王巴拜退屯車道峴達遣左副將軍鄧愈立柵逼之至是出安定駐沈兒峪口與王巴拜隔深溝而壘一日數戰王巴拜發兵千餘人出間道從東山下潛劫東南壘一軍皆驚左丞胡德濟倉卒不知所出達率親兵擊之斬東南壘趙指揮及將校數人以狥軍中股栗明日整衆出戰諸軍爭奮遂大敗巴拜兵於川北亂塜間擒元郯王文濟王及國公閻思孝平章哈扎爾圭琳齊嚴奉先李景昌察罕布哈等官一千八百六十五人將校士卒八萬四千五百餘人獲馬萬五千二百八十餘匹駱駝驢騾雜畜稱是巴拜僅與其妻子數人從古城北遁去至黃河得流木以渡遂由寧夏奔和林都督郭英追至寧夏不及而還巴拜至和琳元嗣主阿裕爾實哩達喇復任以事徐達以胡德濟失律械送京師上念其舊勞特赦之仍遣使諭達曰將軍欲效衛青不斬蘇建獨不見穰苴之待莊賈乎胡左丞失律正當就軍中戮之今歸之朝廷朝廷必議其功過彼常守信州救諸全皆有功不忍即加誅懼將軍緣此緩其軍法是用遣使即軍中諭意五月丁酉左副將軍李文忠左丞趙庸師出野狐嶺擒元平章祝真進敗元太尉曼濟平章沙布迪音多爾濟巴勒等於白海之駱駝山遂次開平元平章尚都罕等降都督孫興祖率燕山右衛指揮平定大興左衛指揮龎禋兵次賽音布拉克川遇元兵力戰皆沒於五郎口海寧衛指揮副使孫虎率兵至落馬河及元太尉瑪魯戰死之癸卯李文忠克應昌文忠率師趨應昌未至百餘里獲元騎問之知四月二十八日庚申君已殂文忠督兵兼程而進遇元兵一戰敗之追至應昌圍其城獲元主孫密迪哩巴喇并后妃宫人諸王省院達官士卒等宋代玉璽金寶一十五宣和殿玉圖書一玉冊二鎮國玉帶玉斧各一及駝馬牛羊無算惟太子阿裕爾實哩達喇與數十騎遁去文忠率精騎追之至北慶州不及而還道興州降其兵民三萬七千人至紅羅山又降其兵民萬六千餘人捷聞至京師百官稱賀上命禮部榜示凡經仕元者不與又以庚申君不戰而奔克知天命諡曰順帝上又自為祭文曰生死廢興非一時之偶然乃天地之定數古之聖賢於是四者一或臨之不為之變何也蓋知天命而不惑者也君之祖宗昔起沙漠彎弓矢入我中國橫行天下九彞八蠻盡皆歸之非天命不至此及君之父子正當垂衣守成之時而盜生汝潁華夏騷然號令不行以致失國此人事歟天道歟朕於其時非有三軍六師以威天下乃代君家而為民主亦莫非天命也曩者君王沙漠朕主中國君與羣臣乃固執不移致邊警數興今聞君沒於沙漠朕用惻然特遣人致弔奠以牲醴以享爾靈爾其鑒之六月李文忠遣人送俘獲元諸王密迪哩巴拉等及其寶册至京師省臣楊憲等請以密迪哩巴拉獻俘於廟寶册令百官具朝服進上曰寶册貯之庫不必進也古者雖有獻俘之禮武王伐殷曾用之乎憲對曰武王事殆不可知唐太宗嘗行之上曰太宗是待王世充若遇隋之子孫恐不行此禮元人入主中國百年之內生齒甚繁家給人足朕之祖先亦預享其太平雖古有獻俘之禮不忍加之只令服本俗衣以朝朝畢賜以中國衣冠就令謝恩復謂憲曰故國之妃朝於君者元有此禮不必效之亦令衣本俗衣於中宫朝見見畢賜中國之服亦令謝恩乙亥密迪哩巴拉朝見奉天殿其母及妃朝見坤寧宫俱賜以中國服及賜第宅於龍山封密迪哩巴拉為崇禮侯丁丑頒平定沙漠詔於天下仍遣使賫詔諭安南髙麗占城是日百官表賀上諭之曰當元之季君則晏安臣則跋扈國用不經征斂日促天怒人怨盜賊蜂起天下己非元有矣朕取天下於羣雄非取天下於元氏向使元君克畏天命不自暇逸其臣各盡乃職罔敢驕奢天下豪傑其得乘隙而起耶遣使詔諭元宗室部落臣民元宗室四大王初遁入靜樂岢嵐山中結寨自固至是率衆冦武州太原指揮程桂等擊敗之追至龍尾莊四大王遁走獲其三大王托和木特穆爾送京師乙酉左副將軍鄧愈招諭吐番元陜西行省吐番宣慰使索諾木藏布詣軍門降鎮西武諸王伯勒格亦以吐番諸部來降追元豫王至西黃河抵黑松林殺額森圖罕於是河州以西甘朵烏思藏等部皆來歸征哨極甘肅西北數千里始還九月命指揮韋正守河州正初至河州城邑空虛人骨山積將士見之咸欲棄去正語之曰正受命率公等出鎮邊陲當不避艱險報國恩今既至此無故棄去一旦遂生戎心其誰禦之吾與若等死亡無地妻孥不得相保母寧死於王事乎於是衆感激如命正日夜撫循軍民河州遂為樂土冬十一月壬辰大將軍徐達左副將軍李文忠等還至龍江車駕出勞於江上四年春正月命魏國公徐達往北平訓練軍士繕治城池給守邊將士衣二月甲戌元遼陽守將平章劉益降先是遣斷事黃儔詔諭遼陽諸處官民帥衆歸附益遂以遼東州郡地圖并籍兵馬錢糧之數遣右丞董遵僉院楊賢奉表來降詔置遼東衛指揮使司以益為指揮同知未幾元平章洪巴拜馬彥翬共謀殺益張良佐房皓復擒彥翬殺之巴拜走納克楚營遼東之衆因推良佐皓權衛事至是良佐以聞并遣使貢馬上元所授印章宣勑金牌獻賊殺劉益逆黨仍上其事於中書省曰本衛地方遼逺僻處海隅肘腋之間皆為敵境元平章髙嘉努固守遼陽山寨知院哈喇章屯駐瀋陽古城開元則有丞相伊蘇之兵金山則有太尉納克楚之衆彼此相依互為聲援今洪保保逃往其營必有搆兵之釁乞留斷事吳立鎮撫軍民先將逆黨巴勒丹知院實勒械送京師詔以良佐皓為遼東衛指揮僉事魏國公徐達徙北平山後之民三萬五千八百户散處衛府籍為軍者給衣食籍為民者給田以耕凡已降而內徙者三萬四千五十六户尋命達自北平往山西操練士馬秋七月遼東衛奏元納克楚據金山為邊患遣黃儔賫書諭之曰比者元綱解紐紅巾起於汝潁羣盜遍於中原僭名號者繼出小明王稱帝於亳徐真一稱帝於蘄陳友諒稱帝於九江張士誠稱王於姑蘇明玉珍稱帝於西蜀擁兵數萬割據中原垂二十年朕本淮民為羣雄所逼集衆渡江與將軍會於太平比待他俘特加禮遇且知將軍為名家特釋北歸今又十七年矣朕見羣雄無成遣兵四出北平中原南定閩粵東取方氏西收巴蜀四帝一王皆為俘馘元君奔亡華夏悉定此天命非人力也近聞將軍居金山大張威令吾兵亦守遼左與將軍旌旗相望將軍若能遣使通問貢獻姑容就彼順其水草自守一方不然大厦將傾非一木可支釁之後先惟將軍自思之儔至金山納克楚拘留不還置遼東都指揮使司以馬雲葉旺為都指揮使吳泉馮祥為同知王德為僉事總轄遼東諸衛軍馬上以劉益之變納克楚未附特命雲等鎮之雲等由登萊渡海駐兵金州招降元參政葉廷秀攻走平章髙嘉努遂進至遼東完城繕兵一方遂安命靖海侯吳禎帥舟師運餉遼東淮安侯華雲龍統兵至雲州諜知元平章僧嘉努營於牙頭夜遣精兵襲之突入其營擒僧嘉努盡俘其衆獲駝馬四百餘匹進至上都大石岸攻破劉學士寨擊敗魯爾國公於髙州武平悉衆北奔又遣指揮孫恭等帥兵口北招諭惠王巴圗布哈儲王巴延布哈宗王子瑪布特穆爾等冬十二月丙戌遣人送巴圗布哈等至京上命賜第宅襲衣什器等物仍月給錢米有差五年春正月乙丑詔賜魏國公徐達曹國公李文忠宋國公馮勝交趾弓五十彤弓百庚午命達為征北大將軍出中路文忠為左副將軍出東路勝為右副將軍出西路三道並進以清沙漠中路由鴈門趨和林東路由居庸出應昌西路由金蘭趨甘肅三月徐達抵山西境都督藍玉為前鋒敗巴拜游騎於野馬川丁卯復敗巴拜於圗喇河保保遁與賀宗哲合而拒我師於嶺北時師數發􅤕而心輕敵驟與之戰不利死者萬餘人達固壘而救之故徹侯功臣無死者巴拜亦不敢入塞偏將軍湯和遇别部於斷頭山亦敗馮勝師次蘭州傅友德率驍騎五千為前鋒直趨西凉遇元沙實罕兵擊敗之追至永昌又敗元太尉多爾濟巴勒於和勒歡口大獲其輜重牛馬進至掃林山勝等師亦至共擊元兵走之友德手射死其平章布哈追斬四百餘人降太尉索諾木嘉勒平章衮楚克等夏六月戊寅元將尚律知大軍至率所部吏民八百三十餘户迎降勝撫輯其民留兵守之進至額齊納路守將巴延特穆爾全城降師至别駕山元岐王多爾濟巴勒遁去追獲其平章昌嘉努等二十七人及馬駝牛羊十餘萬友德復引兵至瓜沙州又敗其兵獲金銀印馬駝牛羊二萬而還李文忠率都督何文輝等兵至琨敵聞之夜棄營遁獲其牛馬輜重無算遂進至哈喇莽賚敵部落驚潰復進至臚胊河文忠下令曰兵貴神速千里襲人難以負重乃留輜重臚胊河令部將韓政等守之士卒人持二十日糧兼程而進至圗喇河元太師哈喇章曼濟悉衆渡河留其妻子北嚮而嚴騎以待文忠督兵力戰戰數合敵稍却復進至鄂勒琿河敵兵益衆搏戰不已文忠馬中流矢急下馬持短兵接戰從者劉義直前奮擊以身蔽文忠指揮李榮見事急以所乘馬授文忠自奪敵騎乘之文忠得馬氣益厲據鞍橫槊麾衆更進於是士卒鼓勇皆殊死戰敵敗走逐北至騁海敵兵益大集文忠乃勒兵據險自固而多張疑兵縱所獲馬畜於野示以閒暇居三日敵疑有伏不敢逼稍稍引去文忠亦解而歸迷失道至僧格拉木乏水渴死者甚衆文忠患之忽所乘馬跑地長鳴泉水湧出士馬賴以俱濟是役也顧時與文忠分道入沙漠糧且盡遇元兵士卒疲乏不能戰時奮勇獨引麾下數百人躍馬大呼擊敗之掠其輜重牛馬還軍復大振曹良臣至鄂勒琿河孤軍深入敗沒驍騎衛指揮使周顯振武指揮同知常榮神䇿衛指揮使張耀俱死焉秋七月乙未文忠以所獲故元官屬子孫及軍士家屬一千八百四十餘人送至京師九月丁巳吳禎遣送遼東元平章髙嘉努知樞密院髙大方同僉髙世舉張海馬遼陽路總管髙賦等至京師冬十一月壬申命賞甘肅京衛軍士時馮勝等以匿所獲馬騾牛羊不賞上曰祭遵為將憂國奉公曹彬平江南所載惟圖書汝等當法古人省躬以補過諸將叩頭謝十二月壬寅遣使賫書與元幼主又與元臣劉仲德朱彥德書曰人臣致身於君貴有終始至正之君䝉塵而崩幼主初立朝之大臣無不叛去獨二生竭力事之誠可嘉尚今特遣使者諭君數事且令取其子密迪哩巴拉歸二生宜察之母教人以倔强絶父子之道爾君宗祀不絶二生家族亦可長保如其不然六軍出討旌旗蔽塞於隂山二生身膏草野固竒男子事也或不能狥國偷生免死何面目與朕相見惟熟慮之六年春正月壬子命魏國公徐達曹國公李文忠往山西北平練兵防邊夏四月華雲龍奏上諸關防守事宜東自永平薊州密雲西至五灰嶺外隘口通一百二十一處相去約二千二百里其王平口至官坐嶺關隘有九約去五百餘里俱衝要之地並宜設兵守之紫荆關及蘆花山嶺尤為要路宜設千户所禦守從之六月甲申武朔等州邊警時大將軍徐達駐師臨清報至遣臨江侯陳德鞏昌侯郭興將兵擊之秋八月丙子河州土門峽邊警千户王才戰死陳德郭興兵至達蘭哈濟口遇敵騎擊敗之生擒其同僉實都等斬首六百級獲駝馬牛羊千頭餘衆潰去冬十月凉州屢有邊患都指揮宋晟率兵討之追至額齊納之地斬其渠帥約索爾殺獲甚衆又招降其國公吳巴圗等十一月壬子徐達等擊元兵於懷柔三角村擒其平章康同僉李文忠出朔州擒元太尉巴延布哈七年春正月曹國公李文忠敗敵于白登俘其國公博囉特穆爾文忠駐代縣遣將各出擒平章陳安禮瑪蘇翻於賽音布拉克斬其將珍珠律於順寧陽門二月癸亥臨江侯陳德獲韃靼圗嚕默色等九十七人於㑹寧諸處六安侯王志獲韃靼一百餘人於朔州諸處俱送京三月丁卯勑大將軍徐逹分布六安侯王志南雄侯趙庸駐山西榮陽侯楊璟汝南侯梅思祖駐北平屯種達與李文忠馮勝還京師乙亥蘭州巴特瑪民郭滿逹叛誘番兵入寇詔立賞格購捕之蘭州衛遣其兄扎實與其弟和斯台往招之郭滿逹不從扎實和斯台夜斬其首以歸事聞上曰滿逹罪固當死然為兄弟者告之不從執之而已手自刃之有乖大倫若賞之非所以令天下也但以所獲牛馬給之夏四月己亥都督僉事藍玉率兵攻興和元將托音特穆爾棄城走丙辰命宋國公馮勝衛國公鄧愈中山侯湯和鞏昌侯郭興復鎮北邊戊午都督僉事金朝興等獲元太尉盧巴延布哈平章特穆爾布哈等於黑城子等處河南都指揮使繆道獲元參政等官於升拉山等處而還秋七月曹國公李文忠督兵攻大寧髙州火石崖克之斬元宗王托多錫勒擒承㫖伯嘉努八月丙辰追擊之於豐州擒其帥十二人部衆百餘人馬駝牛羊萬計魯王敗走追斬之獲其妃䝉克及其印并斬其司徒塔斯哈平章巴圗知院呼圖等九月丁丑遣崇禮侯密迪哩巴拉北還上謂廷臣曰崇禮侯密迪哩巴拉南來五載能無父母鄉土之情於是厚禮而歸之選老成宦者二人送行復遺其父阿裕爾實哩達喇織文金綺錦衣各一襲辭行上諭之曰爾本元君子孫國亡就俘曩即欲遣歸以爾年幼道里遼逺恐不能達今既長成朕不忍令爾久客於此故特遣歸見爾父母以全骨肉之恩又諭二宦者曰此爾君之嗣也不幸至此長途跋踄爾善視之因遺書諭元主阿裕爾實哩達喇八年夏五月詔永嘉侯朱亮祖同潁川侯傅友德率師往北平備邊八月故元王巴拜卒巴拜自定西之敗走和林元嗣主復任以政後從徙金山之北至是卒於哈喇諾海之衙庭其妻毛氏亦自縊死上一日宴謂羣臣曰天下誰為男子者皆對曰無如常國公所將不過萬人而橫行無留陳上乃拊髀歎曰是遇春耶我得而臣之我竟無以臣王巴拜真男子也竟册其妹為秦王妃冬十二月癸巳元太尉納克楚冦遼東守將馬雲葉旺擊敗之先是上勑遼東都司曰今天寒氷結敵必乘時入冦宜堅壁清野以待之慎勿與戰使其進無可得退有後慮伏兵險阻扼其歸路可坐而致也至是果入冦都指揮使馬雲等探知納克楚將至命蓋州衛指揮吳立張良佐等嚴兵城守敵至堅壁勿戰及納克楚至見城中備禦嚴不敢攻乃越蓋州城徑趨金州時金州城垣未完軍士寡少指揮韋富王勝等聞冦至督勵士卒分守諸城門選精鋭登城以禦之納克楚禆將鼐喇固自恃其驍勇率數百騎徑至城下挑戰城上發弩射之鼐喇固被傷悶絶遂獲之冦勢大阻富等復縱兵出擊納克楚不利慮援兵且至引兵退走以蓋州有備不敢經其城乃由城南十里外沿祚河道歸都指揮葉旺䇿其將退先引兵趨祚河自連雲島至窟駝塞十餘里緣河叠氷為墻以水淋之經宿皆凝沍隱然如城藏釘板於沙中設陷馬穽於平地伏兵以待之命老弱卷旗登兩山間戒以聞炮即豎旗馬雲於城中亦立大旗令定遼前衛指揮周鶚及吳立等各嚴兵以候四顧寂若無人已而敵騎至旺等俟其過城南炮發伏兵四起兩山旌旗蔽空鼓聲雷動矢石雨下納克楚倉皇北奔趨連雲島遇氷城馬不能前皆陷入穽中遂大潰雲於城中亦出兵追擊至將軍山必里克河斬戮及凍死者甚衆旺等復乘勝追至猪兒峪獲其士馬無算納克楚僅以身免九年春正月擢馬雲葉旺都督僉事命中山侯湯和潁川侯傅友德帥師往延安防邊諭曰自古重邊防邊安則中國無事而四裔可以坐制今延安地控西北元騎聚散不常若待其入冦而後防之則塞上之民必將受害卿等至邊上當嚴為之備雖不見敵常若臨敵三月湯和等至延安元巴延特穆爾遣人請和上聞之召諸將悉還獨留傅友德屯邊以備之勑諭友德曰無事而請降兵法所戒爾其慎之四月巴延特穆爾果乘間犯邊傅友德設伏大敗之俘其衆獲馬畜輜重無算元平章烏納岱遂執巴延特穆爾以降十一月吐番所部川藏邀阻烏思藏使者掠其輜重命衛國公鄧愈為征西將軍都督沐英為副將軍率兵討之十年夏四月鄧愈沐英等至西番分兵為三道併力齊入番部川藏覆其巢穴窮追至崑崙山斬首無算俘男女一萬獲馬五千牛羊十三萬十一月都督濮貞征髙麗被執不屈死之已而髙麗龍川鄭白等來降勑遼東守將潘敬葉旺勿納以破其奸十一年春正月北平警五月元嗣君阿裕爾實哩達喇殂子特古斯特穆爾立秋八月西番洮州等處戎冦亂命西平侯沐英為征西將軍率都督藍玉等統兵征之首取朵甘降其萬户且達爾嘉依平其部落俘獲無算洮州十八族番鬼據納琳七站之地英進兵擊之十二年春二月戊戌命曹國公李文忠往河州岷州臨洮諸處督理軍務西平侯沐英兵至洮州番冦三副史阿卜薩等率衆遁去我軍追擊之獲磧石州叛逃土官阿禪七站土官實納等斬之遂於東隴山南川度地勢築城戍守遣使請事宜上曰洮州西番門户今築城戍守是扼其咽喉也遂命置洮州衛設官領兵守之英進擊西番擒三副使癭子等班師夏六月命都督馬雲率兵征大寧十三年春三月元國公托和齊知院阿珠屯和林為邊患命西平侯沐英總陜西兵討之由額齊納路渡黃河歷賀蘭山涉流沙至其境去營五十里英下令分軍為四一襲其背一掩其左右英率驍騎當其前夜銜枚以進合而圍之托和齊等駭惑不知所措皆俯首就擒獲其全部以歸十四年春正月戊子元平章鼐爾布哈等寇邊命大將軍徐達左右副將軍湯和傅友德率師討之夏四月達率諸將出塞友德為前鋒軍至北黃河敵駭遁友德選輕騎夜襲灰山克之擒其平章博囉布哈太史文通等沐英領兵出古北口獨當一面搗髙州嵩州全寧諸部過驢駒河獲知院李宣并其部衆而還十五年五月上聞士卒海運多溺死者命羣臣議遼東屯田十八年二月國子監祭酒宋訥獻守邊策大略謂備邊在足兵足兵在屯田宜選諸將軍智謀勇略者數人每將以東西五百里為制隨其髙下立法分屯布列緣邊之地逺近相望首尾相應遇敵則戰寇去則耕此長久之法也上嘉納之二十年春正月壬子朔命宋國公馮勝為大將軍潁國公傅友德為左副將軍永昌侯藍玉為右副將軍南雄侯趙庸定逺侯王弼為左參將東川侯胡海武定侯郭英為右參將率師北征納克楚上諭勝等曰納克楚詭詐未易得其虛實爾等且駐師通州遣人覘其出沒彼若在慶州宜以輕騎掩其不備既克慶州則以全師徑搗金山出納克楚不意必可擒矣既而復遣前所獲鼐喇固北還以書諭納克楚等二月甲申馮勝等兵至通州遣邏騎出松亭關聞敵騎有屯慶州者遣右副將軍藍玉將輕兵出關襲之殺其平章果囉擒其子布哷齊獲人馬而還三月辛未馮勝等率師出松亭關築大寧寬河會州富峪四城遂駐兵大寧夏六月庚午馮勝留兵五萬守大寧率大軍趨金山辛未上勑諭勝等納克楚去金山未逺以兵促之勢必來降且元主謂我得志無意窮追必順逐水草往來黑山魚海之間掩其無備彼衆可盡獲也丁酉勝等至遼河東獲納克楚屯卒三百人馬四百餘匹遂進師駐金山之西時鼐喇固還至松花河納克楚見之大驚相勞問鼐喇固因諭以朝廷送還之意納克楚喜即遣其左丞劉特默齊參政張德裕至軍門獻馬且因以覘我勝遣人送赴京師鼐喇固復備以撫恤之恩語其衆由是部落多有降意時臨江侯陳鏞所部與大將軍異道相失陷敵死之丁未勝等率師踰金山至女直若屯納克楚部將全國公觀童來降初納克楚分兵為三營一曰榆林深處一曰養鵝莊一曰龍安一秃河輜重富厚畜牧蕃息元主數招之不往至是大將軍逼之納克楚計窮鼐喇固因勸之降納克楚猶豫未决勝遣馬指揮往諭之納克楚乃遣使至大將軍營陽為納欵而更覘兵勢勝即遣藍玉往一秃河受之使還報納克楚指天嘖嘖曰天不復與我有此衆矣遂率數百騎詣藍玉降玉大喜出酒與之飲甚相歡納克楚酌酒酬玉玉解衣以衣之謂曰請服此而後飲納克楚不肯服玉亦持酒不飲爭讓久之納克楚取酒澆地顧其下咄咄語將脫去時鄭國公常茂在座其麾下趙指揮者解譯語以告茂茂直前搏之納克楚大驚起就馬茂拔刀砍之傷臂不得去耿忠遂以衆擁之見勝納克楚所部妻子將士凡十餘萬在松花河北聞納克楚被傷遂驚潰餘衆欲來追勝遣前降將觀童往諭之於是其衆悉降凡四萬餘羊馬駝驢輜重亘百餘里納克楚有二姪不肯降勝遣人諭之乃折弓矢於地亦來降勝以禮諭納克楚加慰諭令耿忠與同寢食遣使奏捷奏常茂驚潰降衆遂班師悉以納克楚來降將卒妻子及其輜重俱南行仍以都督濮英將騎兵三千為殿初納克楚之降也餘衆驚潰者皆竄匿及聞大軍還以其降衆俱行甚恨之乃設伏於途候大軍過而邀之英等後至伏發猝為所乘衆寡不敵英馬蹶被執英絶食不言乘間剖腹而死秋七月丁酉納克楚所部營王實喇巴圗等來降八月壬子上聞馮勝等在軍中多不律遣使戒諭之癸酉馮勝械常茂至京茂勝之壻也勝每於衆中卑折之茂不能堪出不遜語勝銜之及納克楚降而衆驚潰勝乃歸咎於茂奏之茂至陳所以降納克楚之故上曰如爾言勝亦不得無罪命收其總兵印召勝還令永昌侯藍玉總兵代之九月戊寅納克楚至京封為海西侯詔左副將軍傅友德遍集新附軍士駐兵大寧防寇丁未以永昌侯藍玉為大將軍延平侯唐勝宗武定侯郭英為左右副將軍都督僉事耿忠孫恪為左右參將率兵討殘元肅清沙漠冬十一月甲午藍玉奏元丞相哈喇章鼐爾布哈遁入和林乞進兵勦滅許之二十一年夏四月藍玉率師自大寧進至慶州聞元主特古斯特穆爾在捕魚兒海間道兼程而進乙卯師至百眼井去捕魚兒海四十餘里哨不見敵玉欲引兵還王弼曰吾等提十萬衆深入沙漠未見敵而班師何以復命玉然之弼復請戒諸軍皆穴地而㸑毋令敵望見烟火師遂進丙辰至捕魚兒海南飲馬偵知元主營在海東北八十餘里玉以弼為前鋒直薄其營敵始謂我軍乏水草不能深入不設備又大風揚沙畫晦軍行皆不知元主方欲北行整軍馬皆北向忽大軍至其太尉曼濟倉卒拒戰擊敗之殺曼濟其衆遂降元主特古斯特穆爾與其太子天保努知院伊竒哩丞相實勒們數十騎遁去玉率精騎追之不及獲其次子地保努等六十四人及故太子必里克圗妃并公主等五十九人其詹事院同知托音特穆爾將逃失馬竄草間擒之及追獲吳王多爾濟代王達爾瑪平章巴朗等二千九百九十四人軍士男女七萬七千三十七口得寶璽圖書金銀印章馬駝牛羊車輛各籍數入奏聚其甲兵悉焚之遂班師二十二年夏五月癸巳置太寧福餘諾延三衛於烏梁海以故元歸附阿爾斯蘭為泰寧衛指揮使達實特穆爾為指揮同知海蘇實勒為福餘衛指揮同知塔爾呼徹爾為諾延衛指揮同知各領所部以安畜牧秋七月元伊蘇岱爾弒其主特古斯特穆爾立昆特穆爾其部屬皆奔散元裔日微二十三年春正月命傅友德為大將軍率列侯趙庸曹興王弼孫恪等赴北平訓練軍馬聽燕王節制出征沙漠勑王弼以山西聽晉王節制三月燕王率傅友德等出古北口哨得鼐爾布哈等駐牧伊都遂進兵適大雪諸將欲止燕王曰天雨雪彼不虞我至宜乘雪速進癸巳遂抵伊都隔一磧敵不知也乃先遣指揮衮通徑詣其營衮通與鼐爾布哈有舊至則相抱持泣倉卒之頃我師已壓其營衆大驚鼐爾布哈等欲上馬走衮通諭以燕王至毋恐鼐爾布哈與俱詣軍門降燕王降辭色待之賜之酒慰諭遣還鼐爾布哈大喜過望於是悉收其部落馬駝牛羊而還報捷京師上大喜曰肅清沙漠者燕王也二十四年春三月元遼王阿拉克實哩冦邊命潁國公傅友德率列侯郭英等討之五月至和卓舍哩之道友德遽下令班師敵聞信之越二日忽趨師深入六月至黑嶺鴉山等處洮兒河獲人口馬匹駐師金鞍子山七月復征黑嶺寒山至磨鎌子哈喇津山追其渠卓多深入黑松林之地野人所居熊皮山追達勒達烏喇罕掩襲其衆大獲而還八月哈密寇邉命都督宋晟劉真率師討之九月晟等破哈密擒其王子伯勒齊爾豳王桑莭實哩知院嶽山等殺其國公阿都齊俘衆一千三百人二十五年夏四月凉國公藍玉率將士追逃寇祁濟遜遂進征西番罕東之地五月藍玉兵至罕東遣都督宋晟等狥阿真州土渠合咎等遁去尋奉詔移兵討建昌叛帥伊埒特穆爾秋七月癸未四川都指揮使瞿能率兵至雙狼寨攻破之擒僞千户段太平等其衆大潰伊埓特穆爾遁去能督兵追捕進攻托囉等寨拔之伊埒特穆爾復遁能轉戰而前破水寨關及上匾寨進至打冲河三里所與伊埓特穆爾遇大戰破走之俘其衆五百餘人溺死者千計獲牛馬無算官軍入德昌知府安德渡打冲河遁去能遂調都指揮同知陶凱分兵入普濟州搜捕之獲駕橋於打冲河遣指揮李華引兵追托囉寨餘孽進至水西斬伊埓特穆爾把事七人其截路寨土渠長沙納的等皆中兵死能還攻天星卧漂諸寨皆克之先後俘殺千八百餘人伊埒特穆爾復遁入柏興州九月罕西西番叛入冦命都督宋晟總兵討平之十一月甲午藍玉兵次柏興州遣百户毛海以計誘致伊埒特穆爾并其子胖其衆悉降送伊埒特穆爾至京師伏誅玉奏四川之境地曠山險控扼西番宜增置屯衛順慶府鎮禦巴梁大行諸縣其保寧千户所北通連雲棧宜改為衛漢州灌縣西連松茂硐黎當土番出入之地眉州控制馬湖建昌嘉定接山都長九寨俱為要道皆宜置軍衛下羣臣議行之都督周興帥兵討元逆臣伊蘇岱爾興追至察察爾山破之十二月壬申馮勝等奉命率列侯籍太原平陽民為兵伍置衛屯田東勝立五衛大同立五衛大同迤東立五衛衛五千六百人二十九年春三月寧王權言騎兵巡塞見有脫輻遺道上恐敵兵往來有盜邊之舉上曰狡寇多奸此必示弱誘我軍耳於是勑燕王選精卒抵大寧沿河南北覘北兵所在隨宜掩擊甲子燕王率諸軍北至察察爾山遇元兵與戰擒其將索琳特穆爾等數十人追至烏蘭和屯城遇烏蘭鄂罕戰敗之三十年春正月命耿炳文郭英巡西北備邊五月己巳勑晉燕代遼寧谷六王勒兵備邊戒勿輕戰俟敵分散驕怠邀截要路擊之三十一年夏四月命燕王率諸王防邊勑曰北騎南行不寇大寧即襲開平可召西凉都指揮張文傑莊得開平都督宋真宋晟遼東武定侯郭英等皆以兵會遼王以護衛軍悉數北出山西北平亦然令郭英宋真宋晟翼於左莊得張文傑翼於右爾與代遼寧谷五王居其中彼此相護首尾相救兵法示飢而實飽外鈍而內精爾其察之五月戊午勑左軍都督楊文往北平并燕谷寧三府精鋭往開平從燕王防邊勑郭英總兵往遼東隨遼王屯開平迤北險要防邊仍聽燕王節制乙亥命燕王總帥諸王防邊勑曰朕觀成周之時天下治矣周公告成王曰詰爾戎兵安不忘危之道也朕之諸子汝獨才智秦晉已薨汝實為長攘外安內非汝而誰爾其總率諸王相機度勢用防邊患奠安黎民以答上天之心以副吾付托之意其敬慎之毋怠谷應泰曰塞下之險東起開鐵北歷喜峰西亘偏頭五灰相距二千二百里而遙乃欲阻長城而堵之列亭障而蔽之設險守國蓋其難哉若夫髙皇之定天下也與漢唐異漢唐之主所稱勝國之孽者悉中原之人耳乾符一御醜類盡殱寶籙攸歸餘裔革面然而漢圍白登唐苦突厥內地既輯邊患乘之强弩之末殊未可以易視也又况順帝北出漁陽旋輿大漠整復故都不失舊物元亡而實未始亡耳於時呼達一軍駐雲州王巴拜一軍駐薩里台納克楚一軍駐金山實喇罕一軍駐西凉引弓之士不下百萬衆也歸附之部落不下數千里也資裝鎧仗尚賴而用也駝馬牛羊尚全而有也假令蹛林祭纛大舉報仇田單一鼓而下齊申胥七日而救楚豈得云惰歸之氣沒世不復歟然而太祖之攻之也分兵二道一出西安以搗定西一出居庸以搗沙漠則雲中鴈門之勢斷矣及其再舉也分兵三路徐達出中路李文忠出東路馮勝出西路則盧龍榆關之援又絶矣而且築東勝之險是南仲之城朔方也設屯田之利是充國之守金城也宜乎左丞右帥東底開平鄧愈沐英西臨弱水雖貮師之入大宛張騫之通屬國其長駕逺馭未有若斯之極也厥後應昌之捷默德就俘武平之戰惠儲歸命於是犁幕南而無庭過隂山而慟哭元氏舊墟幾乎盡矣至於設伏馬陵揚水疏勤則桑嘉勒之跑地槖駝塞之氷城似有神助功亦爛焉若夫燕雲割棄四百餘年石晉以來復還版圖豈景純定限南北更合將衛霍樹績王者無外耶明史紀事本末卷十
