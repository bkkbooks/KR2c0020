body:
  text: 明史紀事本末卷八浙江提學僉事谷應泰編北伐中原元順帝至正十九年九月明太祖遣千户王時往方國珍所附海舟至元都偵察元政及察罕特穆爾李思齊軍馬情形時察罕克汴梁平山西秦隴等處遂分兵鎮守關陜荆襄河洛而重兵屯太行日練兵積榖謀恢復山東軍聲大振故遣時往探之二十一年八月復遣都事汪河使元通好察罕特穆爾時察罕用兵山東招降東平田豐樂安俞寶等其勢頗盛上謂左右曰察罕特穆爾雖假義師圖恢復乃與博囉特穆爾兵爭不解屢格君命此豈忠臣所為乎又聞其好名如田豐傾側亦復待以腹心則昧于知人矣吾今遣人往與通好觀其行事然後議焉二十三年春正月元平章庫庫特穆爾遣使來通好庫庫察罕甥王保保也察罕養為己子先是察罕駐汴梁太祖嘗遣使通好既而察罕亦以書來聘太祖以前所遣使不還不之答察罕尋為叛將田豐王士誠所刺庫庫代領父衆乃遣尹煥章送我使者自海道還太祖復遣都事汪河與俱往報禮河至河南庫庫留之拘于陜州踰三年始得還以為吏部侍郎二十六年夏四月壬戌元徐州守將樞密同知陸聚聞徐逹等已克淮安以徐宿二州詣逹軍降太祖嘉其識天命命為江淮行省參政仍守徐州於是邳蕭宿遷睢寧諸縣皆降秋九月上遣書送元宗室神保大王及黑漢等九人於元主吳元年元至正二十七年也春正月遣使以書諭元庫庫特穆爾先是使臣汪河為庫庫所拘留太祖以書諭之不報至是復與之書略曰豫自起義以來拓地江左閣下之先以興復為名提兵河北古人朝聘往來不過將道誠意今汪河去而不返是所拘者少所失者大也閣下地非不逺兵非不多所慮者張思道操刃于潼關李思齊抗衝于秦隴俞寶畜變于肘腋王信生釁于近郊閣下自以功成安如泰山坐使羣雄連結禍機一發首尾莫救此深為閣下惜所以數使遣人奉書瀆聽者是豫欲盡一得之愚於閣下閣下何為自矜倘能遣使刻日將命以汪河錢禎等還豈惟不失前盟亦可取信天下如其不然我則命襄陽之師經唐鄧之郊北趨嵩汝以安陸沔陽之兵掠德安向信息使安豐濠泗之將自陳汝搗汴梁徐邳之軍取濟寧淮安之衆約王信海道舟師㑹俞寶同入山東此時閣下之境必至土崩瓦解是又開我南國之兵端為彼後日之戰禍閣下其審思之毋貽後悔命傅友德守徐州二月丁未元庫庫特穆爾遣驍將左丞李二來冦兵駐陵子村友德堅壁俟其出掠乃將步騎三千餘溯舟至吕梁捨舟登陸擊之李二遣禆將韓乙盛兵迎戰友德躍馬奮槊刺韓乙墜馬敗去友德度李二必益兵來鬬趨還城開門出兵陳於城外令士卒皆卧鎗以待聞鼓聲即起擊有頃李二果率衆至友德令鳴鼓我師奮起衝其前鋒李二衆大潰溺死無算遂生擒二獲其將士二百餘人馬五百匹擢友德江淮行省參知政事十月甲子太祖命將北取中原謂信國公徐逹等曰自元失其政生民塗炭豫與諸公仗義而起冀有奠安生民者出豈意大難不解為衆所附遂平陳友諒滅張士誠閩廣之地將以次而定尚念中原擾攘山東則有王宣父子反側不常河南則有王保保上疑下叛關隴則有李思齊張思道彼此猜忌與王保保互相嫌隙元之將亡其機在此今欲命諸公北伐計將何如遇春對曰今南方已定兵力有餘直搗元都以我百戰之師敵彼久逸之卒可挺竿而勝也都城既克乘勝長驅餘皆建瓴而下矣太祖曰元建都百年城守必固若如卿言懸師深入頓于堅城之下餽餉不繼援兵四集非我利也吾欲先取山東撤其屏蔽旋師河南斷其羽翼拔潼關而守之據其户檻天下形勢入我掌握然後進兵元都則彼勢孤援絶不戰可克既克其都鼓行而西雲中九原以及關隴可席卷而下諸將皆曰善太祖因顧逹曰兵法廟算勝者得算多也於是命徐逹為征北大將軍常遇春為征北副將軍率甲士二十五萬由淮入河長驅北伐復召諸將諭之曰征伐所以奉天命平禍亂故命將出師必在得人今諸將非不健鬬然能持重有紀律戰勝攻取得為將之體者無如大將軍逹當百萬之衆勇敢先登摧鋒陷陳所向披靡無如副將軍遇春然吾不患遇春不能戰但患其輕敵耳吾前在武昌親見遇春才遇數騎挑戰即輕身赴之彼陳氏如張定邊者何足稱數尚據城指揮遇春為大將顧與小校爭能甚非所望切宜戒之若遇大敵遇春領前鋒當與參將馮宗異分左右翼各將精鋭擊之右丞薛顯參政傅友德勇略冠諸軍可使獨當一面或有孤城小敵但遣一將有膽略者付以總制之權皆可成功逹則専主中軍䇿厲羣帥運籌决勝不可輕動古云將在軍君不御者勝汝等其識之又謂傅友德曰此行汝當努力昔漢髙祖與項羽爭衡彭越宣力于山東今用師自山東始汝其勉之是日太祖親祭上下神祗于北門之七里山祝畢復召將士諭之曰此行非必略地攻城要在削平禍亂以安生民凡遇敵則戰若所經之處及城下之日勿妄殺人勿奪民財勿毁民居勿廢農具勿殺耕牛勿掠人子女或有遺棄孤幼在營父母親戚來求者即還之丙寅馳檄諭齊魯河洛燕薊秦晉之人檄曰自宋祚傾移元主中國此豈人力實乃天授自是以後元之臣子不遵祖訓廢壞綱常有如大德廢長立幼秦定以臣弒君天歷以弟鴆兄至于弟收兄妻子蒸父妾上下相習恬不為怪夫君人者斯民之主朝廷者天下之本禮義者御世之防其所為如彼豈可為訓于天下及其後嗣荒淫失道加以宰相擅權憲臺報怨有司毒虐於是人心離叛天下兵起使我中國之民死者肝腦塗地生者骨肉不保雖因人事所致實天厭其德而棄之也當此之時天運循環億兆之中當降生聖人立綱陳紀救濟斯民今一紀于兹未聞有濟世安民者徒使爾等戰戰兢兢處於朝秦暮楚之地誠可矜憫方今河洛關陜雖有數雄阻兵據險互相吞噬皆非人民之主也豫本淮右布衣因天下亂為衆所推率師渡江居金陵形勢之地得長江天塹之險今十有三年西抵巴蜀東連滄海南控閩越湖湘漢沔兩淮徐邳皆入版圖奄及南方盡為我有民稍安食稍足兵稍精控弦執矢日視我中原之民久無所主深用疚心豫恭承天命罔敢自安方欲遣兵北伐拯生民於塗炭復漢官之威儀慮民人未知反為我讐挈家北走陷溺尤深故先諭告兵至民人勿避豫號令嚴肅無秋毫之犯爾民其體之十一月壬子克沂州初揚州興化人王宣元末為司農掾治河有功命為招討使從伊蘇復徐州授義兵都元帥宣子信從察罕特穆爾破田豐復令宣與信還鎮沂州至是逹師至淮安以書諭宣父子使降信得書遣使納欵太祖遣徐唐臣等至沂州授信江淮平章政事令以兵從大將軍征討宣父子陰持兩端乃令信密往莒密募兵而遣人詐犒師以緩我軍逹受而遣之使還宣即以兵夜劫徐唐臣欲殺之衆亂唐臣脫身走逹軍逹即日率師抵沂州分兵急攻之都督馮宗異令軍士開壩放水宣自度不能支開門降逹令宣為書遣鎮撫孫惟德招降信信不從殺孫鎮撫走山西於是嶧州趙蠻子莒州周黼海州馬驪及沭陽日照贑榆諸縣并隨信將士皆來降逹以宣反覆執而戮之命韓溫守沂州太祖遣使諭逹曰聞將軍已下沂州如向益都當遣精鋭扼黃河要衝斷其援兵可以必克若益都未下即宜進取濟寧濟南二城既下益都山東勢窮力竭如囊中物矣逹命平章韓政略榆行梁城諸鎮寨繼又令政分兵扼黃河以斷山東援兵政遣千户趙實略滕州元守將楊知院遁去逹進攻益都路宣慰使布延布哈捍城力戰不能支城陷還與母訣曰兒不能兩全忠孝矣逹聞其賢遣使召之不往被執不屈與總管胡濬知院張俊俱死之布哈妻阿嚕章亦抱其子女投井死執其平章婁博囉白知縣等獲士馬兵糧以萬計十二月丁未都督同知汪興祖師至東平元平章馬德棄城走興祖遣指揮常守道千户許秉進至東阿元參政陳璧以所部五萬餘人降秉復以舟師趨安山鎮元右丞杜天祐左丞蔣興皆降徐逹至濟南元平章和琳台詹同托音特穆爾先驅人民引軍遁阿爾布逹多爾濟津巴等以城降得將士三千八百五十五人馬四百二十九匹命指揮陳勝守之庚戌汪興祖至濟寧元守將陳秉直棄城遁甲子徐逹遣參政傅友德取萊陽丙辰上復遣使諭逹遇春曰聞大軍下山東所過郡縣元之省院官降者甚多二將軍皆留于軍中吾慮其雜處或晝遇敵或夜遇盜將變生不測非我之利蓋此輩初絀于勢力未必盡得其心不如遣之使來處我宦屬之間日相親近然後用之方可無患若濟寧東平諸來歸將士家屬亦發遣來將厚待之太祖洪武元年二月癸邜詔湯和還明州造海舟漕運北征軍餉都督同知康茂才率師往濟南從大將軍逹北征癸丑常遇春克東昌元平章申榮自經死荏平等縣皆降丙寅徐逹平樂安初樂安俞勝納欵逹禮而遣之勝歸復叛逹進攻之師至土河距樂安五里命軍士填壩以進郎中張仲毅出降勝遁去逹命指揮華雲龍守之戊子命中書省給榜撫安山東郡縣時山東悉平令所在訪賢才凡仕元者疑懼不自安故榜諭之丙申上别命征南將軍鄧愈帥襄陽安陸景陵等處兵北略地愈遣别將王成李廷琛攻唐州克之進取南陽路擒其將史國新徐逹引兵上黃河克永城歸德許州師至陳橋己亥左君弼珠徹以汴梁降先是君弼自唐州走安豐安豐復走汴梁元汴梁守將李克彛使守陳州上遣使諭以書曰曩者兵連禍結非一人之失豫勞師暑月與足下從事足下乃舍其親而奔異國是皆輕信羣下之言以至于此今足下奉異國之命與豫接壤若欲興師侵境其中輕重自可量也且豫之國乃足下父母之國合肥乃足下丘隴之鄉天下兵興豪傑並起豈惟乘時以就功名亦欲保全父母妻子于亂世足下以身為質而求安于人既已失䇿復使垂白之母糟糠之妻天各一方以日為歲足下縱不以妻子為念何忍忘情于老母哉功名富貴可以再圖生身之親不可復得足下能留意于是幡然而來豫當棄前非仍復待以故君弼得書猶豫不能决上乃歸其母于陳州君弼感泣至是大兵下山東西指汴洛克彛夜驅軍民遁入河南君弼與珠徹等率所部兵詣逹降逹命都督僉事陳德守汴梁率步騎自中灣進取河南彗星出昴北夏四月徐逹率大軍自虎牢關進至河南塔兒灣元將托音特穆爾以兵五萬迎戰列陳于洛水之北我軍既成列常遇春單騎執弓矢衝入其陳敵發二十騎攢槊刺遇春遇春發一矢斃其前鋒大呼殺入逹指揮乘之俘斬無算托音特穆爾將散卒走陜州逹遂進營于河南城北門李克彛復走陜西元河南行省平章梁王阿嚕威送欵軍門戊申河南平逹命左丞趙庸守之壬子副將軍常遇春率兵至嵩州守將李知院迎降甲寅入其城分兵下未附諸山寨戊子元鞏縣孟夏寨參政李成降庚申元福昌知院張興鈞州守將哈喇婁許州右丞謝李陳州知院楊崇各遣人詣大將軍降辛酉參政傅友德分兵取福昌山寨元右丞潘瑪勒降副將軍常遇春下海州留兵守之遂徇下郟縣壬戌都督同知馮宗異克陜州元守將托音特穆爾復棄城遁以都督同知康茂才守之大軍克裕州執元守將平章郭雲雲勇敢有謀略時河南諸郡皆下獨雲守裕州纍戰不克招之不從後以孤軍敗被執上嘉其忠義釋而用之詔免山東夏稅秋糧中原兵難之後流離失業者多遣使賑恤甲子車駕發京師幸汴梁時言者謂君天下宜居中土汴梁宋故都勸帝往視之且㑹大將軍謀取元都五月庚午大將軍徐逹遣指揮王臻帥兵往虢州取毛葫蘆山寨甲申登封鞏縣雞翎山并天堂山寨復叛徐逹遣指揮豐諒率兵討平之指揮任亮克露豹王山等寨參政傅友德取凌青黑山二寨庚寅車駕至汴梁辛邜常遇春馮宗異至行在謁見徐逹尋自河南至上皆慰勞之逹等頓首謝既退上復召問逹取元都計逹對曰臣自平齊魯下河洛王保保逡巡太原觀望不進今潼關又為我有張良弼李思齊失勢西竄元之聲援已絶臣等乘勢搏其孤城必克無疑上據圖指示曰卿言固是然北土平曠利騎戰不可無備宜選禆將提兵為先鋒將軍督水陸之師繼其後下山東之粟以給饋餉由秦趨趙轉臨清而北直搗元都彼外援不及內自驚潰可不戰而下逹受命退丁酉以江西行省左丞何文輝守河南任亮守嵩州都督同知康茂才兵至河北安邑夏邑皆降七月鄧愈進兵克隨州元守將右丞王誠降壬午新寨瑪展等叛愈遣指揮吳復討平之時潼關以東悉平上命諸將還師進取元都上將發汴梁大將軍徐逹等自陳橋入辭諭之曰朕與公等率衆渡江誓除禍亂以安天下士卒舍父母妻子戰鬬于矢石之間百死一生久未休息朕每念之惕然于中非得已也今中原之民久為羣雄所苦死亡流離遍于道路天監在兹朕不敢忘故命爾等帥師北征拯民水火昔元祖入主中國子孫怠荒罔恤民艱天厭棄之君則有罪民復何辜前代革命之際兵戈相加視如仇讐朕實不忍爾諸將帥克城之日毋虜掠毋焚蕩毋妄殺人必使市不易肆民安其生凡元之宗戚皆善待之庶幾上答天心下慰人望以成朕伐罪救民之志有不恭命必罰無赦丙申車駕發汴梁還京師以副將軍馮宗異留守徐逹遂檄都督同知張興祖平章韓政都督副使孫興祖指揮髙顯等將益州濟寧徐州之師㑹于東昌元大都紅霧及黑風起閏七月徐逹等分布士馬規取河北遂自中灣渡河庚子右丞薛顯參政傅友德兵至衛輝元守將平章龍二棄城走彰德辛丑徐逹等師至淇門鎮傅友德獲嘉縣尹胡仲信逹命從鎮撫王處仁守衛輝癸邜師至彰德龍二復出走陳同知等詣軍門降逹令左丞楊思祖守之明日龍二部將楊義卿以船八十艘來歸遂下磁州進攻廣平元平章周昱棄城遁邯鄲尹都文玉率父老降克趙州獲元將候僉院等己酉進次臨清遣人詣東昌趨都督同知張興祖以師來㑹又檄守樂安指揮華雲龍將兵從征庚戌傅友德游騎獲元將李寶臣都事張處仁以為鄉道逹因遣友德開道通步騎都督副使顧時浚閘通舟師時諸將駐臨清久知府方克勤籌應芻糧無匱乏朱亮祖勒民夫五千濬河克勤不忍勞民泣禱于天天大雨水漲舟遂行癸丑平章韓政都督副使孫興祖俱以師㑹臨清於是大將軍徐逹率馬步舟師北發命韓政守東昌并鎮撫臨清逹師至德州常遇春張興祖及指揮髙顯毛讓程華等皆㑹戊午逹等師至長蘆元守將左僉院遁去逹命指揮費子賢守之分兵徇下青州師至直沽獲其海舟七艘造浮橋濟師常遇春張興祖各率舟師並河東西以進步騎遵陸而前元丞相伊蘇等捍禦海口望風奔潰元都大震癸亥大將軍徐逹等師至河西務大敗元平章阿爾布逹多爾濟津巴擒其知院海拉蘇等三百餘人逹進兵至通州營于河東岸常遇春營于河西岸衆欲速攻之指揮郭英曰吾師逺來敵以逸待勞攻城非我利也宜出其不意攻之翼日大霧英以千人伏道旁率精騎三千直抵城下元將五十八國公率敢死士萬餘張兩翼而出戰良久英佯敗敵乘勝來追伏兵起截其軍為二斬首數千級擒其將巴延特穆爾丙寅逹率諸將入通州是月二十七日也元主聞報大懼集后妃太子議避兵北行遲明召羣臣㑹議端明殿時元都再遭博囉庫庫之變民生喪亂守備多不設元主徘徊嘆息曰今日豈可復作徽欽遂决計北徙左丞相實勒們知樞密院事哈斯等皆勸固守京城不聽命淮王特穆爾布哈監國丞相强通留守是夜三鼓元主及后妃太子開建德門由居庸北走如上都八月二日庚午徐逹等進師取元都至齊化門將士填壕登城而入逹登齊化門樓執其監門宗室淮王特穆爾布哈及太尉中書左丞相强通平章德哷默色保賽音布哈右丞相張康伯御史中丞穆徹等戮之并獲宣府鎮南威順諸王子六人及玉印二成宗玉璽一封府庫圖籍寶物及故宫殿門以兵守之宫人妃主令其宦寺護視號令士卒無侵暴人民安堵逹下令凡元朝大小諸臣皆令送告身于官署民籍中違者有罰元翰林待制黃殷仕欲投井為其僕所守乃紿僕曰吾甚愧何從得酒醉而出見可也其僕喜入市取酒殷仕遂投井死左丞丁敬可總管郭允中皆死之學士危素寓僧寺亦欲赴井一僧止之曰公死亡國史也遂往見逹明日順德守將吉右丞胡參政鄭參政皆自西山來降武德衛軍校獲前樂安逃將俞勝及南參政張郎中等逹遣將赴京獻捷仍命薛顯傅友德曹良臣顧時等將兵偵邏古北諸隘口甲戌徐逹遣人詣東昌令韓政分兵守廣平徐逹遣指揮華雲龍經理故元都新築城垣張興祖徇永平路下之癸未詔大將軍徐逹改飛熊衛為大興左衛淮安為大興右衛樂安衛為燕山左衛濟寧衛為燕山右衛青州衛為永清左衛徐州五所為永清右衛留兵三萬人分𨽻六衛命都督副使孫興祖僉事華雲龍守北平大將軍徐逹副將軍常遇春等率大軍往取山西二年二月庚辰元丞相伊蘇侵通州時城中守兵僅千人伊蘇萬騎營于白河守將曹良臣謂其部下曰吾兵少不可與戰彼衆雖多然亡國之後屢挫之兵可以計破也乃密遣指揮許勇等于沿河舟中各樹赤幟亘三十餘里鉦鼓之聲相聞伊蘇望之驚遁大將軍逹承制遣楊璟等還征唐州先是鄧愈下唐州以宋指揮守之尋唐州兵亂賊將老馬劉及南陽郡縣皆相應事聞故有是命璟至南陽攻唐州一鼓破之戮其首惡南陽復平六月元伊蘇復侵通州上命常遇春以所部軍自鳯翔還禦之復命李文忠為偏將軍副遇春自北平往開平道三河經鹿兒嶺過㑹州敗元將江文清于錦川得士馬以千數次全寧伊蘇復以兵迎戰又敗之伊蘇遁進攻大興州文忠䇿其必走乃分兵千餘為八屯伏其歸路伊蘇果夜遁遇伏大敗走擒其丞相托和齊遂帥兵道新開嶺進攻開平元主先已北走追奔數百里俘其宗王慶生平章鼎珠等斬之凡得將士萬人車萬輛馬三萬匹牛五萬頭薊北悉平改元都為北平府谷應泰曰髙帝起淮右布衣定鼎金陵削平吳漢奄有荆楚開拓閩越固已志清中原之民氣吞大河之北矣吳元年遂命徐逹常遇春大舉六師奉辭伐罪乃不鼓我朝鋭直搗幽燕而先取山東撤其屏蔽轉戰河南斷其羽翼再取潼關據其户檻然後彈丸孤城所向必克猶之酈生說漢首下陳留光武滅新先收宛雒蓋論事者動言髙皇之英武而不知平生之謹慎也至若虓虎之臣貔貅之佐莫不汗馬功髙風雲氣壯以故塔兒灣之捷河西務之捷通州開平之捷比之垓下合圍悲歌四起昆陽大戰屋瓦皆飛固宜開國承家勒銘鐘鼎者矣然夷考其時大軍戡定者猶少先聲歸命者更多於凡青徐各郡千里扶携兖豫諸司百城分潰東河茌平小邑也而降濟南汴梁巖城也而亦降馬德陳秉漢人也而遁和琳托音元人也而亦遁蓋以其時乾綱廢弛羣情竄散柄臣尾大既誅帝后東宫腦滿擅討憸邪以至開河起大業之愁鼓楫有海山之戲又且列圖素女拱手望夷日肆慆淫坐視瓦裂太祖之興豈非天之所啓乎况乎禡牙北出伐亂救民屢詔軍中勿妄誅戮破都之日市不易肆彼以暴吾以仁彼以昏吾以義克紂都而去殷弊政入咸陽而除秦苛法從知天命之有歸乃在人心之豫附矣若乃㑹議端明棄同甌脫叔寶全無心肝紀侯大去其國審德量力吾何責焉獨是巴延入宋妃后皆俘明室破元嬪嬙不御忠厚開基又何必天道之好還也明史紀事本末卷八
