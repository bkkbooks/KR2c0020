body:
  text: 明史紀事本末卷七十二浙江提學僉事谷應泰編崇禎治亂熹宗天啓七年八月上不豫時魏忠賢張甚中外危栗上召信王入見諭以吾弟當為堯舜之君信王惶恐不敢當但云陛下為此言臣應萬死信王出上崩忠賢自出請王入王危甚袖食物以入不敢食大官庖也當是時羣臣無得見王者王秉燭獨坐久之見一奄攜劒過取視之留置几上許給以賞聞巡邏聲勞苦之問左右欲給以酒食安從取乎侍者以宜問之光祿寺傳令旨取給之歡聲如雷次日即皇帝位於中極殿受百官朝毋賀朝時忽天鳴九月諭停刑十一月魏忠賢客氏伏誅罷各道鎮守內臣戶部郎中劉應遇上言天下六大苦一逮繫二獄死三追贓四仕途去就五新進禁錮六廷臣被劫上然之命逮死各臣贓銀盡免之釋其家屬魏崔黨次第伏誅時魏璫甚熾帝不動聲色逐元凶旁無一人之助而神明自運宗社再安崇禎始政天下翕然稱之工部尚書楊夢寰請停開納事例廷推閣員以錢龍錫楊景辰來宗道李標周道登劉鴻訓為禮部尚書東閣大學士罷蘇杭織造諭曰封疆多事征輸重繁朕甚憫焉不忍以衣被組繡之工重困此一方民其俟東西底定之日方行開造以稱朕敬天恤民至意十二月復故建文臣練子寧官南京御史劉漢言四事崇正學以培治本勵廉恥以清仕路惜名器以尊體統重耕農以節財用上是之命吏部嚴加清汰凡會典額外官添注添設者有闕勿推補文臣非臺卿武臣非勛爵總兵非實有戰功者不得加保傅銜上御便殿閲章奏聞香煙心動疑之出步階墄間乃定詢內官此自何至曰宫中舊方上叱令毁之勿復進太息曰皇考皇兄皆為此誤也愍帝崇禎元年春正月禁衣飾侈僣及婦女金冠袍帶等從御史梁天竒之言也命司禮監斥賣魏忠賢田宅因以賜第請上曰俟東西底定留賜第以待功臣榜曰䇿勳府二月以侍讀學士溫體仁直經筵日講三月以周延儒為禮部右侍郎五月上召廷臣於平臺諭輔臣來宗道曰票擬之事宜悉心商確諭吏部曰起廢太多會推宜慎責戶部措辦邊餉無術侍郎王家禎引罪論邊事兵部尚書王在晉語未詳命中官給筆札録進諭刑部曰天時亢旱用法宜平允次日復諭吏戶兵三部曰昨召對九卿科道官輔臣劉鴻訓言更調甚速宜行久任之法責實效又云海內罷於賦役朕甚憫之夫更調速則民滋擾任事久則功易成自今藩臬郡邑毋輕改調言官薦舉人才市私恩坐之遼黔兵興催科日益加其有司私徴者撫按禁飭毋貸六月上召廷臣於平臺以插漢故發帑十萬給邊吏刑科給事中薛國觀疏營伍之弊令自宣讀至關門虛冒上善之復示諸臣召提督京營保定侯梁世勛戒以訓練已命翰林官凡值召對入侍記注戶科給事中黃承昊上言祖宗朝邊餉止四十九萬三千八十八兩神祖時至二百八十五萬五千九百餘先帝時至三百五十三萬七千七百餘其他京支雜項萬厯間嵗放不過三十四萬一千六百餘邇來至六十八萬二千五百餘今出數共五百餘萬而嵗入不過三百二三十萬即登其數已為不足而重以逋負實計嵗入僅二百萬耳戍卒安得無脫巾司農安得不仰屋乎乞敕各邊督撫清核歷年增餉至京支雜項亦令各衙門自加嚴汰又先臣葉淇變鹽法改折色以至邊粟踊貴必復祖制開中輸邊之法西北多曠土責有司開荒以足軍餉上納之召廷臣於平臺以御史吳玉錢糧積弊疏宣示閣臣問何不指名也玉對曰此夙弊非獨一人一事無可指名出黃承昊疏問戶部侍郎王家禎何濫增至此曰皇祖入數多出數少故太倉粟紅朽內帑又無算後邊臣隨請隨給出入不相凖又讀至鹽法閣臣請復祖制關屯種引上然之出宣府巡撫李養沖疏云旗尉往來如織不賂之恐毁言之日至賂之愁物力之難勝上不懌兵部尚書王在晉曰大同焚掠宜以按臣勘不煩旗尉上曰疆事仗一喇嘛僧講欵諸文武何為敵不輕中國耶諸臣退時大同以插漢講欵不設備故上責之戶科給事韓一良上言皇上召對平臺有文臣不愛錢之語然今之世何處非用錢之地何官非愛錢之人向以錢進安得不以錢償臣起縣官居言路以官言之則縣官行賄之首而給事為納賄之魁今言蠧民者俱咎守令之不廉然守令亦安得廉俸薪幾何上司督取不曰無礙官銀則曰未完紙贖衝途過客動有書儀考滿朝覲不下三四千金夫此金非從天降非從地出而欲守令之廉得乎科道號為開市臣兩月來辭金五百臣寡交猶然餘可推矣乞大為懲創逮其已甚者使諸臣視錢為汚懼錢為禍庶幾不愛錢之風可覩也上召廷臣於平臺命一良誦前奏嘉奬之擢一良右僉都御史八月諭曰朕欲與大小臣工日籌庶務而諸司各有職掌恐不暇給惟是輔臣左右拂豫自今非盛暑祁寒朕當時御文華殿閲章奏丁未上御文華殿翰林科道各二人備宣讀中書舍人二人侍班十月己丒召廷臣於平臺以錦州軍譁袁崇焕請餉疏示閣臣閣臣求允發上責戶部尚書畢自嚴禮部侍郎周延儒曰關門昔防敵今且防兵前寧逺譁錦州尤而效之未知其極上問延儒若何對曰臣非阻發帑雖豫之當益求經久之䇿上稱善又責科道官言事失實即召對商確徒具文耳諸臣俱愧謝十一月辛未召寧陽侯陳光裕襄城伯李守錡清平伯吳遵周誠意伯劉孔昭於文華殿問京營整理何若各有所對上以守錡總督京營十二月己丑大學士韓爌入朝二年夏四月時秦晉飢盜起朝臣捐俸助餉上曰諸臣興利除害國家受益多矣何必言助六月御史李長春論周延儒有私不聼九月順天府尹劉宗周上言陛下勵精求治召對文華殿躬勤細務朝令夕考庶幾太平立至然程效過急不免見小利而慕近功夫近日所汲汲於近功者邊事也竭天下之力以養飢軍而軍愈驕聚天下之軍以冀一戰而戰無日此計之左者矣今日所規規於小利者理財也民力已竭司農告匱而一時所講求者皆聚斂之術水旱災傷一切不問有司以掊克為循良而撫字之政絶大吏以催科為殿最而黜陟之法亡赤子無寧歲矣頃者嚴贓吏之誅自執政以下坐重典者十餘人可謂得救時之權然貪風不盡息者由於道之未盡善而功利之見不泯也十一月河南府推官湯開逺言皇上急於求治諸臣救過不給臨御以來明罰敕法自小臣以至大臣與衆推舉或自簡拔亡論為故為誤俱褫奪配戍不少貸甚者下獄考訊幾于亂國用重典矣皇上或以薦舉不當疑其黨徇四嶽不薦鯀乎績用弗成初未併四嶽殛之也皇上又以執奏不移疑其藐抗漢帝不從廷尉之請乎亦以張釋之曰法如是止耳不聞責其逆命也皇上以䇿勵望諸臣於是多戴罪夫不開以立功之路而僅戴罪戴罪無已時矣皇上以詳慎望諸臣於是有認罪夫不晰其認罪之心而槩以免究認罪亦成故套矣侵糧欺餉之墨吏逮之宜也恐夷由之侣不皆韓范宜稍寬之不以清吏詘能臣今諸臣怵於參罰之嚴一切加𣲖帶征餘征行無民矣民窮則易與為亂皇上寬一分在臣子即寬一分在民生如此則諸臣可幸無罪而尤望皇上宫府之際推諸臣以心進退之間與諸臣以禮錦衣禁獄非有冦賊姦宄不可入而謂大小臣工不圖報為安攘者未之有也十二月進禮部侍郎周延儒為禮部尚書東閣大學士三年春正月甲申召戶兵工各科於會極門令注銷案牘各委給事中一人清理六曹勒期奏報前尚寶司卿原抱竒劾大學士韓爌致冦爌致仕歸復故大學士張居正廕賜故都督戚繼光表忠祠六月進禮部尚書溫體仁東閣大學士四年春正月刑科給事中吳執御言理財加𣲖不得已而用之未有年餘不罷者捐助搜括二者猶難為訓上曰加𣲖原不纍貧捐助聼之好義惟搜括滋姦若得良有司奉行亦豈至病民乎不聼上召廷臣及各省監司於平臺問浙江按察副使周汝弼浙閩相連海冦備禦之䇿對曰去秋冦犯海上五日即去問江西布政使何應瑞爾省宗祿何以不報應瑞曰江西山多田少瘠而且貧撫按查核有司尚未報耳問湖廣右布政使杜詩爾楚去夏民變樹幟何也詩曰樹幟之後地方仍安問福建布政吳暘陸之祺海冦備禦若何暘曰海冦與陸冦不同故權撫之但官軍狃撫為安賊又因撫益恣故數年未息耳上問實計安在祺曰海上官兵肯出死力有司練鄉兵築城要地多設火器以戰為守此上䇿也問河南布政楊公翰賈鴻洙以收稅耗重宜斥有司鴻洙曰近奉上命已革去矣問廣東布政陳應元焦元溥曰爾省所負宣大兵餉數十萬何也應元曰近已解納問其數曰七千兩上少之曰宣大重鎮急需其毋玩問山西按察使杜喬林流氛若何對曰冦在平陽或在河曲須大創之但兵寡餉乏耳上曰前言冦平何尚阻也曰山陜界河倐去倐來故河曲被困問河曲之陷曰賊未嘗攻失於內應問導賊何人乎喬林曰大抵出於飢民問陜西參政劉嘉遇對曰冦見官兵即散退復嘯聚上曰冦亦我赤子也可撫撫之曰今方用撫上曰前王子順既降何又殺之曰彼撫仍掠宜其僇也近冦何如對曰一在延安一在雲岩宜川問廣東布政使陸問禮按察使孫朝肅時問禮已除南贑巡撫上曰南贑多盜若何對曰南贑在萬山中接壤四省當行保甲練兵伍庶足弭賊上曰此須實效空言何為問海冦若何曰廣東海冦俱至自福建舟大而多火器兵船難近但守海門勿令登陸則不為害問廣西布政鄭茂華李守俊靖江王府爭繼何也對曰憲定王二子履祥履祐履祥早沒王請立履祐為世子而履祥有未奏選之妾生子今已長矣是以爭問四川布政華敦復鄉紳挾御史何也以逋賦對上曰守臣何不彈壓對曰逺方有司多科貢故不能耳時雲南布政婁九德被劾問貴州布政朱芹以安位事對曰督撫臣責安位以四事一擒奢崇明一獻樊虎奢寅妻馬人子阿甫一送賊巡撫王三善人一責削地故議未決對畢召各官諭之正已率屬愛養百姓用命有顯擢不則罰隨之各退謝召左都御史閔洪學左副僉都御史張捷高洪圖諭洪學曰巡按賢則守臣皆賢若巡按不肖其誤非小屢飭回道嚴核何近日不稱職之多也又曰卿與吏部實心任事天下不難為乃退四月上念旱釋前工部尚書張鳳翔左副都御史易應昌御史李長春給事中杜齊芳都督李如楨於獄五月吳執御上言昨見計臣疏稱嵗額四百萬今加至七百萬闕額尚百六十萬則餉猶未裕也加𣲖則害民不加𣲖則害兵前年遵永之變袁崇焕王元雅皆以數百萬金錢狼狽失守而史應張星王象虞左應選各以一邑固守於嬰城之際由此言之今日言餉不在創法而在擇人可知己臣妄謂沿邊諸邑宜敕吏部選補賢能畀以本地錢糧訓練土著此法一行餉不取償於司農兵不借援於戍卒計無便於此上以錢糧留本地則國課何從出不聼八月吳執御論周延儒攬權壅蔽私其鄉人塘報奏章一字涉邊疆盜賊輒借軍機密封下部明畏廷臣摘其短長他日敗可以捷聞功可以罪案也皇上習見延儒摘發細事近於明敏遂爾推誠抑知延儒特借此以行其私乎上切責之執御劾疏凡三上俱留中十一月中允倪元璐上言原任中允黃道周抗疏獲謫臣恐海內士大夫之氣化為繞柔前府尹劉宗周清恬耿介道周既蹇諤承貶宗周以骯髒投間天下本無人得其人又不能用誰為陛下奮其忠良者上不聼時道周以救錢龍錫謫外十二月時考選科道後更核在任征輸於是戶部尚書畢自嚴下獄熊開元鄭友玄俱謫吏科都給事顔繼祖上疏救上切責之自是考選將及先核稅糧不問撫字專於催科此法制一變也禮部侍郎羅喻義直日講以尚書商王布昭聖武章送閣溫體仁裁其半以所引京營大閲語也喻義執不可體仁上言舊例惟經筵多進規語日講則正講多進規少喻義以日講而用經筵之例駁改不聼自愧不能表率後進命下部議聖聰天亶何俟喻義多言遂放歸五年六月兵部員外華允誠上言三大可惜四大可憂刺溫體仁閔洪學上切責之允誠回奏又極言其失謂私沈演唐世濟等上怒奪允誠俸體仁上疏自理十二月詔停開納例六年二月諭吏部薦舉潛修之士科道不必專出考選館員須應先歷知推垂為法冬十月論囚上素服御建極殿召閣臣商榷溫體仁竟無所平反陜西華隂知縣徐兆麒赴任七日城陷竟棄市上頗心惻體仁不為救人皆寃之七年春正月刑科給事李世祺劾大學士溫體仁吳宗達謫於外復罪考選郎中吳鳴虞山西提學僉事袁繼咸上言曰養鳳欲鳴養鷹欲擊今鳴而箝其舌擊而紲其羽朝廷之於言官何以異此使言官括囊無咎而大臣終無一人議其後大臣所甚利忠臣所深憂臣所為太息也且皇上所樂聼者讜言而天下誤以攻彈貴近為天子所厭聞其勢將波靡不止上以越職言事切責之三月山陜大飢民相食發金五萬賑之免浙江崇禎三年以前織造六月江西飢逋賦益多觀政進士陸運昌上撫字八條上可其奏下戶部議冬十月上數御經筵遇雪不輟諭講官尚書韓日纘薑逢元等毋忌諱少詹事文震孟講春秋上論仲子歸賵云此見當時朝政有闕所以當講自今進講當以此類推十一月侍讀倪元璐上制實八䇿曰離敵交繕旁邑優守兵靖降戎益冦餉儲邊才奠輦轂嚴教育又制虛八䇿曰正根本伸公議宣義問一條教慮久逺昭激勸勵名節明駕馭疏入上令確奏伐交實計其撫降戎儲邊才留秦晉餉館監教習俱下部其制虛八䇿多係奉旨不必繼陳既而元璐再陳間敵之術且請盡徹監視內臣以重邊疆不報禮部右侍郎陳子壯嘗謁大學士溫體仁體仁盛稱主上神聖臣下不宜異同子壯曰世宗皇帝最英明然袝府之議勳戚之獄當日臣工猶執持不已皇上威嚴有類世宗公之恩遇孰與張桂但以將順而廢匡救恐非善則歸君之意也體仁意沮遂成嫌隙八年春正月兵部職方主事賀王盛再劾溫體仁庸姦誤國謫外御史吳履中劾溫體仁王應熊并及監視內臣上切責之議湖廣加𣲖上以祖訓凡郡王子孫有文武才能堪任用者宗人府具以名聞朝廷考驗授以秩其遷除如常例禮部右侍郎陳子壯上言宗秩改授適開僥幸之門隳藩規溷銓政上以其沮詔間親下於理明年四月始得釋已而蒞官多不法公私苦之二月侍讀倪元璐上言盜賊之禍震及祖陵國家大辱極矣陛下下罪已之詔布告天下然此非徒空言也今民最苦無若催科未敢興言冀停加𣲖惟請自崇禎七年以前一應逋負悉與蠲除斷自八年督徴有司告成亦少寬之東南雜解擾纍無紀如絹布絲綿顔料漆油之類悉可改從折色此二者於下誠益於上無損民之脫此猶湯火也至發弊而逺追數十年之事紏章一上蔓延不休扳贓而旁及數千里之人部文一下寃號四徹誰有以民間此苦告之陛下者乎及今不圖日蔓一日必至無地非兵無民非賊刀劒多於牛犢阡陌決為戰場陛下亦安得執空版而問諸磷燹之區哉上是之候補給事中劉含輝乞蠲陜西八年以上逋租不許承運庫太監周禮言崇禎六年七年省直金花銀共逋八十九萬命趨之夏四月豫故遼東總兵寧逺伯李成梁祭葬五月諭戶部暫開援納濟軍需秋七月進文震孟禮部左侍郎兼東閣大學士尋忤溫體仁罷歸丙子召廷臣於中左門試時政邊才論又出各疏命翰林官擬上八月上諭致治安民全在守令命兩京文職三品以下五品以上各舉堪任知府一人亡論科第貢監在內翰林科道在外撫按司道知府各舉州縣官一人亡論貢監吏士過期不舉者議處失舉連坐冬十月乙巳上罪已避殿徹樂下詔曰朕以涼德纘承大統不期倚任非人邊乃三入冦則七年師徒暴露黎庶顛連國帑匱詘而征調未已閭閻淍敝而加𣲖難停中夜思維不勝愧憤今年正月流氛震驚皇陵祖恫民仇責實在朕今調勍兵留新餉立敉元元務在此舉惟是行間文武吏士勞苦飢寒深切朕念念其風餐露宿朕不忍安臥深宫念其飲水食粗朕不忍獨享甘旨念其披堅冒險朕不忍獨衣文繡兹擇十月三日避居武英殿減膳徹樂非典禮事惟以青衣從事與我行間文武吏士甘苦共之以冦平之日為止文武官其各省愆淬厲用回天心以救民命十二月城鳳陽初潁州賊將趨鳳陽巡撫楊一鵬請移鎮大學士王應熊擬旨止之賊陷鳳陽焚皇陵幽宫不保諸臣忌諱不敢聞尋以獾穴為解又因而祕之至是城始成吏部尚書謝升奏起廢張士範等一百六人不果用先是寬恤條欵議及罪譴諸臣奉旨下部刑部方具招列名疏請旨未下而升為冢宰鋭意欲疏起用大學士錢士升語升曰公意大善盍俟刑部疏下先釋罪而後起廢方有次第升守前説不聽疏上臚列無有遺者上怒切責遂下選郎於獄而事不可為矣至是復以一百六人上溫體仁力沮之事遂中止九年春正月以劉宗周為工部右侍郎淮安武舉陳啓新上言今天下有三大病曰科目取人資格用人推知行取科道惟皇上停科目以詘虛文舉孝廉以崇實行罷推官行取以除積橫之習蠲災傷錢糧蘇纍困之民而且専拜大將舉行登壇推轂之禮使其節制有司便宜行事庶幾民怨平而冦氛靖上異其言特授吏科給事中命遇事直陳毋隱啓新本庸人時政府覘知上意必有闢門特達之典故令啓新上書跪正陽門曹化淳實聞之於內立致省垣將借以搏擊善類逮啓新既得進惟從事敝車羸馬以逢迎上意而政府有求皆不應故政府恨之不見信任三月工部右侍郎劉宗周上言皇上以不世出之資際中興之運即位之初鋭意太平甚盛心也而施為次第之間未得其要屬意邊疆賊臣以五年為期之説進遂至戎馬生郊震及宗社而朝廷始有積輕士大夫之心矣由此耳目參於近侍腹心寄於干城厰衛司譏防而告密之風熾詔獄及卿士而堂亷之情違人人救過不給而欺罔之習轉甚事事仰承獨斷而諂諛之風日長甚者參核之法惟重征輸官愈貪民愈困而賦愈逋總理之外復設監紀權愈分法愈廢而盜愈多夫君臣相遇至難也得一文震孟以單詞報罷矣得一陳子壯又以過戅詔下獄矣而於是市井雜流者乃得操其訛説投間抵隙以希進用而國事尚可問哉夫皇上不過始於一念之矯枉而積漸之勢釀為亂階遂幾於莫可匡救則今日轉亂為治之機斷可識矣皇上所恃以治天下者法也而非所以法也所以法者道也如以道則必體上天生物之心而不徒倚用風雷念祖宗學古之益而不至輕言改作以寬大養人才以拊循結人心而且還內庭以掃除之役正懦帥以失律之誅慎宗賢以改秩之授特頒尺一遣廷臣賫內帑巡行郡國為招撫使赦其無罪而流亡者專責撫鎮陳師險隘堅壁清野聽其窮而自歸誅渠之外不殺一人此聖人治天下之明效也武生新授吏科給事中陳啓新一言投契立置清華此誠盛事臣愚謂宜先令以冠帶辦事黃門稍如試御史例俟數月後果有忠言竒計實授未晚不然如名器可惜何皇上天縱聖明而諸臣不能以道事君徒取一切可喜之術臣竊痛之疏入不報國子祭酒倪元璐上言昨見黃安縣學生鄒華妄行薦舉列及臣名不勝驚異陛下求言若渴本期宣幽燭隱而宵人干進薄孔孟為粃粳網簮纓為桃李吳鯤化部民也參及撫按鄒華下士也薦及朝紳如是而望朝廷之上昻首伸眉豈可得乎上是之夏四月武生李璡奏致治在足國請搜括巨室助餉大學士錢士升擬下之法司不聽士升上言自流冦蔓延皇上憫生民之憔悴懲吏治之貪殘擢陳啓新置省闥豈真謂其言遂為確論哉毋亦借此以勵縉紳動其愧懼耳比者借端幸進實繁有徒而李璡者乃倡為縉紳豪右報名輸官欲行手實籍沒之法此皆衰世亂政載在史册而敢陳於聖人之前小人之無忌憚一至於此其曰縉紳豪右之家大者千百萬中者百十萬其萬計者不勝枚舉臣江南人也以江南論之數畝以對大數以百計者十之六七以千計者十之三四以萬計者千百中一二江南如此他郡可知且所惡於富者兼併小民耳郡邑之有富家亦貧民衣食之源也兵荒之故歸罪富家而籍沒之此秦始皇所不行於巴清漢武帝所不行於卜式者也此議一倡亡命無賴之徒相率而與富家為難大亂自此始矣已而溫體仁以上欲通言路竟改擬上仍切責士升以密勿大臣即欲要譽已足致之毋庸汲汲士升遂乞罷許之初士升以助體仁幾見擯公論至是復為體仁所搆去御史詹爾選上言大學士錢士升引咎回籍明乎輔臣以執爭去也此舉差強人意皇上宜鼓舞之不暇顧以為要譽耶人臣而沽名義所不敢也乃人主不以名譽鼓天下使其臣爭為尸祿保寵習為寡廉鮮恥之世又豈國家所利哉天下之疑皇上者不少矣其君子憂驅䇿之無當其小人懼陷纍之多門明知一切茍且之政拊心愧恨有難殫述輔臣不過偶因一事代天下請命耳而竟鬱志以去所日與皇上處者維此苛細刻薄不識大體之徒毁成法而釀隱憂天下事豈可言哉癸巳上召廷臣及御史詹爾選於武英殿上怒爾選詰之聲色俱厲爾選從容不為詘問如何為苟且對曰即捐助一事亦苟且也反復數百言且曰臣死不足惜皇上幸聽臣事尚可為即不聽臣亦可留為他日之思上益怒欲下之獄閣臣申救良久命頸繫直廬下都察院論罪大學士溫體仁等各捐俸市馬從關寧太監高起潛之請也劉宗周上言一嵗之間助陵工助城工又助馬價亦何報稱於萬一而時奉急公之旨諸臣於此毋乃沾沾有市心惟皇上罷得已之役停不急之務節省愛養不徒為一切旦夕之計亦何事屑屑以利為言乎不聽宗周尋罷歸令有司務修練儲備毋科擾命鄉會試二三場兼武經書算放榜後騎射刑部尚書馮英以藐玩下法司擬罪英自赴獄左侍郎朱大啓以聞上令出私邸待罪重慶翟昌進白兔斥之秋七月都城戒嚴召廷臣於平臺問方略時斗米三百錢上憂之戶部尚書侯恂言禁市沽左都御史唐世濟言破格用人刑部侍郎朱大啓請列營城外為守禦吏科都給事中顔繼祖言收養京民細弱上諭莫若蠲助為便冬十月前工部右侍郎劉宗周上言自己巳以來無日不綢繆未雨而禍亂一至於此往者袁崇煥誤國其他不過為法受過耳小人競起而修門戶之怨舉朝士之異己者概坐煥黨次第置之重典或削籍去自此小人進而君子退中官用事而外臣浸疏朝政日隳邊政日壞今日之禍實己巳釀成之也且張鳳翼之溺職中樞而與之專征何以服王洽之死丁魁楚之失事於邊而與之戴罪何以服劉䇿之死諸鎮巡勤王之師爭先入衛者幾人何以服耿如杞之死今二州八縣生靈塗炭極矣廷臣之纍纍若若可幸無死者又何以謝韓爌張鳳翔李邦華之或戍或去豈昔之為異己驅除者今不難以同己互相容隱與臣於是知小人之禍人國無已時也皇上惡私交而臣下多以告訐進皇上録清節而臣下多以曲謹容皇上崇勵精而臣下奔走承順以為恭皇上尚綜核而臣下瑣屑苛求以示察窺其用心無往不出於身家利祿皇上不察而用之則聚天下之小人立於朝而有所不覺矣至於近日刑政最舛成德傲吏也而以贓戍何以肅懲貪之令申紹芳十餘年監司也而以營求戍何以昭抑競之典鄭鄤久於鄉議而杖母之獄特以無告坐何以示敦倫之化此數事皆為故輔文震孟引繩批根即向者驅除異己之故智廷臣無敢言皇上亦無從而知之也嗚呼八年之間誰秉國成臣於是不能為首揆溫體仁解矣語曰誰生厲階至今為梗惟皇上念亂圖存進君子退小人急罷三協通津之使責成中外諸臣各備職業不再以人國為僥幸體仁桑榆之收庶幾在此疏入不報禁文武輿蓋器飾之僣起守制楊嗣昌為兵部尚書命採平陽鳳翔諸礦以儲國用十一月蠲山東五年前逋租命吏部指奏數年銓政大弊吏部覆奏上切責之以爾部職專用人推舉不效乃反稱綱目太密使中外束手且平時升轉必優京卿甲科乃云京卿未必勝外官甲榜未必勝乙榜如此遊移豈大臣實心體國之道尚書謝升罷十年春正月工部尚書劉遵憲因培築京城上加𣲖輸納事例二月遣廷臣趨各省逋賦夏四月諭百官求直言刑科給事中李如燦上言冦盜馮陵以來天下財賦之區已空其半而又遇此亢旱吳楚齊豫之間幾千萬里是所未盡空者殆將盡空矣臣謂斂怨於和皆財用為之也國朝祖制千古稱善自軍不用而兵設民始不得安其身自屯不耕而餉興農始不得有其食有兵不練兵增而餉益匱有餉不核餉多而兵愈冒比者核實之使四出而掊克屢聞占冒不減可謂有政事乎魏呈潤詹爾選李化龍劉宗周皆以一鳴輒斥今下明詔求直言儻赦其前愚收之左右是直言不求而自至也若夫輔成君道尤在相臣今俱泯默未有聞也此瞻彼顧結黨徇私蓋自八九年拂戾干和之事始於宮鄰成於金虎又何怪水旱盜賊之屢見哉上怒下如燦於獄左諭德黃道周上言陛下下詔求直言清刑獄然方求言而建言者輒斥方清獄而下獄者旋聞大臣雖清強曽何益理亂之數臣願陛下訓練軍士以固邊圉選舉賢能以任州縣而最切者尤在起批鱗強項之臣旌應詔直言之士使天下凄風苦雨盡為皎日祥雲則朝廷之刑威可以漸措何必敝敝於兵刑錢穀之下哉上不懌切責之新安所千戶楊光先劾吏科給事中陳啓新及元輔溫體仁舁棺自隨上怒廷杖戍遼西楊嗣昌上均輸事例六月大學士溫體仁引疾免初體仁以摘發錢謙益受主知遂入相時上英明憤廷臣苞苴亡狀體仁以殘刻輔之圜扉之內候訊追比纍纍趾相屬者千餘人性忌而險初藉周延儒入旋以權相軋周去而溫獨存同官文震孟何吾騶錢士升皆先後抵牾罷自佐政以來邊徼潢池之警漫無經畫惟斤斤自守不殖貨賄故上始終敬信之八月上登正陽門閲城遍視雉堞樓櫓成國公朱純臣以京營兵屯宣武門外上善之召登西南城樓賜之爵閲外城以南城薄詔加築命內官監太監丁紹吕馬光欣總理分任濬大濠於五里外壞塜墓未算工未竟而止東西北無城不之問十二月罷禮部尚書薑逢元兵部尚書王業浩先是陳啓新疏論考選又進吏部訪册而逢元業浩獨圈多上嫌其濫啓新遂參知縣尹民興等俱降調十一年春正月裁南京冗官八十九員上輸林簡討郭之祥請進士二甲以下盡任知縣推官不歷州縣毋補部曹不歷部曹毋改翰林科道二月巡按河南御史張任學改都督僉事總兵官鎮守河南任學親得巡撫且欲薦故丹徒知縣張放極詆諸總兵不足恃盛稱文吏有竒才可禦冦上竟以總兵授之意大沮悔尋被逮丙午上御經筵畢召詹事府翰林院諸臣顧錫疇等二十餘人問保舉考選孰為得人少詹事黃道周言樹人如樹木須養之數十年近來人才逺不及古况摧殘之後必深加培養既復班又詢之對曰立朝之才存乎心術治邊之才存乎形勢先年督撫未諳形勢隨賊奔走事既不效輒謂兵餉不足其實新舊餉約千二百萬可養四十萬之師今寧錦三協師僅十六萬似不煩别求供勦冦之用也庶子黃景昉請宥鄭三俊上曰三俊蒙徇雖清何濟又命諸臣各陳所見上曰言須可行如故講官姚希孟竟欲折漕一年誤矣編修楊廷麟曰自溫體仁薦唐世濟王應熊薦王繼章今二臣皆敗而薦者無恙是連坐之法先不行於大臣而欲收保舉之效得乎上默然命諸臣出宴午門之廡道周等退各補奏會南京應天府丞徐石麒亦上言鄭三俊清節得釋三俊為司冦敝衣一篋㸑煙不給以擬獄輕得罪上亦素知之故得放還三月上御左順門召考選諸臣五人為班遞進問兵食計知縣曽就義曰百姓之困皆由吏之不廉使守令俱廉即稍從加𣲖以濟軍需未為不可上拔第一未幾即有勦餉練餉之加夏四月己酉丒刻熒惑去月僅七八寸至曉逆行尾八度掩於月五月丁卯夜熒惑退至尾初度漸入心宿兵部尚書楊嗣昌上言古今變異月食五星史不絶書然亦觀其時政事相感災祥之應不一其致昔漢元帝建武二十三年月食火星明年呼韓單于欵五原塞明帝永平二年日食火星皇后馬氏德冠後宫常衣大練明帝圖畫功臣於雲臺馬援以椒房不與焉唐憲宗元和七年月食熒惑其年田興以魏博來降宋太祖太平興國三年月掩熒惑明年興師滅北漢遂征契丹連年兵敗今者月食火星猶幸在尾內則陰宫外則陰國皇上修德以召和治內以威外必有災而不害者工科都給事中何楷紏之言古人謂月變修刑又言禮虧則罰見熒惑誠欲措刑莫如右禮誠欲右禮莫先省刑今爰書之賾極矣部司議宥止於重辟數人而未折之案先後纍纍誰復過而問焉楊嗣昌縷縷援引出何典記其言建武欵塞者欲借以伸通市之説也其言元和宣慰者欲借以伸招撫之説也其言太平興國連年兵敗者欲借以伸不敢用兵之説也附會誠巧矯誣實甚至所述永平皇后等語一篇之中三致意焉臣更不知其意所指斥矣嗣昌上疏自理但言科臣以危機中臣不復及通市招撫事先是嗣昌因講筵誦孟子善戰服上刑語上非之至是乃借月食火星以為可化災為祥冀以動上意然考之漢書建武二十三年三月月食火星二十五年胸奴部人始立呼韓邪單于內附則與明年無與永平二年少府陰就于豐坐自殺陵鄉侯梁松坐誹謗下獄死而圖畫雲臺則三年事與日食火星亦無涉嗣昌不自知其説之謬也時戶部主事李鳳鳴亦言火星逆行常而非變禮科給事中解學尹紏其諂六月兵部尚書楊嗣昌改禮部兼東閣大學士仍署兵部十月命嗣昌大祀大慶暨傳制頒詔諸大典不與朝講召見如常服隨班時嗣昌無服才五月工科給事中何楷劾嗣昌忘親上切責之先是吏部會推閣員止及詞臣資序上不允命并及在籍守制者蓋嗣昌為陳新甲地也已而特召新甲為兵部右侍郎總督宣天侍講學士黃道周上言朝廷即乏人豈無一定䇿效謀者而必破非常之格以奉不祥之人上不懌乙巳召廷臣於平臺問道周曰朕聞無所為而為之謂天理有所為而為之謂人欲爾前疏適當枚卜不用之時果無所為乎道周對曰天人止是義利臣心為國家不為功名自信其無所為上曰前月推陳新甲何不言對曰時御史林蘭友給事何楷皆有疏二人臣同鄉恐涉嫌疑耳上曰今遂無嫌乎曰天下綱常邊疆大計失今不言後將無及臣所惜者綱常名教非私也上曰清雖美德不可傲物遂非唯伯夷為聖之清若小廉曲謹是廉非清也道周曰伯夷忠孝故孔子許其仁上怒其強説道周又極詆楊嗣昌嗣昌出奏曰臣不生於空桑豈遂不知父母臣嘗再辭而明旨迫切道周學行人宗臣實企仰之今謂不如鄭鄤臣始太息絶望鄤杖母行同梟獍道周又不如鄤何言綱常也道周曰臣言文章不如鄭鄤上責其朋比道周曰衆惡必察何敢為比上曰孔子誅少正卯當時亦稱聞人惟行僻而堅言偽而辨不免孔子之誅道周曰少正卯欺世盜名臣無其心臣今日不盡言則臣負陛下陛下今日殺臣則陛下負臣上曰爾讀書有年祗成佞耳叱去道周叩頭起復奏曰忠佞二字臣不敢不辨夫臣在君父之前獨立敢言為佞豈在君父之前讒諂靣諛者為忠乎忠佞不分則邪正混淆何以致治上怒甚嗣昌乞優容之上曰朕亦優容多矣諸臣退上召回諭以毋黨同伐異宜共修職業翰林院修撰劉同升編修趙士春都給事何楷試御史林蘭友各疏救道周劾嗣昌俱謫調有差十一月括廢銅鑄錢十二年二月貴州道御史王聚奎劾刑科右給事中陳啓新緘默溺職上切責之右僉都御史李先春議當奪俸上不懌謫聚奎吏部左侍郎董羽宸以不能駁正奪俸并罷先春先春前河南布政使以編修林增志薦入遂追責增志增志亦引罪三月乙酉召參議鄭二陽於平臺問練兵措餉之計對曰大抵額設之兵原有額餉但求實練則兵不虛冒餉自足用是核兵即足餉也若兵不實練雖措餉何益上問措餉曰諸臣條陳盡之矣在得其人得人則利歸公家否則在私室上曰各處災傷奈何曰裁不急之官亦可省費又曰臣見州縣殘破急宜下寬大之詔收拾人心上稱善擢二陽都察院右僉都御史四月免高淳去年旱蝗田租諭釋輕繫時上頗於內廷建設齋醮禮科給事中張埰上言宗社之安危必非佛氏之禍福正德初年遣太監劉允誠馳驅西域可為鑒戒山西道御史廖惟義亦言之不聼京城池濠廣五大深三大給事中夏尚絅上言連年塞垣失守門庭無恙若使塹水足拒則去年通德滄濟其為廣川巨浸何限而揚鞭飛渡如入無人則控挑險要在人不在險明矣今擲此百萬於水濱孰若移而用之於巖疆使敵騎不得􅏳入哉不聽五月出帑金三十萬濟餉仍命後償之山西按察副使魏士章請禁有司收賦耗羡遣京官搜括天下錢糧充餉從之六月禮部尚書林欲楫請核僧道贍地毁淫祠括絶田助餉七月辛未戒中外官饋遺請託九月免唐縣等四十州縣去年田租十之五禹州等十州縣十之二光州等八州縣十年之五去年之二時中外交訌上念窮民羅災己卯庚辰之間蠲貸屢下而有司骫法侵蠧如故十月彗星見諭停刑十一月前庶吉士張居請行銅鈔從之十三年春閏正月紀録卓異諸臣蘇州知府陳洪謐多逋賦不預尋削籍松江知府方嶽貢亦以逋賦奪官浙江永康知縣朱露上言有司科罰攫取撫按不以聞上命申飭各官授露吏科給事中改名統鐼命巡城御史煮粥賑飢發帑金八千賑真定諭戶部以保定永清等郡縣芻糧給畿南飢民抵秋以償發帑金六千賑山東二月令會試貢士先廷對日校射風霾亢旱下詔求直言三月免畿郡十一年料匠等銀賑京城貧民各錢二百戶科給事中左懋第上言去歲彗見下詔停刑而彗即消何今日之不應也夫停刑之詔特其具也今之齋禱猶其文也臣知皇上先以文即繼以實此時得無實尚未見而天不之信乎臣敢以實進練餉之𣲖以益軍實不得已之事也今兵汰而餉猶未減恐貪者藉以飽其私惟陛下詔寬加𣲖之數使天下明知之至於刑獄之輕重宜一一得其實停刑可以消彗豈明刑不足以返風乎已分賑畿南三萬金是日雨免兩河積逋其災甚者緩征之免八年九年十之三宿州沐陽通州等州縣災免逋賦有差䇿貢士於建極殿賜魏藻德第一先是上召貢士四十八人於文華殿上問邊隅多警何以報仇雪恥藻德對曰以臣所見使大小諸臣皆知所恥則功業自建娓娓數百言藻德通州人更自言戊寅守城功上心識之得拔第一夏四月命撫按薦舉分治兵治餉失實者坐考選大典須科貢兼取以收人才之用已而以吏部考選不列舉貢遂命貢士并嵗貢士二百六十三人俱補部寺司屬推官知縣不為例令朝臣及撫按各舉將才五月減商州湖廣田租上以兩京及山東西河南陜西各處告飢命地方有司設法賑濟招徠流徙撫按躬行州縣定殿最以聞召九卿科道於平臺問守邊救荒安民三事通政使徐石麒以守邊在農戰互用救荒在勸民輸粟安民在省官用賢對上是之截漕米萬石賑山東免霍泰潛山七年以上逋稅之五近年之三七月發帑金二萬賑順天保定八月發倉粟賑河東飢民帑金三萬賑真定山東河南飢民九月免汝州十年前田租隴西五縣逋賦折徴江南絹布等歲課諭災荒停刑又恐人心肆玩其事關封疆及錢糧勦冦者限刑部五月具獄命有司祭難民瘞暴骸諭吏部推侍郎巡撫併及資深翰林著為令御史魏景琦論囚西市御史高欽舜工部郎中胡璉等十五人已論辟忽內臣本清銜命馳免因釋十一人明日景琦回奏被責下錦衣衛獄蓋上以囚或有聲寃者停刑請旨景琦倉卒不辨也冬十月命抵通州漕米每石帶練米八升以山東河南飢十五年為始餘從明年出帑金萬兩市舊綿衣二萬給京師貧民戶部尚書李待問請損交際裁工食為恤窮之計從之十一月工部主事李振聲請限品官占田如一品田十頃屋百間其下遞減下部議諭刑部繫囚早結毋延斃十四年夏四月召前大學士周延儒入朝時薛國觀有罪尋賜死國觀性褊刻自僉憲驟登政府溫體仁實薦之上常憂用匱國觀對以外則鄉紳臣等任之內則戚畹非出自獨斷不可因以李武清為言遂密旨借四十萬金李氏盡鬻其所有追比未已戚畹人人自危因皇子病倡為九蓮菩薩之言云上薄待外戚行夭折且盡上大懼國觀又忤太監王化民遂敗冬十月特設裕國足民竒謀異勇科咨訪徴辟稱朕破格旁求之意十五年春正月辛未朔上朝畢召大學士周延儒賀逢聖謝升入殿曰古聖帝明王皆崇師道卿等朕之師也宗社奠安惟諸先生是賴命東向立上降座西向揖之各愧謝蠲各省直十二年以前蠟茶等稅二月發帑金二萬賑山東免省直十二年以前稅糧有司混徴者罪百姓歡呼稱慶又從刑部左侍郎惠世揚請免十二年以前贓罰豁罪夏四月禮科給事中倪仁禎上言臣等初拜宫例候閣臣謝升言及兵餉事忽曰皇上自用聰明察察為務天下俱壞升位極人臣敢歸罪天子如此上怒命削升籍周延儒奏詞臣一員佐兵部從之著為令免四川貢扇三年諭釋輕繫六月免開封河南歸德汝州去年田租諭各省直停刑三年進蔣德璟黃景昉吳甡東閣大學士且責吏部會推大典自當矢公矢慎今稱詡徇情如房可壯張三謨宋玫並與推舉此豈大臣之道辛酉召廷臣於中左門賜饌上青袍皇太子定王永王緋衣侍上詰吏部尚書李日宣曰朕屢諭諸臣有寧背君父不背私交寧隳職業不破情靣兩語昨枚卜猶濫舉如此况其他乎日宣奏辨上又責吏科都給事中章正宸河南道御史張煊閣臣力為救解不聽明日下日宣等六人於理日宣等戍邊可壯等削籍初大學士陳演所親廖惟一為試御史及考核託副都御史房可壯為之地不納張煊又加厲焉遂外調演憾之適上遊西苑演從密陳云枚卜大典皆二人主持上怒故有是譴御史吳履中上言皇上之失有二曰大姦之罪狀未彰而身為受過圖治之綱領未挈而用志多分臨御之初天下未大壞也溫體仁託嚴正之義行媢嫉之私使朝廷不得任人以治事釀成禍源體仁之罪也專任楊嗣昌恃欵撫加練餉致民怨天怒水旱盜賊結成大亂之勢楊嗣昌之罪也皇上信任二人二人售其姦欺輒曰皇上自為之皇上亦曰彼實未嘗專擅是皇上為二姦所誤而反代二姦受過也至於圖治自有綱領因時制宜內治闕而後戎馬生民生促而後冦盜起今者敵起於外而政治愈棼冦起於內而賦斂愈急欲無生亂得乎八月刑部尚書鄭三俊改吏部尚書范景文改刑部尚書進劉宗周左都御史蠲濟南兖州東昌濮州逋租刑科右給事中陳啓新匿喪被劾下撫按訊之尋遁九月誅兵部尚書陳新甲初周延儒為營解甚力因奏國法大司馬兵不臨城不斬上曰他邊疆即勿論僇辱我親藩七不甚於薄城乎不聽十月賜貧民米布十一月左都御史劉宗周上言六事曰建道揆京師首善之地先臣馮從吾立首善書院臣請亟復之以昭聖明致治之本曰貞法守髙皇帝讀老氏民不畏死奈何以死懼之立焚錦衣刑具請一切獄詞專聽法司不必下錦衣曰崇國體大臣自三品而上犯罪者宜令九卿科道會詳之後乃付司冦司冦議辟始得收係此於僇辱之中不忘禮遇之意曰清伏姦凡禁地匿名文書請一切立毁曰懲官邪京師士大夫與外官交際愈多愈巧臣必為風聞彈劾之惟祈嚴斷曰飭吏治今吏治之敗無如催科火耗詞訟贖鍰已復為常例矣至於營升謝薦巡方御史尤甚臣請以風憲受贓之律為回道考察第一義上是之召考選官時敏等而問兵食即注官俱補給事中初敏令固始縣轉主事因禮部主事吳昌時通周延儒自奏固始禦冦求考選得首對上靣注御史敏出語人曰安能以獸補向人乎是夕延儒揭入改給事中周延儒薦大學士王應熊延儒知外漸有異議故以自代蓋資其強狠為援也上從之命召應熊已而延儒敗上知其非入朝陛見請老許之賜金幣還發帑金十萬資餉閏十一月詔曰比者災害頻仍干戈擾攘宵旰靡寧皆朕不德所致也自今日始朕敬於宫中默告上帝戴罪視事以贖罪戾惟二祖舊制每日朝畢勳戚文武諸司等奏事者赴𢎞政門報名候召下禮科給事中薑埰於理先是上戒諭言官又時有匿名書二十四氣之説隱詆朝士埰言皇上修省罪已又致誡言官唯視言官獨重故望之獨切若云代人規卸安敢謂盡無其事臣獨展轉而不得其故皇上何所聞而云然乎如誹語騰謗必大姦巨憝惡言官而思中之謂不重其罪不能激皇上之怒箝言官之口後將爭效寒蟬壅閉天聽誰為皇上言之哉上怒立置獄甲子召廷臣於中左門問禦敵及用督撫之宜左都御史劉宗周曰使貪使詐此最誤事為督撫者須先極廉上曰亦須論才宗周退御史楊若橋舉西洋人湯若望演習火器劉宗周進曰唐宋以前用兵未聞火器自有火器輒依為徑誤專在此上色不懌曰火器終為中國之長技命宗周退羣臣以次對上色解宗周又進請釋薑埰熊開元云厰衛不可輕信是朝廷有私刑也上遽怒仰視屋梁曰東厰錦衣衛俱為朝廷何公何私宗周抗論不屈左副都御史金光宸言宗周無他意上益怒責宗周免冠謝徐起退先是行人右司副熊開元求獨對召入德政殿請屏閣臣周延儒求退不許開元所奏大抵摘延儒之失命補牘明日奏劾延儒以釋纍囚蠲宿逋起廢籍奉行德意自謂有禆於聖德有功於人才孰敢起而攻之願皇上遍召羣臣問延儒賢否即以所論賢否定其人之賢否於是察吏安民誅凶除暴天下之治端在於此若皇上不加體察一時將吏狃於賄賂雖失地喪師皆得無罪誰復為皇上捐軀報國哉上怒下鎮撫司詰主使周延儒引退手敕慰留初開元出朝禮部儀制司主事吳昌時力沮之雖補牘未敢盡在獄列欵具奏鎮撫司格不以聞尋廷杖薑埰熊開元仍下鎮撫司劉宗周削籍金光宸降調吏部尚書鄭三俊刑剖尚書徐石麒各疏救不聽貢士祝淵奏寬宗周下淵於刑部獄吏科都給事中吳麟徴等疏救埰開元不聽徐石麒罷以埰開元竟具獄不廷訊也開元至十七年始釋獄埰戍邊刑科給事中陳燕翼上言兵餉匱乏朝廷無剛正之臣利口獲進陛下設厰衛即因厰衛為介紹托近侍即因近侍為援引陛下籌兵措餉不遺餘力而此輩平日所輦輸以得官者皆陛下之兵所滿載而候代者即陛下之餉也陛下深居法宫左右大臣發憤改圖庶幾挽積習而強國本十六年三月免直𨽻山東殘破州縣去年田租夏四月釋輕繫五月己亥召巡撫保定右僉都御史徐標入對標曰臣自江淮來數千里見城陷處固蕩然一空即有完城僅餘四壁蓬蒿滿路雞犬無聲曽未遇一耕者土地人民如今有幾皇上亦何以致治乎上欷歔泣下標又曰須嚴邊防天下以邊疆為門戶門戶固則堂奧安其要更莫若修內治重守令守令賢則政簡刑清而盜自息上曰諸臣不實心任事以至於此皆朕之罪標又言車戰墾田上善之標四月己卯受事辛卯陛見賜金幣至是復召蓋上閔畿民欲得其詳也五月進修撰魏藻德為禮部右侍郎兼東閣大學士閲京營刀甲車矛於觀德殿命勳武臣子習騎射六月戊辰召廷臣及桐城諸生蔣臣於中左門臣前保舉戶部尚書倪元璐薦為戶部司務其言鈔法曰經費之條銀錢鈔三分用之納銀賣鈔者以九錢七分為一金民間不用以違法論不出五年天下之金錢盡歸內帑矣吏科給事中馬嘉植疏爭之詔除河南五年被陷地方稅糧其省直殘破州縣自十六年為始一切三餉雜賦俱蠲免己卯召山東武德道兵備僉事雷演祚入朝先是總督范志完在山東縱兵淫掠演祚靣奏之上命逮訊七月己亥召演祚及志完靣質於中左門問志完兵淫掠又金銀鞍數千兩馬百匹行賄京師狀演祚歷歷有指因召問演祚云爾所言稱功頌德遍於班聨者誰也曰周延儒招權納賄如起廢清獄蠲租自以為功考選科道盡收門下凡求總兵巡撫必先通賄幕客董廷獻然後得之上怒即命逮廷獻又問志完鞍馬何所餽志完謝無有且曰是日臣在大王莊副總兵賈芳名等禦敵乘大風却之上斥其妄問御史吳履中爾在天津察志完云何履中對如演祚言尋誅志完以史可法為南京兵部尚書發帑金四十萬貯富新倉出陳納新毋得輕重出千金資太醫院療疫時京師自春徂秋大疫死亡略盡又出金二萬下巡城御史收殯八月諭入覲官薦將才令兵部彚上并廷臣所舉堪督撫總副者時所用多夸誕雖三尺不貸而嗜進不已九月諭廷臣凡失事定罪戰守定賞俱限十日奏餘犯矜疑可速結毋淹留朕久服浣衣減膳各衙門裁節事宜各條對擢山東漕儲副使方嶽貢為左副都御史嶽貢上言四事清言路以收人心定推遷以養廉恥責吏治於荒殘儲將才於部伍上是之尋進嶽貢東閣大學士冬十月諭有司贖鍰其留額積榖外俱充餉括民間廢銅鑄錢上自用銅錫木器屏金銀命文武諸臣各崇省約士庶不得衣錦繡珠玉免懷來桐城田租十一月諭臣民助餉立功者録之十二月誅吏部文選郎中吳昌時以事連前大學士周延儒賜死谷應泰曰嗚呼自古未有端居深念旰食宵衣不邇聲色不殖貨利而馴致敗亡幾與暴君昏主同失而均貶者則以化導鮮術貪濁之風成於下股肱乏材孤立之形見於上夫是以欲安而得危圖治而得亂也考之懷宗以漢昭嗣服之年膺唐堯繼見之厯手剪貂璫人賡玉燭咸五登三將在是矣而無如神祖倦勤王綱解紐熹宗拱手魁柄潛移譬之漢遭靈帝以還周自赧王之後斯真儒生流涕而指陳聖哲馳騖而不足矣然而懷宗之圖治與其所以致亂揆之事實蓋亦各不相掩焉方其大東罷貢便殿停香記注重珥言之臣寒暑御文華之講進監司而問民疾苦重宰執而尊禮賔師以至素服論囚蠲逋弭亂罪己則輟減音樂賑飢則屢發帑金於凡愛民勤政發姦摘伏此則愍帝之圖治也及其禦冦警則軍興費煩急征徭則閭閻告病以至破資格而官方愈亂禁苞苴而文網愈密惡私交而下滋告訐尚名實而吏多苛察於凡舉措聽熒貞邪淆混此則愍帝之致亂也然其時亦未嘗無深識之士不二心之臣強項批鱗呼號入告如弭亂有近功之慮匡時多救過之憂批龍鱗則制實八䇿攀殿檻則應詔一言而究之賈生慟哭無救突薪索靖銜悲自然荆棘無他九關之虎豹格於中間而文具之積弊澤不下究也雖然吾有疑焉周藉舊基天命未改秦得中主二世不亡以愍帝之殫慮竭精勤求民瘼英察類漢明猜忌則優於唐德綜核近孝宣偏聽則異於宋神斯固治世足以奮烈而亂世足以救亡者獨奈何皇輿掃迹天祿隕墜相報蓋若斯之酷耶是豈炎精害氣必難返於夷庚抑亦榮公賄風定欲摧其傾軫也語云始於宫鄰成於金虎懷宗之遇則然而議者欲與暴君昏主同失而均貶則皆吠聲之論矣豫無取焉明史紀事本末卷七十二
