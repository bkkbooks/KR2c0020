body:
  text: 明史紀事本末卷二十二浙江提學僉事谷應泰編安南叛服成祖永樂元年閏十一月封黎蒼為安南國王安南古交趾地唐虞時曰南交秦為象郡漢初南越王趙陀據之武帝平南越置交置九真日南三郡設刺史建武安任延錫光為守教民耕種制冠履漸立學校女子徴側徴二反馬援討平之立銅柱為界建安中吳分立廣州而徙交州治龍編縣唐初改安南都尉府屬嶺南安南之名始此唐亡為南漢劉隱所并未幾國內亂擁立豪渠丁部領宋乾德初南漢平上表內附黎桓篡丁氏李公藴又篡黎氏公藴死孫日燇嗣淳熙間封為安南國王安南之為國自此始再傳無子一女壻陳日煚王死女主國事日煚得立再傳為日烜僣稱越皇帝纍世名皆取日下易一字從火上陽之義亦效日燇而然也元世祖平雲南遣人召之入覲不行大發兵遣其將托歡等討之十七戰皆捷日炬棄城遁入海以糧運不繼還日烜歸國勢復振日烜卒子日燇嗣曰吾祖舊名也自是為藩臣貢獻不絶封安南國王日燇卒子日煃立洪武初漢陽知府易濟頒詔安南日煃遣使朝貢上嘉之封日煃安南國王日煃卒兄子日熞嗣荒淫不治其兄叔明逼死之自立上曰叔明王法所必誅速擇日熞親賢立之叔明懼請老傳政弟日煓日煓卒弟日煒嗣而叔明實專制國事與占城搆兵十餘年數侵思明地叔明卒日煒為國相黎季所弒立叔明子日焜季叔明壻也上曰叔明弒日熞而有其國今季又殺日煒矣復以禮待是厚助亂賊也遣行人吕讓移書責之未幾日焜亦為季所弒立其子顒又弒顒立其幼子􅀢在襁褓中又斃之因大殺陳氏自為舜裔胡公滿之後國號大虞紀元天聖上表竄姓名為胡一元子蒼易名􅐏稱皇帝自稱太上皇至是詐稱陳氏絶􅐏為陳氏甥求權署國事上不虞其詐許之二年夏六月胡􅐏遣使奉表歸思明侵地八月老撾軍民宣慰使刁緣歹遣使護前安南王孫陳天平來朝奏曰臣天平前安南王日烜之孫天明之子日煃弟也日煃恭遇天朝率先歸順太祖髙皇帝封為安南王賜之章印數傳至日焜賊臣黎季當國擅作威福日焜稍抑損季弒之立其子顒未幾復弒顒而立􅀢䝉然幼稚尚在襁褓季父子乃大殺陳氏宗族并􅀢弒之而取其位更姓名胡一元子曰胡􅐏臣以先被棄斥越在外方季父子志圖篡奪臣幸以逺外見遺臣之僚佐激於忠義推臣為主以討賊復讐方議招軍而賊兵見逼倉皇出走左右散亡逆黨窮追遣兵四索臣竄伏窮荒採拾自給饑餓困厄萬死一生度勢少息稍稍間行艱難跋踄以達老撾其時老撾多事不暇顧臣瞻望朝廷逺隔萬里無所控告屢欲自絶苟且圖存延引嵗月忽讀詔書知皇上入正大統率由舊章臣心欣忭有所依歸伏念先臣受命太祖髙皇帝世守安南恭修職貢此賊造逆滔天陳氏宗屬橫被殱滅存者惟臣臣與此賊不共戴天因叩頭流涕上憐而納之安南故臣裴伯耆亦來告急請討黎季願為前驅效死自比申包胥十二月安南遣賀正旦使者至上令禮部出陳天平見之使者識其故王孫也皆錯愕下拜有感泣者裴伯耆亦責使者以大義皆惶恐不能對上聞之謂侍臣曰安南胡􅐏初云陳氏已絶彼謂其甥權理國事請襲王封朕固疑之及下詢其陪臣父老皆對曰可乃下詔封之今聞弒主篡位暴虐國人而臣民共為䝉蔽是一國皆罪人也三年春正月遣御史李琦行人王樞齎勑往安南問胡􅐏篡奪陳氏之故六月安南胡􅐏遣使阮景真隨御史李琦上表謝罪請陳天平歸國仍命行人聶聰齎勑往諭胡􅐏十二月安南胡􅐏復遣阮景真隨行人聶聰來貢請迎陳天平遂勑行人聶聰送陳天平歸國命征南副將軍黃中吕毅大理卿薛嵓以兵五千人護行四年春三月黃中等護送陳天平至丘溫胡􅐏遣其臣黃晦卿等以廪餼迎候禮甚恭具牛酒犒師晦卿及諸從者見天平皆拜舞踴躍中問胡􅐏不至何也則曰安敢不至屬有微疾已約嘉林江矣嘉林江季所居也中遣晦卿還促􅐏且遣騎覘之迎者壺漿相繼於道中信之徑進度隘留雞陵二關將至芹站山路險峻林木蒙密軍行不得成列㑹雨潦忽伏發大呼鼓譟動山谷遂殺天平大理卿薛巖行人聶聰亦遇害中等亟整兵擊之橋斷不得前賊遙拜曰逺人非敢抗王師天平小人也非陳氏親屬敢肆巧僞今幸得殺之以謝交人吾王即上表待罪天師逺臨小國貧乏不足久淹中等引兵還奏聞上大怒謂成國公朱能曰蕞爾小醜乃敢欺我此而不誅兵則何用能頓首曰逆賊罪大天地不容臣等請伏天威一舉殄絶之上遂决意興師勑鎮守雲南西平侯沐晟調兵南伐以蜀兵七萬五千益之徴黃中吕毅赴京以送陳天平失律也秋七月辛卯以成國公朱能為大將軍西平侯沐晟新城侯張輔為左右副將軍豐城侯李彬雲陽伯陳旭為左右參將大將軍率右副將軍右參將及清逺伯王友統神機將軍程寬朱貴遊擊將軍毛丹朱廣王恕等橫海將軍魯麟王玉啇鵬鷹揚將軍吕毅朱吳江浩方政驃騎將軍朱榮金銘吳旺劉劄出等二十五將軍以兩京畿荆湖閩浙廣西兵出廣西慿祥左副將軍左參將統都指揮陳睿盧旺等以巴蜀建昌雲貴兵出雲南䝉自兵部尚書劉俊參贊戎務尚書黃福大理寺卿陳洽轉餉是日上幸龍江禡祭誓衆曰黎賊父子必獲無赦脅從必釋毋飬亂毋玩寇毋毁廬墓毋害稼穡毋恣取貨財毋掠人妻女毋殺降有一犯者雖功不宥毋冒險肆行毋貪利輕進罪人既得即擇立陳氏子孫賢者撫治一方班師告廟以次定功冬十月成國公朱能卒於龍州先是上察占天象謂侍臣曰西師有憂朱能其不免乎亡何能卒事聞上震悼輟朝乃以輔代能輔發憑祥度城壘閣進攻隘留及雞陵二關破之傳檄數季二十罪諭其境內立陳氏意進度芹跕兩房皆有伏遣黃中吕毅摉捕之遁進次昌江市造浮橋濟師遣方政王恕哨探直扺富良江而大軍自芹站西折至新福縣遣驃騎朱榮往約沐晟晟軍自臨安府䝉自縣經野蒲斬木通道攻奪猛烈栅華關隘賊徒悉奔築壘駐兵洮江北岸造舟徑渡至白鶴遣人來㑹時賊恃東西都及宣江洮江沱江富良江以為固于江北岸緣江樹栅多邦隘增築土城城栅相連亘九百餘里盡發江北諸郡民守之號二百萬又於富良江南岸緣江置樁盡取國中船艦列於樁內諸江海口俱下捍木以防攻擊賊之東都守備亦嚴時列象陳於城栅內欲守險以老我師輔等遂自新福移營三帶州招市江口造船圖進取驍騎朱榮敗賊衆於嘉林汪沐晟軍亦至桃江北岸與多邦城對壘輔率大軍營於城北之沙灘與晟合勢時賊所立栅皆逼江不可上惟多邦城下沙坦可駐師而土城髙峻城下設重濠濠內密置竹刺濠外坎池以陷人馬城上守具嚴備賊兵如蟻時官軍攻具亦完輔乃令軍中曰賊所恃者此城大丈夫報國立功在此一舉先登者賞不次於是將士踴躍期夜襲城以燃火吹銅角為號是夜四鼓輔遣都督黃中等銜枚舁攻具過重濠至西城下以雲梯附城指揮蔡福等先登諸軍繼之城上火炬齊鳴銅角競響賊倉皇失措矢石不得發皆走師遂入城賊復巷戰列象為陳輔等督遊擊將軍朱廣等以畫獅䝉馬神機將軍羅文等以神銃翼而前象皆股栗多中銃箭皆退走奔突賊衆潰亂官軍長驅而進殺賊帥梁民獻祭伯樂等追至傘圓山賊死者不可勝數辛西輔等遂克東都輔與晟駐師撫諭遣左參將李彬向西都西都賊聞之焚宫室倉庫遁入海於是三江路宣江洮江等州縣次第詣軍門降輔等督舟師進逼膠水賊復遁入黃江悶海等處五年春正月張輔沐晟等襲賊籌江柵大破之又追敗賊於萬劫江普賴山斬首三萬又敗賊胡杜於盤灘江兩旬輔等進次魯江賊五百艘逆戰木丸江大敗之殺其將阮子仁黃世岡百餘人三月窮追至膠水縣悶海口地下濕不可駐乃陽為還師至鹹子關令都督栁升守之賊果來躡輔還軍遇於富良江賊舟亘十餘里橫截江中用剗船載木立柵迎拒又以精卒數萬趨陸來戰奮擊大敗之斬獲數萬江水為赤乘勝追至悶海口季父子僅以數小舟遁走義安其尚書范見覽等降四月輔率舟師追至海門涇鵲淺時晴久水涸賊棄舟遁我師舟膠不得前俄大雨水漲數尺舟畢渡衆喜曰天贊我也五月丁卯輔與晟等率步騎夾江東西栁升率舟師水陸並進甲戌輔等至茶龍栁升等舟師亦至又敗賊獲船三百艘賊遁走輔等乘勝追之又敗之於竒羅海口賊屢敗困衆遂潰乙卯栁升所領永定衛卒王柴胡等七人詗得黎季所在前格之縛送升軍并其子澄於海口山中次日土人武如卿獲黎蒼及僞太子芮將相王侯柱國黎季獵等皆縛獻軍門安南平輔奏安南本中國地陳氏子孫已誅盡無可繼其國中耆老民庶俱請為郡縣如中國制乃置交趾布政使司都指揮使司按察司分十七府曰交州北江諒江三江建平新安建昌奉化清化宣化太原鎮蠻諒山新平義安順化升華四十七州一百五十七縣衛十一所三市舶司一改雞陵關為鎮彛關安撫人民三百二十萬獲蠻人二百八萬七千五百糧儲一千三百六十萬石象馬牛十三萬五千九百船八千七百軍器二千五十三萬九千勑尚書黃福兼掌布按二司事又以侍郎張顯宗為左布政使以都督吕毅掌都司事勑張輔沐晟劉俊交趾有懷才抱德之人悉心訪求送京師擢用九月張輔沐晟遣都督栁升等齎露布檻送黎季黎蒼等獻俘至京上御奉天門受之文武羣臣偕兵部侍郎方賔讀露布至弒主篡國僣號紀元等語上問季父子曰此為人臣之道乎季父子不能對詔以季及子蒼下之獄赦其子澄孫芮等後季釋自獄戍廣西子蒼澄以善兵器赦用之冬十月以交趾所舉明經士人甘潤祖等十一人為諒江等府同知贈故安南國王後陳氏子孫七人官裴伯耆為交趾按察副使六年春三月交趾總兵張輔沐晟振旅還輔等上交趾地圖其地東西相距一千七百六十里南北相距二千八百里建設軍民大小衙門四百七十二上嘉勞之賜輔晟及諸將宴於中軍都督府旗軍人賜鈔五錠七月論平交趾功進封新城侯張輔英國公西平侯沐晟黔國公豐城侯李彬雲南侯陳旭各增祿五百石清逺伯王友進封清逺侯都督僉事栁升封安逺伯戰死都督僉事髙士文追封建平侯並子孫世襲親擒黎季軍校王柴胡超擢指揮使為從者李福等四人皆升指揮僉事先是交趾平上問戶部尚書夏原吉曰升與賞孰便原吉對曰賞費於一時有限升費於後日無窮多升不如重賞上從之於是惟升元功餘皆班賚有差秋八月交趾蠻寇簡定反定陳氏故官不肯臣黎氏而輕騎跳歸我從下安南為别將頗有功知上不欲復陳氏遂逸去至化州說羣盜鄧悉等下之悉等推定為主稱日南王改元興慶出攻鹹子關黎賊餘黨多應之而陳季擴鄧景異尤猖獗黃福奏請益兵遂命黔國公沐晟發雲南貴州四川兵數萬往征之仍命兵部尚書劉俊往贊軍事十二月沐晟帥師與交趾賊簡定戰於生厥江敗績兵部尚書劉俊都督僉事吕毅交趾布政司參政劉昱等皆死之勢益熾攻陷諸軍縣事聞復命英國公張輔為總兵官清逺侯王友為副帥師二十萬往征之勑曰晟出師失律致賊猖獗今聞鄧悉死而八百媳婦老撾猶供餽者何人賊云有象五萬又謂我將帥皆易與宜戒慎同心協力早滅此賊七年夏五月簡定稱上皇立陳季擴為大越皇帝改元重光季擴者蠻人自云陳氏後也安南民不忍棄陳王則相率歸季擴秋八月鄧景異攻盤灘守將徐攻戰死張輔兵至交趾敗賊於鹹子澗大平海口等處斬首數千溺死無算生擒賊黨監門衛將軍潘抵等二百餘人獲船四百餘艘賊酋阮世美鄧景異跳身奔季擴季擴稱故王後請封輔不聽進兵至清化時季擴據地稍逺而我兵悉窮追簡定至演州分沐晟兵從磊江南都督朱榮舟師扺牛鼻關輔自率騎兵至美良簡定棄馬走吉利深山搜得之并獲其將相陳希葛阮宴等檻送京師惟陳季擴鄧鎔景異逃於義安簡定至京伏誅八年春正月張輔敗賊黨阮師檜於凍潮州斬首五千級生擒僞將軍范友陳原卿等二千人悉坑之築尸為京觀上勞苦張輔久暴師役召輔還輔奏餘賊未平請留黔公沐晟鎮之五月追敗季擴於靈長海口别將江浩至魯江戰不利十二月季擴遣使胡彥臣上表請降上遣方政諭季擴以為交趾右布政使又以其黨陳原樽為參政胡具澄鄧景異鄧鎔為都指揮潘季祐為按察副使然季擴實欲緩師期耳不肯之任而掠如故九年春正月命英國公張輔為副將軍㑹征彛將軍沐晟討交趾陳季擴勑四川廣西江西湖廣雲南貴州六都司安慶等十四衛發兵二萬四千隨征七月張輔至交趾督兵敗賊黨阮朔胡具澄鄧景異等於九真州月常江尋復率舟師追梟賊黎蕊斬之慈亷福安諸州縣皆平十年秋八月英公張輔破賊於神投海口擒其翊衛將軍鄧汝戲少保潘季祐遁可雷山乞降輔承制以季祐仍按察副使理義安冬十月命鎮守交趾都督韓觀運廣東糧萬石赴交趾給軍食張輔破賊於西心江十一年冬十二月英公張輔黔公沐晟合兵敗賊於愛子江時輔晟等進兵順州賊黨阮師檜屯愛子江設象伏兵候官軍輔偵知之以戒先驅羣象來衝一矢落其象奴再矢破其象鼻奔還賊陳自相蹂踐官軍乘之大敗斬賊將阮山生擒僞將軍潘經等數十人賊衆死者無算十二年春正月兵至政和縣羅蒙江皆懸崖側徑英公張輔捨騎步進大索討中鄧景異擒之并獲阮師檜於南靈州季擴遁走老撾都指揮師祐躡之進克老撾三關蠻人潰散棄季擴及其妻妾於南麼生縶以歸八月交趾陳季擴伏誅十三年夏四月命英國公張輔鎮守交趾加陳洽兵部尚書贊軍務輔下交南凡三擒僞王威鎮西南而尚書黃福有威惠交人懷之戢伏莫敢動十四年夏四月交趾鎮彛衛百戶丁仕驗來朝貢馬謝恩賜鈔幣遣還五月設交趾府州縣儒學及隂陽醫學僧綱道紀等司英國公張輔奏自廣東欽州天津驛經猫尾港至涌淪佛淘從萬寧縣扺交趾多由水道陸行止二百九十一里比丘溫故路近七驛傳便往來從之尋交趾布政司右參議莫勛三江等府土官杜惟忠等來朝貢馬及金銀等物特賜宴勞升勛為右布政使杜惟忠為參議鎮彛衛并交州中左右衛指揮陶𢎞等各遣人貢馬及方物各賜鈔幣遣還冬十一月召交趾總兵英國公張輔還京命豐城侯李彬代鎮守輔經營交趾前後十年命監察御史黃宗載巡按交趾交趾營房皆覆茅多火宗載令三司募官伐材陶瓦不半年營房皆覆瓦火患遂息十六年春正月交趾清化府俄樂縣土官巡檢黎利反利初從陳季擴充僞金吾將軍後束身歸降以為巡檢然中懷反側張輔還京至是僣稱平定王以弟黎石為相國段莽為都督聚黨范栁范晏等肆出剽掠總兵豐城侯李彬遣都督朱廣討之擒斬數百人利敗走擒宴彬請就交趾戮宴以狥先是李彬代張輔鎮交趾中官馬騏為監軍定嵗貢扇萬柄翠羽萬箇騏墨而殘交人苦之三年間叛者四五起而黎利最劇十七年冬十二月巡按交趾御史黃宗載上言交趾人民新入版圖勞來安輯尤在得人而郡縣官多兩廣雲南舉貢未歷國學遂授逺方牧民者不知撫字理刑者不明律意若俟九年黜陟廢弛益多宜令至任二年以上者巡按御史及布按二司嚴加考核上其亷汚能否以憑黜陟疏上報可十八年夏五月勑豐城侯李彬叛寇黎利潘僚車三農文歷等迄今未獲宜盡心畫方略早滅此賊交趾左參政馮貴右參政侯保討黎利戰死保真定贊皇人由國子生知廣城縣有善政初設交趾郡縣擇人撫治升交州知府遷參政時黎利剽掠郡縣保率民兵築堡於要害禦之賊來攻保與戰不勝而死貴湖廣武陵人舉進士為給事中升交趾參政能撫輯流民歸附者衆有土兵二萬餘人皆徑勇習戰每出陳有功後中官馬騏疾之盡奪其土兵及黎利反衆强貴勦捕獨以羸卒數百遇賊兵衆貴力戰而死保為政亷恕貴有方略其死也人皆惜之十九年夏五月豐城侯李彬上言交趾地荒逺不通餽運乞依各都司衛所例分軍屯田以供糧餉度地險易為屯守征調之多寡從之秋九月李彬言黎利奔老撾進兵討捕老撾輒遣頭目覽耆郎阻我兵勿入境云即發兵大索到送軍門久之竟不獲利上以老撾匿賊持兩端令彬遣頭目至京詰之尋召彬還以榮昌伯陳智代冬十月赦黎利為清化知府遣內官山壽諭利竟不赴二十二年仁宗即位黎利自老撾復還寧化州僞求降不出九月掌交趾都司都督方政與黎利戰於義安府茶龍州不利昌江衛指揮伍雲死之都指揮陳忠與黎利戰於清化破走之命召工部尚書黃福還京勑兵部尚書陳洽代掌交趾布按司事仍參贊軍務福治交趾視民如子勞輯訓飭每戒郡邑吏修撫字之政新造之邦政令條畫無巨細咸盡心焉中朝士大夫以遷謫至者必加賙恤拔其賢者與共事中官馬騏怙恩肆虐福數裁抑之騏誣奏福有異志文皇知其妄得寢福居交趾十八年上念其久勞於外召還交人扶老携幼送之皆號泣不忍别冬十一月交趾參將保定侯孟英榮昌伯陳智言山壽未至黎利復反先後破茶龍諒山茶龍守琴彭諒山守易先皆堅守力盡俱死之命候山壽至彼計議確當以聞仁宗洪熙元年春二月以榮昌伯陳智為征彛副將軍討黎利冬十月總交趾布按二司兵部尚書陳洽奏賊首黎利名雖求降實則携二招聚逆黨日以滋蔓望勑總兵早滅此賊以靖邊方宣宗宣德元年春三月總兵陳智方政討黎利進至茶龍川敗績時山壽主招撫擁兵自衛陳洽力爭不聽陳智方政復不相能洽以上聞上下璽書切責智等而以成山侯王通佩征彛將軍印充總兵官都督馬瑛充參將討黎利仍命洽參贊軍務安平伯李安掌交趾都司事削陳智方政官爵𨽻軍中自效上視朝罷御文華殿蹇義夏原吉楊士竒楊榮侍上曰太祖皇帝祖訓有云四方諸彛及南蠻小國限山隔海僻在一隅得其力不足供給得其民不足使令吾子孫毋倚富强要戰功後因黎氏弒主虐民太宗皇帝有弔伐之師蓋興滅繼絶盛心也而陳氏子孫為季殺戮已盡不得已狥土人之請建郡縣置官守自是以來交趾無嵗不用兵皇考念之深為惻然昨遣將出師朕反覆思之欲如洪武中使自為一國嵗奉常貢以全一方民命卿等以為何如義原吉對曰太宗皇帝平定此方勞費多矣二十年之功棄於一旦臣等以為非是上顧士竒榮曰卿兩人云何對曰交趾唐虞三代皆在荒服之外漢唐以來雖為郡縣叛服不常漢元帝時珠崖反發兵擊之賈捐之議罷珠崖郡前史稱之夫元帝中主猶能布行仁義况陛下父母天下與此豺豕較得失耶上頷之冬十月黎利弟黎善據廣威州擁衆數十萬分道攻交趾十一月參將馬瑛大破賊於清威與成山侯王通合兵石室縣進屯寧橋尚書陳洽以為宜駐師石室縣之沙河以覘賊勢通欲渡河而陳洽反覆言地險惡宜逺斥堠持重不從五鼓麾兵竟渡天雨且泥濘伏驟起衝蕩遂大敗洽奮馬突入賊陳死之失亡二三萬人通懼師却黎利時在義安聞之自以精兵來㑹圍東關通敗後氣大沮隂許為利請封而激清化迤南歸黎氏清化羅通曰非君命而欲賣城義不可連戰敗走之初都督蔡福守義安被圍福不戰率都指揮朱廣薛聚于瓉指揮魯貴千戶李忠降賊至是福馳馬清化城下大呼守城者宜見幾全首領羅通大罵而去賊又逼鎮城平州知州何忠懷奏潜請王師夜步走出城二百餘里為賊所得賊喜曰何知州聞名久矣共舉酒酌忠曰能從我同享富貴忠唾地罵曰賊奴吾天朝臣豈食汝犬彘食奪杯擲中賊面流血盈頥遂遇害事聞上深悼惜之勑旌其門賜諡忠節十二月交趾布按上言尚書黃福舊在交趾民心思之乞令復至以慰民望遂召福於南京赴闕議之以安逺侯栁升為征彛副將軍保定伯梁銘都督崔遂由廣西黔國公沐晟為征南將軍興安伯徐亨新寧伯談忠由雲南二道討交趾尚書李震參贊軍務黃福仍掌布按二司事勑王通守城練兵候升等至同進二年春正月上御文華殿召大學士楊士竒楊榮諭曰前者論交趾事蹇義夏原吉拘牽常見昔徴舒弒陳靈公楚子討之殺徴舒既縣陳申叔時以為不可楚子即復封陳古人服義如此太宗初得黎賊定交趾即欲為陳氏立後今欲承先志使中國之人皆安無事卿等為朕再思士竒榮對曰此盛德事惟陛下斷自聖心上曰朕志已定無復疑者但干戈之際便令訪求恐未暇及俟稍寧靜當令黃福專意求之二月交趾賊黎利攻交趾城總兵王通出不意猝擊大敗之斬其司空下禮司徒黎豸而下萬餘級利惶懼不能軍諸將請乘勢亟擊通猶豫不決賊得以暇樹柵掘塹修器械四出剽掠未幾勢復張三月命行在刑部侍郎樊敬往廣西副都御史胡廙往廣東總督運糧赴交趾又勑調武昌成都護衛中都留守司湖廣浙江河南山東廣東福建江西雲南四川都司福建四川行都司官軍數萬俱從安逺侯栁升黔國公沐晟等征交趾黎利圍溫丘都指揮孫聚拒破之夏四月黎利攻昌江初蔡福教賊造攻具攻東關我兵九千人憤欲焚賊營福報賊賊盡殺之遂攻昌江都指揮李任顧福日夜拒戰凡九閲月城陷任福皆自刎死中官馮智大哭北向再拜與指揮劉順知府劉子輔自縊死子輔有惠政民愛戴之一子一妾皆先子輔死軍民俱立鬬盡無一人降者賊縱火焚民居大殺掠王通斂兵不出賊致書請和通自寧橋之敗氣大沮喪雖獲城下一勝而志不固且意栁升師雖出未能猝至道路多梗黎利既求和不如狥其所請按察司楊時習曰奉命征討乃與賊和棄地旋師何以逃罪通厲聲叱之曰非常之事非常人能之汝何所知遣人同利所遣人進表及方物秋七月黎利攻隘留關鎮逺侯顧興祖擁兵南寧不赴隘留城陷逮興祖下獄九月安逺侯栁升等師至交趾隘留關黎利及諸大小頭目具書遣人詣軍門乞罷兵息民立陳氏後主其地升等受書不啓封遣人奏聞時賊於官軍所經處悉列柵拒守官軍連破之直抵鎮彛關升勇而寡謀連勝易賊梁銘李慶曰主帥氣甚驕兵纍日不得休困罷而少斥堠不拒險握重而欲急發卒如敵伏何慶力疾語升升唯唯前至倒馬坡獨與百騎先馳渡橋既渡而橋遽壞後隊阻不得進賊伏兵四起升中鏢死梁銘李慶皆死崔聚率官軍進至昌江遇賊奮力死戰聚宿將然倉卒新喪元帥吏士沮且囂賊驅象乘之官軍大潰聚被執賊大呼降者不殺官軍或死或奔散竟無降者郎中史安主事陳鏞李宗昉等皆死惟主事潘原大脫歸七萬人皆沒王通諜知升敗益大懼决意與和工部尚書黃福為賊所得皆下馬羅拜曰我父母也公向不北歸我曹不至此言已皆泣福斥之諭以順逆賊終不忍加害其渠長餽以餱糧乘以肩輿贈金幣出境至龍州福悉以所贈歸之官時晟兵竟不出冬十月王通與黎利立壇為盟退師遣指揮闞忠同黎利所遣人奉表及方物至表曰安南國先臣陳日煃三世嫡孫臣陳皓惶恐頓首上言曩被賊臣黎季父子篡國弒戮臣族殆盡臣皓奔竄老撾以延殘息今二十年近者國人聞臣尚在逼臣還國衆云天兵初平黎賊即有詔㫖訪求王子孫立之一時訪求未得乃建郡縣今皆欲臣陳情請命臣仰恃天地生成大恩謹奉表上請上覽之密示英國公張輔輔對曰此不可從將士勞苦數年然後得之此表出黎利之譎當益發兵誅此賊耳尚書蹇義夏原吉皆言不宜隳成功示賊以弱大學士楊士竒楊榮言兵興以來天下無寧嵗今瘡痍未起而復勤之兵臣不忍聞且求立陳氏後者太宗皇帝心也求之不得而後郡縣叛亂相尋至深厪先帝憂今因其請撫而建之以息吾民於計大便漢棄珠崖相史榮之安在為示弱乎上曰卿二人言是先帝意朕固知之明日出皓表示羣臣且諭以息兵飬民意羣臣頓首稱善於是以禮部侍郎李琦工部侍郎羅汝敬充正使通政王驥鴻臚卿徐永達為副使詔諭安南言黎利表言前國王遺嗣皓尚在老撾國人乞封皓王永奉職貢頭目耆老其以實對即遣使受封朝貢如洪武故事又勑通等即日班師內外鎮守三司衛所府州縣文武吏士携家來歸三年閏四月王通至京羣臣交劾通及梁瑛馬騏山夀等廷鞫王通失律喪師棄地山夀曲護叛賊馬騏激變藩方皆論死詔繫獄籍其家梁瑛等坐罪有差詔褒贈安南死事諸臣蔡福朱廣薛聚于瓉魯貴李忠皆伏誅黎利遣頭目黎公僎送還官吏百五十七人戍卒萬五千一百七十人馬千二百匹閉留不遣者無算已而使還到奉表言皓死陳氏絶上心知其妄然業置之不問先是文皇時用兵交趾侍讀解縉力言交趾古羈縻國通正朔時賔貢而已得其地不足郡縣文皇不悅至是言始驗云憲宗成化十六年安南國王黎灝侵占城先是黎利死子麟立麟死子濬立濬為庶兄琮所弒因自力侵老撾宣慰刁扳雅蘭掌為八百敗歸黎夀域等殺琮而立濬弟灝至是太監汪直用事好邊功議討之職方郎中陸容上言安南臣服已久今事大之禮不虧叛逆之形未見一旦加兵恐遺禍不細直意猶未巳傳㫖索永樂中調軍數甚急時劉大夏在職方故匿其籍徐以利害告尚書余子俊力沮事得寢而中官錢能鎮雲南復私與灝通闌結諸彛姦宄繹騷幾危雲南賴巡撫王恕發其姦亂乃弭世宗嘉靖元年莫登庸立黎懬僣號統元追諡黎晭為襄翼帝先是黎灝死子暉立暉死子敬立未封而死弟誼立正德間誼母戚阮种用事屠戮宗親逼誼自殺頭目黎廣討平之立灝庶子晭晭多行不義國人惡之諒山都將陳立孫與其子昺升作亂鄭綏鄭惟鏟攻誅之遂弒晭立譓鄭氏國世臣譓母妻族也諸大臣疾鄭氏典兵攻之綏等亡走清華昺升猶據諒山莫登庸者本都齊漁人負勇力時時凌波而飛持劒下刺魚得巨魚呼噪為樂詭言莫邃之後以武舉從立孫官參督有罪自拔歸譓用為宜陽參將將令與昺戰大敗之殺昺封武川伯總水步諸營時鄭氏既去譓倚登庸自强諸大臣皆受其賂方喜登庸起微陋可托因請以兵盡屬之加封太傅仁國公登庸權日盛乃銷九鼎為兵器竊庫藏金寶潜使其弟橛燒宫室人居殺傷吏民若他盜者因言寇急請自為興安王鎮之謀殺譓兄弟夜率兵圍其宫譓易服間行得脫至清華復依鄭綏國中大亂登庸乃立譓弟懬初登庸通譓母懬登庸所生也六年莫登庸鴆殺黎懬并其母殺之而自立時譓尚據清華義安順化廣南四道其舊臣不服登庸者分據險阻為之聲援登庸立其子方瀛居守僞都自稱太上皇率兵擊譓取清華據之譓走義安又追敗之譓走葵州又棄葵州走老撾九年秋九月黎譓憤悒死衆復立其子寧號曰世孫有兵三千登庸屢攻之老撾為援不能克寧結國人襲擊登庸大敗之登庸走海陽據上洪下洪荆門南策太平諸郡寧還國誅大臣為請者悉發兵二十萬起鄭綏將而攻海陽一月固守不下登庸别選兵萬人舟行出大江竟掩國都寧錯愕復走清華登庸掠庫藏取世孫旗蓋張而還呼曰得王矣鄭綏兵大潰久之寧復悉清華兵討登庸相拒不决登庸隂結土帥郭遼鶴使襲寧大敗之擒寧妃淑寶沉於江寧與鄭綏子惟堫走老撾聚兵八千人保漆馬江登庸以其子方瀛為大王改國大正十六年夏四月議討安南先是皇子生當頒詔安南大學士夏言請問安南罪下廷議兵部尚書張瓉言登庸弒逆當討戶部侍郎唐胄謂帝王之於荒服以不治治之自安南內難兩廣遂少邊警不必疲中國為黎氏復仇然上意甚鋭而安南使者鄭惟憭適至初黎寧居海曲屢馳書總鎮告難俱被邀殺惟憭等十人泛海自占城附廣東商船凡二年方得至京陳禍亂始未乞興師問罪惟憭有志操能文章為書引伸胥張良豫讓為比讀者悲之禮兵二部議登庸有大罪十不容不討兵部侍郎潘珍言安南不足置郡縣其叛服無與中國釋門庭之寇逺事瘴島非計宜擇文武重臣佩印而往移徼自定上責珍妄言對狀閒住亷州知府張嶽亦上書諫不報八月雲南巡撫汪文盛奏莫登庸聞發兵進討隂遣知州阮景等行覘至納更山為土舍李孟光所擒併獲僞撰大誥一冊上怒復勑征討先是交人武文淵以其衆來降汪文盛遣指揮趙光祖往撫諭文淵獻進兵地圖及登庸可破狀授冠帶賜四品武服賚金帛冬十月廣東巡按余光疏安南自宋以來丁移於李李奪於陳陳篡於黎黎又轉於莫互相為賊天道好還今於安南直宜問其不庭彼若聽服因而受之若必用兵勢難窮追必生他變古人臣出疆苟利社稷可以專之廣東去京八千餘里去安南又四千餘里若往復陳請而行將失機事乞假臣使宜往諭以輕率奪俸十七年夏四月命咸寧侯仇鸞為征彞副將軍兵部尚書毛伯溫參軍務討安南雲南巡撫汪文盛傳檄諭以禍福武文淵攻登庸守鎮營破之莫方瀛帥兵攻文淵不克文盛以䝉自縣蓮花灘當交廣水陸衝遣兵據其地以為諸來歸人聲援方瀛懼乃遣其黨范正毅齎公移詣雲南沐朝輔言前國王黎晭被逆臣陳皓殺害無子登庸同國人推立晭弟譓亡何譓被奸人杜溫鄭綏誘遷清華登庸仍推立譓弟懬旋自清華迎譓歸與懬俱以病死黎氏無嗣懬垂死與羣臣議以登庸父子有功於國召登庸子莫方瀛入付以印章命嗣主國事遂為國人所推其不上表通貢者先緣陳升據諒山為梗後乃守臣閉關不納耳黎寧乃亂臣阮塗之子冒稱黎姓非譓子也其所自列如此然事皆誣罔多自飾沐朝輔乃以范正毅等并表疏公移送至京朝廷知登庸父子奸僞且雖稱求降而嗣不欵服又不束身歸罪乃决意討之以鸞總兵伯溫參贊未幾巡撫蔡經上言安南水陸路有六慿祥龍舟歸順欽州海洋西路皆接安南境用兵須二十萬輕調大衆終非完計上不悅然伯溫師亦罷十八年冬十月以莫登庸請降命禮部尚書黃綰翰林學士張治往諭登庸歸國黎氏未入境召還諭兵部㑹議以聞兵部言登庸篡逼罪所必討宜臨以兵如束身聽命然後待以不死上從之仍命咸寧侯仇鸞兵部尚書毛伯溫帥師往討十九年夏四月欽州知州林希元上言臣聞莫方瀛請降命大臣查勘夫降者將籍其土地人民以獻也今殺我士卒奪我戰船降者固如是乎臣以為欲得其請宜約之曰必歸我四洞必令黎寧不失位必令黎氏舊臣鄭惟憭武文淵者皆有爵土必奉我正朔能從者降也不然則詐也而後興問罪之師以順討逆何憂不克方瀛之所恃者都齊耳其地濵海淤塗十餘里舟不得泊計以為王城不支即守都齊都齊不支即奔海上耳若以東管瓊海之師助占城擊其南賊不得奔矣以福建之師航海出枝封湖廣之師出欽州與之合都齊無巢穴矣以廣西之師出慿祥雲貴之師出蒙自與之合以攻龍編則根本拔矣如此莫氏可一舉而定也書凡四上而為御史錢應揚所劾言希元所稱祕策者固道路傳聞之語不足聽六月毛伯溫等既至廣西徴集兩廣福建湖廣狼土官兵并檄雲南守臣集兵候師期又檄諸司於臨邊諸郡縣儲積糧餉議分正兵為三哨廣西憑祥州為中哨兵四萬人參政翁萬達副總兵張經督之龍州羅回峒為左哨兵一萬四千人副使鄭宗右參將李榮督之思明府思明州為右哨兵一萬四千人副使許路都指揮白泫督之分竒兵為二哨歸順州為一哨一萬四千人參政張嶽都指揮張輗督之廣東欽州為一哨兵一萬四千人副使陳嘉謀參將髙誼督之又烏雷山等處為海哨兵一萬四千人副使涂楗都指揮武鸞督之中軍都指揮董廷玉率五百人為親兵共兵一十二萬餘人又議雲南兵於蓮花灘分三哨哨各兵二萬一千人中哨以副使倪象賢都指揮王紹監督而督餉則布政使胡宗明左哨以副使鄭騶都指揮方策監督而督餉則右參政牛方右哨以副使張絅都指揮馬立監督而督餉則右參政程白皆黔國公沐朝輔都御史汪文盛經畫既定馳檄安南臣民諭以朝廷興滅繼絶之義討罪止莫登庸父子有能舉郡縣來降者即以其郡縣授之擒斬登庸父子來降者賞二萬金官顯秩又諭登庸父子果能束身歸罪盡籍其土地人民納欵聽命亦待以不死而伯溫等駐師近邊登庸聞之大懼遣使詣軍門陳乞願出境降躬聽處分詞頗卑切伯溫等承制許之約以十一月初三日來降守臣於鎮南關內設幕府將臺以待時登庸子方瀛已死登庸乃留其孫福海守國與其姪莫文明及諸頭目阮如桂等四十餘人入關各跣足尺組繫頸詣壇匍匐稽首納欵書復詣轅門獻所部土地軍民籍還所侵欽州四峒境土請奉正朔及舊賜印章護守本國以俟更定伯溫等宣諭朝廷威德稱制赦之暫令歸國待命處分二十年春二月以莫登庸為安南都統使初毛伯溫疏言登庸畏威束身歸罪而黎寧所稱黎氏後譜系不詳莫可為據乞宥納登庸削去故爵量授新秩使撫安南因送莫文明等至京師下廷議僉如伯溫言乃降安南為安南都統使司以登庸為都統使從二品子孫世及别給印章其所僣擬制度令削除改正海陽山南等一十三路各設宣撫司正佐職官襲替黜陟俱聽登庸總理通𨽻廣西藩司嵗頒正朔令三嵗一貢其黎寧仍令守臣體勘果係黎氏子孫授與清華等四府妄則勿豫莫文明等諸頭目賜賚有差制下登庸已死伯溫上疏請以制命授其孫福海從之夏六月毛伯溫班師朝廷論功加伯溫太子太保諸將校升賞有差已而莫福海不能輯衆為黎寧所逐居南海上朝廷亦置不問久之福海子浤瀷復振卒逐黎氏有其國神宗萬厯九年安南莫茂洽來貢茂洽浤瀷子也隆慶中浤瀷為其下黎伯驪所逐死於海陽至是茂洽始得襲二十四年夏四月黎惟潭來降黎氏自寧死其舊臣鄭簡立寧子寵於西都簡惟憭子也寵死無子簡等共立黎暉四世孫維邦維邦死次子維潭立簡子松輔之攻殺茂洽復據安南莫敬用竄居髙平維潭浮海遣使詣督臣歸罪請欵因與約以髙平居莫氏如黎氏漆馬江故事維潭難之謂髙平乃其故土莫氏篡臣不宜以漆馬江為比守臣曰莫氏在先世為篡逆今日國家外臣也使得假息一隅毋遽殄絶國家鎮撫四夷良厚維潭乃聽命至是築壇具儀受其降具如莫登庸故事督臣陳大科上言莫之篡黎其事逆黎之復讐其名正宜許其來歸如祖宗成法詔以維潭為都統使豫莫敬用髙平令維潭毋得侵害安南復定安南東至海西至老撾南接占城北連思明衡二千八百里縱一千七百里界兩廣雲南三省軺車往來必由廣西慿祥州鎮南關龍州為孔道由雲南臨安則蒙自縣蓮花灘可四五日至東都國中設十三道道不過中國一縣自黎氏以來雖奉貢稱藩然帝其國中如尉他故事死則加諡稱宗黎晭之弒或曰鄭惟鏟為之鄭宗强亡黎復黎皆鄭也鄭以江華為重莫以都齊為重維潭死子維新立維新死子維祺立補貢谷應泰曰交趾自漢入為郡縣此與番禺桂林同歸中國非屬彛附庸謹稱職貢比也洪武陳氏奉國稱臣率先入貢太祖許為外藩不利土地及永樂中黎氏弒主盜國稱帝改元非徒得罪本國意實抗衡天朝俘馘其衆不得云暴編伍其地不得云貪也既分郡縣編置官僚垂三十年儼然宇下一旦匹夫犯順遽爾割土加王嗟乎是賞叛也是奬奸也若曰存亡繼絶則陳乃孤也以義當立黎乃賊也以法當誅若曰勤民略逺則將立黎利乃定之矣若猶未也不如勿伐王通力屈而請和栁升再入而敗歿然後下詔遣使修好撤藩城下之盟耻同新鄭割地之議辱比敬塘矣夫文帝不加兵南越光武罷西域都護所謂量力度德懼啓兵端未有徒敗車奔師夷將隕形見勢絀忍詬攘詢韓王按劒牛後魯連誓死帝秦而乃君臣相賀自鳴聖德至於旌節符紱狼籍裔土將吏公卿流離草莽戰士汚魂哭聞中夜孤臣噀血碧化千年計其班師之日文武吏士携家而歸者八萬六千六百四十人為黎賊遮留不遣者尚數萬人死者君其問諸水濵生者不望生入玉門貽笑蠻方損威中國誰秉國成至此極乎漢火方昌呼韓稽顙元成不競乃棄珠崖唐美貞觀組加突厥文昭板蕩始棄維州宣宗四海乂安九州鼎盛王通敗因紈袴栁升失在輕浮乃拾捐之為美談比祖宗於穆滿夫曹公東下子布請迎澶淵戒嚴堯臣勸避自古儒生狃安憚勞托經誤國二楊太平宰輔黼黻承明恆若有餘决機危疑必形不足不然迎新主於金川阿焰璫於末路豈有立身朝堂進退狠狽而顧預謀閫外貽謀逺大者哉夷考其後名為陳後實為黎竊嘉靖中黎世中葉莫登庸復睥晲之黎又匍匐告哀朝臣又主二楊之說而世宗赫怒竟伸天討兵未出於國門莫已父子自縛泥首軍門削其王號世守吏職不聞其倔强自大勞弊中國也所可異者太祖使沐英取雲南即留英世鎮滇中成祖使張輔取交趾不以輔留鎮彼國二十年後并召還黃福禍發於中官亂成於庸帥勃貂多魚特警漏師短轅􅀈犢必敗乃公三百年來終淪王化夫亦廟算有遺策而春秋多責備也明史紀事本末卷二十二
