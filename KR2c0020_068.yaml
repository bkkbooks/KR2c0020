body:
  text: 明史紀事本末卷六十八浙江提學僉事谷應泰編三案神宗萬厯四十三年五月己酉有不知姓名男子持棗木棍撞入慈慶宫打傷守門內官李鑑直至前殿簷下內官韓本用等執縛付東華門守衛指揮朱雄等收之次日皇太子奏聞命法司提問庚戌巡視皇城御史劉廷元奏人犯供名張差係薊州井兒峪民語言顛倒形似風狂臣再三考訊本犯呶呶稱喫齊討封等語話非情實詞無倫次按其迹若涉風魔稽其貌的係黠猾情境叵測不可不詳鞫重擬者乙卯刑部郎中胡士相嶽駿聲等審張差供被李自强李萬倉燒差柴草氣憤於四月內來京要赴朝聲寃從東進不識門徑往西走適路遇男子二人紿曰爾無憑據如何進爾拿槓子一條來便可當作寃狀等語差日夜氣忿失志顛狂遂於五月初四日手拿棗木棍一條仍復進城從東華門直至慈慶宫門首打傷守門官走入前殿下被擒擬依宫殿前射箭放彈投磗石傷人律斬决不待時戊午刑部提牢主事王之寀言本月十一日散飯獄中末至新犯張差見其年壯力强非風顛人初招告狀著死撞進復招打死罷臣問實招與飯不招當饑死即置飯差前差見飯低頭已而云不敢說臣乃麾吏書令去止留二役扶問之招稱張差小名張五兒父張義病故有馬三舅李外父呌我跟不知姓名老公說事成與爾幾畝地種老公騎馬小的跟走初三歇燕角鋪初四到京問何人收留復云到不知街道大宅子一老公與我飯說你先衝一遭撞著一個打殺一個打殺了我們救得你遂與我棗棍領我由厚載門進到宫門上守門阻我我擊之墮地已而老公多遂被縳小爺福大又招有柏木棍琉璃棍棍多人衆等情其各犯名至死不招臣看此犯不顛不狂有心有膽懼之以刑罰不招要之以神明不招啜之以飲食始欲默欲語中多疑似願皇上縳凶犯於文華殿前朝審或勑九卿科道三法司㑹問則其情立見矣辛酉户部郎中陸大受言青宫何地男子何人而橫肆手棍幾驚儲蹕此乾坤何等時邪北人好利輕生有金錢以結其心則輕為人死至大姦之奔走死士也或出其技之庸庸者姑試之於死地以探其機而後繼之以驍桀用其死力於忽不經意之處有臣子所不忍言者張差業招一內官何以不言其名明說一街道何以不知其處彼三老三太互為表裏而霸州武舉髙順寧等今竟匿於何所變豈無因警甚非小乞皇上大振乾綱務在首惡必得邪謀永銷明肆凶人於朝市以謝天下疏中有姦戚二字上惡之與之寀疏俱不報御史過庭訓為移文薊州蹤跡之知州戚延齡具言其致顛始末諸臣據為口實以風顛二字定為鐵案矣乙丑刑部司官胡士相陸夢龍鄒紹光曽曰唯趙㑹楨勞永嘉王之寀吳養源曽之可柯文羅光鼎曽道唯劉繼禮吳孟登嶽駿聲唐嗣美馬德澧朱瑞鳳等再審張差供稱馬三舅名三道李外父名守才同在井兒峪居住又有姐夫孔道住本州城內不知姓名老公乃修鐵瓦殿之龎保不知街道大宅子乃住朝外大宅之劉成三舅外父常往龎保處送灰龎劉在玉皇殿商量和我三舅外父逼著我來說打上宫中撞一箇打一箇打小爺喫也有著也有劉成跟我來領進去又說你打了我救得你又有三舅送紅票封我為真人等語刑部行薊州道提解馬三道等疏請法司提龎保劉成對鞫給事中何士晉上言頃者張差持挺突入慈慶宫事關宗社安危皇上宜何如震怒三事大臣宜何如計安乃旬日以來似猶泄泄豈刑部主事王之寀一疏果無故而發大難之端邪雖事涉宫闈百宜慎重然謀未成機未露猶可從容曲處今形見勢逼業已至此所謂亂臣賊子人人得而誅之明主可與忠言此事寧無結局疏留中閣臣促之上諭曰朕自聖母升遐奉襄大典追思慈恩罔極哀慕不勝方在靜攝中突有風顛奸徒張差持挺闖入青宫震驚皇太子致朕驚懼身心不安朕思太子乃國根本豈不深愛已𫝊內宫添人守門關防不時衛護連日覽卿等所奏姦宄叵測行徑隱微既有主使之人即著三法司㑹同擬罪具奏是日刑部據戚知州回文以上壬申上再諭法司嚴刑鞫審速正典刑時語多涉戚臣鄭國泰國泰出揭自白給事中何士晉復奏陸大受疏內雖有身犯姦畹凶鋒等語特借此發端以明把憂之果驗而語及張差原止欲追究內官姓名太宅下落並未直指國泰主謀此時張差之口供未具刑曹之勘疏未成國泰豈不能從容少待輒爾具揭張皇人遂不能無疑若欲釋疑計惟明告宫中力求皇上速將張差所供龎保劉成立送法司考訊如供有國泰主謀是大逆罪人臣等執法討賊不但宫中不能庇即皇上亦不能庇設與國泰無干臣請與國泰約令國泰自具一疏告之皇上嗣後凡皇太子皇長孫一切起居俱係鄭國泰保護稍有踈虞即便坐罪則人心帖服永無他言若今日畏各犯招舉一惟熒惑聖聰久稽廷訊或潜散黨與使逺遁或陰斃張差使口滅則疑復生疑將成實事惟有審處以消後禍不報癸酉駕幸慈寧宫召見百官從御史劉光復請也輔臣方從哲吳道南暨文武諸臣先後至內侍引至聖母靈次行一拜三叩頭禮時上西向倚左門柱設低座俯石欄百官復至御前叩頭上連呼曰前來羣臣稍膝而前去御座不數武上練冠練袍皇太子冠翼善𤣥冠素袍侍御座右三皇孫鴈行立左階下上宣諭曰朕自聖母升遐哀痛無已今春以來足膝無力然每遇節次朔望忌辰必身到慈寧宫聖母座前行禮不敢懈怠昨忽有風癲張差闖入東宫傷人外庭有許多間說爾等誰無父子乃欲離間我邪適見刑部郎中趙㑹楨所問招情止將本內有名人犯張差龎保劉成即時凌遲處死其餘不許波及無辜一人以傷天和以驚聖母神位尋執東宫手示羣臣曰此兒極孝我極愛惜御史劉光復跪於班後大言曰皇上甚慈愛皇太子甚仁孝其意固將順也上不甚悉詰問為誰中使以御史劉光復對光復猶大言不止上斥之至再光復不聞仍申前說上色頓改連呼錦衣何在者三無應者遂令中涓縛之挺杖交下上戒無亂毆但押令朝房候㫖方從哲等叩頭言小臣無知妄言望霽天威怒稍解乃以手約皇太子體曰彼從六尺孤養至今成丈夫矣使我有别意何不於彼時更置今又何疑且福王既已至國去此數千里自非宣召彼能飛至乎因命內侍𫝊呼三皇孫至石級上令諸臣熟視諭曰朕諸孫俱已長成更有何說顧問皇太子爾有何語與諸臣悉言無隱皇太子曰似此風癲之人决了便罷不必株連又曰我父子何等親愛外廷有許多議論爾輩為無君之臣使我為不孝之子上因謂羣臣曰爾等聽皇太子語否又述東宫言連聲重申之羣臣跪聽未起上屢顧閽者令續到官皆放進無阻以故後來者踵趾相錯班行稍右與帝座逺上又持皇太子面向右問曰爾等俱見否衆俯伏謝乃命諸臣同出甲戌决張差於市乙亥上命司禮監㑹九卿三法司於文華門前鞫審龎保劉成保原名鄭進成原名劉登雲其與差飯及木棍引進等語俱轉展不招方審問東宫𫝊諭曰張差持棍闖宫至大殿簷下當時就擒並無别物其情實係風癲誤入宫闈打倒內寺罪所不赦後招出龎保劉成本宫反覆參詳保成身係內官雖欲謀害本宫於保成何益此必保成素曽凌虐於差故肆行報覆之謀誣以主使本宫念人命至重造逆大事何可輕信連日奏求父皇速决張差以安人心其誣舉龎保劉成若一概治罪恐傷天和况姓名不同當以讐誣干連從輕擬罪奏請定奪則刑獄平本宫陰隲亦全矣六月戊子刑部審馬三道李守才孔道以左道從律論應流李自强李萬倉應笞從之尋斃龎保劉成於內庭王之寀為科臣徐紹吉臺臣韓浚所紏部處閒住中㫖特黜為民補何士晉於外著刑部重擬劉光復罪奪刑部侍郎張問達俸既而釋光復於獄熹宗天啓元年閏二月御史魏光縉上言父母之仇不共戴天忠臣事君有死無二先皇帝以長君當主何嫌何疑而無端燕啄王孫瓜抱空蔓奸人搆煽每思為所欲為海內正人君子一有指斥輒以東林淮上為阱驅除既盡釀禍遂烈並封妖書之事張差挺擊之謀九廟有靈旋即撲滅而招據黃花山圍聚之逆謀三十六都頭內外多人之布列棗木柏木棍之凶器打死小爺之逆詞洞心駴目此時稍有人心謂宜請劒殺賊乃諸臣精神不用之以護青宫而偏用之以庇奸黨不用之以伸法令而偏用之以難問官首揑風癲以為張本司官望風承㫖曲意偏護改黨內為教內都頭為香頭許地三十五畝已載入招又復割去致張差以首搶地謂同謀做事事敗獨死竟付之不問也主事王之寀懼為赤族之誅明言入告而諸奸恨不附已巧借察典追奪誥命主事李俸聲言處分勒令致仕郎中陸大受張廷上疏告變張廷卒以憂死而大受又以大計黜去嗟嗟逆君者有罪發奸者何罪借風癲漏獄詞者有罪抒公憤捐身命者何罪是非不兩立之寀非則張差是矣之寀當罪則張差當賞矣况此一事也拿賊奏聞者先帝請下法司者先帝皇祖曽不以先帝之請為非而為之决張差殲奸監凡十年不御之朝堂一旦召見羣臣面行撫慰然則皇祖之於此事亦曉然明白特諸臣以風癲二字無所歸著故寧寬賊徒而罪之寀耳聖明在御恩及林藪建言受杖之人先後光明而三臣去國孤蹤不蒙昭雪此忠臣義士所以感憤而不平也伏乞皇上立賜擢用以為忘身殉國之勸若傍撓有人終從禁錮亦須明白此案於天地間使人知三臣心事亦曽有人議之者即三臣終老巖穴無恨若區區一官三臣自誓之日業已棄擲而今日乃欲以腐鼠嚇之乎嗟嗟之寀本無罪而諸臣强名之曰罪楊漣本無功而諸臣强名之曰功有罪者去有功者亦去則為今之臣必當何如而後可乎臣願與天下萬世共質之上可其奏二年二月刑部主事王之寀上言乙卯之變先帝安危在於呼吸鄭國泰私結劉廷元劉光復姚宗文等無復忌憚遂欲睥睨神器化家為國國泰雖死法應開棺斷尸僇其族赭其宫以為人臣大逆不道之戒總之用藥之方即通間之術通間之術即挺擊之謀向使張差事發窮究根株今日之盧受崔文升敢復爾哉長安公論有曰風癲二字欲抹殺亂臣賊子就廷元評廷元也竒貨無功四字欲抹殺忠臣義士就光復評光復也擊不中而假之諜諜勢緩而促之藥是升之藥慘於差之棍是受之書烈於哲之書也張差之前從無張差劉成之後豈無劉成亂賊接踵而皇上孤立於朝矣又言郎中胡士相等主風癲者也堂官張問達調停風癲者也寺臣王士昌疏忠而心佞評無隻字頌多溢詞堂官張問達語轉而意圓先允風癲後寬奸宄勞永加嶽駿聲等同惡相濟張差招有三十六頭兒則胡士相閣筆招有東邊一起幹事則嶽駿聲言波及無辜招有紅封票髙真人則勞永加言不及究紅封教今髙一奎見監薊州係鎮朔衛人蓋髙一奎主持紅封教者也馬三道管給紅票者也龎保劉成供給紅封教多人撒棍者也諸奸亦有人心者以堂官對衆手單而改之以十八人㑹審公單而增減之大逆不道非止大不敬也疏入上不問五月御史馬逢臯給事中張鵬雲交章劾劉廷元吏部尚書張問達覆奏廷元倡論保奸降調五年春正月御史楊維垣劾張差一案王之寀幸功躐躋誣皇祖負先帝不惟無功抑且有罪又曰從來君臣父子之間聞以理喻未聞以勢激也投鼠者既不忌器則騎虎者豈復擇音彼中夜之泣何求不獲是先帝之危不危於張差之一挺而危於之寀之一激也即碎之寀之骨豈足贖哉疏入削之寀籍五月原任刑部郎中嶽駿聲復申挺擊始末疏入起用王之寀逮訊追贓之寀竟以重譴死夏允彜曰挺擊之事王之寀所詢張差其言甚悉刑部各司官㑹鞫時亦多相合於是舉朝喧然以為國戚有専諸之意貴妃亦危懼訴於上上命自白之太子貴妃見太子辨甚力貴妃拜太子亦拜且拜且泣上亦掩泣為斃二璫以解而攻東林者言上於貴妃盛時曽許以立愛晚而愧言之不符也因勸貴妃廣修佛事且助其費上發銀十萬建祠二璫以為磚瓦甚多不若置窑自造利甚奢居民多鬻薪於璫者張差賣田貿薪亦往市於璫土人忌之焚其薪差訟土人於璫璫復嚴責差差以産破薪焚訟又不勝憤憤持挺入宫欲告御狀不意闖入東宫事亦不可知然東宫雖侍衛蕭條何至使外人䦨入諸臣危言之使東宫免意外之虞國戚懷惕若之慮斷斷不可少顧事聨宫禁勢難結案若必誅外戚廢親藩度能得之於神宗乎從古有明行之法有必不可明行之法則田叔燒梁獄詞亦調停不得已之術何者光宗固無恙尚可以全骨肉也乃彼劉廷元韓浚輩必斥逐執法者而後已是何心與神宗萬厯四十八年八月丙午朔光宗踐阼先是七月光宗遵遺命封皇貴妃鄭氏為皇后命禮部查例鄭貴妃進美女四人乙卯上不豫召醫官陳璽等疹視丁巳上力疾御門視事聖容頓減己未內醫崔文升下通利藥上一晝夜三四十起支離牀褥間辛酉上不視朝輔臣方從哲等赴宫門候安有數夜不得睡日食粥不滿盂頭目眩暈身體罷軟不能動履之㫖乙丑鄭養性請收還皇貴妃封后成命允之刑部主事孫朝肅徐儀世御史鄭宗周上書方從哲責以用藥乖方之故給事中楊漣上言賊臣崔文升不知醫不宜以宗社神人托重之身妄為嘗試如其知醫則醫家有餘者泄之不足者補之皇上哀毁之餘一日萬幾於法正宜清補文升反投相伐之劑然則流言藉藉所謂興居之無節侍御之蠱惑必文升藉口以蓋其娛藥之奸冀掩外庭攻摘也如文升者既益聖躬之疾又損聖明之名文升之肉其足食乎臣聞文升調護府第有年不聞用藥謬誤皇上一用文升倒置若此有心之誤邪無心之誤邪有心則虀粉不足償無心則一誤豈可再誤皇上奈何置賊臣肘腋間哉丁卯𫝊錦衣官宣兵科楊漣并召輔臣方從哲劉一璟韓爌英國公張維賢尚書周嘉謨李汝華孫如游黃嘉善黃克纘都御史張問達給事中范濟世御史顧慥等時廷臣疑上且杖漣既入上目視漣久之各諭以國家事重卿等盡心朕自加意調理辛未再召見羣臣於乾清宫上御東暖閣倚榻憑几皇長子侍立上命諸臣前連諭曰朕見卿等甚喜從哲等請皇長子移宫上曰令他别處去不得請慎醫藥上曰十餘日不進矣久之又諭冊封李選侍諸臣退二十九日甲戌上再召諸臣等於乾清宫仍諭册立皇貴妃從哲等以冊儲原㫖期宜改近蚤竣吉典以慰聖懷上因顧皇太子諭曰卿等輔佐為堯舜又語及夀宫輔臣以皇考山陵對則自指曰是朕夀宫諸臣言聖夀無疆何遽及此上仍諭要緊者再因問有鴻臚寺官進藥何在從哲奏鴻臚寺丞李可灼自云仙丹臣等未敢輕信上即命中使宣可灼至疹視具言病源及治法上喜命趨和藥進上飲湯輒喘藥進乃受上喜稱忠臣者再諸臣出宫門外俟少頃中使𫝊聖體用藥後暖潤舒暢思進飲膳諸臣歡躍而退可灼及御醫各官留時日己午比未申可灼出輔臣迎訊之可灼具言上恐藥力竭復進一丸亟問復何狀可灼以如前對五鼓內宣急召諸臣趨進而龍馭以卯刻上賔矣時九月乙亥朔也中外藉藉以李可灼誤下劫劑恐有情弊而方從哲擬㫖賞可灼銀五十兩御史王安舜首爭之疏曰醫不三世不服其藥先帝之脉雄壯浮大此三焦火動面唇赤紫滿面火升食粥煩燥此滿腹火結宜清不宜助明矣紅鉛乃婦人經水陰中之陽純火之精也而以投於虛火燥熱之症幾何不速之逝乎然醫有不精猶可藉口臣獨恨其膽之大也以中外危疑之日而敢以無方無製之藥駕言金丹輕亦當治以庸醫殺人之條乃䝉殿下頒以賞格臣謂不過借此一舉塞外廷之議論也夫輕用藥之罪固大而輕荐庸醫之罪亦不小不知其為謬猶可言也以其為善而荐之不可言也疏入乃改票罰俸一年而議者蜂起矣御史鄭宗周上言往嵗張差之變操椎禁門幾釀不測之禍秪以皇祖優容未盡厥罪故文升尤而效之臣請寸斬文升以謝九廟臣非謂誅一文升遂足以申國憲而消逆萌第恐張差之後因有文升今文升復置不問奸人得志何所憚而不為也從哲擬㫖下司禮監於是御史郭如楚主事吕維祺交章論崔文升李可灼壬午給事中惠世揚劾奏輔臣方從哲言鄭貴妃包藏禍心先帝隱忍而不敢言封后之舉滿朝倡義執爭從哲兩可其間是狥平日之交通而忘宗社之隱禍也無君當誅者一李選侍原為鄭氏私人麗色藏劍且以因緣近幸之故欺抗先聖母從哲獨非人臣乎及受劉遜李進忠盜藏美味夜半密約封妃不得估居乾清是視登極為兒戲而天子不如宫嬪也無君當誅者二崔文升輕用剝伐之藥廷臣交章言之從哲何心必加曲庇律之趙盾許世子何辭弒君之罪無君當誅者三癸巳太常寺少卿曹珍請究醫藥奸黨熹宗天啓元年春正月御史焦源溥請誅崔文升十月丁卯御史傅宗龍馬逢臯李希孔交章請誅崔文升二年夏四月光祿少卿髙攀龍上言崔文升故用泄藥元氣不可復收是明以藥弒也在律故違本方殺平人者死况至尊乎陛下不即誅僇僅止斥逐今文升復潜住京師意欲何為往者張差謀逆實係鄭國泰主謀劉保謀逆實係盧受主謀受鄭氏人不可掩也文升素為鄭氏腹心特當時失刑不及拷訊其罪豈在張差劉保下乎不聽禮部尚書孫慎行上言皇考賔天雖係夙疾實緣醫人進藥不審邸報有鴻臚寺官李可灼進紅藥兩丸乃原任大學士方從哲所進凡進御藥太醫院宫呈方簡明恐致失誤可灼非用藥官也丸不知何藥物而乃敢突以進春秋許世子進藥於父父卒世子自傷與弒不食死春秋尚不少假借直書許世子弒君然則從哲宜何如處焉速劍自裁以謝皇考義之上也闔門席藁以待司寇次也而乃晏然支辨至滿朝攻可灼僅禀回籍調理豈以己實荐灼恐與同罪夫已與可灼可愛而皇考可忍乎臣謂縱無弒之心却有弒之事欲辭弒之名難免弒之實即忠愛深心欲為君父隱諱不敢不直書云方從哲連進紅藥兩丸須臾帝崩恐百口無能為天下萬世解矣且從哲所不能解者非獨此也先是則有𫝊皇貴妃欲立皇后事夫祖制未有以妃為后者亦未有帝崩立后者貴妃寵幸數十年皇祖英明不聞有楚歌楚舞唏噓之態即彌留之際尚不能因緣徼幸而突𫝊此㫖觀禮部疏云輔臣方從哲𫝊其言可思若非禮部執爭諸科道力責貴戚上章請免幾何不誤立皇后貽社稷憂此從哲不能為天下萬世解者一也又有議上尊諡稱恭皇帝夫宋之恭端將亡衰主晉主降宋隋主降唐周主降宋俱為恭帝皇祖四十八年平倭平播平寧夏豈無他懿美可稱而比降王逋裔若非言官預紏便應如議詛咒君國等於辨髦此從哲不能為天下萬世解者二也又有選侍垂簾聽政事夫選侍宫中何知前代有垂簾事即劉遜李進忠小豎何遂膽大揚言言者以為從哲實教之從哲即未肯承然以顧命元臣曽不聞慷慨一言任婦寺之縱橫忍冲主之杌􅑾此從哲不能為天下萬世解者三也以此三事例彼進藥相臣所宜急擔當之事一切苟且泄沓相臣所宜極慎重之事反覺勇猛直前春秋無將漢法不道真無以過伏乞皇上大奮乾綱赫然震怒毋訪近習近習其攀援也毋畏忌諱忌諱其布置也如臣言有當乞將從哲大正肆放之罰速嚴兩觀之誅併將李可灼嚴加拷問置之極刑如臣言無當即以重典治臣亦所甘受矣奉㫖㑹議具奏左都御史鄒元標上言臣聞乾坤所以不毁者恃此綱常而綱常所以植立者恃此信史臣舟過南中諸士縉爭言先帝卒然而崩大事未明難以𫝊信臣謂先帝無妄之藥迹或有之而以誅心之法例之臣未忍聞既入都門聞諸臣曰說到先帝大事令人閣筆說到壬辰以後諸相事令人閣筆誰敢領此臣益復致疑近讀孫慎行一疏令人神骨為悚即未必有是心當時依違其間不申討賊之義反行賞奸之典無以解人之疑方從哲秉政七年未聞輔相何道但聞一日馬上三書催戰將祖宗櫛風沐雨一片東方盡致淪沒試問誰秉國鈞而使先帝震驚使張差闖宫使豺狼當道使宵人亂政使潜鱗駭浪將何辭以對從哲近在肘腋羣陰密布臣投林一世恥言人過豈敢過求從哲惟是臣身為風憲之官名在㑹議之列畏禍緘口勢所不能君臣大義今日不明再無有明之日臣官不言再無有言之人臣亦知陛下隆禮舊輔未必能毅然立斷諸輔同籍同官未必能捐情立剖易曰益之用凶事凶事政所以益之也臣讀學士公鼐疏曰六七年間以言及東宫者為小人不言東宫者為君子此何等景象是誰使之又云盡除天下之清流陰剪元良之羽翼此真實録真史筆也從來亂臣賊子有所懲戒者全在青史臣不知忌諱為先帝計為陛下萬夀無疆計為天下萬世君臣計為寒將來奸臣賊子之膽殺將來奸臣賊子之謀計疏入方從哲上疏辨自請削奪投諸四裔以禦魑魅時九卿科道㑹奏久延給事魏大中速之曰禮臣孫慎行痛先帝崩殂討舊輔方從哲以春秋之法皇上命諸臣據實回報何以迄今未奏也蓋先帝之棄羣臣在庚申九月之朔日而率土忠義之驚心者已在乙卯五月之四日自前日之挺不中而圖所以中者百端至藏鴆毒於女謁俟元精耗損憊不可支而蕩以暴下之劑爍以純火之鉛先帝彌留而不起矣然則張差崔文升諸人先帝之賊也自乙卯以迄庚申其時執政者誰討賊者誰何以迄今未奏也且非獨不討而已酬可灼以賞賜奬可灼以忠愛寬可灼以罰俸優可灼以養病而崔文升者代為委之於先帝之宿疾至一至再夫以數十年忠肝義膽所羽翼之賢良數十日深山窮徼所謳吟之堯舜一旦戕於二賊之手從哲不能討反從而護之從哲真無人心者何以迄今未奏也春秋之法誅意䦨入慈慶非張差之意固鄭國泰之意也投劑益疾非崔文升之意固鄭養性之意也而執政者何以不問也春秋之法誅賊必誅夫賊之所恃今造意者何所恃黨賊者何所恃恃從哲也不必紅鉛之進出從哲之意而從哲已為罪之魁也何以迄今未奏也李可灼之藥不合之崔文升不備崔文升之逆不溯之張差不明鄭國泰鄭養性方從哲之罪不參之三案不定不悉崔文升之情罪不下張差而李可灼次之如是而朝廷所以處從哲與從哲之所以自處者可以權衡其間矣何以迄今未奏也時先後彈者主事王之寀劉宗周給事中周希令彭汝南𫝊櫆御史吳甡薛文周沈應時方有度安伸溫臯謨江日彩張慎言㑹議駁正者尚書王紀汪應蛟王永光侍郎楊東明陳大道李宗延張經世陳邦瞻太僕卿蕭近髙張五典少卿申用懋于倫李之藻歸子顧劉策孫居相周起元田生金柯昶滿朝薦熊明遇黃龍光太常少卿髙攀龍給事中劉𢎞化霍守典御史蔣允儀劉徽李𤣥等於是吏部尚書張問達㑹户部尚書汪應蛟等公奏略曰禮臣孫慎行首論李可灼進紅丸事可灼先見內閣臣等初未知至奉皇考宣召於乾清宫輔臣與臣等乃共言可灼進藥多言不可進或言可進俱慎重未敢决又宣臣等進宫內跪御榻前諭臣等輔皇上為堯舜隨問寺官李可灼何在可灼至視疾進紅丸少頃又進一丸至申聞聖體服藥後微汙身覺溫熱就寢此進藥之始末臣等所共見聞者是時輔臣視皇考之疾急迫倉皇悽然共切弒逆二字何忍輕言但以我皇上之身可灼輕進嘗試從哲未能力止九卿與輔臣并候於宫門內亦未能力止諸臣均有罪焉至於可灼之處分中外共痛之憾之乃臺臣王安舜上疏力爭先票罰俸繼票養病去則失之輕失之輕故即按其輕而罪其不盡法處也不重處可灼何以慰皇考服中外而正大法輔臣於辨疏後自請削奪以釋中外之疑臣等謂應如輔臣之請為法任咎是亦大臣引罪之道所宜爾至於選侍欲垂簾聽政吏部九卿公疏請移宫科道専疏請移宫皇上允其奏諸臣共快之然其心猶以輔臣之奏不毅然為諸臣倡也倘其時非諸臣共扶大義乾清何地令其竊靈威福又將如我皇上登極還宫何哉夫李可灼非醫官也非知脉知醫者也一旦以紅丸進希圖非望之福而龍馭上升攀號無及可灼罪勝誅乎應即勑行法司究問以正刑章崔文升當皇考哀感傷寒之時進大黃凉藥可灼輕進紅丸不加詳察罪又在可灼上矣法應逮文升於法司從重究擬以三尺除二惡肅綱紀而泄公憤庶中外之心可以釋輔臣之心可以明議上李可灼法司究問崔文升仍發遣南京是時與從哲合者刑部尚書黃克纘詹事公鼐御史王志道徐景濓給事中汪慶百十月李可灼遣戍五年四月免李可灼戍十一月尚寶司少卿劉志選劾原任禮部尚書孫慎行倡不嘗藥之說妄疑先帝不得正其終更附不討賊之論輕詆皇上不得正其始并侵及葉向髙張問達命宣付史館愍帝崇禎元年三月太監崔文升下獄戌南京初魏宗賢擅權復以文升督漕運至是敗谷應泰曰光宗方諒暗鞫凶哀勞毁瘁而宫中巧相蠱惑更進女尤於是罷免常朝軟腳致疾一月之內玉几再憑梓宫兩哭嗚呼斯亦皇家之不幸也考其時提督御藥房橫加攻泄者內侍崔文升也泊乎疾漸彌留氣息才屬而玉碗初調金甌不御者李可灼也然而光宗之疾無文升或猶可以幸生而却可灼亦難免於必死者蓋文升之調護在初而可灼之援救已劇也善乎吳甡之言曰文升故投泄藥可灼誤進紅丸故以藥之補泄相較則大黃之尅過於紅鉛而以事之早晚相衡則文升之辜浮於可灼此時為政府者宜援憲宗柳泌之事純皇李孜省之獄論坐文升薄譴可灼伸嗣主之呌號慰域中之哀痛則其法平矣而奈何文升保全可灼蒙賚掩罪為功一至此乎夫庸醫殺人律應永錮拙工誤治俗奮老拳何嘗疑其别有主使內叢鴆毒而情有所激法不得貸獨奈何宫車晚出銀幣蚤膺崇德報功義於胡有執筆者不學無術甚愚鮮量矣宜諸臣之起而攻之也夫諸臣以攀髯之忠矢批鱗之奏小雅傷時幾於誹怨嬰兒哭母失其常聲過於騷激無足怪者至若以文升可灼之不慎而即比之王莽之椒酒梁冀之煮餅則深文周內不無傷於好盡矣語云吾黨兩分其過可也光宗泰昌元年八月乙卯上不豫𫝊諭禮部曰選侍李氏侍朕勤勞皇長子生母薨逝後奉先帝㫖委托撫育視如親子厥功懋焉其封為皇貴妃欽天監擇九月初六日行乙丑主事孫朝肅徐世儀御史鄭宗周上書輔臣方從哲請冊立皇太子且移居慈慶宫庚午上召閣部九卿至榻前諭曰選侍數産不育止存一女隨𫝊皇長子出見上又言皇五子亦無母亦是選侍撫育𫝊皇五子出見辛未上召諸臣於乾清宫又諭速封選侍禮臣孫如游奏臣部前奉聖諭上孝端顯皇后孝靖皇太后尊諡加封郭元妃王才人為皇后皆未告竣宜俟四大禮舉行之後若論皇儲保護功則選侍之封惟恐不早即從該監之請未為不可上命如前期甲戌上再召諸臣於乾清宫仍諭封皇貴妃語未既選侍披幃立呼皇長子入咄咄語復趨之出皇長子向上曰要封皇后上不語九月乙亥朔上崩給事中楊漣語周嘉謨李汝華曰宗社事大李選侍非可託少主者急宜請見嗣主呼萬嵗以定危疑隨擁出宫移住慈慶為是二臣然之以語方從哲漣遂先諸臣排闥入閽豎挺亂下漣厲聲曰皇帝召我等至此今晏駕嗣主幼小汝等阻門不容入臨意欲何為閽者却諸臣乃入哭臨畢請見皇長子皇長子為選侍阻於暖閣不得出青宫舊侍王安紿選侍抱持以出諸臣即叩頭呼萬嵗皇長子曰不敢當羣臣共請詣文華殿王安擁之行閣臣劉一燝掖左勳臣張維賢掖右內侍李進忠𫝊選侍命召還皇長子者三喝諸臣曰汝輩挾之何往漣叱之共擁皇長子登輿至文華殿皇長子西向坐羣臣禮見畢請即日登極不允諭初六日即位復擁入慈慶宫一燝奏曰今乾清宫未淨殿下請暫居此嘉謨曰今日殿下之身是社稷神人托重之身不可輕易即詣乾清宫哭臨須臣等到乃發皇長子首㫖漣語中官曰外事緩急在諸大臣調護聖躬在諸內臣責有所歸王安等踴躍稱諾諸臣退諸臣有議即日正位者令中官再𫝊不允衆皆朝服待命少卿徐養量御史左光斗唾漣不宜阻今日即位漣恐語錦衣帥駱思恭嚴緹騎內外防護丙子尚書周嘉謨等合疏請選侍移宫左光斗上言內廷之有乾清宫猶外廷之有皇極殿也惟皇上御天居之惟皇后配天得共居之其餘嬪妃雖以次進御遇有大故即當移置别殿非但避嫌亦以别尊卑也今大行皇帝賔天選侍既非嫡母又非生母儼然居正宫而殿下乃居慈慶不得守几筵行大禮名分倒置臣竊惑之且殿下春秋十六齡矣內輔以忠直老成外輔以公孤卿二何慮乏人尚須乳哺而襁負之哉即貴妃之請許於先皇彌留之際其意可知且行於先皇則俯錫之名猶可行於殿下則尊聞之稱有斷斷不可者倘及今不早斷借撫養之名行専制之實武后之禍將見於今上諭移宫已有㫖冊封事既云尊卑難稱著禮部再議給事中暴謙貞抄參曰大寶將登上有百靈呵護下有羣工擁戴亦何用此婦人女子為且聞選侍非忠誠愛國者萬一封典得行事權或假則滋蔓難圖慎終慮始事屬可已抄出寢之戊寅選侍用李進忠謀邀皇長子同宫王安忿然宣言且逮楊左楊漣遇進忠於宫門問選侍移宫何日進忠搖手曰李娘娘怒甚今母子一宫正欲究左御史武氏之說漣咤曰誤矣幸遇我皇長子今非昨比選侍移宫異日封號自在且皇長子年長矣若屬得無懼乎進忠默然去科道惠世楊張潑從東宫門來駭𫝊今日選侍垂簾逮光斗漣曰無之己卯選侍尚無移宫意楊漣上言先帝升遐人心危疑咸謂選侍外托保護之名陰圖専擅之實故力請殿下暫居慈慶欲先撥别宫而遷之然後奉駕還宫蓋祖宗之宗社為重宫幃之恩寵為輕此臣等之私願也今登極已在明日矣豈有天子偏處東宫之禮先帝聖明同符堯舜徒以鄭貴妃保護為名病體之所以沉錮醫藥之所以亂投人言藉藉至今抱痛安得不為寒心此移宫一事臣言之在今日殿下行之亦必在今日閣部大臣從中贊决毋容泄泄以負先帝憑几輔殿下之託亦在今日疏上漣復往趨方從哲從哲曰待初九十二亦未晚漣曰天子無復返東宫理選侍今不移亦未有移之日此不可頃刻緩者內侍曰獨不念先帝舊寵乎漣怒曰國家事大豈容姑息且汝輩何敢如是聲徹大內皇長子使人諭漣出命司禮監按盜藏諸侍收李進忠劉遜等選侍移居仁夀殿己亥御史賈繼春上書輔臣曰天地之大德曰生聖人之至德曰孝先帝命諸臣輔皇上為堯舜夫堯舜之道孝弟而已矣父有愛妾其子終身敬之不忘先帝之於鄭貴妃三十餘年天下側目之隙但以篤念皇祖涣然氷釋何不輔皇上取法而乃作法於涼縱云選侍原非淑德夙有舊恨此亦婦人女子之常態先帝彌留之日親向諸臣諭以選侍産有幼女歔欷情事草木感傷而况我輩臣子乎伏願閣下委曲調護令李選侍得終天年皇幼女不慮意外辛丑御史左光斗上言選侍既移宫之後自當存大體捐其小過若復株連蔓引使宫闈不安是與國體不便亦大非臣等建言初心伏乞皇上宣召閣部九卿科道面諭以當日避宫何故今日調御何方不得憑中使口𫝊聖㫖正劉遜李進忠法其餘概從寬政庶幾燒梁獄之詞者正以寢淮南之謀疏入上𫝊諭內閣朕幼冲時選侍氣凌聖母成疾崩逝使朕抱終天之恨皇考病篤選侍威挾朕躬𫝊封皇后朕心不自安暫居慈慶選侍復差李進忠劉遜等命每日章奏文書先奏選侍方與朕覽朕思祖宗家法甚嚴從來有此規制否朕今奉養選侍於噦鸞宫仰遵皇考遺愛無不體悉其李進忠田詔等盜庫首犯事干憲典原非株連卿可𫝊示遵行輔臣方從哲讀諭驚愕具揭封進言皇上既仰體先帝遺愛不宜暴其過惡𫝊之外庭上再諭發抄南京御史王允臣紏從哲曰陛下移宫後發一聖諭不過如常人表明心迹之意而宰相輒自封還司馬昭之心路人知之十月丁卯噦鸞宫災上諭選侍皇妹俱無恙十一月丁亥給事中周朝瑞以賈繼春之揭謂其喜樹旌旗妄生題目繼春復揭曰保全選侍蓋亦人倫天理布帛菽粟之言非旌旗題目也朝瑞揭駁之日安選侍者猶謂之是安宗社者顧謂之非乎繼春再揭曰主上父子相繼宗社何嘗不安而必待傾選侍以安之即移宫原是正理豈必移時驅逐革其已進儀注之貴妃困其無端羅織之老父伶仃之皇八妹入井誰憐孀寡之未亡人雉經莫訴朝瑞又揭謂繼春操戈於解忿平爭者繼春又揭職非操戈乃止戈也聖德無損為臣子者同心為國有何不解之忿不平之爭而煩左右袒之費詞乎刑部尚書黃克纘執奏鄭穩山劉尚禮姜升劉遜四人罪名當從末减不允克纘執奏如初因言父母並尊事有出於念母之誠迹似涉於忘父之過必委曲周旋使渾然無跡方為大孝因力求罷十二月乙卯都給事楊漣疏曰前選侍移宫一事護駕諸臣知之外廷未必盡知及今不一昭明將以今日之疑端成他時之實事臣䝉先帝召見目擊當日情形敢不一語憶先帝憑几之言間及選侍而再四叮嚀則曰輔皇上要緊選侍忽從門幔中手挽皇上而入復推而出隨有要封皇后之言諸臣相顧錯愕夫君臣正相引痛之時忍於要挾求封一旦事權在握豈僅僅虛名足稱其意此八月二十九日事也逮九月初一日子夜先帝急召諸臣而龍馭上賔矣此時主君為重宜急於請見一見即呼萬嵗以慰人心而宫門內使乃有持挺不容入者臣冒犯忿詈與爭此初一日卯刻入宫事也諸臣哭臨畢請見皇上於寢門拜呼萬嵗天語不敢當者三諸臣捧龍軒至文華殿門行嵩呼叩頭禮已而大小臣工共祈皇上即日登極上𫝊諭卜期而諸臣皇皇深以未登極為危蓋先帝變出倉卒上無聖母之憑依中無皇后之慰藉在旁窺伺誰為可恃此初一日辰刻事也爾時諸臣議皇上宜歸何宫臣思選侍推挽景象又習聞其上有深相交結之貴寵乃云從來冲齡天子不宜託之素無恩德之婦人且選侍如可託皇上必深知之雖强之離而不得如不可託雖强之留而亦不可得而聖駕果徑歸慈慶宫矣此初一日巳刻事也御極卜期初六至初二日九卿科道有移宫之請御史左光斗有移宫之請蓋因皇上一正九五斷無避宫而又不可同居至初五日期且迫矣臣是以有正位參及李進忠等之疏總以宫嬪自有定分即加恩選侍原不在宫之移與不移假令登極之後而宫嬪悍然居天子之宫天子歸青宫非理歸乾清不得尚得朝廷尊而體統正乎此初五日午刻臣從諸臣於慈慶宫前憤爭事也至本日移宫臣即語諸大臣移宫自移宫隆禮自隆禮必兩者相濟而後二祖列宗之大寶始安先帝在天之靈始妥即本日緝獲罪璫只宜殱厥渠魁無滋蔓引大抵宸居未淨先帝之社稷付託為重則平日之寵愛為輕及其宸居已定既盡臣子防危之忠即當體皇上如天之度今諸大臣猶在耳也臣之所以議移宫者始終如此乃移宫之後忽來蜚語有倡選侍徒跣踉蹌欲自裁處皇妹失所至於投井者或𫝊治罪璫過甚者或稱內外交通者使夙夜憂時之士誤收為一時感慨嘆息之言作此日不白之案九廟神靈鑒此熱血若夫緝拏罪璫此譬如人家主人謝世羣僕乘間竊其帑藏主人之子偶一究問只在法司得其平耳於選侍恩禮何與臣謂寧可使今日惜選侍無使移宫不早不幸而成女后垂簾之事彼三十餘年憑依蟠結之羣邪又得以因緣多事於以保惜先帝寵愛則得矣而輔皇上要緊之深意在天之靈果以此為愈快邪况兩奉聖諭選侍居食恩禮有加噦鸞宫火復奉有選侍皇妹無恙之㫖方知皇上雖念及於孝和皇太后之哽咽仍念及於光宗先帝之唏歔海涵天蓋盡仁無已伏乞皇上採臣戅言更於皇弟皇妹時勤召見諭安不妨曲及李選侍者酌加恩數遵愛先帝之子女當亦聖母所共喜者疏上下㫖褒諭又特諭廷臣曰朕冲齡登極開誠布公不意外廷乃有謗語輕聽盜犯之訛𫝊釀成他日之實録誠如科臣楊漣所奏者朕不得不再伸諭以釋羣疑九月初一日皇考賔天諸臣入臨畢請朝見朕李選侍阻朕於暖閣司禮官固請選侍許而後悔又使李進忠請回者至再至三朕至乾清宫丹陛上大臣扈從前導選侍又使李進忠來牽朕衣卿等親見當時景象安乎危乎當避宫乎不當避宫乎是日朕自慈慶宫至乾清宫躬視皇考入殮選侍又阻朕於暖閣司禮監王體乾固請得出初二日朕至乾清宫朝見選侍畢恭送梓宫於仁智殿選侍差人𫝊朕必欲再朝見方回各官皆所親見明是威挾朕躬垂簾聽政之意朕䝉皇考命依選侍朕不住彼宫飲食衣服皆皇祖皇考所賜每日僅往彼一見因之懷恨凌虐不堪若避宫不早則彼爪牙成列盈虛在手朕亦不知如何矣既毆崩聖母每使宫眷王夀花等時來探聽不許朕與聖母舊人通一語朕苦𠂻外廷不能盡知今停封以慰聖母之靈奉養以尊皇考之意該部亦可以仰體朕心矣臣工私於李黨不顧大義諭卿等知之今後毋得植黨背公自生枝節時方從哲在告劉一燝等上言皇上嗣位以來宫禁肅清乃以形跡影響之疑互相紛辨致厪聖懷伏讀聖諭當年宫掖事情及頃者辟宫景象悽惋危𠂻宛然在目諸臣徒以事後論安危謂周防為多事皇上責以猜疑輕聽誠恐有之若云庇護黨私則萬萬不敢也御史王業浩上言先帝育德青宫止孝止慈何以一女子之微致生枝節如聖諭𣲖與照管并毆崩聖母等語天下萬世不察則先帝御家之盛德不無少損且父母之讐不共戴天普天率土俱有同仇之義而聖諭至此且曲處如此則前日之肅清既未得為義之盡今此之優厚亦不得為仁之至外廷臣工比肩事主至分目之曰安社稷安選侍臣恐水火之情形既判𤣥黃之戰辨方興奏留中庚午都給事楊漣乞歸疏曰垂簾之祕事未聞入井之煩言嘖起臣不過發明移宫始末使了然在人耳目而旋荷綸綍之褒過邀忠直之譽使臣區區之苦心反為夸詡臣節之左劵臣之不安一也當時首請御文華殿受嵩呼者周嘉謨等也初出乾清宫捧皇上左右手者張維賢劉一燝也臣乃以憤爭之故獨受忠直之名俯慙卑末豈可掩人於朝仰藉清平豈可貪天為力臣之不安二也宫禁自就肅清社稷有何􅑾杌而聖諭以志安社稷為言君幸有子不憂把國之天臣獨何人敢捧虞淵之日臣之不安三也臣引分自思俯全臣節惟有决去一著而已臣蹇窮骯髒之人披上方之文綺賚兩朝之賜金步歸里門以忠直二字出告親友入教子孫直覺俯仰皆寬即不幸先犬馬填溝壑持此二字以報皇考於在天見先人於地下臣亦可瞑目安寢矣臣無病不敢以病請皇上未罪臣又不能以罪請惟有明微薄之心跡乞浩蕩之恩波放臣為急流勇退之人而已詔許之熹宗天啓元年春二月御史賈繼春直陳具揭之實奉㫖切責繼春復上言臣初入班行當移宫之後祗因痛切先帝急欲效忠皇上及捧讀聖諭乃知天地之髙厚曲為保全而小臣之狂愚猶妄有規勸謹備録原揭回話上以其疏中無雉經入井二語著再回話夏四月吏部尚書周嘉謨及九卿科道㑹議云繼春席藁待罪懇請優容仍下㫖切責落職永不叙用四年夏四月大理寺少卿范濟世請遵遺命封李選侍為妃下㫖切責先是光宗青宫舊監王安强直不阿選侍魏忠賢既矯殺之乃盡反其所為㑹楊漣上疏發忠賢二十四罪忠賢益憤六月遂矯上命復議封選侍禮臣林堯俞奏止之不聽竟封李氏為康妃十二月召還御史賈繼春徐景濓王志道等夏允彜曰庚申一月之內連遭大喪中外洶洶楊漣率衆排闥見東宫即羅拜選侍時在乾清宫以母禮自待左光斗遽疏言乾清宫非至尊不可居持論自正但中言武氏之禍立見於今差亦過當楊左即拉閣臣揭請即日移宫選侍頗覺皇遽御史賈繼春遂言先帝至孝何至一妾一女不能遺庇亦未可盡言其非然宫之應移自屬定禮楊左不可居以為功他人亦何可詆之為罪也楊與賈互相譏諷賈以楊必將與大璫共受封拜譏之楊遂掛冠歸中㫖切責賈賈倉皇自辨詞頗哀髙𢎞圖張慎言出疏兩解之言至平旦確乃賈終黜為民而楊不久優擢至副院則亦東林失平之事也後遂以此殺楊左則寃彌甚即賈亦心憐之總之東林操論不失愛君而太苛太激使人難受攻東林者言風顛言可灼無他意移宫太亟不失調停卒以此罪諸賢而加以一網不大謬乎五年夏四月給事中霍維華上言梃擊紅丸移宫三案略曰選侍之請封也請封妃也妃之未封而况於后請之不得而况於自后不妃不后而况於垂簾臣謂宫不難移也王安等故難之也難移宫者所以重選侍之罪而張擁戴之功神祖冊立東宫稍遲諸臣羣起而爭之然篤愛震器始終不渝倘果如奸邪所稱廢立巫蠱之謀則九閽邃密乃藉一風癲之張差有是理乎非神祖先帝慈孝無間王之寀陸大受同惡相濟開釁骨肉矣神祖升遐先帝哀毁遽發夙疾而悠悠之口致疑於宫掖豈臣子所忍言孫慎行借題紅丸誣先帝為受鴆加從哲以弒逆鄒元標鍾羽正從而和之兩人立名非真晚節不振委身門户敗壞生平伏乞嚴諭纂修諸臣以存信史已而三朝要典成起乙卯止辛酉魏忠賢矯宸翰斥之愍帝崇禎元年五月侍講倪元璐上言主挺擊者力護東宫爭挺擊者計安神祖主紅丸者仗義之言爭紅丸者原情之論主移宫者􅀈變幾先爭移宫者持平事後六者各有其是不可偏非也未幾而魏忠賢殺人則借三案羣小求富貴則借三案故凡推慈歸孝於先皇正其頌德稱功於義父批根今日則衆正之黨碑免死他年即上公之鐵劵由此而觀三案者天下之公議要典者魏氏之私書以臣所見惟毁之而已假閹豎之權役史臣之筆亘古未聞當毁一未易代而有編年不直書而加論斷當毁二矯誣先帝僞托宸篇既不可比司馬光資治之書亦不得援宋神宗手序為例當毁三臣謂此書不毁必有受其纍者則非主三案者之纍而爭三案者之纍又纂修三案者之纍也爭三案諸臣品原三等如崔呈秀劉志選李春煜等不足問矣最上如黃克纘賈繼春王業浩髙𢎞圖劉廷宣等始處君子而不必求同既遇小人而自能為異本末炳然管華之席未割老韓之𫝊同編數人髙明之觀豈不引為坐塗之辱若其次者雖非盡有執持要亦不皆濡染而特以史氏抑揚之過保不為後人翻駁之端至於纂修詞臣之在當日更有難言者丹鉛未下斧鑊先懸姜逢元閣筆一嘆朝聞夕逐楊世英吳士元余煌等備極調維其於忤璫諸疏有匿其全文有刪其已甚時𫝊書成而獄又起則有寧加醜詆之詞决不下一不道無將等字以傳㑹爰書凡此苦心亦多方矣而事在見聞之外未易可明若復彈章一加萬節俱喪此臣之所謂纍也願勑部立將要典鋟毁一切妖言市語如舊𫝊㸃將之謡新騰選佛之說毋形奏牘則廓然蕩平上從之明史紀事本末卷六十八
