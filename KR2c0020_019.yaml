body:
  text: 明史紀事本末卷十九浙江提學僉事谷應泰編開設貴州太祖洪武十五年春正月置貴州都指揮使司命平涼侯費聚汝南侯梅思祖署司事貴州古羅施鬼國自蜀漢彛有火濟者從諸葛亮南征孟獲有功封羅甸國王歷唐宋皆以歸順不失爵土至是遣傅友德等平雲南上遣使諭友德曰前已置貴州都指揮使司然靄翠輩不盡服雖有雲南不能守也靄翠故元宣慰使已而見雲南俱平乃與同知宋欽皆降上仍授靄翠宣慰使欽宣慰同知各領所部居水西為貴州宣慰使𨽻四川其思州宣慰使田仁智思南宣慰使田茂安暨鎮逺等府𨽻湖廣普安鎮寧等州𨽻雲南已而靄翠請兵討部落隴居上曰中國之兵豈荒服報怨之具耶不許十八年夏四月思州諸洞蠻作亂命信國公湯和江夏侯周德興從楚王楨討平之時蠻寇出沒不常王師至輒竄匿退則復出剽掠和等扺其地恐蠻人驚潰乃于諸洞分屯立柵與蠻民雜耕使不復疑久之以計擒其渠魁餘黨悉潰師還留兵鎮之三十年三月古州洞蠻林寬自號小師聚衆作亂攻龍里千戶吳得率麾下馳擊之中毒弩死命左都督楊文為征蠻將軍都督同知韓觀副之統京衛江湖兵往征已林寬為指揮朱俊所縛送京師冬十月兵至沅州伐山開道二百里扺天柱遂涉苖境營小坪而以偏師别由渠陽零溪西南山徑銜枚夜發犄角以進分道夾攻直扺洪州泊里福祿永從諸洞大破之都督顧成亦勦平臻部六洞螃蟹天柱天堂大坪小坪諸寇班師還京成祖永樂九年春正月設普安安撫司以土目慈長為安撫賜銀印置流官𨽻四川布政司三月鎮守貴州鎮逺侯顧成奏金築安撫司諸處土軍宜一槩訓練上以蠻人憚拘束止之已而以貴州安寧特賜成銀幣上謂侍臣曰漢武帝窮兵黷武以事逺方罷敝中國朕無取焉顧成老成能持重安邊非喜功好事之流以是特嘉奬之十一年二月設貴州等處承宣布政使司及思州新化黎平石阡思南鎮逺銅仁烏羅八府以工部侍郎蔣廷瓚為左布政使初洪武中止設貴州思南州諸宣慰使思州所轄二十二長官司思南所轄十七長官司仍設都指揮使司鎮守其地及靄翠死妻奢香代立宋欽死妻劉氏代立劉氏多智術時馬煜以都督鎮守其地政尚威嚴欲盡滅諸羅代以流官乃以事裸撻奢香欲激怒諸羅為兵端諸羅果憤怒欲反劉氏聞止之為走訴京師上召問令入宫見髙皇后復令折簡招奢香至詢故上曰汝誠苦馬都督吾為汝除之然何以報我奢香叩頭曰願世世戢諸羅令不敢為亂上曰此汝常職何云報也奢香曰貴州東北有間道可通四川梗塞未治願刋山通道以給驛使往來上許之謂髙皇后曰吾知馬煜忠無他腸然何惜一人不以安一方也乃召煜數其罪斬之遣奢香等歸諸羅大感服為除赤水烏撤道立龍場九驛達蜀後安氏即靄翠後也至永樂初思州宣慰使田仁智子琛思南宣慰使田茂安子宗鼎各嗣立以爭沙坑故日尋兵上遣行人蔣廷瓚往勘之琛從廷瓚入見上白事自言思南故思州地當歸之又數宗鼎罪狀上曰思南舊歸明玉珍時汝何不取以自屬乃今言耶且罪惡在彼汝何與焉亟歸守爾土靖爾封疆慎勿搆釁起兵端再犯吾磔汝矣琛歸與宗鼎仇殺如故屢禁之不能止至是上密遣鎮逺侯顧成率校士數人潛入二境執琛宗鼎去二人既就執城中猶寂無知者忽一日使出揭榜諭諸羅曰朝廷以二凶日搆殺荼苦百姓故特遣使執問狀首惡既擒餘一無所問敢譁者族諸羅帖然琛宗鼎至京師俱斬之乃命戶部尚書夏原吉等曰思州思南苦田氏久矣不可令遺孽復踵為亂其易為府治改思州宣慰司為思州府思南宣慰司為思南府易置諸官僚遂設貴州布政司立三司等官治貴州宣慰司本司及思州思南鎮逺石阡銅仁黎平六府普安永寧鎮寧安順四州金築安撫司及普定新添平越龍里都勻畢節安莊清平平壩安南赤水永寧興隆鳥撒威清十五衛普市干戶所皆屬焉改蔣廷瓚為左布政使以廷瓚曽勘思州事諳彛情也十四年設貴州提刑按察司戶部刑部各增貴州一司其鄉貢附於雲南谷應泰曰秦皇開邊桂林象郡旋沒尉氏武帝窮兵越雋牂牁僅附臣屬或聚干戈或通璧幣用力若此獲效若彼蓋拓疆域通文教易稱革面書載頑民帝王若斯之難也貴州西接滇蜀東連荆粵地齒神州久淪荒服特以其地皆毒霧瘴山蠻洞彛寨無宛馬卭竹動中國愛慕而其君長世樂奉藩保不失禮貽憂邊吏黔遂無日通上國矣洪武初湯信國使之民蠻雜耕兵彛互習豈非天啓荒徼漸染華風朝鮮將開乃來箕子勾吳當治始有姬雍者與乃宋欽妻之乘間奔朝安奢香之聞呼赴闕兩女子觀變決機勇於丈夫甚至入見髙皇后使髙帝竟斬馬都督蒲伏掖門瞻仰天日指陳險厄立誓河山開赤水之道通龍場之驛智溢唐蒙功髙博望彼地有此異人山川豈能再阻蠻方耶永樂中二田復自相攻殺金雞命使特遣解紛翠華臨軒親承戒諭猶復怙終不遷攻殺如故夫亦夜郎恃逺于闐負險抑或天誘其衷折入中國閩人侵逼南粵歸漢延陀攻殺敕勒入唐廢興有數革置有時乎而顧成以校士數人入執二田繫頸檻車寂無知者比之介子樓蘭斷頭酒後班超鄯善捕使中宵天子神靈兵威不測斯為至矣此豈一時掩襲虎穴得子實乃二祖英武先聲奪人也二田授首處分羣縣為布政司者一為府者六為州者四為安撫司者一為衛者十五而黔中一省儼然進明堂分符瑞受冠帶祠春秋厠肩內地附麗皇輿矣國家無斗粟介士之勞邊臣無亡矢遺鏃之失自古開疆廓宇又未有若斯之易者也然則天馬蒲桃志寶物者不知略地樓船橫海志略地者不知化俗詩曰日闢國百里伊惟二祖有焉明史紀事本末卷十九
