body:
  text: 明史紀事本末卷四浙江提學僉事谷應泰編太祖平吳元順帝至正十三年夏五月泰州張士誠起兵陷髙郵士誠白駒場亭民為鹽場綱司牙儈與弟士德士信俱以販鹽緣為奸利性䡖財好施頗得衆心至是因亂與其黨李伯升潘原明吕珍等十八人聚兵陷泰州十四年冬十一月元右丞相托克托圍髙郵張士誠引兵逆戰托克托奮擊大破之士誠不能支與吕珍潘原明等十八騎突圍出走托克托遂克髙郵十六年春二月張士誠陷平江托克托既竄士誠亡命復聚衆渡海攻陷平江遂掠松江湖州常州諸郡皆下之九月徐達圍常州初常州奔牛壩人陳保二聚衆以黃帕裹首號黃包軍湯和等下鎮江保二降至是復叛歸張士誠誘執詹李二將去乙亥太祖遣楊憲通好于士誠書略曰近聞足下兵由通州遂有吳郡昔隗囂據天水以稱雄今足下據姑蘇以自王吾深為足下喜吾與足下東西境也睦鄰守圉保境息民古人所貴吾甚慕焉自今以後通使往來毋惑于交搆之言以生邊釁士誠得書以太祖比之隗囂不悅拘留憲不還尋誘我斥堠以舟師攻鎮江徐逹等禦之敗其軍于龍潭又冦冝興耿君用以鎧騰柵中槊死宜興入于士誠太祖聞之使諭徐逹曰張士誠起於負販譎詐多端今來冦鎮江是其交已變當速出軍攻毗陵先機進取沮其詐謀于是逹帥師攻常州進薄其壘士誠遣其弟張九六以數萬衆來援逹曰張九六狡而善鬬使其勝鋒不可當吾當以計取之乃去城十八里設伏以待仍命總管趙均用率鐵騎為竒兵逹親督師與九六戰鋒既交均用鐵騎橫衝其陳陳亂九六䇿馬走遇伏馬蹶為先鋒刁國寶王虎子所獲九六即士德梟鷙有謀士誠陷諸郡九六力為多既被擒士誠氣沮十月華雲龍王弼等復敗士誠弟士信于舊館擒其驍將湯元帥士誠既連敗乃奉書請和願輸糧二十萬石黃金五百兩白金三百斤以為犒軍之資太祖復書數其開釁召兵之罪且許其歸我使臣將校即當班師士誠得書不報十一月士誠誘我新附軍叛去助彼來戰徐逹被圍于牛塘逹勒兵與戰常遇春廖永安胡大海自外來援夾擊大破之擒其將張德餘兵奔入城逹率諸軍困之士誠復遣其將吕珍潛入城督兵固守十七年春二月丙午命耿炳文等率兵取長興張士誠將趙打虎以兵三千迎戰敗之追至城西門打虎走湖州戊申遂克長興擒其守將李福安達實密等獲戰船三百餘艘立永興翼元帥命耿炳文統兵守之尋士誠遣其僞左丞潘原明元帥嚴再興來冦炳文擊敗之生擒數百人斬首甚衆原明等遁去部將費聚復追至瑣橋敗之自是士誠不敢犯長興者四年我師圍常州既久敵衆乏食不能支吕珍等復潛遁去三月戊午克常州立長春樞密院以湯和為同僉總管統兵守之夏五月俞通海張德勝等以舟師略太湖入馬跡山衝賊水寨降張士誠將王貴紐津經洞庭山口吕珍兵猝至諸將倉卒欲退通海曰不可我寡乃身先士卒决戰矢中右目不為動徐令壯士披已胄立船上曰俞將軍珍不敢迫引去命兩淮分院副使張鑑同僉何文正率兵攻泰興張士誠遣兵來救鑑等擊敗之擒其將楊文德等己邜遂克泰興六月命常遇春分院判官趙繼祖元帥郭天祿鎮撫吳良等率兵取江陰張士誠兵據秦望山以拒我師繼祖等就攻之㑹大風雨其兵奔潰我師據其山翼日己未進攻城西門克之擢良為分院判官督兵守禦江陰密邇士誠去姑蘇僅百餘里控扼大江實當東南要衝未幾復命其弟吳禎增兵協鎮良等戮力設備軍容甚張每寇至輒破走之秋七月丁丑徐逹等下常熟八月徐逹常遇春康茂才襲江陰馬䭾沙克之元帥費子賢下武康士誠纍敗勢日窘南攻嘉興杭州又為楊旺扎勒所破乃請降于元士誠雖降而城池甲兵錢穀皆自據如故十八年春二月命廖永安俞通海桑世傑等討張士誠江陰石牌海寇僞帥欒瑞帥州判朱錠等整兵拒戰世傑奮戈躍馬陷陳死永安等奮擊大敗之擒欒瑞朱錠盡獲其海舟三月鄧愈李文忠胡大海率兵由徽州昱嶺關進攻建德路道出遂安遇長鎗元帥俞子貞擊敗之追至淳安遂安守將洪某率衆五千來援大海復戰敗之軍抵建德元參政布哈等不支棄城遁丙申克建德路以文忠為帳前總制親兵指揮使守之文忠太祖姊子也時建德新破城中守禦未備張士誠遣其徒率苗獠水陸奄至城下文忠出竒兵大敗之取所斬俘馘載巨筏中乘流而下水寇見之亦遁夏六月張士誠兵寇常州湯和力戰敗之擒其卒三百人士誠復寇常熟廖永安與戰于福山港大破之追至通州狼山獲其戰艦而還九月元苖帥左丞楊旺扎勒為張士誠所殺先是江淮既亂元兵屢敗議者以為苖兵可用遂自湖廣招至纍破張士誠兵歷升至左丞然苖性貪殘好殺所過抄掠屠戮無遺郡縣苦之士誠為所窘既降欲圗之而達實特穆爾亦厭旺扎勒驕橫不可制乃隂定計用士誠兵圍之旺扎勒兵敗自殺丁酉其部將員成蔣英劉震等率所部詣李文忠降旺扎勒死士誠益無所憚尋遣兵據杭州嘉興逹實無如之何矣冬十月張士誠兵寇常州湯和等擊敗之俘甲士千餘人舟千艘馬千匹甲戌克宜興徐逹邵榮帥師攻宜興久不下太祖遣使謂曰宜興城小而堅未易猝拔聞其城西通太湖張士誠餉道所出若斷其餉道軍食內乏破之必矣逹乃遣丁德興分兵絶太湖口而併力急攻城遂破既拔宜興廖永安復帥舟師擊士誠兵于太湖乘勝深入遇吕珍與戰不利遂為所獲不屈士誠囚之太祖欲以所獲將士三千人易永安士誠不從士誠母念士德欲以永安易士德太祖亦不許士德尋謀間殺之楊國興出太湖口與諸將趨湖州攻舊館破張士信兵又平宜堰口二十六寨太祖命國興總督元帥沈仁等守之國興勞徠安集民多歸之遂城宜興三月城完士誠水陸來寇國興率諸將擊敗之士誠遁去十九年春正月庚申胡大海李文忠取諸暨州張士誠將華元帥遁去已而士誠遣吕珍率兵圍諸暨堰水灌城大海援之奪堰水灌珍軍珍窮蹙即馬上折矢誓求解兵去大海然之都事王愷諫曰賊狡猾難信不如擊之大海曰彼果來吾有以待之且言出而背之不信既縱而擊之不武遂縱之去二月張士誠兵寇江陰艨艟蔽江僞將蘇同僉者建牙君山指畫為進攻狀守將吳良下令曰彼衆我寡當以計破之勿輕動有頃敵陳于江壖良命弟楨整兵北門當其西北面以十餘騎蹂之擒其卒數人餘黨莫敢前賊分兵欲攻東門良遣元帥王子明馳擊之擒其將士五百人殺溺死者甚衆敵大敗宵遁時賊屢侵常州良及其弟楨守禦有方每寇至輒破走之士誠數敗氣索自是不敢犯境太祖召入見勞之曰吳院判保障一方使吾無東顧憂其功大矣賜車馬珠玉不足旌命諸儒臣為詩文美之先是士誠北有淮海南據浙西長興江陰皆其要害長興據太湖口陸走廣德諸郡江陰枕大江扼姑蘇通州濟渡之處得長興則士誠步騎不敢出廣德窺宣歙得江陰則士誠舟師不敢溯大江上金焦自是侵軼路絶平章邵榮自臨安進攻湖州戰不利還屯臨安李伯升來攻設伏山下戒寇至勿動俟山上旗舉齊擊之伯升果率衆奄至遇覆敗我師乃還三月張士誠寇建德李文忠禦之于東門使别將潛出小北門間道過鮑婆嶺由碧雞塢繞出陳後大破之士誠復遣兵侵嚴州至大浪灘李文忠令部將何世明率精鋭西出烏龍嶺至胥口與戰破走之士誠兵據分水嶺世明進擊斬首五百餘級太祖自將取紹興以馮國用守之國用卒于軍士誠復遣兵陷紹興九月張士誠遣兵寇常州吳復督兵出忠節門奮擊大敗之吳良間道殱其援兵于無錫之三山士誠兵狼狽奪氣乃還十二月張士誠忿分水之敗復遣兵據分水新城之三溪何世明擊之斬其將陸元帥花將軍等一千餘人焚其營自是士誠不敢窺建婺尋改建德為嚴州府二十年春三月常遇春攻杭州不克秋九月張士誠兵侵諸全守將袁實戰死吕珍徐義自太湖分三路寇長興耿炳文擊破之總管湯全張琪被殺二十一年秋八月胡大海攻紹興部將張英恃勇輕進至城下遇伏死之大海引兵還冬十月張士誠遣其將李伯升寇長興衆十餘萬水陸並進勢甚鋭城中守兵僅七千耿炳文遇之諸將陳德華髙費聚等三路往援伯升夜劫營諸將皆潰炳文嬰城固守伯升悉兵圍之結九寨為樓車下瞰城中運土石填壕隍以火船燒水關攻益急炳文晝夜應敵內外不相聞月餘十一月戊午太祖在九江聞報急遣常遇春將兵往援伯升聞遇春至棄營遁遇春追擊之俘斬五千餘人二十二年春二月金華處州苖帥叛張士誠乘間遣其弟士信同僉吕珍率兵十萬圍諸全守將謝再興鏖戰二十九日未决走嚴州告急於李文忠文忠以嚴州兵少且密邇桐廬賊境衢信兵又出江西無以應援金華議以兵貴虛聲乃揭榜義烏古朴嶺揚言平章邵榮引兵五萬出江右右丞徐逹引兵五萬出徽州約㑹金華尅日抵諸暨賊見榜轉相告吕珍欲退軍五里下營以待决戰時胡德濟得李文忠檄自信州率兵來援有降卒言賊情具得虛實德濟與再興分門而守至夜半令軍士飽食一鼓出城金鼓銃炮震天地賊衆驚亂人馬奔走自相蹂躙德濟督兵追擊之士信大潰走冬十一月池州帥羅友貴據神山寨欲通張士誠杭歙震動常遇春趙德勝擊斬之二十三年春二月戊寅命移置浙江行省於嚴州時張士誠屢冦諸全李文忠駐金華應援不及于是徙省治於嚴留徐司馬守金華三月張士誠吕珍率衆十萬圍劉福通於安豐福通遣人間道求援珍破安豐殺福通據其城韓魯爾走滁州太祖率徐逹常遇春等往討之珍據城列柵汪元帥攻其中壘拔之㑹左右軍敗阻于塹不得出遇春橫擊三戰三勝珍大敗廬州左君弼出兵助珍又敗之珍與君弼皆走遂命逹等移師圍廬州元將珠徹實都乘間入安豐夏四月乙丑諸全守將謝再興叛降于張士誠再興遣人往杭州私貿易太祖怒其泄軍中事召再興責之命參軍李夢庚往節制其軍遣再興歸聽調再興懼殺知州欒鳯執夢庚以諸全軍馬赴紹興降左丞李文忠聞亂遣胡德濟屯兵五指山下以備之九月謝再興以張氏兵犯東陽李文忠自嚴州率鋭卒馳一百六十里來援壬午遇賊于義烏擊敗之胡深亦自處州來援與文忠議以諸全不守則衢州不支矣乃度地去諸全六十里並五指山築新城不旬日城完太祖以胡德濟為行省參政守之未幾士誠將李伯升大舉入冦圍城下城堅不可拔乃引去時太祖伐陳友諒未還張士誠以嘗脅達實特穆爾封王不報遂自稱王改國號曰吳即姑蘇治宫室置官屬元遣使徴其糧不與二十四年夏四月俞通海汪興祖率兵掠劉家港進逼通州擊敗張士誠兵擒其院判朱瓊等百餘人秋八月張士誠使其弟士信面數達實特穆爾罪失勒令自陳老疾避位脅將佐為上言江浙丞相非士信不可逼取符印幽逹實于嘉興士信自為丞相又脅布哈特穆爾為請于元使為真王布哈不從即遣使至紹興欲奪其印布哈封其印置庫中曰我頭可斷印不可得也仰藥死逹實聞之曰大夫且死吾生何為亦仰藥死士誠専有江浙時浙西殷富士誠兄弟驕佚無斷政在文吏然士誠尚持重寡言好士築景賢樓士無賢不肖輿馬居室多厭其心亦往往趨焉士誠用兵恃其弟士德及部將史椿為謀主後士德被擒史椿以讒出守淮安數年椿知士誠無成遣使以書來約降謀泄士誠殺之于是委政弟士信士信荒淫出師多擕摴蒱蹴踘擁婦女酣宴其命將將或卧不起邀官爵美田宅既至軍即失地喪師多不問或復用之士信每事惟與王敬夫葉德新蔡彥夫三人謀三人者皆諂佞憸邪惟事䝉蔽故其國政日非太祖聞之曰我無一事不經心尚被人欺張九四終嵗不出門理事豈有不敗者乎時有民謡十七字曰丞相做事業専用王蔡葉一朝西風起乾􅕆崑山郭翼上書士誠曰明公仗馬箠下吳越數十城望風請服者人皆苦元政守吏貪殘不恤其下也今誠能反其政休勞之乘時進取則霸業可成若遽自宴安湛樂四方豪傑並起明公欲閉城自守其終能乎士誠怒欲殺之翼亡去冬十月張士誠遣其弟丞相士信寇長興耿炳文費聚擊敗之獲其將宋興祖士信憤益兵圍城湯和自常州來援與炳文等合擊大敗之士信走還二十五年春正月張士誠復寇長興耿炳文連破之于城下鎮撫歐大智戰死士誠自是不敢復犯長興炳文守長興十年孤城血戰卒保無虞與湯和守常州吳良守江陰氣勢聨絡俱為東南屏障云二月丙午張士誠遣其司徒李伯升挾我叛將謝再興帥馬步舟師二十萬踰浦江圍諸全之新城造廬室建倉庫預置州縣官屬為持久必拔之計分屯精兵數萬於城北隅遏我援師初至胡德濟遣部將繆美敗其前鋒于斗巖之下敵攻西門美趨之再戰皆捷既抵城下德濟戒將士勿輕出但嚴為備來攻則矢石交發禦之遣使求救于李文忠文忠令指揮張斌出浦江為聲援自率朱亮祖等日馳六十里赴救抵龍潭去敵二十里據險為營胡德濟知文忠至潛使報曰賊兵方鋭姑緩避之文忠曰以衆則我非彼敵以謀則彼非我敵謝𤣥八千人破苻堅八十萬衆何避焉吾若不戰而退則彼勢益張雖大軍至難攻矣死中求生正在今日乃下令曰賊衆而驕我少而鋭以鋭當驕可一戰而擒輜重皆汝等有也詰旦軍方食候卒告敵至文忠悉精鋭陳于營外張左右翼待之文忠自將中軍既而直營右數里烟焰勃興疑為寇乃分兵守隘扼之㑹處州參軍胡深遣耿天璧援兵適至文忠軍益奮兩軍既交文忠仰天誓曰朝廷大事在此一舉豈敢愛身以後三軍即橫槊據鞍引數十騎乘髙馳下直出陳後衝其中堅敵列騎迎戰文忠手格數人所向皆靡叛將謝再興及苖軍見之震懾失色大軍乘之敵大潰亂德濟亦帥城中將士鼓譟而出呼聲動天地莫不以一當十逐北十餘里溪水盡赤死者以萬數文忠收兵㑹食遣朱亮祖張斌乘勝追殄餘寇燔其營落數十獲僞同僉韓謙元帥周遇蕭山等六百人軍士三千馬八百委棄輜重鎧仗如山舉之旬日不盡其僞五太子及李伯升僅以身免太祖大喜召文忠德濟入京賜名馬御衣擢德濟右丞冬十月戊戌命左相國徐逹平章常遇春等規取淮東時士誠所據郡縣南至紹興與方國珍接境北有通泰髙郵淮安徐宿濠泗至濟寧與山東相距太祖欲先取通泰諸郡剪其肘翼然後専事浙西故命逹總兵取之乙巳逹兵趨泰州浚河通州遇士誠兵擊敗之駐軍海安壩丁未進圍泰州新城擊敗士誠湖北援兵獲其元帥王成己酉士誠淮安李院判來援遇春擊敗之擒萬户吳聚等時江陰水寨守將康茂才報稱士誠以舟師四百艘出大江次范蔡港别以小舟于江中孤山往來出沒請為之備太祖揣知其情諭徐逹等曰寇初駐兵范蔡港吾度其詐今猶豫不敢即泝上流為詐益明彼非有决機攻戰之謀徒欲分我兵勢耳宜遣廖永忠還兵水寨而大軍勿輕動此寇徘徊江上自老之師乘其怠慢必克泰州泰州既克江北瓦解不戰自潰但宜謹備之耳閏十月庚辰諸將克泰州擒士誠將嚴再興夏思誠等分兵狥興化降其將李清十一月進攻髙郵太祖恐深入敵境不能䇿應諸將乃命馮國勝率所部節制髙郵軍而以徐逹還軍泰州㑹士誠犯宜興逹率中軍精卒渡江走之破擒士誠兵三千餘宜興圍解十二月士誠遣兵寇安吉守將費子賢擊却之二十六年春正月張士誠舟師數百艘出馬䭾沙溯流侵江陰守將吳良吳楨嚴兵以待太祖親率大軍水陸並進討之至鎮江敵已遁去追至巫子門寇乘潮逆拒首尾相失良等縱兵夾擊大敗之獲士卒二千人太祖幸江陰見良等防禦有方曰汝非昔日之吳起乎稱嘆久之良在江陰十年終始戒嚴夜嘗宿城樓枕戈待旦暇日延經術士講明經史兵法訓敕將校馭胥吏不少假借敦教化興學校修屯田足軍餉境內帖然太祖有事江漢東藩無擾皆良等為之捍蔽也馮國勝圍髙郵張士誠將俞同僉詐遣人來降約推女牆為應勝信之夜遣康泰率兵踰城而入皆為所殺三月徐逹自宜興還攻髙郵初士誠遣左丞徐義由海道入淮援髙郵義屯太倉觀望不敢進徐逹遣使請以指揮孫興祖守海安平章常遇春督水軍為髙郵聲援從之遣使諭逹曰張士誠由髙郵嘯聚以有吳越髙郵其巢穴也大軍攻之彼必來救今聞徐義兵已入海或由射陽湖或出瓠子角或出寶應趨髙郵不可不備逹得書遂㑹兵進攻一鼓克之戮其將俞同僉等興祖守海安士誠兵來侵擊敗之擒將士二百餘人進攻通州通州守將拒戰興祖督將士奮擊大破之自是士誠不敢犯海安夏四月徐逹移師㑹常遇春攻淮安徐義舟師集馬漯港夜率兵襲破之義泛海遁去獲戰艦百餘艘進薄城下士誠將梅思祖封府庫籍甲兵出降并獻所部四州太祖嘉其知命保民授都督府副使以華雲龍守之徐逹還兵攻興化先是逹圖泰州興化海安通州髙郵山川地形要害以進太祖覽之見瓠子角為興化要地寇兵所經之路令逹以兵絶其隘戊午遂克興化淮地悉平命韓政進取濠州濠自郭子興棄後屢為人所竊據最後張士誠將李濟守之太祖命李善長以書招之不報太祖曰濠州吾家鄉今為張士誠竊據是吾有國而無家也即命韓政督顧時等攻之至濠攻其水簾月城又攻其西門城中拒守甚堅政乃督兵以雲梯炮石四面並攻城中不能支庚申守將李濟以城降太祖幸濠省陵墓宴父老太祖以淮東諸郡既平遂議討張士誠召中書省大都督府臣謂曰張士誠據姑蘇數侵擾吾近地為吾境內之寇不可不討諸公其熟計之李善長對曰張氏宜討久矣然以臣愚觀之其勢雖屢屈而兵力未衰土沃民富又多積儲恐難猝拔宜候隙而動徐逹進曰張氏驕橫暴殄奢侈此天亡之時也其所任驕將如李伯升吕珍之徒皆齷齪不足數惟擁兵將為富貴之娛耳居中用事黃蔡葉三參軍輩迂濶書生不知大計臣奉主上威德率精鋭之師聲罪致討三吳可計日而定太祖大喜顧逹曰諸人局于所見獨汝合吾意事必濟矣于是命諸將簡閲士卒擇日出師八月辛亥命徐逹為大將軍常遇春為副將軍帥師二十萬伐張士誠集諸將佐諭之曰自大亂以來豪傑並起所在割據西有陳友諒東有張士誠皆連地千里擁衆數十萬今介乎二人之間相與抗者十餘年觀二人所為志不在民不過貪富貴劫奪寇攘而已友諒既敗滅獨士誠據有浙西北連兩淮恃其强力數侵疆場賴諸將連嵗征討克取兩淮惟浙西姑蘇諸郡未下故令卿等討之卿等宜戒飭士卒毋肆虜掠毋妄殺戮毋發丘壠毋燬廬舍聞士誠母葬姑蘇城外慎勿侵毁其墓汝等毋忘吾言諸將帥務相輯睦勿縱左右凌士卒凡為將必資士卒善撫恤之大抵克敵者必以成功為效樹德者必以廣恩為務卿等勉之諸將皆再拜受命出太祖復御西苑召逹遇春曰爾等此行用師孰先遇春對曰逐梟者必覆其巢去鼠者必熏其穴此行當直搗平江平江既破其餘諸郡可不勞而下太祖曰不然士誠起鹽販與張天騏潘原明輩皆强梗之徒相為手足士誠窮蹙天騏輩懼俱斃必併力救之今不先分其勢而遽攻姑蘇若天騏出湖州原明出杭州援兵四合難以取勝莫若先攻湖州使其疲于奔命羽翼既披然後移兵姑蘇取之必矣太祖乃屏左右謂逹遇春曰吾欲遣熊天瑞從行俾為吾間也天瑞之降非其本意心常怏怏適來之謀戒諸將勿令知之但云直搗姑蘇天瑞知之必叛從張氏以輸此言如此則墮吾計矣癸丑大將軍徐逹等率諸將發龍江而别遣李文忠趨杭州華雲龍向嘉興以分其兵辛酉師至太湖己巳遇士誠將尹義陳旺逆戰破擒之遂次洞庭山癸酉進至湖州之毗山又擊敗士誠將石清汪海擒之張士信駐軍湖山望風遁指揮熊天瑞果叛降張士誠甲戌師至湖州之三里橋士誠右丞張天騏分兵三路以拒我師黃寶當南路陶子寶當中路天騏自當北路唐傑為後繼逹進兵薄之遇春攻黃寶王弼攻天騏逹自中路攻陶子寶别遣驍將王國寶率長鎗軍扼其歸遇春進擊寶敗之寶走入城阻橋不得濟還兵力戰又敗被擒天騏子寶不戰退士誠遣李伯升來援由荻港潛入城我軍四面圍之伯升天騏閉門拒守士誠又遣吕珍朱暹等及其五太子率兵六萬來援屯城東之舊館築五寨自固逹遇春等分兵營于東阡鎮南姑嫂橋連築十壘以絶舊館之援士誠壻潘元紹駐兵烏鎮東為吕珍等聲援我師乘夜擊之元紹遁遂填塞溝港絶其糧道士誠知事急遣親兵來援逹等與戰於皂林敗之九月士誠復遣徐志堅以輕舟出東阡鎮覘我師欲攻姑嫂橋常遇春遇之㑹天大風雨晦甚遇春令勇士乘划舟數百突擊之擒志堅得衆二千餘人别將廖永忠薛顯將游軍攻德清克之擒其院判鍾正士誠自徐志堅敗後懼甚遣其右丞徐義至舊館覘形勢將還報常遇春扼歸路不得出乃陰遣人約張士信出兵與舊館兵合力來戰士誠遣赤龍船親兵援之義始得脫與潘元紹率赤龍船兵屯於平望復乘小舟潛至烏鎮欲援舊館遇春由别港追襲之至平望王銘挺戈先登縱火焚赤龍船軍資器械一時俱盡自是舊館援絶十月遇春兵攻烏鎮徐義潘元紹皆敗走追至升山破其平章王晟六寨餘軍奔入舊館之東壁同僉戴茂降我師馳據之王晟亦降徐逹復攻升山水寨顧時引數舟繞出敵船船上人俯視而笑時覺其懈率壯士躍入敵舟大呼奮擊餘舟競進薄之五太子者盛兵來援常遇春小郤薛顯率舟師直前奮擊燒其船敵衆大敗五太子朱暹吕珍等以舊館降得兵六萬人遇春謂薛顯曰今日之戰皆將軍之力吾不如也五太子士誠養子短小精悍能平地躍起丈餘珍暹士誠所親信驍將皆善戰士誠倚之而珍尤敢戰嘗廓革囊兵宵濟以襲我師每戰輒為歌令其帳下及城中人歌以譟至是皆降士誠為之喪氣徐逹以吕珍狥于湖州城下城中大震遙語李伯升出降伯升曰張太尉養我厚我不忍背之抽刀欲自殺為左右抱持得不死十一日甲申左丞張天騏等以城降伯升亦降李文忠總水陸師下浙江遣指揮朱亮祖耿天璧攻桐廬降其將戴元帥復遣指揮袁洪孫虎克富陽擒其同僉李天祿遂合兵圍餘杭守將謝五謝再興弟也文忠遣人語之曰爾兄弟以李夢庚小隙歸張氏非爾謀也爾我之戚臣若降可得不死謝五亦降進兵杭州未至士誠平章潘原明懼遣員外郎方彛詣軍門納欵文忠曰吾兵逺來勝負未可知而遽約降得無以計緩我乎彛曰天兵如雷霆當者立敗杭雖孤城生齒百萬聞將軍來皆曰王者之師故乞降以求生耳文忠見其誠引入卧內令條陳入城次第遣還明日己丑原明籍土地錢榖甲兵數并藝叛將蔣英劉震出降伏謁道左以女樂𨗳文忠叱去之入宿城上秋毫無犯一卒强入民家磔以狥太祖以原明全城歸順民不受鋒鏑仍授平章守舊城聽李文忠節制命懸胡大海像刺蔣英劉震心血祭之庚子李文忠攻紹興守將李思忠降華雲龍攻嘉興守將宋興降徐逹既下湖州㑹諸將進攻平江至南潯士誠元帥王勝降辛邜進圍吳江參政李福知州楊彛降癸邜逹等兵至平江城南鮎魚口擊其將竇義走之康茂才至尹山橋遇士誠兵又擊敗之焚其官瀆戰船千餘艘及積聚甚衆遂進兵圍其城逹軍葑門遇春軍虎丘郭子興軍婁門華雲龍軍胥門湯和軍閶門王弼軍盤門張溫軍西門康茂才軍北門耿炳文軍城東北仇成軍城西南何文輝軍城西北四面築長圍困之又架木塔與城中浮屠等築敵樓三層下瞰城中置弓弩火銃其上又設襄陽炮擊之城中震恐有楊茂者無錫莫天祐部將也善沒水天祐潛令入姑蘇與士誠相聞邏卒獲之于閶門水柵綁送逹軍逹釋而用之時平江城堅不可破天祐阻兵無錫為士誠聲援逹縱茂出入往來因得其彼此所遺蠟書悉知士誠天祐虛實為攻困之計益備指揮茅成攻婁門中流矢死平章俞通海分兵取太倉州民爭獻牛酒迎道左通海却其獻慰諭遣之約束軍士秋毫無犯民大悅僞帥陳仁等以大舶百餘艘降崑山崇明嘉定望風皆附松江路守將王立中聞之亦降太祖吳元年元至正二十七年也春二月大軍圍姑蘇久不下徐逹遣人自軍中來請事太祖手書慰勞之曰古帝王之興必有命世之士以為之輔將軍自昔相從忠義出自天性沉毅有謀用能遏絶亂略消靡羣慝建無前之功雖古豪傑之士不能過也今所請事多可便宜行者而識慮周詳不肯造次有違誠社稷之慶邦家之福然將在外君不御古之道也自後軍中緩急將軍便宜行之逹得書頓首受命檄俞通海兵㑹攻姑蘇通海至滅渡橋擊敗敵兵提兵桃花塢蕩其營中流矢創甚乃遣將以兵㑹逹而身自還建康太祖幸其第視病病革太祖呼謂曰平章知豫來問疾乎通海不能語太祖揮泪出通海遂卒初徐逹之圍姑蘇也太祖不欲煩兵但困服之耳至是久不下乃以書遺士誠許以竇融錢俶故事士誠不報夏六月己酉士誠被圍既久欲突圍出覘城左方見陳嚴整不敢犯轉至盤門將奔常遇春營遇春覺其至嚴陳待之分兵北濠截其後戰良久未决士誠遣兵千餘助之又自出兵山塘為援山塘路狹塞不可進麾令稍郤遇春撫王弼背曰軍中皆稱爾為猛將能為我取此乎弼應聲馳鐵騎揮雙刀往擊之敵小郤遇春率衆乘之遂大敗其軍溺于沙盆之潭可量也士誠故有勇勝軍號十條龍常銀鎧錦衣出入陳中是日皆溺死士誠馬驚墮水幾不救肩輿入城計忽忽無所出時降將李伯升知士誠勢迫欲說令歸命乃遣客詣士誠門告急士誠召之入曰爾欲何言客曰吾為公言興亡禍福之計願公安意聽之士誠曰何如客曰公知天數乎昔項羽喑嗚叱咤百戰百勝卒敗垓下天下歸于漢髙祖何則此天數也公初以十八人入髙郵元兵百萬圍之此時如虎落阱中死在朝夕一旦元兵潰亂公遂提孤軍乘勝攻擊東據三吳有地千里甲士數十萬南面稱孤此項羽之勢也誠能于此時不忘髙郵之危苦心勞志收召豪傑度其才能任以職事撫人民練兵旅御將帥有功者賞敗軍者戮使號令嚴明百姓樂附非特三吳可保天下不足定也士誠曰足下此時不言今復何及客曰吾此時雖有言亦不得聞也何則公之子弟將帥親戚羅列中外美衣玉食歌兒舞女日夕酣飲提兵者自以為韓白謀畫者自以為蕭曹傲然視天下不復有人當此之時公深居於內敗一軍不知失一地不聞縱知亦不問故遂至今日士誠喟然嘆曰吾亦恨之無及矣客曰吾有一䇿恐公不能從也士誠曰不過死耳客曰使死有益于國家有利于子孫死固當不然徒自苦耳且公不聞陳友諒乎跨有荆楚兵甲百萬與江左之兵戰于姑孰鏖于鄱陽友諒舉火欲燒江左之船天乃反風而焚之友諒兵敗身喪何則天命所在人力無如之何今攻我益急公恃湖州援湖州失嘉興援嘉興失杭州援杭州又失今獨守此尺寸誓以死拒竊慮勢極患生猝有變從中起者公此時欲死不得生無所歸故竊以為莫如順天之命自求多福令一介之使疾走金陵稱公所以歸義救民之意公開城門幅巾待命亦不失為萬户侯况嘗許以竇融錢俶故事耶且公之地譬如博者得人之物而復失之何損士誠俯首沉慮良久曰足下且休待吾熟思之然卒狐疑莫能决也壬子復率兵突出胥門鋒甚鋭遇春禦之兵稍郤士信方在城樓上督戰忽大呼曰軍士疲矣且止遂鳴鉦收軍遇春乘之復大敗自是士誠不敢復出士信張幕城上踞銀椅與參政謝節等㑹食左右方進桃未及嘗忽飛炮碎其首而死時熊天瑞教城中嚴炮以擊外兵多所中傷城中木石俱盡至拆祠廟民居為炮具徐逹令軍中架木若屋狀承以竹笆伏兵其下載以攻城矢石不得傷九月辛巳逹督將士破葑門常遇春亦破閶門新寨遂率衆渡橋進薄城下其樞密唐傑登城拒戰士誠駐軍門內令參政謝節周仁立柵以補外城唐傑不支投兵降周仁徐義潘元紹錢參政等皆降晡時士誠軍大潰諸將蟻附登城城破士誠收餘兵二三萬親率之戰于萬夀寺東街復敗士誠倉皇歸從者僅數騎初士誠見兵敗謂其妻劉氏曰我敗且死若曹何為劉氏曰君勿憂妾必不負君乃豫乳媪金抱二幼子出積薪齊雲樓下驅其羣妾侍女登樓令養子辰保縱火焚之劉氏自縊死士誠獨坐室中左右皆散走達遣士誠舊將李伯升至士誠所諭意時日已暮士誠距户經伯升决户令降將趙世雄抱解之復蘇曰九四英雄患無身耳達又令潘元紹曉之反覆數四士誠瞑目不言乃以舊盾舁之出葑門至舟中獲其僞將相李素徐義等并元宗室九人皆送建康所得城中兵民二十餘萬諸將還師取通州士誠守將張右丞降丁亥平章胡廷美帥師取無錫先是士誠表天祐于元授同僉樞密院事守無錫徐達纍遣使諭之皆被殺至是廷美等攻其城州人張翼知事急率父老往見天祐曰吾民為張氏守十二年矣張氏已就縛固守將為誰生民存亡皆在今夕願熟思之天祐擲其帽於地曰誰不知降也亦降士誠卧舟中不食至龍江堅卧不肯起舁至中書省李善長問之不語已而士誠言不遜善長怒罵之士誠竟自縊死賜棺葬之誅叛將熊天瑞刳三參軍藁于旗竿之首改平江曰蘇州府太祖乃以書送元宗室神保大王等還元浙西吳㑹皆平諸將振旅還太祖御㦸門降敕褒諭論功行賞封李善長宣國公徐逹信國公常遇春鄂國公餘進爵賜金帛有差諭諸將曰滅漢滅吳皆公等功公等何忝古名將今當北定中原矣各努力明日入謝太祖曰公等還第置酒為樂乎對曰荷上恩有之太祖曰吾寧不欲宴公等為一日歡中原未平非為樂時也公等不見張氏乎終日酣飲宜深戒之谷應泰曰張士誠本泰州鹽儈至正十三年以十八人入髙郵元兵百萬圍之弗克而士誠孤軍轉戰北跨淮海與山左相距南據浙西與方國珍接境中間帶甲數十萬沃野數千里即未能藉其富强削平區宇而官山多鼓鑄之資煮海盡魚鹽之利儻更勞心苦志收召豪傑倣典午之化龍憑赤烏以立國則江南雖小可全而王也乃論者以士誠之失在深居髙拱上下相䝉驕將李伯升吕珍之徒皆齷齪不足數黃蔡三參軍輩又迂濶昧大計以故謀主被讒爪牙受縛而豫以太祖有可乘之敝三士誠乃內懷選懦坐失事機此其所以亡也方士誠之竊發也距太祖起兵僅一年耳其時太祖者濠圍初解鄉里募師未敢窺江外一步而士誠不以此時長驅姑孰略定金陵為百里趨利之謀奮一鼓先登之氣其失一也洎乎友諒僭號約同入寇而江州兵下議者欲降明師單弱勢岌岌矣士誠又不以此時乘夫差之伐齊規卞莊之刺虎而保境苟安喙息旦夕其失二也及乎僞漢屢摧鄱陽大戰輔車唇齒可為寒心士誠又不以此時倣樂毅之結韓趙孔明之救東吳而肥瘠越秦不關疴癢其失三也北至江楚悉平藩籬鞏固全軍并力捲甲東來此時强弱之勢已明衆寡之形不敵譬之孤豚咋虎燎髮洪罏必無幸矣為士誠者宜以犧牲玉帛待于境上河西三郡獻自竇融新都六城保于汪氏庶無喋血之憂不失通侯之賞而反鼓厲用兵分畨四出命尹義陳旺逆戰太湖朱暹五太子結寨東􅀈又以張天騏當北路黃寶當南路陶子寶當中路卒之桑榆不收噬臍無及齊雲一炬闔室自焚豈太祖滅士誠哉蓋士誠自滅之也然人但知友諒之失在輕戰而士誠之失在自守不知輕戰之弊原于氣驕自守之私叢于志滿急攻晉而苻秦遂困不伐魏而蜀業亦亡過猶不及斯亦魯衛之政與雖其後士誠頗絶粒自經辭無撓屈然隗囂恚憤公孫洞胸遊魂倔强何足數哉明史紀事本末卷四
